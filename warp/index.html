<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body{height:100%;overflow:hidden;background:#04040f;font-family:"Hiragino Kaku Gothic ProN","Yu Gothic",sans-serif;
  user-select:none;-webkit-user-select:none;touch-action:none}
#game{position:fixed;inset:0;width:100%;height:100%;display:block;touch-action:none}
#ui{position:fixed;inset:0;pointer-events:none;display:flex;flex-direction:column;align-items:center;justify-content:center}
.overlay{pointer-events:auto;background:rgba(8,8,30,.84);backdrop-filter:blur(8px);border-radius:24px;
  padding:28px 30px;text-align:center;color:#fff;max-width:350px;width:88%;box-shadow:0 0 70px rgba(120,160,255,.3)}
.overlay h1{font-size:30px;background:linear-gradient(90deg,#7ad7ff,#b08bff,#ff8ac2,#ffd76e);-webkit-background-clip:text;
  background-clip:text;color:transparent;margin-bottom:6px;letter-spacing:.06em}
.overlay .sub{font-size:12px;color:#aab;margin-bottom:14px;letter-spacing:.08em}
.overlay img.hero{width:88px;filter:drop-shadow(0 0 18px rgba(140,180,255,.8));animation:fly 1.8s ease-in-out infinite}
@keyframes fly{0%,100%{transform:translateY(0) rotate(-6deg) scale(1)}50%{transform:translateY(-12px) rotate(6deg) scale(1.06)}}

  background:linear-gradient(135deg,#7ad7ff,#b08bff);border:none;border-radius:999px;cursor:pointer;
  box-shadow:0 6px 26px rgba(140,160,255,.5);transition:transform .12s}

<body>
<canvas id="game"></canvas>
<a class="back" href="/">← 畜物語</a>
<button class="mute" id="muteBtn" aria-label="サウンド切替">🔊</button>
<div id="ui">
  <div class="overlay" id="startOv">
    <img class="hero" src="/chikumo.svg" alt="こっこちゃん">
    <h1>こっこワープ</h1>
    <div class="sub">COCCO WARP — Z軸×奥行きトンネルラン</div>
    <div class="how">
      ◆ ゆびでスーッとなぞって<b>こっこちゃんを操縦</b>。<br>
      ◆ 奥から迫る<b>リングの中心</b>をくぐって<b>PERFECT</b>！<br>
      ◆ コンボ<b>10</b>で<b>ワープフィーバー</b>——虹の超光速で無敵＆スコア2倍！<br>
      ◆ 隕石にぶつかると❤️がへる。3回でおしまい。
    </div>
    <div class="score-row" id="bestRow"></div>
    <button class="btn" id="startBtn">発進！</button>
  </div>
  <div class="overlay hidden" id="endOv">
    <img class="hero" src="/chikumo.svg" alt="こっこちゃん">
    <h1>RESULT</h1>
    <div class="score-row">SCORE</div>
    <div class="big-score" id="endScore">0</div>
    <div class="score-row" id="endBest"></div>
    <div class="score-row" id="endCombo"></div>
    <div class="score-row" id="endDist"></div>
    <button class="btn" id="retryBtn">もう一回とぶ</button>
    <button class="btn sub" id="shareBtn">Xに自慢する</button>
  </div>
</div>
<script>
"use strict";
/* ───────── 公式こっこちゃんSVG ───────── */
const cocco=new Image();let coccoReady=false;
cocco.onload=()=>coccoReady=true;
cocco.src='/chikumo.svg';

const cv=document.getElementById('game'),cx=cv.getContext('2d');
let W=0,H=0,DPR=1;
function resize(){DPR=Math.min(devicePixelRatio||1,2);W=innerWidth;H=innerHeight;
  cv.width=W*DPR;cv.height=H*DPR;cv.style.width=W+'px';cv.style.height=H+'px';cx.setTransform(DPR,0,0,DPR,0,0);}
addEventListener('resize',resize);resize();

function vib(p){try{if(typeof navigator!=='undefined'&&navigator.vibrate)navigator.vibrate(p);}catch(e){}}

/* ───────── サウンド (WebAudio chiptune) ───────── */
let AC=null,muted=false,ECHO=null;
const MASTER=0.5;
function audio(){if(!AC){AC=new (window.AudioContext||window.webkitAudioContext)();
  ECHO=AC.createDelay(1);ECHO.delayTime.value=.27;
  const fb=AC.createGain();fb.gain.value=.33;
  const wet=AC.createGain();wet.gain.value=.45;
  ECHO.connect(fb);fb.connect(ECHO);ECHO.connect(wet);wet.connect(AC.destination);}
  if(AC.state==='suspended')AC.resume();return AC;}
function tone(f,t0,dur,type,vol,slide,echo){const a=audio();const o=a.createOscillator(),g=a.createGain();
  o.type=type;o.frequency.setValueAtTime(f,t0);if(slide)o.frequency.exponentialRampToValueAtTime(slide,t0+dur);
  g.gain.setValueAtTime(vol*MASTER,t0);g.gain.exponentialRampToValueAtTime(.0001,t0+dur);
  o.connect(g).connect(a.destination);if(echo&&ECHO)g.connect(ECHO);
  o.start(t0);o.stop(t0+dur+.02);}
function noise(t0,dur,vol){const a=audio();const n=a.createBufferSource(),buf=a.createBuffer(1,Math.max(1,(a.sampleRate*dur)|0),a.sampleRate);
  const d=buf.getChannelData(0);for(let i=0;i<d.length;i++)d[i]=(Math.random()*2-1)*(1-i/d.length);
  n.buffer=buf;const g=a.createGain();g.gain.value=vol*MASTER;n.connect(g).connect(a.destination);n.start(t0);}
function sfxPerfect(combo){if(muted)return;const t=audio().currentTime;
  const base=659.25*Math.pow(1.0594631,Math.min(combo,14));
  tone(base,t,.1,'square',.15);tone(base*1.25,t+.04,.12,'square',.13);
  tone(base*1.5,t+.08,.14,'square',.12);tone(base*2,t+.12,.22,'triangle',.17);noise(t,.05,.05);}
function sfxGood(){if(muted)return;const t=audio().currentTime;tone(523,t,.09,'square',.11);tone(784,t+.05,.12,'triangle',.12);}
function sfxStar(){if(muted)return;const t=audio().currentTime;tone(1318,t,.07,'square',.1);tone(1760,t+.05,.12,'square',.09);}
function sfxGraze(){if(muted)return;const t=audio().currentTime;noise(t,.1,.06);tone(880,t,.08,'sine',.05,1400);}
function sfxWhiff(){if(muted)return;const t=audio().currentTime;tone(330,t,.14,'triangle',.08,262);}
function sfxHit(){if(muted)return;const t=audio().currentTime;
  tone(196,t,.3,'sawtooth',.16,65);tone(98,t,.35,'square',.12,49);noise(t,.25,.12);}
function sfxSmash(){if(muted)return;const t=audio().currentTime;noise(t,.14,.1);tone(440,t,.12,'square',.1,880);}
function sfxFever(){if(muted)return;const t=audio().currentTime;
  tone(196,t,.5,'sawtooth',.1,1568);noise(t,.45,.12);
  [659,784,988,1318,1568,1976].forEach((f,i)=>{tone(f,t+i*.06,.3,'square',.14,0,true);tone(f/2,t+i*.06,.3,'triangle',.09);});}
function sfxTick(){if(muted)return;const t=audio().currentTime;tone(1568,t,.06,'square',.08);}
function sfxMilestone(){if(muted)return;const t=audio().currentTime;
  [784,988,1175,1568].forEach((f,i)=>tone(f,t+i*.07,.2,'square',.12));}
function sfxOver(){if(muted)return;const t=audio().currentTime;
  [523,494,440,392,330].forEach((f,i)=>tone(f,t+i*.16,.3,'triangle',.13));noise(t,.3,.06);}

/* 中毒BGM: A/B 2セクション64ステップ8bitループ＋エコー — RAF駆動の先読みスケジューラ。fever中はテンポUP&短3度UP */
const MELA=[659,0,659,784, 880,0,784,659, 587,659,587,523, 587,0,0,0,
            659,0,659,784, 880,0,1047,988, 880,784,659,784, 880,0,0,0];
const MELB=[1047,0,988,880, 1047,0,880,0, 880,0,784,698, 784,880,1047,0,
            988,0,880,784, 988,1175,988,880, 1319,0,988,0, 880,0,0,0];
const BASS=[220,220,175,175,196,196,165,165];
const CHORD=[[262,330],[220,262],[247,294],[196,247]];
let bgmStep=0,bgmNext=0,bgmOn=false;
function startBgm(){audio();bgmStep=0;bgmNext=AC.currentTime+.06;bgmOn=true;}
function stopBgm(){bgmOn=false;}
function bgmPump(){if(!bgmOn||muted||!AC)return;const fever=state.fever>0;
  const sp=fever?.095:.125,k=fever?1.1892:1;
  if(bgmNext<AC.currentTime-.3)bgmNext=AC.currentTime+.06;
  let guard=0;
  while(bgmNext<AC.currentTime+.12&&guard++<8){const t=bgmNext,i64=bgmStep%64,i=i64%32;
    const m=(i64<32?MELA:MELB)[i];
    if(m)tone(m*k,t,sp*.92,'square',fever?.085:.06,0,true);
    if(i%4===0)tone(BASS[(i>>2)%8]*k,t,sp*2,'triangle',.095);
    if(i%8===0){const ch=CHORD[(i>>3)%4];for(const f of ch)tone(f*k,t,sp*5,'triangle',.028);}
    if(i%2===0)noise(t,.03,.022);
    if(i%8===4)noise(t,.07,.04);
    if(fever&&m)tone(m*k*2,t+sp*.5,sp*.5,'square',.035);
    bgmStep++;bgmNext+=sp;}}
document.getElementById('muteBtn').onclick=e=>{muted=!muted;e.target.textContent=muted?'🔇':'🔊';
  if(!muted&&AC)bgmNext=AC.currentTime+.06;};

/* ───────── ゲーム状態 ───────── */
const FOCAL=2.4,Z_FAR=26;
const RING_R=.36,PERF_R=.17,PLAYER_R=.13;
const state={mode:'title',score:0,combo:0,maxCombo:0,hearts:3,fever:0,
  speed:7.5,dist:0,nextSpawn:6,nextMile:500,px:0,py:0,tx:0,ty:0,
  inv:0,spin:0,shake:0,flash:0,flashR:255,flashG:255,flashB:255,hue:210,t:0,slow:0};
let best=+localStorage.getItem('warpBest')||0;

const ents=[],parts=[],pops=[],waves=[],trail=[],stars=[],floaters=[];
for(let i=0;i<110;i++)stars.push({x:(Math.random()*2-1)*1.7,y:(Math.random()*2-1)*1.7,z:Math.random()*Z_FAR+.3});
// 星雲＆惑星: 遠景パララックスで宇宙のスケール感を出す
const nebs=[];for(let i=0;i<3;i++)nebs.push({x:(Math.random()*2-1)*1.3,y:(Math.random()*2-1)*.9,
  z:6+Math.random()*18,r:.9+Math.random()*.9,h:180+Math.random()*160});
const planet={x:.9,y:-.55,z:20,r:.5};

function persp(z){return FOCAL/(FOCAL+Math.max(z,-1.6));}
function toScreen(x,y,z){const K=Math.min(W,H)*.55,p=persp(z);
  const sx=W/2+((x-state.px)*p+state.px*.35*p-state.px*.12*(1-p))*K;
  const sy=H*.45+((y-state.py)*p+state.py*.3*p-state.py*.1*(1-p))*K;
  return [sx,sy,p,K];}

/* ───────── 演出 ───────── */
function spawnBurst(x,y,n,hueBase,pw){for(let i=0;i<n;i++){const a=Math.random()*Math.PI*2,v=(Math.random()*.7+.3)*pw;
  parts.push({x,y,vx:Math.cos(a)*v,vy:Math.sin(a)*v,life:1,h:hueBase+Math.random()*70,r:Math.random()*4+2,g:.05});}
  if(parts.length>420)parts.splice(0,parts.length-420);}
function spawnConfetti(x,y,n){for(let i=0;i<n;i++){const a=Math.random()*Math.PI*2,v=Math.random()*4+2;
  parts.push({x,y,vx:Math.cos(a)*v,vy:Math.sin(a)*v-2,life:1,h:Math.random()*360,r:Math.random()*5+2,g:.12,sq:true});}
  if(parts.length>420)parts.splice(0,parts.length-420);}
function spawnWave(x,y,h){waves.push({x,y,r:8,vr:520,life:1,h});}
function spawnPop(x,y,txt,col,size){pops.push({x,y,txt,col,size,life:1});}
function spawnFloater(){const fromL=Math.random()<.5;
  floaters.push({x:fromL?-70:W+70,y:H*(.1+Math.random()*.6),
    vx:(fromL?1:-1)*(130+Math.random()*140),r:26+Math.random()*26,ph:Math.random()*7});}

/* ───────── 出現パターン ───────── */
function spawnRing(x,y,z,mv){ents.push({type:'ring',x,y,mx:x,z,rot:Math.random()*7,mv:mv||null,judged:false});}
function spawnRock(x,y,z){const vr=[];const n=8;for(let i=0;i<n;i++)vr.push(.7+Math.random()*.5);
  ents.push({type:'rock',x,y,z,r:.13+Math.random()*.09,rot:Math.random()*7,vrot:(Math.random()-.5)*3,vr,judged:false});}
function spawnStar(x,y,z){ents.push({type:'star',x,y,z,rot:Math.random()*7,ph:Math.random()*7,judged:false});}
function rnd(a,b){return a+Math.random()*(b-a);}
function spawnPattern(z){const r=Math.random();
  if(r<.42){const mv=state.dist>380&&Math.random()<.4?
      {amp:.22+Math.random()*.15,sp:1+Math.random()*1.4,ph:Math.random()*7}:null;
    spawnRing(rnd(-.5,.5),rnd(-.4,.4),z,mv);}
  else if(r<.6){const x=rnd(-.45,.45),y=rnd(-.35,.35);spawnRing(x,y,z);
    for(let i=0;i<2;i++){const a=Math.random()*Math.PI*2,d=RING_R+.3+Math.random()*.3;
      spawnRock(Math.max(-.7,Math.min(.7,x+Math.cos(a)*d)),Math.max(-.55,Math.min(.55,y+Math.sin(a)*d)),z+i*.5);}}
  else if(r<.75){const x0=rnd(-.5,.2),y0=rnd(-.4,.3);
    for(let i=0;i<5;i++)spawnStar(x0+i*.12,y0+Math.sin(i*1.1)*.22,z+i*.85);}
  else if(r<.92){const n=2+(Math.random()*2|0);
    for(let i=0;i<n;i++)spawnRock(rnd(-.6,.6),rnd(-.5,.5),z+i*.9);}
  else{const x=rnd(-.45,.45);spawnRing(x,rnd(-.35,.1),z);spawnRing(-x,rnd(-.1,.35),z+2.4);}}

/* ───────── 判定（z=0通過時） ───────── */
function cross(o){const d=Math.hypot(state.px-o.x,state.py-o.y);
  const [sx,sy]=toScreen(o.x,o.y,0);
  if(o.type==='ring'){
    if(d<PERF_R){
      state.combo++;state.maxCombo=Math.max(state.maxCombo,state.combo);
      const mult=Math.min(1+Math.floor(state.combo/5),9)*(state.fever>0?2:1);
      state.score+=150*mult;sfxPerfect(state.combo);vib(state.fever>0?[20,20,20]:15);
      state.shake=9;state.flash=.4;state.flashR=255;state.flashG=255;state.flashB=255;state.spin=.5;
      state.slow=Math.max(state.slow,.09);
      spawnWave(sx,sy,state.hue);spawnBurst(sx,sy,36+Math.min(state.combo*2,40),state.hue,4.5);
      spawnConfetti(sx,sy,14+Math.min(state.combo,20));
      spawnPop(sx,sy-90,'PERFECT','#7ad7ff',34);
      spawnPop(sx,sy-128,'×'+mult,'#ff8ac2',22);
      if(state.combo%10===0&&state.fever<=0){state.fever=8;sfxFever();vib([30,30,30,30,60]);
        state.slow=.3;state.flash=.7;state.flashR=255;state.flashG=215;state.flashB=110;
        spawnPop(W/2,H*.25,'WARP FEVER!!','#ffd76e',44);
        for(let i=0;i<5;i++)spawnWave(W/2,H*.45,i*70);
        spawnConfetti(W/2,H*.4,60);
        for(let i=0;i<7;i++)spawnFloater();}
    }else if(d<RING_R){
      state.combo++;state.maxCombo=Math.max(state.maxCombo,state.combo);
      state.score+=60*(state.fever>0?2:1);sfxGood();vib(8);state.shake=4;
      spawnBurst(sx,sy,14,140,2.5);spawnPop(sx,sy-90,'GOOD','#9fe88f',26);
    }else{
      if(state.combo>0)spawnPop(W/2,H*.3,'スカ…','#8899bb',22);
      state.combo=0;sfxWhiff();}
  }else if(o.type==='rock'){
    const hitR=PLAYER_R+o.r;
    if(d<hitR){
      if(state.fever>0){state.score+=80;sfxSmash();state.shake=6;
        spawnBurst(sx,sy,30,30,5);spawnPop(sx,sy-70,'クラッシュ! +80','#ffd76e',22);vib(12);}
      else if(state.inv<=0){
        state.hearts--;state.combo=0;state.inv=2;state.shake=20;state.slow=.25;
        state.flash=.6;state.flashR=255;state.flashG=60;state.flashB=80;
        sfxHit();vib([60,40,80]);spawnBurst(sx,sy,40,0,5);
        spawnPop(W/2,H*.35,'いたい…','#ff6b7a',30);
        if(state.hearts<=0){state.mode='dying';stopBgm();sfxOver();setTimeout(endGame,700);}}
    }else if(d<hitR+.17){
      state.score+=30;sfxGraze();spawnBurst(sx,sy,8,200,2);
      spawnPop(sx,sy-60,'スレスレ +30','#aadcff',18);}
  }else if(o.type==='star'){
    if(d<.3){const v=50*(state.fever>0?2:1);state.score+=v;sfxStar();vib(6);
      spawnBurst(sx,sy,12,50,2.5);spawnPop(sx,sy-60,'+'+v,'#ffd76e',20);}}}

/* ───────── 更新 ───────── */
function update(dt){state.t+=dt;
  state.hue=(state.hue+dt*(state.fever>0?180:24))%360;
  if(state.flash>0)state.flash=Math.max(0,state.flash-dt*2);
  if(state.shake>0){state.shake*=Math.pow(.001,dt);if(state.shake<.3)state.shake=0;}
  if(state.spin>0)state.spin=Math.max(0,state.spin-dt);
  // 星: 常時ワープ流し
  const sv=(state.mode==='play'||state.mode==='dying')?state.speed:3.5;
  for(const s of stars){s.z-=sv*dt*1.15;if(s.z<.15){s.z+=Z_FAR;s.x=(Math.random()*2-1)*1.7;s.y=(Math.random()*2-1)*1.7;}}
  for(const nb of nebs){nb.z-=sv*dt*.22;if(nb.z<1){nb.z=Z_FAR+4;
    nb.x=(Math.random()*2-1)*1.3;nb.y=(Math.random()*2-1)*.9;nb.h=180+Math.random()*160;}}
  planet.z-=sv*dt*.1;if(planet.z<2){planet.z=Z_FAR+8;
    planet.x=(Math.random()<.5?-1:1)*(.7+Math.random()*.5);planet.y=(Math.random()*2-1)*.5;}
  if(state.mode!=='play'&&state.mode!=='dying')return;
  // 操作: 指追従（しっとり吸い付くイージング）
  if(state.mode==='play'){
    if(keys.l)state.tx-=2.4*dt;if(keys.r)state.tx+=2.4*dt;
    if(keys.u)state.ty-=2.4*dt;if(keys.d)state.ty+=2.4*dt;
    state.tx=Math.max(-.72,Math.min(.72,state.tx));state.ty=Math.max(-.55,Math.min(.55,state.ty));
    const e=1-Math.exp(-14*dt);
    state.px+=(state.tx-state.px)*e;state.py+=(state.ty-state.py)*e;}
  if(state.inv>0)state.inv-=dt;
  if(state.fever>0){const was=state.fever;state.fever-=dt;
    if(state.fever>0&&was<=2&&Math.ceil(was*2)!==Math.ceil(state.fever*2))sfxTick();
    if(state.fever<=0){state.fever=0;spawnPop(W/2,H*.3,'フィーバー終了','#aab',20);}}
  // 速度＆距離
  const base=7.5+Math.min(state.dist/250,7);
  state.speed=base*(state.fever>0?1.4:1);
  state.dist+=state.speed*dt;
  // マイルストーン花火
  if(state.dist>=state.nextMile&&state.mode==='play'){
    spawnPop(W/2,H*.2,state.nextMile+'ly とうたつ！','#ffd76e',30);sfxMilestone();
    spawnConfetti(W/2,H*.25,40);spawnWave(W/2,H*.45,50);state.nextMile+=500;}
  // 出現
  if(state.mode==='play'){
    while(state.dist>=state.nextSpawn){spawnPattern(Z_FAR);
      state.nextSpawn+=Math.max(2.4,4.2-state.dist/800);}}
  // 仲間こっこ（フィーバー演出）
  for(let i=floaters.length-1;i>=0;i--){const f=floaters[i];f.x+=f.vx*dt;
    if(f.x<-90||f.x>W+90)floaters.splice(i,1);}
  // エンティティ前進＆判定
  for(let i=ents.length-1;i>=0;i--){const o=ents[i];
    o.z-=state.speed*dt;
    if(o.rot!==undefined)o.rot+=(o.vrot||1.2)*dt;
    if(o.type==='ring'&&o.mv&&o.z>0)
      o.x=Math.max(-.7,Math.min(.7,o.mx+Math.sin(state.t*o.mv.sp+o.mv.ph)*o.mv.amp));
    if(o.type==='star'&&state.fever>0&&o.z<4){const pull=Math.min(1,dt*5);
      o.x+=(state.px-o.x)*pull;o.y+=(state.py-o.y)*pull;}
    if(o.z<=0&&!o.judged){o.judged=true;if(state.mode==='play')cross(o);}
    if(o.z<-1.2)ents.splice(i,1);}}

/* ───────── 開始/終了 ───────── */
function startGame(){state.mode='play';state.score=0;state.combo=0;state.maxCombo=0;state.hearts=3;
  state.fever=0;state.dist=0;state.nextSpawn=6;state.nextMile=500;state.speed=7.5;
  state.px=0;state.py=0;state.tx=0;state.ty=0;state.inv=0;state.spin=0;state.shake=0;state.flash=0;state.slow=0;
  ents.length=0;parts.length=0;pops.length=0;waves.length=0;trail.length=0;floaters.length=0;
  document.getElementById('startOv').classList.add('hidden');
  document.getElementById('endOv').classList.add('hidden');
  audio();startBgm();}
function endGame(){state.mode='over';stopBgm();
  if(state.score>best){best=state.score;localStorage.setItem('warpBest',best);}
  const es=document.getElementById('endScore'),target=state.score,t0=performance.now();
  (function cu(n){const k=Math.min(1,(n-t0)/900);
    es.textContent=Math.round(target*(1-Math.pow(1-k,3)));
    if(k<1&&state.mode==='over')requestAnimationFrame(cu);})(t0);
  document.getElementById('endBest').textContent='BEST '+best;
  document.getElementById('endCombo').textContent='MAX COMBO '+state.maxCombo;
  document.getElementById('endDist').textContent='とんだ距離 '+Math.floor(state.dist)+'ly';
  document.getElementById('endOv').classList.remove('hidden');}

/* ───────── 入力 ───────── */
const keys={l:false,r:false,u:false,d:false};
let drag=null;
cv.addEventListener('pointerdown',e=>{e.preventDefault();audio();
  if(state.mode==='play'){drag={x:e.clientX,y:e.clientY};
    try{cv.setPointerCapture(e.pointerId);}catch(err){}}},{passive:false});
cv.addEventListener('pointermove',e=>{if(!drag||state.mode!=='play')return;e.preventDefault();
  const K=Math.min(W,H)*.55;
  state.tx+=(e.clientX-drag.x)/K*1.9;state.ty+=(e.clientY-drag.y)/K*1.9;
  state.tx=Math.max(-.72,Math.min(.72,state.tx));state.ty=Math.max(-.55,Math.min(.55,state.ty));
  drag={x:e.clientX,y:e.clientY};},{passive:false});
addEventListener('pointerup',()=>{drag=null;});
addEventListener('pointercancel',()=>{drag=null;});
addEventListener('keydown',e=>{
  if(e.code==='ArrowLeft'||e.code==='KeyA')keys.l=true;
  if(e.code==='ArrowRight'||e.code==='KeyD')keys.r=true;
  if(e.code==='ArrowUp'||e.code==='KeyW')keys.u=true;
  if(e.code==='ArrowDown'||e.code==='KeyS')keys.d=true;
  if(e.code==='Space'||e.code==='Enter'){e.preventDefault();
    if(state.mode==='title'||state.mode==='over')startGame();}});
addEventListener('keyup',e=>{
  if(e.code==='ArrowLeft'||e.code==='KeyA')keys.l=false;
  if(e.code==='ArrowRight'||e.code==='KeyD')keys.r=false;
  if(e.code==='ArrowUp'||e.code==='KeyW')keys.u=false;
  if(e.code==='ArrowDown'||e.code==='KeyS')keys.d=false;});
document.getElementById('startBtn').onclick=startGame;
document.getElementById('retryBtn').onclick=startGame;
document.getElementById('shareBtn').onclick=()=>{
  const txt='こっこワープで '+state.score+'点・'+Math.floor(state.dist)+'ly 飛んだ！ #畜物語 #こっこワープ';
  open('https://twitter.com/intent/tweet?text='+encodeURIComponent(txt)
    +'&url='+encodeURIComponent('https://chikumo.jp/warp/'),'_blank');};
document.getElementById('bestRow').textContent=best?('BEST '+best):'';
document.addEventListener('visibilitychange',()=>{if(!AC)return;
  if(document.hidden){if(AC.state==='running')AC.suspend();}
  else{AC.resume();bgmNext=AC.currentTime+.1;}});

/* ───────── 描画 ───────── */
function drawStarShape(c,x,y,r,rot){c.beginPath();
  for(let i=0;i<10;i++){const a=rot+i*Math.PI/5,rr=i%2?r*.45:r;
    if(i===0)c.moveTo(x+Math.cos(a)*rr,y+Math.sin(a)*rr);
    else c.lineTo(x+Math.cos(a)*rr,y+Math.sin(a)*rr);}c.closePath();}

function draw(dt){if(!W||!H)return;
  const fever=state.fever>0,cx2=W/2,cy2=H*.45,K=Math.min(W,H)*.55;
  // 深宇宙背景
  const g=cx.createLinearGradient(0,0,0,H);
  if(fever){g.addColorStop(0,`hsl(${state.hue},65%,15%)`);g.addColorStop(1,`hsl(${(state.hue+90)%360},70%,6%)`);}
  else{g.addColorStop(0,'#0a0a26');g.addColorStop(1,'#03030d');}
  cx.fillStyle=g;cx.fillRect(0,0,W,H);
  // 消失点グロー（奥行きの吸い込み）
  const vx=cx2-state.px*K*.12,vy=cy2-state.py*K*.1;
  const rg=cx.createRadialGradient(vx,vy,0,vx,vy,K*.9);
  rg.addColorStop(0,fever?`hsla(${state.hue},90%,65%,.4)`:'rgba(110,150,255,.22)');
  rg.addColorStop(.4,fever?`hsla(${(state.hue+60)%360},80%,50%,.12)`:'rgba(90,110,220,.07)');
  rg.addColorStop(1,'rgba(0,0,0,0)');
  cx.fillStyle=rg;cx.fillRect(0,0,W,H);
  // 星雲＆惑星（遠景パララックス — 宇宙の壮大さ）
  for(const nb of nebs){const p=persp(nb.z),x=vx+(nb.x-state.px*.4)*K*p,y=vy+(nb.y-state.py*.35)*K*p,r=nb.r*K*p*2.2;
    const ng=cx.createRadialGradient(x,y,0,x,y,Math.max(r,1));
    ng.addColorStop(0,`hsla(${(nb.h+(fever?state.hue:0))%360},80%,60%,${.16*Math.min(1,p*3)})`);
    ng.addColorStop(1,'rgba(0,0,0,0)');
    cx.fillStyle=ng;cx.fillRect(x-r,y-r,r*2,r*2);}
  {const p=persp(planet.z),x=vx+(planet.x-state.px*.5)*K*p,y=vy+(planet.y-state.py*.4)*K*p,r=planet.r*K*p;
   if(r>2){const pg=cx.createRadialGradient(x-r*.3,y-r*.3,r*.1,x,y,r);
    pg.addColorStop(0,'#9fd8ff');pg.addColorStop(.6,'#4466bb');pg.addColorStop(1,'#1a2150');
    cx.globalAlpha=Math.min(1,p*4);cx.fillStyle=pg;
    cx.beginPath();cx.arc(x,y,r,0,7);cx.fill();
    cx.strokeStyle='rgba(190,220,255,.5)';cx.lineWidth=Math.max(1,r*.08);
    cx.beginPath();cx.ellipse(x,y,r*1.6,r*.4,-.5,0,7);cx.stroke();cx.globalAlpha=1;}}
  cx.save();
  if(state.shake>0)cx.translate((Math.random()-.5)*state.shake,(Math.random()-.5)*state.shake);
  // トンネルリング（Z軸の奥行きを刻む）
  const SP=2.2,off=state.dist%SP;
  for(let i=13;i>=0;i--){const z=i*SP-off+SP;if(z<.05)continue;
    const p=persp(z),r=1.55*K*p;
    const [tx,ty]=toScreen(0,0,z);
    const a=Math.max(0,(1-z/(Z_FAR+4)))*(fever?.6:.34);
    cx.strokeStyle=fever?`hsla(${(state.hue+z*14)%360},90%,62%,${a})`:`hsla(${225+z*2},75%,58%,${a})`;
    cx.lineWidth=Math.max(1,4*p);
    cx.beginPath();cx.arc(tx,ty,r,0,7);cx.stroke();}
  // ワープ星流（スピード感の流線）
  for(const s of stars){const p2=persp(s.z),p1=persp(s.z+state.speed*.06+.4);
    const x1=vx+(s.x-state.px*.6)*K*p1,y1=vy+(s.y-state.py*.5)*K*p1;
    const x2=vx+(s.x-state.px*.6)*K*p2,y2=vy+(s.y-state.py*.5)*K*p2;
    const a=Math.min(1,p2*1.6);
    cx.strokeStyle=fever?`hsla(${(state.hue+s.z*22)%360},95%,72%,${a*.8})`:`rgba(200,220,255,${a*.55})`;
    cx.lineWidth=Math.max(.5,p2*2.4);
    cx.beginPath();cx.moveTo(x1,y1);cx.lineTo(x2,y2);cx.stroke();}
  // フィーバー放射スピードライン
  if(fever){cx.save();cx.globalAlpha=.14+.06*Math.sin(state.t*9);
    for(let i=0;i<10;i++){const a=state.t*1.7+i*Math.PI/5;
      cx.strokeStyle=`hsl(${(state.hue+i*36)%360},95%,65%)`;cx.lineWidth=3;
      cx.beginPath();cx.moveTo(vx+Math.cos(a)*K*.25,vy+Math.sin(a)*K*.25);
      cx.lineTo(vx+Math.cos(a)*K*1.6,vy+Math.sin(a)*K*1.6);cx.stroke();}
    cx.restore();}
  // くぐったリングが頭上を流れ去る（フライパス — Z軸の臨場感）
  for(const o of ents){if(o.type!=='ring'||o.z>0)continue;
    const fa=Math.max(0,1+o.z/1.2);if(fa<=0)continue;
    const [fsx,fsy,fp]=toScreen(o.x,o.y,o.z);
    cx.globalAlpha=fa*.55;
    cx.strokeStyle=fever?`hsl(${state.hue},100%,70%)`:'#ffd76e';
    cx.lineWidth=12*fp*fa+2;
    cx.beginPath();cx.arc(fsx,fsy,RING_R*K*fp,0,7);cx.stroke();cx.globalAlpha=1;}
  // エンティティ（奥→手前）
  const sorted=ents.slice().sort((a,b)=>b.z-a.z);
  for(const o of sorted){if(o.z<=0)continue;
    const [sx,sy,p]=toScreen(o.x,o.y,o.z);
    if(o.type==='ring'){const r=RING_R*K*p;
      const col=fever?`hsl(${(state.hue+o.z*16)%360},100%,68%)`:'#ffd76e';
      cx.globalAlpha=Math.min(1,p*2.2);
      cx.strokeStyle=col;cx.lineWidth=Math.max(2,9*p);cx.shadowColor=col;cx.shadowBlur=22*p;
      cx.beginPath();cx.arc(sx,sy,r,0,7);cx.stroke();cx.shadowBlur=0;
      // 回転スパークル
      cx.fillStyle='#fff';
      for(let i=0;i<4;i++){const a=o.rot+i*Math.PI/2;
        cx.beginPath();cx.arc(sx+Math.cos(a)*r,sy+Math.sin(a)*r,Math.max(1.5,4*p),0,7);cx.fill();}
      // 中心ガイド（PERFECTゾーン）— 照準が合うと緑に光って教えてくれる
      const aimed=o.z<6&&Math.hypot(state.px-o.x,state.py-o.y)<PERF_R;
      cx.strokeStyle=aimed?`rgba(140,255,200,${Math.min(1,.9*p+.3)})`:`rgba(255,255,255,${.35*p})`;
      cx.lineWidth=aimed?2.5:1.5;
      cx.beginPath();cx.arc(sx,sy,PERF_R*K*p,0,7);cx.stroke();
      if(aimed){cx.fillStyle=`rgba(140,255,200,${.5*p})`;
        cx.beginPath();cx.arc(sx,sy,Math.max(2,4*p),0,7);cx.fill();}
      cx.globalAlpha=1;
    }else if(o.type==='rock'){const r=o.r*K*p*2.2;
      cx.globalAlpha=Math.min(1,p*2.4);
      cx.save();cx.translate(sx,sy);cx.rotate(o.rot);
      cx.fillStyle=fever?'#3a2c55':'#2c2540';
      cx.strokeStyle='#ff5577';cx.lineWidth=Math.max(1,3*p);cx.shadowColor='#ff5577';cx.shadowBlur=14*p;
      cx.beginPath();
      for(let i=0;i<8;i++){const a=i*Math.PI/4,rr=r*o.vr[i];
        if(i===0)cx.moveTo(Math.cos(a)*rr,Math.sin(a)*rr);else cx.lineTo(Math.cos(a)*rr,Math.sin(a)*rr);}
      cx.closePath();cx.fill();cx.stroke();cx.shadowBlur=0;cx.restore();cx.globalAlpha=1;
    }else if(o.type==='star'){const r=Math.max(3,.1*K*p*2.2);
      const tw=.7+.3*Math.sin(state.t*6+o.ph);
      cx.globalAlpha=Math.min(1,p*2.4)*tw;
      cx.fillStyle='#ffd76e';cx.shadowColor='#ffd76e';cx.shadowBlur=16*p;
      drawStarShape(cx,sx,sy,r,o.rot);cx.fill();cx.shadowBlur=0;cx.globalAlpha=1;}}
  // 衝撃波
  for(let i=waves.length-1;i>=0;i--){const w=waves[i];w.r+=w.vr*dt;w.life-=dt*1.6;
    if(w.life<=0){waves.splice(i,1);continue;}
    cx.globalAlpha=w.life*.7;cx.strokeStyle=`hsl(${w.h%360},95%,70%)`;cx.lineWidth=5*w.life;
    cx.beginPath();cx.arc(w.x,w.y,w.r,0,7);cx.stroke();}
  cx.globalAlpha=1;
  // 仲間のこっこちゃんが横切る（フィーバー）
  if(coccoReady)for(const f of floaters){const yy=f.y+Math.sin(state.t*5+f.ph)*22;
    cx.save();cx.translate(f.x,yy);cx.rotate(Math.sin(state.t*6+f.ph)*.3+(f.vx>0?.15:-.15));
    cx.drawImage(cocco,-f.r/2,-f.r*.65,f.r,f.r*1.3);cx.restore();}
  // こっこちゃん本体（バンク＆スピン操縦）
  const psx=cx2+state.px*K*.35,psy=cy2+state.py*K*.3+Math.sin(state.t*3)*5;
  if(state.mode==='play'||state.mode==='dying'||state.mode==='over'){
    trail.push({x:psx,y:psy+K*.13,life:1,h:fever?state.hue:32});
    if(trail.length>34)trail.shift();}
  for(let i=0;i<trail.length;i++){const tr=trail[i];tr.life-=dt*1.8;
    if(tr.life<=0)continue;
    cx.globalAlpha=tr.life*.4*(i/trail.length);
    cx.fillStyle=fever?`hsl(${(tr.h+i*10)%360},95%,65%)`:`hsla(32,95%,62%,1)`;
    cx.beginPath();cx.arc(tr.x,tr.y+ (trail.length-i)*2.2,(4+i*.3)*tr.life,0,7);cx.fill();}
  cx.globalAlpha=1;
  if(coccoReady&&state.mode!=='title'){
    const blink=state.inv>0&&((state.t*10|0)%2===0);
    if(!blink){const sz=K*.42*(1+.04*Math.sin(state.t*(fever?12:5)));
      let rot=Math.max(-.5,Math.min(.5,(state.tx-state.px)*2.4))+Math.sin(state.t*2.2)*.04;
      if(state.spin>0)rot+=(0.5-state.spin)/0.5*Math.PI*2;
      cx.save();cx.translate(psx,psy);cx.rotate(rot);
      if(fever){cx.shadowColor=`hsl(${state.hue},100%,65%)`;cx.shadowBlur=42;}
      else{cx.shadowColor='rgba(140,180,255,.6)';cx.shadowBlur=16;}
      cx.drawImage(cocco,-sz/2,-sz/2*1.3,sz,sz*1.3);cx.restore();}}
  // パーティクル
  for(let i=parts.length-1;i>=0;i--){const p=parts[i];
    p.x+=p.vx;p.y+=p.vy;p.vy+=p.g;p.life-=dt*.95;
    if(p.life<=0){parts.splice(i,1);continue;}
    cx.globalAlpha=p.life;cx.fillStyle=`hsl(${p.h%360},95%,${58+p.life*22}%)`;
    if(p.sq){cx.save();cx.translate(p.x,p.y);cx.rotate(p.life*6);
      cx.fillRect(-p.r*p.life,-p.r*p.life*.6,p.r*2*p.life,p.r*1.2*p.life);cx.restore();}
    else{cx.beginPath();cx.arc(p.x,p.y,p.r*p.life,0,7);cx.fill();}}
  cx.globalAlpha=1;
  // 判定ポップ
  for(let i=pops.length-1;i>=0;i--){const p=pops[i];p.life-=dt*1.3;p.y-=dt*60;
    if(p.life<=0){pops.splice(i,1);continue;}
    cx.globalAlpha=Math.min(p.life*2,1);cx.font=`bold ${p.size}px sans-serif`;
    cx.textAlign='center';cx.fillStyle=p.col;cx.shadowColor=p.col;cx.shadowBlur=12;
    cx.fillText(p.txt,p.x,p.y);cx.shadowBlur=0;}
  cx.globalAlpha=1;cx.restore();
  // フラッシュ
  if(state.flash>0){cx.fillStyle=`rgba(${state.flashR},${state.flashG},${state.flashB},${state.flash*.5})`;
    cx.fillRect(0,0,W,H);}
  // HUD
  if(state.mode==='play'||state.mode==='dying'||state.mode==='over'){
    cx.textAlign='center';cx.fillStyle='#fff';cx.font='bold 30px sans-serif';
    cx.shadowColor='rgba(140,180,255,.85)';cx.shadowBlur=10;
    cx.fillText(state.score,W/2,H*.09);cx.shadowBlur=0;
    if(state.combo>1){cx.fillStyle=fever?`hsl(${state.hue},100%,75%)`:'#7ad7ff';
      cx.font=`bold ${20+Math.min(state.combo,30)}px sans-serif`;
      cx.fillText(state.combo+' COMBO',W/2,H*.15);}
    cx.font='bold 15px sans-serif';cx.textAlign='right';cx.fillStyle='#aadcff';
    cx.fillText(Math.floor(state.dist)+'ly',W-12,H*.06);
    if(fever){cx.textAlign='center';cx.fillStyle=`hsl(${state.hue},100%,70%)`;cx.font='bold 22px sans-serif';
      cx.fillText('★ WARP FEVER ★',W/2,H*.84);
      cx.fillStyle=`hsla(${state.hue},100%,70%,.85)`;
      cx.fillRect(W*.2,H*.865,W*.6*(state.fever/8),6);}
    cx.font='20px sans-serif';cx.textAlign='left';
    for(let i=0;i<3;i++)cx.fillText(i<state.hearts?'❤️':'🖤',12+i*26,H-18);
    if(state.mode==='play'&&state.dist<28){cx.globalAlpha=Math.min(1,(28-state.dist)/8);
      cx.textAlign='center';cx.fillStyle='#cdf';cx.font='16px sans-serif';
      cx.fillText('ゆびでスーッとなぞって操縦！',W/2,H*.76);cx.globalAlpha=1;}}}

/* ───────── ループ ───────── */
let last=performance.now();
function frame(now){const dt=Math.min((now-last)/1000,.05);last=now;
  // ヒットストップ: PERFECT/被弾/フィーバー突入の瞬間だけ時間がトロける
  let gdt=dt;
  if(state.slow>0){state.slow=Math.max(0,state.slow-dt);gdt=dt*.22;}
  update(gdt);bgmPump();draw(gdt);requestAnimationFrame(frame);}
requestAnimationFrame(frame);
window.__warp={state,ents,parts,pops,waves,floaters,startGame,endGame,update,
  spawnRing,spawnRock,spawnStar,spawnPattern,cross,getBest:()=>best};
</script>
</body>
</html>
