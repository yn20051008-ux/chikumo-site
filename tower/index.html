<script>
/* こっこ共通: ページを離れたら必ず音を止める（bfcache対策／全ゲーム共通の番人） */
(function(){
  var ctxs=[];
  var OrigAC=window.AudioContext||window.webkitAudioContext;
  if(OrigAC&&typeof Proxy!=='undefined'&&typeof Reflect!=='undefined'){
    var P=new Proxy(OrigAC,{construct:function(T,a,nt){
      var c=Reflect.construct(T,a,nt===P?T:nt);
      try{ctxs.push(c);}catch(e){}
      return c;
    }});
    try{window.AudioContext=P;}catch(e){}
    try{if(window.webkitAudioContext)window.webkitAudioContext=P;}catch(e){}
  }
  function kill(){for(var i=0;i<ctxs.length;i++){try{ctxs[i].suspend();}catch(e){}}}
  window.addEventListener('pagehide',kill);
})();
</script>

<script>
"use strict";
/* ───────── 公式こっこちゃんSVG ───────── */
const cocco=new Image();let coccoReady=false;
cocco.onload=()=>coccoReady=true;
cocco.src='/chikumo.svg';

const cv=document.getElementById('game'),cx=cv.getContext('2d');
let W=0,H=0,DPR=1;
function resize(){DPR=Math.min(devicePixelRatio||1,2);W=innerWidth;H=innerHeight;
  cv.width=W*DPR;cv.height=H*DPR;cv.style.width=W+'px';cv.style.height=H+'px';cx.setTransform(DPR,0,0,DPR,0,0);}
addEventListener('resize',resize);resize();

/* ───────── サウンド (WebAudio chiptune・全部その場生成) ───────── */
let AC=null,muted=false,bgmTimer=null,bgmStep=0;
const MASTER=0.5;
function audio(){if(!AC){AC=new (window.AudioContext||window.webkitAudioContext)();}if(AC.state==='suspended')AC.resume();return AC;}
function tone(f,t0,dur,type,vol,slide){const a=audio();const o=a.createOscillator(),g=a.createGain();
  o.type=type;o.frequency.setValueAtTime(f,t0);if(slide)o.frequency.exponentialRampToValueAtTime(slide,t0+dur);
  g.gain.setValueAtTime(vol*MASTER,t0);g.gain.exponentialRampToValueAtTime(.0001,t0+dur);
  o.connect(g).connect(a.destination);o.start(t0);o.stop(t0+dur+.02);}
function noise(t0,dur,vol,slideLP){const a=audio();const n=a.createBufferSource(),buf=a.createBuffer(1,a.sampleRate*dur,a.sampleRate);
  const d=buf.getChannelData(0);for(let i=0;i<d.length;i++)d[i]=(Math.random()*2-1)*(1-i/d.length);
  n.buffer=buf;const g=a.createGain();g.gain.value=vol*MASTER;
  const lp=a.createBiquadFilter();lp.type='lowpass';lp.frequency.setValueAtTime(slideLP?6000:3500,t0);
  if(slideLP)lp.frequency.exponentialRampToValueAtTime(400,t0+dur);
  n.connect(lp).connect(g).connect(a.destination);n.start(t0);}
/* 置いた瞬間の「コトッ」: 高さ/コンボでキーが上がる気持ちよさ */
function sfxDrop(step,fever){if(muted)return;const t=audio().currentTime;
  const base=196*Math.pow(1.0594631,Math.min(step,24))*(fever?1.5:1);
  tone(base,t,.09,'square',.14,base*.82);tone(base/2,t,.13,'triangle',.12);noise(t,.05,.05);}
/* PERFECT: キラッと上がるチャイム */
function sfxPerfect(combo,fever){if(muted)return;const t=audio().currentTime;
  const base=523.25*Math.pow(1.0594631,Math.min(combo,16))*(fever?1.5:1);
  tone(base,t,.12,'square',.16);tone(base*1.5,t+.05,.14,'square',.12);tone(base*2,t+.1,.22,'triangle',.16);noise(t,.05,.04);}
/* はみ出しスライス: シュッと下がるノイズ */
function sfxSlice(){if(muted)return;const t=audio().currentTime;noise(t,.22,.09,true);tone(330,t,.18,'sawtooth',.06,120);}
function sfxFever(){if(muted)return;const t=audio().currentTime;
  [523,659,784,1047,1319,1568].forEach((f,i)=>{tone(f,t+i*.07,.3,'square',.15);tone(f/2,t+i*.07,.3,'triangle',.1);});noise(t,.4,.1);}
function sfxMilestone(){if(muted)return;const t=audio().currentTime;
  [659,784,988,1319].forEach((f,i)=>tone(f,t+i*.06,.2,'square',.13));}
function sfxMiss(){if(muted)return;const t=audio().currentTime;tone(196,t,.4,'sawtooth',.16,70);noise(t,.5,.12,true);}
function sfxFirework(){if(muted)return;const t=audio().currentTime;noise(t,.3,.07);tone(1200+Math.random()*800,t,.2,'sine',.06,200);}
/* 中毒BGM: 8bitループ — fever中はテンポUP＆キーUP */
const BASS=[110,110,147,147,131,131,165,147], MEL=[
 392,0,523,392, 659,0,523,392, 440,523,392,330, 392,0,294,330,
 392,0,523,659, 698,0,659,523, 587,659,523,440, 523,440,392,0];
function bgmTick(){if(muted||!AC)return;const t=AC.currentTime;const fever=state.fever>0;
  const sp=fever?.108:.15;const k=fever?1.3348:1;
  const m=MEL[bgmStep%32];if(m)tone(m*k,t,sp*.9,'square',fever?.08:.055);
  if(bgmStep%2===0){tone(BASS[(bgmStep>>2)%8]*k,t,sp*1.8,'triangle',.085);}
  if(bgmStep%4===0)noise(t,.04,.022);
  if(fever&&bgmStep%4===2)tone(m?m*k*2:1047,t,sp,'square',.04);
  bgmStep++;clearTimeout(bgmTimer);bgmTimer=setTimeout(bgmTick,sp*1000);}
function startBgm(){bgmStep=0;clearTimeout(bgmTimer);bgmTick();}
document.getElementById('muteBtn').onclick=e=>{muted=!muted;e.target.textContent=muted?'🔇':'🔊';
  if(!muted&&state.playing)startBgm();};

/* ───────── ゲーム設定 ───────── */
const BH=42;                 // ブロック高さ(px)
const GROUND=120;            // 画面下の島土台ぶんの余白
const PERFECT_TOL=8;         // PERFECT判定の許容ズレ(px)
const REGROW=14;             // PERFECT時に土台が回復する幅
function maxW(){return Math.min(W*0.46,300);}

/* ───────── ゲーム状態 ───────── */
const state={playing:false,score:0,combo:0,maxCombo:0,fever:0,
  camY:0,camTarget:0,shake:0,flash:0,hue:0,t:0};
let best=+localStorage.getItem('towerBest')||0;
const blocks=[];          // 積まれたブロック {x,w,hue,gold}
let active=null;          // 流れてる最中のブロック {x,w,dir,speed,hue,gold,y}
const debris=[],parts=[],pops=[],floaters=[],stars=[];
for(let i=0;i<70;i++)stars.push({x:Math.random(),y:Math.random(),s:Math.random()*1.6+.4,p:Math.random()*7});

function blockHue(i){return (i*15)%360;}
/* worldBottom(i): ブロックiの下端のワールド高さ(地面=0で上が＋) */
function worldBottom(i){return i*BH;}
/* ワールド高さ→画面y(上端) */
function screenTop(wb){return H-GROUND-(wb+BH)+state.camY;}

function spawnActive(){const n=blocks.length;const prev=blocks[n-1];
  const w=prev.w;const fromLeft=(n%2===0);
  const speed=Math.min(2.2+n*0.05,7.5);
  const gold=(!state.fever&&n>3&&Math.random()<0.08);
  active={w,x:fromLeft?(W-maxW())/2-w-10:(W+maxW())/2+10,
    dir:fromLeft?1:-1,speed,hue:blockHue(n),gold,y:worldBottom(n)};
}
function newGame(){state.playing=true;state.score=0;state.combo=0;state.maxCombo=0;state.fever=0;
  state.camY=0;state.camTarget=0;state.shake=0;state.flash=0;
  blocks.length=0;debris.length=0;parts.length=0;pops.length=0;floaters.length=0;
  const bw=maxW();blocks.push({x:(W-bw)/2,w:bw,hue:blockHue(0),gold:false}); // 島の上の土台
  spawnActive();
  document.getElementById('startOv').classList.add('hidden');
  document.getElementById('endOv').classList.add('hidden');
  audio();startBgm();}
function endGame(toppled){state.playing=false;clearTimeout(bgmTimer);
  const h=blocks.length-1;
  if(h>best){best=h;localStorage.setItem('towerBest',best);}
  document.getElementById('endTitle').textContent=toppled?'タワー崩壊…':'おしまい';
  document.getElementById('endScore').textContent=h;
  document.getElementById('endBest').textContent='BEST '+best+(h>=best&&h>0?'　★自己ベスト更新！':'');
  document.getElementById('endCombo').textContent='MAX COMBO '+state.maxCombo;
  document.getElementById('endOv').classList.remove('hidden');}

function spawnBurst(x,y,n,hueBase,pw){for(let i=0;i<n;i++){const a=Math.random()*Math.PI*2,v=(Math.random()*.6+.4)*pw;
  parts.push({x,y,vx:Math.cos(a)*v,vy:Math.sin(a)*v-1.5,life:1,h:hueBase+Math.random()*60,r:Math.random()*4+2,g:.06});}}
function spawnFirework(){const x=W*(0.15+Math.random()*0.7),y=H*(0.1+Math.random()*0.35);
  sfxFirework();const h=Math.random()*360;
  for(let i=0;i<44;i++){const a=i/44*Math.PI*2,v=Math.random()*3+2.4;
    parts.push({x,y,vx:Math.cos(a)*v,vy:Math.sin(a)*v,life:1,h:h+Math.random()*40,r:3,g:.04,trail:true});}}
function spawnPop(x,y,txt,col,size){pops.push({x,y,txt,col,size,life:1});}
function spawnFloater(){const f={x:Math.random()<.5?-60:W+60,y:H*.12+Math.random()*H*.5,
  r:22+Math.random()*20,sp:1+Math.random()*1.6,ph:Math.random()*7};f.vx=f.x<0?f.sp:-f.sp;floaters.push(f);}
function addDebris(x,w,worldB,vx){debris.push({x,w,y:screenTop(worldB),vy:-1.5,vx,rot:0,
  vr:(Math.random()-.5)*0.3+(vx>0?.18:-.18),hue:active?active.hue:0,gold:active&&active.gold,life:1.4});}

/* ───────── ドロップ(タップ) ───────── */
function drop(){if(!state.playing||!active)return;
  const n=blocks.length;const prev=blocks[n-1];
  const aL=active.x,aR=active.x+active.w,pL=prev.x,pR=prev.x+prev.w;
  const ovL=Math.max(aL,pL),ovR=Math.min(aR,pR),overlap=ovR-ovL;
  const cx0=W/2,topScrY=screenTop(active.y);
  if(overlap<=0.5){ // 完全にはみ出し → 崩壊
    state.combo=0;sfxMiss();state.shake=20;
    addDebris(active.x,active.w,active.y,active.dir*4);
    spawnPop(cx0,topScrY-30,'MISS…','#ff6b7a',30);
    if(navigator.vibrate)navigator.vibrate([60,40,80]);
    active=null;setTimeout(()=>endGame(true),650);return;}
  const off=Math.abs(active.x-prev.x);
  const feverOn=state.fever>0;
  const perfect=off<=(feverOn?PERFECT_TOL+4:PERFECT_TOL);
  // はみ出し片を debris に
  if(!perfect){
    if(aL<pL)addDebris(aL,pL-aL,active.y,-3-Math.random());
    if(aR>pR)addDebris(pR,aR-pR,active.y,3+Math.random());
    sfxSlice();}
  let nx,nw;
  if(perfect){
    nw=Math.min(prev.w+REGROW,maxW());nx=prev.x-(nw-prev.w)/2;
    nx=Math.max(0,Math.min(nx,W-nw));
    state.combo++;state.maxCombo=Math.max(state.maxCombo,state.combo);
    const mult=Math.min(1+Math.floor(state.combo/3),8)*(feverOn?2:1);
    state.score+=10*mult;
    sfxPerfect(state.combo,feverOn);
    state.flash=.45;state.shake=8;
    if(navigator.vibrate)navigator.vibrate(feverOn?[18,18,18]:14);
    spawnBurst(cx0,topScrY+BH/2,30+state.combo*2,active.hue,3.4);
    spawnPop(cx0,topScrY-24,'PERFECT',feverOn?'#fff':'#ffd76e',30);
    if(mult>1)spawnPop(cx0,topScrY-58,'×'+mult,'#ff8ac2',22);
    if(state.combo>0&&state.combo%5===0&&!feverOn){state.fever=6;sfxFever();
      spawnPop(cx0,H*.3,'FEVER!!','#7ad7ff',46);
      for(let i=0;i<5;i++)setTimeout(spawnFirework,i*170);
      for(let i=0;i<8;i++)spawnFloater();}
  }else{
    nw=overlap;nx=ovL;state.combo=0;
    state.score+=Math.max(1,Math.round(active.gold?4:2));
    sfxDrop(n,feverOn);state.shake=5;
    if(navigator.vibrate)navigator.vibrate(10);
    spawnBurst(ovL+nw/2,topScrY+BH/2,8,active.hue,1.8);}
  if(active.gold){state.score+=6;spawnPop(cx0,topScrY-58,'GOLD +6','#ffd76e',20);
    spawnBurst(cx0,topScrY+BH/2,18,46,2.6);}
  blocks.push({x:nx,w:nw,hue:active.hue,gold:active.gold});
  // 高さマイルストーン
  const h=blocks.length-1;
  if(h>0&&h%10===0){sfxMilestone();spawnPop(cx0,topScrY-92,h+'mとうたつ！','#9fe8a0',26);
    state.flash=Math.max(state.flash,.4);for(let i=0;i<4;i++)spawnFloater();}
  // 細くなりすぎたら崩壊（次が置けない）
  if(nw<10){active=null;sfxMiss();state.shake=16;
    spawnPop(cx0,topScrY-30,'グラッ…','#ff9f6b',26);
    setTimeout(()=>endGame(true),600);return;}
  // カメラ目標を更新して次のブロックへ
  state.camTarget=Math.max(0,worldBottom(blocks.length)-(0.42*H-GROUND));
  spawnActive();}

cv.addEventListener('pointerdown',e=>{e.preventDefault();drop();},{passive:false});
addEventListener('keydown',e=>{if(e.code==='Space'||e.code==='Enter'){e.preventDefault();
  if(state.playing)drop();}});
document.getElementById('startBtn').onclick=newGame;
document.getElementById('retryBtn').onclick=newGame;
document.getElementById('bestRow').textContent=best?('BEST '+best+'m'):'';

/* ───────── 描画ループ ───────── */
let last=performance.now();
function frame(now){const dt=Math.min((now-last)/1000,.05);last=now;state.t+=dt;
  state.hue=(state.hue+dt*(state.fever>0?150:26))%360;
  // カメラ追従
  state.camY+=(state.camTarget-state.camY)*Math.min(dt*6,1);
  // 流れるブロック移動
  if(state.playing&&active){active.x+=active.dir*active.speed*(state.fever>0?1.18:1);
    const lo=(W-maxW())/2-active.w-20,hi=(W+maxW())/2+20;
    if(active.x<lo){active.x=lo;active.dir=1;}else if(active.x>hi){active.x=hi;active.dir=-1;}}
  // fever
  if(state.fever>0){state.fever-=dt;if(state.fever<0)state.fever=0;
    if(Math.random()<dt*1.6)spawnFirework();}
  draw(dt);requestAnimationFrame(frame);}

function skyTheme(prog){ // prog: 高さ進行 0..∞ をテーマに
  const themes=[
    ['#0b1030','#16204e'], // 夜明け前
    ['#1b3a6b','#7db6e8'], // 青空
    ['#244a8a','#bfe0f5'], // 高空
    ['#6b3a8a','#ff9e6b'], // 夕焼け
    ['#2a1b4e','#7a3a8a'], // 宵
    ['#0a0a2a','#22245a'], // 星空
  ];
  const seg=8; // 8段ごとにテーマ遷移
  const f=prog/seg;const i=Math.floor(f)%themes.length;const j=(i+1)%themes.length;const tt=f-Math.floor(f);
  const lerp=(a,b)=>{const pa=parseInt(a.slice(1),16),pb=parseInt(b.slice(1),16);
    const r=Math.round(((pa>>16)&255)*(1-tt)+((pb>>16)&255)*tt);
    const g=Math.round(((pa>>8)&255)*(1-tt)+((pb>>8)&255)*tt);
    const bl=Math.round((pa&255)*(1-tt)+(pb&255)*tt);
    return `rgb(${r},${g},${bl})`;};
  return [lerp(themes[i][0],themes[j][0]),lerp(themes[i][1],themes[j][1])];}

function drawCocco(scrX,scrY,w,glow,rot){
  if(!coccoReady)return;const sz=w*0.78;const cw=sz,ch=sz*1.3;
  cx.save();cx.translate(scrX,scrY-ch*0.5+2);if(rot)cx.rotate(rot);
  if(glow){cx.shadowColor=glow;cx.shadowBlur=22;}
  cx.drawImage(cocco,-cw/2,-ch/2,cw,ch);cx.restore();}

function roundRect(x,y,w,h,r){cx.beginPath();cx.moveTo(x+r,y);cx.arcTo(x+w,y,x+w,y+h,r);
  cx.arcTo(x+w,y+h,x,y+h,r);cx.arcTo(x,y+h,x,y,r);cx.arcTo(x,y,x+w,y,r);cx.closePath();}

function drawBlock(b,i,fever){
  const wb=worldBottom(i),sy=screenTop(wb);
  if(sy>H+BH||sy<-BH*2)return;
  const hue=fever?(state.hue+i*30)%360:b.hue;
  const top=b.gold?`hsl(46,95%,72%)`:`hsl(${hue},70%,72%)`;
  const bot=b.gold?`hsl(40,90%,52%)`:`hsl(${hue},65%,52%)`;
  const g=cx.createLinearGradient(0,sy,0,sy+BH);g.addColorStop(0,top);g.addColorStop(1,bot);
  cx.fillStyle=g;
  if(b.gold||fever){cx.shadowColor=b.gold?'rgba(255,210,90,.8)':`hsla(${hue},90%,65%,.7)`;cx.shadowBlur=18;}
  roundRect(b.x,sy,b.w,BH,9);cx.fill();cx.shadowBlur=0;
  // ふち
  cx.strokeStyle='rgba(255,255,255,.35)';cx.lineWidth=1.5;roundRect(b.x+1,sy+1,b.w-2,BH-2,8);cx.stroke();
  drawCocco(b.x+b.w/2,sy+BH,b.w,(b.gold?'#ffd76e':(fever?`hsl(${hue},100%,70%)`:null)),0);}

function draw(dt){
  const fever=state.fever>0;
  const prog=blocks.length?blocks.length:0;
  const[c0,c1]=skyTheme(prog);
  const g=cx.createLinearGradient(0,0,0,H);g.addColorStop(0,c0);g.addColorStop(1,c1);
  cx.fillStyle=g;cx.fillRect(0,0,W,H);
  // 星(高いほど見える)
  const starA=Math.min(0.05+prog/40,0.7)+(fever?.2:0);
  stars.forEach(s=>{const tw=.5+.5*Math.sin(state.t*2+s.p);
    cx.fillStyle=`rgba(255,255,255,${starA*tw})`;
    cx.beginPath();cx.arc(s.x*W,s.y*H,s.s*(fever?1.5:1),0,7);cx.fill();});
  // fever虹オーラ
  if(fever){cx.save();cx.globalAlpha=.12+.06*Math.sin(state.t*8);
    for(let i=0;i<5;i++){cx.strokeStyle=`hsl(${(state.hue+i*70)%360},90%,60%)`;cx.lineWidth=20;
      cx.beginPath();cx.arc(W/2,H*.4,160+i*44+Math.sin(state.t*4+i)*12,0,7);cx.stroke();}cx.restore();}
  // 背景の飛ぶこっこ
  for(let i=floaters.length-1;i>=0;i--){const f=floaters[i];f.x+=f.vx;
    const yy=f.y+Math.sin(state.t*4+f.ph)*16;
    cx.globalAlpha=.5;
    if(coccoReady){cx.save();cx.translate(f.x,yy);cx.rotate(Math.sin(state.t*5+f.ph)*.3);
      cx.drawImage(cocco,-f.r/2,-f.r*.65,f.r,f.r*1.3);cx.restore();}
    cx.globalAlpha=1;if(f.x<-90||f.x>W+90)floaters.splice(i,1);}

  cx.save();
  if(state.shake>0){state.shake*=Math.pow(.0015,dt);if(state.shake<.3)state.shake=0;
    cx.translate((Math.random()-.5)*state.shake,(Math.random()-.5)*state.shake);}

  // 島の土台(海＋島)
  const islandY=H-GROUND+state.camY;
  if(islandY<H+60){
    const wg=cx.createLinearGradient(0,islandY,0,H);wg.addColorStop(0,'#2a9fd6');wg.addColorStop(1,'#0d4f7a');
    cx.fillStyle=wg;cx.fillRect(0,islandY,W,H-islandY+60);
    cx.fillStyle='#6fcf5f';roundRect(W/2-maxW()/2-26,islandY-14,maxW()+52,34,16);cx.fill();
    cx.fillStyle='#e9d8a6';roundRect(W/2-maxW()/2-10,islandY-2,maxW()+20,18,8);cx.fill();
    cx.font='22px sans-serif';cx.textAlign='center';
    cx.fillText('🌴',W/2-maxW()/2+6,islandY-8);cx.fillText('🌺',W/2+maxW()/2-6,islandY-8);}

  // 積まれたブロック(見える範囲のみ)
  for(let i=0;i<blocks.length;i++)drawBlock(blocks[i],i,fever);

  // 流れてるブロック＋落下ガイド線
  if(state.playing&&active){const sy=screenTop(active.y);
    const prev=blocks[blocks.length-1];
    // ガイド: 真下の土台のエッジ
    cx.strokeStyle='rgba(255,255,255,.22)';cx.lineWidth=2;cx.setLineDash([6,8]);
    cx.beginPath();cx.moveTo(prev.x,sy);cx.lineTo(prev.x,sy+BH+40);
    cx.moveTo(prev.x+prev.w,sy);cx.lineTo(prev.x+prev.w,sy+BH+40);cx.stroke();cx.setLineDash([]);
    // ブロック本体
    const ab={x:active.x,w:active.w,hue:active.hue,gold:active.gold};
    const hue=fever?(state.hue)%360:ab.hue;
    const top=ab.gold?'hsl(46,95%,74%)':`hsl(${hue},75%,74%)`,bot=ab.gold?'hsl(40,90%,54%)':`hsl(${hue},70%,54%)`;
    const gg=cx.createLinearGradient(0,sy,0,sy+BH);gg.addColorStop(0,top);gg.addColorStop(1,bot);
    cx.fillStyle=gg;cx.shadowColor=ab.gold?'rgba(255,210,90,.9)':`hsla(${hue},90%,65%,.6)`;cx.shadowBlur=16;
    roundRect(ab.x,sy,ab.w,BH,9);cx.fill();cx.shadowBlur=0;
    cx.strokeStyle='rgba(255,255,255,.4)';cx.lineWidth=1.5;roundRect(ab.x+1,sy+1,ab.w-2,BH-2,8);cx.stroke();
    drawCocco(ab.x+ab.w/2,sy+BH,ab.w,(ab.gold?'#ffd76e':null),Math.sin(state.t*8)*.06);}

  // 落下する破片
  for(let i=debris.length-1;i>=0;i--){const d=debris[i];d.vy+=18*dt;d.y+=d.vy;d.x+=d.vx;d.rot+=d.vr;d.life-=dt;
    if(d.y>H+80||d.life<=0){debris.splice(i,1);continue;}
    cx.save();cx.translate(d.x+d.w/2,d.y+BH/2);cx.rotate(d.rot);cx.globalAlpha=Math.min(d.life,1);
    cx.fillStyle=d.gold?'hsl(43,90%,60%)':`hsl(${d.hue},65%,60%)`;
    roundRect(-d.w/2,-BH/2,d.w,BH,8);cx.fill();cx.restore();cx.globalAlpha=1;}

  // パーティクル
  for(let i=parts.length-1;i>=0;i--){const p=parts[i];p.x+=p.vx;p.y+=p.vy;p.vy+=p.g;p.life-=dt*.9;
    if(p.life<=0){parts.splice(i,1);continue;}
    cx.globalAlpha=p.life;cx.fillStyle=`hsl(${p.h},95%,${60+p.life*20}%)`;
    cx.beginPath();cx.arc(p.x,p.y,p.r*p.life,0,7);cx.fill();
    if(p.trail&&Math.random()<.3){cx.globalAlpha=p.life*.4;
      cx.beginPath();cx.arc(p.x-p.vx*2,p.y-p.vy*2,p.r*.5,0,7);cx.fill();}}
  cx.globalAlpha=1;

  // 判定ポップ
  for(let i=pops.length-1;i>=0;i--){const p=pops[i];p.life-=dt*1.3;p.y-=dt*54;
    if(p.life<=0){pops.splice(i,1);continue;}
    cx.globalAlpha=Math.min(p.life*2,1);cx.font=`bold ${p.size}px sans-serif`;cx.textAlign='center';
    cx.fillStyle=p.col;cx.shadowColor=p.col;cx.shadowBlur=12;cx.fillText(p.txt,p.x,p.y);cx.shadowBlur=0;}
  cx.globalAlpha=1;cx.restore();

  // フラッシュ
  if(state.flash>0){state.flash-=dt*2;cx.fillStyle=`rgba(255,255,255,${Math.max(state.flash,0)*.5})`;cx.fillRect(0,0,W,H);}

  // HUD
  if(state.playing||state.score>0){
    const h=blocks.length-1;
    cx.textAlign='center';cx.fillStyle='#fff';cx.font='bold 40px sans-serif';
    cx.shadowColor='rgba(120,200,255,.85)';cx.shadowBlur=12;
    cx.fillText(h+'m',W/2,H*.12);cx.shadowBlur=0;
    cx.fillStyle='#9fb3d8';cx.font='12px sans-serif';cx.fillText('SCORE '+state.score+'　BEST '+best+'m',W/2,H*.12+22);
    if(state.combo>1){cx.fillStyle=fever?`hsl(${state.hue},100%,75%)`:'#ffd76e';
      cx.font=`bold ${18+Math.min(state.combo,28)}px sans-serif`;
      cx.fillText(state.combo+' PERFECT',W/2,H*.18+14);}
    if(fever){cx.fillStyle=`hsl(${state.hue},100%,70%)`;cx.font='bold 22px sans-serif';
      cx.fillText('★ FEVER ★',W/2,H*.86);
      cx.fillStyle=`hsla(${state.hue},100%,70%,.85)`;cx.fillRect(W*.2,H*.88,W*.6*(state.fever/6),6);}}
}
requestAnimationFrame(frame);
window.__tower={state,blocks,drop,newGame,endGame,getBest:()=>best};
</script>

<script>
/* 強制更新🔄ボタン（タイトル/ホーム画面のみ）：キャッシュ削除＋ServiceWorker解除＋キャッシュバスターで最新版を取得。セーブ(localStorage)は消えません。 */
(function(){
  if(document.getElementById('reloadBtn')) return;
  var host=document.querySelector('#titleScreen,#startOv,#title');
  if(!host) return;
  var css='.reload-btn{position:fixed;right:calc(14px + env(safe-area-inset-right));bottom:calc(14px + env(safe-area-inset-bottom));width:54px;height:54px;z-index:60;display:flex;align-items:center;justify-content:center;border-radius:50%;padding:0;cursor:pointer;background:radial-gradient(circle at 50% 38%,rgba(40,46,60,.88),rgba(10,12,20,.85));border:1px solid rgba(180,200,255,.5);box-shadow:0 4px 16px rgba(0,0,0,.5),0 0 14px rgba(150,180,255,.25);-webkit-backdrop-filter:blur(6px);backdrop-filter:blur(6px);animation:reload-bob 3s ease-in-out infinite;transition:box-shadow .2s,transform .15s;}'
    +'.reload-btn img{width:34px;height:34px;pointer-events:none;filter:drop-shadow(0 1px 4px rgba(255,200,120,.5));}'
    +'.reload-btn::after{content:"↻";position:absolute;right:-2px;bottom:-2px;width:20px;height:20px;border-radius:50%;background:linear-gradient(180deg,#ffe08a,#ff9e5b);color:#2a1605;font-size:13px;font-weight:700;display:flex;align-items:center;justify-content:center;box-shadow:0 1px 5px rgba(0,0,0,.45);}'
    +'.reload-btn:hover,.reload-btn:focus-visible{box-shadow:0 6px 20px rgba(0,0,0,.55),0 0 20px rgba(150,180,255,.45);border-color:rgba(210,225,255,.9);}'
    +'.reload-btn:active{transform:scale(.92);}'
    +'.reload-btn.spinning{animation:reload-spin .7s linear infinite;}.reload-btn.spinning img{opacity:.85;}'
    +'@keyframes reload-bob{0%,100%{transform:translateY(0);}50%{transform:translateY(-5px);}}'
    +'@keyframes reload-spin{to{transform:rotate(360deg);}}'
    +'@media (prefers-reduced-motion:reduce){.reload-btn{animation:none;}}';
  var st=document.createElement('style'); st.textContent=css; document.head.appendChild(st);
  var btn=document.createElement('button');
  btn.type='button'; btn.id='reloadBtn'; btn.className='reload-btn';
  btn.setAttribute('aria-label','さいしんに更新（強制リロード）'); btn.title='さいしんに更新';
  btn.innerHTML='<img src="/chikumo.svg" alt="" width="34" height="34">';
  host.appendChild(btn);
  var busy=false;
  btn.addEventListener('click', function(){
    if(busy) return; busy=true; btn.classList.add('spinning');
    var done=false;
    function go(){ if(done) return; done=true; var u=location.pathname+'?r='+Date.now()+(location.hash||''); try{location.replace(u);}catch(e){location.href=u;} }
    var tasks=[];
    try{ if(window.caches&&caches.keys) tasks.push(caches.keys().then(function(ks){return Promise.all(ks.map(function(k){return caches.delete(k);}));})); }catch(e){}
    try{ if(navigator.serviceWorker&&navigator.serviceWorker.getRegistrations) tasks.push(navigator.serviceWorker.getRegistrations().then(function(rs){return Promise.all(rs.map(function(r){return r.unregister();}));})); }catch(e){}
    if(tasks.length){ Promise.all(tasks).then(go).catch(go); setTimeout(go,1500); } else go();
  });
})();
</script>
