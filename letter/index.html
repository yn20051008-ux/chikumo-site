/* Firebase SDK 非同期ローダー：描画を止めずに順番に読み込む（低帯域でもゲームは即開始）。
   読込失敗時は時間をおいて/回線復帰(online)で自動再試行 → 遅れてでもランキングを生かす */
(function(){
  var base='https://www.gstatic.com/firebasejs/9.23.0/';
  var files=['firebase-app-compat.js','firebase-database-compat.js','firebase-auth-compat.js'];
  var next=0, busy=false, fails=0;
  function load(){
    if(busy||next>=files.length) return;
    busy=true;
    var s=document.createElement('script');
    s.src=base+files[next]; s.async=true;
    s.onload=function(){ busy=false; fails=0; next++; load(); };
    s.onerror=function(){ busy=false; if(s.parentNode) s.parentNode.removeChild(s);
      setTimeout(load, Math.min(60000, 3000*Math.pow(2,fails++))); };
    (document.head||document.documentElement).appendChild(s);
  }
  window.addEventListener('online', load);
  load();
})();
</script>

  function pinnedKey(){ try{ return localStorage.getItem(LKEY)||''; }catch(e){ return ''; } }
  function pinKey(k){ if(!k)return; try{ localStorage.setItem(LKEY,k); }catch(e){} }
  function letterKey(){ return pinnedKey() || myUid || localUid(); }

  function render(rows){
    var el=$('letterList'), me=letterKey();
    /* 表示側でもNGを弾く：送信時フィルタは端末側のみなので、
       フィルタ導入前に保存された手紙や、すり抜けた手紙を みんなの目に触れさせない */
    rows=rows.filter(function(r){ return !isNG(r.name||'') && !isNG(r.msg||''); });
    if(!rows.length){ el.innerHTML='<li class="empty">まだ手紙がありません。さいしょの ひとことを どうぞ ✉️</li>'; $('letterCount').textContent=''; return; }
    $('letterCount').textContent=rows.length+' 通';
    el.innerHTML=rows.map(function(r){
      return '<li class="'+(r.uid===me?'mine':'')+'">'
        +'<div class="lt-top"><span class="lt-flag">'+esc(r.flag||'🏳️')+'</span>'
        +'<span class="lt-name">'+esc(r.name||'ななし')+'</span>'
        +'<span class="lt-time">'+relTime(r.ts||0)+'</span></div>'
        +'<div class="lt-msg">'+esc(r.msg||'')+'</div></li>';
    }).join('');
  }
  function load(){
    if(!ready){
      /* Firebase SDKは非同期読込のため、ページ読み込み直後はまだ ready=false なのが通常。
         即座に「オフライン」と決めつけず、SDKの読込を待って再試行する（約20秒） */
      var n=load._n=(load._n||0)+1;
      if(n>40){ $('letterList').innerHTML='<li class="empty">オフラインのため 読み込めません</li>'; return; }
      setTimeout(load,500);
      return;
    }
    load._n=0;
    ref.orderByChild('ts').limitToLast(500).once('value').then(function(snap){
      var rows=[]; snap.forEach(function(c){ var v=c.val()||{}; rows.push({uid:c.key,flag:v.flag,name:v.name,msg:v.msg,ts:+v.ts||0}); });
      rows.sort(function(a,b){return b.ts-a.ts;}); render(rows);
    }).catch(function(){ $('letterList').innerHTML='<li class="empty">読み込めませんでした（接続を確認）</li>'; });
  }
  function fillMine(v){
    if(v.name&&!$('nameInput').value) $('nameInput').value=v.name;
    if(v.flag) setFlag(v.flag);
    if(v.msg&&!$('msgInput').value){ $('msgInput').value=v.msg; upd(); }
    $('stat').textContent='あなたの手紙は とどいています（書きかえOK）';
  }
  /* 自分の手紙を ピン→認証uid→端末ID の順で探し、見つかった保存キーを固定する。
     これで 過去に別キーで保存した手紙も ちゃんと拾って 同じ場所を上書きできる。 */
  function loadMine(){
    if(!ready) return;
    var seen={}, cands=[pinnedKey(), myUid, localUid()].filter(function(k){ if(!k||seen[k])return false; seen[k]=1; return true; });
    (function tryNext(i){
      if(i>=cands.length) return;
      var k=cands[i];
      ref.child(k).once('value').then(function(s){ var v=s.val();
        if(v){ fillMine(v); pinKey(k); } else tryNext(i+1);
      }).catch(function(){ tryNext(i+1); });
    })(0);
  }

  function send(){
    var stat=$('stat'), btn=$('sendBtn');
    if(!ready){ stat.textContent='いまは おくれません（オフライン）'; return; }
    if(!myUid && !authDone){ stat.textContent='せつぞく中…数秒後に もう一度'; return; }
    var name=($('nameInput').value||'').replace(/\s+/g,' ').trim().slice(0,12) || 'ななしの こっこ';
    var msg=Array.from(($('msgInput').value||'').trim()).slice(0,100).join('');
    if(!msg){ stat.textContent='ひとこと 書いてね ✍️'; return; }
    if(isNG(name)||isNG(msg)){ stat.textContent='おくれませんでした…🙏 やさしい ことばで おねがいします'; return; }
    var now=Date.now(); if(now-lastTs<1500) return; lastTs=now;
    try{ localStorage.setItem(NAME_KEY,name); localStorage.setItem(FLAG_KEY,selFlag); }catch(e){}
    btn.disabled=true; stat.textContent='おくっています…';
    var k=letterKey();                       // ピン留め済みなら 必ず同じ場所を上書き
    ref.child(k).set({ flag:selFlag, name:name, msg:msg, ts:now })
      .then(function(){ pinKey(k); stat.textContent='とどけました！ ありがとう 💛'; btn.disabled=false; load(); })
      .catch(function(){ stat.textContent='おくれませんでした（接続を確認）'; btn.disabled=false; });
  }
  $('sendBtn').addEventListener('click',send);

  load();
  loadMine();   // 認証を待たずに（ピン/端末ID）自分の手紙を読み込む。認証後にも再度よばれる
})();
</script>
<script>
/* 強制更新🔄ボタン（ホーム画面・右下／全ゲーム共通の決め事＝遊戯学）：キャッシュ削除＋ServiceWorker解除＋キャッシュバスターで最新版を取得。セーブ(localStorage)は消えません。 */
(function(){
  if(document.getElementById('reloadBtn')) return;
  var host=document.querySelector('#titleScreen,#startOv,#title,#ovTitle')||document.body;
  var css='.reload-btn{position:fixed;right:calc(14px + env(safe-area-inset-right));bottom:calc(14px + env(safe-area-inset-bottom));width:54px;height:54px;z-index:60;display:flex;align-items:center;justify-content:center;border-radius:50%;padding:0;cursor:pointer;background:radial-gradient(circle at 50% 38%,rgba(40,46,60,.88),rgba(10,12,20,.85));border:1px solid rgba(180,200,255,.5);box-shadow:0 4px 16px rgba(0,0,0,.5),0 0 14px rgba(150,180,255,.25);-webkit-backdrop-filter:blur(6px);backdrop-filter:blur(6px);animation:reload-bob 3s ease-in-out infinite;transition:box-shadow .2s,transform .15s;}'
    +'.reload-btn img{width:34px;height:34px;pointer-events:none;filter:drop-shadow(0 1px 4px rgba(255,200,120,.5));}'
    +'.reload-btn::after{content:"↻";position:absolute;right:-2px;bottom:-2px;width:20px;height:20px;border-radius:50%;background:linear-gradient(180deg,#ffe08a,#ff9e5b);color:#2a1605;font-size:13px;font-weight:700;display:flex;align-items:center;justify-content:center;box-shadow:0 1px 5px rgba(0,0,0,.45);}'
    +'.reload-btn:hover,.reload-btn:focus-visible{box-shadow:0 6px 20px rgba(0,0,0,.55),0 0 20px rgba(150,180,255,.45);border-color:rgba(210,225,255,.9);}'
    +'.reload-btn:active{transform:scale(.92);}'
    +'.reload-btn.spinning{animation:reload-spin .7s linear infinite;}.reload-btn.spinning img{opacity:.85;}'
    +'@keyframes reload-bob{0%,100%{transform:translateY(0);}50%{transform:translateY(-5px);}}'
    +'@keyframes reload-spin{to{transform:rotate(360deg);}}'
    +'@media (prefers-reduced-motion:reduce){.reload-btn{animation:none;}}';
  var st=document.createElement('style'); st.textContent=css; document.head.appendChild(st);
  var btn=document.createElement('button');
  btn.type='button'; btn.id='reloadBtn'; btn.className='reload-btn';
  btn.setAttribute('aria-label','さいしんに更新（強制リロード）'); btn.title='さいしんに更新';
  btn.innerHTML='<img src="/chikumo.svg" alt="" width="34" height="34">';
  host.appendChild(btn);
  var busy=false;
  btn.addEventListener('click', function(){
    if(busy) return; busy=true; btn.classList.add('spinning');
    var done=false;
    function go(){ if(done) return; done=true; var u=location.pathname+'?r='+Date.now()+(location.hash||''); try{location.replace(u);}catch(e){location.href=u;} }
    var tasks=[];
    try{ if(window.caches&&caches.keys) tasks.push(caches.keys().then(function(ks){return Promise.all(ks.map(function(k){return caches.delete(k);}));})); }catch(e){}
    try{ if(navigator.serviceWorker&&navigator.serviceWorker.getRegistrations) tasks.push(navigator.serviceWorker.getRegistrations().then(function(rs){return Promise.all(rs.map(function(r){return r.unregister();}));})); }catch(e){}
    if(tasks.length){ Promise.all(tasks).then(go).catch(go); setTimeout(go,1500); } else go();
  });
})();
</script>
