<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Soccer 3D ⚽</title>
<link href="https://fonts.googleapis.com/css2?family=Cinzel+Decorative:wght@400;700&family=JetBrains+Mono:wght@300;400&display=swap" rel="stylesheet">
<style>
:root{--bg:rgba(6,14,28,.82);--ac:#7fdfff;--gold:#ffd700;--bd:rgba(127,223,255,.22);}
*{margin:0;padding:0;box-sizing:border-box;}
body{background:#000;overflow:hidden;font-family:'JetBrains Mono',monospace;cursor:crosshair;}
canvas{display:block;width:100vw;height:100vh;}

#loading{position:fixed;inset:0;background:#030810;display:flex;flex-direction:column;
  align-items:center;justify-content:center;z-index:200;transition:opacity 1.2s;}
#loading h1{font-family:'Cinzel Decorative',cursive;font-size:3.2rem;color:var(--gold);
  text-shadow:0 0 40px rgba(255,215,0,.9),0 0 80px rgba(255,215,0,.4);margin-bottom:6px;}
#loading p{font-size:.72rem;color:var(--ac);opacity:.6;letter-spacing:.35em;margin-bottom:44px;}
.lb-wrap{width:260px;height:2px;background:rgba(127,223,255,.15);border-radius:2px;overflow:hidden;}
.lb{height:100%;background:linear-gradient(90deg,var(--ac),var(--gold));
  border-radius:2px;animation:lb 2.2s ease forwards;}
@keyframes lb{from{width:0}to{width:100%}}

#hud{position:fixed;inset:0;pointer-events:none;z-index:10;}
#scoreboard{position:absolute;top:20px;left:50%;transform:translateX(-50%);
  background:var(--bg);border:1px solid var(--bd);border-radius:14px;
  padding:14px 36px;backdrop-filter:blur(12px);text-align:center;}
#scoreboard h2{font-family:'Cinzel Decorative',cursive;font-size:.75rem;color:var(--gold);
  letter-spacing:.12em;margin-bottom:8px;}
#score-display{font-size:2.4rem;color:#fff;font-weight:300;letter-spacing:.2em;}
#score-display .you{color:#ff6b35;}
#score-display .ai{color:#4da6ff;}

#goal-flash{position:absolute;inset:0;background:rgba(255,215,0,.3);opacity:0;
  pointer-events:none;transition:opacity .25s;}
#goal-text{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);
  font-family:'Cinzel Decorative',cursive;font-size:4.5rem;color:var(--gold);
  text-shadow:0 0 60px rgba(255,215,0,1),0 0 120px rgba(255,200,0,.6);
  opacity:0;pointer-events:none;transition:opacity .25s;white-space:nowrap;}

#hints{position:absolute;bottom:22px;right:24px;font-size:.6rem;
  color:rgba(127,223,255,.42);text-align:right;line-height:2.1;letter-spacing:.1em;}
#status{position:absolute;bottom:22px;left:24px;background:var(--bg);
  border:1px solid var(--bd);border-radius:11px;padding:13px 19px;
  backdrop-filter:blur(12px);font-size:.65rem;color:var(--ac);line-height:2;}
</style>
</head>
<body>

<div id="loading">
  <h1>Soccer 3D ⚽</h1>
  <p>SHIMA GURASHI ENGINE — THREE.JS 0.165.0</p>
  <div class="lb-wrap"><div class="lb"></div></div>
</div>

<canvas id="canvas"></canvas>

<div id="hud">
  <div id="scoreboard">
    <h2>⚽ SCORE</h2>
    <div id="score-display">
      <span class="you" id="sy">0</span> — <span class="ai" id="sa">0</span>
    </div>
  </div>
  <div id="goal-flash"></div>
  <div id="goal-text" id="goal-text">GOAL!</div>
  <div id="hints">
    WASD / ↑↓←→ — Move<br>
    SPACE — Kick ⚽<br>
    Mouse Drag — Camera<br>
    Scroll — Zoom
  </div>
  <div id="status">
    <div id="st-dist">⚽ --</div>
    <div id="st-kick">🦵 ready</div>
  </div>
</div>

<script type="importmap">
{
  "imports": {
    "three": "https://unpkg.com/three@0.165.0/build/three.module.js",
    "three/addons/": "https://unpkg.com/three@0.165.0/examples/jsm/"
  }
}
</script>
<script type="module">
import * as THREE from 'three';
import { OrbitControls }   from 'three/addons/controls/OrbitControls.js';
import { EffectComposer }  from 'three/addons/postprocessing/EffectComposer.js';
import { RenderPass }      from 'three/addons/postprocessing/RenderPass.js';
import { UnrealBloomPass } from 'three/addons/postprocessing/UnrealBloomPass.js';
import { ShaderPass }      from 'three/addons/postprocessing/ShaderPass.js';
import { FXAAShader }      from 'three/addons/shaders/FXAAShader.js';

// ── RENDERER ─────────────────────────────────────────────
const canvas   = document.getElementById('canvas');
const renderer = new THREE.WebGLRenderer({ canvas, antialias: true });
renderer.setPixelRatio(Math.min(devicePixelRatio, 2));
renderer.setSize(innerWidth, innerHeight);
renderer.shadowMap.enabled   = true;
renderer.shadowMap.type      = THREE.PCFSoftShadowMap;
renderer.toneMapping         = THREE.ACESFilmicToneMapping;
renderer.toneMappingExposure = 1.1;
renderer.outputColorSpace    = THREE.SRGBColorSpace;

const scene  = new THREE.Scene();
scene.fog    = new THREE.Fog(0xa8d8f0, 70, 180);

const camera = new THREE.PerspectiveCamera(55, innerWidth / innerHeight, 0.1, 400);
camera.position.set(0, 16, -28);
camera.lookAt(0, 0, 0);

// ── POST PROCESSING ───────────────────────────────────────
const composer = new EffectComposer(renderer);
composer.addPass(new RenderPass(scene, camera));
const bloom = new UnrealBloomPass(new THREE.Vector2(innerWidth, innerHeight), 0.60, 0.42, 0.82);
composer.addPass(bloom);
const fxaa = new ShaderPass(FXAAShader);
fxaa.uniforms.resolution.value.set(1 / innerWidth, 1 / innerHeight);
composer.addPass(fxaa);

// ── LIGHTING ─────────────────────────────────────────────
const sun = new THREE.DirectionalLight(0xfff5e0, 3.2);
sun.position.set(25, 55, 15);
sun.castShadow = true;
sun.shadow.mapSize.set(2048, 2048);
Object.assign(sun.shadow.camera, { left:-65, right:65, top:65, bottom:-65, far:200 });
sun.shadow.bias = -0.001;
scene.add(sun);
scene.add(new THREE.AmbientLight(0x334466, 1.1));
scene.add(new THREE.HemisphereLight(0x87ceeb, 0x2a6e1a, 0.75));
// Stadium flood lights
[[-24,18,-18],[24,18,-18],[-24,18,18],[24,18,18]].forEach(([x,y,z]) => {
  const fl = new THREE.PointLight(0xfff0d0, 1.8, 80);
  fl.position.set(x, y, z);
  scene.add(fl);
  // Light pole visual
  const pole = new THREE.Mesh(
    new THREE.CylinderGeometry(0.12, 0.18, y, 8),
    new THREE.MeshToonMaterial({ color: 0x888888 })
  );
  pole.position.set(x, y / 2, z);
  scene.add(pole);
  const lamp = new THREE.Mesh(
    new THREE.BoxGeometry(1.2, 0.25, 0.5),
    new THREE.MeshToonMaterial({ color: 0xffffcc, emissive: 0xffee88, emissiveIntensity: 2 })
  );
  lamp.position.set(x, y + 0.15, z);
  scene.add(lamp);
});

// ── PROCEDURAL SKY (from 島ぐらし2) ────────────────────
const SKY_V = `varying vec3 vDir;
void main(){
  vec4 wp=modelMatrix*vec4(position,1.);
  vDir=normalize(wp.xyz);
  gl_Position=projectionMatrix*viewMatrix*wp;
}`;
const SKY_F = `
uniform vec3 uTop,uHorizon,uSunDir;
uniform float uTime;
varying vec3 vDir;
float hash(vec2 p){return fract(sin(dot(p,vec2(127.1,311.7)))*43758.5453);}
float noise(vec2 p){
  vec2 i=floor(p),f=fract(p);
  f=f*f*(3.-2.*f);
  return mix(mix(hash(i),hash(i+vec2(1,0)),f.x),
             mix(hash(i+vec2(0,1)),hash(i+vec2(1,1)),f.x),f.y);
}
void main(){
  vec3 d=normalize(vDir);
  float t=clamp(d.y*.5+.5,0.,1.);
  vec3 col=mix(uHorizon,uTop,pow(t,.55));
  float sd=dot(d,normalize(uSunDir));
  col+=vec3(1.,.9,.5)*pow(max(sd,0.),512.);
  col+=vec3(1.,.55,.15)*pow(max(sd,0.),10.)*.12;
  if(d.y>-.05){
    vec2 cUV=d.xz/max(d.y+.08,.08)*.12+vec2(uTime*.006,0.);
    float c=noise(cUV*2.5)*.5+noise(cUV*5.5+.3)*.3+noise(cUV*11.+.7)*.2;
    c=smoothstep(.44,.74,c)*smoothstep(-.05,.2,d.y);
    col=mix(col,vec3(.95,.96,1.)*.9,c*.65);
  }
  gl_FragColor=vec4(col,1.);
}`;
const skyMat = new THREE.ShaderMaterial({
  vertexShader: SKY_V, fragmentShader: SKY_F,
  uniforms: {
    uTop:    { value: new THREE.Color(0x1a6fcf) },
    uHorizon:{ value: new THREE.Color(0x87ceeb) },
    uSunDir: { value: new THREE.Vector3(0.4, 0.7, 0.3).normalize() },
    uTime:   { value: 0 },
  },
  side: THREE.BackSide, depthWrite: false
});
scene.add(new THREE.Mesh(new THREE.SphereGeometry(300, 24, 12), skyMat));

// ── SOCCER FIELD ─────────────────────────────────────────
// Field: 52 units long (z-axis), 34 units wide (x-axis)
const FW = 34, FL = 52;

const FIELD_V = `
varying vec2 vUV;
void main(){
  vUV=uv;
  gl_Position=projectionMatrix*modelViewMatrix*vec4(position,1.);
}`;
const FIELD_F = `
varying vec2 vUV;
uniform vec2 uSize;

float ln(float v,float e,float w){ return 1.-smoothstep(0.,w,abs(v-e)); }
float lnSeg(float v,float e,float w,float pos,float plo,float phi){
  if(pos<plo||pos>phi) return 0.;
  return ln(v,e,w);
}

void main(){
  // Alternating grass stripes (8 along length)
  float stripe=mod(floor(vUV.y*8.),2.);
  vec3 gA=vec3(.16,.60,.12), gB=vec3(.19,.68,.15);
  vec3 col=mix(gA,gB,stripe)*.90;

  float W=uSize.x, L=uSize.y;
  // world coords relative to center
  float wx=(vUV.x-.5)*W, wz=(vUV.y-.5)*L;
  float lw=.07; // line half-width in world units

  // Outer boundary
  float bnd=0.;
  bnd=max(bnd, ln(wx,-W*.5+.5,lw)); bnd=max(bnd, ln(wx, W*.5-.5,lw));
  bnd=max(bnd, ln(wz,-L*.5+.5,lw)); bnd=max(bnd, ln(wz, L*.5-.5,lw));

  // Center line
  bnd=max(bnd, ln(wz,0.,lw*.7));

  // Center circle radius 9.15
  float cr=sqrt(wx*wx+wz*wz);
  bnd=max(bnd, 1.-smoothstep(0.,.22,abs(cr-9.15)));

  // Center spot
  if(cr<.3) bnd=max(bnd,1.);

  // Penalty areas (16.5m from goal line, 20.16m half-width)
  float PZ=16.5, PX=20.16;
  // Bottom penalty box
  bnd=max(bnd, lnSeg(wz,-L*.5+.5+PZ,lw, wx,-PX,PX));
  bnd=max(bnd, lnSeg(wx,-PX,lw, wz,-L*.5+.5,-L*.5+.5+PZ));
  bnd=max(bnd, lnSeg(wx, PX,lw, wz,-L*.5+.5,-L*.5+.5+PZ));
  // Top penalty box
  bnd=max(bnd, lnSeg(wz, L*.5-.5-PZ,lw, wx,-PX,PX));
  bnd=max(bnd, lnSeg(wx,-PX,lw, wz,L*.5-.5-PZ,L*.5-.5));
  bnd=max(bnd, lnSeg(wx, PX,lw, wz,L*.5-.5-PZ,L*.5-.5));

  // Goal areas (5.5m from goal, 9.16m half-width)
  float GZ2=5.5, GX2=9.16;
  bnd=max(bnd, lnSeg(wz,-L*.5+.5+GZ2,lw*.6, wx,-GX2,GX2));
  bnd=max(bnd, lnSeg(wx,-GX2,lw*.6, wz,-L*.5+.5,-L*.5+.5+GZ2));
  bnd=max(bnd, lnSeg(wx, GX2,lw*.6, wz,-L*.5+.5,-L*.5+.5+GZ2));
  bnd=max(bnd, lnSeg(wz, L*.5-.5-GZ2,lw*.6, wx,-GX2,GX2));
  bnd=max(bnd, lnSeg(wx,-GX2,lw*.6, wz,L*.5-.5-GZ2,L*.5-.5));
  bnd=max(bnd, lnSeg(wx, GX2,lw*.6, wz,L*.5-.5-GZ2,L*.5-.5));

  col=mix(col,vec3(.97,.97,.97),clamp(bnd,0.,1.)*.88);
  gl_FragColor=vec4(col,1.);
}`;

const fieldGeo = new THREE.PlaneGeometry(FW, FL, 1, 1);
fieldGeo.rotateX(-Math.PI / 2);
const fieldMat = new THREE.ShaderMaterial({
  vertexShader: FIELD_V, fragmentShader: FIELD_F,
  uniforms: { uSize: { value: new THREE.Vector2(FW, FL) } }
});
const fieldMesh = new THREE.Mesh(fieldGeo, fieldMat);
fieldMesh.receiveShadow = true;
scene.add(fieldMesh);

// Wide ground outside field
const outGround = new THREE.Mesh(
  new THREE.PlaneGeometry(300, 300),
  new THREE.MeshToonMaterial({ color: 0x155c10 })
);
outGround.rotation.x = -Math.PI / 2;
outGround.position.y = -0.01;
scene.add(outGround);

// ── GOALS ─────────────────────────────────────────────────
// goalA at z = -FL/2 (player attacking this direction → player starts south)
// goalB at z = +FL/2 (AI defends)
const GW = 7.32, GH = 2.44, GD = 1.8;
const POST_R = 0.075;

function makeGoal(posZ, netDir) {
  const g = new THREE.Group();
  const mat = new THREE.MeshToonMaterial({ color: 0xffffff, emissive: 0x334455, emissiveIntensity: 0.3 });

  const mkCyl = (r, h, rx, ry, rz, px, py, pz) => {
    const m = new THREE.Mesh(new THREE.CylinderGeometry(r, r, h, 14), mat);
    m.rotation.set(rx, ry, rz);
    m.position.set(px, py, pz);
    m.castShadow = true;
    g.add(m);
    return m;
  };

  // Vertical posts
  mkCyl(POST_R, GH, 0, 0, 0, -GW / 2, GH / 2, 0);
  mkCyl(POST_R, GH, 0, 0, 0,  GW / 2, GH / 2, 0);
  // Crossbar
  mkCyl(POST_R, GW, 0, 0, Math.PI / 2, 0, GH, 0);
  // Back posts (depth)
  mkCyl(POST_R * .7, GD, Math.PI / 2, 0, 0, -GW / 2, GH * .5, netDir * GD / 2);
  mkCyl(POST_R * .7, GD, Math.PI / 2, 0, 0,  GW / 2, GH * .5, netDir * GD / 2);
  mkCyl(POST_R * .7, GD, Math.PI / 2, 0, 0, 0,       GH,      netDir * GD / 2);
  // Top back bar
  mkCyl(POST_R * .7, GW, 0, 0, Math.PI / 2, 0, GH, netDir * GD);
  // Bottom back bar
  mkCyl(POST_R * .7, GW, 0, 0, Math.PI / 2, 0, 0.05, netDir * GD);

  // Net (semi-transparent)
  const netMat = new THREE.MeshBasicMaterial({ color: 0xffffff, transparent: true, opacity: 0.11, side: THREE.DoubleSide });
  const addNet = (geoW, geoH, rx, ry, rz, px, py, pz) => {
    const nm = new THREE.Mesh(new THREE.PlaneGeometry(geoW, geoH), netMat);
    nm.rotation.set(rx, ry, rz);
    nm.position.set(px, py, pz);
    g.add(nm);
  };
  addNet(GW, GH, 0, 0, 0, 0, GH / 2, netDir * GD);       // back
  addNet(GW, GD, Math.PI / 2, 0, 0, 0, 0, netDir * GD / 2); // bottom
  addNet(GD, GH, 0, Math.PI / 2, 0, -GW / 2, GH / 2, netDir * GD / 2); // left side
  addNet(GD, GH, 0, Math.PI / 2, 0,  GW / 2, GH / 2, netDir * GD / 2); // right side

  // Goal glow light
  const gl = new THREE.PointLight(0x00ff88, 0, 14);
  gl.position.set(0, GH / 2, netDir * GD * .5);
  g.add(gl);
  g.userData.glow = gl;

  g.position.set(0, 0, posZ);
  scene.add(g);
  return g;
}

const goalA = makeGoal(-FL / 2, 1);  // z=-26, net behind (toward z=+)
const goalB = makeGoal( FL / 2, -1); // z=+26, net behind (toward z=-)

// Corner flags
const CORNERS = [[-FW/2,-FL/2],[FW/2,-FL/2],[-FW/2,FL/2],[FW/2,FL/2]];
CORNERS.forEach(([x, z]) => {
  const pole = new THREE.Mesh(
    new THREE.CylinderGeometry(0.03, 0.04, 1.5, 8),
    new THREE.MeshToonMaterial({ color: 0xffcc00 })
  );
  pole.position.set(x, 0.75, z);
  scene.add(pole);
  const flag = new THREE.Mesh(
    new THREE.PlaneGeometry(0.5, 0.3),
    new THREE.MeshToonMaterial({ color: 0xff3333, side: THREE.DoubleSide })
  );
  flag.position.set(x + 0.25, 1.4, z);
  scene.add(flag);
});

// ── SOCCER BALL ───────────────────────────────────────────
const BALL_R = 0.22;

const BALL_V = `
varying vec3 vN, vWP;
void main(){
  vN=normalize(normalMatrix*normal);
  vWP=(modelMatrix*vec4(position,1.)).xyz;
  gl_Position=projectionMatrix*modelViewMatrix*vec4(position,1.);
}`;
const BALL_F = `
uniform vec3 uSun;
varying vec3 vN, vWP;
float toon(float v){
  if(v>.78) return 1.;
  if(v>.48) return .72;
  if(v>.12) return .42;
  return .18;
}
void main(){
  vec3 n=normalize(vN);
  float lat=asin(clamp(n.y,-1.,1.));
  float lon=atan(n.z,n.x);
  float p=sin(lat*5.+.3)*sin(lon*8.)+cos(lat*7.2+lon*4.8);
  float pat=step(.22,p);
  vec3 col=mix(vec3(.08,.08,.09),vec3(.96,.96,.96),pat);
  float ndl=dot(n,normalize(uSun));
  col*=toon(ndl)*.82+.28;
  vec3 h=normalize(uSun+vec3(0.,1.,0.));
  float sp=pow(max(dot(n,h),0.),40.);
  if(sp>.65) col+=.30;
  gl_FragColor=vec4(col,1.);
}`;
const ballMesh = new THREE.Mesh(
  new THREE.SphereGeometry(BALL_R, 24, 20),
  new THREE.ShaderMaterial({
    vertexShader: BALL_V, fragmentShader: BALL_F,
    uniforms: { uSun: { value: new THREE.Vector3(25, 55, 15).normalize() } }
  })
);
ballMesh.castShadow = true;
scene.add(ballMesh);

// Ball glow
const ballGlow = new THREE.PointLight(0xffffff, 0.25, 4);
ballMesh.add(ballGlow);

// Ball drop shadow on ground
const shadowMesh = new THREE.Mesh(
  new THREE.CircleGeometry(BALL_R * 2, 20),
  new THREE.MeshBasicMaterial({ color: 0x000000, transparent: true, opacity: 0.45 })
);
shadowMesh.rotation.x = -Math.PI / 2;
shadowMesh.position.y = 0.005;
scene.add(shadowMesh);

// Ball physics state
const B = {
  pos: new THREE.Vector3(0, BALL_R, 0),
  vel: new THREE.Vector3(0, 0, 0),
};

function resetBall(toCenter = true) {
  if (toCenter) {
    B.pos.set(0, BALL_R, 0);
  } else {
    B.pos.set((Math.random() - .5) * 4, BALL_R, (Math.random() - .5) * 4);
  }
  B.vel.set(0, 0, 0);
}

// ── CHARACTER BUILDER (toon style — 島ぐらし2 style) ─────
function makeChar(bodyColor, shirtColor) {
  const g = new THREE.Group();

  const mk = (geo, col) => {
    const m = new THREE.Mesh(geo, new THREE.MeshToonMaterial({ color: col }));
    m.castShadow = true;
    return m;
  };

  const body = mk(new THREE.CapsuleGeometry(0.28, 0.52, 8, 16), bodyColor);
  body.position.y = 0.78; g.add(body);

  const head = mk(new THREE.SphereGeometry(0.27, 16, 12), 0xffdaa0);
  head.position.y = 1.52; g.add(head);

  // Eyes
  [-0.1, 0.1].forEach(ex => {
    const eye = mk(new THREE.SphereGeometry(0.048, 8, 8), 0x222222);
    eye.position.set(ex, 1.56, 0.23); g.add(eye);
    const shine = new THREE.Mesh(
      new THREE.SphereGeometry(0.018, 6, 6),
      new THREE.MeshBasicMaterial({ color: 0xffffff })
    );
    shine.position.set(ex + .02, 1.575, .24); g.add(shine);
  });

  // Shirt
  const shirt = mk(new THREE.CylinderGeometry(0.26, 0.28, 0.20, 12), shirtColor);
  shirt.position.y = 0.66; g.add(shirt);

  // Legs
  [-0.12, 0.12].forEach(lx => {
    const leg = mk(new THREE.CapsuleGeometry(0.085, 0.3, 6, 8), 0x222244);
    leg.position.set(lx, 0.25, 0); g.add(leg);
    const shoe = mk(new THREE.SphereGeometry(0.1, 8, 6), 0x111111);
    shoe.scale.set(1, 0.55, 1.3);
    shoe.position.set(lx, 0.06, 0.06); g.add(shoe);
  });

  return g;
}

// Player (orange kit)
const playerMesh = makeChar(0xff6b35, 0xff9944);
scene.add(playerMesh);

// AI Goalkeeper (blue kit)
const aiMesh = makeChar(0x2255cc, 0x4488ff);
scene.add(aiMesh);

// ── PLAYER STATE ─────────────────────────────────────────
const P = {
  pos:        new THREE.Vector3(0, 0, -8),
  kickCooldown: 0,
  walkPhase:  0,
};
playerMesh.position.copy(P.pos);

// ── AI STATE ─────────────────────────────────────────────
const AI = {
  pos:        new THREE.Vector3(0, 0, FL / 2 - 3.5),
  kickCooldown: 0,
};
aiMesh.position.copy(AI.pos);

// ── ORBIT CONTROLS ────────────────────────────────────────
const controls = new OrbitControls(camera, canvas);
controls.enableDamping   = true;
controls.dampingFactor   = 0.055;
controls.minDistance     = 4;
controls.maxDistance     = 75;
controls.maxPolarAngle   = Math.PI * 0.48;
controls.target.set(0, 2, -8);

// ── INPUT ─────────────────────────────────────────────────
const keys = {};
window.addEventListener('keydown', e => { keys[e.code] = true;  if (e.code === 'Space') e.preventDefault(); });
window.addEventListener('keyup',   e => { keys[e.code] = false; });

// ── SCORE UI ──────────────────────────────────────────────
let scoreYou = 0, scoreAI = 0;
let goalCooldown = 0;
const syEl = document.getElementById('sy');
const saEl = document.getElementById('sa');
const flashEl = document.getElementById('goal-flash');
const gtextEl = document.getElementById('goal-text');

function showGoal(msg, lightRef) {
  gtextEl.textContent = msg;
  flashEl.style.opacity = '1';
  gtextEl.style.opacity = '1';
  if (lightRef) lightRef.intensity = 6;
  goalCooldown = 3.0;
  setTimeout(() => {
    flashEl.style.opacity = '0';
    gtextEl.style.opacity = '0';
    if (lightRef) lightRef.intensity = 0;
  }, 1600);
  setTimeout(() => resetBall(), 2200);
}

// ── PHYSICS UPDATE ────────────────────────────────────────
const GRAVITY   = 18.5;
const BOUNCE    = 0.52;
const FRICTION  = 0.985; // per frame at 60fps
const AIR_DRAG  = 0.997;

function updateBall(dt) {
  if (goalCooldown > 0) {
    goalCooldown -= dt;
    ballMesh.position.copy(B.pos);
    return;
  }

  // Gravity
  B.vel.y -= GRAVITY * dt;
  // Air drag
  B.vel.x *= Math.pow(AIR_DRAG, dt * 60);
  B.vel.z *= Math.pow(AIR_DRAG, dt * 60);

  // Integrate
  B.pos.addScaledVector(B.vel, dt);

  // Ground collision
  if (B.pos.y < BALL_R) {
    B.pos.y = BALL_R;
    if (B.vel.y < -0.15) {
      B.vel.y *= -BOUNCE;
    } else {
      B.vel.y = 0;
    }
    // Ground friction
    const fric = Math.pow(FRICTION, dt * 60);
    B.vel.x *= fric;
    B.vel.z *= fric;
  }

  // Side boundary (walls outside pitch)
  if (Math.abs(B.pos.x) > FW / 2 + 0.5) {
    B.vel.x *= -0.5;
    B.pos.x = Math.sign(B.pos.x) * (FW / 2 + 0.5);
  }

  // Goal detection (before out-of-bounds clamp)
  const bx = B.pos.x, by = B.pos.y, bz = B.pos.z;
  const inGoalX = Math.abs(bx) < GW / 2;
  const inGoalY = by < GH + BALL_R;

  if (bz > FL / 2 - 0.1 && inGoalX && inGoalY) {
    // Ball entered goalB (AI goal) — YOU SCORE
    scoreYou++;
    syEl.textContent = scoreYou;
    showGoal('⚽ GOAL!', goalB.userData.glow);
    return;
  }
  if (bz < -FL / 2 + 0.1 && inGoalX && inGoalY) {
    // Ball entered goalA (your goal) — AI SCORES
    scoreAI++;
    saEl.textContent = scoreAI;
    showGoal('AI SCORES!', goalA.userData.glow);
    return;
  }

  // Out of bounds (past goal without scoring) → reset
  if (Math.abs(bz) > FL / 2 + 3) {
    resetBall();
    return;
  }

  // Goal post collisions (simplified cylinder)
  const posts = [
    [-GW / 2, -FL / 2], [GW / 2, -FL / 2],
    [-GW / 2,  FL / 2], [GW / 2,  FL / 2],
  ];
  posts.forEach(([px, pz]) => {
    const dx = B.pos.x - px, dz = B.pos.z - pz;
    const dist = Math.sqrt(dx * dx + dz * dz);
    const minD = POST_R + BALL_R;
    if (dist < minD && dist > 0.001) {
      const nx = dx / dist, nz = dz / dist;
      const dot = B.vel.x * nx + B.vel.z * nz;
      if (dot < 0) {
        B.vel.x -= 2 * dot * nx * 0.55;
        B.vel.z -= 2 * dot * nz * 0.55;
      }
      B.pos.x += nx * (minD - dist);
      B.pos.z += nz * (minD - dist);
    }
  });

  ballMesh.position.copy(B.pos);

  // Rolling rotation
  ball_rotX += B.vel.z * dt / BALL_R;
  ball_rotZ -= B.vel.x * dt / BALL_R;
  ballMesh.rotation.x = ball_rotX;
  ballMesh.rotation.z = ball_rotZ;

  // Drop shadow
  const height = Math.max(0, B.pos.y - BALL_R);
  const sc = Math.max(0.15, 1 - height * 0.08);
  shadowMesh.position.set(B.pos.x, 0.005, B.pos.z);
  shadowMesh.scale.setScalar(sc);
  shadowMesh.material.opacity = 0.45 * sc;
}
let ball_rotX = 0, ball_rotZ = 0;

// ── PLAYER MOVEMENT + KICK ────────────────────────────────
const PLAYER_SPD = 6.5;
const KICK_RANGE = 1.5;
const KICK_H     = 16;   // m/s horizontal
const KICK_V     = 8;    // m/s vertical

function updatePlayer(dt) {
  if (goalCooldown > 0) return;
  if (P.kickCooldown > 0) P.kickCooldown -= dt;

  const fwd = new THREE.Vector3();
  const rgt = new THREE.Vector3();
  camera.getWorldDirection(fwd); fwd.y = 0; fwd.normalize();
  rgt.crossVectors(fwd, new THREE.Vector3(0, 1, 0));

  const move = new THREE.Vector3();
  let moving = false;
  if (keys['KeyW'] || keys['ArrowUp'])    { move.addScaledVector(fwd,  PLAYER_SPD * dt); moving = true; }
  if (keys['KeyS'] || keys['ArrowDown'])  { move.addScaledVector(fwd, -PLAYER_SPD * dt); moving = true; }
  if (keys['KeyA'] || keys['ArrowLeft'])  { move.addScaledVector(rgt, -PLAYER_SPD * dt); moving = true; }
  if (keys['KeyD'] || keys['ArrowRight']) { move.addScaledVector(rgt,  PLAYER_SPD * dt); moving = true; }

  P.pos.add(move);
  P.pos.x = Math.max(-FW / 2 + 0.4, Math.min(FW / 2 - 0.4, P.pos.x));
  P.pos.z = Math.max(-FL / 2 + 0.4, Math.min(FL / 2 - 0.4, P.pos.z));

  // Face direction of movement
  if (moving && move.length() > 0.0005) {
    const ta = Math.atan2(move.x, move.z);
    playerMesh.rotation.y += (ta - playerMesh.rotation.y) * 0.18;
    P.walkPhase += dt * 11;
    playerMesh.children[0].position.y = 0.78 + Math.sin(P.walkPhase) * 0.045;
    playerMesh.children[1].position.y = 1.52 + Math.sin(P.walkPhase) * 0.045;
  }
  playerMesh.position.set(P.pos.x, 0, P.pos.z);

  // Distance to ball
  const toBall = new THREE.Vector3(B.pos.x - P.pos.x, 0, B.pos.z - P.pos.z);
  const dist = toBall.length();

  document.getElementById('st-dist').textContent = `⚽ ${dist.toFixed(1)}m`;

  // Soft collision push
  const pushR = 0.55;
  if (dist < pushR && dist > 0.01 && goalCooldown <= 0) {
    const push = toBall.normalize().multiplyScalar(pushR - dist);
    B.pos.x += push.x * 0.5;
    B.pos.z += push.z * 0.5;
    B.vel.x += push.x * 2;
    B.vel.z += push.z * 2;
  }

  // Kick
  if (keys['Space'] && dist < KICK_RANGE && P.kickCooldown <= 0) {
    // Kick in direction player faces (WASD direction), biased toward ball
    const facing = new THREE.Vector3(Math.sin(playerMesh.rotation.y), 0, Math.cos(playerMesh.rotation.y));
    const kickDir = toBall.normalize().multiplyScalar(0.55).add(facing.multiplyScalar(0.45)).normalize();
    B.vel.set(kickDir.x * KICK_H, KICK_V, kickDir.z * KICK_H);
    P.kickCooldown = 0.45;
    document.getElementById('st-kick').textContent = `🦵 ⚡ kick!`;
    setTimeout(() => { document.getElementById('st-kick').textContent = `🦵 ready`; }, 450);
  } else if (dist < KICK_RANGE) {
    document.getElementById('st-kick').textContent = `🦵 SPACE!`;
  } else {
    document.getElementById('st-kick').textContent = `🦵 ${dist < 3 ? 'near...' : 'ready'}`;
  }

  // Camera follow
  controls.target.lerp(new THREE.Vector3(P.pos.x, 1.5, P.pos.z), 0.045);
}

// ── AI GOALKEEPER ─────────────────────────────────────────
function updateAI(dt) {
  if (goalCooldown > 0) return;
  if (AI.kickCooldown > 0) AI.kickCooldown -= dt;

  const GW_HALF = GW / 2 - 0.5;

  // Track ball horizontally
  const targetX = Math.max(-GW_HALF, Math.min(GW_HALF, B.pos.x));
  AI.pos.x += (targetX - AI.pos.x) * dt * 4.5;

  // Charge out if ball enters AI half
  if (B.pos.z > 5) {
    const dz = B.pos.z - 5;
    const chargeZ = FL / 2 - 3.5 - dz * 0.35;
    AI.pos.z += (Math.max(FL / 2 - 9, chargeZ) - AI.pos.z) * dt * 3.2;
  } else {
    // Return to goal
    AI.pos.z += (FL / 2 - 3.5 - AI.pos.z) * dt * 2.5;
  }

  // Clamp
  AI.pos.z = Math.max(FL / 2 - 9, Math.min(FL / 2 - 0.8, AI.pos.z));
  aiMesh.position.set(AI.pos.x, 0, AI.pos.z);

  // Face ball
  const toB2 = new THREE.Vector3(B.pos.x - AI.pos.x, 0, B.pos.z - AI.pos.z);
  if (toB2.length() > 0.05) {
    const ta = Math.atan2(toB2.x, toB2.z);
    aiMesh.rotation.y += (ta - aiMesh.rotation.y) * 0.12;
  }

  // AI kick when near ball
  const distAI = new THREE.Vector3(AI.pos.x, 0, AI.pos.z)
    .distanceTo(new THREE.Vector3(B.pos.x, 0, B.pos.z));

  if (distAI < 1.4 && AI.kickCooldown <= 0) {
    // Kick toward player's goal (z < 0) with some randomness
    const rx = (Math.random() - .5) * 0.5;
    const dir = new THREE.Vector3(rx, 0.45, -1).normalize();
    B.vel.set(dir.x * 14, dir.y * 14, dir.z * 14);
    AI.kickCooldown = 1.2;
  }

  // AI push collision
  const pushR = 0.5;
  const toB3 = new THREE.Vector3(B.pos.x - AI.pos.x, 0, B.pos.z - AI.pos.z);
  const d3 = toB3.length();
  if (d3 < pushR && d3 > 0.01) {
    const push = toB3.normalize().multiplyScalar(pushR - d3);
    B.pos.x += push.x * 0.4;
    B.pos.z += push.z * 0.4;
  }
}

// ── RESIZE ────────────────────────────────────────────────
window.addEventListener('resize', () => {
  camera.aspect = innerWidth / innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(innerWidth, innerHeight);
  composer.setSize(innerWidth, innerHeight);
  fxaa.uniforms.resolution.value.set(1 / innerWidth, 1 / innerHeight);
});

// ── MAIN LOOP ─────────────────────────────────────────────
const clock = new THREE.Clock();
let elapsed = 0;

function animate() {
  requestAnimationFrame(animate);
  const dt = Math.min(clock.getDelta(), 0.05);
  elapsed += dt;

  updateBall(dt);
  updatePlayer(dt);
  updateAI(dt);

  skyMat.uniforms.uTime.value = elapsed;
  controls.update();
  composer.render();
}

// Loading dismiss
setTimeout(() => {
  const ls = document.getElementById('loading');
  ls.style.opacity = '0';
  setTimeout(() => ls.remove(), 1200);
}, 2400);

animate();
</script>
