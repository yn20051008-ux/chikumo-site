*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body{height:100%;overflow:hidden;background:#03030e;font-family:"Hiragino Kaku Gothic ProN","Yu Gothic",sans-serif;

#ui{position:fixed;inset:0;pointer-events:none;display:flex;flex-direction:column;align-items:center;justify-content:center}
.overlay{pointer-events:auto;background:rgba(8,8,30,.86);backdrop-filter:blur(10px);border-radius:24px;
  padding:26px 28px;text-align:center;color:#fff;max-width:360px;width:90%;box-shadow:0 0 80px rgba(140,160,255,.35);

.overlay h1{font-size:30px;background:linear-gradient(90deg,#7ad7ff,#b08bff,#ff8ac2,#ffd76e);-webkit-background-clip:text;

.overlay img.hero{width:84px;filter:drop-shadow(0 0 18px rgba(140,180,255,.85));animation:tilt 2.2s ease-in-out infinite}
@keyframes tilt{0%,100%{transform:rotate(-10deg) translateY(0)}50%{transform:rotate(10deg) translateY(-10px)}}

<body>
<canvas id="game"></canvas>
<a class="back" href="/">← 畜物語</a>
<button class="mute" id="muteBtn" aria-label="サウンド切替">🔊</button>
<button class="recal hidden" id="recalBtn" aria-label="傾きリセット">📐 傾きリセット</button>
<div id="ui">
  <div class="overlay" id="startOv">
    <img class="hero" src="/chikumo.svg" alt="こっこちゃん">
    <h1>こっこジャイロ</h1>
    <div class="sub">COCCO GYRO — 傾けてZ軸の奥へダイブ</div>
    <div class="how">
      ◆ スマホを<b>かたむけて</b>こっこちゃんを操縦！（指でなぞってもOK）<br>
      ◆ <b>パズルゲート</b>は「おだい」と同じ絵文字のあなをくぐれ！<br>
      ◆ ⭐💎❤️⏰🛡️🌈 アイテムをあつめてパワーアップ！<br>
      ◆ <b>ブラックこっこちゃん</b>と☄️いんせきは避けて。❤️×3でおしまい。<br>
      ◆ <b>⏰60秒</b>のタイムアタック——コンボ10で<b>🌈フィーバー</b>！
    </div>
    <div class="score-row" id="bestRow"></div>
    <button class="btn" id="startBtn">ダイブ！</button>
  </div>
  <div class="overlay hidden" id="endOv">
    <img class="hero" src="/chikumo.svg" alt="こっこちゃん">
    <div class="gameover-reason" id="endReason"></div>

    <div class="score-row">SCORE</div>
    <div class="big-score" id="endScore">0</div>
    <div class="score-row" id="endBest"></div>
    <div class="score-row" id="endCombo"></div>
    <div class="score-row" id="endPuzzle"></div>
    <button class="btn" id="retryBtn">もう一回ダイブ</button>
    <button class="btn sub" id="shareBtn">Xに自慢する</button>
  </div>

<script>
"use strict";
/* ════════════════════════════════════════════════════════════
   こっこジャイロ — GYRO DIVE
   ジャイロセンサー操作 × Z軸(奥行き)3Dトンネル
   クリアできる要素 76.6% / クリアできない要素 23.4%
   ════════════════════════════════════════════════════════════ */
const TAU=Math.PI*2;
const CLEAR_RATE=0.766;            // 76.6% フェア配置 / 23.4% 鬼配置
const fair=()=>Math.random()<CLEAR_RATE;

/* ───────── 公式こっこちゃんSVG ───────── */
let blackCv=null;
const cocco=new Image();let coccoReady=false;
cocco.onload=()=>{coccoReady=true;makeBlack();};
cocco.src='/chikumo.svg';
/* ブラックこっこちゃん: 公式SVGをシルエット化 */
function makeBlack(){
  const c=document.createElement('canvas');c.width=120;c.height=157;
  const g=c.getContext('2d');
  g.drawImage(cocco,0,0,120,157);
  g.globalCompositeOperation='source-in';
  g.fillStyle='#0a0a14';g.fillRect(0,0,120,157);
  blackCv=c;
}

/* ───────── キャンバス / 動的解像度スロットリング ───────── */
if(!CanvasRenderingContext2D.prototype.roundRect)
  CanvasRenderingContext2D.prototype.roundRect=function(x,y,w,h){this.rect(x,y,w,h);return this;};
const cv=document.getElementById('game'),cx=cv.getContext('2d');
let W=0,H=0,DPR=1,renderScale=1;
function resize(){
  DPR=Math.min(devicePixelRatio||1,2)*renderScale;
  W=innerWidth;H=innerHeight;
  cv.width=Math.max(1,Math.round(W*DPR));cv.height=Math.max(1,Math.round(H*DPR));
  cv.style.width=W+'px';cv.style.height=H+'px';
  cx.setTransform(DPR,0,0,DPR,0,0);
}
addEventListener('resize',resize);resize();
/* コンテキストロス・フォールバック */
cv.addEventListener('contextlost',e=>e.preventDefault());
cv.addEventListener('contextrestored',()=>resize());
let perfAcc=0,perfN=0;
function perfSample(dtMs){
  perfAcc+=dtMs;perfN++;
  if(perfN>=70){
    const avg=perfAcc/perfN;perfAcc=0;perfN=0;
    if(avg>24&&renderScale>0.55){renderScale=Math.max(0.55,renderScale-0.15);resize();}
    else if(avg<14.5&&renderScale<1){renderScale=Math.min(1,renderScale+0.15);resize();}
  }
}

function vib(p){try{if(navigator.vibrate)navigator.vibrate(p);}catch(e){}}

/* ───────── プロシージャル・オーディオ ───────── */
let AC=null,muted=false,ECHO=null,echoWet=null;
const MASTER=0.5;
function audio(){
  if(!AC){
    AC=new (window.AudioContext||window.webkitAudioContext)();
    ECHO=AC.createDelay(1);ECHO.delayTime.value=60/132/2;
    const fb=AC.createGain();fb.gain.value=.3;
    echoWet=AC.createGain();echoWet.gain.value=.4;
    ECHO.connect(fb);fb.connect(ECHO);ECHO.connect(echoWet);echoWet.connect(AC.destination);
  }
  if(AC.state==='suspended')AC.resume();
  return AC;
}
function tone(f,t0,dur,type,vol,slide,echo){
  const a=audio(),o=a.createOscillator(),g=a.createGain();
  o.type=type;o.frequency.setValueAtTime(Math.max(20,f),t0);
  if(slide)o.frequency.exponentialRampToValueAtTime(Math.max(20,slide),t0+dur);
  g.gain.setValueAtTime(vol*MASTER,t0);g.gain.exponentialRampToValueAtTime(.0001,t0+dur);
  o.connect(g).connect(a.destination);if(echo&&ECHO)g.connect(ECHO);
  o.start(t0);o.stop(t0+dur+.03);
}
function noise(t0,dur,vol,hp){
  const a=audio(),n=a.createBufferSource(),
    buf=a.createBuffer(1,Math.max(1,(a.sampleRate*dur)|0),a.sampleRate),
    d=buf.getChannelData(0);
  for(let i=0;i<d.length;i++)d[i]=(Math.random()*2-1)*(1-i/d.length);
  n.buffer=buf;
  const g=a.createGain();g.gain.value=vol*MASTER;
  if(hp){const f=a.createBiquadFilter();f.type='highpass';f.frequency.value=hp;n.connect(f).connect(g);}
  else n.connect(g);
  g.connect(a.destination);n.start(t0);
}
/* ─ 効果音(操作リズムに合うキメ) ─ */
function sfxPerfect(c){if(muted)return;const t=audio().currentTime,b=659.25*Math.pow(1.0594631,Math.min(c,14));
  tone(b,t,.1,'square',.15,0,1);tone(b*1.25,t+.04,.12,'square',.13,0,1);
  tone(b*1.5,t+.08,.14,'square',.12,0,1);tone(b*2,t+.12,.22,'triangle',.17,0,1);noise(t,.05,.05,3000);}
function sfxGood(){if(muted)return;const t=audio().currentTime;tone(523,t,.09,'square',.11);tone(784,t+.05,.12,'triangle',.12);}
function sfxPuzzle(){if(muted)return;const t=audio().currentTime;
  [523,659,784,1047,1319].forEach((f,i)=>tone(f,t+i*.055,.16,'square',.13,0,1));
  tone(2093,t+.28,.3,'triangle',.15,0,1);noise(t+.28,.08,.06,4000);}
function sfxWrong(){if(muted)return;const t=audio().currentTime;
  tone(220,t,.18,'sawtooth',.13,180);tone(208,t+.02,.2,'square',.1,170);}
function sfxItem(){if(muted)return;const t=audio().currentTime;tone(1318,t,.07,'square',.1);tone(1760,t+.05,.13,'square',.1,0,1);}
function sfxHeart(){if(muted)return;const t=audio().currentTime;[660,880,1100].forEach((f,i)=>tone(f,t+i*.07,.14,'triangle',.13,0,1));}
function sfxClock(){if(muted)return;const t=audio().currentTime;tone(1568,t,.06,'square',.12);tone(1568,t+.1,.06,'square',.1);tone(2093,t+.2,.16,'triangle',.13,0,1);}
function sfxShield(){if(muted)return;const t=audio().currentTime;tone(392,t,.3,'triangle',.13,784,1);noise(t,.1,.04,2000);}
function sfxHit(){if(muted)return;const t=audio().currentTime;
  tone(196,t,.3,'sawtooth',.17,65);tone(98,t,.36,'square',.13,49);noise(t,.26,.13);}
function sfxBlackDown(){if(muted)return;const t=audio().currentTime;
  noise(t,.16,.1,1000);tone(330,t,.18,'square',.13,1320,1);tone(165,t,.22,'sawtooth',.1,660);}
function sfxFever(){if(muted)return;const t=audio().currentTime;
  [523,659,784,1047,1319,1568,2093].forEach((f,i)=>tone(f,t+i*.05,.2,'square',.12,0,1));}
function sfxTick(){if(muted)return;const t=audio().currentTime;tone(880,t,.07,'square',.13);}
function sfxOver(){if(muted)return;const t=audio().currentTime;
  [392,330,262,196].forEach((f,i)=>tone(f,t+i*.16,.3,'triangle',.14));noise(t+.6,.4,.08);}
function sfxStart(){if(muted)return;const t=audio().currentTime;
  [262,330,392,523].forEach((f,i)=>tone(f,t+i*.07,.18,'square',.12,0,1));}

/* ─ ジェネレーティブ・ミュージック (132BPM 脳内ループ系) ─ */
const BPM=132,STEP16=60/BPM/4;
const CHORDS=[[57,60,64],[53,57,60],[48,52,55],[55,59,62]]; /* Am F C G */
const PENTA=[0,3,5,7,10,12,15,17];
let bgmStep=0,bgmNext=0,leadDeg=3;
const mf=m=>440*Math.pow(2,(m-69)/12);
function kick(t){tone(150,t,.12,'sine',.3,40);}
function snare(t){noise(t,.11,.12,1500);tone(196,t,.06,'triangle',.06);}
function hat(t,v){noise(t,.03,v,6000);}
function bass(f,t){tone(f,t,STEP16*1.7,'sawtooth',.12);tone(f,t,STEP16*1.7,'square',.05);}
function lead(f,t,d){tone(f,t,d,'square',.085,0,1);}
function pad(ch,t){ch.forEach(m=>tone(mf(m),t,STEP16*14,'sine',.028));}
function schedBGM(){
  if(muted||!AC||state!=='play')return;
  const now=AC.currentTime;
  if(bgmNext<now-0.3)bgmNext=now;       /* タブ復帰時の追いつき防止 */
  while(bgmNext<now+0.15){
    const s=bgmStep,t=Math.max(bgmNext,now),
      bar=(s>>4)%4,st=s&15,ch=CHORDS[bar];
    if(st%4===0)kick(t);
    if(st===4||st===12)snare(t);
    if(st%2===0)hat(t,st%4===2?.05:.026);
    if(st===0||st===3||st===6||st===8||st===11||st===14)
      bass(mf(ch[0]-24+(st===14?2:0)),t);
    if(st%2===0&&Math.random()<(fever>0?.88:.6)){
      leadDeg+=[-2,-1,-1,0,0,1,1,2][(Math.random()*8)|0];
      leadDeg=Math.max(0,Math.min(PENTA.length-1,leadDeg));
      lead(mf(57+PENTA[leadDeg]+(fever>0?12:0)),t,STEP16*1.9);
    }
    if(st===0)pad(ch,t);
    bgmStep++;bgmNext+=STEP16;
  }
}

/* ───────── 入力: ジャイロ + タッチフォールバック ───────── */
let gyroOn=false,gyroSeen=false,needCal=true,g0=0,b0=0,tpx=0,tpy=0;
function onOri(e){
  if(e.gamma==null||e.beta==null)return;
  gyroSeen=true;
  if(needCal){g0=e.gamma;b0=e.beta;needCal=false;}
  tpx=Math.max(-1,Math.min(1,(e.gamma-g0)/22));
  tpy=Math.max(-1,Math.min(1,(e.beta-b0)/22));
}
async function enableGyro(){
  try{
    if(!window.DeviceOrientationEvent)return false;
    if(typeof DeviceOrientationEvent.requestPermission==='function'){
      const r=await DeviceOrientationEvent.requestPermission();
      if(r!=='granted')return false;
    }
    addEventListener('deviceorientation',onOri);
    return true;
  }catch(e){return false;}
}
/* タッチ/マウス: なぞって操縦 */
let dragId=null,dragX=0,dragY=0;
cv.addEventListener('pointerdown',e=>{dragId=e.pointerId;dragX=e.clientX;dragY=e.clientY;});
cv.addEventListener('pointermove',e=>{
  if(e.pointerId!==dragId)return;
  const R=Math.min(W,H)*.4;
  tpx=Math.max(-1,Math.min(1,tpx+(e.clientX-dragX)/(R*.9)));
  tpy=Math.max(-1,Math.min(1,tpy+(e.clientY-dragY)/(R*.9)));
  dragX=e.clientX;dragY=e.clientY;
});
addEventListener('pointerup',()=>{dragId=null;});
addEventListener('pointercancel',()=>{dragId=null;});

/* ───────── ゲーム状態 ───────── */
let state='menu';
let score=0,best=+(localStorage.getItem('gyroBest')||0),
  combo=0,maxCombo=0,hp=3,timeLeft=60,elapsed=0,
  fever=0,shield=0,invuln=0,distKm=0,
  puzzleCount=0,puzzleStreak=0,scoreMult=1,
  px=0,py=0,shake=0,flash=0,flashCol='255,60,60',hue=210,lastTick=99;
const FRUITS=['🍓','🍋','🍇'];
let target=FRUITS[0];

/* ───────── オブジェクト・プーリング ───────── */
const ZSPAWN=2300,FOCAL=460,PLAYER_R=0.10;
const ents=[];        /* {alive,type,z,...} */
function ent(){for(const e of ents)if(!e.alive)return e;const e={alive:false};ents.push(e);return e;}
const parts=[];       /* パーティクル {alive,x,y,vx,vy,t,dur,size,kind,col,emoji} */
function part(){for(const p of parts)if(!p.alive)return p;if(parts.length>320)return null;const p={alive:false};parts.push(p);return p;}
const pops=[];        /* テキストポップ */
function pop(){for(const p of pops)if(!p.alive)return p;const p={alive:false};pops.push(p);return p;}
const stars=[];       /* ワープ星 */
for(let i=0;i<130;i++)stars.push({a:Math.random()*TAU,r:.15+Math.random()*1,z:Math.random()*ZSPAWN});

function burst(x,y,n,cols,emoji){
  for(let i=0;i<n;i++){
    const p=part();if(!p)break;
    const a=Math.random()*TAU,v=60+Math.random()*340;
    p.alive=true;p.x=x;p.y=y;p.vx=Math.cos(a)*v;p.vy=Math.sin(a)*v-60;
    p.t=0;p.dur=.5+Math.random()*.8;p.size=3+Math.random()*7;
    p.emoji=(emoji&&Math.random()<.4)?emoji[(Math.random()*emoji.length)|0]:null;
    p.col=cols[(Math.random()*cols.length)|0];
  }
}
function popup(x,y,text,col,size){
  const p=pop();p.alive=true;p.x=x;p.y=y;p.t=0;p.dur=.9;
  p.text=text;p.col=col||'#fff';p.size=size||22;
}

/* ───────── スポーン (76.6% / 23.4%) ───────── */
let ringT=0,gateT=3.5,itemT=1.5,blackT=8,wallT=12;
function rnd(a,b){return a+Math.random()*(b-a);}
function spawnRing(){
  const e=ent();e.alive=true;e.type='ring';e.z=ZSPAWN;e.done=false;
  if(fair()){e.nx=rnd(-.45,.45);e.ny=rnd(-.45,.45);e.r=.34;e.drift=0;}
  else{e.nx=rnd(-.6,.6);e.ny=rnd(-.6,.6);e.r=.26;e.drift=rnd(.25,.5)*(Math.random()<.5?-1:1);}
  e.ph=Math.random()*TAU;
}
function spawnGate(){
  const e=ent();e.alive=true;e.type='gate';e.z=ZSPAWN;e.done=false;
  const f=fair();
  e.holeR=f?.32:.25;
  e.rot=Math.random()*TAU;
  e.rotSpd=f?0:rnd(.5,.9)*(Math.random()<.5?-1:1);
  const fr=FRUITS.slice();
  for(let i=fr.length-1;i>0;i--){const j=(Math.random()*(i+1))|0;[fr[i],fr[j]]=[fr[j],fr[i]];}
  e.holes=fr.map((em,i)=>({ang:e.rot+i*TAU/3,emoji:em}));
}
function spawnItems(){
  const pick=Math.random();
  if(pick<.5){ /* ⭐の列 */
    const a=Math.random()*TAU,r=rnd(.1,.55);
    for(let i=0;i<3;i++){
      const e=ent();e.alive=true;e.type='item';e.kind='star';e.emoji='⭐';
      e.z=ZSPAWN+i*260;e.nx=Math.cos(a)*r;e.ny=Math.sin(a)*r;e.done=false;
    }
  }else{
    const e=ent();e.alive=true;e.type='item';e.done=false;
    e.z=ZSPAWN;e.nx=rnd(-.55,.55);e.ny=rnd(-.55,.55);
    if(pick<.66){e.kind='gem';e.emoji='💎';}
    else if(pick<.78){e.kind='clock';e.emoji='⏰';}
    else if(pick<.88){e.kind='heart';e.emoji='❤️';}
    else if(pick<.96){e.kind='shield';e.emoji='🛡️';}
    else{e.kind='rainbow';e.emoji='🌈';}
  }
}
function spawnBlack(){
  const f=fair(),n=f?1:2;
  for(let i=0;i<n;i++){
    const e=ent();e.alive=true;e.type='black';e.done=false;
    e.z=ZSPAWN+i*420;
    const a=Math.random()*TAU;
    e.nx=Math.cos(a)*.6;e.ny=Math.sin(a)*.6;
    e.home=f?.16:.34;            /* ホーミング強度 */
    e.flap=Math.random()*TAU;
  }
}
function spawnWall(){
  const f=fair(),
    gapA=Math.random()*TAU,
    gapW=f?1.7:1.0,              /* すきまの広さ */
    n=9;
  for(let i=0;i<n;i++){
    const a=i/n*TAU;
    let d=Math.abs(((a-gapA)%TAU+TAU+Math.PI)%TAU-Math.PI);
    if(d<gapW/2)continue;
    const e=ent();e.alive=true;e.type='rock';e.done=false;
    e.z=ZSPAWN;e.nx=Math.cos(a)*.6;e.ny=Math.sin(a)*.6;
    e.r=f?.17:.21;e.spin=rnd(-2,2);e.ph=Math.random()*TAU;
  }
}

/* ───────── 判定・ダメージ ───────── */
function damage(){
  if(invuln>0||fever>0)return;
  if(shield>0){shield=0;flash=.5;flashCol='120,220,255';sfxShield();popup(W/2,H*.4,'🛡️シールド！','#7ad7ff',26);return;}
  hp--;combo=0;puzzleStreak=0;invuln=1.3;shake=22;flash=.7;flashCol='255,60,60';
  sfxHit();vib([60,40,80]);
  burst(W/2,H*.62,26,['#ff5a5a','#ffb05a','#fff'],['💥','😵']);
  if(hp<=0)gameOver('hp');
}
function addScore(n){score+=Math.round(n*scoreMult);}
function startFever(){
  if(fever>0){fever=8;return;}
  fever=8;scoreMult=2;flash=.5;flashCol='255,210,120';
  sfxFever();vib([30,30,30,30,60]);
  popup(W/2,H*.35,'🌈 FEVER!! 🌈','#ffd76e',34);
  burst(W/2,H/2,60,['#ff8ac2','#ffd76e','#7ad7ff','#b08bff'],['🌈','✨','🎉','💖']);
}
function newTarget(){target=FRUITS[(Math.random()*FRUITS.length)|0];}

function judge(e){
  const R=1,dx=e.nx-px,dy=e.ny-py;
  if(e.type==='ring'){
    const d=Math.hypot(dx,dy);
    if(d<.15){combo++;addScore(300+combo*20);sfxPerfect(combo);vib(18);
      popup(W/2,H*.42,'PERFECT! +'+Math.round((300+combo*20)*scoreMult),'#7ad7ff',26);
      burst(W/2,H*.55,18,['#7ad7ff','#fff','#b08bff'],['⭐','✨']);}
    else if(d<e.r){combo++;addScore(100);sfxGood();vib(10);
      popup(W/2,H*.42,'GOOD +'+Math.round(100*scoreMult),'#9fb',20);}
    else combo=0;
  }
  else if(e.type==='gate'){
    let inHole=null;
    for(const h of e.holes){
      const hx=Math.cos(h.ang)*.5,hy=Math.sin(h.ang)*.5;
      if(Math.hypot(px-hx,py-hy)<e.holeR)inHole=h;
    }
    if(inHole&&inHole.emoji===target){
      puzzleCount++;puzzleStreak++;combo+=2;
      const pts=600+puzzleStreak*150;addScore(pts);
      sfxPuzzle();vib([20,20,40]);
      popup(W/2,H*.38,inHole.emoji+' せいかい！ +'+Math.round(pts*scoreMult),'#ffd76e',28);
      burst(W/2,H*.5,30,['#ffd76e','#ff8ac2','#7ad7ff'],[inHole.emoji,'🎉','✨']);
      newTarget();
    }else if(inHole){
      combo=0;puzzleStreak=0;timeLeft=Math.max(0,timeLeft-2);
      sfxWrong();vib(50);shake=10;flash=.3;flashCol='255,160,60';
      popup(W/2,H*.38,inHole.emoji+' ちがう！ ⏰-2s','#ff9a5a',24);
    }else damage();
  }
  else if(e.type==='item'){
    if(Math.hypot(dx,dy)<PLAYER_R+.16){
      const sx=W/2,sy=H*.55;
      if(e.kind==='star'){addScore(150);combo++;sfxItem();popup(sx,sy,'⭐+'+Math.round(150*scoreMult),'#ffe28a',20);}
      else if(e.kind==='gem'){addScore(500);combo++;sfxItem();popup(sx,sy,'💎+'+Math.round(500*scoreMult),'#8ad7ff',24);burst(sx,sy,14,['#8ad7ff','#fff'],['💎','✨']);}
      else if(e.kind==='heart'){if(hp<3){hp++;popup(sx,sy,'❤️かいふく！','#ff8ac2',24);}else{addScore(300);popup(sx,sy,'❤️+'+Math.round(300*scoreMult),'#ff8ac2',20);}sfxHeart();burst(sx,sy,14,['#ff8ac2','#fff'],['❤️','💖']);}
      else if(e.kind==='clock'){timeLeft=Math.min(99,timeLeft+4);sfxClock();popup(sx,sy,'⏰+4秒！','#9fe8a0',24);burst(sx,sy,12,['#9fe8a0','#fff'],['⏰','✨']);}
      else if(e.kind==='shield'){shield=8;sfxShield();popup(sx,sy,'🛡️シールド 8秒','#7ad7ff',24);}
      else if(e.kind==='rainbow'){startFever();}
      vib(12);e.alive=false;
    }
  }
  else if(e.type==='black'){
    if(Math.hypot(dx,dy)<PLAYER_R+.15){
      if(fever>0||shield>0){
        addScore(400);combo++;sfxBlackDown();vib(25);
        popup(W/2,H*.5,'ブラックこっこ撃破！+'+Math.round(400*scoreMult),'#b08bff',24);
        burst(W/2,H*.55,22,['#b08bff','#444','#fff'],['💫','⚡']);
        if(shield>0&&fever<=0)shield=Math.max(0,shield-2);
      }else{damage();}
      e.alive=false;
    }
  }
  else if(e.type==='rock'){
    if(Math.hypot(dx,dy)<PLAYER_R+e.r*.8){damage();e.alive=false;
      burst(W/2,H*.6,14,['#caa','#876','#fff'],['☄️','💥']);}
  }
}

/* ───────── メインループ ───────── */
let last=0,spd=900;
function gameOver(reason){
  state='over';sfxOver();vib([80,60,120]);
  if(score>best){best=score;localStorage.setItem('gyroBest',best);}
  document.getElementById('endReason').textContent=
    reason==='time'?'⏰ タイムアップ！':'💔 HPがなくなった…';
  document.getElementById('endScore').textContent=score.toLocaleString();
  document.getElementById('endBest').textContent='ベスト '+best.toLocaleString();
  document.getElementById('endCombo').textContent='最大コンボ '+maxCombo+' ／ 飛行 '+distKm.toFixed(1)+'km';
  document.getElementById('endPuzzle').textContent='パズル正解 '+puzzleCount+'回';
  document.getElementById('endOv').classList.remove('hidden');
  document.getElementById('recalBtn').classList.add('hidden');
  burst(W/2,H/2,50,['#7ad7ff','#ff8ac2','#ffd76e','#b08bff'],['🎉','✨','⭐']);
}
function reset(){
  score=0;combo=0;maxCombo=0;hp=3;timeLeft=60;elapsed=0;fever=0;shield=0;invuln=0;
  distKm=0;puzzleCount=0;puzzleStreak=0;scoreMult=1;px=0;py=0;tpx=0;tpy=0;
  shake=0;flash=0;lastTick=99;spd=900;
  ringT=.8;gateT=3.5;itemT=1.8;blackT=8;wallT=12;
  for(const e of ents)e.alive=false;
  for(const p of parts)p.alive=false;
  for(const p of pops)p.alive=false;
  newTarget();needCal=true;
  bgmStep=0;bgmNext=AC?AC.currentTime+.1:0;leadDeg=3;
}

function update(dt){
  elapsed+=dt;
  const fevMul=fever>0?1.45:1;
  spd=Math.min(1900,900+elapsed*16)*fevMul;
  distKm+=spd*dt/3600;
  /* プレイヤー追従 */
  px+=(tpx-px)*Math.min(1,dt*9);
  py+=(tpy-py)*Math.min(1,dt*9);
  const pl=Math.hypot(px,py);
  if(pl>.95){px*=.95/pl;py*=.95/pl;}
  /* タイマー類 */
  timeLeft-=dt;
  if(timeLeft<=0){timeLeft=0;gameOver('time');return;}
  if(timeLeft<5.5&&Math.ceil(timeLeft)!==lastTick){lastTick=Math.ceil(timeLeft);sfxTick();}
  if(fever>0){fever-=dt;if(fever<=0){fever=0;scoreMult=1;}}
  if(shield>0)shield-=dt;
  if(invuln>0)invuln-=dt;
  if(shake>0)shake=Math.max(0,shake-dt*60);
  if(flash>0)flash=Math.max(0,flash-dt*2.2);
  hue=(hue+dt*(fever>0?160:18))%360;
  if(combo>maxCombo)maxCombo=combo;
  if(combo>=10&&fever<=0)startFever();
  /* スポーン */
  const sf=Math.min(1.6,1+elapsed/70);
  ringT-=dt*sf;itemT-=dt*sf;gateT-=dt;blackT-=dt*sf;wallT-=dt*sf;
  if(ringT<=0){spawnRing();ringT=rnd(.9,1.4);}
  if(itemT<=0){spawnItems();itemT=rnd(1.8,2.8);}
  if(gateT<=0){spawnGate();gateT=rnd(5,6.5);}
  if(blackT<=0){spawnBlack();blackT=rnd(5.5,8);}
  if(wallT<=0){spawnWall();wallT=rnd(5,7.5);}
  /* エンティティ */
  for(const e of ents){
    if(!e.alive)continue;
    const pz=e.z;e.z-=spd*dt;
    if(e.type==='gate'&&e.rotSpd)for(const h of e.holes)h.ang+=e.rotSpd*dt;
    if(e.type==='ring'&&e.drift){e.nx+=Math.cos(e.ph)*e.drift*dt;e.ny+=Math.sin(e.ph)*e.drift*dt;}
    if(e.type==='black'){
      e.flap+=dt*7;
      const d=Math.max(.001,Math.hypot(px-e.nx,py-e.ny));
      e.nx+=(px-e.nx)/d*e.home*dt;e.ny+=(py-e.ny)/d*e.home*dt;
    }
    if((e.type==='item'||e.type==='black')&&e.z<130&&e.z>-90)judge(e); /* 接触型は手前のみ */
    if(pz>0&&e.z<=0&&!e.done){e.done=true;
      if(e.type==='ring'||e.type==='gate'||e.type==='rock')judge(e);}
    if(e.z<-260)e.alive=false;
  }
  /* 星 */
  for(const s of stars){s.z-=spd*dt*1.15;if(s.z<10){s.z=ZSPAWN;s.a=Math.random()*TAU;s.r=.15+Math.random()*1;}}
  /* パーティクル */
  for(const p of parts){if(!p.alive)continue;p.t+=dt;
    if(p.t>=p.dur){p.alive=false;continue;}
    p.x+=p.vx*dt;p.y+=p.vy*dt;p.vy+=340*dt;}
  for(const p of pops){if(!p.alive)continue;p.t+=dt;if(p.t>=p.dur)p.alive=false;}
}

/* ───────── 描画 ───────── */
function proj(nx,ny,z){
  const sc=FOCAL/(FOCAL+Math.max(0,z)),R=Math.min(W,H)*.4;
  return [W/2+(nx-px*.55)*R*sc, H/2+(ny-py*.55)*R*sc, sc, R];
}
function draw(){
  const R=Math.min(W,H)*.4,cxp=W/2,cyp=H/2;
  /* 背景 */
  const bg=cx.createRadialGradient(cxp,cyp,0,cxp,cyp,Math.max(W,H)*.75);
  if(fever>0){
    bg.addColorStop(0,`hsl(${hue},65%,16%)`);bg.addColorStop(.55,`hsl(${(hue+70)%360},55%,8%)`);bg.addColorStop(1,'#020208');
  }else{
    bg.addColorStop(0,'#0c0c2e');bg.addColorStop(.55,'#060616');bg.addColorStop(1,'#020208');
  }
  cx.fillStyle=bg;cx.fillRect(0,0,W,H);
  cx.save();
  if(shake>0)cx.translate((Math.random()-.5)*shake,(Math.random()-.5)*shake);
  /* トンネルリング(奥行きガイド) */
  cx.lineWidth=1.5;
  for(let i=0;i<9;i++){
    const z=((ZSPAWN-((elapsed*spd)%260))-i*260+260)%(ZSPAWN+260),
      sc=FOCAL/(FOCAL+z);
    cx.strokeStyle=`hsla(${(hue+i*14)%360},80%,65%,${.05+sc*.13})`;
    cx.beginPath();cx.arc(cxp-px*.55*R*sc,cyp-py*.55*R*sc,R*1.18*sc,0,TAU);cx.stroke();
  }
  /* ワープ星 */
  for(const s of stars){
    const sc=FOCAL/(FOCAL+s.z),sc2=FOCAL/(FOCAL+s.z+spd*.035*1000*.06),
      x1=cxp+Math.cos(s.a)*s.r*R*1.7*sc,y1=cyp+Math.sin(s.a)*s.r*R*1.7*sc,
      x2=cxp+Math.cos(s.a)*s.r*R*1.7*sc2,y2=cyp+Math.sin(s.a)*s.r*R*1.7*sc2;
    cx.strokeStyle=fever>0?`hsla(${(hue+s.a*57)%360},90%,75%,${sc*.8})`:`rgba(190,210,255,${sc*.6})`;
    cx.lineWidth=sc*2;
    cx.beginPath();cx.moveTo(x1,y1);cx.lineTo(x2,y2);cx.stroke();
  }
  /* エンティティ(奥から) */
  const sorted=ents.filter(e=>e.alive&&e.z>-200).sort((a,b)=>b.z-a.z);
  for(const e of sorted){
    const [sx,sy,sc]=proj(e.nx||0,e.ny||0,e.z);
    if(e.type==='ring'){
      const r=e.r*R*sc;
      cx.save();cx.globalAlpha=Math.min(1,sc*1.6);
      cx.shadowColor=`hsl(${(hue+40)%360},90%,70%)`;cx.shadowBlur=18*sc;
      cx.strokeStyle=`hsla(${(hue+40)%360},90%,72%,.95)`;cx.lineWidth=5*sc;
      cx.beginPath();cx.arc(sx,sy,r,0,TAU);cx.stroke();
      cx.strokeStyle='rgba(255,255,255,.8)';cx.lineWidth=1.6*sc;
      cx.beginPath();cx.arc(sx,sy,r*.45,0,TAU);cx.stroke();
      cx.restore();
    }
    else if(e.type==='gate'){
      cx.save();cx.globalAlpha=Math.min(1,sc*1.8);
      cx.fillStyle=`hsla(${(hue+200)%360},60%,30%,.82)`;
      cx.beginPath();cx.arc(sx,sy,R*1.25*sc,0,TAU);
      for(const h of e.holes){
        const hx=sx+Math.cos(h.ang)*.5*R*sc,hy=sy+Math.sin(h.ang)*.5*R*sc;
        cx.moveTo(hx+e.holeR*R*sc,hy);cx.arc(hx,hy,e.holeR*R*sc,0,TAU);
      }
      cx.fill('evenodd');
      cx.shadowColor='#9ad7ff';cx.shadowBlur=14*sc;
      for(const h of e.holes){
        const hx=sx+Math.cos(h.ang)*.5*R*sc,hy=sy+Math.sin(h.ang)*.5*R*sc;
        cx.strokeStyle=h.emoji===target?'#ffd76e':'rgba(160,210,255,.85)';
        cx.lineWidth=(h.emoji===target?4.5:2.5)*sc;
        cx.beginPath();cx.arc(hx,hy,e.holeR*R*sc,0,TAU);cx.stroke();
        cx.font=`${Math.max(8,e.holeR*R*sc*.85)}px sans-serif`;
        cx.textAlign='center';cx.textBaseline='middle';
        cx.fillText(h.emoji,hx,hy);
      }
      cx.restore();
    }
    else if(e.type==='item'){
      cx.save();cx.globalAlpha=Math.min(1,sc*1.9);
      const r=.13*R*sc,bob=Math.sin(elapsed*5+e.z*.01)*r*.25;
      cx.shadowColor='#fff';cx.shadowBlur=16*sc;
      cx.font=`${Math.max(8,r*2.1)}px sans-serif`;
      cx.textAlign='center';cx.textBaseline='middle';
      cx.fillText(e.emoji,sx,sy+bob);
      cx.restore();
    }
    else if(e.type==='black'){
      const w=R*.42*sc,h2=w*1.31;
      cx.save();cx.globalAlpha=Math.min(1,sc*1.8);
      cx.translate(sx,sy);cx.rotate(Math.sin(e.flap)*.15);
      cx.shadowColor='#a040ff';cx.shadowBlur=24*sc;
      if(blackCv)cx.drawImage(blackCv,-w/2,-h2/2,w,h2);
      else{cx.fillStyle='#0a0a14';cx.beginPath();cx.arc(0,0,w*.5,0,TAU);cx.fill();}
      /* 赤く光る目 */
      const ey=-h2*.06,pulse=.6+.4*Math.sin(elapsed*9);
      cx.shadowColor='#f33';cx.shadowBlur=10*sc*pulse;
      cx.fillStyle=`rgba(255,40,60,${.7+.3*pulse})`;
      cx.beginPath();cx.arc(-w*.155,ey,w*.05,0,TAU);cx.arc(w*.17,ey,w*.05,0,TAU);cx.fill();
      cx.restore();
    }
    else if(e.type==='rock'){
      const r=e.r*R*sc;
      cx.save();cx.globalAlpha=Math.min(1,sc*1.8);
      cx.translate(sx,sy);cx.rotate(e.ph+elapsed*e.spin);
      const g=cx.createRadialGradient(-r*.3,-r*.3,r*.1,0,0,r);
      g.addColorStop(0,'#9a8878');g.addColorStop(1,'#3a3030');
      cx.shadowColor='rgba(255,140,80,.5)';cx.shadowBlur=10*sc;
      cx.fillStyle=g;cx.beginPath();
      for(let i=0;i<8;i++){const a=i/8*TAU,rr=r*(0.82+0.18*Math.sin(i*2.7+e.ph));
        i?cx.lineTo(Math.cos(a)*rr,Math.sin(a)*rr):cx.moveTo(Math.cos(a)*rr,Math.sin(a)*rr);}
      cx.closePath();cx.fill();
      cx.font=`${Math.max(8,r*.9)}px sans-serif`;cx.textAlign='center';cx.textBaseline='middle';
      cx.fillText('☄️',0,0);
      cx.restore();
    }
  }
  /* プレイヤー(公式こっこちゃん) */
  if(state==='play'||state==='over'){
    const pxs=cxp+px*.45*R,pys=cyp+py*.45*R,
      pw=Math.min(W,H)*.17,ph2=pw*1.31,
      lean=(tpx-px)*2.2+px*.4;
    cx.save();cx.translate(pxs,pys);cx.rotate(lean*.45);
    if(invuln>0&&(elapsed*14|0)%2)cx.globalAlpha=.35;
    if(fever>0){cx.shadowColor=`hsl(${hue},95%,70%)`;cx.shadowBlur=34;}
    else{cx.shadowColor='rgba(140,190,255,.9)';cx.shadowBlur=20;}
    if(shield>0){
      cx.strokeStyle=`rgba(120,215,255,${.5+.3*Math.sin(elapsed*8)})`;cx.lineWidth=3;
      cx.beginPath();cx.arc(0,0,pw*.72,0,TAU);cx.stroke();
    }
    if(coccoReady)cx.drawImage(cocco,-pw/2,-ph2/2,pw,ph2);
    cx.restore();
    /* 噴射トレイル */
    if(state==='play'&&Math.random()<.6){
      const p=part();
      if(p){p.alive=true;p.x=pxs+rnd(-6,6);p.y=pys+ph2*.42;
        p.vx=rnd(-26,26)-px*40;p.vy=rnd(90,190);p.t=0;p.dur=.4;
        p.size=rnd(2,5);p.emoji=null;
        p.col=fever>0?`hsl(${hue},95%,70%)`:'#7ad7ff';}
    }
  }
  /* パーティクル */
  for(const p of parts){
    if(!p.alive)continue;
    const k=1-p.t/p.dur;
    cx.globalAlpha=k;
    if(p.emoji){cx.font=`${p.size*3.2}px sans-serif`;cx.textAlign='center';cx.textBaseline='middle';
      cx.fillText(p.emoji,p.x,p.y);}
    else{cx.fillStyle=p.col;cx.beginPath();cx.arc(p.x,p.y,p.size*k,0,TAU);cx.fill();}
  }
  cx.globalAlpha=1;
  /* テキストポップ */
  for(const p of pops){
    if(!p.alive)continue;
    const k=p.t/p.dur;
    cx.globalAlpha=k<.15?k/.15:1-Math.max(0,(k-.6)/.4);
    cx.font=`bold ${p.size}px sans-serif`;cx.textAlign='center';cx.textBaseline='middle';
    cx.shadowColor=p.col;cx.shadowBlur=12;
    cx.fillStyle=p.col;cx.fillText(p.text,p.x,p.y-k*46);
    cx.shadowBlur=0;
  }
  cx.globalAlpha=1;
  cx.restore();
  /* フラッシュ */
  if(flash>0){cx.fillStyle=`rgba(${flashCol},${flash*.4})`;cx.fillRect(0,0,W,H);}
  /* ───── HUD ───── */
  if(state==='play'){
    const top=48;
    cx.textBaseline='middle';
    /* ❤️HP */
    cx.font='20px sans-serif';cx.textAlign='left';
    cx.fillText('❤️'.repeat(hp)+'🖤'.repeat(Math.max(0,3-hp)),12,top+18);
    /* スコア */
    cx.textAlign='right';cx.font='bold 22px sans-serif';
    cx.fillStyle='#fff';cx.shadowColor='#7ad7ff';cx.shadowBlur=10;
    cx.fillText(score.toLocaleString(),W-12,top+16);
    cx.shadowBlur=0;
    if(combo>1){cx.font='bold 14px sans-serif';cx.fillStyle='#ffd76e';
      cx.fillText(combo+' COMBO',W-12,top+38);}
    /* ⏰タイムバー */
    const bw=Math.min(W*.46,250),bx=W/2-bw/2,by=top+4;
    cx.fillStyle='rgba(255,255,255,.14)';
    cx.beginPath();cx.roundRect(bx,by,bw,10,5);cx.fill();
    const tk=timeLeft/60,
      tg=cx.createLinearGradient(bx,0,bx+bw,0);
    tg.addColorStop(0,timeLeft<10?'#ff5a5a':'#7ad7ff');tg.addColorStop(1,timeLeft<10?'#ffb05a':'#b08bff');
    cx.fillStyle=tg;
    cx.beginPath();cx.roundRect(bx,by,Math.max(2,bw*Math.min(1,tk)),10,5);cx.fill();
    cx.font='bold 15px sans-serif';cx.textAlign='center';
    cx.fillStyle=timeLeft<10?'#ff7a6a':'#cde';
    cx.fillText('⏰'+Math.ceil(timeLeft)+'s',W/2,by+26);
    /* おだい */
    cx.font='bold 16px sans-serif';
    cx.fillStyle='#ffd76e';cx.shadowColor='#ffd76e';cx.shadowBlur=8;
    cx.fillText('おだい '+target+' のあなをくぐれ！',W/2,by+50);
    cx.shadowBlur=0;
    /* フィーバー/シールド表示 */
    if(fever>0){cx.font='bold 18px sans-serif';
      cx.fillStyle=`hsl(${hue},95%,75%)`;cx.shadowColor=`hsl(${hue},95%,70%)`;cx.shadowBlur=12;
      cx.fillText('🌈 FEVER ×2  '+fever.toFixed(0)+'s 🌈',W/2,H-(H*.1));cx.shadowBlur=0;}
    else if(shield>0){cx.font='bold 15px sans-serif';cx.fillStyle='#7ad7ff';
      cx.fillText('🛡️ '+shield.toFixed(0)+'s',W/2,H-(H*.1));}
    /* 操作モード */
    cx.font='12px sans-serif';cx.fillStyle='rgba(200,215,255,.55)';cx.textAlign='left';
    cx.fillText(gyroSeen?'🎮 ジャイロ操作中':'👆 タッチ操作中',12,H-14);
  }
}

function tick(t){
  const dtMs=last?t-last:16;last=t;
  perfSample(dtMs);
  const dt=Math.min(.05,dtMs/1000);
  if(state==='play'){update(dt);schedBGM();}
  else{
    /* メニュー/リザルト中もパーティクルだけ進める */
    for(const p of parts){if(!p.alive)continue;p.t+=dt;
      if(p.t>=p.dur){p.alive=false;continue;}
      p.x+=p.vx*dt;p.y+=p.vy*dt;p.vy+=340*dt;}
    for(const p of pops){if(!p.alive)continue;p.t+=dt;if(p.t>=p.dur)p.alive=false;}
    for(const s of stars){s.z-=300*dt;if(s.z<10){s.z=ZSPAWN;s.a=Math.random()*TAU;}}
    hue=(hue+dt*18)%360;
  }
  draw();
  requestAnimationFrame(tick);
}
requestAnimationFrame(tick);

/* ───────── UI 配線 ───────── */
const startOv=document.getElementById('startOv'),endOv=document.getElementById('endOv'),
  bestRow=document.getElementById('bestRow'),recalBtn=document.getElementById('recalBtn');
if(best>0)bestRow.textContent='ベスト '+best.toLocaleString();

async function startGame(){
  audio();sfxStart();
  if(!gyroOn)gyroOn=await enableGyro();
  reset();
  startOv.classList.add('hidden');endOv.classList.add('hidden');
  recalBtn.classList.remove('hidden');
  state='play';
}
document.getElementById('startBtn').addEventListener('click',startGame);
document.getElementById('retryBtn').addEventListener('click',startGame);
recalBtn.addEventListener('click',()=>{needCal=true;tpx=0;tpy=0;vib(15);});

document.getElementById('muteBtn').addEventListener('click',function(){
  muted=!muted;this.textContent=muted?'🔇':'🔊';
  if(!muted){audio();bgmNext=AC.currentTime+.1;}
});
document.getElementById('shareBtn').addEventListener('click',()=>{
  const text=`こっこジャイロで ${score.toLocaleString()} 点！パズル正解${puzzleCount}回🐣🌀 #畜物語 #こっこジャイロ`;
  const url='https://chikumo.jp/gyro/';
  if(navigator.share){navigator.share({text,url}).catch(()=>{});}
  else open('https://twitter.com/intent/tweet?text='+encodeURIComponent(text)+'&url='+encodeURIComponent(url),'_blank');
});
document.addEventListener('visibilitychange',()=>{
  if(document.hidden&&AC)AC.suspend();
  else if(AC&&!muted)AC.resume();
});

/* ─ ヘッドレステスト用フック ─ */
window.__gyro={
  ents,parts,pops,CLEAR_RATE,
  spawnRing,spawnGate,spawnItems,spawnBlack,spawnWall,
  update,damage,startFever,reset,startGame,
  get:()=>({state,score,best,combo,maxCombo,hp,timeLeft,fever,shield,invuln,
    target,puzzleCount,puzzleStreak,scoreMult,px,py,elapsed}),
  set:o=>{for(const k of Object.keys(o)){const v=o[k];
    if(k==='state')state=v;else if(k==='score')score=v;else if(k==='combo')combo=v;
    else if(k==='hp')hp=v;else if(k==='timeLeft')timeLeft=v;else if(k==='fever')fever=v;
    else if(k==='shield')shield=v;else if(k==='invuln')invuln=v;else if(k==='px')px=v;
    else if(k==='py')py=v;else if(k==='tpx')tpx=v;else if(k==='tpy')tpy=v;
    else if(k==='target')target=v;else if(k==='elapsed')elapsed=v;else if(k==='scoreMult')scoreMult=v;}},
  noSpawn:()=>{ringT=itemT=gateT=blackT=wallT=1e9;}
};
</script>
