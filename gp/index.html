<canvas id="game"></canvas>

<script>
"use strict";
/* ════════════════════════════════════════════════════════════
   こっこGP大救出 — COCCO GP RESCUE
   ジャイロ(傾け)ステアリング × 加速度センサー(シェイク)修理 × Z軸(奥行き)
   CPUトラックと競うレーシング / CPU難易度20段階
   クリアできる要素 76.6% / クリアできない要素 23.4%
   ════════════════════════════════════════════════════════════ */
const TAU=Math.PI*2;
const CLEAR_RATE=0.766;            /* 76.6% フェア配置 / 23.4% 鬼配置 */
const fair=()=>Math.random()<CLEAR_RATE;

/* ───────── 公式こっこちゃんSVG ───────── */
let blackCv=null;
const cocco=new Image();let coccoReady=false;
cocco.onload=()=>{coccoReady=true;makeBlack();};
cocco.src='/chikumo.svg';
/* ブラックこっこちゃん(CPUドライバー): 公式SVGをシルエット化 */
function makeBlack(){
  const c=document.createElement('canvas');c.width=120;c.height=157;
  const g=c.getContext('2d');
  g.drawImage(cocco,0,0,120,157);
  g.globalCompositeOperation='source-in';
  g.fillStyle='#160a1c';g.fillRect(0,0,120,157);
  blackCv=c;
}

/* ───────── キャンバス / 動的解像度スロットリング ───────── */
if(!CanvasRenderingContext2D.prototype.roundRect)
  CanvasRenderingContext2D.prototype.roundRect=function(x,y,w,h){this.rect(x,y,w,h);return this;};
const cv=document.getElementById('game'),cx=cv.getContext('2d');
let W=0,H=0,DPR=1,renderScale=1;
function resize(){
  DPR=Math.min(devicePixelRatio||1,2)*renderScale;
  W=innerWidth;H=innerHeight;
  cv.width=Math.max(1,Math.round(W*DPR));cv.height=Math.max(1,Math.round(H*DPR));
  cv.style.width=W+'px';cv.style.height=H+'px';
  cx.setTransform(DPR,0,0,DPR,0,0);
}
addEventListener('resize',resize);resize();
/* コンテキストロス・フォールバック */
cv.addEventListener('contextlost',e=>e.preventDefault());
cv.addEventListener('contextrestored',()=>resize());
let perfAcc=0,perfN=0;
function perfSample(dtMs){
  perfAcc+=dtMs;perfN++;
  if(perfN>=70){
    const avg=perfAcc/perfN;perfAcc=0;perfN=0;
    if(avg>24&&renderScale>0.55){renderScale=Math.max(0.55,renderScale-0.15);resize();}
    else if(avg<14.5&&renderScale<1){renderScale=Math.min(1,renderScale+0.15);resize();}
  }
}

function vib(p){try{if(navigator.vibrate)navigator.vibrate(p);}catch(e){}}

/* ───────── プロシージャル・オーディオ ───────── */
let AC=null,muted=false,ECHO=null,echoWet=null,engOsc=null,engGain=null,engFlt=null;
const MASTER=0.5;
function audio(){
  if(!AC){
    AC=new (window.AudioContext||window.webkitAudioContext)();
    ECHO=AC.createDelay(1);ECHO.delayTime.value=60/152/2;
    const fb=AC.createGain();fb.gain.value=.3;
    echoWet=AC.createGain();echoWet.gain.value=.36;
    ECHO.connect(fb);fb.connect(ECHO);ECHO.connect(echoWet);echoWet.connect(AC.destination);
    /* エンジン音: 速度連動の持続音 */
    engOsc=AC.createOscillator();engOsc.type='sawtooth';engOsc.frequency.value=50;
    engFlt=AC.createBiquadFilter();engFlt.type='lowpass';engFlt.frequency.value=520;
    engGain=AC.createGain();engGain.gain.value=0;
    engOsc.connect(engFlt);engFlt.connect(engGain);engGain.connect(AC.destination);
    engOsc.start();
  }
  if(AC.state==='suspended')AC.resume();
  return AC;
}
function tone(f,t0,dur,type,vol,slide,echo){
  const a=audio(),o=a.createOscillator(),g=a.createGain();
  o.type=type;o.frequency.setValueAtTime(Math.max(20,f),t0);
  if(slide)o.frequency.exponentialRampToValueAtTime(Math.max(20,slide),t0+dur);
  g.gain.setValueAtTime(vol*MASTER,t0);g.gain.exponentialRampToValueAtTime(.0001,t0+dur);
  o.connect(g).connect(a.destination);if(echo&&ECHO)g.connect(ECHO);
  o.start(t0);o.stop(t0+dur+.03);
}
function noise(t0,dur,vol,hp){
  const a=audio(),n=a.createBufferSource(),
    buf=a.createBuffer(1,Math.max(1,(a.sampleRate*dur)|0),a.sampleRate),
    d=buf.getChannelData(0);
  for(let i=0;i<d.length;i++)d[i]=(Math.random()*2-1)*(1-i/d.length);
  n.buffer=buf;
  const g=a.createGain();g.gain.value=vol*MASTER;
  if(hp){const f=a.createBiquadFilter();f.type='highpass';f.frequency.value=hp;n.connect(f).connect(g);}
  else n.connect(g);
  g.connect(a.destination);n.start(t0);
}
/* ─ 効果音(操作リズムにキマるキメ) ─ */
function sfxCnt(){if(muted)return;const t=audio().currentTime;tone(440,t,.14,'square',.15);}
function sfxGo(){if(muted)return;const t=audio().currentTime;
  tone(880,t,.4,'square',.16,0,1);tone(1108,t,.4,'square',.12,0,1);tone(1318,t,.45,'square',.1,0,1);noise(t,.2,.08,2000);}
function sfxShift(g){if(muted)return;const t=audio().currentTime;
  tone(620+g*90,t,.07,'square',.1,0,1);noise(t,.04,.05,3000);}
function sfxCrash(){if(muted)return;const t=audio().currentTime;
  tone(180,t,.34,'sawtooth',.18,55);tone(90,t,.4,'square',.13,40);noise(t,.3,.16);noise(t+.05,.2,.1,500);}
function sfxBreak(){if(muted)return;const t=audio().currentTime;
  tone(220,t,.5,'sawtooth',.16,50);noise(t,.4,.14,300);tone(110,t+.15,.45,'square',.12,38);}
function sfxClank(n){if(muted)return;const t=audio().currentTime,f=520*Math.pow(1.1,Math.min(n,8));
  noise(t,.06,.13,2400);tone(f,t,.09,'square',.14,0,1);tone(f*1.6,t+.03,.1,'triangle',.1,0,1);}
function sfxRepaired(){if(muted)return;const t=audio().currentTime;
  [392,523,659,784,1047].forEach((f,i)=>tone(f,t+i*.06,.18,'square',.13,0,1));
  tone(80,t+.3,.5,'sawtooth',.14,300);noise(t+.3,.18,.08,800);}
function sfxCage(n){if(muted)return;const t=audio().currentTime,f=440*Math.pow(1.122,Math.min(n,8));
  noise(t,.08,.12,1800);tone(f,t,.1,'square',.15,0,1);tone(f*1.5,t+.04,.13,'square',.12,0,1);}
function sfxRescue(){if(muted)return;const t=audio().currentTime;
  [523,659,784,1047,1319,1568].forEach((f,i)=>tone(f,t+i*.06,.2,'square',.13,0,1));
  tone(2093,t+.36,.4,'triangle',.16,0,1);noise(t+.36,.1,.07,4000);}
function sfxEscape(){if(muted)return;const t=audio().currentTime;
  tone(440,t,.25,'triangle',.12,220);tone(330,t+.18,.3,'triangle',.1,165);}
function sfxNitro(){if(muted)return;const t=audio().currentTime;
  noise(t,.35,.13,900);tone(120,t,.45,'sawtooth',.15,720,1);tone(240,t+.06,.35,'square',.1,1440,1);}
function sfxHonk(){if(muted)return;const t=audio().currentTime;
  tone(494,t,.1,'square',.12);tone(494,t+.14,.14,'square',.12);}
function sfxItem(){if(muted)return;const t=audio().currentTime;tone(1318,t,.07,'square',.1);tone(1760,t+.05,.13,'square',.1,0,1);}
function sfxGem(){if(muted)return;const t=audio().currentTime;[988,1318,1976].forEach((f,i)=>tone(f,t+i*.05,.14,'triangle',.12,0,1));}
function sfxClock(){if(muted)return;const t=audio().currentTime;tone(1568,t,.06,'square',.12);tone(1568,t+.1,.06,'square',.1);tone(2093,t+.2,.16,'triangle',.13,0,1);}
function sfxShield(){if(muted)return;const t=audio().currentTime;tone(392,t,.3,'triangle',.13,784,1);noise(t,.1,.04,2000);}
function sfxMagnet(){if(muted)return;const t=audio().currentTime;tone(660,t,.2,'square',.11,1320,1);tone(880,t+.1,.2,'triangle',.1,1760,1);}
function sfxWrench(){if(muted)return;const t=audio().currentTime;[660,880,1100].forEach((f,i)=>tone(f,t+i*.07,.14,'triangle',.13,0,1));}
function sfxFever(){if(muted)return;const t=audio().currentTime;
  [523,659,784,1047,1319,1568,2093].forEach((f,i)=>tone(f,t+i*.05,.2,'square',.12,0,1));}
function sfxTick(){if(muted)return;const t=audio().currentTime;tone(880,t,.07,'square',.13);}
function sfxOver(){if(muted)return;const t=audio().currentTime;
  [392,330,262,196].forEach((f,i)=>tone(f,t+i*.16,.3,'triangle',.14));noise(t+.6,.4,.08);}
function sfxStart(){if(muted)return;const t=audio().currentTime;
  [262,330,392,523,659].forEach((f,i)=>tone(f,t+i*.06,.18,'square',.12,0,1));}

/* ─ ジェネレーティブ・ミュージック (152BPM ユーロビート風 脳内ループ系) ─ */
const BPM=152,STEP16=60/BPM/4;
const CHORDS=[[53,57,60],[55,59,62],[52,55,59],[57,60,64]]; /* F G Em Am 王道進行 */
const MELO=[ /* 4小節×16分の固定モチーフ＝脳内ループの核 (0=休符) */
  [81,0,79,81,84,0,81,0,79,0,76,79,81,79,76,74],
  [76,0,74,76,79,0,76,0,74,0,71,74,76,0,74,0],
  [81,0,79,81,84,0,86,0,88,0,86,84,86,0,84,81],
  [84,0,81,79,76,0,79,0,81,0,79,76,74,0,76,0],
];
let bgmStep=0,bgmNext=0;
const mf=m=>440*Math.pow(2,(m-69)/12);
function kick(t){tone(150,t,.12,'sine',.3,40);}
function clap(t){noise(t,.1,.13,1400);noise(t+.02,.08,.08,2000);}
function hat(t,v){noise(t,.03,v,6000);}
function bass(f,t){tone(f,t,STEP16*1.6,'sawtooth',.13);tone(f*2,t,STEP16*1.2,'square',.04);}
function lead(f,t,d,v){tone(f,t,d,'square',v||.09,0,1);}
function pad(ch,t){ch.forEach(m=>tone(mf(m),t,STEP16*14,'sine',.024));}
function schedBGM(){
  if(muted||!AC||state!=='play')return;
  const now=AC.currentTime;
  if(bgmNext<now-0.3)bgmNext=now;       /* タブ復帰時の追いつき防止 */
  while(bgmNext<now+0.15){
    const s=bgmStep,t=Math.max(bgmNext,now),
      bar=(s>>4)%4,st=s&15,ch=CHORDS[bar];
    if(st%4===0)kick(t);
    if(st===4||st===12)clap(t);
    hat(t,st%4===2?.05:.024);                       /* 16分ハット=爆走のリズム */
    if(st%2===0)bass(mf(ch[0]-24+(st%4===2?12:0)),t); /* 8分オクターブベース */
    const m=MELO[bar][st];
    if(m){lead(mf(m+(fever>0?12:0)),t,STEP16*1.9,fever>0?.11:.09);
      if(fever>0)lead(mf(m+16),t,STEP16*1.9,.05);}
    if(st===0)pad(ch,t);
    bgmStep++;bgmNext+=STEP16;
  }
}
/* エンジン音アップデート(毎フレーム) */
let gear=0;
function engUpdate(){
  if(!AC||!engGain)return;
  const on=state==='play'&&!muted&&goT<=0;
  engGain.gain.value=on?(broken?.02:.04+Math.min(.025,spd/9000)):0;
  if(!on)return;
  const span=Math.max(40,playerMax()/6),g=Math.min(5,Math.floor(spd/span)),
    rpm=(spd-g*span)/span;
  if(g>gear){sfxShift(g);}
  gear=g;
  engOsc.frequency.value=(broken?34:46)+rpm*110+g*10+Math.sin(elapsed*30)*2;
  engFlt.frequency.value=420+rpm*900+(nitroT>0?900:0);
}

/* ───────── CPU難易度 20段階 ───────── */
const LV_MAX=20;
let lv=Math.min(LV_MAX,Math.max(1,+(localStorage.getItem('gpLv')||7)||7));
const LV_TIERS=[[1,'🐤 ひよこ'],[4,'🙂 ふつう'],[7,'💨 はやい'],[10,'🔥 つよい'],[13,'👹 鬼'],[16,'😈 超鬼'],[19,'⚡ 神']];
function lvDesc(n){let d=LV_TIERS[0][1];for(const[th,name]of LV_TIERS)if(n>=th)d=name;return d;}
function setLv(n){
  lv=Math.min(LV_MAX,Math.max(1,Math.round(n)||1));
  localStorage.setItem('gpLv',lv);
  const v=document.getElementById('lvVal'),d=document.getElementById('lvDesc'),
    b=document.getElementById('lvBarFill');
  if(v)v.textContent='Lv '+lv;
  if(d)d.textContent=lvDesc(lv);
  if(b)b.style.width=(lv/LV_MAX*100)+'%';
  return lv;
}
function rivalBase(){return 118+lv*9+round*12;}   /* CPUトラック巡航速度(km/h) */
function playerMax(){return 300+lv*5;}            /* 自車の最高速(km/h) */

/* ───────── 入力: ジャイロ(傾け)＋加速度センサー(シェイク)＋フォールバック ───────── */
let orientSeen=false,accSeen=false,needCalO=true,needCalA=true,calG=0,zs=1,calAX=0,
  tiltOrient=0,tiltAcc=0,keyL=false,keyR=false,touchTilt=null,
  lastShakeMs=0;
function onOrient(e){
  if(e.gamma==null)return;
  orientSeen=true;
  if(needCalO){calG=e.gamma;needCalO=false;}
  tiltOrient=Math.max(-1,Math.min(1,(e.gamma-calG)/22));
}
function onMotion(e){
  const g=e.accelerationIncludingGravity;
  if(g&&g.x!=null){
    accSeen=true;
    if(needCalA){
      zs=(g.z||0)>=0?1:-1;            /* Android(+9.8)/iOS(-9.8)の符号差を吸収 */
      calAX=-zs*g.x;needCalA=false;
    }
    tiltAcc=Math.max(-1,Math.min(1,(-zs*g.x-calAX)/4.2));
  }
  /* シェイク検出: 重力抜き加速度の大きさ */
  const a=e.acceleration;
  if(a&&a.x!=null){
    const m=Math.hypot(a.x||0,a.y||0,a.z||0),now=Date.now();
    if(m>13&&now-lastShakeMs>230){lastShakeMs=now;doShake();}
  }
}
async function enableSensors(){
  let any=false;
  try{
    if(window.DeviceOrientationEvent){
      if(typeof DeviceOrientationEvent.requestPermission==='function'){
        const r=await DeviceOrientationEvent.requestPermission().catch(()=>'denied');
        if(r==='granted'){addEventListener('deviceorientation',onOrient);any=true;}
      }else{addEventListener('deviceorientation',onOrient);any=true;}
    }
  }catch(e){}
  try{
    if(window.DeviceMotionEvent){
      if(typeof DeviceMotionEvent.requestPermission==='function'){
        const r=await DeviceMotionEvent.requestPermission().catch(()=>'denied');
        if(r==='granted'){addEventListener('devicemotion',onMotion);any=true;}
      }else{addEventListener('devicemotion',onMotion);any=true;}
    }
  }catch(e){}
  return any;
}
/* タッチ/マウス: 横なぞりでハンドル・タップ連打でシェイク */
let dragId=null,dragMove=0,dragX0=0,downMs=0,lastTapMs=0;
cv.addEventListener('pointerdown',e=>{
  dragId=e.pointerId;dragMove=0;dragX0=e.clientX;downMs=Date.now();
  if(rescueMode||broken){doShake();return;}     /* シェイクタイム中はタップ=シェイク */
  touchTilt=Math.max(-1,Math.min(1,(e.clientX-W/2)/(W*.3)));
});
cv.addEventListener('pointermove',e=>{
  if(e.pointerId!==dragId)return;
  dragMove+=Math.abs(e.clientX-dragX0);dragX0=e.clientX;
  touchTilt=Math.max(-1,Math.min(1,(e.clientX-W/2)/(W*.3)));
});
addEventListener('pointerup',()=>{
  if(dragId!=null&&!rescueMode&&!broken&&dragMove<14&&Date.now()-downMs<220){
    const now=Date.now();
    if(now-lastTapMs<300)doShake();             /* ダブルタップ=シェイク */
    lastTapMs=now;
  }
  dragId=null;touchTilt=null;
});
addEventListener('pointercancel',()=>{dragId=null;touchTilt=null;});
addEventListener('keydown',e=>{
  if(e.code==='Space'){e.preventDefault();doShake();}
  if(e.code==='ArrowLeft')keyL=true;
  if(e.code==='ArrowRight')keyR=true;
});
addEventListener('keyup',e=>{
  if(e.code==='ArrowLeft')keyL=false;
  if(e.code==='ArrowRight')keyR=false;
});
function readTilt(){
  if(touchTilt!=null)return touchTilt;
  if(keyL||keyR)return (keyR?1:0)-(keyL?1:0);
  if(orientSeen)return tiltOrient;
  if(accSeen)return tiltAcc;
  return 0;
}

/* ───────── コース(プロシージャル・ジェネレーション) ───────── */
const SEGL=60;                       /* セグメント長(m) */
let track=[];
function genTrack(upTo){
  while(track.length<upTo){
    const len=6+(Math.random()*8|0);
    if(Math.random()<.42){for(let i=0;i<len;i++)track.push(0);}   /* 直線 */
    else{
      const f=fair(),
        mag=(f?.7+Math.random()*.8:1.8+Math.random()*.7)*(Math.random()<.5?-1:1);
      for(let i=0;i<len;i++)track.push(mag*Math.sin(i/(len-1)*Math.PI)); /* イーズ入りカーブ */
    }
  }
}
genTrack(80);
function curveAt(i){genTrack(i+2);return track[Math.max(0,i)]||0;}

/* ───────── オブジェクト・プーリング ───────── */
const SPAWNZ=1400;
const ents=[];        /* {alive,type,z,x,...} */
function ent(){for(const e of ents)if(!e.alive)return e;const e={alive:false};ents.push(e);return e;}
const parts=[];       /* パーティクル */
function part(){for(const p of parts)if(!p.alive)return p;if(parts.length>340)return null;const p={alive:false};parts.push(p);return p;}
const pops=[];        /* テキストポップ */
function pop(){for(const p of pops)if(!p.alive)return p;const p={alive:false};pops.push(p);return p;}
const stars=[];       /* 夜空の星 */
for(let i=0;i<70;i++)stars.push({x:Math.random(),y:Math.random()*.38,tw:Math.random()*TAU});

function rnd(a,b){return a+Math.random()*(b-a);}
function burst(x,y,n,cols,emoji){
  for(let i=0;i<n;i++){
    const p=part();if(!p)break;
    const a=Math.random()*TAU,v=60+Math.random()*340;
    p.alive=true;p.x=x;p.y=y;p.vx=Math.cos(a)*v;p.vy=Math.sin(a)*v-60;
    p.t=0;p.dur=.5+Math.random()*.8;p.size=3+Math.random()*7;p.float=false;
    p.emoji=(emoji&&Math.random()<.4)?emoji[(Math.random()*emoji.length)|0]:null;
    p.col=cols[(Math.random()*cols.length)|0];
  }
}
function popup(x,y,text,col,size){
  const p=pop();p.alive=true;p.x=x;p.y=y;p.t=0;p.dur=.9;
  p.text=text;p.col=col||'#fff';p.size=size||22;
}
function smoke(x,y,n){
  for(let i=0;i<n;i++){
    const p=part();if(!p)break;
    p.alive=true;p.x=x+rnd(-8,8);p.y=y+rnd(-4,4);
    p.vx=rnd(-30,30);p.vy=rnd(-90,-30);p.t=0;p.dur=rnd(.5,1);
    p.size=rnd(4,9);p.float=true;p.emoji=Math.random()<.25?'💨':null;p.col='rgba(170,160,180,.7)';
  }
}

      else if(e.kind==='wrench'){

function update(dt){
  const rdt=dt;                       /* 実時間 */
  /* ── カウントダウン ── */
  if(goT>0){
    const prev=Math.ceil(goT);
    goT-=rdt;
    if(goT>0&&Math.ceil(goT)!==prev)sfxCnt();
    if(goT<=0){popup(W/2,H*.4,'GO!! 🏁','#ffd76e',40);sfxGo();}
    return;
  }
  if(rescueMode){
    rescueMode.t-=rdt;
    if(rescueMode.t<=0)rescueFail();
    if(rescueMode)dt*=0.15;           /* シェイクタイム=スローモーション */
  }
  elapsed+=dt;
  /* ── スピード(超スピード系) ── */
  const max=(broken?62:playerMax()*(fever>0?1.12:1))+(nitroT>0?90:0);
  const offroad=Math.abs(px)>1.04;
  if(spd<max)spd=Math.min(max,spd+dt*(nitroT>0?260:95));
  else spd=Math.max(max,spd-dt*180);
  if(offroad&&spd>85){spd+=(85-spd)*dt*2.6;shake=Math.max(shake,4);
    if(Math.random()<dt*8)smoke(W/2+(px>0?1:-1)*W*.18,H*.84,1);}
  if(spd>maxKmh)maxKmh=spd;
  if(nitroT>0)nitroT-=rdt;
  /* ── 走行距離・距離スコア ── */
  const mps=spd/3.6,adv=mps*dt;
  dist+=adv;distChunk+=adv;
  while(distChunk>=100){distChunk-=100;addScore(20);}
  /* ── ステアリング(ジャイロ傾け) ── */
  tilt=readTilt();
  if(spinT>0){spinT-=rdt;}
  else px+=tilt*dt*2.6*Math.min(1,spd/140+.15);
  const ci=Math.floor(dist/SEGL),cv0=curveAt(ci);
  px-=cv0*dt*1.7*Math.pow(Math.min(1,spd/320),2);   /* 遠心力: カーブに切り込め */
  px=Math.max(-1.45,Math.min(1.45,px));
  /* ── タイマー類(実時間) ── */
  timeLeft-=rdt;
  if(timeLeft<=0){timeLeft=0;gameOver();return;}
  if(timeLeft<5.5&&Math.ceil(timeLeft)!==lastTick){lastTick=Math.ceil(timeLeft);sfxTick();}
  if(fever>0){fever-=rdt;if(fever<=0){fever=0;scoreMult=1;}}
  if(shield>0)shield-=rdt;
  if(magnet>0)magnet-=rdt;
  if(invuln>0)invuln-=rdt;
  if(celeT>0)celeT-=rdt;
  if(shake>0)shake=Math.max(0,shake-rdt*60);
  if(flash>0)flash=Math.max(0,flash-rdt*2.2);
  hue=(hue+dt*(fever>0?160:14))%360;
  if(combo>maxCombo)maxCombo=combo;
  if(combo>=10&&fever<=0)startFever();
  if(broken&&Math.random()<dt*14)smoke(W/2+rnd(-20,20),H*.8,1);
  /* ── CPUトラック(コンピュータと競う) ── */
  if(!rescueMode){
    burstChk-=dt;
    if(burstChk<=0){burstChk=4;if(!fair())burstT=1.6;}   /* 23.4%: 鬼の逃げスパート */
    if(burstT>0)burstT-=dt;
    let rk=rivalBase()*(1+Math.sin(elapsed*.7)*.04);
    if(burstT>0)rk+=55+lv;
    if(gap>700)rk*=.88;                                   /* ラバーバンド: 追いつける76.6%設計 */
    else if(gap<60)rk*=.97;
    gap+=(rk-spd)*dt/3.6;
    if(gap>2400)gap=2400;
    rx=Math.sin(elapsed*.6)*.45;
    if(gap<=16&&!broken){
      rescueMode={t:3.4,need:rescueNeed,got:0};
      gap=16;
      sfxStart();vib(40);
      popup(W/2,H*.28,'🚚に追いついた！','#ffd76e',26);
      popup(W/2,H*.4,'📳 ふれ！ふれ！ふれ！','#ffd76e',30);
    }
    /* トラックの💣投下 */
    dropT-=dt;
    if(dropT<=0){
      dropT=rnd(2.2,3.8)-Math.min(1.4,lv*.06);
      if(gap>40&&gap<700)mk('bomb',rx,Math.max(60,gap-12));
    }
  }else gap=16;
  /* ── スポーン ── */
  const sf=Math.min(1.7,1+elapsed/60+lv*.012),mv=Math.min(1.6,spd/170+.2);
  obsT-=dt*sf*mv;itemT-=dt*mv;decorT-=dt*mv;boardT-=dt*mv;
  if(obsT<=0){spawnObs();obsT=rnd(1.7,2.6);}
  if(itemT<=0){spawnItems();itemT=rnd(1.5,2.4);}
  if(decorT<=0){spawnDecor();decorT=rnd(.4,.8);}
  if(boardT<=0){spawnBoard();boardT=rnd(4,7);}
  /* ── エンティティ ── */
  for(const e of ents){
    if(!e.alive)continue;
    e.z-=adv;
    if(e.vx){e.x+=e.vx*dt;if(Math.abs(e.x)>.85)e.vx=-e.vx;}
    if(e.type==='item'&&magnet>0&&e.z<260)e.x+=(px-e.x)*dt*4;   /* 🧲吸い寄せ */
    if(!e.done&&e.z<=14&&e.z>-30&&(e.type==='obs'||e.type==='item')){e.done=true;judge(e);}
    if(e.z<-40)e.alive=false;
  }
  /* ── パーティクル ── */
  for(const p of parts){if(!p.alive)continue;p.t+=rdt;
    if(p.t>=p.dur){p.alive=false;continue;}
    p.x+=p.vx*rdt;p.y+=p.vy*rdt;if(!p.float)p.vy+=340*rdt;}
  for(const p of pops){if(!p.alive)continue;p.t+=rdt;if(p.t>=p.dur)p.alive=false;}
}

/* ───────── 描画 ───────── */
const ZNEAR=10;
function horY(){return H*.4;}
function zOfY(y){const h0=horY();return Math.min(3200,ZNEAR*(H-h0)/Math.max(.5,y-h0));}
function fOf(z){return ZNEAR/Math.max(ZNEAR*.6,z);}
function halfWpx(z){return W*.95*fOf(z);}
/* 道路中心線オフセット(セグメント二重積分・毎フレーム前計算) */
const roadOff=[];
function buildRoadOff(){
  const base=Math.floor(dist/SEGL),frac=(dist%SEGL)/SEGL,N=30;
  genTrack(base+N+2);
  let x=0,dx=-(track[base]||0)*frac*.013;
  for(let i=0;i<=N;i++){roadOff[i]=x;x+=dx;dx+=(track[base+i]||0)*.013;}
  roadOff.length=N+1;
  return base;
}
function offAt(z){
  const t=z/SEGL,i=Math.min(roadOff.length-2,Math.max(0,Math.floor(t))),
    fr=Math.min(1,Math.max(0,t-i));
  return roadOff[i]+(roadOff[i+1]-roadOff[i])*fr;
}
function roadCenter(z){return W/2+(offAt(z)-px)*halfWpx(z);}
function drawEmoji(em,x,y,s,alpha){
  if(s<7)return;
  cx.save();cx.globalAlpha=alpha==null?1:alpha;
  cx.font=s+'px sans-serif';cx.textAlign='center';cx.textBaseline='bottom';
  cx.fillText(em,x,y);
  cx.restore();
}
/* CPUトラック: 荷台の檻に公式こっこちゃん */
function drawTruck(z){
  const f=fOf(z),c=roadCenter(z)+rx*halfWpx(z),
    y=horY()+(H-horY())*f,w=halfWpx(z)*.52,h=w*.95;
  if(w<4)return;
  cx.save();cx.globalAlpha=Math.min(1,f*14);
  cx.translate(c,y);
  if(rescueMode){const j=3+rescueMode.got*1.5;cx.translate(rnd(-j,j),rnd(-j,j));}
  /* 影 */
  cx.fillStyle='rgba(0,0,0,.4)';
  cx.beginPath();cx.ellipse(0,0,w*.62,w*.1,0,0,TAU);cx.fill();
  /* 車体 */
  const g=cx.createLinearGradient(-w/2,0,w/2,0);
  g.addColorStop(0,'#1c1126');g.addColorStop(.5,'#372147');g.addColorStop(1,'#150a1e');
  cx.fillStyle=g;
  cx.beginPath();cx.roundRect(-w/2,-h*.78,w,h*.62,w*.07);cx.fill();
  /* ブレーキランプ */
  const bl=.6+.4*Math.sin(elapsed*10);
  cx.fillStyle=`rgba(255,40,70,${bl})`;cx.shadowColor='#f24';cx.shadowBlur=Math.min(14,10*f*40);
  cx.fillRect(-w*.46,-h*.3,w*.12,h*.08);cx.fillRect(w*.34,-h*.3,w*.12,h*.08);
  cx.shadowBlur=0;
  /* タイヤ */
  cx.fillStyle='#0a0510';
  cx.beginPath();cx.ellipse(-w*.34,-h*.13,w*.12,w*.13,0,0,TAU);
  cx.ellipse(w*.34,-h*.13,w*.12,w*.13,0,0,TAU);cx.fill();
  /* 檻の中の公式こっこちゃん */
  const cw=w*.5,ch2=cw*1.31,cy0=-h*.78-ch2*.1;
  if(coccoReady){cx.save();cx.globalAlpha*=.97;cx.drawImage(cocco,-cw/2,cy0-ch2,cw,ch2);cx.restore();}
  drawEmoji('💧',cw*.32,cy0-ch2*.62,Math.max(7,w*.13));
  const gold=truckFair?'#ffd76e':'#c9d4e4';
  cx.strokeStyle=gold;cx.shadowColor=gold;cx.shadowBlur=12;
  cx.lineWidth=Math.max(1.2,w*.035);
  cx.beginPath();cx.roundRect(-cw*.72,cy0-ch2*1.08,cw*1.44,ch2*1.16,cw*.1);cx.stroke();
  const bars=truckFair?4:6;
  for(let i=1;i<bars;i++){
    const bx=-cw*.72+cw*1.44*i/bars;
    cx.beginPath();cx.moveTo(bx,cy0-ch2*1.08);cx.lineTo(bx,cy0+ch2*.08);cx.stroke();
  }
  cx.shadowBlur=0;
  /* ひび */
  if(rescueMode&&rescueMode.got>0){
    cx.strokeStyle='#fff';cx.lineWidth=1.5;
    for(let i=0;i<rescueMode.got;i++){
      const a=i*2.1+.6;
      cx.beginPath();cx.moveTo(Math.cos(a)*cw*.1,cy0-ch2*.5+Math.sin(a)*ch2*.1);
      cx.lineTo(Math.cos(a)*cw*.7,cy0-ch2*.5+Math.sin(a)*ch2*.55);cx.stroke();
    }
  }
  if(!truckFair)drawEmoji('🔒',0,cy0-ch2*1.12,Math.max(7,w*.16));
  /* 運転席のブラックこっこ */
  if(blackCv){const bw=w*.26;cx.drawImage(blackCv,-w*.46,-h*.78-bw*1.31*.72,bw,bw*1.31);}
  cx.restore();
}
/* プレイヤーマシン: 公式こっこちゃんのレーシングカー */
function drawPlayer(){
  const pxs=W/2,pys=H*.84,pw=Math.min(W,H)*.3,ph=pw*.5,
    lean=tilt*.3+(spinT>0?Math.sin(spinT*23)*1.2:0);

  cx.rotate(lean*.45);
  if(invuln>0&&(elapsed*14|0)%2)cx.globalAlpha=.4;
  /* 影 */
  cx.fillStyle='rgba(0,0,0,.45)';

  /* ニトロ炎 */

    cx.fillStyle=fl;

    cx.beginPath();cx.arc(0,-ph*.3,pw*.62,0,TAU);cx.stroke();}
  if(magnet>0){cx.strokeStyle=`rgba(255,184,110,${.4+.3*Math.sin(elapsed*6)})`;cx.lineWidth=2;
    cx.setLineDash([6,8]);cx.beginPath();cx.arc(0,-ph*.3,pw*.78,0,TAU);cx.stroke();cx.setLineDash([]);}
  /* マシン本体 */
  if(fever>0){cx.shadowColor=`hsl(${hue},95%,70%)`;cx.shadowBlur=30;}
  else{cx.shadowColor='rgba(255,150,200,.7)';cx.shadowBlur=16;}
  const bg=cx.createLinearGradient(-pw/2,0,pw/2,0);
  if(broken){bg.addColorStop(0,'#5a3a44');bg.addColorStop(.5,'#7a5060');bg.addColorStop(1,'#4a3040');}
  else{bg.addColorStop(0,'#ff5a9e');bg.addColorStop(.5,'#ffd76e');bg.addColorStop(1,'#ff5a9e');}
  cx.fillStyle=bg;
  cx.beginPath();cx.roundRect(-pw*.5,-ph*.22,pw,ph*.62,ph*.26);cx.fill();
  /* スポイラー */
  cx.fillStyle=broken?'#3a2533':'#b03a76';
  cx.fillRect(-pw*.46,-ph*.34,pw*.16,ph*.2);cx.fillRect(pw*.3,-ph*.34,pw*.16,ph*.2);
  cx.fillRect(-pw*.46,-ph*.38,pw*.92,ph*.1);
  /* タイヤ */
  cx.shadowBlur=0;cx.fillStyle='#140a18';
  cx.beginPath();
  cx.ellipse(-pw*.4,ph*.34,pw*.1,ph*.18,lean*.2,0,TAU);
  cx.ellipse(pw*.4,ph*.34,pw*.1,ph*.18,lean*.2,0,TAU);cx.fill();
  /* ゼッケン */
  cx.fillStyle='#fff';
  cx.beginPath();cx.ellipse(0,ph*.1,pw*.13,ph*.16,0,0,TAU);cx.fill();
  cx.fillStyle='#3a1030';cx.font='bold '+(ph*.24)+'px sans-serif';
  cx.textAlign='center';cx.textBaseline='middle';cx.fillText('1',0,ph*.1);
  /* 公式こっこちゃん(ドライバー) */
  if(coccoReady){
    const cw=pw*.42,ch2=cw*1.31;
    cx.save();
    if(broken)cx.rotate(Math.sin(elapsed*3)*.06);

}
function draw(){
  const h0=horY();
  /* ── 空: シンセウェーブ・サンセット ── */
  const bg=cx.createLinearGradient(0,0,0,H);
  if(fever>0){
    bg.addColorStop(0,`hsl(${hue},65%,13%)`);bg.addColorStop(.4,`hsl(${(hue+50)%360},60%,24%)`);bg.addColorStop(1,`hsl(${(hue+100)%360},55%,9%)`);
  }else{
    bg.addColorStop(0,'#0e0322');bg.addColorStop(.28,'#3a0f4e');bg.addColorStop(.4,'#a3325f');bg.addColorStop(.55,'#1c0830');bg.addColorStop(1,'#0a0316');
  }
  cx.fillStyle=bg;cx.fillRect(0,0,W,H);
  cx.save();
  if(shake>0)cx.translate((Math.random()-.5)*shake,(Math.random()-.5)*shake);
  /* 星 */
  for(const s of stars){
    const tw=.4+.6*Math.abs(Math.sin(elapsed*1.5+s.tw));
    cx.fillStyle=`rgba(255,220,245,${tw*.7})`;
    cx.fillRect(s.x*W,s.y*H,2,2);
  }
  const base=buildRoadOff();
  const sway=offAt(900)*.12;
  /* 太陽(スキャンライン入り) */
  const sunX=W/2-px*26+sway*.4,sunY=h0,sunR=Math.min(W,H)*.27;
  const sg=cx.createRadialGradient(sunX,sunY,0,sunX,sunY,sunR);
  sg.addColorStop(0,fever>0?`hsla(${hue},95%,70%,.95)`:'rgba(255,210,110,.95)');
  sg.addColorStop(.6,'rgba(255,110,160,.55)');sg.addColorStop(1,'rgba(255,80,150,0)');
  cx.fillStyle=sg;
  cx.beginPath();cx.arc(sunX,sunY,sunR,Math.PI,TAU);cx.fill();
  cx.fillStyle='rgba(14,3,34,.85)';
  for(let i=0;i<5;i++)cx.fillRect(sunX-sunR,sunY-12-i*14,sunR*2,4+i);
  /* パララックス山なみ */
  for(let l=0;l<2;l++){
    const amp=H*.05*(l+1)*.6,off=(l?sway*.5:sway*.25)-px*(l?22:10);
    cx.fillStyle=l?'#1b0b30':'#241040';
    cx.beginPath();cx.moveTo(0,h0);
    for(let x=0;x<=W;x+=24)
      cx.lineTo(x,h0-Math.abs(Math.sin((x+off)*.012+l*9))*amp-2);
    cx.lineTo(W,h0);cx.closePath();cx.fill();
  }
  /* ── 路面(Z軸奥行きストリップ) ── */
  for(let y=Math.ceil(h0)+1;y<H;y+=3){
    const z=zOfY(y),si=Math.floor((dist+z)/SEGL),par=si%2===0,
      f=fOf(z),half=halfWpx(z),c=roadCenter(z),
      sh=3;
    /* 地面 */
    cx.fillStyle=par?'#170a28':'#130820';
    cx.fillRect(0,y,W,sh);
    /* グリッドグロー */
    if(par&&Math.floor((dist+zOfY(y+3))/SEGL)!==si){
      cx.fillStyle=`hsla(${fever>0?hue:316},85%,60%,${.12+f*.5})`;
      cx.fillRect(0,y,W,1.5);
    }
    /* ランブル */
    const rw=half*.14;
    cx.fillStyle=par?'#ff4d9a':'#ffe9f4';
    cx.fillRect(c-half-rw,y,rw,sh);cx.fillRect(c+half,y,rw,sh);
    /* 路面 */
    cx.fillStyle=par?'#241236':'#2b1640';
    cx.fillRect(c-half,y,half*2,sh);
    /* レーン白線 */
    if(par){
      cx.fillStyle='rgba(255,235,250,.5)';
      cx.fillRect(c-half*.34,y,Math.max(1,half*.02),sh);
      cx.fillRect(c+half*.34,y,Math.max(1,half*.02),sh);
    }
  }
  /* ── エンティティ(奥から) ── */
  const sorted=ents.filter(e=>e.alive&&e.z>-30&&e.z<SPAWNZ+10).sort((a,b)=>b.z-a.z);
  let truckDrawn=false;
  const truckVisible=state!=='menu'&&gap<SPAWNZ;
  for(const e of sorted){
    if(truckVisible&&!truckDrawn&&gap>=e.z){drawTruck(Math.max(16,gap));truckDrawn=true;}
    const f=fOf(e.z),y=h0+(H-h0)*f,c=roadCenter(e.z),
      sx=c+e.x*halfWpx(e.z),s=halfWpx(e.z)*(e.type==='decor'?.5:e.type==='board'?.4:.24);
    if(e.type==='board'&&s>8){
      cx.save();cx.globalAlpha=Math.min(1,f*12);
      cx.fillStyle='#2a1840';cx.strokeStyle='#ff8ac2';cx.lineWidth=Math.max(1,s*.06);
      cx.beginPath();cx.roundRect(sx-s*.7,y-s*1.7,s*1.4,s*1.1,s*.12);cx.fill();cx.stroke();
      cx.fillRect(sx-s*.05,y-s*.6,s*.1,s*.6);
      drawEmoji(e.emoji,sx,y-s*.72,s*.8);
      cx.restore();
    }else{
      cx.save();cx.globalAlpha=Math.min(1,f*12);
      if(e.type==='item'){cx.shadowColor='#fff';cx.shadowBlur=14*Math.min(1,f*8);
        drawEmoji(e.emoji,sx,y+Math.sin(elapsed*5+e.z*.02)*s*.15,s);}
      else drawEmoji(e.emoji,sx,y,s);
      cx.restore();
    }
  }
  if(truckVisible&&!truckDrawn)drawTruck(Math.max(16,gap));
  /* ── スピードライン(超スピード) ── */
  const spdK=spd/playerMax();
  if(spdK>.8||nitroT>0){
    const n=14,a=(spdK-.75)*.8+(nitroT>0?.3:0);
    cx.strokeStyle=`rgba(255,255,255,${Math.min(.5,a)})`;cx.lineWidth=1.5;
    for(let i=0;i<n;i++){
      const ang=i/n*TAU+elapsed*7,r1=Math.min(W,H)*.42,r2=r1+Math.min(W,H)*(.12+Math.random()*.1);
      cx.beginPath();
      cx.moveTo(W/2+Math.cos(ang)*r1,H/2+Math.sin(ang)*r1);
      cx.lineTo(W/2+Math.cos(ang)*r2,H/2+Math.sin(ang)*r2);
      cx.stroke();
    }
  }
  /* ── プレイヤー ── */
  if(state==='play'||state==='over')drawPlayer();
  /* ── パーティクル ── */
  for(const p of parts){
    if(!p.alive)continue;
    const k=1-p.t/p.dur;
    cx.globalAlpha=k;
    if(p.emoji){cx.font=`${p.size*3.2}px sans-serif`;cx.textAlign='center';cx.textBaseline='middle';
      cx.fillText(p.emoji,p.x,p.y);}
    else{cx.fillStyle=p.col;cx.beginPath();cx.arc(p.x,p.y,p.size*k,0,TAU);cx.fill();}
  }
  cx.globalAlpha=1;
  /* ── テキストポップ ── */
  for(const p of pops){
    if(!p.alive)continue;
    const k=p.t/p.dur;
    cx.globalAlpha=k<.15?k/.15:1-Math.max(0,(k-.6)/.4);
    cx.font=`bold ${p.size}px sans-serif`;cx.textAlign='center';cx.textBaseline='middle';
    cx.shadowColor=p.col;cx.shadowBlur=12;
    cx.fillStyle=p.col;cx.fillText(p.text,p.x,p.y-k*46);
    cx.shadowBlur=0;
  }
  cx.globalAlpha=1;
  cx.restore();
  /* フラッシュ */
  if(flash>0){cx.fillStyle=`rgba(${flashCol},${flash*.4})`;cx.fillRect(0,0,W,H);}
  /* ───── HUD ───── */
  if(state==='play'){
    const top=48;
    cx.textBaseline='middle';
    /* 車体・ニトロ・救出数 */
    cx.font='18px sans-serif';cx.textAlign='left';
    cx.fillText(broken?'🛠️修理中…':'🔧'.repeat(hp)+'⬛'.repeat(Math.max(0,3-hp)),12,top+18);
    cx.font='15px sans-serif';
    cx.fillText('🚀×'+nitroStock+'  🐣×'+rescued,12,top+42);
    cx.fillStyle='#b08bff';cx.font='bold 13px sans-serif';
    cx.fillText('🤖Lv'+lv,12,top+64);
    /* スコア */
    cx.textAlign='right';cx.font='bold 22px sans-serif';
    cx.fillStyle='#fff';cx.shadowColor='#ff8ac2';cx.shadowBlur=10;
    cx.fillText(score.toLocaleString(),W-12,top+16);
    cx.shadowBlur=0;
    if(combo>1){cx.font='bold 14px sans-serif';cx.fillStyle='#ffd76e';
      cx.fillText(combo+' COMBO',W-12,top+38);}
    /* 速度計 */
    cx.font='bold 30px sans-serif';
    cx.fillStyle=nitroT>0?'#7ad7ff':spd>playerMax()*.92?'#ffd76e':'#fff';
    cx.shadowColor='#ff5a9e';cx.shadowBlur=12;
    cx.fillText(Math.round(spd)+'',W-12,H-(H*.08)-14);
    cx.shadowBlur=0;
    cx.font='12px sans-serif';cx.fillStyle='#ffb0d8';
    cx.fillText('km/h',W-12,H-(H*.08)+10);
    /* ⏰タイムバー */
    const bw=Math.min(W*.46,250),bx=W/2-bw/2,by=top+4;
    cx.fillStyle='rgba(255,255,255,.14)';
    cx.beginPath();cx.roundRect(bx,by,bw,10,5);cx.fill();
    const tg=cx.createLinearGradient(bx,0,bx+bw,0);
    tg.addColorStop(0,timeLeft<10?'#ff5a5a':'#ffd76e');tg.addColorStop(1,timeLeft<10?'#ffb05a':'#ff8ac2');
    cx.fillStyle=tg;
    cx.beginPath();cx.roundRect(bx,by,Math.max(2,bw*Math.min(1,timeLeft/60)),10,5);cx.fill();
    cx.font='bold 15px sans-serif';cx.textAlign='center';
    cx.fillStyle=timeLeft<10?'#ff7a6a':'#fdc';
    cx.fillText('⏰'+Math.ceil(timeLeft)+'s',W/2,by+26);
    /* 🚚ギャップメーター */
    if(!rescueMode){
      cx.font='bold 14px sans-serif';
      cx.fillStyle=gap<120?'#ffd76e':'#dcb8ff';
      cx.fillText('🚚 こっこちゃんまで '+Math.max(0,Math.round(gap))+'m'+(gap<120?' もうすこし！':''),W/2,by+48);
    }
    /* カウントダウン */
    if(goT>0){
      const n=Math.ceil(goT),k=goT-Math.floor(goT);
      cx.font=`bold ${70+k*40}px sans-serif`;
      cx.fillStyle='#ffd76e';cx.shadowColor='#ffd76e';cx.shadowBlur=26;
      cx.fillText(n+'',W/2,H*.42);
      cx.shadowBlur=0;
      cx.font='bold 18px sans-serif';cx.fillStyle='#ffb0d8';
      cx.fillText('🚚を追いかけろ！',W/2,H*.55);
    }
    /* シェイクタイムUI(檻破壊) */
    if(rescueMode){
      const k=.5+.5*Math.sin(elapsed*40);
      cx.font=`bold ${28+k*8}px sans-serif`;
      cx.fillStyle='#ffd76e';cx.shadowColor='#ffd76e';cx.shadowBlur=20;
      cx.fillText('📳 ふれ！ふれ！ 📳',W/2,H*.2);
      cx.shadowBlur=0;
      const gw=Math.min(W*.6,300),gx=W/2-gw/2,gy=H*.26;
      cx.fillStyle='rgba(255,255,255,.16)';
      cx.beginPath();cx.roundRect(gx,gy,gw,14,7);cx.fill();
      cx.fillStyle='#ffd76e';
      cx.beginPath();cx.roundRect(gx,gy,Math.max(2,gw*rescueMode.got/rescueMode.need),14,7);cx.fill();
      for(let i=1;i<rescueMode.need;i++){
        cx.fillStyle='rgba(0,0,0,.4)';
        cx.fillRect(gx+gw*i/rescueMode.need-1,gy,2,14);
      }
      cx.strokeStyle='rgba(255,255,255,.7)';cx.lineWidth=4;
      cx.beginPath();cx.arc(W/2,gy+44,18,-Math.PI/2,-Math.PI/2+TAU*(rescueMode.t/3.4));cx.stroke();
    }
    /* 修理UI(復旧作業) */
    if(broken&&!rescueMode){
      const k=.5+.5*Math.sin(elapsed*30);
      cx.font=`bold ${24+k*6}px sans-serif`;
      cx.fillStyle='#9fe8a0';cx.shadowColor='#9fe8a0';cx.shadowBlur=16;
      cx.fillText('📳 シェイクで修理！ 🔧',W/2,H*.3);
      cx.shadowBlur=0;
      const gw=Math.min(W*.55,280),gx=W/2-gw/2,gy=H*.35;
      cx.fillStyle='rgba(255,255,255,.16)';
      cx.beginPath();cx.roundRect(gx,gy,gw,12,6);cx.fill();
      cx.fillStyle='#9fe8a0';
      cx.beginPath();cx.roundRect(gx,gy,Math.max(2,gw*repairGot/repairNeed),12,6);cx.fill();
    }
    /* フィーバー/バフ表示 */
    if(fever>0){cx.font='bold 18px sans-serif';
      cx.fillStyle=`hsl(${hue},95%,75%)`;cx.shadowColor=`hsl(${hue},95%,70%)`;cx.shadowBlur=12;
      cx.fillText('🌈 FEVER ×2  '+fever.toFixed(0)+'s 🌈',W/2,H-(H*.05));cx.shadowBlur=0;}
    else{
      let bl='';
      if(shield>0)bl+='🛡️'+shield.toFixed(0)+'s  ';
      if(magnet>0)bl+='🧲'+magnet.toFixed(0)+'s  ';
      if(nitroT>0)bl+='🚀ブースト中!';
      else if(nitroStock>0)bl+='📳シェイク=🚀ニトロ';
      cx.font='bold 13px sans-serif';cx.fillStyle='#dcb8ff';cx.textAlign='center';
      cx.fillText(bl,W/2,H-(H*.05));
    }
    /* 操作モード */
    cx.font='11px sans-serif';cx.fillStyle='rgba(255,215,240,.55)';cx.textAlign='left';
    cx.fillText(orientSeen?'📲 ジャイロ操作中':accSeen?'📲 加速度センサー操作中':'👆 タッチ操作中(ダブルタップ=シェイク)',12,H-12);
  }
}

function tick(t){
  const dtMs=last?t-last:16;last=t;
  perfSample(dtMs);
  const dt=Math.min(.05,dtMs/1000);
  if(state==='play'){update(dt);schedBGM();}
  else{
    for(const p of parts){if(!p.alive)continue;p.t+=dt;
      if(p.t>=p.dur){p.alive=false;continue;}
      p.x+=p.vx*dt;p.y+=p.vy*dt;if(!p.float)p.vy+=340*dt;}
    for(const p of pops){if(!p.alive)continue;p.t+=dt;if(p.t>=p.dur)p.alive=false;}
    hue=(hue+dt*16)%360;elapsed+=dt;
  }
  engUpdate();
  draw();
  requestAnimationFrame(tick);
}
requestAnimationFrame(tick);

/* ───────── UI 配線 ───────── */
const startOv=document.getElementById('startOv'),endOv=document.getElementById('endOv'),
  bestRow=document.getElementById('bestRow'),recalBtn=document.getElementById('recalBtn');
if(best>0)bestRow.textContent='ベスト '+best.toLocaleString();
setLv(lv);
document.getElementById('lvDown').addEventListener('click',()=>{setLv(lv-1);vib(10);sfxItem();});
document.getElementById('lvUp').addEventListener('click',()=>{setLv(lv+1);vib(10);sfxItem();});

let sensorsOn=false;
async function startGame(){
  audio();sfxStart();
  if(!sensorsOn)sensorsOn=await enableSensors();
  reset();
  startOv.classList.add('hidden');endOv.classList.add('hidden');
  recalBtn.classList.remove('hidden');
  state='play';
}
document.getElementById('startBtn').addEventListener('click',startGame);
document.getElementById('retryBtn').addEventListener('click',startGame);
recalBtn.addEventListener('click',()=>{needCalO=true;needCalA=true;tiltOrient=0;tiltAcc=0;vib(15);});

document.getElementById('muteBtn').addEventListener('click',function(){
  muted=!muted;this.textContent=muted?'🔇':'🔊';
  if(!muted){audio();bgmNext=AC.currentTime+.1;}
  if(muted&&engGain)engGain.gain.value=0;
});
document.getElementById('shareBtn').addEventListener('click',()=>{
  const text=`こっこGP大救出(🤖Lv${lv})で ${score.toLocaleString()} 点！こっこちゃん${rescued}羽レスキュー🐣🏁 #畜物語 #こっこGP大救出`;
  const url='https://chikumo.jp/gp/';
  if(navigator.share){navigator.share({text,url}).catch(()=>{});}
  else open('https://twitter.com/intent/tweet?text='+encodeURIComponent(text)+'&url='+encodeURIComponent(url),'_blank');
});
document.addEventListener('visibilitychange',()=>{
  if(document.hidden&&AC)AC.suspend();
  else if(AC&&!muted)AC.resume();
});

/* ─ ヘッドレステスト用フック ─ */
window.__gp={
  ents,parts,pops,CLEAR_RATE,LV_MAX,
  spawnObs,spawnItems,spawnTruck,setLv,rivalBase,playerMax,
  update,damage,startFever,doShake,reset,startGame,judge,onMotion,onOrient,
  get:()=>({state,score,best,combo,maxCombo,hp,timeLeft,fever,shield,magnet,invuln,
    rescued,rescueStreak,missed,scoreMult,px,spd,elapsed,goT,gap,round,lv,
    broken,repairGot,repairNeed,nitroStock,nitroT,rescueMode,rescueNeed,truckFair,
    lastFair,tilt:readTilt(),orientSeen,accSeen,maxKmh,dist}),
  set:o=>{for(const k of Object.keys(o)){const v=o[k];
    if(k==='state')state=v;else if(k==='score')score=v;else if(k==='combo')combo=v;
    else if(k==='hp')hp=v;else if(k==='timeLeft')timeLeft=v;else if(k==='fever')fever=v;
    else if(k==='shield')shield=v;else if(k==='magnet')magnet=v;else if(k==='invuln')invuln=v;
    else if(k==='px')px=v;else if(k==='spd')spd=v;else if(k==='goT')goT=v;
    else if(k==='gap')gap=v;else if(k==='broken')broken=v;else if(k==='repairGot')repairGot=v;
    else if(k==='nitroStock')nitroStock=v;else if(k==='nitroT')nitroT=v;
    else if(k==='elapsed')elapsed=v;else if(k==='scoreMult')scoreMult=v;
    else if(k==='rescueMode')rescueMode=v;else if(k==='rescueNeed')rescueNeed=v;
    else if(k==='celeT')celeT=v;}},
  noSpawn:()=>{obsT=itemT=decorT=boardT=1e9;dropT=1e9;}
};
