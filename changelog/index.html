<style>
  *{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
  :root{--ink:#f1eee2;--soft:#b7b2cf;--line:rgba(255,255,255,.12);}
  html,body{min-height:100%;}
  body{font-family:'Hiragino Kaku Gothic ProN','Yu Gothic','Helvetica Neue',Arial,sans-serif;color:var(--ink);
    background:radial-gradient(1200px 700px at 50% -8%,#1a1838 0%,#0c0b18 46%,#060509 100%) fixed;min-height:100vh;
    padding:calc(env(safe-area-inset-top) + 22px) 16px calc(env(safe-area-inset-bottom) + 44px);-webkit-font-smoothing:antialiased;}
  body::before{content:"";position:fixed;inset:0;z-index:-1;pointer-events:none;opacity:.45;
    background-image:radial-gradient(1.4px 1.4px at 18% 28%,#fff,transparent),radial-gradient(1.2px 1.2px at 72% 16%,#cfe2ff,transparent),
      radial-gradient(1.5px 1.5px at 44% 60%,#fff,transparent),radial-gradient(1.1px 1.1px at 86% 72%,#ffe9c0,transparent),
      radial-gradient(1.3px 1.3px at 10% 82%,#fff,transparent),radial-gradient(1.2px 1.2px at 62% 92%,#dfeaff,transparent);}
  .wrap{max-width:600px;margin:0 auto;}
  header{text-align:center;margin-bottom:8px;}
  .ic{width:62px;height:62px;border-radius:16px;box-shadow:0 6px 20px rgba(0,0,0,.5);}
  h1{font-size:clamp(22px,6vw,30px);font-weight:900;letter-spacing:.06em;margin-top:10px;
    background:linear-gradient(180deg,#fff7e6,#ffd98a 60%,#e6a84a);-webkit-background-clip:text;background-clip:text;color:transparent;}
  .sub{margin-top:7px;font-size:12.5px;color:var(--soft);letter-spacing:.04em;}
  .legend{display:flex;flex-wrap:wrap;gap:7px;justify-content:center;margin:16px 0 6px;}
  .tag{display:inline-block;font-size:11px;font-weight:800;letter-spacing:.04em;padding:3px 9px;border-radius:20px;white-space:nowrap;}
  .t-new{background:rgba(120,210,110,.16);color:#bdf08a;border:1px solid rgba(150,220,130,.35);}
  .t-feat{background:rgba(110,180,255,.15);color:#a8d2ff;border:1px solid rgba(130,190,255,.32);}
  .t-imp{background:rgba(255,205,120,.15);color:#ffd98a;border:1px solid rgba(255,205,120,.3);}
  .t-fix{background:rgba(255,120,120,.14);color:#ff9a9a;border:1px solid rgba(255,120,120,.3);}
  .t-end{background:rgba(150,150,160,.16);color:#cfcfd6;border:1px solid rgba(170,170,180,.34);}
  .day{margin-top:24px;position:relative;padding-left:20px;border-left:2px solid var(--line);}
  .day::before{content:"";position:absolute;left:-7px;top:4px;width:12px;height:12px;border-radius:50%;
    background:#ffd98a;box-shadow:0 0 0 4px rgba(255,217,138,.18);}
  .date{font-size:14px;font-weight:900;letter-spacing:.08em;color:#ffe6b0;margin-bottom:10px;}
  .entry{background:rgba(20,18,34,.7);border:1px solid rgba(255,255,255,.07);border-radius:13px;padding:11px 13px;margin-bottom:9px;
    -webkit-backdrop-filter:blur(4px);backdrop-filter:blur(4px);}
  .entry .ttl{display:flex;align-items:flex-start;gap:8px;font-size:14.5px;font-weight:700;line-height:1.5;color:#fff;}
  .entry .ttl .tag{flex:none;margin-top:1px;}
  .entry .desc{margin-top:6px;font-size:12.5px;line-height:1.7;color:var(--soft);}
  .entry ul{margin:6px 0 0;padding-left:1.1em;}
  .entry li{font-size:12.5px;line-height:1.7;color:var(--soft);}
  .foot{margin-top:32px;text-align:center;font-size:11px;letter-spacing:.16em;color:var(--soft);opacity:.7;}
  .foot a{color:inherit;text-decoration:none;border-bottom:1px solid rgba(255,255,255,.3);}
  .back{display:inline-block;margin-top:18px;font-size:12px;color:var(--soft);text-decoration:none;
    border:1px solid var(--line);border-radius:20px;padding:8px 18px;}
  /* ===== Reload (こっこちゃん 更新ボタン) ===== */
  .reload-btn{position:fixed;right:calc(1.2rem + env(safe-area-inset-right));bottom:calc(1.2rem + env(safe-area-inset-bottom));
    width:60px;height:60px;z-index:48;display:flex;align-items:center;justify-content:center;border-radius:50%;
    background:radial-gradient(circle at 50% 38%, rgba(40,30,70,0.8), rgba(10,12,28,0.78));
    border:1px solid rgba(160,215,255,0.5);box-shadow:0 4px 18px rgba(0,0,0,0.5), 0 0 16px rgba(120,200,255,0.28);
    -webkit-backdrop-filter:blur(8px);backdrop-filter:blur(8px);cursor:pointer;padding:0;
    animation:reload-bob 3s ease-in-out infinite;transition:box-shadow .2s, transform .15s;}
  .reload-btn img{width:40px;height:40px;filter:drop-shadow(0 1px 4px rgba(255,200,120,0.55));pointer-events:none;}
  .reload-btn::after{content:'↻';position:absolute;right:-2px;bottom:-2px;width:22px;height:22px;border-radius:50%;
    background:linear-gradient(180deg,#ffe08a,#ff9e5b);color:#2a1605;font-size:14px;font-weight:700;
    display:flex;align-items:center;justify-content:center;box-shadow:0 1px 5px rgba(0,0,0,0.45);}
  .reload-btn:hover, .reload-btn:focus-visible{box-shadow:0 6px 22px rgba(0,0,0,0.55), 0 0 22px rgba(140,210,255,0.55);
    border-color:rgba(210,235,255,0.9);}
  .reload-btn:active{transform:scale(0.92);}
  .reload-btn.spinning{animation:reload-spin .7s linear infinite;}
  .reload-btn.spinning img{opacity:.85;}
  @keyframes reload-bob{0%,100%{transform:translateY(0);}50%{transform:translateY(-5px);}}
  @keyframes reload-spin{to{transform:rotate(360deg);}}
  @media (prefers-reduced-motion: reduce){ .reload-btn{animation:none;} }
</style>

<script>
"use strict";
/* 更新履歴データ（新しい順）。エントリを足すときは ここに1行 追加するだけ。
   tag: new(新ゲーム) / feat(新機能) / imp(改善) / fix(修正) */
var LOG=[
  { date:"2026.07.15", items:[
    { tag:"feat", t:"空蹴り・空蹴り英語に『計算生成スカイ』を追加 ─ 高度で空を計算生成（雲→星野→オーロラ→深宇宙）。上昇でも落下でも景色を楽しめる", d:"『畜学の技術学にある計算して景色を生成させる技術を空蹴りに応用できたら、上昇も落下も景色を楽しめるのでは？』というご提案に応えた。空蹴りの魂は『綺麗な景色を楽しみたい』＝景色が終わりが商品（畜学③）。ただし島ぐらし（mori）のフル3Dスタック（地形・水・影・13シェーダ）は過剰なので持ち込まず、技術学 巻四の掟『必要な複雑さだけを持ち込む』に従い、galaxy/pulseと同じ二層構成で最小適用した──背景に1枚のWebGLキャンバス(#sky)を足し、フルスクリーンの単一フラグメントシェーダ（romの単一シェーダ最小構成の思想）で空を高度から計算生成する（2層fbmの柔らかい雲・高空の瞬く星野・超高空のオーロラ帯）。遊び本体・こっこ・絵文字deco・風のライン・タイピング・HUDは前面の既存Canvas2D(#game)がそのまま担う。二層がズレないよう、シェーダ内の高度写像をCanvas2Dのsy()と同じ式にして雲・星と絵文字decoを同じ視差でスクロールさせ、空の下地はJS側skyColors()の実色をそのまま継ぐので既存の色は不変（計算生成分は純粋加算）。負荷対策として空キャンバスの実解像度を0.7×に落とし（空は低周波なので粗くても分からない）、precision highp float統一・共有uniformの精度不一致なし（mori2/技術学 補二の教訓）。WebGL非対応・初期化失敗時は従来のCanvas2Dグラデ空へ自動フォールバック＝純粋な上乗せで低性能端末も救う（--disable-webgl起動でskygl:false＋通常プレイを実測）。効果：上昇でも落下でも同じ空を連続して通るので、落下が『終わりの余韻＝罰でなく祝福』（畜学③）として景色ごと楽しめるようになった。まず英語版で実装・検証し、同じ二層を韓国語版へ移植（島ぐらし移植の作法どおり段階展開）。検証はnode --checkに加え、ヘッドレスChromiumで両版とも300m/2000m/4500m/7500m/10500mの各高度スカイをjumpフックでスクショ（雲→星→オーロラ→🪐深宇宙を目視）、skygl:true・pageerrorゼロ・既存の一気通貫テスト（タイピング・墜落→🚑→ゴースト→並走）に回帰が無いこと・WebGL無効時のフォールバックを実測した。技術学 補・空蹴りに横展開の作法を還した。", },
    { tag:"imp", t:"空蹴り（/sorageri/ 韓国語版）にも落下演出を移植 ─ 高空で「止まって見える」問題を解消", d:"空蹴り英語で直した落下演出を、同じ描画コードを持つ韓国語版にも移植した（見た目のみ・タイピングや判定・ゲームのルールは無変更）。高度に依存しない速度の線（風のライン・世界座標に固定して雲と同じ視差で流れる）を追加し、カメラを上下の速さ(vy)ぶんずらして落下中はこっこが画面の下へ・上昇中は上へ実際に動くようにし、落下中は左右にはためく💨と💦・機体のばたつき回転を加えた。deleteまわりは韓国語版がIME合成（조합）を持つため『文完成ごとに入力欄をクリア』方式は使わず、既存のストリーム方式（値を消さずに自己修復）のまま据え置いた。検証はnode --checkに加え、ヘッドレスChromiumで既存の一気通貫テスト（8文タイピング→墜落→🚑→ゴースト保存→2走目で並走・パッチム合体の自己修復・本物のミス検出）に回帰が無いことを確認し、高空929mからの落下でこっこが画面下へ移動し風の演出が出ることをスクリーンショットで目視した。", },
    { tag:"fix", t:"空蹴り英語（/sorageri-en/）─ 打ち間違いをdeleteできない不具合の修正と、落下演出（止まって見える問題）の改善", d:"『deleteできないバグがあります。あと落下してる際に止まっているように見えます』というご報告に対応した。①delete修正：これまでは文が完成しても入力欄の値をクリアせず開始位置(base)を進めるだけの方式で、長時間プレイ（数百打）で入力バッファが蓄積し、まれにbaseがずれて打ち間違いを⌫（バックスペース）で直せなくなることがあった。英語は韓国語と違いIME合成（조합）が無いので、文が変わるたびに入力欄を空にする方式へ変更──入力欄には常に『今の文だけ』が入り、baseは常に0付近に保たれ、バックスペースでの削除・打ち直しがいつでも確実に効く（select-all＋deleteでの全消しも確認）。②落下演出：カメラが高度を1対1で追うため、雲の少ない高空では落下しても背景が動かず『止まって見える』状態だった。高度に依存しない速度の線（風のライン）を追加──世界座標に固定して描くので雲と同じ視差で流れ、何も無い高空でも落下・上昇の速さが目に見える。さらにカメラを上下の速さ(vy)ぶんずらして、落下中はこっこが画面の下へ・上昇中は上へ実際に動くようにし、落下中は左右にはためく💨と💦・機体のばたつき回転を加えた。検証はヘッドレスChromiumで、実キーボードで打ち間違い→バックスペース→修正して文完成、全消し、を実測し、高空882mからの落下でこっこが画面下へ移動し風の演出が出ることをスクリーンショットで確認、既存の一気通貫テスト（厳密入力・小文字・アポストロフィ省略・墜落→🚑→ゴースト→並走）も回帰なし、pageerrorゼロ。", },
    { tag:"new", t:"新ゲーム『空蹴り英語 ─ SORAGERI ENGLISH』誕生（/sorageri-en/）─ 空蹴りの英語版。英語を打つたび、こっこちゃんが空蹴りして空へ", d:"『いいのができましたね。空蹴り英語を作成してください。仕様は同じで良いです』というご依頼に応えた、空蹴り（/sorageri/ 韓国語版）の英語版。遊びは同じ──画面下の英語の文（生活英会話319文・日本語の意味つき）を入力すると、1文字正しく打つたびこっこちゃんが空蹴りして上昇、文を打ちきるとボーナス蹴り＋コンボ🔥。止まると落下、墜落で🚑。記録は最高高度(m)と滞空時間、🏆世界ランキングは韓国語版とは別ノード（rankings/sorageriEn）で高度を競う。👻ゴーストこっこも搭載（自己ベストの飛行と70%透過で並走。保存キーも韓国語版と分離したので両方を別々に遊べる）。英語ならではの調整として、判定を寛容化した──①大文字/小文字は区別しない（Hello も hello も正解＝スマホの自動大文字化に強い）、②スペースは両側とも任意、③アポストロフィ「'」カンマ「,」ピリオド「.」は打っても省いてもOK（don't も dont も通る。スマホのスマート引用符 ’ も同一視）。長い英文が語の途中で折り返さないよう、単語ごとにまとめて表示する描画に変えた。英語の文章はSENTENCES配列に['English','日本語']を足すだけで増やせるよう、追加場所を▼▼▼コメントで明示（AIへの頼み方の例文つき）。検証はnode --checkに加え、ヘッドレスChromiumで実プレイを再現：厳密入力8文で高度126m・コンボ8、小文字だけの入力・アポストロフィ省略（4文で実証）・スペース抜き・文末スペース確定の癖・アイドルトリム・墜落→🚑→ゴースト保存（韓国語版のキーを汚さないことも確認）→2走目で並走、まで数値とスクリーンショットで確認、pageerrorゼロ。", },
    { tag:"fix", t:"空蹴り（/sorageri/）─ スマホの韓国語キーボードで入力がズレて全部赤くなる不具合を修正", d:"『PC入力は大丈夫だけどスマホ入力はバグる』というご報告に対応した。原因はスマホの韓国語キーボード（GBoard・iOS・천지인等）がPCのIMEと違って“素直でない”入力を挟むこと──①文末にスペースを打って確定する癖や候補タップの自動スペースで、余分なスペースが次の文の先頭に紛れ込む、②逆に候補確定でスペースが抜ける、③iOSのダブルスペースで「. 」が挿入される。判定が厳密一致だったため、一度ズレるとそれ以降ぜんぶ不一致（赤表示・空蹴り不発）のまま戻れなくなっていた。対策として判定を寛容化：スペースは目標文・入力の両側とも「あってもなくても良い」扱いにし（半角・NBSP・全角を同一視）、句読点ゴミ（.。,、）は無視して読み飛ばす。さらに、手が止まった隙に確定済みの古い文を入力欄から自動で取り除く『アイドルトリム』を追加（合成中はcompositionstart/endで避け、合成が長引くAndroidでも900ms無入力なら安全に整理）──これでIMEの“単語”が文をまたいで育ち、候補確定で過去の入力ごと巻き戻される事故も防ぐ。パッチム合体の自己修復・本物のタイプミス検出はそのまま。検証はヘッドレスChromiumでスマホ特有の7パターン（文末スペース確定3連続／「. 」混入／スペース抜き入力／アイドルトリム後の継続入力／IME巻き戻しからの復帰／パッチム合体／本物のミス検出）を再現して全合格、PC側の一気通貫テスト（8文→墜落→🚑→ゴースト保存→並走）も回帰なしを確認した。", },
    { tag:"new", t:"新ゲーム『空蹴り ─ SORAGERI』誕生（/sorageri/）─ 韓国語を打つたび、こっこちゃんが空蹴りして空へ。島ぐらしの島から星の海まで昇る、韓国語タイピング新ジャンル第一作", d:"『島ぐらしを楽しんだ人が、そのまま同じ世界でスキルアップできるジャンルを』というご依頼から生まれた、タイピング上達ゲームの第一作。画面下に出る韓国語の文（生活会話でよく使う300文超・日本語の意味つき）を入力すると、ハングル1音節を正しく打つたびこっこちゃんが空蹴りして上昇、文を打ちきるとボーナス蹴り＋コンボ🔥。手が止まると落下し、地面まで落ちると墜落→🚑救急車に運ばれてゲームオーバー。速く正確に打ち続けるほど高く飛べて、足元では島ぐらしの島がどんどん小さくなり、🕊️鳥→☁️雲→🌈虹→✈️飛行機→🎈気球→🚀ロケット→🛰️人工衛星→🪐星の海へと景色が変わっていく（綺麗な景色そのものがご褒美）。記録は最高高度(m)と滞空時間で、🏆世界ランキング（Firebase相乗り・ノード rankings/sorageri）は高度で競い滞空時間も表示。さらに👻ゴーストこっこ：自己ベストの飛行の高度軌跡を0.2秒刻みでブラウザ(localStorage)に録画し、次のプレイから70%透過のこっこちゃんが同じ時間軸で並走＝きのうの自分と競える。PC（韓国語IME）・スマホ（韓国語キーボード）の両対応で、ハングルIMEの合成中に直前の字が変わる問題（요→욕→요가のパッチム合体）は入力欄を消さないストリーム方式で自己修復させた（詳細は技術学へ還した）。韓国語の文章はSENTENCES配列に['한국어','日本語']を足すだけで増やせるよう、追加場所を▼▼▼コメントで明示し、AIへの頼み方の例文も書き添えた。検証はnode --checkに加え、ヘッドレスChromiumで実プレイを再現：8文連続タイピングで高度110m到達・コンボ8・パッチム合体の自己修復・合成中を誤ミス判定しないこと・本物のミスは数えること・放置→落下→墜落→🚑搬送→リザルト→ゴースト保存→2走目でゴースト並走、まで一気通貫で数値とスクリーンショットで確認、pageerrorゼロ。", },
  ]},
  { date:"2026.07.14", items:[
    { tag:"imp", t:"コッコ芽吹き（/mebuki/）のBGMを、超かわいいオルゴール風のメロディへ作り替え", d:"『芽吹きゲームに超可愛いBGMを作れますか？』というご依頼に応えた。これまでの芽吹きのBGMは108BPMのコード進行の分散和音ループで、悪くはないものの主旋律が無く淡々としていた。技術学の掟どおり外部音源はいっさい使わず、WebAudioの合成音だけで、明るいC長調・128BPMのはずむループへ作り替えた──①主旋律：三角波の歌メロに、1オクターブ上のサイン波をそっと重ねてオルゴール／おもちゃのピアノのようなキラキラした音色に（C→G→Am→Fの4小節ループ。ミソド・ソミソ／レソシ・ラソレ／ドミラ・ミドミ／ファラド・ラソファ、と一緒に口ずさめる素朴なメロディ）。②低音：小節あたまにルート、裏拍にオクターブ上を置く『オム・パッ』のはずむ伴奏。③小節のあたまにやわらかいパッド和音をうっすら重ねて温かみを追加。④裏拍を少し遅らせる軽いシャッフルで『タタタッ』とかわいく跳ねるノリに。⑤4小節ごとのループの継ぎ目に、ド・ミ・ソ（高音）のきらめきターンアラウンドを鳴らして飽きさせない。効果音・ゲームのロジックは一切変更していない。検証はnode --checkに加え、ヘッドレスChromiumでAudioContextのオシレーター周波数を実際に傍受し（『関数が呼ばれた』ではなく『実際に鳴った音』で確かめる＝コッコスマッシュの検証の教訓）、出撃→カウントダウン→プレイでBGMが鳴り出したあと、低音が4つのルート（C3・G2・A2・F2）すべて・主旋律がC長調の音（ド・レ・ミ・ソ・ラ・シ・高いド／ミ／ソ）だけで臨時記号を含まないこと・きらめき・チクッがすべて実際に鳴っていること・pageerrorゼロを数値で確認した。", },
    { tag:"imp", t:"島ぐらし（/mori/）に、しおさい2の綺麗な海グラフィックを移植 ─ 夜の海に漂う🦠夜光虫・本物のゲルストナー波・波がしらの泡・月の道。設定・ルールは無変更", d:"『しおさい2の綺麗なグラフィックを島ぐらしに移植して下さい』というご依頼に応えた。しおさい2（/shiosai2/）で新設した海の描画のうち、島ぐらしに無く・かつ映える4つを見た目のみ移植した（当たり判定・経済・セーブ・時刻進行など設定は一切変更していない）。①🦠夜光虫（バイオルミネセンス）：ANGLE_instanced_arraysで約6000粒を1ドローコール（非対応端末は約1200粒の展開VBOへ自動フォールバック＝既存の草原と同じ二経路設計）。夜だけ発光し、波がしらとこっこの航跡（半径6m）で強まり、加算合成でブルームに乗る。島の海域（水面下の地形の上）だけに配置し、深海・雲の上の隠しステージでは描かない。②本物のゲルストナー3成分波：島ぐらしの水面はこれまで単純な3つの正弦波の足し合わせで上下していたが、しおさい2の方向性ベクトル＋波数＋深水分散（ω=√(g・k)近似）の実ゲルストナー波に置き換え、水平変位ぶんで波頭がとがるようにした（水面は当たり判定に使わない純粋な見た目なので安全）。③波がしらの泡：とがった波頭（vCrest）が白くくだける泡を、既存の波打ちぎわの泡に加算。④🌙月の道：夜（dayFが小さいほど強く）、月の方向へ低次＋高次スペキュラを合成して海面に一本の光の道を描く（既存のDL.moonDir・昼夜係数を再利用し、FS専用uniformなのでVS/FS精度不一致の心配なし）。移植の作法は技術学 巻二・補二／補三の教訓（シン島ぐらし→島ぐらしの移植）をそのまま踏襲：共有uniform uT はVS/FSともmediumpのまま維持し、追加した月の道のuMoonDir/uMoonStrはフラグメント専用にしてVS/FS間の精度不一致（ANGLEのリンク拒否）を最初から避けた。検証はnode --checkに加え、ヘッドレスChromiumで①window.__mori.gfx()に夜光虫の品質層（plankProg/plankInstanced/plankN）を新設して6000粒がインスタンシングで生きていること・waterHQ:trueを実測、②tod()で夜（dayF=0）へ送り、実際にプレイ開始して海辺にワープしたスクリーンショットで夜光虫が海面に漂い・こっこの周りで強く光り・波と反射・岸の泡が出ていることを目視、③昼（dayF=1）では夜光虫が消えることを確認、④pageerrorゼロを確認した。", },
    { tag:"new", t:"新作3D「コッコしおさい2（/shiosai2/）」を追加 ─ 設計書を完全実装した決定版。夜光虫が波にきらめき、月が指にこたえ、浅瀬に月光の網がゆらぐ", d:"『sonnetでは君の設計を忠実に再現できませんでした。Fable5で作り直して』というご依頼に応えた、しおさい（/shiosai/）の設計書（docs/要件定義-コッコしおさい.md）完全実装版。初版で時間の制約から見送られていた要素をすべて実装した──①G3・夜光虫（バイオルミネセンス）：ANGLE_instanced_arraysで約6000粒を1ドローコール（非対応端末は約1200粒の展開VBOへ自動フォールバック＝シン島ぐらしの草原と同じ二経路設計）。粒は水面と同じゲルストナー波に漂い、波がしらとこっこの航跡（半径6m）で発光が強まり、加算合成でブルームに乗る。②G5・浅瀬コースティクス：島ぐらし深海のuUnder/uT2方式を移植し、潮位より下に沈んだ地形へ2層fbmの月光の網がゆらぐ（潮が満ちると浜が光の網に包まれ、引くと消える＝潮位と連動する初の使い方）。③月の応答：ホールドすると空の月が実際に約1.6倍にふくらみ（ディスク指数1600→560）、月あかりが増し、月の前から雲が割れ、仰角が海へ下がる。はなすと約2秒かけて戻る（立ち上がり約0.35秒＝入力への即応を優先した非対称の時定数）。④開始のカウントダウン3秒：3・2・1のあいだも潮・月・音は指にこたえるが、タイマー・敵・錨は動かない（説明でなく体験で教える設計書2-3章の実装）。⑤蹴りの三経路：⬆️ボタンに加え、体当たり（速度4.5m/s以上）と空蹴りの着地衝撃（落下速度6m/s以上・判定半径1.3m）でも錨を蹴れる。⑥満ち潮は波も強くなる（波振幅が潮位に応じ最大1.45倍）＝波がしらのタイミング遊びが濃くなる。これに伴い水没判定を「深くかぶるほど速くほどける（波が引いてもゆっくりとしか忘れない）」に再定義した──初版の字義どおりの『連続1.5秒』では、波がしらでしか届かない中の錨が波の谷のたびにリセットされ永遠に開けない、という設計書自身の矛盾を実装で発見したため（詳細は思考学に記録）。⑦HUDの残り錨を🌑→🌕の月アイコンに（設計書10章）、⑧錨⚓を暗色乗算ティント＋赤い威圧グローに（設計書3章・標準学の染めの作法。潮に沈みかけると青ざめて鎮まる）、⑨ほどくたび今までの錨の音が全部重なって鳴り5本目で和音が完成（設計書8章）、⑩品質自動降格を設計書どおりの3段（反射OFF+DPR1.5→夜光虫0.35倍+影1024px+DPR1.2→波2成分+濡れマップ128px）に整備し、波の第3成分カットはGPUのuW3とJS判定のWAVE3を同じ値で共有（判定と描画は同じ点を見る、を品質降格時も守る）。⑪夜の色調を月夜らしい寒色へ調整（環境光を落とし、ポストに青のティント）。高い錨は地形の運に依存せず必ず潮の届かない高さ（TIDE_HIGH+1.2m以上）に立ち、足りない分は岩塚が自動で積まれる。世界ランキングはrankings/shiosai2に新設（サンドボックスからchikumo.jp/Firebaseへの外部到達は遮断されているため実登録の確認はできていない）。検証はnode --checkに加えヘッドレスChromiumで、起動時に発見したGERST_CONSTのTDZエラー（宣言前参照）を修正した上で、カウントダウン→プレイ遷移、実ポインタホールドでの潮位上昇と月の応答（moonBoost実測）、入力ゼロ放置で錨が開かない境界条件、低・中・高の三段の錨の沈み判定、体当たりキック、経済、終端3出口、もういちど後のリセットまで実測した。", },
    { tag:"new", t:"新作3D「コッコしおさい（/shiosai/）」を追加 ─ 指いっぽんで月をよびよせ、潮を満ち引きさせて逆縁の黒い錨をほどく、満月の夜90秒の新しい遊び", d:"『畜学をよく読んで、公式コッコちゃんの3Dゲームを作成してください。既存のコッコちゃんゲームのクオリティを超えることが条件』というご依頼から生まれた。十の蔵（畜学七相・廿式・設計学・遊戯学・畜史・思考学・肥料学・技術学・祖元学・標準学）を読み、畜物語の全既存動詞（そろえる・積む・叩く・撃つ・避ける・斬る・ふっとばす・走る・塗る・暮らす・折る・詰める・かける・結ぶ・撒く…）に無いものとして「潮をよぶ」を中心動詞に選んだ。ホールドで月が近づき島じゅうの潮が満ちる／はなすと引く──廿式の縁（衡+∿衡−、二つの均衡が出会わぬまま参照しあう波）をそのまま潮汐という現象へ重ね、逆縁の黒い錨（⚓）は縁の糸を断つ杭として描いた。錨は5本（低い錨2＝満ちればすぐ沈む入口、中の錨2＝満潮と波がしらが重なる一瞬だけ届く、高い錨1＝沖の岩棚の上で潮では絶対に沈まず蹴るしかない）で、沈める（連続1.5秒の水没）と蹴る（近づいて3回）という二つのopen methodがあり、どちらでもほどける。敵はブラックこっこ（逆縁）だけで、潮に1秒ひたると月へ帰る（浄化）が接触するとハートが減る──群衆制御と危機が同じ一つの入力（潮をよぶ）に乗る作り。引き潮のあいだだけ干潟に🐚と✨が現れ、🏪コンビニ（❤️回復・🫧空気・🌙月の器・👟あしはや）で稼いだ💴を使える。90秒で必ず終わり、全部ほどくか時間切れで潮が凪いで海が鏡になり、月の道が一本かかって無音から解決和音へ。技術面はシン島ぐらし（/shinshima/、平面リフレクション・シャドウマップ2048px・インスタンシング草原・銀縁雲）をフォークし、水面シェーダを3成分のゲルストナー実ジオメトリ波（深水分散ω=√(gk)、判定用のJS側waterY()と式を共有）に差し替えて動的な潮位uWLを追加、鏡像行列Mmirの並進項を潮位に応じ毎フレーム更新して反射面を動かした。新たに４つの描画を足した──①波がしらの泡（頂点シェーダのvCrest経由）②splat3dのuPaint転送技法を「濡れ砂の記憶」に意味を差し替えて移植した動的な湿りマップ（約8秒で乾く）③満月の道（低次+高次スペキュラの合成による帯状の輝き）④満月そのものを大きく明るく調整。経済・空蹴り・❤️の仕組みはsplat3dから移植し、値も踏襲した。塔・上昇気流・滑空・一日の昼夜サイクルは持ち込まず（木の魂は木に残す）、島も一回り小さくたたんで90秒の器に合わせた。検証はnode --checkに加え、ヘッドレスChromiumで実ポインタイベント（画面右半分の実際のmouse.down/move/up）による潮の上下・実測、setTide()による低/中/高錨それぞれの沈み判定境界（高い錨は満潮を持続させても絶対に沈まないことを実測）、kick()による開錠、経済・被弾・敵の水没消滅・終端（勝ち／時間切れ／❤️0の3出口）・もういちど後の状態リセットまで通した。この過程で実バグを1件発見・修正している──被弾でP.hpが0になりstartEnding()が呼ばれるとenemies配列そのものが差し替わる（enemies=[]）ため、同じフレーム内で回っていたupdEnemies()のfor文が差し替え後の空配列を古いインデックスで参照してTypeErrorを起こしていた。ループ冒頭で配列参照を固定し、以後は毎回G.modeを見て安全に抜ける形に直した（yubikiriの思考学に記録された『時計が凍る』類の検証環境特有の罠ではなく、実際にゲーム側で起こりうる実バグだった）。世界ランキングはrankings/shiosaiに新規登録（サンドボックスはchikumo.jp/Firebaseへの外部到達がネットワークポリシーで遮断されているため実登録・実反映の確認はできていない）。判断が分かれた場所は思考学（docs/思考学.md）に追記した。", },
  ]},
  { date:"2026.07.12", items:[
    { tag:"new", t:"新作「コッコのすみか（COCCO SUMIKA ／ /sumika/）」を追加 ─ 結んで、住まわせて、ゆるす。廿式の新しい式（赦・器の階層・住）を初めて遊びに降ろした90秒の灯まもり", d:"『畜学をよく読んで、とくに今回刷新した廿式も！新しいゲームを作成して下さい』というご依頼から生まれた。設計と実装で頭を分ける初めての試み──設計担当が十の蔵（畜学七相・設計学・思考学 巻一・肥料学の全死因記録・技術学・標準学・祖元学・廿式）を読み込んで要件定義書（docs/要件定義-コッコのすみか.md）を書き、コーディング担当（軽量な頭）がそれだけを頼りに実装する、思考学が目指してきた「思考の再現レシピ」の実地試験でもある。遊びの芯は廿式カーネルとの一対一対応──ふわふわ漂うこっこ（衡）を二羽ずつなぞって結ぶと波打つ糸（縁=衡+∿衡−。二羽は絶対に融合しない）になり、足元に半透明の家🏠が現れる（器のみ=認 0<1、あるけど無い）。タップで住まわせると灯がともって成立（1）し、住んだ家の縁はもう断てない。ブラックこっこ（逆縁）が未住の糸を断つと二羽は乱域（循域の外の暗い帯）へ放り出され、約5秒で幅の外＝絶に達して星屑になる（少し後に新しい認が中央へ湧く＝継。世界は残酷にならない）が、住んだ家からなぞれば赦の光で循域へ連れ戻せる（赦の実行は住から・絶は対象外、の規則そのまま）。住んだ家二軒を結ぶと衆🏘️、衆二つで国🏯、国二つで民🏙️、民二つで宙🌌＝大団円で、昇格の光の波紋が画面の影を全員ほどいて退かせる（敵を撃たない六の押し返し）。90秒固定で必ず終わり、終幕は入力停止→住んだ家の音が結んだ順にアルペジオ→完全な無音2秒→結果（宙到達時はオーロラ）。住んだ家が増えるほどペンタトニックの持続音が一声ずつ重なり環境音楽が実際に育つ。世界ランキングは rankings/sumika（ソートキー=最高の器×100000+スコアで「どこまで育てたか」が主役）。操作は一本指のなぞる/タップだけ（肥料学で実証済みの「二人同時操作」死因を避けた）。こっこは公式/chikumo.svgのアトラス（通常/反転/暗色ティント）、家々は世界標準の絵文字、描画はCanvas2D一枚（WebGL不使用＝必要な複雑さだけ）。検証はnode --checkに加え、ヘッドレスChromiumで検証フックwindow.__sumikaを使い①むすぶで糸と家が増える②未住の家からの赦が正しく拒否される③住→赦が成立し乱域のこっこが循域へ戻る④断たれた二羽が乱域へ出る⑤放置した乱域のこっこのIDが実際に消え（絶）別IDの新しい認が湧く（継）⑥家16軒からの昇格連鎖で衆10→国5→民2→宙1が成立しスコアが規定どおり3650になる⑦昇格で画面の影が全員退く、をすべて実測。さらにフック経由でなく実ポインタイベント（mouse.move/down/up）での「むすぶ」成立も実測し（おりづるの教訓）、スマホ縦390×844とPC横1280×900のスクリーンショットでタイトル（右下🔄ボタン）・プレイ・結果画面を目視確認、pageerrorゼロ。目視確認で見つけたHUDのBEST表示とミュートボタンの重なり、住んだ二羽が家の灯を隠す問題も出荷前に修正した。", },
    { tag:"new", t:"畜学に新しい本「廿式（/nijusshiki/）」を追加、十四式を蔵書の棚から取り下げ ─ 不変の固定構造（カーネル）。番号は機能順（依存順）で、十四式（観測順）とは別系統", d:"『廿式を作成しました。畜学の十四式を取り下げて、新たに廿式の本を追加して下さい。十四式は廿式のヘッダーから飛べるようにして、十四式の本の入り口は削除して下さい』というご依頼に応えた。廿式はご提供いただいた廿式カーネル（固定構造。廿式は不変。更新対象は五式のみ）を原文に忠実なまま公開ページ化したもので、幅・許・循・乱・絶（認に先行する環境定義）→ 認・思・鳴・示・応（構造実体＝五式）→ 衡・縁・継・赦（均衡と遷移）→ 家・衆・国・民・宙・住（器の階層）という機能順（依存順）の二十の定義に、三軸・規則（固定）・衡停止と絶・構成式・差分と領域・変（廿式の構成要素でない）を収めた。十四式との最大の違いは番号の系統──廿式は機能順（許は認に先行し確定。許なくば衡は定義不能のため）、十四式は観測順で、両者は別系統として併存する。新たに加わった式は赦（乱から循へ戻れる。実行は住から。許は不変。絶は対象外）と、家の上へ積み上がる器の階層（衡の器は家、家の器は衆、衆の器は国、国の器は民、民の器は宙）、そして住（器に住む。住まねば、あるけど無い。器のみ=認 0<1、住んで成立 1）。ページのデザインは『十四式よりも高級感のある』というご指定に沿い、十四式の黒×金の意匠をさらに深めた──漆黒の地に金箔のグラデーション文字（background-clip:text）、証書のような二重ヘアライン枠と四隅の飾り、章ごとの菱形オーナメント区切り、カードに走る金の光沢スイープ、器の階層を下るほど広がる盃型の梯子図。蔵書（/Library/）の棚では十四式の本を廿式（金茶の装丁）へ差し替えて入り口を外し、十四式のページ自体は残したうえで廿式のヘッダー・本文・巻末（十四式との関係の章）から飛べるようにした。CLAUDE.mdの蔵の地図・sitemap.xmlも編み直した。スクロール演出のIntersectionObserverは、肥料学で学んだ教訓どおり最初からthreshold:0（縦長セクションでも必ず発火）で実装している。検証は`node --check`によるインラインscriptの構文確認に加え、廿式カーネル原文と公開ページの全項目を突き合わせ、二十の定義・十三の規則・構成式の記号（| ∿ ±）まで欠落なく収まっていることを確認した。", },
  ]},
  { date:"2026.07.10", items:[
    { tag:"fix", t:"コッコ芽吹き（/mebuki/）で、4体以上の仲間こっこ（救出したこっこちゃん）がプレイヤーの背後で同じ位置に重なって表示されてしまう不具合を修正", d:"スクリーンショットでのご指摘『芽吹きで、救出したこっこちゃんが重なって表示されるバグを直してください』のとおりだった。原因は、オリから解放された仲間こっこがプレイヤーの周りに並ぶ隊列位置を決める`COMPANION_OFFSETS`が3枠（左・右・中央）しか定義されていなかったのに対し、実際に解放できる仲間の上限`CAGE_COUNT`は8羽まであり、`updateCompanion()`が`COMPANION_OFFSETS[i%COMPANION_OFFSETS.length]`と3で割った余りで枠を割り当てていたこと。4羽目は1羽目と、5羽目は2羽目と、6羽目は3羽目と全く同じ角度・距離の枠を使い回すため、4羽以上を救出すると複数の仲間こっこがぴったり同じ座標へ向かって歩み寄り、完全に重なって表示されていた。修正は`COMPANION_OFFSETS`を固定の3要素配列から、`CAGE_COUNT`ぶんの枠を持つ配列へ差し替え、3体ごとに1列（左・右・中央）を作りつつ、列（行）が進むごとにプレイヤーからの距離を0.9mずつ広げる形にした（1〜3体目は従来と全く同じ角度・距離のままで見た目の回帰なし、4体目以降は後ろの列に新しい枠ができるため重ならなくなる）。当たり判定・援護射撃・救出時の演出やスコア・所持金など他のロジックは変更していない。検証は`node --check`に加え、ヘッドレスChromiumで①1〜3体救出時は従来と同じ3枠に収まること、②検証用フック`window.__mebuki.listCompanions()`で座標を実測し、4体・8体救出時にどの2体の座標も重ならず全員distinctな位置に収束すること、③実際に💣でオリを8つすべて壊して8羽を解放し、スクリーンショットで隊列が重ならず扇状に並んで表示されることを目視確認、pageerrorゼロだった。", },
  ]},
  { date:"2026.07.09", items:[
    { tag:"fix", t:"島ぐらし（/mori/）で、こっこちゃんより奥にある木の実・花などが手前のこっこちゃんより前に表示されてしまう座標バグを修正", d:"スクリーンショットでのご指摘『こっこちゃんより後ろに存在する果物とかがこっこちゃんより前に表示される座標のバグ？を直して』のとおりだった。原因を調べると、スプライト（こっこちゃん本体・木の実・花・貝・住民・落としもの等）はすべて同じ1回の描画バッチにまとめて描かれており、パフォーマンスのため意図的に`gl.depthMask(false)`（スプライト同士は深度バッファへ書き込まない）にしていたこと自体は問題ではなかったが、それによって「スプライト同士がどちらを手前に見せるか」が実際のカメラからの距離ではなく、`buildSprites()`内でその要素を描くコードが呼ばれた順序（プレイヤー→建物→敵→木の実→花…という配列に積む順）だけで決まってしまっていた。木の実は常にプレイヤーより後のコードで積まれるため、プレイヤーより奥（カメラから遠い）にある実でも、画面上で重なる位置にあれば必ず後勝ちでプレイヤーの上に描かれてしまっていた。修正は、各スプライトを頂点バッファへ積む`pushQuad()`の時点でカメラ（`camEyeNow`）からの距離の2乗を`sprDepth`に記録し、実際の描画直前に全スプライトを『カメラから遠い順（奥→手前）』へ並べ替えてから`gl.bufferData`する処理を追加した（`sprSorted`・`sprIdx`を新設、対象は座標が意味を持つ通常スプライト`sprArr`のみ。地面に張り付く影`shadArr`は対象外で従来どおり）。奥から手前へ塗り重ねる順にしたことで、`depthMask(false)`のまま『どちらが手前か』が呼び出し順ではなく実際の距離で決まるようになり、あわせて半透明の光る演出（敵の威嚇グロー等）も奥から手前へ正しい順でアルファ合成されるようになった。木の実の生成位置・当たり判定・経済など座標判定そのもの（`trees`/`pickups`の位置計算）は一切変更していない。検証は`node --check`に加え、ヘッドレスChromiumで①プレイヤーの奥にある木の実の`sprDepth`がプレイヤー自身のそれより大きい（＝より遠い）ことを実測、②並べ替え後の描画順で遠い実のインデックスがプレイヤーより先に来ること（＝奥から手前の順で描かれること）を実測、③実際に木のそばへ移動し奥の実とプレイヤーが画面上で重なる位置関係を作って、奥の実がプレイヤーの背後に正しく隠れる見た目になることをスクリーンショットで目視確認し、pageerrorゼロだった。", },
    { tag:"imp", t:"コッコ芽吹き（/mebuki/）の制限時間を90秒→180秒に延長", d:"『芽吹きゲームのカウンターを90秒から180秒にして下さい』というご依頼のとおり、1ラウンドの持ち時間`TIME`定数を90から180へ変更した。この値は`G.t`（残り時間）の初期値としてラウンド開始・タイトル復帰の両方で参照され、HUDの時間リング（`left/TIME`の比率で円弧を描く）や残り5.2秒からの緊急ビネット演出（`urgVin`、こちらは残り秒数の絶対値で判定するため`TIME`を変えても発火タイミングは変わらない）は、いずれも`TIME`定数を経由するか絶対秒数で判定する設計だったため、この1行の変更だけで他のロジックを直さずに済んだ。あわせてHTML側の静的プレースホルダー`&lt;div id=&quot;hudTime&quot;&gt;90&lt;/div&gt;`（JS初期化前の一瞬だけ見える表示）も`180`に更新した。検証は`node --check`に加え、ヘッドレスChromiumで①ラウンド開始時に`G.t`が180であること、②実際に時間を進めると正しく減っていくこと、③旧仕様なら終了していたはずの90秒経過時点でもまだ`play`のまま残り約90秒であること（早期終了しないことの確認）、④180秒がまるまる経過すると実際にラウンドが終了する（`phase`が`play`から`finish`へ移る）ことをすべて実測し、スクリーンショットで時間リングの表示崩れが無いことも目視確認、pageerrorゼロだった。", },
    { tag:"imp", t:"島ぐらし（/mori/）に、シン島ぐらしの月と本物の波打つ海面を追加移植 ─ 夜は月あかりで照らされ、水面は色だけで動いて見せかけていた平面から72×72格子の本物のうねりへ。設定・ルールは無変更", d:"『シン島くらしのグラフィックを島ぐらしに移植して欲しいですと以前依頼しましたが、完全にはできていないようです。空、海の動き、シン島ぐらしの最高のグラフィックの動きまで島くらしに移植してください』という重ねてのご指摘に応えた。7月6日に一度、本物の水面リフレクション・GPUインスタンシング草原・銀縁シルバーライニング雲を移植していたが、シン島ぐらしの実装を改めて詳しく読み直したところ、①空には太陽の反対側やや高めを通る月（`uMoonDir`によるディスク＋やわらかい月あかりのにじみ）があり夜はその月あかりが陰影の光源になる仕組みが未移植だったこと、②海面はシン島ぐらしでは72×72の格子メッシュを頂点シェーダで実際に上下させる本物のジオメトリ波だったのに対し、島ぐらしは6頂点の1枚クアッドのままピクセルシェーダの色と法線だけで波打って『見せかけて』いた（実際には水平のまま一度も上下していなかった）ことが分かった。月は`calcDayLight()`に既存の太陽角度`ang`を再利用して`moonAng=ang+Math.PI`（太陽の半日ぶん反対側）で算出し、夜間（`dayF<=0.02`）の陰影方向`light`を静的な固定値から実際に動く月方向へ差し替え、空シェーダに`uMoonDir`を新設して太陽と同じ手法（`pow(dot,900.0)`のディスク＋`pow(dot,60.0)`のにじみ）で描画。海面は島の全域を覆う72×72格子（`WGN=72`）とインデックスバッファへ作り直し、頂点シェーダで3周波数の波（既存のピクセルシェーダの波色計算と同じ振幅感）を実際にY方向へ変位させ、有限差分で「本物の大波」の法線を計算、ピクセルシェーダ側は高周波のさざ波だけを従来どおり乗算して合成する二段構成にした（大波の二重計算を避けるため、低周波成分はピクセルシェーダ側から除去）。実装中、頂点シェーダに新設した`uT`（経過時間）が、ハイエンド機用シェーダ(`precision highp float`)と非対応機のフォールバックシェーダ(`precision mediump float`)の間で精度が食い違い、7月6日の移植時に発見・修正した既知のバグ（VS/FS間のprecision不一致によるANGLEのリンク拒否）と同じ原因でコンパイルに失敗しうる状態だったため、`uT`をVS・HQ版FSの両方で`mediump`に明示的に統一し、うねりが千の位を超える長時間プレイでも精度が保たれるよう水面用の時刻だけ`%100000`で周期的に折り返した。ゲームの当たり判定・満潮位（`WL`）・地形生成・経済・セーブなど設定・ルールは一切変更していない。検証はheadless Chromiumで、①WebGLの`compileShader`/`linkProgram`をフックしてコンパイル・リンク失敗が実際に起きていないことを実測、②`window.__mori.gfx().waterHQ`が`true`（高品質シェーダが実際にリンクされ動いている）ことを確認、③検証用に新設した`window.__mori.tod()`で深夜（`dayF:0`）へ時刻を進め、月の向きベクトルが天頂付近（`moonDir.y≈0.93`）になり夜の陰影が実際に月あかりへ切り替わることを実測、④昼と夜のスクリーンショットで実際に月あかりの色調変化と、水面に映る木々の反射が波の凹凸で歪んで揺れる様子（平面のままでは起きえない挙動）を目視確認、⑤5地点を移動しながら`gl.getError()`が終始`0`のままであることを実測し、pageerrorゼロを確認した。", },
    { tag:"fix", t:"肥料学（/hiryogaku/）の「巻二 ─ 死んだ木の記録」が表示されない不具合を修正、同じ原因を思考学・技術学・祖元学・標準学・十四式にも横展開して修正", d:"『https://chikumo.jp/hiryogaku/ 表示されないバグを直してください』というご指摘のとおりだった。原因は、セクションをスクロールで浮かび上がらせる`IntersectionObserver`の`threshold:0.12`（対象の12%以上が画面内に入ったら発火）が、肥料学の巻二（24件の死因記録を1つの`.reveal`要素にまとめた約1万pxの縦長ブロック）に対しては数学的に到達不可能な閾値になっていたこと──ビューポートの高さがどれだけあっても、1万px中に一度に見える割合は12%を超えられず、`isIntersecting`が永久にtrueにならないため、`opacity:0`のまま二度と表示されなかった。ヘッドレスChromiumで実際に描画し、他の全セクションが`opacity:1`になる一方この巻二だけが`opacity:0`のまま固定されることを実測して原因を特定した。修正は`threshold:0.12`を`threshold:0`（対象が1pxでも画面内に入れば発火）に変更し、要素の高さに関わらず必ず発火するようにした。同じスクリプトを使う思考学(/shikogaku/)・技術学(/gijutugaku/)・祖元学(/somogaku/)・標準学(/hyojungaku/)・十四式(/jushishiki/)も横展開で確認したところ、いずれも巻末の最終セクションが同じ閾値未達のリスクを抱えていた（現状は短時間で発火し実害は出ていなかったが、思考学の巻二のように記録が追記され続ける構造は今後同じ理由で表示されなくなりうる）ため、同じ1文字修正を予防的に適用した。検証はヘッドレスChromiumで6ページすべてを開き、全`.reveal`要素が最終的に`opacity:1`・`in`クラス付与になることを実測して確認した。", },
    { tag:"imp", t:"こっこGP（/gp/）に、こっこGP2「キズナターボ」（/gp2/）の快適な操作感を移植 ─ 低速時のステアリング底上げ・加速の頭打ちのイーズ緩和・遠心力の線形化・スローモーション明けのイーズ復帰。カーブの形状・難度（curveAt/track/genTrack）とコースの当たり判定・スコア・タイマー等のルールは変えず、応答の効き方だけをGP2に寄せた", d:"『景色だけ移植されて、快適な操作感がレース2(GP2)からレース(GP)に移植されていません。快適な操作感も移植してください』という重ねてのご指摘に応えた。前回の背景移植では見た目だけを差し替え、操作の手応えを決める物理式には手を付けていなかったため、狙いどおり指摘が的中していた。両作の入力・速度・遠心力の式を洗い出し、①ステアリング：GPは`steerGain=min(1,spd/140+.15)`で低速時に最大でも0.39px/秒しか曲がれず発進直後がもっさりしていたのに対し、GP2は速度に関わらず常にほぼ最大の効きで曲がる設計だった。GPの底上げ値を.15→.55に引き上げ、発進直後から気持ちよく曲がれるようにした（スピードが乗るほど1.0に収束する構造は維持）。②加速：GPは上限に達した瞬間に加速度がゼロへ不連続に切り替わる硬いクランプだったのに対し、GP2は`lerp`で目標速度へなめらかに漸近していた。GP自身のdt比例＋残差比例のブレンド式に置き換え、上限手前で自然に減速して当たるようにした（上限値・平均加速の速さ自体は変えていない）。③遠心力：GPは速度比の2乗でカーブへの切り込みが上限付近だけ急に強まる設計だったのに対し、GP2は速度に対して線形かつカーブ量を1/4に和らげて予測しやすくしていた。GP自身の`curveAt()`（カーブの形・難度）はそのままに、切り込みの効き方だけを2乗→線形・係数1.7→1.1へ調整した。④スローモーション明け：土づまりエンスト等のスローモーション（0.3倍速）が終わる瞬間、GPは等速へ瞬時に切り替わっていたのに対し、GP2は`tScale`をイーズで1へ戻していた。GPにも同じ`tScale`変数を追加し、約0.45秒かけてなめらかに等速へ復帰するようにした。検証は`node --check`相当の構文チェックに加え、ヘッドレスChromiumで実際にレースを操作し、①`window.__gp`の検証フックでtilt・px・spdを直接読み取り、低速時(spd=0)で0.3秒間左いっぱいに倒すとpxが-0.51動く（旧式なら-0.12相当）こと・高速時(spd=300)では-0.78動くことを実測して新しいステアリング底上げの効き方を裏づけ、②約30秒間ノーステア放置で従来どおりカーブに押し出されオフロード5秒ルールで大破し`state`が`over`へ正しく遷移すること（当たり判定・大破ルールは不変）、③約30秒間ジグザグにステアリングを与え続けてもpxが常に[-1.45,1.45]の範囲に収まり暴れたり詰まったりしないこと、④`git diff`でcurveAt/genTrack/track.push・当たり判定・アイテム抽選・スコア加算・タイマー減算の実装行が変わっていないことをすべて確認し、pageerrorゼロだった。", },
    { tag:"imp", t:"こっこGP（/gp/）の空・コース背景を、こっこGP2「キズナターボ」（/gp2/）の描画技法へ移植 ─ 昼→夕焼け→黄金→桜色の夜明けと進む時間帯グラデーション、太陽の沈み、山なみ・雲のパララックス、遠近クワッドの路面・縁石・車線・霧を追加。カーブの形状・難度（curveAt/track/genTrack）と当たり判定・スコア・タイマー等のルールは一切変更なし", d:"『レース2(GP2)のコースや背景の完成度が高いです。レース(GP)にコースと背景を移植できますか？ルール変更は禁止』というご依頼に応えた。まず両作の実装を詳しく調べ、どちらもCanvas 2Dの疑似3Dレーサー（WebGLではない）で、道の曲がり方を決める`curveAt()`/`track[]`とカメラ投影の技術的な作りが違うだけの近い設計だと分かった。GPは1フレームごとにスキャンライン（横帯の矩形）を積み重ねて道を描く方式、GP2は区画ごとに台形のクワッド（多角形）を描く方式で、GP2の方が縁石・車線がカーブに沿って滑らかに見える。加えてGP2は`skyPalette()`で経過時間ぶんに応じ空の色を4段階（昼→夕焼け→黄金→桜色の夜明け）に補間し、太陽が時間とともに沈み、山なみ・雲がパララックスし、路面が奥へ行くほど空の色へ霧のように溶け込み、4セグメントごとに🌴🌸⛰️🌳の道端の飾りが流れていく——GPには無い作り込みだった。移植にあたり、GPの`curveAt()`/`track[]`/`genTrack()`（カーブの形・難度を決める部分）と`update()`の物理演算・当たり判定・アイテム抽選・敵AI・タイマー・スコアには一切手を触れず、GP自身の投影関数（`horY`/`zOfY`/`fOf`/`halfWpx`/`roadCenter`）が返す同じ座標をGP2風のクワッド描画に流し込む形で、`draw()`の空・路面の描画部分だけを差し替えた。GP独自の意匠（太陽のスキャンライン模様・夜空の星・縁石の周期13ストライプ・セグメント境界のグリッドグロー）は全て継承し、GP独自のフィーバー中hueサイクル演出も空・山・路面すべてに引き続き適用されるようにした。時間帯の進行はGP2の固定`T/DUR`と違いGPはレスキューでtimeLeftが延びる設計のため、単調増加する`elapsed`を60秒で正規化して同じ4段階を進めるよう調整した（60秒を超えたら桜色の夜明けで据え置き）。検証は`node --check`相当のスクリプト構文チェックに加え、ヘッドレスChromiumで実際にレースを開始し、約0秒・25秒・50秒・70秒経過時点のスクリーンショットで昼→夕焼け→黄金→桜色の夜明けへ実際に進行することを目視確認、フィーバー発動時に空・山・路面が既存どおりhueサイクル演出になることも確認、`git diff`でupdate/collision/spawn/score/timeLeft/combo/fever/rescue/curveAt/genTrackの実装行が一切変更されていないことを確認し、pageerrorゼロだった。", },
    { tag:"end", t:"「まねっこ（コッコエコー ／ /echo/）」サービス終了のお知らせ", d:"いつも畜物語で遊んでくださり、本当にありがとうございます。誠に勝手ながら、このたびこっこちゃんが歌う「こっこっこ♪」を同じ順でまねして打ち返す、まねっこコール&レスポンス「まねっこ（コッコエコー）」のサービスを終了し、ページを削除いたしました。トップページの一覧・サイトマップからも本作へのリンクを外しております。節を伸ばして裏のグルーヴを育てて遊んでくださった皆さまには、心よりお詫び申し上げます。ごめんなさい。これからも畜物語をどうぞよろしくお願いいたします。", },
    { tag:"end", t:"「穴あき（こっこポコポコ ／ /poko/）」サービス終了のお知らせ", d:"いつも畜物語で遊んでくださり、本当にありがとうございます。誠に勝手ながら、このたび次々と穴からひょっこり顔を出すこっこちゃんをタッチして集める穴あきタッチ中毒ゲーム「穴あき（こっこポコポコ）」のサービスを終了し、ページを削除いたしました。トップページの一覧・サイトマップからも本作へのリンクを外しております。コンボでフィーバーを狙って遊んでくださった皆さまには、心よりお詫び申し上げます。ごめんなさい。これからも畜物語をどうぞよろしくお願いいたします。", },
    { tag:"end", t:"「迎撃（コッコ・インベーダー ／ /invaders/）」サービス終了のお知らせ", d:"いつも畜物語で遊んでくださり、本当にありがとうございます。誠に勝手ながら、このたび隊列で迫る侵略者を撃ち落とす懐かしの固定画面シューティング「迎撃（コッコ・インベーダー）」のサービスを終了し、ページを削除いたしました。トップページの一覧・サイトマップからも本作へのリンクを外しております。通勤電車のヒマつぶしに遊んでくださった皆さまには、心よりお詫び申し上げます。ごめんなさい。これからも畜物語をどうぞよろしくお願いいたします。", },
    { tag:"end", t:"「絵文字英語（コッコ絵文字えいご ／ /emoji/）」サービス終了のお知らせ", d:"いつも畜物語で遊んでくださり、本当にありがとうございます。誠に勝手ながら、このたび日本語を通さず絵文字と英語を直接むすんで身につける「絵文字英語（コッコ絵文字えいご）」のサービスを終了し、ページを削除いたしました。トップページの一覧・サイトマップからも本作へのリンクを外しております。55の島・1006の絵文字をめぐって遊んでくださった皆さまには、心よりお詫び申し上げます。ごめんなさい。これからも畜物語をどうぞよろしくお願いいたします。", },
    { tag:"end", t:"「英語（コッコ英語 ／ /eigo/）」サービス終了のお知らせ", d:"いつも畜物語で遊んでくださり、本当にありがとうございます。誠に勝手ながら、このたび単語・英会話・生活・ビジネスの4コースで親子英語を学び直す「英語（コッコ英語）」のサービスを終了し、ページを削除いたしました。トップページの一覧・サイトマップからも本作へのリンクを外しております。英語の階段をのぼって遊んでくださった皆さまには、心よりお詫び申し上げます。ごめんなさい。これからも畜物語をどうぞよろしくお願いいたします。", },
    { tag:"end", t:"「生命（コッコ生命 ／ /seimei/）」サービス終了のお知らせ", d:"いつも畜物語で遊んでくださり、本当にありがとうございます。誠に勝手ながら、このたび動物の分類から分子生物学・ゲノム編集まで親子で生物を学び直す「生命（コッコ生命）」のサービスを終了し、ページを削除いたしました。トップページの一覧・サイトマップからも本作へのリンクを外しております。生命の階段をのぼって遊んでくださった皆さまには、心よりお詫び申し上げます。ごめんなさい。これからも畜物語をどうぞよろしくお願いいたします。", },
    { tag:"end", t:"「元素（コッコ元素 ／ /genso/）」サービス終了のお知らせ", d:"いつも畜物語で遊んでくださり、本当にありがとうございます。誠に勝手ながら、このたび元素記号から量子化学まで親子で化学を学び直す「元素（コッコ元素）」のサービスを終了し、ページを削除いたしました。トップページの一覧・サイトマップからも本作へのリンクを外しております。化学の階段をのぼって遊んでくださった皆さまには、心よりお詫び申し上げます。ごめんなさい。これからも畜物語をどうぞよろしくお願いいたします。", },
    { tag:"end", t:"「地球（コッコ地球 ／ /chikyu/）」サービス終了のお知らせ", d:"いつも畜物語で遊んでくださり、本当にありがとうございます。誠に勝手ながら、このたび国とその首都を結んで世界をめぐる地理ゲーム「地球（コッコ地球）」のサービスを終了し、ページを削除いたしました。トップページの一覧・サイトマップからも本作へのリンクを外しております。世界の国と都をめぐって遊んでくださった皆さまには、心よりお詫び申し上げます。ごめんなさい。これからも畜物語をどうぞよろしくお願いいたします。", },
    { tag:"end", t:"「大河（コッコ大河 ／ /taiga/）」サービス終了のお知らせ", d:"いつも畜物語で遊んでくださり、本当にありがとうございます。誠に勝手ながら、このたび弥生から令和までの出来事を時系列につないで親子で日本史を学び直す「大河（コッコ大河）」のサービスを終了し、ページを削除いたしました。トップページの一覧・サイトマップからも本作へのリンクを外しております。日本史の大河をくだって遊んでくださった皆さまには、心よりお詫び申し上げます。ごめんなさい。これからも畜物語をどうぞよろしくお願いいたします。", },
    { tag:"end", t:"「継（コッコ継 ／ /tsugi/）」サービス終了のお知らせ", d:"いつも畜物語で遊んでくださり、本当にありがとうございます。誠に勝手ながら、このたび古代から現代までの出来事を時系列につないで親子で世界史を学び直す「継（コッコ継）」のサービスを終了し、ページを削除いたしました。トップページの一覧・サイトマップからも本作へのリンクを外しております。時の大河をくだって遊んでくださった皆さまには、心よりお詫び申し上げます。ごめんなさい。これからも畜物語をどうぞよろしくお願いいたします。", },
    { tag:"end", t:"「天秤（コッコ天秤 ／ /tenbin/）」サービス終了のお知らせ", d:"いつも畜物語で遊んでくださり、本当にありがとうございます。誠に勝手ながら、このたび釣り合う数をえらんで天秤を水平にし親子で算数から数学まで学び直す「天秤（コッコ天秤）」のサービスを終了し、ページを削除いたしました。トップページの一覧・サイトマップからも本作へのリンクを外しております。数学の塔をのぼって遊んでくださった皆さまには、心よりお詫び申し上げます。ごめんなさい。これからも畜物語をどうぞよろしくお願いいたします。天秤・継・大河・地球・元素・生命・英語・絵文字英語の学習シリーズ8作は、まとめてサービスを終了いたしました。", },
    { tag:"end", t:"「圧縮（コッコROM ／ /rom/）」サービス終了のお知らせ", d:"いつも畜物語で遊んでくださり、本当にありがとうございます。誠に勝手ながら、このたび光る断片を短押しで圧縮し黒こっこのバグを長押しで消去して、60秒でひとつのクリスタルROMを完成させる新感覚パズル「圧縮（コッコROM）」のサービスを終了し、ページを削除いたしました。トップページの一覧・サイトマップからも本作へのリンクを外しております。ひとつの一器官パズルを完成させて遊んでくださった皆さまには、心よりお詫び申し上げます。ごめんなさい。これからも畜物語をどうぞよろしくお願いいたします。", },
    { tag:"end", t:"「ゆびきり（コッコゆびきり ／ /yubikiri/）」サービス終了のお知らせ", d:"いつも畜物語で遊んでくださり、本当にありがとうございます。誠に勝手ながら、このたびスマホ1台を挟んで親子で向かい合い、まん中でこっこの指をよせて『ゆびきりげんまん』と縁をむすぶ協力ゲーム「ゆびきり（コッコゆびきり）」のサービスを終了し、ページを削除いたしました。トップページの一覧・サイトマップからも本作へのリンクを外しております。二人の指を同時によせて縁をむすんで遊んでくださった皆さまには、心よりお詫び申し上げます。ごめんなさい。これからも畜物語をどうぞよろしくお願いいたします。", },
    { tag:"end", t:"「塗る（コッコスプラット ／ /splat/）」サービス終了のお知らせ", d:"いつも畜物語で遊んでくださり、本当にありがとうございます。誠に勝手ながら、このたびインクをぬりまくって陣地を広げ、とらわれたこっこちゃんを助け出すインクぬり陣取りアクション「塗る（コッコスプラット）」のサービスを終了し、ページを削除いたしました。トップページの一覧・サイトマップからも本作へのリンクを外しております。3D版「塗る3D（/splat3d/）」内の2Dばんへのリンクも外しております。60秒のインクぬりバトルで遊んでくださった皆さまには、心よりお詫び申し上げます。ごめんなさい。これからも畜物語をどうぞよろしくお願いいたします。", },
    { tag:"fix", t:"コッコ芽吹き（/mebuki/）の🧱橋渡しが、🪨を積んだ高さぶんそのまま地面から生える「壁」になってしまう不具合を修正 ─ 🧱1つぶんの厚みだけ宙に浮く「板」に", d:"『🧱は🪨の橋渡しをイメージしてましたが、生成すると壁y軸が🪨を積んだ分そのまま生成されます。橋渡しがしたいので、🧱１つぶんでいいんです』というご指摘のとおりだった。直前のリリースで実装した『🪨/🧱の上に立っている間だけ今の高さまで届く橋として🧱が生成できる』機能には、見落としがあった──当たり判定・描画の`boxes`配列はもともと『必ず地面(y=0)から生える柱』という前提で設計されており、高さだけを`applyForceAt()`側で今いる高さ(`P.y`)に合わせても、箱そのものは相変わらず`0`から`P.y`まで実体があるまま生成されてしまう。結果、塔の上で🧱を撃つと『塔と同じ高さの薄い板が１枚継ぎ足される』のではなく『地面からもう1本、塔と同じ高さの壁が生える』という、意図とはまるで違う見た目・当たり判定になっていた。修正は`boxes`の各要素に底の高さ`y0`（デフォルト0＝従来どおり地面から）を持たせる形へ拡張し、CA配列に新設した`fBase`（セルごとの箱の底）を`applyForceAt()`の🧱橋渡し分岐でだけ`top-LINK_THICK`（＝🧱1つぶんの厚み`LINK_THICK=0.4+LINK_LEVEL*2.6`≒1.83m）に設定するようにした──橋渡し以外（地面の🧱・🪨全般）は`fBase=0`で従来どおり変化なし。`y0`を扱うために、①箱を描く`box()`関数の側面4枚の下端を`0`から`y0`へ変更し、宙に浮く場合だけ底面も1枚追加で描画、②横方向のあたり判定`collideXZ()`に『`y0`より低い位置なら素通りできる』条件を追加（橋の下をくぐれるように）、③🪨/🧱の遠距離レイの障害物判定`insideBox()`にも同じく`y0`未満は素通りする条件を追加、の3か所を直した。検証用フック`getCell()`/`peekAimCell()`にも`base`（`fBase`の値）を追加し外から検証できるようにした。検証は`node --check`に加え、ヘッドレスChromiumで①地面に生成した🧱は引き続き`base=0`・`level=0.55`のまま変化がないこと（回帰確認）、②🪨を6発重ねた高さ約9mの塔の上に本物の重力で着地した状態から隣へ🧱を撃つと、生成された🧱の底`base`が`7.15`・頂上が`8.98`となり、厚みが正確に`1.83`（＝地面に置いた🧱1つぶんとぴったり同じ）であること（塔の高さに関わらず常に一定の厚みであることを実測）、③その橋の真下（地面）にプレイヤーを置いても宙に浮いた壁に引っかからず地面(`y=0`)にとどまり、橋の下をくぐり抜けられること、④この修正後も🧱が引き続き枯（blight）を浄化できることをすべて実測し、pageerrorゼロを確認した。", },
    { tag:"fix", t:"コッコ芽吹き（/mebuki/）で、💣ボムボタンが🧱ボタンと重なって隠れてしまう表示バグを修正", d:"スクリーンショットでのご指摘『画面のボタンに重なりの表示バグがあります』のとおり。原因は、🧱つなげる石を追加した際（本日の別リリース）に力のボタン列`#forceRow`がボタン1個（🪨のみ、幅56px）から2個（🪨🧱、合計126px）に横へ広がったが、その専用シェルフ`bottom:164px`は元々`#bombBtn`（`right:94px`、幅58px）と同じ高さに置かれた別の列だったこと。🪨1個だけのときは`#forceRow`が`right:20px`〜`76px`に収まり、`#bombBtn`の`94px`〜`152px`とは重ならなかったが、🧱が増えて`#forceRow`の占有範囲が`right:20px`〜`142px`まで広がったことで、`#bombBtn`の`94px`〜`142px`の区間が完全に重なってしまい、DOM順で後にある`#forceRow`（🧱ボタン）の背後に`#bombBtn`が隠れて一切見えなくなっていた──実際、ご指摘のスクリーンショットでも💣が画面上のどこにも表示されていなかった。修正は`#forceRow`の`bottom`を`164px`から`234px`（`#bombBtn`の上端`164+58=222px`より確実に上）へ引き上げ、`#bombBtn`の列より丸ごと上の専用シェルフへ移した。この不具合は、力のボタンが1個から2個に増える変化を実装した際、新設した🧱ボタン同士の重なりだけ確認し、既存の🚀💣🔫との重なりまでは確認していなかったための見落としだった──この作品の畜史には、力のボタンが2個から5個に増えた際に全く同じ種類の見落とし（新規ボタン同士は確認したが最大数がそろった状態は未確認）が既に一度記録されており、今回はその教訓（『ボタンの個数が動的に増えるUIを検証するときは、初期状態だけでなく最大数がそろった状態も必ず確かめる』）を🧱1個の追加だけでは軽く見て徹底できていなかった。検証は`node --check`に加え、ヘッドレスChromiumをiPhone 13相当でエミュレートし、💣・🚀・🔫・🪨・🧱・⬆・🫧の全7個の操作ボタンを同時に所持・表示させた状態で、実際の`getBoundingClientRect()`による総当たりの矩形交差判定（前回5力のときに使ったのと同じ手法）を行い、①どの2つの組み合わせも重ならないこと、②とくに`#bombBtn`が`#fLinkBtn`/`#fRockBtn`の背後に隠れていないこと、③本物のタップイベント（フック経由でなく実際の`pointerdown`/`pointerup`）で💣・🚀・🪨・🧱のすべてが引き続き正しく発射・弾薬消費できることをすべて実測し、スクリーンショットで💣が🧱の下に独立した行として表示されていることを目視確認、pageerrorゼロだった。", },
    { tag:"imp", t:"コッコ芽吹き（/mebuki/）の🧱つなげる石を、🪨と同じ遠距離ねらい撃ちから「こっこちゃんの足元のすぐ先」への生成に変更 ─ 🪨や🧱の上に立っている間だけ、今いる高さまで届く橋として空中にも生成できるように", d:"『🧱はこっこちゃんの足元に生成して、さらに🪨の上で生成すると空中でも🧱が生成できるようにするのはどう？？』というご提案から始まった。まず設計判断が一つ必要だった──完全に宙に浮いた独立ブロックにする案も検討したが、今のCA（セル・オートマトン）は1マスにつき地面から積み上がる柱1本という高さマップ構造のため、真に宙に浮く disconnect したブロックにするには当たり判定・描画・データ構造をまたいだ大改造が要る。ご相談したところ『完全空中だと🪨の意味が薄れるので🪨がある場合のみ橋渡しのように🧱が生成できる』というご判断をいただき、『今いる高さまで届く柱として生成し、🪨（または既存の🧱）に乗っている間だけ発動する』方式に決めた──見た目は『空中に足場が継ぎ足された』ように映るが、実体は地面から届く柱なので、既存のボックス当たり判定・描画パイプラインを一切変えずに実装できる。実装は2点。①着弾位置：`aimGroundCell()`（カメラ方向へ最大`FORCE_RANGE=20m`のレイを飛ばす、🪨がこれまで使っていた遠距離ねらい撃ち方式）とは別に、こっこちゃんの正面ごく近く（`LINK_REACH=2.4m`、レイマーチングなしでそのまま加算するだけ）を狙う`aimFeetCell()`を新設し、`fireForce()`は`kind==='link'`のときだけこちらを使うよう分岐した。②高さ：`applyForceAt()`の`link`分岐に、こっこちゃんが今立っている足元のセル（`worldToCell(P.x,P.z)`）が`K_ROCK`または`K_LINK`かどうかを調べる橋渡し判定を追加し、真であれば新しい🧱の高さを固定値`LINK_LEVEL=0.55`でなく`(P.y-0.4)/2.6`（＝今の高さと同じレベルへ逆算）に、偽であれば従来どおり固定`LINK_LEVEL`にした。橋渡し条件を🪨だけでなく既存の🧱も含めたのは、橋を1マスぶんしか伸ばせないと『橋渡し』にならず、2マス目以降で地面まで落ちてしまう既存🧱を踏み台にした継続チェーンが成立しなくなるための必要な判断（機能として動くための最小限の拡張であり、無関係な範囲拡大ではない）。あそびかた画面・タイトル画面下の設計コメントも『🧱は足元のすぐ先にしか届かない、地面では低いまま、🪨/🧱の上に立っている間だけ今の高さまで届く橋になる』という説明に更新した。検証は`node --check`に加え、ヘッドレスChromiumで①平地で🧱を撃つと（🪨と同じ20m先を狙うカメラのままでも）実際にプレイヤーから数m以内に着弾し、高さは従来どおり固定0.55のままであること（旧実装なら20m先に飛んでいたはずの遠い着弾にならないことを実測で確認）、②実際に🪨を6発重ねて高さ約9mの塔を築き、検証用に新設したフック`teleportY()`でプレイヤーを塔の上空へ置いて本物の重力・当たり判定（`floorAt`を毎フレーム参照する既存の物理ループ）で塔の上へ自然に着地させたうえで、隣の空中へ🧱を撃つと、着弾した🧱の高さがプレイヤーの現在の高さ（塔と同じレベル3.3）に正確に一致すること（固定値0.55のままにはならないこと）、③この変更後も🧱が引き続き枯（blight）セルを浄化できることをすべて実測し、スクリーンショットでUIの乱れが無いことも目視確認、pageerrorゼロだった。", },
    { tag:"feat", t:"コッコ芽吹き（/mebuki/）に🧱つなげる石を追加 ─ 🪨と同じ埋める力だが積み上げず(y軸)、高さ固定でxz軸へ横に広げていく2つめの力（💴1）", d:"『積む石🪨y軸はあります。繋げる石🪨つまりxz軸に追加していく石を色を変えてコンビニで買えるようにして下さい価格は1💴』というご依頼のとおり。従来の🪨岩は同じマスに何度当てても`fLevel`を`+0.55`ずつ積み増し続け高さに上限が無い（y軸方向にひたすら伸びる塔）という一方向の力しか無かったところに、色も挙動も異なる第2の埋める力`🧱つなげる石`（`K_LINK`、kind値7）を新設した。`applyForceAt()`で`kind==='link'`のときは既存の`fLevel[idx]`を無視し、常に固定値`LINK_LEVEL=0.55`（🪨の1発目と同じ高さ）へ上書きするだけにしている──何度同じマスへ当てても高さは一切変わらず、代わりに狙いを隣のマスへずらすたびにその固定高さのブロックがxz軸方向へ広がっていく。塗る3Dのようにインクを塗り広げるのでなく実体のある足場を横へ継ぎ足していけるため、🪨の一点集中の塔と組み合わせれば『高い塔＋そこへ続く一定の高さの道』のような地形づくりが初めて可能になった。実装は`FORCE_ORDER`を`['rock','link']`の配列駆動にするだけで、`hudForce()`・`updateBuyPrompt()`・`buyForce(k)`・ボタンのpointerdownハンドラなど既存のUI配線がすべて汎用ロジック（`FORCE_ORDER.forEach`と`cap()`によるID組み立て）で自動的に🧱にも対応した（対応するHTML要素`fLinkBtn`/`fLinkC`/`buyLinkRow`を追加するだけで済んだ）。色は既存の🪨（グレー系`COL_ROCK0/1`）と混同しないよう、テラコッタ〜赤レンガ系`COL_LINK0=[110,60,40]〜COL_LINK1=[210,128,74]`を新設。枯の浄化（🪨と同じくblightセルに当てるとashへ）・逆縁への直撃二発撃破（`hitEnemyWithForce()`の`rockHits`カウンタを🪨と共有）は🪨とまったく同じ効果を持たせ、あくまで『積み上げ方（y軸かxz軸か）だけが違う、対になる第2の力』という位置づけにした。初期解禁済み・初期弾薬14発・最大99発・購入💴1（🪨と同額）も🪨とそろえ、キー操作は`2キー`、スマホは🪨ボタンの隣に新設した専用🧱ボタン。あそびかた画面・タイトル画面のロゴ下装飾・冒頭の設計コメントも🧱の存在と『y軸に積む🪨／xz軸に広げる🧱』という対比を追記して更新した。検証は`node --check`に加え、ヘッドレスChromiumをiPhone 13相当でエミュレートし、①🧱ボタン・購入行がDOMに存在しレイアウトが崩れず表示されること、②ラウンド開始時から解禁済み・初期弾薬14発であること、③実際に🏪へ歩み寄って購入すると所持金がちょうど💴1減り弾薬が1増えること、④これが本命の検証──同一セルへ🪨を3発当て続けると`0.55→1.10→1.65`と積み上がるのに対し、🧱を別の同一セルへ3発当て続けても`0.55`のまま一切変化しないこと（内部の`fKind`/`fLevel`を直接読む検証フック`peekAimCell()`を新設し実測）、⑤🧱が枯（`K_BLIGHT`）セルを🪨と同じくash（浄化済み）へ変えられること、⑥逆縁へ🧱を直撃させると1発目で怯み・2発目で確実に撃破できること（`kos`カウンタが+1されることを実測）、⑦長時間プレイでpageerrorが出ないことをすべて実測し、スクリーンショットで🧱ボタン（レンガ色）が🪨ボタンと重ならず並んでいる見た目を目視確認した。", },
  ]},
  { date:"2026.07.08", items:[
    { tag:"fix", t:"正論蒔宿への手紙（/letter/）で、実際は接続できているのに「オフラインのため読み込めません」と誤表示されるバグを修正、あわせてひとことの文字数上限を20→100文字に拡大", d:"『オフラインのため読み込めませんのバグを直してください。ひとこと20文字まで→100文字までに変更してください』というご指摘に応えた。原因は、Firebase SDKが`<script>`タグの動的挿入で非同期に読み込まれる設計になっており、みんなの手紙を読み込む`load()`がページ読み込み直後に即座に呼ばれていたのに対し、SDKの読込・初期化（`ready`フラグがtrueになるタイミング）はネットワーク環境によっては数百ms〜数秒かかること。`load()`は`ready`が false ならその場で即「オフラインのため読み込めません」と表示して終わっており、実際には数瞬後につながるはずの接続を、SDKの読込中というだけで誤って「オフライン」と決めつけていた。修正は、`load()`が`ready`でない場合に即断せず、`initFb()`のSDK再試行と同じ考え方で0.5秒おきに最大40回（約20秒）まで自身を再試行し、それでも`ready`にならなかった場合にのみ本当の「オフラインのため読み込めません」を表示するようにした。あわせて『ひとこと』欄の文字数上限を20文字から100文字に拡大（`textarea`の`maxlength`・文字カウンタ・送信時のスライス上限・placeholder・meta descriptionをすべて100に統一）、テキストエリアの高さも100文字を書きやすいよう60px→96pxに広げた。検証はheadless Chromiumで、①ページ読み込み直後（ready=false想定の瞬間）に一覧が誤って『オフライン』表示にならず『読み込み中…』のまま保たれること、②本当に接続できない環境を21秒待っても再現し、その場合は正しく『オフラインのため読み込めません』が表示されること、③テキストエリアに105文字入力しても100文字でぴったり止まり文字カウンタが『100/100』になることを実測、pageerrorゼロを確認した。", },
    { tag:"end", t:"「島ぐらし2（SHIMA2 ─ ななつの夜明け ／ /shima2/）」サービス終了のお知らせ", d:"いつも畜物語で遊んでくださり、本当にありがとうございます。誠に勝手ながら、このたび育つ島で7日間だけの暮らしを描く「島ぐらし2（SHIMA2 ─ ななつの夜明け）」のサービスを終了し、ページを削除いたしました。トップページの一覧・サイトマップからも本作へのリンクを外しております。昼はひかりのタネを集め、夜は逆縁の潮から灯を守り、7日目の夜明けを目指して遊んでくださった皆さまには、心よりお詫び申し上げます。ごめんなさい。時間無制限でのびのび暮らせる「島ぐらし（/mori/）」は引き続き遊んでいただけます。これからも畜物語をどうぞよろしくお願いいたします。", },
    { tag:"end", t:"「遊ぶ（コッコダイブ ／ /dive/）」サービス終了のお知らせ", d:"いつも畜物語で遊んでくださり、本当にありがとうございます。誠に勝手ながら、このたびZ軸の奥へダイブする宇宙シューティング「遊ぶ（コッコダイブ）」のサービスを終了し、ページを削除いたしました。トップページの一覧・サイトマップからも本作へのリンクを外しております。畜星を駆け抜けて遊んでくださった皆さまには、心よりお詫び申し上げます。ごめんなさい。これからも畜物語をどうぞよろしくお願いいたします。", },
    { tag:"end", t:"「縁波（コッコ縁波 ／ /ennami/）」サービス終了のお知らせ", d:"いつも畜物語で遊んでくださり、本当にありがとうございます。誠に勝手ながら、このたび親は上の波・子は下の波を二本の指で上下の縁帯に同時に合わせ、波を共鳴させて「家」を建てる親子協力ゲーム「縁波（コッコ縁波）」のサービスを終了し、ページを削除いたしました。トップページの一覧・サイトマップからも本作へのリンクを外しております。世界が同時に顔を上げる祭壇で親子の呼吸を合わせて遊んでくださった皆さまには、心よりお詫び申し上げます。ごめんなさい。これからも畜物語をどうぞよろしくお願いいたします。", },
    { tag:"feat", t:"コッコ芽吹き（/mebuki/）で🐤オリを3羽→8羽に、ブラックこっこちゃんを11羽→22羽（2倍）に増やし、半分は常に空蹴りしつづける空中タイプへ", d:"『捕まってるこっこちゃんを8羽にしてください。また、ブラックこっこちゃんの数を2倍にして、半分は常に空蹴りをして下さい』というご依頼のとおり。`CAGE_COUNT`を3→8に、逆縁の見はり数を巣1つあたり2→4羽（`GUARDS_PER_NEST`）、うろつきを3→6羽（`WANDERER_COUNT`）にして、合計11羽→22羽（ちょうど2倍）にした。新設した`airborne`フラグを生成順に1体おきへ交互に振り分け、必ずぴったり半数（11羽）が空中タイプになるようにした（乱数まかせの50%だと個体数がぶれるため）。空中タイプはプレイヤーの空蹴り連打（島ぐらし以来の『うまく操作すると空を飛べる』仕組み）と同じ理屈で、着地を待たず0.35〜0.55秒おきに蹴り直しつづけ、実測で地上6〜8m前後を跳ねまわる（上限`AIR_ENEMY_CEIL=6.5m`を設け、蹴り直しを止めて自然落下させることで無限上昇を防止）。実装の過程で、この機能と密接に関わる不具合を3つ発見・修正した。①逆縁の描画コード（`sprite`/`shadow`呼び出し）がそもそも`e.y`を一切見ておらず、常に地上の高さで描かれていた（プレイヤー側の描画は`P.y`を正しく足していたのに、逆縁側だけ抜けていた）ため、空中タイプを追加しても見た目には反映されない致命的な状態だった──`sprite`呼び出しに`e.y+h*0.52`、`spriteBB`（頭上の威圧グロー）に`e.y+h*0.9`を足し、影もプレイヤーと同じ『高いほど影が薄くなる』処理（`clamp(0.7-(e.y-efl)*0.12,0.15,0.7)`）にそろえた。②💣ボムの爆発判定が水平距離（x,z）のみで、直前のリリースで🚀ミサイルに施した3D距離判定の修正が💣には適用されていなかった（同じ不具合の未修正個所）ため、`Math.hypot(b.tx-e.x,e.y,b.tz-e.z)`（ボムは常に地面レベル＝y=0で爆発するため、`e.y`との差がそのまま高低差になる）へ修正した。③逆縁がプレイヤ―に接触してダメージを与える判定が水平距離のみだったため、頭上をただよう空中タイプでも触れた扱いになりダメージが発生してしまう──`Math.abs(P.y-e.y)<1.6`を追加し、高さも近くないとダメージが発生しないようにした。あそびかた画面にも捕らわれているこっこちゃんが8羽であることと、半分が空蹴りしつづけて宙を跳ねまわることを追記。検証は`node --check`に加え、ヘッドレスChromiumで①オリが実際に8つ生成されること、②逆縁が実際に22体生成されちょうど半数の11体が`airborne`になっていること、③空中タイプが実測で地面から離れて上限近くまで上がり続けること（地上タイプは終始y=0のまま）、④実際に高く浮いた空中タイプの真下に地面レベルで💣を着弾させても即座には倒れない（3D距離を無視していない）こと、⑤プレイヤーの真上高く（6〜8m）に空中タイプが重なっていても接触ダメージが発生しないこと、⑥長時間プレイでpageerrorが出ないことをすべて実測し、スクリーンショットで宙に浮く逆縁とオリの見た目も目視確認した。", },
    { tag:"imp", t:"コッコ芽吹き（/mebuki/）の🏪コンビニをマップ4か所→8か所に増設", d:"『コンビニを4→8にして下さい』というご依頼のとおり。従来は出撃地点近くの1軒＋3つの角（左下・右下・左上、右上のみ欠けていた）の計4軒だったところに、欠けていた右上の角と、上辺以外の辺の中点（下辺・左辺・右辺）を加えて計8軒にした。既存の4軒の座標はそのまま残しているため、これまでの配置に馴染んだプレイヤーの土地勘も活かせる。店舗の生成・巡回はもともと`STORES`配列を汎用的に`for(const s of STORES)`で回す設計だったため、`storePos`配列に4点追加するだけで、最寄り店探索（`nearestStore()`）・ミニマップ・3Dワールド描画のすべてに自動で反映された。検証用に`window.__mebuki`へ`listStores()`フックを新設し、検証は`node --check`に加えヘッドレスChromiumで①実際に8軒すべてが生成されマップ範囲内に収まっていること、②8軒がどの2軒も5m以上離れて重なっていないこと、③増設後も実際に店舗へ歩み寄って購入できること（💣を1個購入し在庫が正しく増減することを実測）をすべて確認し、ミニマップのスクリーンショットでも8つの店舗マーカーを目視確認、pageerrorゼロだった。", },
    { tag:"fix", t:"コッコ芽吹き（/mebuki/）で、空蹴りで空中にいるとき🚀ミサイルが頭上を素通りしただけで逆縁を倒せてしまう不具合を修正 ─ 命中判定をx,zの水平距離のみからx,y,zの3D距離へ", d:"『今度はブラックこっこちゃんの頭の上をミサイルが通過するだけで、ブラックこっこちゃんは死にます。x座標？のみで当たり判定のバグです。xyzの一致で当たり判定にすべきでは?』というご指摘とご提案のとおりだった。直前のリリースで🚀の発射位置をプレイヤーの高さ基準（`P.y+1.1`）に直したことで、空蹴り中に発射すると実際に高い位置から飛ぶようになったが、爆発・命中判定は`Math.hypot(m.x-e.x,m.z-e.z)<MSL_BLAST`という水平距離だけの式のままで、ミサイルの高さと逆縁の高さがどれだけ離れていても無視して倒してしまっていた（塗る3Dの実装をそのまま移植した際からある古い設計）。加えて調べると、逆縁側にも根本原因があった──`mkEnemy()`は`y`座標を初期化しておらず、`updateEnemy()`も『目的地まで距離1m以上動くとき』（`if(d>1)`の中）だけ`e.y=floorAt(...)`していたため、直立して動いていない逆縁は`y`が`undefined`のまま、という潜在的な不具合も抱えていた。修正は3点。①`mkEnemy()`で`y:0`を初期値として明示。②`updateEnemy()`の`e.y=floorAt(e.x,e.z,0)`を『動いたときだけ』から『毎フレーム必ず』に変更し、静止中でも足場（積み上げた岩など）の高さに追従するようにした。③🚀の命中判定を`Math.hypot(m.x-e.x,m.z-e.z)`から3D距離`Math.hypot(m.x-e.x,m.y-e.y,m.z-e.z)`へ変更（着弾トリガー・撃破ループの両方）。あわせて、高さを無視した判定を直すだけだと『空中から撃った🚀が水平方向にしか追尾せず高度が噛み合わずいつまでも当たらない』という新しい不具合を生みかねないため、ミサイルの誘導そのものにも高さ成分を追加した──`vy`を新設し、`m.y+=m.vy*dt`で高さも移動、標的への補間ベクトルも`x,z`だけでなく`y`（`tgt.y`）を含めた3方向で計算するようにし、名実ともに『追尾』が立体的になるようにした。検証は`node --check`に加え、ヘッドレスChromiumで①地上での発射は従来どおり確実に命中すること、②実際のジャンプ操作（スペースキーの`keydown`）を6回連ねた本物の空蹴りチェーンで高度5m超まで上がった状態から発射すると、発射した瞬間（`step()`を1回も挟まない時点）ではまだ撃破カウント`kos`が増えていない＝頭上通過だけでは倒れないこと、③そのまま時間経過させると3D誘導によって最終的にはきちんと1体だけ撃破できること（`kos`が正確に+1されること）、④長時間ジャンプしながらの連射でpageerrorが出ないことをすべて実測し、スクリーンショットでも空中の🚀が地上の逆縁を捉える様子を目視確認した。", },
    { tag:"end", t:"「おりづる（コッコおりづる ／ /origami/）」サービス終了のお知らせ", d:"いつも畜物語で遊んでくださり、本当にありがとうございます。誠に勝手ながら、このたびクレース（折り線）をなぞって60秒でつぎつぎ折り鶴をおる「おりづる（コッコおりづる）」のサービスを終了し、ページを削除いたしました。トップページの一覧・サイトマップからも本作へのリンクを外しております。親子で息を合わせて羽を折り、さいごに空へ放って遊んでくださった皆さまには、心よりお詫び申し上げます。ごめんなさい。これからも畜物語をどうぞよろしくお願いいたします。", },
    { tag:"fix", t:"コッコ芽吹き（/mebuki/）で、空蹴り中に🚀ミサイルを撃つと地面の高さから発射されてしまう不具合を修正", d:"『空蹴りをして空中でミサイルを放つと、ミサイルが地面から発射されます。おそらくy座標？がこっこちゃんとミサイルの位置が一致しないバグです』というご指摘のとおりだった。`fireMissile()`は塗る3Dの実装をそのまま移植した際、ミサイルの発射位置を`{x:P.x+f[0]*0.6,y:1.1,z:P.z+f[2]*0.6,...}`と、`y`座標だけプレイヤーの現在の高さ`P.y`を無視した固定値`1.1`（地上に立っているときの胸の高さ相当）で組み立てていた。🔫レーザーピストルや💣ボムの発射位置はどちらも`P.y+1.3`・`P.y+1.4`のように現在の高さを起点に組み立てており、🚀だけこの相対化が抜けていた。空蹴りで空中にいる間に🚀を撃つと、実際にはこっこちゃんの体から離れた地面の高さからいきなり弾が出現する見た目になっていた。修正は`y:1.1`を`y:P.y+1.1`に変更し、他の武器と同じ『プレイヤーの現在の高さを起点にする』方式へそろえた。ミサイルは発射後、飛行中は`x,z`だけを更新し高さは打ち出した瞬間のまま水平に飛ぶ設計のため、発射位置さえ直せば以降の挙動は正しく追従する。あわせて検証フック`state()`に`py`（プレイヤーの現在のY座標）、`listMissiles()`に`y`（ミサイルの現在のY座標）を追加し、高さのズレを外から検証できるようにした。検証は`node --check`に加え、ヘッドレスChromiumで①地上で発射した場合は`y=P.y+1.1`のまま変わらないこと、②実際のキーボード入力（スペースキーの`keydown`イベント）でジャンプさせ空中にいる状態（`P.y>0`を実測で確認）で発射すると、ミサイルの`y`も同じだけ持ち上がって`P.y+1.1`に一致すること（地面近くの固定値に戻っていないこと）、③ジャンプを繰り返しながら連射してもpageerrorが出ないことをすべて実測し、スクリーンショットでも空中から煙を曳いて飛ぶミサイルを目視確認した。", },
    { tag:"imp", t:"コッコ芽吹き（/mebuki/）のプレイヤー移動スピードを1.5倍に（8.6→12.9）、仲間こっこの追従速度も連動して引き上げ", d:"『現在の移動スピードをおしえて』『1.5倍にして！』というやり取りに応え、プレイヤーの地上移動速度を`8.6`から`12.9`（8.6×1.5）へ変更した。あわせて、仲間こっこの追従速度`updateCompanion()`の`Math.min(9.6,8.6+d*0.6)`（プレイヤーの旧速度8.6よりわずかに速く設定し追いつけるようにしていた式）をそのままにすると、プレイヤーが直進しつづけた場合に上限9.6ではプレイヤーの新速度12.9に追いつけず引き離されつづけてしまうため、こちらも同じ1.5倍で`Math.min(14.4,12.9+d*0.6)`へ連動して引き上げた。敵（逆縁）の移動速度`5.0`はご依頼の対象外のため変更していない（プレイヤーが速くなった分、相対的に振り切りやすくなるのは想定内の影響として据え置いた）。検証は`node --check`に加え、ヘッドレスChromiumで実際の仮想スティックのタッチ操作（フック経由でなく本物の`pointerdown`/`pointermove`イベント）でプレイヤーを1秒間動かし、移動距離が新速度12.9にほぼ一致することを実測、pageerrorゼロを確認した。", },
    { tag:"fix", t:"コッコ芽吹き（/mebuki/）の仲間こっこから、頭のうしろに浮いていた丸い模様を削除", d:"スクリーンショットでのご指摘『助けたこっこちゃんに丸い模様があります。消してください』のとおり。仲間こっこを追加した際、プレイヤーと見分けやすいよう頭の後ろに暖色（オレンジ寄り）の半透明な円グローを`spriteBB()`で重ねていたが、実際の見た目では意図した『識別の光』ではなく、ただの丸い模様がくっついているように映っていた。`buildSprites()`の仲間こっこ描画から該当の`spriteBB(c.x,h*0.88,c.z,0.9,0.9,1,1,0.85,0.45,0.28)`呼び出しを削除し、こっこ本体のスプライトと影だけを描くプレイヤーと同じ見た目に戻した。検証は`node --check`に加え、ヘッドレスChromiumで実際に💣でオリを壊して仲間を1羽解放し、pageerrorゼロであることを実測、スクリーンショットで丸い模様が消えプレイヤーと同じ見た目になっていることを目視確認した。", },
    { tag:"imp", t:"コッコ芽吹き（/mebuki/）の🏪コンビニ表示から「タップで購入」の文言を削り、🪨岩の値段を💴2→1に値下げ", d:"スクリーンショットでのご指摘『タップで購入の記述を削除してスッキリさせて下さい。岩🪨の値段を💴2→1にして下さい』のとおり。🏪の購入表示は`絵文字＋タップで購入＋💴価格（在庫/上限）`という形式で、5行（🫧🔫🚀💣🪨）すべてに同じ『タップで購入』が並び画面を圧迫していた──タップして買うことはボタンの見た目自体で伝わるため、文言そのものを丸ごと削り`絵文字＋💴価格（在庫/上限）`の最小表示にした。静的なHTMLプレースホルダーと`updateBuyPrompt()`内の動的テキスト（🫧🔫🚀💣🪨の5箇所）を両方直した。あわせて`FORCE_PRICE`を2から1に変更し、🪨の購入価格を💴1に値下げ。検証は`node --check`に加え、ヘッドレスChromiumで①静止表示・🏪へ実際に近づいた状態のどちらでも5行すべてに『タップで購入』が残っていないこと、②🪨の価格表示が💴1になっていること、③実際のポインタイベント（`pointerdown`/`pointerup`）で🪨を1回購入すると所持金がちょうど1だけ減ること、をすべて実測し、スクリーンショットでもスッキリした表示を目視確認、pageerrorゼロだった。", },
    { tag:"feat", t:"コッコ芽吹き（/mebuki/）に🐤オリの救出と仲間こっこを追加 ─ 塗る3Dと同じく💣ボムを移植、💣だけがオリを壊せ、解放した仲間はプレイヤーの狙いに連動して援護射撃する", d:"『塗る3Dのようにこっこちゃんが牢屋に捕まっていて、こっこちゃんを解放したら一緒についてくるのはどう？攻撃を一緒にしてくれるとかどう？』というご提案から生まれた、この作品では初の新規AIシステム。事前に2回確認をとった──①仲間の数は『複数（塗る3Dと同じ数）』＝`CAGE_COUNT=3`、②オリを壊せる手段は『💣の設定を塗る3Dから移植して』、③解放した仲間の戦い方は『プレイヤーの狙いに連動して援護射撃』。実装は3段構え。(1) 💣ボム：塗る3Dの数値をそのまま移植（`BOMB_MAX=99,BOMB_PRICE=4,BOMB_BLAST=8`、山なりに`BOMB_THROW_DIST=16m`先へ`BOMB_ARC_DUR=0.75秒`かけて放物線を描いて飛ぶ）。着弾で爆発し、範囲内の逆縁を撃破するほか、範囲内のオリを唯一壊せる手段として機能する（🔫🚀🪨では壊せない）。(2) 🐤オリ：塗る3Dの生成ロジックを移植し、`genWorld()`で出撃地点・巣・遺構・オリどうしを避けながら3つを配置。💣が範囲内で爆発すると`rescueCage()`が発火し、+500点・+💴30・仲間1羽を得る。(3) 仲間こっこ：塗る3Dには無い新規のAI。`updateCompanion()`が毎フレーム、プレイヤーの背後（`cam.yaw`基準、仲間ごとに固定の角度オフセット3パターンで重ならないよう散らす）へ向けて敵と同じ追従ロジックで移動しつつ、`findAimEnemy()`をプレイヤーの照準そのままで呼び出して援護射撃する──つまり「プレイヤーが今まさに狙っている逆縁」だけを、独自のクールダウン(`COMPANION_CD=1.4秒`)で撃つ。プレイヤーの狙いと無関係に自動で敵を刈り取ることはなく、あくまで狙いを共有する『援護』にとどめてバランスを取った。敵は既存の`updateEnemy()`がプレイヤーの座標しか参照しないため、仲間は最初から攻撃されない（追加のHPやダウン処理は不要だった）。見た目はこっこ本体のスプライトを再利用しつつ、仲間には暖色の識別グロー、オリには新設した格子（アトラスセル7）を重ねた。HUDに`💣 xN`・`🐤 救出数/3`を追加、右下に💣ボタン（🪨💣が上段・🚀🔫が下段の2×2配置）、Eキーで投擲・Hキーで購入。結果画面にも『助けた仲間』の数を追記。あわせて、ミサイル追加時に見落としていた`#hudMsl`のCSS位置指定漏れ（無指定のまま静的フローに乗っかっていた）も発見・修正した。検証は`node --check`に加え、ヘッドレスChromiumをiPhone 13相当でエミュレートし、①あそびかた画面に💣🐤の説明が反映されていること、②💣ボタンが他UIと重ならず表示されること、③新設したHUD要素（🚀💣救出数を含む）が互いに重ならないこと、④オリが3つ正しく生成されること、⑤🏪での💣購入が💴4を正しく消費し上限99で止まること、⑥プレイヤーから16m先へ💣を投げてオリに命中させると救出が成立し+500点・+💴30・仲間1羽になること、⑦仲間が時間経過でプレイヤーに近づくこと（追従）、⑧プレイヤーが狙った逆縁を仲間が実際に援護射撃で撃破すること、⑨結果画面に『助けた仲間』の行が出ること（`showResult`は実時間`setTimeout`で呼ばれるため`page.waitForTimeout`で実時間待機して確認）をすべて実測し、スクリーンショットで仲間こっこの見た目・2×2ボタン配置を目視確認、pageerrorゼロだった。", },
    { tag:"fix", t:"コッコ芽吹き（/mebuki/）で、🪨岩ボタンが画面中央下にあって右指で押しづらかった不具合を修正 ─ 🔫の真上（右指のクラスタ内）へ移動", d:"『🪨岩ボタンが押しづらい。右指で押しやすい位置に配置してください』というご指摘のとおり。力のボタン列`#forceRow`は、力が5つあった頃の名残で画面下部中央（`left:50%;transform:translateX(-50%)`）に固定されたままになっており、🔥💧🌱💨🪨から🪨1つだけに減った今も、右指のクラスタ（⬆ジャンプ・🫧酸素・🔫ピストル・🚀ミサイル、いずれも画面右下）とは離れた中央に取り残されていた──操作は右手の親指だけで完結できるよう設計してきたのに、🪨だけが中央まで指を伸ばさないと押せない状態だった。`#forceRow`の位置指定を`left:50%`中央寄せから、🔫ボタンと同じ`right:20px`基準へ変更し、bottom位置(164px)はそのままに、🔫の真上に縦に積み重なるよう配置しなおした（🪨のx範囲は314〜370px、🔫のx範囲は306〜370pxとほぼ揃い、bottom方向には10pxの隙間があるため重ならない）。将来力が増えた場合に備えて`flex-wrap:wrap-reverse`は残しつつ、折り返した際も中央でなく右端に寄って並ぶよう`justify-content`を`center`から`flex-end`に変更した。検証は`node --check`に加え、ヘッドレスChromiumをiPhone 13相当でエミュレートし、①🪨ボタンが画面右端から20pxの位置（右指クラスタ内）に来ていること、②⬆・🫧・🔫・🚀・ミニマップのいずれとも重ならないこと（矩形交差判定で確認）、③位置変更後も🪨の発射が引き続き正しく弾薬を消費すること、をすべて実測し、スクリーンショットで🔫の真上に🪨が縦に並んでいる見た目を目視確認、pageerrorゼロだった。", },
    { tag:"fix", t:"コッコ芽吹き（/mebuki/）で、遮るものが無いと🪨がとても遠く（最大40m先）に着弾していた不具合を修正 ─ FORCE_RANGEを40→20に短縮", d:"『岩の生成は随分離れたところに生成されます』というご指摘を受け、まず仕組みを説明した──`applyForceAt()`が使う`aimGroundCell()`は、カメラの向きへ0.6m刻みでレイを飛ばし、既存の岩・遺構などの障害物に当たるかマップ端(±85m)に出るまで進み続ける実装になっており、見晴らしのいい開けた場所で撃つと、途中に何も障害物が無ければ`FORCE_RANGE=40`（メートル）そのまま飛び続けて、狙った足元でなく40m先に着弾していた。一度どこかに岩を積むと、その岩自体が次のレイを止める障害物になるため、同じ方向へ撃ち続ければ近くに積み増しできるが、何もない場所への初弾は体感的に遠すぎる、という状態だった。『最大距離を短くする（FORCE_RANGEを40→もっと小さい値に）』『40→20にしてください』というご指定どおり、`FORCE_RANGE`を40から20に変更。`FORCE_RANGE`は着弾レイの最大到達距離だけでなく、`findAimEnemy()`（🪨の直撃ロックオン判定）の既定射程としても共有されているため、逆縁への直撃ロックオン距離も40m→20mへ同時に短くなる（射程を分けず単一の『🪨が届く距離』として扱う、既存の設計をそのまま踏襲）。検証は`node --check`に加え、ヘッドレスChromiumで①遮るものが無い開けた場所で🪨を撃つと、旧実装なら約40m先に着弾していたところが確実に20m以内（実測20.08m）に収まること、②近距離（3m）での逆縁への直撃ロックオンが引き続き成立すること（1発目で`rockHits`が1になることを確認）、③連射しての長時間プレイでpageerrorが出ないことを実測した。", },
    { tag:"feat", t:"コッコ芽吹き（/mebuki/）に🚀追跡ミサイルを追加 ─ 塗る3D/島ぐらしから移植（初期0発・🏪で💴3・最大99発）", d:"『塗る3Dの追跡ミサイルを移植してください。🚀の料金は3💴にしてください』というご依頼に応え、塗る3D（`/splat3d/`。もとは島ぐらし`/mori/`由来）のホーミングミサイルを、ほぼ同じ数値のままコッコ芽吹きへ移植した（`MSL_MAX=99,MSL_SPEED=24,MSL_LIFE=4.5,MSL_LOCK_RANGE=60,MSL_BLAST=6`は塗る3Dと同一。価格のみご指定どおり💴4→💴3に変更）。発射すると射程60m以内のいちばん近い生きた逆縁へゆるく追尾しつづけ（`Math.min(1,dt*4)`のブレンド率で毎フレーム速度ベクトルを標的方向へ補間）、命中・寿命切れ(4.5秒)・マップ境界のいずれかで爆発し、爆発半径6m以内の逆縁をまとめて撃破する。狙いが無ければ正面へまっすぐ飛ぶ。🔫レーザーピストル・🪨岩の直撃とは独立した第3の攻撃手段として実装し、地形（力で積み上げた岩など）は一切変えない。見た目はスプライトアトラスに新設したセル6へ🚀絵文字をそのまま焼き込み（`buildAtlas()`にcocco用セル0-5と同じ手法で追加）、オレンジのグローを重ねた2枚billboard、飛翔中は白い煙の粒子を曳く。操作は右下の🚀ボタン（🔫ボタンの左隣、ミニマップ・ジャンプ/酸素ボタンいずれとも重ならない専用位置）／Rキー。🏪コンビニに🚀弾の購入行を追加（長押しで連続購入、初期0発は塗る3D/島ぐらしと同じ「買いだめ制」の踏襲）。HUD左上に`🚀 x0`の弾数表示、あそびかた画面にも🚀の説明行を追加した。検証は`node --check`に加え、ヘッドレスChromiumをiPhone 13相当でエミュレートし、①あそびかた画面と🏪購入表示に🚀・💴3が正しく反映されていること、②🚀ボタンがプレイ中に表示され他のUI（🔫・⬆・🫧・ミニマップ・🪨）のいずれとも重ならないこと、③ラウンド開始時は`mslInv=0`で0発では発射しても何も起きないこと、④実際に🏪へ歩み寄って`buyMissile()`を呼ぶと💴3が正しく引かれ在庫が1増え、上限99発でぴったり止まること、⑤発射したミサイルが実際に最寄りの生きた逆縁へ命中し撃破すること、⑥射程内に標的がいなくても寿命切れで例外なく消えること、⑦🚀・🔫・🪨を交互に連射する長時間プレイでpageerrorが出ないことをすべて実測し、スクリーンショットで🚀本体・グロー・弾数表示を目視確認した。", },
    { tag:"imp", t:"コッコ芽吹き（/mebuki/）から🔥火を削除し🪨岩1力＋🔫の構成へ、🪨の積み上げ高さの上限を撤廃、🫧酸素ボンベを💴2→1に値下げ", d:"『岩は面白いアイディアだから採用します。あと酸素ボンベの料金を2→1💴にしてください。火はよくわからないので火は削除してください』という3つのご指摘に応えた。①🔥火は逆縁への直撃一撃撃破と、地面に撒くと枯を即座に浄化する役割を持っていたが、削除後の🪨岩は元々`applyForceAt()`内で🔥と全く同じ枯の浄化分岐（`K_BLIGHT`→`K_ASH`）を持っていたため、巣を鎮める浄化手段はそのまま失われずに残る。撃破手段は🪨の直撃二発（0.4秒の怯み明け）と🔫（最初から5発・1発必中）の2系統に整理された。実装は`K_FIRE`のkind enum・`COL_FIRE0/1`の色定数・`stepCA()`の延焼規則・`cellColor()`のFIREケースを削除し、`applyForceAt()`・`hitEnemyWithForce()`から🔥分岐を除去。逆縁の環境延焼ダメージ（`ek===K_FIRE`）とプレイヤー自身が撒いた🔥に立ち続けると焼かれる自傷ダメージ（`pk===K_FIRE`）はどちらも成立条件（🔥セルの存在）ごと消えたため、`burnT`（敵・プレイヤー双方）を丸ごと削除。`Sound.fireFire()`は🔫の発射音として引き続き使われていたため関数ごと消さず`Sound.shoot()`へ改名し、🔫側の呼び出しを差し替えた。`FORCE_START`・`FORCE_ORDER`・`FORCE_COL`・`FORCE_EMOJI`・`KEY_FORCE`・`P.forceAmmo`・`P.unlocked`から`fire`エントリを除去し、`1キー`が🪨に対応するよう詰めた。HUDの🔥ボタン・🏪コンビニの🔥購入行・タイトル/あそびかた画面/meta description/OGPの文言もすべて🪨単独表記に更新。あわせて、3回前の力の整理（5→4力）の際に更新し漏れていた`twitter:description`の『絡み合う5つの自然の力』という古い文言（実際はとうに4力→2力まで減っていた）も今回発見し修正した。②🪨の積み上げは、直撃のたびに`fLevel`へ`+0.55`していたが`Math.min(1.6,...)`で頭打ちにしていた上限を撤廃し、同じマスへ何度当てても際限なく積み上がるようにした（高さは`h=0.4+lv*2.6`で算出されるため、レベルが伸びるほどそのまま塔になる）。③`O2_PRICE`を2から1へ変更し、🏪コンビニの🫧購入表示・HTML側のプレースホルダーも合わせて更新。検証は`node --check`に加え、ヘッドレスChromiumをiPhone 13相当でエミュレートし、①タイトル・あそびかた画面のテキストに🔥が一切残っていないこと、②`fFireBtn`要素がDOMから完全に消え🪨ボタンのみがラウンド開始直後（購入なし）から表示され他UIと重ならないこと、③検証フックの`state()`が返す`unlocked`/`ammo`に`fire`キーが残っていないこと、④🏪の🫧購入表示が`💴1`になっていること、⑤🪨の直撃二発撃破が引き続き成立すること、⑥同じマスへ🪨を8発連続で当て続けると`0.55, 1.10, 1.65, 2.20, ...`と一直線に伸びて旧上限1.6を超え続けること（`fireForce()`は照準内に逆縁がいれば地面より優先して直撃させる設計のため、検証は実際の`findAimEnemy()`と同じコーン判定を用いて逆縁が射線上にいないことを確認しながら発射し、最初の一発が実際に着弾したマスを特定して以降はそのマスへ狙いを揃え直す方式で行った）、⑦長時間プレイでpageerrorが出ないことをすべて実測し、スクリーンショットでも積み上がった岩の塔を目視確認した。", },
    { tag:"imp", t:"コッコ芽吹き（/mebuki/）から💧水・🌱草を削除 ─ 「岩は面白いアイディアだから採用、水と草はよくわからないので削除」というご指摘に応え、絡み合う力を4つから🔥火・🪨岩の2つへ整理", d:"『岩は面白いアイディアだから採用します。水と草はよくわからないので削除して下さい』というご指摘そのまま。理由の推測は加えず、いただいた言葉のとおりに削った。💧水は拡散・消火・浸水鈍化蓄積、🌱草は成長・壁化・突き飛ばしという役割を持っていたが、削除後は🔥火（直撃一撃で撃破・地面に撒くと枯を即座に浄化）と🪨岩（直撃二発で撃破・積むと実際に登れる足場になる、CA上は静的）の2力のみが残る。実装は`K_GRASS`・`K_WATER`のkind enumと専用の湿度配列`fWet`をまるごと削除し、`stepCA()`から成長・拡散・消火・枯創出の各規則を除去（🔥の延焼と🪨の静的挙動、`K_DIRT`からの枯創出のみ残置）。`cellColor()`・`rebuildDynBoxes()`（草の登れる木テレイン）・`mkEnemy()`・`updateEnemy()`（水地形の速度低下・浸水環境ダメージ）・`updateNests()`（巣鎮め時の草化演出）からも該当分岐を除去し、`applyForceAt()`・`hitEnemyWithForce()`は🔥🪨の2分岐だけに書き直した。設計判断が一つ必要だった──草・水は元々コンビニでの解禁不要（無料で最初から使える）力だったが、🔥🪨は従来💴を払わないと解禁できない有料の力だったため、単純に草・水を消すだけだと『ラウンド開始直後は攻撃する術が一切ない』という、この作品で過去に2度実際に起きた不具合（💧が無料解禁枠から外れていたときに再発する形）をそのまま繰り返すことになる。そこで`FORCE_START`を`{fire:14,rock:14}`に変更し、🔥🪨の両方を弾薬14発つきで最初から解禁済みにし、`UNLOCK_PRICE`定数と解禁購入の分岐（`updateBuyPrompt()`・`buyForce()`）自体を丸ごと削除して、🏪コンビニでは弾薬💴2の直接購入だけが残るようにした。あわせて、巣が鎮まらない限り上がらない指標`lifeFraction()`（旧実装は草・水が茂った面積を島の浄化率として測っていた）を、4つの巣それぞれの`purity`（枯でないセルの割合）の平均へ再定義した──『島全体のdirt/ashのblight率の逆数』も検討したが、世界生成直後から巣の外はほぼ枯れていないため開始直後から96%超という指標として機能しない値になることが分かり不採用にした。使われなくなった効果音`Sound.fireGrass()`・`Sound.fireWater()`・`Sound.grow()`・`Sound.extinguish()`も削除し、HUD・🏪コンビニの購入行・タイトル画面・あそびかた画面・meta description/OGPの文言もすべて🔥🪨の2力表記に更新、共有ボタンの文言に残っていた🌱も🔥🪨に差し替えた。検証は`node --check`に加え、ヘッドレスChromiumをiPhone 13相当でエミュレートし、①タイトル・あそびかた画面のテキストに💧🌱の絵文字が一切残っていないこと、②`fGrassBtn`・`fWaterBtn`・`fWindBtn`要素がDOMから完全に消えていること、③🔥🪨の2ボタンがラウンド開始直後（購入なし）から両方とも表示され、互いにもミニマップ・ジャンプ/酸素/🔫ボタンとも重ならないこと、④検証フックの`state()`が返す`unlocked`/`ammo`に`grass`/`water`キーが残っておらず`fire`/`rock`が最初から`true`であること、⑤🔥が直撃一撃で確実に撃破できること、⑥🪨が直撃一発目では倒れず二発目（0.4秒の怯み明け後）で確実に撃破できること、⑦🏪コンビニの購入UIに草・水の行が残っていないこと、⑧🔥🪨を切り替えながらの長時間プレイでpageerrorが出ないことをすべて実測し、スクリーンショットでも目視確認した。", },
    { tag:"imp", t:"コッコ芽吹き（/mebuki/）から💨風を削除 ─ 「意味ないしつまらなかった」というご指摘に応え、絡み合う力を5つから4つ（🔥💧🌱🪨）へ整理", d:"『風は意味ないしつまらなかったから削除して』というご指摘そのまま。理由の推測は加えず、いただいた言葉のとおりに削った。💨風（`windCast()`）は前方への一瞬の突風で、逆縁を吹き飛ばす・枯を散らす・岩を転がすという3つの効果を持つ力だったが、実際に遊ぶと手応えが薄く、狙って使う場面が少なかった。削除後は🔥火・💧水・🌱草・🪨岩の4つの力が残る──巣を鎮める open method（焼く・浸す・押し返す・埋める）も、逆縁を直接払う手段（🔥一撃・🪨二撃・💧鈍化蓄積・🌱ノックバック、加えて🔫）も、風が担っていた役割（逆縁を吹き飛ばす・岩を転がす）を含めて他の4力と🔫で引き続き成立しており、風が無くても『クリアの世界線は複数ある』という設計の芯は崩れていない。実装は`FORCE_ORDER`・`FORCE_COL`・`FORCE_START`・`UNLOCK_PRICE`・`P.unlocked`・`P.forceAmmo`から`wind`エントリを除去し、`windCast()`関数と専用クールダウン`P.windT`、専用効果音`Sound.fireWind()`を丸ごと削除。HUDの💨ボタン・🏪コンビニの解禁行・あそびかた画面の💨の説明・タイトル画面の力の一覧・meta description/OGPの文言もすべて4力表記に更新した。キー操作は`1〜5キー`から`1〜4キー`に詰め、🪨のキーを`5`から`4`へ繰り上げた。検証は`node --check`に加え、ヘッドレスChromiumをiPhone 13相当でエミュレートし、①`fWindBtn`要素がDOMから完全に消えていること、②残る4つの力のボタンが重ならず正しく2段（3＋1）に折り返り他のUIとも衝突しないこと、③検証フックの`state()`が返す`unlocked`/`ammo`に`wind`キーが残っていないこと、④4力を切り替えながらの長時間プレイでpageerrorが出ないことをすべて実測し、スクリーンショットでも目視確認した。", },
    { tag:"fix", t:"コッコ芽吹き（/mebuki/）で、5つの力を全解禁すると力のボタン列がミニマップ・ジャンプ/酸素/🔫ボタンと衝突する不具合を修正（前修正は1段目のバグのみ直っており未完全だった）", d:"『まだ重なってるよ』と重ねてのご指摘（スクリーンショットつき）で発覚した。直前の修正（`.forceBtn`に`position:relative`を足す修正）でボタン同士が同じ座標に重なる不具合自体は直っていたが、5つの力（🌱💧🔥💨🪨）が全部解禁された状態を試すと、横一列の力のボタン列（ボタン幅56px×5＋隙間10px×4＝合計320px）が画面下部で**ミニマップ（左下）とジャンプ/酸素/🔫ボタン（右下）の両方**と同じ高さ（`bottom:20px`前後）に配置されていたため、列が伸びるほど左右の既存UIへ食い込んで重なっていた──ボタンの個数が2つ（初期解禁ぶんの🌱💧）のときだけで検証しており、5つ全部そろった状態を実機同等の条件で確かめていなかったのが見落としの直接原因。修正は、力のボタン列を`bottom:20px`から`bottom:164px`（ミニマップの上端140px・🔫ボタンの上端154pxのどちらよりも高い位置）へ引き上げ、他の固定UIと重ならない専用の帯に移した。加えて`flex-wrap:wrap-reverse`と`max-width`を指定し、画面の狭い端末で5つが横一列に収まりきらない場合は自動で2段（下段3つ・上段2つ）に折り返り、かつ折り返した段は下でなく上に積むよう（`wrap-reverse`）にして、下の帯へ再び寄っていかないようにした。検証は`node --check`に加え、ヘッドレスChromiumをiPhone 13相当でエミュレートし、検証フックで**5つの力すべてを解禁した状態**（前回見落とした条件）を再現し、①力のボタン5つが互いに重ならないこと、②力のボタンがミニマップ・ジャンプ・酸素・🔫ボタンのいずれとも重ならないこと（座標の矩形交差判定で実測）をすべて確認し、スクリーンショットでも2段に折り返って収まっている見た目を目視確認、pageerrorゼロだった。教訓：ボタンの個数が動的に増える（解禁が進む）UIを検証するときは、初期状態だけでなく最大数がそろった状態も必ず確かめる。", },
    { tag:"fix", t:"コッコ芽吹き（/mebuki/）で、力のボタン（🌱💧🔥💨🪨）がスマホ実機で重なって表示される不具合と、ラウンド開始直後は一切表示されない不具合を修正", d:"スクリーンショットで『ボタンバグだよね？重なってるよ』というご指摘を受けた。原因は二つ重なっていた。①CSSの不具合：力のボタンは共通クラス`.actbtn`（`position:absolute`を持つ）と個別クラス`.forceBtn`の両方を持っており、`.forceBtn`側で`position`を上書きしていなかったため、横並びにするための親`#forceRow`（`display:flex;gap:10px`）のレイアウトから外れ、複数のボタンが同じ座標に重なって描画されていた──絵文字が読めない・タップ判定が別のボタンに奪われる、という実害があった。②タイミングの不具合：ボタンの表示切替を行う`hudForce()`は`G.phase==='play'`を条件にしているが、この関数はラウンド開始時（`start()`・`show()`、どちらもまだ`G.phase==='count'`＝3-2-1のカウントダウン中）にしか呼ばれておらず、カウントダウンが明けて`G.phase`が`'play'`に切り替わる瞬間に呼び直されていなかった。結果、力のボタンは開始直後は非表示のままで、店で何かを購入する（`buyForce()`が`hudForce()`を呼ぶ）などの無関係な操作をきっかけに、たまたまその時点で`G.phase==='play'`になっていたため初めて表示される、という偶然任せの状態だった。ご指摘の画面は、まさにこの偶然が起きた直後（力のボタンが重なって突然現れた瞬間）だったと分かる。修正は①`.forceBtn`に`position:relative`を明示して`.actbtn`の`position:absolute`を上書きし、本来のflexレイアウトに戻す、②カウントダウン終了（`G.countT<=0`）の分岐に`hudForce()`（`updatePistolBtn()`・`updateO2Btn()`も併せて）を追加し、本編開始の瞬間に確実にボタンの見え方を更新する、の二点。検証は`node --check`に加え、ヘッドレスChromiumをiPhone 13相当（タッチデバイスとして`IS_TOUCH`が真になる条件）でエミュレートし、①カウントダウン明け直後の時点で開始時解禁ずみの🌱🌱💧ボタンが両方とも表示され座標が重ならず横に並んでいること（実測で66px間隔＝ボタン幅56px＋gap10pxどおり）、②まだ未解禁の🔥💨🪨ボタンは正しく非表示のままであることを実測し、スクリーンショットでも目視確認、pageerrorゼロを確認した。", },
    { tag:"end", t:"「合体（こっこコロコロ ／ /koro/）」サービス終了のお知らせ", d:"いつも畜物語で遊んでくださり、本当にありがとうございます。誠に勝手ながら、このたびこっこちゃんを落として同じこっこをくっつけて合体させ、巨大ゴールデンこっこを目指すスイカゲーム系パズル「合体（こっこコロコロ）」のサービスを終了し、ページを削除いたしました。トップページの一覧・サイトマップからも本作へのリンクを外しております。コンボでフィーバーを狙って遊んでくださった皆さまには、心よりお詫び申し上げます。ごめんなさい。これからも畜物語をどうぞよろしくお願いいたします。", },
    { tag:"end", t:"「律動（こっこパルス ／ /pulse/）」サービス終了のお知らせ", d:"いつも畜物語で遊んでくださり、本当にありがとうございます。誠に勝手ながら、このたびビートに合わせてタップしZ軸の奥から迫るブラックこっこちゃんを撃ち落とす3Dリズムシューティング「律動（こっこパルス）」のサービスを終了し、ページを削除いたしました。トップページの一覧・サイトマップからも本作へのリンクを外しております。90秒サバイブに挑んで遊んでくださった皆さまには、心よりお詫び申し上げます。ごめんなさい。これからも畜物語をどうぞよろしくお願いいたします。", },
    { tag:"feat", t:"コッコ芽吹き（/mebuki/）に🔫レーザーピストルを追加 ─ 塗る3Dと同じ仕様（初期5発・🏪コンビニで💴2・最大99発）で移植", d:"『🔫を追加して、初期5発、コンビニで99個買えるようにして』というご依頼に応え、塗る3D（/splat3d/）のレーザーピストルを、同じ数値（初期5発・購入💴2・最大99発・クールダウン0.18秒）のままコッコ芽吹きへ移植した。力（🌱💧🔥💨🪨）の直撃システムとは独立した専用の武器として実装──`findAimEnemy()`を射程パラメータ化して共有しつつ、🔫は射程250mちかく（`PISTOL_RANGE=200`）・地形を一切変えない・当たれば必ず1発で撃破という、力より単純で確実な攻撃手段にした。狙いが外れた場合は塗る3Dと同じ手法（`insideBox`での障害物マーチング）で最大射程か壁までまっすぐ光線を伸ばす。見た目もこっこGP/塗る3D風の三重トレーサー＋着弾グロー（`beam()`関数を新設し、既存のスプライトバッチにカメラ側を向くリボンとして描画）。操作は左クリック／Fキー／タッチの専用🔫ボタン（力のボタン列とは別に右下へ新設）。🏪コンビニに🔫弾の購入行を追加（長押しで連続購入）。HUD左上に`🔫 x5`の弾数表示を新設し、あそびかた画面の文言も『🔫が一番たしかな一撃』と明記して更新した。検証は`node --check`に加え、検証フックへ`firePistol()`・`buyPistol()`を新設し、ヘッドレスChromiumで①ラウンド開始時に弾が正確に5発であること、②フック経由の発射で敵を確実に1発で撃破し弾薬が1減ること、③本物のマウス左クリック（フック経由でなく実際のpointerdownイベント）でも同じく1発で撃破できること（フックが緑でも実入力コードが正しいとは限らないという、おりづる以来の教訓を踏まえた検証）、④コンビニでの連続購入が確実に上限99発で止まることをすべて実測し、pageerrorゼロを確認した。", },
    { tag:"fix", t:"コッコ芽吹き（/mebuki/）の💧水直撃を、確実な二撃撃破に修正 ─ 直前の修正でも「ラウンド開始直後は事実上倒せない」不具合が残っていた", d:"『初回にブラックこっこちゃんを攻撃する術がないって言ってんの！』という重ねてのご指摘で発覚した。直前の修正（力の直撃を敵にも当てるようにした修正）で💧水は『直撃のたびに`drownT`（浸水量）を0.85ずつ加算し1.6を超えたら撃破』という減衰つきの積算方式にしていたが、`drownT`は環境ダメージ（深い水セルに居座らせる別の仕組み）と同じ変数を共有しており、直撃で得た浸水量も1秒あたり2.0のペースで減衰し続けていた。ラウンド開始時点で解禁されている力は🌱草（撃破できない・突き飛ばすだけ）と💧水だけで、撃破できる🔥火・🪨岩は🏪コンビニで💴を払って解禁するまで使えない。したがって開始直後に頼れる💧水が『素早く連射しないと2発でも倒せない（現実的な間隔で撃つと2発で0.85+0.85-減衰分<1.6になり倒せず、3発以上が必要になることがある）』状態では、初回は実質的に攻撃する術が無いのと同じだった。修正は、直撃による撃破判定を🪨岩と同じ『減衰しない直撃カウンタ（`waterHits`）』方式に作り替え、環境ダメージ用の`drownT`とは完全に分離した。これにより💧水は解禁不要・購入不要で、直撃を何秒間隔で当てても必ず2発で撃破できる（1秒間隔・5秒間隔のどちらでも実測で確認）。あそびかた画面の文言も『水は解禁ずみで二撃でしずめる（初めから確実に倒せる）』と明記した。検証は`node --check`に加え、ヘッドレスChromiumで①ラウンド開始直後（🔥🪨💨は未解禁のまま）に💧のみで敵を実際に2発で撃破できること、②1秒間隔・5秒間隔のどちらの連射でも確実に2発で撃破できる（カウンタが時間で減衰しない）ことを実測し、pageerrorゼロを確認した。", },
    { tag:"fix", t:"コッコ芽吹き（/mebuki/）に、ブラックこっこちゃん（逆縁）を直接ねらって払う手段が無かった不具合を修正 ─ 力の銃を敵にも直撃させるよう変更", d:"『ブラックこっこちゃんを倒す手段がないよ、なんで塗る3Dから引き継がなかったの？』というご指摘で発覚した。設計時は『武器一式（🔫💣🚀）は力の銃1本に統合する』と決めていたが、実装した`fireForce()`は照準を常に地面のセル（`aimGroundCell()`の着弾点）にしか適用しておらず、逆縁に狙いを定めて発射しても地面に力が撒かれるだけで、敵自身へは一切当たらない状態だった。敵を倒せる経路は「プレイヤーが撒いた🔥/💧のセルへ敵が自分から歩いて入り、かつ一定時間（🔥0.4秒／💧1.6秒）居座り続けたときだけ発動する受動的な環境ダメージ」のみで、狙って直接倒す能動的な手段が存在せず、遊び手からは『倒す方法が無い』としか見えない状態だった。修正として、こっこGP／塗る3Dのロックオン（`findAimTarget`）と同じ型で`findAimEnemy()`を新設し（俯角を含めない水平方向のみでコーン判定──俯角を含めた3Dベクトルで判定すると遠距離で内積が頭打ちになりロックオンできなくなるという塗る3Dの既知の不具合を踏まえた設計）、`fireForce()`は照準線上に逆縁がいれば地面でなくその敵へ`hitEnemyWithForce()`で直撃させるようにした。力ごとに手応えを変え、🔥は直撃一発で撃破（あそびかた画面で元々『焼き払う一撃』と謳っていた約束を実装で果たす形）、🪨は直撃二発で撃破（一発ごとに0.4秒怯ませる）、💧は直撃のたびに大きく鈍らせ（`soakT`）浸水量を積み増し数発で力尽きさせる、🌱は3m突き飛ばして怯ませる（撃破はしない＝あくまで押し返す力）とした。既存の環境ダメージ（撒いた🔥/💧に居座らせる／💨で吹き飛ばして火や深い水に道連れにする／💨で岩を転がして押し潰す）はそのまま残し、直接ねらう新しい手段を追加する形にした──『焼く・浸す・押し返す・埋める』という開発時の約束（open method）に、狙い撃ちという直感的な入口が新たに揃った。検証は`node --check`に加え、検証フックへ`listEnemies()`（各逆縁の座標・無敵時間・延焼/溺水/鈍化の蓄積を返す）・`unlockAll()`・`aimAt(x,z)`を新設し、ヘッドレスChromiumで①🔥の直撃一発で確実に撃破されること、②🪨は一発目では倒れず二発目（0.4秒の怯み明け後）で撃破されること、③🌱は撃破せず対象を押しのけること、④💧の直撃で鈍化・溺水蓄積が実際に加算されることをすべて実測し、pageerrorゼロを確認した。あそびかた画面の文言も、環境依存の説明から『直接ねらって当てれば払える』という能動的な操作の説明へ書き改めた。", },
    { tag:"new", t:"新作「コッコ芽吹き（COCCO MEBUKI ／ /mebuki/）」を追加 ─ 塗る3Dの中心をスプラのパクリから絡み合う5つの自然の力へ差し替えた3Dアクション", d:"『塗る3D（/splat3d/）は正直いちばん面白いゲームだけど、スプラのパクリだから畜学に違反するよね？そこを直したゲームだけでも十分超えれると思う』というご指摘から生まれた。正論蒔宿との対話を通じて設計を詰めた──①最初に立てた案「コッコより（二人で縄を綯う協力ゲーム）」は畜学七相へ美しく整合させることを先に決めてしまい、遊びの快感を後付けにしていた（『君の企画、君自身正直面白いゲームだと思う？』の一言で正直に非を認めた）。②単独プレイへ改めたのは『二人でプレイするスタイルは今のところ人気出てない』という実績（kizuna・ぶらんこが死んでいる事実）に基づく判断。③『塗る3Dの面白さは、クリアの世界線が無数にあること＝こんな方法もあるんだって発見』という言葉で、目指すべき芯が「緊張」でも「新規動詞」でもなく創発（別解の多さ）だと分かった。④『2Dで3Dの面白さを超えれるイメージが湧かない』『塗る3Dはスプラのパクリだから畜学に違反する。そこを直したゲームだけでも十分超えれる』という二つの判断で、方向がゼロから発明する新作でなく「塗る3Dを丸ごとフォークし、壱（既視の禁）違反の中心＝『インクを塗って面積%で勝つ』という一点だけを差し替える」に定まった。実装は`splat3d/index.html`をフォークし、3D移動・空蹴り酸素ゲージ・🏪コンビニ経済・❤️3つで即ゲームオーバーの緊張・世界ランキング・WebAudio合成音・`/chikumo.svg`の焼き込み等の面白いエンジンはすべて継承したうえで、中心動詞だけを「🔥火・💧水・🌱草・💨風・🪨岩という5つの自然の力を絵文字で撒き、CA（セル・オートマトン）で互いに絡み合わせて（延焼・消火・浄化・せき止め・押し返し等）、枯れた島に巣くう逆縁を鎮める」に置き換えた。勝敗は面積%（スプラの評価軸そのもの）を使わず、巣まわりのpurity（枯でないセルの割合）を一定時間保つ`open method`にしたことで、焼く・浸す・押し返す・埋める・吹き飛ばすのどれでも巣を鎮められる＝クリアの世界線が単一でなく複数ある構造にした。岩を積むと実際に登れる足場になり、育ちきった草は壁になる（JS当たり判定とGPU描画が同じ`boxes`配列を見る設計）。ヘッドレスChromiumでの実プレイ検証中に致命的なバグを2つ発見し出荷前に修正した──①巣の周囲が世界生成直後は「枯」ゼロのためpurityが最初から満点になり、プレイヤーが何もしない開始数秒で全4巣が自動的に鎮まり即勝利してしまう不具合（巣の周囲をあらかじめ72%汚染してから開始するよう修正）、②💧水・🌱草の拡散確率が高すぎ、1発撃って放置するだけで数秒後にマップの離れた場所まで水浸しになる抜け道（拡散確率を1/8〜1/13に下げ、25m先には5秒後も届かないことを実測で確認）。検証フック`window.__mebuki`（state/step/setCell/stepCA/fire等）を新設し、①タイトル→出撃→カウントダウン明けで巣が鎮まっていないこと、②実際に草・水で巣周辺を浄化すると鎮まりsealTが正しく進むこと、③🔥が隣接する🌱に延焼し💧に隣接すると即座に消えること、④弾薬が実際に消費されること、⑤時間切れでは罰なく終わりリトライできること、を実測しpageerrorゼロを確認した。詳細設計は`docs/要件定義-コッコ芽吹き.md`。世界ランキングは`rankings/mebuki`に新規ノード（既存Firebase相乗り）。", },
    { tag:"end", t:"「ねらう（こっこバブル ／ /bubble/）」サービス終了のお知らせ", d:"いつも畜物語で遊んでくださり、本当にありがとうございます。誠に勝手ながら、このたびこっこちゃんをねらって発射し同じ色を3つ以上くっつけてパチンと弾く連鎖バブルシューター「ねらう（こっこバブル）」のサービスを終了し、ページを削除いたしました。トップページの一覧・サイトマップからも本作へのリンクを外しております。連鎖を狙って遊んでくださった皆さまには、心よりお詫び申し上げます。ごめんなさい。これからも畜物語をどうぞよろしくお願いいたします。", },
    { tag:"end", t:"「音ゲー（こっこビート ／ /beat/）」サービス終了のお知らせ", d:"いつも畜物語で遊んでくださり、本当にありがとうございます。誠に勝手ながら、このたびBGMに合わせて左右をタップし降ってくるこっこちゃんをビートに乗せてキャッチする「音ゲー（こっこビート）」のサービスを終了し、ページを削除いたしました。トップページの一覧・サイトマップからも本作へのリンクを外しております。コンボを重ねて遊んでくださった皆さまには、心よりお詫び申し上げます。ごめんなさい。これからも畜物語をどうぞよろしくお願いいたします。", },
  ]},
  { date:"2026.07.07", items:[
    { tag:"imp", t:"十四式（/jushishiki/）に「一言で言えば共鳴循環を表す式である」を追記", d:"『十四式は一言で共鳴循環を表す式なんだ』という正論蒔宿の言葉を、十四式のページに追記した。十四式にはもともと『継 → 認で周回する』という周回構造の記述があったが、この一言はその周回が単なる繰り返しではなく、①認から⑭継までを一周するたびに差分が五式へ帰属して蓄積され、②継から認へ戻る際も同じ構造へ戻るのではなく蓄積された差分を抱えたまま次の周回へ降りる──という性質を持つことを一言で言い当てている。冒頭のDefinitionセクションに強調ブロック「IN ONE LINE：十四式は、一言で言えば──共鳴循環を表す式である」を新設し、定義文にも差分の蓄積と周回の関係を一段落追記、波構造セクションの『継 → 認で周回する』の一文にも「（差分を蓄積したまま次の周回へ降りる共鳴循環）」を添えた。meta description・OGP・記事構造化データ（Article/FAQPage の JSON-LD）にも同じ一言を反映し、検索・SNSでの引用時にも一言定義が伝わるようにした。CLAUDE.mdの十四式の説明にも同じ一言を追記した。検証はJSON-LD構文をJSON.parseで、インラインJSをnode --checkで確認、ヘッドレスChromiumで新設ブロックの表示とpageerrorゼロを確認した。", },
    { tag:"new", t:"畜学に十冊目の本「畜物語」を追加 ─ 他の九つの蔵とは違い、規則ではなく設計学でいう「森」そのものを記す特別な一冊。内容は思いついたときに追記していく", d:"『おおよその規則が畜学にできたので、畜学に畜物語という本を追加してほしい。内容は思いついたら追加する』という求めに応え、新しい本「畜物語」を建てた。他の九つの蔵（十四式・遊戯学・設計学・畜史・思考学・肥料学・技術学・祖元学・標準学）はどれも『どう作るか・なぜ作るか・何を土台にするか』といった規則・掟を記すのに対し、この本だけは規則ではなく、設計学（`docs/設計学.md`）でいう森（全体＝十四式の家、世界・掟・共有の臓器）そのものを、規則の形に切り分ける前の姿のまま留めておく位置づけとした（正論蒔宿の言葉：『設計でいう作品の森になる本だよ』）。公開ページは巻をまだ一つも持たず、空の森を表す演出（🌲の点在・点線の枠）だけを置いた──空であることを埋めるべき欠落として扱わず、森がまだそのままの姿でいることの証しとして正直に見せている。正典 `docs/畜物語.md`、公開 `monogatari/index.html`（蔵書 `/Library/` に十冊目として追加）、CLAUDE.mdの「九つの蔵」を「十の蔵」に改め、他の蔵と書き味の違う畜物語の掟（急いで埋めない・規則に振り分けられない発見だけを巻として記す）も加えた。", },
    { tag:"new", t:"畜学に九つ目の蔵「標準学」を追加 ─ 何を土台に選ぶのか（世界標準＝絵文字/ISOの上に建て、こっこという一つの品種だけを自前で定める）を記す書", d:"『絵文字を多用する理由は日本発祥で世界で一番使用されているISOだから』『こっこちゃんは品種』『参こっこ湯1号店を開くことが直近の目標』という正論蒔宿の三つの言葉を、他の八つの蔵（十四式・遊戯学・設計学・畜史・思考学・肥料学・技術学・祖元学）のどれとも別の次元──畜物語が『何を土台（標準）に選んで建てるか』──の記録として残すため、新しい蔵「標準学」を建てた。巻一に「絵文字を多用するのは日本発祥で世界一使われているISO（Unicode）だから」（追加ダウンロード不要＝一器に納む・どの端末でも同じ絵＝万象同時の醒と土台を共有する世界標準の選択）、巻二に「こっこちゃんは品種である」（絵文字という世界標準の海の中で、こっこ本体だけは畜物語だけの一品種＝土台は世界と共有し品種は畜物語だけのものにする二層構造）、巻三に「直近の目標は参こっこ湯1号店を開くこと」（画面で育てた品種を現実の場へ持ち出す標準の次の一歩。具体は今後の対話で定まるため捏造せず、目標を見失わないための記録として掲げる）を記した。正典 `docs/標準学.md`、公開 `hyojungaku/index.html`（蔵書 `/Library/` に九冊目として追加）、CLAUDE.mdの「八つの蔵」を「九つの蔵」に改め標準学の掟も加えた。", },
    { tag:"imp", t:"コッコスプラット3D（/splat3d/）の酸素ゲージを強化 ─ 満タンから跳べる回数を島ぐらしの11回に近い10回（地上ジャンプ1＋空蹴り9）に増量", d:"『酸素ゲージが少ないです。島ぐらしは11ゲージです。塗る3Dは10ゲージにしてほしい』というご指摘に応えた。まず島ぐらし（/mori/）の実装を調べ、「ゲージ」が指すものが酸素ゲージの見た目の長さではなく、満タンの状態から地上ジャンプ1回＋空蹴り（`AIR_COST=0.10`ぶん消費）を連続で何回くり出せるかという実際に遊んで数えられる回数だと突き止めた。ヘッドレスChromiumで島ぐらしの`doJump()`を満タンから連打させて実測したところ、地上ジャンプ1回＋空蹴り10回＝合計11回でぴったり酸素切れになることを確認し、ご指摘の「11」の根拠を裏づけた。塗る3D側は従来`AIR_KICK_COST=0.16`で、地上ジャンプ1回＋空蹴り6回＝合計7回しか跳べておらず、島ぐらしよりだいぶ少なかった。島ぐらしより1回だけ少ない「10回（地上ジャンプ1＋空蹴り9）」ぴったりになるよう`AIR_KICK_COST`を`1/9`に変更した。実装時、`1/9`のような割り切れない小数を毎回そのまま減算していくと、9回目の空蹴り直前で酸素が浮動小数点の丸め誤差により消費量よりわずかに（1京分の1未満）少なく計算され、本来まだ跳べるはずの最後の1回だけ誤ってブロックされる不具合をヘッドレスChromiumでの実測中に発見した。空蹴りの判定に`AIR_KICK_COST-1e-9`という微小な許容誤差を持たせることでこの丸め誤差を吸収し、狙いどおり満タンから10回ぴったり跳べるようにした。検証はnode --checkに加え、ヘッドレスChromiumで実際に`doJump()`を満タンの酸素から連打させ、①許容誤差を入れる前は9回で誤ってブロックされていたこと（丸め誤差の実在を確認）、②許容誤差を入れた後は地上ジャンプ1回＋空蹴り9回＝ぴったり10回まで成功し11回目で正しくブロックされること、③島ぐらし側は同じ手法で計測すると11回で酸素切れになること（両者の差が意図どおり1回であることの裏づけ）、④酸素ボンベでの回復・着地中のじわじわ回復など既存の酸素まわりの挙動が壊れていないことをすべて実測し、pageerrorゼロだった。", },
    { tag:"imp", t:"コッコスプラット3D（/splat3d/）のダメージを恒久化 ─ ❤️が0になったらその場でゲームオーバーに変更（従来の自動全回復・スタート地点への復活は廃止）", d:"『一回のダメージはハートマイナス1にして、ハートが無くなったらゲームオーバーにしてほしい』という求めに応えた。従来の実装では、被弾のたびに❤️を1つ減らしつつも、3.5秒のあいだ追加で被弾しなければ❤️がこっそり3つに全回復する救済タイマーがあり、さらに❤️が0になっても即終了せず「2.4秒ダウン→スタート地点へ復活し❤️満タンに戻る」という、実質ゲームオーバーが起こりえない仕組みになっていた。これを、①被弾ごとの❤️減少を恒久化（時間経過でも自動回復しない・全回復タイマーを削除）、②❤️が0になった瞬間にダウン演出（画面シェイク・振動・インク飛散）はそのまま活かしつつ即座にラウンド終了へ移行、に変更した。終了理由を区別するため新設した`G.ko`フラグを結果画面の判定文に反映し、時間切れの「TIME UP…」とは別に、被弾によるゲームオーバーでは「やられた…」と表示するようにした（クリア「CLEAR!」の判定はそのまま）。以前スタート地点への復活に使っていたコードパスは、ゲームオーバーへ直行するようになったことで実行されなくなったため、復活処理そのもの（位置リセット・専用の復活サウンド）と、もう使われなくなった全回復タイマーの変数を削除した。あそびかた画面の案内文も「3発くらうとダウンしてスタート地点からふっかつ」から「1発で❤️が1つ減り、3つとも失うとゲームオーバー」に更新した。検証はnode --checkに加え、ヘッドレスChromiumで実測──①被弾1回で❤️が2に減り、5秒待っても自動回復しないこと、②さらに2回被弾して❤️が0になった瞬間に`G.phase`が`finish`へ移行し`G.win=false`・`G.ko=true`になること、③一定時間後に結果画面が表示され判定文が「やられた…」になっていること、④時間切れ（❤️は減らさず`G.t`を0にする）では従来どおり`G.ko=false`のまま「TIME UP…」と表示されクリア判定にも影響しないこと、をすべて実測し、スクリーンショットで実際の「やられた…」結果画面を目視確認、pageerrorゼロだった。", },
    { tag:"feat", t:"コッコスプラット3D（/splat3d/）に島ぐらしの🚀追跡ミサイルを移植 ─ 🏪コンビニで💴4・最大99個まで購入可能（初期0発）", d:"『島ぐらしの追跡ミサイルを移植してほしい。コンビニで4💴で99個まで買えるようにしてほしい』という求めに応え、島ぐらし（/mori/）の🚀ミサイル（🚁ヘリ／🤿潜水艦で使う誘導兵器）を、地上のコッコスプラット3Dへ移植した。島ぐらしの実装を確認したところ、発射時にいちばん近い生きた敵（範囲60）を探してロックオンし、命中まで毎フレーム`(標的方向×速度－現在速度)`をなめらかに加算するホーミング（`Math.min(1,dt*4)`のブレンド率）で追尾しつづけ、命中・地形接触・寿命切れ(3.2秒)のいずれかで爆発して範囲内を巻き込む、というシンプルな仕組みだった。塗る3D側もこの追尾ロジック・爆発条件をそのまま移植し（寿命は120秒ラウンドに合わせ4.5秒・爆発範囲6に調整、島ぐらしの3D飛行（そら・深海）と違い地上の敵しかいないためy座標は固定高度）、🔫レーザーピストル・💣インクボムに続く第3の武器として追加した。🏪コンビニでの購入は💴4・最大99個・初期0発（Mキーでも購入、長押しで連続購入にも対応）、発射はRキー／新設🚀ボタン。見た目は島ぐらしと同じく🚀絵文字をそのままアトラスに焼いた本体＋オレンジの淡いグローで、飛翔中は煙の粒子を曳く。検証はnode --checkに加え、ヘッドレスChromiumで実測──①在庫0で発射しても何も起きないこと、②コンビニでの購入で在庫・所持金が正しく増減すること、③カメラの向きと無関係に射程内の敵へ自動ロックオンし、命中まで追尾して1発で撃破すること、④射程内に敵がいない場合は正面へ直進し、寿命切れで自然に消えること、⑤在庫上限99個の手前から長押し購入しても99個でぴったり止まること、をすべて実測し、スクリーンショットで🚀本体・グロー・煙の尾が実際に描画されていることも目視確認、pageerrorゼロだった。", },
    { tag:"fix", t:"コッコスプラット3D（/splat3d/）の🔫、カメラを見下ろし気味にしていると光線だけ飛んでブラックこっこに当たり判定が出ないバグを修正", d:"直前のリリースで🔫の射程をステージ対角ぶんまで延ばした直後、『レーザーだけ遠くに飛んで、ブラックこっこちゃんは当たり判定にならないバグがあります』というご指摘を受けた。原因を調べたところ、射程の延長そのものではなく、ロックオン判定（`findAimTarget`のコーン判定）が持っていた既存のバグが表面化したものだった。実際に飛ぶ光線は（カメラの見下ろし角ぶん地面に刺さって見えなくなるのを防ぐため）水平方向に飛ばす設計になっていたのに、ロックオン判定の内積コーン計算だけは、見下ろし角を含んだ生のカメラ前方ベクトル（`camForward()`）をそのまま使っていた。見下ろし角が入ったベクトルと、敵までのほぼ水平な方向を比べると、内積の理論上の上限が`cos(見下ろし角)`で頭打ちになり、カメラの見下ろし角が約25.8°（本作でクリック/ドラッグで到達できる範囲＝-1.15〜0.55ラジアンの範囲内）より深いと、閾値`0.90`を割りこんでロックオンが恒久的に成立しなくなる──しかもこれは近距離・遠距離を問わず起きる不具合で、たまたま今回の射程延長で遠距離を検証していて発覚した。修正として、ロックオン判定に渡す方向ベクトルを、実際に光線が飛ぶのと同じ水平方向（見下ろし角を含めない）に揃えた。検証はnode --checkに加え、ヘッドレスChromiumで①本作の見下ろし角の可動範囲内（-1.15〜0.55）に収まる深めの見下ろし角(-0.6ラジアン)で、5〜100mの複数距離への実射がすべて命中することを実測、②同じ条件で旧コード（水平化前のベクトルを渡す版）に戻すと全距離で命中しなくなることを比較実測して原因を裏づけ、③デフォルトの見下ろし角(-0.3)や見下ろし角0でも従来どおり命中することを回帰確認、pageerrorゼロだった。", },
    { tag:"imp", t:"コッコスプラット3D（/splat3d/）の🔫レーザーの射程を、こっこGPと同じ「遠くまで届く」距離に拡張（45m→ステージ対角ぶん250mへ）", d:"『🔫の飛距離が短いです。レースと同じ遠くまで当たるレーザーにしてほしい』というご指摘に対応した。塗る3Dの🔫は、こっこGP直系のヒットスキャン（撃った瞬間に当たる光線）自体はすでに移植済みだったが、①ロックオン対象を探す距離、②ロックオン先が無いときの水平フォールバック光線が届く最大距離、の両方が`45`（メートル相当）に固定されていた。ステージは1辺170m四方（対角線は170×√2≈240m）あるため、対角の遠くにいる敵は届く前に判定が打ち切られ、実質的に「近距離専用」になってしまっていた。こっこGP側のピストルは、コース上のほぼどこまでも一瞬で届くヒットスキャン（判定距離950・弾速dt*1250という、実質「見えている範囲は必ず届く」設計）だったため、塗る3D側もこれに合わせ、新設した定数`PISTOL_RANGE=250`（ステージ対角をまるごとカバーできる値）を、ロックオン検索距離とフォールバック光線の最大距離の両方に適用した。壁・ハコなど途中の障害物に当たれば従来どおりそこで止まる（貫通はしない）。検証はnode --checkに加え、ヘッドレスChromiumで①ステージの対角に近い約166m離れた敵（旧45m上限では絶対に当たらない距離）へ発射し、ロックオンで命中・撃破できることを実測、②ロックオン対象が無い状態で反対側の壁に向けて発射し、光線が途中の障害物ハコに当たるまで（旧上限の45mをこえて）約63m先まで正しく伸びることを実測、pageerrorゼロだった。", },
    { tag:"imp", t:"コッコスプラット3D（/splat3d/）のブラックこっこちゃんを、島ぐらし（/mori/）と同じデザインに変更（移植）", d:"『塗る3Dのブラックこっこちゃんを島ぐらしのブラックこっこちゃんデザインに変更(移植)してほしい』という求めに応えた。これまで塗る3D側のブラックこっこは、専用の敵アトラスセルに、公式こっこSVGを黒っぽく染めたうえで白目・黒い瞳・赤い眉のスラッシュを2Dキャンバスで直接描きこむ「専用の悪い顔」を焼きこんでいた──島ぐらしとは別に独自に描き起こしたデザインだった。島ぐらし側の実装を確認したところ、実は特別な悪い顔は焼きこんでおらず、プレイヤーと全く同じ公式こっこSVGのセルを、描画時の色（`vCol`によるシェーダーの乗算ティント、通常時は`r=0.22,g=0.13,b=0.18`の焦げ茶〜黒紫）だけで染め、加えて顔のあたりに赤い威圧グロー（インク用のやわらかい円パーティクルを流用し、赤みで低アルファに）を重ねているだけ、といういたってシンプルな手法だと判明した。塗る3D側もこれに合わせ、①敵専用の「悪い顔」焼きこみコード（`drawCoccoCell`の黒版・白目/瞳/眉の手描き）を削除し、公式こっこと全く同じセル0を敵にも使うよう統一、②敵の描画を`sprite(..., 0, 0.22,0.13,0.18, 1, ...)`という島ぐらしと同じ乗算ティントに変更、③島ぐらしの赤い威圧グローと同じ考え方で、敵の頭上に既存のインク円パーティクル用セルを赤く低アルファ(0.22)で重ねる1行を追加した。検証はnode --checkに加え、ヘッドレスChromiumで塗る3D・島ぐらし双方の実際の敵をカメラで正面から捉えてスクリーンショット比較し、どちらも同じ焦げ茶〜黒紫のこっこシルエット＋淡い赤グローという同一デザインになっていることを目視確認、pageerrorゼロだった。", },
    { tag:"imp", t:"コッコスプラット3D（/splat3d/）の🏪長押し購入を「押しつづけるほど加速」する方式に変更、💣インクボムの投げるクールダウンを廃止", d:"『アイテム長押し購入は、長押しする時間に比例して、購入速度を加速させてほしい』『爆弾の使用制限カウントは廃止して』という2つの求めに応えた。①直前のリリースで入れた長押し連続購入は、押している間ずっと一定間隔（90msごと）で買う単純なタイマーだったが、購入間隔が押し続けた時間に応じて縮まっていく方式に変更した。押した瞬間は260ms間隔のゆっくりした購入から始まり、そのまま1.5秒間押しつづけると最速25ms間隔まで滑らかに加速する（`holdRepeat`内でschedule時刻からの経過時間に応じ次のタイムアウト遅延を再計算する自己スケジューリング式に書きかえ、固定間隔の`setInterval`は廃止）。指を離せば加速は即リセットされ、次に押したときはまた260msのゆっくりからやり直す。🫧酸素ボンベ・🔫弾丸・💣インクボムの3種とも同じ加速カーブを共有する。②💣インクボムは、前回のリリースで在庫制（コンビニ購入・最大99個）に改めた際も、投げるたびに固有のクールダウン（`BOMB_CD`＝7秒）が残ったままで、在庫があっても7秒に1回しか投げられない制限が掛かっていた。在庫という上限がすでに使用回数を制限しているため、投げる側の時間制限は不要と判断し、`BOMB_CD`・`P.bombT`・クールダウン表示（ボタン上の残り秒数）をまるごと削除した。在庫があるかぎり連続で投げられ、在庫が尽きたときだけボタンがくすんだ見た目になる（クールダウンと空在庫を同じ見た目で兼用していた表示ロジックを、空在庫のみの単純な条件に整理）。検証はnode --checkに加え、ヘッドレスChromiumで実測──①同一フレームで連続して`throwBomb()`を2回呼んでも両方とも即座に投げられ在庫が2減ること（クールダウンによるブロックが無いこと）、②💣の長押し購入を継続時間ごとにサンプリングし、経過時間とともに購入間隔が実際に縮まっていく（加速している）ことをタイムスタンプ付きで確認、③指を離してすぐ再度押すと加速がリセットされ再びゆっくりから始まること、④在庫上限99個の手前から長押しを続けても99個でぴったり止まり💴も過不足なく減ること、⑤🫧酸素ボンベ・🔫弾丸の長押し購入・単発タップ購入も同じ加速方式で壊れていないことを回帰確認、pageerrorゼロだった。", },
    { tag:"feat", t:"コッコスプラット3D（/splat3d/）の🏪コンビニで💣インクボムも購入可能に（初期0個・💴4・最大99個）、あわせて全アイテムを長押しで連続購入できるように", d:"『爆弾も99個コンビニで買えるようにしてほしい。初期は0個です。料金は4💴。あと長押しすると高速で買い物できるようにしたい。今は99回タップしないと買えません』という2つの求めに応えた。①これまで💣インクボムはコンビニで買えず、直接投げるだけの無制限アイテムだったが、島ぐらし・🫧酸素ボンベ・🔫弾丸と同じ「在庫を買いだめする」方式に変更──初期在庫0個、💴4で1個ずつ購入、最大99個まで。在庫が0のときは投げようとしても発動せず（nopeサウンド）、投げるたび在庫を1消費する。ボムボタンは在庫0のときもクールダウン中と同じ「くすんだ」見た目にして、投げられない状態がひと目で分かるようにした。②これまで購入UIは1タップ＝1個ぶんの`pointerdown`しか処理しておらず、上限99個まで買うには99回タップし続ける必要があった（ご指摘のとおりのバグ）。押した瞬間に1個購入したうえで、押しつづけている間90msごとに自動で追加購入する「長押し連続購入」を🫧酸素ボンベ・🔫弾丸・💣インクボムの3種すべてに導入し、指を離す（`pointerup`/`pointercancel`/`pointerleave`）か画面外へフォーカスが外れる（`blur`）と即座に止まるようにした。PC向けのショートカットキー（Bキー＝酸素ボンベ／Gキー＝弾丸／新設Hキー＝インクボム）も同じ長押し連続購入に対応させ、OSのキーリピート（環境ごとに速度がバラバラ）には反応しないよう`e.repeat`を無視して自前のタイマーだけで一定速度にそろえた。検証はnode --checkに加え、ヘッドレスChromiumの実ポインタイベント・実キーボードイベントで、①コンビニに近づいた状態で💣の購入行に本物の`pointerdown`→保持→`pointerup`を送り、保持時間に応じて複数回購入されること・離すと即座に止まって以降増えないことを実測、②Hキーを実際に押しっぱなしにした場合も同様に連続購入され、離すと止まることを実測、③在庫上限99個の直前から長押しを続けても99個でぴったり止まり、💴もちょうど購入した個数分しか減らないこと（上限超過の購入をブロック）、④🫧・🔫の既存の単発タップ購入・長押し購入も壊れていないことを回帰確認、⑤所持💴が足りない状態では💣が0個のまま変化しないことをすべて実測し、スクリーンショットでコンビニの購入UIに🫧🔫💣の3行が正しく並んで表示されることも目視確認、pageerrorゼロだった。", },
    { tag:"feat", t:"祖元学に「巻三：島ぐらしは実験室、塗る3Dは本番環境」を追記 ─ 島ぐらしで育った仕組みを本番ゲームへ移植するときの掟", d:"『島ぐらしは、実験室みたいなもので、塗る3Dこそが本番環境だよ』という正論蒔宿の言葉を、祖元学（`docs/祖元学.md`・公開`somogaku/index.html`）巻三として記した。今日一日、酸素ゲージ・空蹴り・コンビニ経済・撃破報酬を島ぐらし（/mori/）からコッコスプラット3D（/splat3d/）へ移植する中で、島ぐらしの「買うと在庫が貯まり、いつでもどこでも使う」酸素ボンベの設計を最初は「買うと即満タン」に簡略化してしまい後から作り直したこと、コンビニを最初は1軒だけ移植して後から4か所に増やしたこと、こっこGPのピストルを移植した最初のバージョンは弾が飛翔してすぐ地面に落ち遠隔攻撃として機能していなかったことなど、実際に何度も手戻りが起きた。この手戻りの積み重ねが「島ぐらし＝時間制限のない実験室、塗る3D＝120秒の短いラウンドで親子が待ち時間に遊びきる本番環境」という一言の正しさをそのまま裏づけていたため、対話から生まれた大きな判断として祖元学に記録した。あわせて巻四（チェックリスト、旧巻三）に「実験室で育った仕組みを本番ゲームへ移植するとき、コードそのままで満足せず本番側の制約に合わせて作り直したか」の一項を追加した。", },
    { tag:"imp", t:"コッコスプラット3D（/splat3d/）のレーダーマップを丸から四角に変更 ─ 実際の四角いステージと形をそろえた", d:"『レーダーマップは丸ですが、実際のステージは四角です。レーダーマップを四角にするか、ステージを丸にするか、実装しやすい方を選んで直してほしい』というご指摘を受け、実装コストを比較したうえで判断した。ステージを丸くする場合は、地形メッシュ・外周フェンス・ハコ/オリ/敵の配置、あたり判定の境界クランプ、インク用ペイントテクスチャの座標系など、四角いワールドを前提に組まれた仕組みの広い範囲に手を入れる必要がある一方、レーダーマップは単なる2D Canvasのオーバーレイなので、クリップ形状とグリッドの描画だけを直せば済む。実装しやすいレーダーマップ側を四角に直すことにした。円形クリップ（`arc`+`clip`）を、ステージの正方形と同じアスペクトの四角クリップ（`rect`+`clip`）に変更し、同心円で描いていたグリッド線も、四角いステージに合わせた3×3のマス目（縦横それぞれ3本の直線）に描きなおした。回転するスイープ演出は、そのままだと四角の四隅まで光が届かなかったため、半径を対角線ぶん（√2倍）にのばして四隅までカバーするようにした。副次的な効果として、以前レーダーマップが円形だったために起きていた「四隅寄りのコンビニやブラックこっこがクリップ範囲の外に出て表示されない」制約も、四角クリップになったことで根本的に解消された（プレイヤー・コンビニ・敵の描画ロジック自体は無変更で、ワールド座標をそのままキャンバスへ線形マッピングしているため）。検証はnode --checkに加え、ヘッドレスChromiumでスクリーンショットを撮り、レーダーマップが実際に角丸の四角形として描画され、グリッド・スイープ・自分のアイコン・コンビニ・敵の赤い点がすべて正しく表示されることを目視確認、pageerrorゼロだった。", },
    { tag:"imp", t:"コッコスプラット3D（/splat3d/）の🫧酸素ボンベボタンを⬆ジャンプボタンの真上に移動 ─ 移動は左指、その他のボタンぜんぶを右指だけで完結できるように", d:"『酸素ボンベのボタンはジャンプボタンの上に配置して、移動は左指、その他のボタンは右指で完結できるようにしたい』というご指摘のとおり、直前のリリースで追加した🫧ボタンを画面左側（左指の移動スティック側）に置いてしまっており、右手だけで完結できないレイアウトになっていた。🫧ボタンを⬆ジャンプボタンと同じ横位置（right基準）の真上へ移し、💣ボムボタン・🔫発射ボタンと合わせて画面右下に4ボタンをまとめて配置しなおした。ヘッドレスChromiumでタッチ端末を模してボタンの実際の画面座標（getBoundingClientRect）を測定し、🫧ボタンが⬆ボタンの真上に隙間を空けて重ならずに並ぶこと、💣・🔫とも横方向に重ならないこと、画面左側にはボタンが一切残っていないことを確認、スクリーンショットでも実際のレイアウトを目視確認、pageerrorゼロだった。", },
    { tag:"imp", t:"コッコスプラット3D（/splat3d/）の🏪コンビニを1か所→ステージ内4か所に増設 ─ レーダーマップにも4つとも表示", d:"『コンビニを1ヶ所→4ヶ所にしてください』という求めに応え、これまで単一のグローバル変数だった`STORE`を配列`STORES`に置きかえ、スポーン近くの既存の1軒に加え、地図の残り3つの区画（それぞれの象限寄り）にも同型のコンビニを生成するようにした。酸素ボンベ・弾丸の購入判定や使用可能距離の判定は、プレイヤーから最も近いコンビニ（`nearestStore()`）を毎回探して判定する方式に改めたため、どのコンビニに近づいても同じように売買できる。レーダーマップ・3Dワールドどちらの目印描画も配列を巡回するループへ書きかえた。実装後にヘッドレスChromiumでレーダーマップ上の描画位置を実測したところ、当初の配置（マップのほぼ四隅）だとレーダーマップの円形クリップ範囲の外に出てしまい、スポーン近くの1軒しかレーダーに表示されない不具合を発見──マップ座標を円形レーダーへ変換する際、対角方向は軸方向より短い距離で表示範囲の外に出てしまう仕様だったため、3つの区画コンビニの座標をマップ半径の60%相当まで内側に寄せて修正し、4軒すべてがレーダーマップ上にも表示されることを確認した。あそびかた画面の案内文も「ステージ内4か所」「レーダーマップにも表示」に更新。検証はnode --checkに加え、ヘッドレスChromiumで生成される店舗が常に4軒であること、各店舗の座標がレーダーマップの円内に収まりピクセル上でも実際にマーカー色が出ていること、スポーン近くの店舗での購入が引き続き正常に動作することを実測、pageerrorゼロだった。", },
    { tag:"imp", t:"コッコスプラット3D（/splat3d/）の🏪コンビニ価格を💴10均一→💴2均一に再値下げ（🫧酸素ボンベ・🔫弾丸とも最大99個までは変更なし）", d:"『コンビニの価格変更してください。酸素ボンベ10→2💵（99個まで）、🔫10→2💵（99個まで）』という求めに応え、前回💴10に統一した🫧酸素ボンベ・🔫弾丸の価格を、さらに💴2均一へ引き下げた（在庫上限99個は変更なし）。`O2_PRICE`・`AMMO_PRICE`の2定数を変更するだけの単純な調整のため、購入ロジック自体には手を入れていない。あわせて、価格変更前の値（💴100・💴50）のまま残っていたHTML側の初期表示プレースホルダー（コンビニに近づく前の一瞬だけ見える文言）とあそびかた画面の案内文も💴2に更新した。検証はnode --checkに加え、ヘッドレスChromiumでコンビニの表示が実際に「💴2」になっていること、💴10所持で購入すると💴8に減って在庫が+1されることを実測、pageerrorゼロだった。", },
    { tag:"imp", t:"コッコスプラット3D（/splat3d/）の🏪コンビニ価格を調整 ─ 🫧酸素ボンベ・🔫弾丸ともに💴10均一・最大99個の買いだめ制に変更。酸素ボンベは島ぐらしと同じ「買うだけでは回復しない・いつでもどこでも使うとゲージ満タン」の在庫アイテムへ", d:"『コンビニの価格変更してください。酸素ボンベ100→10💵（99個まで）、🔫50→10💵（99個まで）』という求めを受け、まず🔫弾丸の価格を💴50→10に下げた。酸素ボンベは当初「その場で買うと即ゲージ満タン」という単純な仕組みだったため「99個まで」という買いだめの概念が存在せず、そのまま価格だけ下げても意味が通らなかった。確認したところ『酸素ボンベは、島ぐらしの同じ設定にしてほしい。うまく操作すると空蹴りで空を飛べるの』とのことで、島ぐらし（/mori/）本来の設計──買うと在庫が+1（最大99個）されるだけで酸素ゲージは回復せず、`useO2()`相当の「つかう」操作でその場で在庫を1個消費してゲージを満タンにする──を忠実に移植することにした。🔫弾丸の購入ロジックと対にして`buyO2()`を在庫加算のみに変更し、新たに`useO2Bomb()`を追加（いつでもどこでも呼べる＝コンビニから離れた空中戦のさなかでも使える）。HUDに酸素ボンベの在庫数（🫁ゲージの横にx0など）を追加し、タッチ操作用に新規🫧ボタン（在庫が1個以上あるときだけ表示）とPC用のOキーを新設した。この結果、💴で買いだめしたボンベを空中で使い切りながら空蹴りを継続し、事実上ずっと落ちずに飛びつづける、島ぐらしと同じ「操作次第で飛べる」プレイが成立する。検証はnode --checkに加え、ヘッドレスChromiumで、購入だけではゲージが変化しないこと・在庫がある状態でつかうと即座に満タンになり在庫が1減ること・在庫0でつかっても何も起きないこと・ゲージ満タン時につかっても在庫が減らないこと・コンビニの表示が🔫と同じ「💴10（在庫/99）」形式になることをすべて実測、スクリーンショットで新価格のコンビニ表示も目視確認、pageerrorゼロだった。", },
    { tag:"fix", t:"コッコスプラット3D（/splat3d/）の🔫、敵がいない状態で撃つと何も見えなかった不具合を修正 ─ あわせて加算合成のこっこGP風・三重トレーサー光線に強化", d:"『敵が存在しない状態で🔫を打つと何も表示されず、残量だけ減るバグを直してほしい。敵がいなくてもちゃんと光線が出るようにしてほしい。あとインク光線ではなくGPと同じかっこいい光線がいいな』という2つのご指摘に対応した。①バグの原因は、ロックオンできる敵がいないときのフォールバック射線が固定の見下ろしカメラの向き（俯角約17°）そのままだったため、発射点（高さ1.3m）から地面（高さ0）に達するまで約4.4mしか進まず、プレイヤーの足もとの黄色いインクだまりに埋もれてほぼ見えなくなっていたこと。ロックオンが外れた射線は水平（カメラの上下角を無視しXZ方向だけ正規化）に飛ばすよう直し、障害物か最大45mに当たるまで長く伸びる光線になるよう修正した（ヘッドレスChromiumで着弾距離を実測し、旧実装が約4.4mだったのに対し新実装は45m先まで届くことを確認）。②見た目は、単色1枚の板ポリゴンをアルファブレンドで描くだけの「インクの光線」から、こっこGPの弾丸トレーサーと同じ三重構造（外側オーラ・中間の炎・白熱コア）＋着弾点のエネルギーグローに強化し、専用のレーザー用バッファ・専用シェーダーパス（加算合成`gl.ONE,gl.ONE`）を新設して重なるほど白く輝く本物の発光表現にした（`pushQuad`にバッファごとの上限値を渡せるよう改修し、既存のスプライト・影の描画には影響しないことも確認）。検証はnode --checkに加え、ヘッドレスChromiumで敵不在時の光線到達距離、ロックオン命中・オフターゲット・オリ非干渉・弾丸購入などの既存挙動がすべて壊れていないことを再実測し、スクリーンショットで三重構造の発光ビームと着弾グローが実際に描画されていることを目視確認、pageerrorゼロだった。", },
    { tag:"fix", t:"コッコスプラット3D（/splat3d/）の🔫を「飛んでいく弾」から こっこGP本来の「撃った瞬間に当たる光線」に変更", d:"『GPはさ、弾丸ではなくレーザーなんだけど！』というご指摘のとおりだった。直前のリリースで🔫を絵の具インク銃からこっこGP風の遠隔武器に置きかえた際、当たり判定の設計としては速度52m/sで飛翔する弾（発射から着弾まで時間差がある）として実装しており、見た目もこっこGPの発射時に一瞬で的まで光の尾を引く「弾丸トレーサー」の絵作り（加算合成の光の帯を発射点から着弾点へ即座に描く演出）とは違う挙動になっていた。これを、発射した瞬間に着弾が確定する完全な即着弾（ヒットスキャン）に変更し、命中判定と同時に発射点から着弾点まで0.15秒だけ光る発光ビーム（カメラ側を向くリボン状の板ポリゴン、`beam()`関数を新設）を描画するようにした。ロックオンできた敵にはその場で即撃破（従来どおりHP1で1発撃破）、ロックオンが外れた場合は障害物か最大45mまで簡易レイキャストして光線の着地点を決める（壁を素通りしない）。もう使われなくなった弾速・寿命などの飛翔パラメータは削除し、ペレット配列は敵のインク弾専用に単純化した。検証はnode --checkに加え、ヘッドレスChromiumで5〜35m先の敵へ発射した直後（待ち時間なし）に即座に撃破・💴獲得が反映されることを実測（旧実装は着弾まで数フレームの遅延があったのに対し、今回は同一フレーム内で解決することを確認）、光るビームの発射点・着弾点の座標が正しいこと、0.15秒後にビームが消えること、ロックオン外の一発（当たらない発射）でも光線の見た目だけは出ること、スクリーンショットで実際に発光ビームが描画されていることを目視確認、pageerrorゼロだった。", },
    { tag:"imp", t:"コッコスプラット3D（/splat3d/）の🔫を絵の具インク銃から こっこGPの遠隔ピストルに変更 ─ 弾数制限あり（最初5発・🏪コンビニで💴50ずつ最大99発まで補充）、当たれば1発で撃破。絵の具は塗らなくなった", d:"『ピストル絵の具を辞めて、レース(GP)のピストルを移植してほしい。遠隔で敵を倒したい。最初は5発まであり、追加は🔫をコンビニで99個買えるようにして』という求めに応え、これまで無制限に連射できてインクも塗る「絵の具の銃」だった🔫を、こっこGP（/gp/）の弾数制限つき遠隔ピストルに置きかえた。ブラックこっこちゃんのHPを3→1にして「当たれば必ず1発撃破」にし、弾は最初5発・タップ/クリックのたび1発だけ発射（連射不可）。着弾しても絵の具は塗らず、オリ（こっこちゃん救出）への効果も外した──救出は💣インクボムの専任にして、貴重な弾を救出に浪費させない設計にした。実装中、固定の見下ろし角カメラごしにクロスヘア26m先を狙う既存の弾道計算のままだと、重力で弾がすぐ地面に落ちてしまい5〜8m以遠の敵にほぼ当たらないことをヘッドレスChromiumでの距離別実射テストで発見──『遠隔で倒したい』という要望に反する重大な欠陥だったため、こっこGPが持つ「進路上の最寄り障害物に弾がゆるやかに吸い付く」エイムアシストと同じしくみを移植し、クロスヘア近くの敵をロックオンして直進弾を撃つ方式に設計しなおした（ロックオン外れ時のみ、旧来のクロスヘア狙い撃ちにフォールバック。敵のインク弾は従来どおり放物線）。🏪コンビニに🔫弾丸（💴50・最大99発・Gキーでも購入可）の購入UIを追加し、既存の🫧酸素ボンベ購入と並べて表示。検証はnode --checkに加え、ヘッドレスChromium上で5〜25m先の敵への実射→1発撃破・💴30獲得を距離ごとに実測（初回は5m以遠で軒並みノーヒットという実バグを検出→エイムアシスト導入で全距離ヒットに復帰）、クロスヘア範囲外の敵は撃たれないこと、オリに向けて撃っても救出されないこと、コンビニでの弾丸購入（💴消費・99発上限）まですべて実測、pageerrorゼロだった。", },
    { tag:"imp", t:"コッコスプラット3D（/splat3d/）の残り時間タイマーを、GP2と同じ丸いリング型に変更 ─ 残り時間ぶんだけ円がすこしずつ減っていく視覚エフェクトを追加", d:"『丸く視覚的に残り時間がわかるエフェクトを移植したいんだよ』というご指摘のとおり、直前のリリースでは数字の色を段階的に変える演出（25秒でオレンジ・10秒で赤い拍動）と画面ぜんたいのビネットだけを移植しており、こっこGP2がもともと持つ「丸いリングタイマーそのものが円グラフのように減っていく」という視覚的な仕組み自体は未移植だった。GP2の`<circle>`によるSVGリング（`stroke-dasharray`＝円周・`stroke-dashoffset`で残り時間の割合ぶんだけ弧を減らす手法）をそのままコッコスプラット3Dへ移植し、既存の数字表示をリングの中央に重ねる形に組みなおした。リングの弧は残り時間に比例して毎フレーム連続的に減っていき、色も数字と合わせて金→オレンジ(25秒)→赤(10秒)の3段階で変わる。検証はnode --checkに加え、ヘッドレスChromiumで内部の残り時間を直接書き換えながら`stroke-dashoffset`の値を実測し、満タン(dashoffset=0)・半分(円周の半分)・空(円周ぶんまるごと)が計算どおりになること、25秒/10秒の境界でリングと数字の色が正しく変わることを確認、スクリーンショットでもリングが実際に欠けていく見た目を目視確認、pageerrorゼロだった。なお検証中、リングの色にCSSの`transition`を付けていたためテストで色が反映されて見えない瞬間があったが、原因はテストの計測タイミングであり実装自体は正しいことを確認したうえで、GP2に合わせて`transition`を外し即座に色が切り替わる仕様にそろえた。", },
    { tag:"imp", t:"コッコスプラット3D（/splat3d/）に「こっこGP2 キズナターボ（/gp2/）」の残り時間エフェクト演出を移植 ─ 残り25秒でオレンジ、10秒で赤い鼓動、5秒できりで画面ぜんたいが赤くドクンと脈打つ", d:"『3D塗るゲームにレース２(GP2)の残り時間エフェクト演出を移植してほしい』という求めに応え、こっこGP2で確立した終盤の緊張演出をコッコスプラット3Dへ移植した。GP2は残り時間のリングタイマーの色を残り25秒でオレンジ(#ffb14d)・10秒で赤(#ff5a6e)へ段階的に変え、数字がハートビート状に拍動する`.hurry`演出に加え、残り5.2秒からは画面ぜんたいに赤い放射状ビネット(`#urgVin`)を`urgBeat`という不規則な鼓動リズムのopacityアニメーションで明滅させ、時間切れが近いことを画面全体で伝えていた。コッコスプラット3D側はもともと残り10秒での色替え＋拡大縮小パルス(`.warn`)しか無かったため、GP2と同じ2段階の色分岐(`.caution`=25秒でオレンジ／`.warn`=10秒で赤＋パルスは既存のまま)を追加し、GP2の`#urgVin`のCSS(背景のradial-gradient・`urgBeat`キーフレーム)をそのまま移植、残り5.2秒以下で`.on`をトグルする1行をメインループに追加した。ラウンド開始時・終了時に確実に`.on`を外し、次のラウンドや結果画面に赤い明滅が持ち越されないようにした。検証はnode --checkに加え、ヘッドレスChromiumで内部の残り時間を直接書き換えて実測し、①25秒でオレンジ・10秒で赤＋パルス・それ以外は既定色になる境界値が正しく切り替わること②実際のメインループが残り時間を刻みながら5.2秒をまたいだ瞬間に`#urgVin`へ`on`クラスが自然に付くこと③30秒に戻すと自然に外れることをすべて実測し、スクリーンショットで画面ぜんたいが赤く脈打つ様子も目視確認、pageerrorゼロだった。", },
