<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>畜史 ─ 畜物語</title>
<meta name="description" content="畜物語（chikumo.jp）の更新・修正の記録。新ゲームの追加、機能追加、改善、不具合修正のヒストリー。">
<meta name="theme-color" content="#0a0c14">
<meta name="format-detection" content="telephone=no">
<meta http-equiv="Content-Security-Policy" content="default-src 'self'; img-src 'self' data:; style-src 'self' 'unsafe-inline'; script-src 'self' 'unsafe-inline'; connect-src 'none'; base-uri 'self'; form-action 'none'; object-src 'none';">
<link rel="canonical" href="https://chikumo.jp/changelog/">
<meta property="og:type" content="website">
<meta property="og:url" content="https://chikumo.jp/changelog/">
<meta property="og:title" content="畜史 ─ 畜物語">
<meta property="og:description" content="畜物語の更新・修正の記録。">
<meta property="og:image" content="https://chikumo.jp/icon-192.png">
<meta property="og:site_name" content="畜物語">
<link rel="icon" href="/favicon.ico" sizes="any">
<link rel="icon" type="image/png" sizes="192x192" href="/icon-192.png">
<link rel="apple-touch-icon" href="/apple-touch-icon.png">
<link rel="manifest" href="/manifest.json">
<style>
  *{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
  :root{--ink:#f1eee2;--soft:#b7b2cf;--line:rgba(255,255,255,.12);}
  html,body{min-height:100%;}
  body{font-family:'Hiragino Kaku Gothic ProN','Yu Gothic','Helvetica Neue',Arial,sans-serif;color:var(--ink);
    background:radial-gradient(1200px 700px at 50% -8%,#1a1838 0%,#0c0b18 46%,#060509 100%) fixed;min-height:100vh;
    padding:calc(env(safe-area-inset-top) + 22px) 16px calc(env(safe-area-inset-bottom) + 44px);-webkit-font-smoothing:antialiased;}
  body::before{content:"";position:fixed;inset:0;z-index:-1;pointer-events:none;opacity:.45;
    background-image:radial-gradient(1.4px 1.4px at 18% 28%,#fff,transparent),radial-gradient(1.2px 1.2px at 72% 16%,#cfe2ff,transparent),
      radial-gradient(1.5px 1.5px at 44% 60%,#fff,transparent),radial-gradient(1.1px 1.1px at 86% 72%,#ffe9c0,transparent),
      radial-gradient(1.3px 1.3px at 10% 82%,#fff,transparent),radial-gradient(1.2px 1.2px at 62% 92%,#dfeaff,transparent);}
  .wrap{max-width:600px;margin:0 auto;}
  header{text-align:center;margin-bottom:8px;}
  .ic{width:62px;height:62px;border-radius:16px;box-shadow:0 6px 20px rgba(0,0,0,.5);}
  h1{font-size:clamp(22px,6vw,30px);font-weight:900;letter-spacing:.06em;margin-top:10px;
    background:linear-gradient(180deg,#fff7e6,#ffd98a 60%,#e6a84a);-webkit-background-clip:text;background-clip:text;color:transparent;}
  .sub{margin-top:7px;font-size:12.5px;color:var(--soft);letter-spacing:.04em;}
  .legend{display:flex;flex-wrap:wrap;gap:7px;justify-content:center;margin:16px 0 6px;}
  .tag{display:inline-block;font-size:11px;font-weight:800;letter-spacing:.04em;padding:3px 9px;border-radius:20px;white-space:nowrap;}
  .t-new{background:rgba(120,210,110,.16);color:#bdf08a;border:1px solid rgba(150,220,130,.35);}
  .t-feat{background:rgba(110,180,255,.15);color:#a8d2ff;border:1px solid rgba(130,190,255,.32);}
  .t-imp{background:rgba(255,205,120,.15);color:#ffd98a;border:1px solid rgba(255,205,120,.3);}
  .t-fix{background:rgba(255,120,120,.14);color:#ff9a9a;border:1px solid rgba(255,120,120,.3);}
  .day{margin-top:24px;position:relative;padding-left:20px;border-left:2px solid var(--line);}
  .day::before{content:"";position:absolute;left:-7px;top:4px;width:12px;height:12px;border-radius:50%;
    background:#ffd98a;box-shadow:0 0 0 4px rgba(255,217,138,.18);}
  .date{font-size:14px;font-weight:900;letter-spacing:.08em;color:#ffe6b0;margin-bottom:10px;}
  .entry{background:rgba(20,18,34,.7);border:1px solid rgba(255,255,255,.07);border-radius:13px;padding:11px 13px;margin-bottom:9px;
    -webkit-backdrop-filter:blur(4px);backdrop-filter:blur(4px);}
  .entry .ttl{display:flex;align-items:flex-start;gap:8px;font-size:14.5px;font-weight:700;line-height:1.5;color:#fff;}
  .entry .ttl .tag{flex:none;margin-top:1px;}
  .entry .desc{margin-top:6px;font-size:12.5px;line-height:1.7;color:var(--soft);}
  .entry ul{margin:6px 0 0;padding-left:1.1em;}
  .entry li{font-size:12.5px;line-height:1.7;color:var(--soft);}
  .foot{margin-top:32px;text-align:center;font-size:11px;letter-spacing:.16em;color:var(--soft);opacity:.7;}
  .foot a{color:inherit;text-decoration:none;border-bottom:1px solid rgba(255,255,255,.3);}
  .back{display:inline-block;margin-top:18px;font-size:12px;color:var(--soft);text-decoration:none;
    border:1px solid var(--line);border-radius:20px;padding:8px 18px;}
</style>
</head>
<body>
<div class="wrap">
  <header>
    <img class="ic" src="/icon-192.png" alt="コッコちゃん">
    <h1>畜史</h1>
    <div class="sub">畜物語（chikumo.jp）の あゆみ ─ 新ゲーム・新機能・改善・修正の記録</div>
    <div class="legend">
      <span class="tag t-new">🆕 新ゲーム</span>
      <span class="tag t-feat">✨ 新機能</span>
      <span class="tag t-imp">🔧 改善</span>
      <span class="tag t-fix">🐛 修正</span>
    </div>
  </header>
  <main id="log"></main>
  <div style="text-align:center;"><a class="back" href="/">← トップへもどる</a></div>
  <div class="foot">畜物語 ─ <a href="/">chikumo.jp</a></div>
</div>

<script>
"use strict";
/* 更新履歴データ（新しい順）。エントリを足すときは ここに1行 追加するだけ。
   tag: new(新ゲーム) / feat(新機能) / imp(改善) / fix(修正) */
var LOG=[
  { date:"2026.06.15", items:[
    { tag:"feat", t:"こっこの森：🌀空蹴り（空中多段ジャンプ）を追加", d:"乗り物に乗っていないとき、空中でもう一度ジャンプすると 空気を蹴って 何段でも跳べる新アクション。酸素ゲージを消費し、ゲージのぶんだけ使える。こっこは飛べないので、高く昇って酸素ぎれのまま落ちると 着地で大ダメージ（高いほど痛い・最大10ハート）。酸素を残して着地ぎわに空蹴りすれば やわらかく降りられる、リスク管理の技。" },
    { tag:"imp", t:"release-chikumo スキルを更新", d:"公開ワークフローの手順をより明確に整理（畜史更新→構文チェック→コミット→PR作成→報告の5ステップ）。" }
  ]},
  { date:"2026.06.14", items:[
    { tag:"fix", t:"正論蒔宿への手紙：上書きが効かず重複する不具合を修正", d:"手紙の保存キーが「匿名認証uid↔端末ID」「再訪で変わる匿名uid」でズレ、2通目の上書きが別レコードになって手紙が重複・消えたように見えていた問題を解消。保存キーを一度書いたら固定（ピン留め）し、既存の手紙は認証uid／端末IDの両方から探して同じ場所を上書きするように。" },
    { tag:"fix", t:"こっこの森：乗り物ボタンで🚲↔🚗を切り替えできるよう修正", d:"🚗マイカーを買うと🚲じてんしゃが選べなくなっていた不具合を修正。同じ乗り物ボタンで「徒歩→🚲→🚗→徒歩」と循環して切り替わるように。" },
    { tag:"feat", t:"こっこの森：🏋️ジム＆ひっさつわざを追加", d:"スポーン近くのジムで💴特訓すると 必殺わざを習得（最大4つ）。戦闘で敵をなぐると わざゲージが溜まり、技ボタン（PCは1〜4キー）で発動。ゲージが満ちるほど強い技がうてる。", li:[
      "🌀つむじキック（周囲なぎ払い）→🚀ロケットずつき（前方突進）→⚡かみなりラッシュ（多段ヒット）→☄️メテオこっこ（奥義・全体衝撃波）",
      "技ボタンは習得するたびに増え、レーダーにもジムを表示"
    ]},
    { tag:"feat", t:"こっこの森：🚗マイカーを追加", d:"お店で買える 新しい乗りもの。じてんしゃの4倍スピードで島を爆走！ 🚲ボタン（兼用）で乗り降り、車を持っていれば車を優先して のれる。" },
    { tag:"feat", t:"こっこの森：酸素ゲージ＆🫧酸素ボンベを追加", d:"わざゲージを「酸素ゲージ」化。満タンスタートで、技をつかうと減る。回復は“殴る”のではなく、島を歩き回るとじわじわ／🫧酸素ボンベ（お店で購入・もちもの式・Qキーで使用）で一気に満タン。資源管理の戦略性がアップ。" },
    { tag:"imp", t:"こっこの森：わざ演出を救出ゲーム級に大強化", d:"発動を派手にリニューアル。シネマティックなカットイン演出と、リッチな効果音/BGMで「超かっこいい」一撃に。", li:[
      "こっこ大ポートレートのスライドイン＋技名スラム名乗り（英語サブ名つき）・放射光スピン・マンガ風スピード線・拡大リング・カラーフラッシュ",
      "カメラのズームパンチ＋強化スローモー＋画面シェイク、地面を走る衝撃波リング・光の柱・噴射トレイル",
      "専用サウンドを刷新：ライザー→歪み爆発インパクト→サブベース→歓喜の和音→エコー＆火花、発動中はBGMをダッキング"
    ]},
    { tag:"imp", t:"こっこの森：レーダーのこっこ位置を矢印→こっこちゃんアイコンに変更", d:"白い矢印（マウスポインタ風）をやめ、こっこちゃんアイコン＋向きを示す視界コーンに。本体とマップの向きがひと目でわかるように。" }
  ]},
  { date:"2026.06.13", items:[
    { tag:"imp", t:"サイトの検索・タブのアイコンを「顔だけ」に変更", d:"Google検索やブラウザタブで全身だったコッコを、ホーム画面と同じ顔アイコンに統一。" },
    { tag:"feat", t:"「正論蒔宿への手紙」ページを公開", d:"畜物語の世界をつくる者へ、感想・アイデアを投稿できるページ（国・名前・20文字／1人1通・上書きOK・サーバー保存）。こっこの森タイトルからも飛べるボタンを追加。" },
    { tag:"feat", t:"こっこの森：諸島めぐり（船・飛行機・港・空港）", d:"🚢ふねで となりの島、✈️ひこうきで 行ったことのある島へ。⛽給油が必要。先の島ほどブラックこっこが強く、💴も増える。", li:[
      "お店の物価は島ごとに変動（強い島ほど高い）／油は片道分しか買えない",
      "島でしか買えないアイテム（✈️みどり島・🛡こがね島）"
    ]},
    { tag:"feat", t:"こっこの森：💴経済システム＆総資産ランキング", d:"札束を稼いでお店で 乗り物・家・道具を購入し、島ぐらしで実使用。朝7時に総資産を世界ランキングへ登録（サーバー保存）。" },
    { tag:"feat", t:"こっこの森：島レーダーマップ＆ブラックこっこ道端バトル", d:"左下に島の地図と位置レーダー。出会うと空気が一変するガチ系バトル（コンボ・クリティカル）。やられても救急車で復活。" },
    { tag:"fix", t:"こっこの森：ボタンが押せず始められない不具合を修正", d:"水面シェーダーの不整合で初期化が止まり、タイトルのボタンが反応しなかった問題を解消。" },
    { tag:"imp", t:"こっこの森：上部HUDの重なりを修正", d:"ボタン増加で時計と重なっていたのを、時計を小型化＆右上ボタンを2段に整理。" },
    { tag:"imp", t:"こっこGP：🔫⚡を拡大＆一撃救出に調整" }
  ]},
  { date:"2026.06.12", items:[
    { tag:"new", t:"こっこの森（島ぐらしTPS）を追加", d:"GPUシェーダーで毎回生成される絵文字の島で、のんびり島ぐらし。" },
    { tag:"new", t:"コッコスプラットを追加", d:"スプラ風のインクぬり陣取りゲーム。" },
    { tag:"new", t:"3D版コッコスプラット（TPS視点）を追加" },
    { tag:"feat", t:"こっこGP：🔫シューティング機能を追加", d:"弾丸アイテムを装填して 爆弾・障害物を撃ち破壊。弾の大型化・残弾ビッグ表示・上限なしスタック・装填数アップまで。" },
    { tag:"feat", t:"こっこGP：⚡2倍加速アイテムを追加", d:"×2→×4→×8とスタック、4枚目で速度超過して大破。" },
    { tag:"feat", t:"こっこGP：コースアウト＆追突ペナルティを追加", d:"土に出ると急減速→泥づまりエンスト。エンスト中の追突で破損悪化→2回目で大破ゲームオーバー。" },
    { tag:"imp", t:"こっこGP：体感とスピード演出を全面強化", d:"レース×シューティング融合（ロックオン・衝撃波・バレットタイム・ガングルーヴBGM）、縁石・星ワープ・風切り音・速度連動BGM、クラッシュ〜大破演出、ランキング結果のティア別演出。" },
    { tag:"imp", t:"こっこGP：出現率・バランス調整＆バージョン表示", d:"🔫増・⏰減・🌈調整・装填5発化、エイムアシスト/誘爆で撃ちやすく、vバッジ追加。" },
    { tag:"fix", t:"こっこGP：結果ボタン無反応・終了後フリーズ・抽選バグ・発熱を修正" }
  ]},
  { date:"2026.06.11", items:[
    { tag:"new", t:"こっこGP大救出（レーシング）を追加", d:"ジャイロ×シェイク修理のCPU対戦Z軸レース（難易度20段階）。後日ランキングも移植。" },
    { tag:"new", t:"こっこシェイク救出を追加", d:"加速度センサー×シェイクのZ軸救出ゲーム（救出演出も強化）。" },
    { tag:"new", t:"こっこヒーローを追加", d:"加速度センサーZ軸ダッシュの大救出フライト。" },
    { tag:"new", t:"こっこブレイカーを追加", d:"ジャイロZ軸の3Dブロック崩し救出ゲーム。" },
    { tag:"new", t:"こっこSOS大救出を追加", d:"ジャイロZ軸の追跡レーシング。" },
    { tag:"new", t:"こっこジャイロを追加", d:"ジャイロ操作のZ軸 深度トンネルゲーム。" },
    { tag:"new", t:"こっこギャラクシーを追加", d:"ビート同期のチェインポップ・シューター。" },
    { tag:"new", t:"こっこパルスを追加", d:"WebGLのZ軸3Dリズムシューター（描画・リズム感を改善）。" },
    { tag:"new", t:"こっこビート（COCCO BEAT）を追加", d:"左右タップの中毒リズムゲーム。" },
    { tag:"new", t:"こっこワープ（COCCO WARP）を追加", d:"Z軸視点（奥行き）の3Dトンネルラン。大型アップデートで演出・BGM・操作感を強化、難易度も調整。" },
    { tag:"new", t:"こっこフィーバーを追加", d:"フィーバーモード付きのワンタップ・タイミングゲーム。" },
    { tag:"imp", t:"トップメニューのレイアウト改善", d:"2列／3列グリッド化（モバイル最適化）。" },
    { tag:"imp", t:"更新の即時反映（Service Worker）", d:"HTMLをネットワーク優先にし、メニュー更新がすぐ反映されるように。" },
    { tag:"feat", t:"GitHubモバイル編集ガイドを追加" }
  ]},
  { date:"2026.06.10", items:[
    { tag:"new", t:"コッコポップ（COCCO POP）を追加", d:"同色タップで弾ける60秒の爽快パズル。" },
    { tag:"new", t:"コッコタワー（COCCO TOWER）を追加", d:"ぴったり積み上げるワンタップゲーム。" },
    { tag:"new", t:"コッコラッシュ（COCCO RUSH）を追加", d:"通勤特急ワンタップラン。" },
    { tag:"feat", t:"世界ランキング機能を安定化＆セキュリティ強化", d:"匿名認証uid＋ゲームごとのスコア上限。設定なしでも登録でき、認証＋ルールで厳格モードに昇格できる構成に。" },
    { tag:"fix", t:"ランキング登録が「接続中」で止まる不具合を修正", d:"匿名認証が無効でも端末IDにフォールバックして登録できるように。" },
    { tag:"imp", t:"こっこリンク：つなぐ操作感をなめらかに", d:"列ごとの最近傍ヒット判定・8近傍の隣接判定・補間で、引っかからない指追従に。" }
  ]},
  { date:"基盤", items:[
    { tag:"new", t:"畜物語サイトの土台・既存ゲーム群", d:"Git管理を始める前から公開していた基盤。コッコちゃんの物語と、ストーリー／ダイブ／バトル（対戦）／迎撃／合体／回避 など多数のゲーム、ランキング基盤（Firebase）を含む。ここから上が、その後の更新の記録です。" }
  ]}
];

(function(){
  var TAG={ new:['t-new','🆕 新ゲーム'], feat:['t-feat','✨ 新機能'], imp:['t-imp','🔧 改善'], fix:['t-fix','🐛 修正'] };
  function esc(s){ return String(s).replace(/[<>&]/g,function(c){return {'<':'&lt;','>':'&gt;','&':'&amp;'}[c];}); }
  var html=LOG.map(function(day){
    var entries=day.items.map(function(it){
      var tg=TAG[it.tag]||TAG.feat;
      var s='<div class="entry"><div class="ttl"><span class="tag '+tg[0]+'">'+tg[1]+'</span><span>'+esc(it.t)+'</span></div>';
      if(it.d) s+='<div class="desc">'+esc(it.d)+'</div>';
      if(it.li&&it.li.length) s+='<ul>'+it.li.map(function(x){return '<li>'+esc(x)+'</li>';}).join('')+'</ul>';
      return s+'</div>';
    }).join('');
    return '<section class="day"><div class="date">'+esc(day.date)+'</div>'+entries+'</section>';
  }).join('');
  document.getElementById('log').innerHTML=html;
})();
</script>
</body>
</html>
