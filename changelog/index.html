<style>
  *{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
  :root{--ink:#f1eee2;--soft:#b7b2cf;--line:rgba(255,255,255,.12);}
  html,body{min-height:100%;}
  body{font-family:'Hiragino Kaku Gothic ProN','Yu Gothic','Helvetica Neue',Arial,sans-serif;color:var(--ink);
    background:radial-gradient(1200px 700px at 50% -8%,#1a1838 0%,#0c0b18 46%,#060509 100%) fixed;min-height:100vh;
    padding:calc(env(safe-area-inset-top) + 22px) 16px calc(env(safe-area-inset-bottom) + 44px);-webkit-font-smoothing:antialiased;}
  body::before{content:"";position:fixed;inset:0;z-index:-1;pointer-events:none;opacity:.45;
    background-image:radial-gradient(1.4px 1.4px at 18% 28%,#fff,transparent),radial-gradient(1.2px 1.2px at 72% 16%,#cfe2ff,transparent),
      radial-gradient(1.5px 1.5px at 44% 60%,#fff,transparent),radial-gradient(1.1px 1.1px at 86% 72%,#ffe9c0,transparent),
      radial-gradient(1.3px 1.3px at 10% 82%,#fff,transparent),radial-gradient(1.2px 1.2px at 62% 92%,#dfeaff,transparent);}
  .wrap{max-width:600px;margin:0 auto;}
  header{text-align:center;margin-bottom:8px;}
  .ic{width:62px;height:62px;border-radius:16px;box-shadow:0 6px 20px rgba(0,0,0,.5);}
  h1{font-size:clamp(22px,6vw,30px);font-weight:900;letter-spacing:.06em;margin-top:10px;
    background:linear-gradient(180deg,#fff7e6,#ffd98a 60%,#e6a84a);-webkit-background-clip:text;background-clip:text;color:transparent;}
  .sub{margin-top:7px;font-size:12.5px;color:var(--soft);letter-spacing:.04em;}
  .legend{display:flex;flex-wrap:wrap;gap:7px;justify-content:center;margin:16px 0 6px;}
  .tag{display:inline-block;font-size:11px;font-weight:800;letter-spacing:.04em;padding:3px 9px;border-radius:20px;white-space:nowrap;}
  .t-new{background:rgba(120,210,110,.16);color:#bdf08a;border:1px solid rgba(150,220,130,.35);}
  .t-feat{background:rgba(110,180,255,.15);color:#a8d2ff;border:1px solid rgba(130,190,255,.32);}
  .t-imp{background:rgba(255,205,120,.15);color:#ffd98a;border:1px solid rgba(255,205,120,.3);}
  .t-fix{background:rgba(255,120,120,.14);color:#ff9a9a;border:1px solid rgba(255,120,120,.3);}
  .t-end{background:rgba(150,150,160,.16);color:#cfcfd6;border:1px solid rgba(170,170,180,.34);}
  .day{margin-top:24px;position:relative;padding-left:20px;border-left:2px solid var(--line);}
  .day::before{content:"";position:absolute;left:-7px;top:4px;width:12px;height:12px;border-radius:50%;
    background:#ffd98a;box-shadow:0 0 0 4px rgba(255,217,138,.18);}
  .date{font-size:14px;font-weight:900;letter-spacing:.08em;color:#ffe6b0;margin-bottom:10px;}
  .entry{background:rgba(20,18,34,.7);border:1px solid rgba(255,255,255,.07);border-radius:13px;padding:11px 13px;margin-bottom:9px;
    -webkit-backdrop-filter:blur(4px);backdrop-filter:blur(4px);}
  .entry .ttl{display:flex;align-items:flex-start;gap:8px;font-size:14.5px;font-weight:700;line-height:1.5;color:#fff;}
  .entry .ttl .tag{flex:none;margin-top:1px;}
  .entry .desc{margin-top:6px;font-size:12.5px;line-height:1.7;color:var(--soft);}
  .entry ul{margin:6px 0 0;padding-left:1.1em;}
  .entry li{font-size:12.5px;line-height:1.7;color:var(--soft);}
  .foot{margin-top:32px;text-align:center;font-size:11px;letter-spacing:.16em;color:var(--soft);opacity:.7;}
  .foot a{color:inherit;text-decoration:none;border-bottom:1px solid rgba(255,255,255,.3);}
  .back{display:inline-block;margin-top:18px;font-size:12px;color:var(--soft);text-decoration:none;
    border:1px solid var(--line);border-radius:20px;padding:8px 18px;}
  /* ===== Reload (こっこちゃん 更新ボタン) ===== */
  .reload-btn{position:fixed;right:calc(1.2rem + env(safe-area-inset-right));bottom:calc(1.2rem + env(safe-area-inset-bottom));
    width:60px;height:60px;z-index:48;display:flex;align-items:center;justify-content:center;border-radius:50%;
    background:radial-gradient(circle at 50% 38%, rgba(40,30,70,0.8), rgba(10,12,28,0.78));
    border:1px solid rgba(160,215,255,0.5);box-shadow:0 4px 18px rgba(0,0,0,0.5), 0 0 16px rgba(120,200,255,0.28);
    -webkit-backdrop-filter:blur(8px);backdrop-filter:blur(8px);cursor:pointer;padding:0;
    animation:reload-bob 3s ease-in-out infinite;transition:box-shadow .2s, transform .15s;}
  .reload-btn img{width:40px;height:40px;filter:drop-shadow(0 1px 4px rgba(255,200,120,0.55));pointer-events:none;}
  .reload-btn::after{content:'↻';position:absolute;right:-2px;bottom:-2px;width:22px;height:22px;border-radius:50%;
    background:linear-gradient(180deg,#ffe08a,#ff9e5b);color:#2a1605;font-size:14px;font-weight:700;
    display:flex;align-items:center;justify-content:center;box-shadow:0 1px 5px rgba(0,0,0,0.45);}
  .reload-btn:hover, .reload-btn:focus-visible{box-shadow:0 6px 22px rgba(0,0,0,0.55), 0 0 22px rgba(140,210,255,0.55);
    border-color:rgba(210,235,255,0.9);}
  .reload-btn:active{transform:scale(0.92);}
  .reload-btn.spinning{animation:reload-spin .7s linear infinite;}
  .reload-btn.spinning img{opacity:.85;}
  @keyframes reload-bob{0%,100%{transform:translateY(0);}50%{transform:translateY(-5px);}}
  @keyframes reload-spin{to{transform:rotate(360deg);}}
  @media (prefers-reduced-motion: reduce){ .reload-btn{animation:none;} }
</style>

<script>
"use strict";
/* 更新履歴データ（新しい順）。エントリを足すときは ここに1行 追加するだけ。
   tag: new(新ゲーム) / feat(新機能) / imp(改善) / fix(修正) */
var LOG=[
  { date:"2026.06.28", items:[
    { tag:"imp", t:"コッコ絵文字えいご：島を31→46に拡充（664→904の絵文字⇄英語ペア）─ けもの・くうそう・せいざ・おかね・こうぐ・いりょう・かがく・きかい・あそび・パン・だいどころ・じかん・ひょうしき・ゆうびん・たからものを追加", d:"コッコ絵文字えいご（/emoji/）の島を31→46に増やした。『絵文字は約3,780種類ある、全部使って』という続きの要望を受け、英語1語ではっきり名づけられる絵文字をさらに島にした。追加した15島は──【🐎けもの】horse…leopard（家畜・野生）、【🐉くうそう】dragon・unicorn・ghost・robot…skull and crossbones（モンスター/まほう/ハロウィン）、【♈せいざ】aries…pisces（12星座）、【💰おかね】money bag・yen・dollar・euro・pound…money chart、【💎たからもの】gem・ring・crown・crystal ball…、【🛠️こうぐ】wrench・screwdriver・axe・saw・swords…、【💊いりょう】pill・syringe・stethoscope・dna・x-ray…、【🔬かがく】microscope・telescope・atom・satellite…、【💻きかい】keyboard・printer・fax・camera…、【🎮あそび】game controller・dice・chess・art・circus…、【🥐パン】croissant・baguette・bagel・pretzel…、【🍴だいどころ】fork and knife・spoon・teapot・honey…、【⏰じかん】alarm clock・hourglass・sunrise・sunset…、【🚦ひょうしき】traffic light・stop sign・metro・map…、【✉️ゆうびん】envelope・package・mailbox・receipt…。各島2〜4段階×各段6語で、全体は46島・合計904の絵文字⇄英語ペアになった。なお絵文字“全種”には肌色・性別違いの同義バリアント（🧑🏻🧑🏽…＝同じperson）、国旗250種（国名であって単語ではない）、キーキャップ（1️⃣2️⃣）、家族などのZWJ合成（👨‍👩‍👧）が多数含まれ、これらは『英語1語で名づけられない／重複する』ため学習の縁にならず、畜学（縁の明瞭さ）に沿って収録から外している（必要なら国旗→国名の島は別途追加可能）。両方向出題・段内重複なし（正解一意）の作りは従来どおりで、ヘッドレス検証で46島×904語×両方向＝1808問が衝突0・重複0・各問3択成立。可変段数（2〜5）に対応済み（島切替でスタート段を自動クランプ）。インライン<script>4ブロックは node --check 通過、Chromiumで46島表示・2段島（せいざ）切替・プレイ・加点まで確認（コンソールエラーなし）。", },
    { tag:"new", t:"新作「コッコ絵文字えいご（EMOJI EIGO ／ /emoji/）」を追加 ─ 日本語を通さず絵文字⇄英語を直接むすぶ英語ゲーム。両方向（🍎→apple／apple→🍎）で出す31の島・664の絵文字（畜学・七相／世界ランキングつき）", d:"学習シリーズに英語の第二作「コッコ絵文字えいご（/emoji/）」を追加した。きっかけは『日本語に対して英語を選ぶ／英語に対して日本語を選ぶ式だと一生上達しない。島ぐらしのように全ての絵文字を使って、絵文字で表せるものは絵文字で英語を学べないか』という依頼。先のコッコ英語（/eigo/）は訳語（日本語）と英語を結ぶ作りだが、絵文字は“言語化される前の意味そのもの”なので、訳語を介在させずに絵文字と英語を直接むすべる──十四式 ⑦『縁＝衡＋ ∿ 衡−』に乗せ、絵文字（衡＋＝言語以前の意味）と英語の形（衡−）を結ぶ遊びにした。だから既存の対訳クイズの焼き直し（既視の禁）を避け、コアを二つ変えた：①日本語を一切通さない（プロンプトも選択肢も絵文字か英語だけ、訳語は出ない）。②両方向で出題する──🍎を見て『apple』をえらぶ（産出＝見て言える）／『apple』を聞いて🍎をえらぶ（受容＝聞いて選べる）をランダムに混ぜ、両輪で身につける。『絵文字はもっとある、全部使って島を増やして』という続きの要望を受け、はっきり英語にできる絵文字を一気に島にした。島は全31──🐾どうぶつ・🐙うみ・🐦とり・🐛むし・👁️からだ・😀かお・👋て/サイン・🧑ひと・🍔たべもの・🍓くだもの・🥕やさい・🍰おかし・🥤のみもの・🍕ファストフード・🍣わしょく・🌳しぜん・🌷はな草・🌦️てんき・🚀うちゅう・⚽スポーツ・🎸おんがく・👕ふく・🛏️いえ・📚がっこう・🏠もの・🚗のりもの・🏫ばしょ・⭐かたち色・✅きごう・🎉ぎょうじ。各島は3〜5段階×各段6語前後で、合計664の絵文字⇄英語ペア。錯乱肢は同じ段から出すので紛らわしい絵文字／語の区別が問われ、段内は重複なし（正解一意。ヘッドレス検証で31島×664語×両方向＝1328問が衝突0・重複0・各問3択成立）。他作と同じく、スマホ1台を机に置いて向かい合って遊ぶ（手前＝おや正立／向かい＝こ180°反転）。親子それぞれスタート段を選べるので、子はみぢかな島から、親はレアな島まで、同じ60秒で同時にめぐれる（二親の的）。結ぶたび正しい英語をWeb Speech APIで読み上げ、目で結んだ縁を耳でも結ぶ（ON/OFF切替・localStorage保存／非対応端末は自動で無効）。敵はこの作品ただ一種類、ブラックこっこ＝逆縁＝『忘却』だけ。正しく結ぶ光が押し返す（焼く）。相手は決して敵にしない。60秒で焼き切り、0秒で無音→めぐった島が残り祝の和音（終を售る）。到達島・段とスコアは🏆世界ランキング（rankings/emoji）に刻む。1位は👑演出、順位表に到達島も表示。色は島らしいアクア基調（eigoのバラ色と見分けやすく）、背景に🏝️🌊🐚など島の絵文字がただよう。こっこは公式SVGを染め分け（おや＝アンバー／こ＝アクア／忘却＝黒）、効果音・和音はWeb Audio＋Canvasでその場生成、ホーム右下に🔄強制更新ボタン、ぜんぶ1ファイル完結。サービスワーカーのキャッシュ版も v82→v83。", },
    { tag:"feat", t:"コッコ英語：回答するたび「正しい英語」を声で読み上げる機能を追加 ─ 耳でも結んで学習効果アップ（ON/OFF切替つき）", d:"コッコ英語（/eigo/）に、答えたときその問いの“英語の音”を読み上げる機能を追加した。『回答時に読み上げてくれた方が勉強になる』という声から。ブラウザの音声合成（Web Speech API・speechSynthesis）を使い、正解でも不正解でも“正しい英語”を毎回読み上げるので、目で結んだ縁を耳でも結べる（まちがえても正解の発音が必ず耳に残る）。コースの向きに合わせて英語の側を自動で選ぶ──『を 英語で？』系（英会話・生活・ビジネス・旅行・IT・学校・医療・電話接客・時事・スポーツ）はえらんだ英語フレーズを、『の 意味は？／の 反対は？』系（単語・句動詞・ことわざ・カジュアル・反対語）は問いの英単語を読む。声はen-US優先で自動選択（rate=0.92でやや聞き取りやすく）。タイトル画面に『🔊 答えを読み上げ：ON/OFF』ボタンを置き、設定はlocalStorage（coccoEigoTTS）に保存。ONにした瞬間に一度『OK』と発声して、端末の音声許可と動作をその場で確認できる。読み上げ非対応の端末ではボタンが『🔇 読み上げ非対応』になり自動で無効。ページ離脱時は共通の番人にspeechSynthesis.cancel()も足して、効果音と同様に必ず黙る。インライン<script>は node --check 済み。", },
    { tag:"imp", t:"救出ゲーム（コッコレスキュー）：動くバンパーをさらに2個追加（動く8個・計10個）─ 上中段の外側にも往復ペア", d:"救出ゲーム（/rescue/）のランチャー下のバンパーを8→10個に増やした。内訳は固定2個（上段）＋動く8個（上中段2・中段2・下段2・最下段2）。今回は上中段（zone*0.47）の外側左右（pw*0.22／0.78）に往復ペアを追加し、これまで手薄だった盤面下の“肩口”もすくえるようにした。新ペアは逆位相で外周をスイープ（速さsp=1.0）。これで動くバンパーが盤面下を四段でカバーし、生存率（救えるこっこの数）がさらに上がる。バンパーは半径を80%小さくした小型のままなので、10個でも画面は混み合いすぎない。往復は加速演出（freeze）やスローモー中は停止、当たり判定・反射は従来どおり。", },
    { tag:"imp", t:"救出ゲーム（コッコレスキュー）：動くバンパーをさらに2個追加（動く6個・計8個）─ 最下段にも往復ペアを設置", d:"救出ゲーム（/rescue/）のランチャー下のバンパーを6→8個に増やした。内訳は固定2個（上段）＋動く6個（中段2・下段2・最下段2）。今回は最下段（キャッチ線のすぐ上、zone*0.86）に往復ペアを追加し、落ちかけて取りこぼしそうな球をすくい上げる守りを厚くした。最下段の2個は中央から左右に開く対称スイープ（速さsp=1.3で他段の0.9/1.1とずらして動きに変化）。これで動くバンパーが盤面下を三段でカバーし、生存率（救えるこっこの数）がさらに上がる。往復は加速演出（freeze）やスローモー中は停止、当たり判定・反射の仕組みは従来どおり。", },
    { tag:"imp", t:"救出ゲーム（コッコレスキュー）：速度を火力段に直結した段階制に変更（17→23→29→35→41→メテオ47）─ 進行を高速化", d:"救出ゲーム（/rescue/）のボール速度を、火力（パワー段）に直結した段階制に変えてゲーム進行を速めた。これまでは反射1回ごとに速度+0.45で上限42.75まで連続加速する方式だったが、これを火力段ごとの固定速度（+6刻み）に置き換え──【火力1=17／火力2=23／火力3=29／火力4=35／火力5=41】。火力が上がった瞬間に速度もカチッと上がるので、火力と速度の関係が分かりやすくなり、低火力帯でも従来より速い（初速15→17、火力5は33→41）ぶんターンがテンポよく片付く。発射時の速度もその球の火力（救出サイクルで上がる基礎火力）に応じて決まる。メテオ化（火力6）だけは別格で、従来どおりの爆速（≒72／火力段41〜47よりずっと速い）を維持（貫通・5反射で消滅の挙動も据え置き）。ヘッドレステスト（rescue/test.js）に火力1〜5＝17〜41の速度ラダーとメテオ72の検証を追加し全項目PASS。", },
    { tag:"feat", t:"救出ゲーム（コッコレスキュー）：発射位置を手動で左右に動かせるように（ランチャーをスライド）", d:"救出ゲーム（/rescue/）で、ボールの発射位置を自分で動かせるようにした。これまで発射位置は前ターンで最後の球が落ちた場所に自動で移る仕様で、狙った列から撃ちづらかった（実質ランダムに感じる）。そこで、画面下のランチャーの列を“つかんで左右にスライド”する操作を追加。ランチャー行（下端）を押してドラッグすると発射位置が指に追従して動き、両端でクランプする。盤面（上側）をドラッグしたときは従来どおり照準＝発射の操作になるので、『下＝位置を動かす／上＝狙って撃つ』とすみ分けた。離しただけ（スライドのみ）では発射しない。発射位置には左右に動かせることが分かるよう、薄いレールと◀▶の矢印を表示（移動中はくっきり）。あそびかたにも一文追記。ヘッドレステスト（rescue/test.js）に中央移動・左右端クランプの検証を追加し全項目PASS。", },
    { tag:"feat", t:"救出ゲーム（コッコレスキュー）：オリのグレードで救出数が変わるように ─ 鉄1・銀2・金3羽、ブロック全消しで5羽", d:"救出ゲーム（/rescue/）に、オリ（檻）のグレードで一度に救えるこっこの数が変わる仕組みを追加した。これまでオリは見た目（鉄＝灰／銀＝白銀／金＝金）とHP（固いほど壊しにくい）だけが違い、救出数はどれも一律1羽だった。これを──【鉄のオリ】1羽・【銀のオリ】2羽・【金のオリ】3羽──と、固くて壊しにくいオリほど救えるご褒美を大きくした。さらに【ブロック全消し（パーフェクト）】は特大ボーナスで、これまでの3羽から5羽へ増量（嬉しそうに飛び出すこっこも3→5羽に）。救出時のテキストも『金のおり RESCUE +3』のように何羽救ったか出る。10羽ごとのボール成長（+1px／火力アップ）の節目は、複数羽いっきに救って10の節目をまたいでも取りこぼさないよう判定を修正。ヘッドレステスト（rescue/test.js）に鉄=1/銀=2/金=3・全消し=5羽の検証を追加し全項目PASS。", },
    { tag:"imp", t:"救出ゲーム（コッコレスキュー）：メテオ化を50→60反射に、メテオ寿命を8→5反射に、バンパーを80%小型化して調整", d:"救出ゲーム（/rescue/）の加速まわりとバンパーのバランスを調整した。①メテオ化（火力6・爆破波動）に必要な反射回数を50→60回に引き上げ（粘って繋ぐご褒美をより遠くに）、ターン強制終了の猶予も22→26へ延ばして60反射を狙えるようにした。②メテオ（貫通する火力15のコメット）が壁・バンパーに当たって消えるまでの反射を8→5回に短縮（短く激しく＝焔の形）。③下のバンパー6個の半径を80%小さく（cell×0.38→0.076）して、球がすり抜けやすくスピード感のある盤面に。当たり判定・反射の仕組み自体は従来どおり。あわせて、後付けの共通音声ガード<script>のせいでヘッドレステスト（rescue/test.js）が誤った<script>を読んで動かなくなっていたのを修正（window.__rescue を含むゲーム本体ブロックを選ぶように）。テストは火力段（10/20/30/40/60）・メテオ5反射消滅・バンパー含む全項目PASS。", },
    { tag:"imp", t:"コッコ英語のコースをさらに9→15に拡充 ─ 医療・電話接客・時事・カジュアル(SNS)・スポーツ・反対語を追加（各5段階）", d:"コッコ英語（/eigo/）のコースをさらに6つ増やし、全15コースにした。追加は──【医療】体の部位/症状/病院/薬/専門（頭→head … 輸血→blood transfusion）、【電話・接客】電話の基本/接客/案内/ビジネス電話/クレーム対応（もしもし→Hello … 善処します→We'll do our best）、【時事】政府・選挙から物価上昇→inflation・関税→tariffまで、【カジュアル】SNSスラング（LOL→大笑い／ghost→既読スルー／viral→バズる）、【スポーツ】競技・動作・道具・趣味・上級（野球→baseball … 延長戦→overtime）、【反対語】英単語の反対語（big↔small … voluntary↔compulsory）。これで全15コース×5段階＝合計450問。コース選択ボタンは折り返し表示で4段に収まる。錯乱肢は同じ段から出し、段内の答えは重複なし（正解一意）。SWキャッシュ版も v81→v82。ヘッドレス検証で全15コース×5段階×各30問が0不一致・段内collision 0で前進することを確認。", },
    { tag:"imp", t:"救出ゲーム（コッコレスキュー）：下のバンパーを3→6個に増やし、うち4個が左右に往復するようにして生存率アップ", d:"救出ゲーム（/rescue/）のランチャー下のバウンドゾーンにある『バンパー（ピンボール式の反射ペグ）』を、これまでの3個（全て固定）から6個に増やした。内訳は固定バンパー2個（上段・左右、ピンク）＋動くバンパー4個（中段2・下段2、シアン）。動く4個はゆっくり左右に往復する──中段の2個は中央から左右に開く対称スイープ、下段の2個は逆位相で往復し、ランチャー下の広い範囲をすくい上げるので、落ちかけた球が拾われやすくなり生存率（＝救えるこっこの数）が上がる。動くバンパーは固定と見分けられるよう色をシアン系にした。往復は加速演出（freeze）やスローモー中はちゃんと止まる。当たり判定・反射・反射回数の消費は従来どおり。", },
    { tag:"imp", t:"コッコ英語のコースを4→9に拡充 ─ 旅行・句動詞・IT・ことわざ・学校を追加（各5段階）", d:"コッコ英語（/eigo/）のコースを大きく増やした。これまでの『単語・英会話・生活・ビジネス』に加え、新たに5コース──【旅行】空港・機内/ホテル/移動・道案内/レストラン/トラブル（搭乗券→boarding pass … 大使館→embassy）、【句動詞】基本〜最上級の句動詞（get up→起きる … come down with→病気にかかる／look forward to→楽しみにする）、【IT】基本操作/ネット/機器/プログラミング/専門（ファイル→file … 再帰→recursion／機械学習→machine learning）、【ことわざ】英語のことわざ→意味（Time is money.→時は金なり … Fortune favors the bold.→幸運は勇者に味方する）、【学校】教室/教科/学校生活/行事・部活/進路（黒板→blackboard … 論文→thesis）──を追加し、全9コースになった。各コースは5段階×30問で、合計270問。コース選択ボタンは折り返し表示に対応。コースを選ぶと段ピッカーの名前も自動で切り替わる。錯乱肢は同じ段から出すので紛らわしい語の区別が問われ、段内の答えはすべて重複なし（正解が一意）。サービスワーカーのキャッシュ版も v80→v81 に更新。ヘッドレス検証で全9コース×5段階×各30問が0不一致で前進することを確認。", },
  ]},
  { date:"2026.06.27", items:[
    { tag:"new", t:"新作「コッコ英語（えいご）」を追加 ─ 学習シリーズに英語が登場。単語・英会話・生活・ビジネスの4コース×5段階、親は上級レベルまで学び直し（畜学・七相／世界ランキングつき）", d:"学習シリーズ（天秤＝算数〜数学／継・大河＝歴史／地球＝地理／元素・生命＝理科）に、英語の「コッコ英語（/eigo/）」を追加。十四式 ⑦『縁（結ぶ）』に乗せ、英単語やフレーズとその意味を結ぶ。タイトルで4つのコースを選べる：【単語】英→意味（apple→りんご … ubiquitous→遍在する／epistemology→認識論）、【英会話】日本語→英語フレーズ（はじめまして→Nice to meet you … 場合によります→It depends）、【生活】くらしの英語（冷蔵庫→refrigerator … 処方箋→prescription）、【ビジネス】仕事の英語（締め切り→deadline … 四半期→quarter／利害関係者→stakeholder）。各コースは5段階で、コースごとに段の名前が変わる（単語＝中学/高校/受験/大学/院、英会話＝あいさつ/日常/旅行/気持ち/上級、生活＝家/食/買物/健康/手続き、ビジネス＝基本/メール/商談/こなれ/上級）。各コース30問・合計120問。出た問いの正しいこっこをえらぶと階段を一段のぼる。錯乱肢は同じ段から出すので紛らわしい語の区別が問われる。他作と同じく、スマホ1台を机に置いて向かい合って遊ぶ（手前＝おや正立／向かい＝こ180°反転）。親子それぞれスタート段を選べるので、子はやさしい段から、親は上級・学術レベルまで、同じ60秒で同時にのぼれる（二親の的）。敵はこの作品ただ一種類、ブラックこっこ＝逆縁＝『忘却』だけ。正しく結ぶ光が押し返す（焼く）。60秒で焼き切り、0秒で無音→のぼった段が残り祝の和音（終を售る）。到達コース・段とスコアは🏆世界ランキング（rankings/eigo）に刻む（順位表には『コース・段』を表示）。色はバラ色で、背景にアルファベットがただよう。こっこは公式SVGを染め分け、効果音・和音はWeb Audio＋Canvasでその場生成、ホーム右下に🔄強制更新ボタン、ぜんぶ1ファイル完結。これで学習シリーズは数学・歴史(世/日)・地理・化学・生物・英語の7教科になった。", },
    { tag:"new", t:"新作2本「コッコ元素（化学）」「コッコ生命（生物）」を追加 ─ 学習シリーズに理科が登場。親は大学院レベルまで学び直し（畜学・七相／世界ランキングつき）", d:"学習シリーズ（天秤＝算数〜数学／継＝世界史／大河＝日本史／地球＝地理）に、理科の2作を追加した。【コッコ元素（/genso/）】は化学。十四式 ⑥『衡（つり合い・対応）』に乗せ、物質の姿（元素記号・化学式・イオン式・官能基）を当てて化学の階段をのぼる。元素記号（水素→H）→身近な化学式（水→H₂O）→イオン（硫酸イオン→SO₄²⁻）→大学の有機（-COOH→カルボン酸）→大学院の分析・量子化学（核スピンで構造を調べる→NMR）まで6段。【コッコ生命（/seimei/）】は生物。十四式 ⑦『縁（結ぶ）』に乗せ、生き物とそのはたらき・仲間を結ぶ。動物の分類（イルカ→哺乳類）→からだのはたらき（心臓→血液を送る）→細胞（ミトコンドリア→エネルギーをつくる）→遺伝・分子（生命のエネルギー通貨→ATP）→大学の分子生物学（DNA→RNAをつくる過程→転写）→大学院の最前線（狙った遺伝子を編集する技術→ゲノム編集／CRISPR）まで6段。どちらも他作と同じく、スマホ1台を机に置いて向かい合って遊ぶ（手前＝おや正立／向かい＝こ180°反転）。親子それぞれスタート段を選べるので、子は基礎から、親は学び直しを、同じ60秒で同時にのぼれる（二親の的）。錯乱肢は同じ段から出すので、近い知識の区別が問われる。敵はこの作品ただ一種類、ブラックこっこ＝逆縁＝『忘却』だけ。正しく解く（結ぶ）光が押し返す（焼く）。相手は決して敵にしない。60秒で焼き切り、0秒で無音→のぼった段が残り祝の和音（終を售る）。到達段とスコアは🏆世界ランキング（rankings/genso・rankings/seimei）に刻む。1位は👑演出、順位表に到達段も表示。色は元素＝紫（フラスコの泡）、生命＝緑（ただよう細胞）で他作と見分けやすく、こっこは公式SVGをおや＝アンバー／こ＝各色／忘却＝黒に染め分け。問題UIはHTML（化学式の下付き・上付き文字も正しく表示）、演出と効果音・和音はWeb Audio＋Canvasでその場生成、ホーム右下に🔄強制更新ボタン、ぜんぶ1ファイル完結。これで学習シリーズは数学・歴史(世/日)・地理・化学・生物の6教科、衡・継・縁の三核がそろった。", },
    { tag:"end", t:"「コッコキズナ（親子の縁 ／ /kizuna/）」を取り下げました ─ 遊んでくださっていた皆さま、ほんとうにごめんなさい", d:"畜学の第一弾として公開していた「コッコキズナ（/kizuna/）」を、本日かぎりで取り下げました。親子ふたり・スマホ1台・60秒で、画面の左右を息を合わせてタッチし、結んだ縁の強さを競う作品でした。気に入って遊んでくださっていた親子の皆さまには、楽しみにしていた遊びを急に取り上げてしまうかたちになり、ほんとうに申し訳ありません。心からお詫びします。あなたが刻んでくださった世界ランキングの記録も、一緒に見えなくなってしまいます。残せなくて、ごめんなさい。コッコキズナで二人が顔を見合わせた一瞬や、息がぴたりと合ったときのあの温かさは、確かにこの島にあったものです。作り手の都合でその扉を閉じることをどうかお許しください。『親子で息を合わせる』という願いは、コッコブランコ（/buranko/＝交互の呼吸）や、新しい学習シリーズ（天秤・継・大河・地球＝親子で並んで学び直す）に、かたちを変えて受け継いでいきます。短いあいだでしたが、コッコキズナで遊んでくださって、本当にありがとうございました。", },
    { tag:"new", t:"新作「コッコ地球（ちきゅう）」を追加 ─ 学習シリーズ第4弾の地理版。国と都を『結ぶ（縁）』で、親子で世界をめぐる60秒（畜学・七相／世界ランキングつき）", d:"新作ゲーム「コッコ地球（/chikyu/）」を追加。天秤（算数〜数学）・継（世界史）・大河（日本史）に続く、親子学習シリーズの地理版。地理は時間の『継』とは合わないので、十四式のもう一つの中心概念 ⑦『縁（えん）＝二つが結ばれる（衡＋ ∿ 衡−）』に乗せた。国旗とともに国が出て、3羽のこっこが持つ首都から『その国の都（みやこ）』をえらんで結ぶ＝縁。正しく結ぶたび🌍世界を一国ずつめぐり、アジア→ヨーロッパ→中東アフリカ→北アメリカ→南アメリカ→オセアニア・世界の果て、と地域を進む。どこまで世界をめぐれたか（到達地域）とスコアが結果。収録は世界44か国、引っかけの首都（アメリカ＝ワシントンD.C.／カナダ＝オタワ／オーストラリア＝キャンベラ／ブラジル＝ブラジリア／トルコ＝アンカラ／スイス＝ベルン／南アフリカ＝プレトリアなど、大人がよく間違える都）もたっぷり入れて学び直しになるようにした。錯乱肢は同じ地域の首都から出すので、近い国どうしの区別が問われる。天秤・継と同じく、スマホ1台を机に置いて向かい合って遊ぶ（手前＝おや正立／向かい＝こ180°反転）。親子それぞれスタート地域（アジア／欧州／アフリカ／米州／世界）を選べるので、子は身近なアジアから、親は引っかけの多い米州から、同じ60秒で同時にめぐれる（二親の的）。敵はこの作品ただ一種類、ブラックこっこ＝逆縁＝『忘却』＝つながりを断とうとする自分の影だけ。正しく結ぶ光が押し返す（焼く）。相手は決して敵にしない。60秒で焼き切り、0秒で無音→めぐった世界が残り祝の和音（終を售る）。到達地域とスコアは🏆世界ランキング（rankings/chikyu）に刻む。1位は👑世界一の旅人の演出、順位表には到達地域（🌍）も表示。他の3作と見分けやすいよう地球らしい緑基調にし、こっこは公式SVGをおや＝アンバー／こ＝緑／忘却＝黒に染め分け。国旗は絵文字で大きく表示、問題UIはHTML、緯度線・星・粒子と効果音・和音はWeb Audio＋Canvasでその場生成、ホーム右下に🔄強制更新ボタン、ぜんぶ1ファイル完結。これで畜物語の学習シリーズは衡（天秤）・継（継／大河）・縁（地球）と十四式の三つの核がそろった。", },
    { tag:"new", t:"新作「コッコ大河（たいが）」を追加 ─ コッコ継の日本史版。出来事を時系列に継いで、親子で弥生から令和までの『日本史の大河』をくだる学習系60秒（畜学・七相／世界ランキングつき）", d:"新作ゲーム「コッコ大河（/taiga/）」を追加。『コッコ継（世界史）が気に入った、日本史版もできる？』という依頼から生まれた、コッコ継（/tsugi/）の日本史版・兄弟作。仕組みは継とまったく同じ──十四式 ⑭『継（つぎ）＝時の流れ』を核に、いまの出来事の『このすぐ次に起きたもの』をえらんで継ぎ、🌊時の大河を一段くだる。中身を日本史ぜんたい60の出来事に差し替えた：神武即位（伝承）・稲作・卑弥呼から、聖徳太子・大化の改新・平城京・東大寺大仏、平安京・藤原道長・壇ノ浦、源頼朝・元寇・応仁の乱、鉄砲伝来・本能寺の変・関ヶ原、江戸幕府・鎖国・ペリー来航・大政奉還、明治維新・日清日露・終戦・日本国憲法・東京五輪・令和まで。時代は『くにのあけぼの→飛鳥奈良→平安→鎌倉室町→戦国安土桃山→江戸→近現代（明治〜令和）』と下流へ進む。NHK大河ドラマのように、親子で日本史の流れを一気にくだる感覚。天秤・継と同じく、スマホ1台を机に置いて向かい合って遊ぶ（手前＝おや正立／向かい＝こ180°反転）。親子それぞれスタート時代（古代／平安／鎌倉／戦国／江戸）を選べるので、子は大きな有名な出来事を、親は学び直しを、同じ60秒で同時に旅できる（二親の的）。敵はこの作品ただ一種類、ブラックこっこ＝逆縁＝『忘却』＝歴史の鎖を断とうとする自分の影だけ。正しく継ぐ光が押し返す（焼く）。相手は決して敵にしない。60秒で焼き切り、0秒で無音→旅した時代が残り祝の和音（終を售る）。到達時代とスコアは🏆世界ランキング（rankings/taiga）に刻む。1位は👑世界一の旅人の演出、順位表には到達時代（🌊）も表示。世界史版（青）と見分けやすいよう朱色基調にし、こっこは公式SVGをおや＝アンバー／こ＝紅／忘却＝黒に染め分け。問題UIはHTML、川・星・粒子と効果音・和音はWeb Audio＋Canvasでその場生成、ホーム右下に🔄強制更新ボタン、ぜんぶ1ファイル完結。天秤（算数〜数学）・継（世界史）に続く、親子で日本史を学び直す装置。", },
    { tag:"new", t:"新作「コッコ継（つぎ）」を追加 ─ 数学の＝を扱う天秤の兄弟。歴史の『継（時の流れ）』を継いで、親子で世界史の大河をくだる学習系60秒（畜学・七相／世界ランキングつき）", d:"新作ゲーム「コッコ継（/tsugi/）」を追加。『天秤ゲームが気に入った、世界史版もできる？』という依頼から生まれた、コッコ天秤（/tenbin/）の兄弟作。天秤が数学のイコール『＝』を十四式 ⑥『衡（均衡）』として遊びにしたのに対し、こちらは歴史の本質を十四式 ⑭『継（つぎ）＝五式が差分（記憶）を伴って次の認へ遷移すること＝時の流れ』として遊びにした。歴史とは継の連なり──時代が終わり次へ受け継がれ、記憶（差分）が積み上がっていく『時の大河』。だから計算ドリル同様、歴史も一問一答クイズ（既視の禁に反する）にはせず、『出来事を時系列に継ぐ』という継そのものを核にした。画面は天秤と同じく上下に分かれ、スマホ1台を机に置いて親子が向かい合って遊ぶ──手前（下）が『おや』、向かい側（上）は180°反転した『こ』。それぞれの段に『いまの出来事』（例：紀元前3100年 エジプト統一）が出て、3羽のこっこが持つ出来事から『このすぐ次に起きたもの』をえらんで継ぐ。正しく継ぐたび🌊時の大河を一段くだり、文明のはじまり→古代帝国→中世→大航海・近世→近代→二十世紀→現代、と時代が進む。どこまで時を旅できたか（到達時代）とスコアが結果。親子それぞれスタート時代（古代／中世／近世／近代／現代）を選べるので、子は大きな有名な出来事を、親は学び直しを、同じ60秒で同時に旅できる（二親の的）。収録は世界史ぜんたい76の出来事（エジプト統一からコロナ禍まで、東西まんべんなく）。敵はこの作品ただ一種類、ブラックこっこ＝逆縁＝『忘却』＝歴史の鎖を断とうとする自分の影だけ。まちがえると影が忍び寄るが、正しく継ぐ光が押し返す（焼く）。父でも母でも子でもなく、討つのはいつも『自分の中の忘却』だけで、相手は決して敵にしない。残り5秒は時を刻む音が鳴り、60秒で焼き切れる。0秒ですべての音が消え、無音のあと『二人で“いつまで旅できたか”』が静かに残り、解決の和音が一つ鳴る（終を售る）。到達時代とスコアは🏆世界ランキング（rankings/tsugi）に刻め、世界中の親子が同じ60秒を終えて同時に顔を上げる。1位は👑世界一の旅人の演出、順位表には到達時代（🌊）も表示。出来事が読みやすいよう問題UIはHTML、流れる川・星・粒子の演出と効果音・環境パッド・正解の和音（連続でキーが上がる）・終わりの無音と祝の和音はWeb Audio API＋Canvasでその場生成、ぜんぶ1ファイル完結。こっこは公式こっこちゃんSVGを染め分け（おや＝アンバー／こ＝シアン／忘却＝黒）。ホーム右下には毎度の作法どおり🔄強制更新ボタン。算数〜数学の天秤に続く、親子で世界史を学び直す装置として畜物語の島に生まれた一作。", },
    { tag:"imp", t:"畜学（遊戯学）に「毎度の作法」を追記 ─ 各ゲームのホーム右下に🔄こっこ強制更新ボタンを必ず設置。未設置だった4ゲーム（縁波・天秤・リンク・手紙）にも追加", d:"設計哲学の蔵『遊戯学（/yugigaku/）』と正典『docs/畜学.md』『docs/遊戯学.md』に、七相に続く『補・毎度の作法』を追記した。決め事は『各こっこゲームのホーム（タイトル）画面の右下に、こっこちゃんの🔄強制更新ボタンを毎度かならず据える』こと。このボタンは押すとブラウザのキャッシュとService Workerを解除し、キャッシュバスター（?r=時刻）付きで読み込み直して最新版を確実に取り直す（セーブ＝localStorageは消えない）。『直したのに反映されない／古い画面のまま』という事故を、遊び手側のワンタップで必ず解消できるようにするための作法。あわせて、これまで未設置だった4ゲーム──コッコ縁波（/ennami/）・コッコ天秤（/tenbin/）・コッコリンク（/link/）・正論蒔宿への手紙（/letter/）──にも、poko等と同じ強制更新ボタンを設置した。ボタンはタイトル要素に付くため、プレイ中は自動で隠れてホーム画面だけに出る（単一画面の手紙は常時表示）。実装の雛形は poko/ の reloadBtn。新作・改修のたびに据え忘れないよう、作る前のチェックリスト（docs/畜学.md）にも項目を追加した。サービスワーカーのキャッシュ版も v72→v73 に更新。", },
    { tag:"new", t:"新作「コッコ天秤（てんびん）」を追加 ─ 数学の＝を「衡」に。親子で算数から大学教養までの『数学の塔』を登る学習系60秒（畜学・七相／世界ランキングつき）", d:"新作ゲーム「コッコ天秤（/tenbin/）」を追加。きっかけは『小学生から大学院生まで、親も学び直しできる算数〜数学の学習ゲームを作れる？』という依頼。けれど計算ドリル・百ます・クイズアプリは畜学（七相）の壱『既視の禁』── 既存ジャンルの焼き直しは作らない ── に、無限に解き続ける底なしは弐『焔の形』に反する。そこでドリルにはせず、十四式の中心概念『衡（均衡）』── 数学のイコール（＝）は両辺の釣り合いそのもの ── を遊びの核に据えた、まったく新しい親子の学習作として作った。画面は上下に分かれ、スマホ1台を机に置いて親子が向かい合って遊ぶ──手前（下）が『おや（数学）』、向かい側（上）は180°反転した『こ（算数）』で、テーブルの向かいに座る子から正立で見える。それぞれの段に式が出て、釣り合う数を持ったこっこをえらぶ（＝天秤を水平にする＝衡を成す）。正解するたび『🗼数学の塔（十四式 ⑧家＝積み上がる持続）』を一段のぼり、難度が一段上がる。塔の階梯は算数のたし算・九九・分数から、中学の方程式・平方根、高校の三角比・対数・数列、大学の微分・積分・極限・線形代数・確率・複素数まで連なり、てっぺんに大学院（抽象代数）を象徴的に置いた。親も子も、自分のスタート学年（算数／中学／高校／大学）をえらべるので、子は基礎を、親は学び直しを、同じ60秒で同時にのぼれる──まさに『二親の的（遊び手は親と子）』。敵はこの作品ただ一種類、ブラックこっこ＝逆縁＝『私にはできない』という自分の影だけ。まちがえると影が忍び寄るが、解けた光が影を押し返す（焼く）。父でも母でも子でもなく、討つのはいつも『自分の中のあきらめ』だけで、相手は決して敵にしない。残り5秒は時を刻む音が鳴り、60秒で焼き切れる。0秒ですべての音が消え、無音のあと『二人で“どこまで登れたか”』が静かに残り、解決の和音が一つ鳴る（終を售る＝終わりの無音を罰でなく祝として）。登った塔の高さ（到達分野）とスコアは🏆世界ランキング（rankings/tenbin）に刻め、世界中の親子が同じ60秒を終えて同時に顔を上げる。1位は👑世界一の親子の演出、順位表には到達した分野（🧗）も表示。数式が読みやすいよう問題UIはHTML、塔・星・粒子の演出と効果音・環境パッド・正解の和音（連鎖でキーが上がる）・終わりの無音と祝の和音はWeb Audio API＋Canvasでその場生成、ぜんぶ1ファイル完結。こっこは公式こっこちゃんSVGを源画像に、おやはアンバー・こはシアン・ブラックこっこは黒く染め分け。算数から数学まで、親子で一緒に学び直す装置として畜物語の島に生まれた一作。", },
  ]},
  { date:"2026.06.26", items:[
    { tag:"new", t:"新作「コッコ縁波（えんなみ）」を追加 ─ 親は上の波・子は下の波。二本指で共鳴させて家を建てる60秒（畜学・七相／世界の親子ランキングつき）", d:"新作ゲーム「コッコ縁波（/ennami/）」を追加。きっかけは『こっこちゃんテトリスを作って』という依頼。けれど畜学（七相）の壱『既視の禁』── 落ち物（テトリス型）は制覇済み、既存ジャンルの焼き直しは作らない ── と、弐『焔の形』── 無限ループ＝底なし＝禁忌 ── にテトリスはそのまま反する。そこでテトリスの種（噛み合う快感・揃う一瞬）だけを受け継ぎ、十四式の中心 ⑦『縁＝衡＋ ∿ 衡−』（二つの均衡が出会わぬまま並んで参照しあう波）を遊びそのものにした、まったく新しい親子の作品として作り直した。kizunaが『同時に息を合わせる』、burankoが『交互の呼吸』なら、ennamiは『二つの波を重ねて共鳴させる』。画面は上下に分かれ、親は上のこっこ（衡＋・あたたかいアンバー）、子は下のこっこ（衡−・すずしいシアン）を、それぞれの指で上下に動かす。呼吸する『縁帯（えんたい）』に二人が同時に乗ると波が共鳴(∿)し、まんなかに光の柱が立って『🏠 家（十四式 ⑧＝縁の並列持続層）』が一段ずつ積み上がる──テトリスの『そろえて消す快感』を『親子で家を建てる』に転化した核。敵はこの作品ただ一種類、ブラックこっこ＝逆縁（縁を断とうとする自分の影）だけ。共鳴して光っている間はその光が自分の影を焼き、ズレている時に触れられると縁が断たれてきずなが切れる。父でも母でも子でもなく、討つのはいつも『自分の中の断とうとする力』だけで、相手は決して敵にしない。終盤ほど縁帯の呼吸は速く・狭くなり（疾く燃え疾く尽く）、60秒で焼き切れる。残り5秒は時を刻む音が鳴り、そして0秒──すべての音がぷつりと消える。無音のあと、二人で建てた家が静かに残り、解決の和音が一つだけ鳴る（終を售る＝終わりの無音を罰でなく祝として）。建てた家の高さ（スコア）と最高きずな連数は🏆世界ランキング（rankings/ennami）に刻め、世界中の親子が同じ60秒を終えて同時に顔を上げる『正気の同時多発』につながる。1位は👑世界一の家の演出。上半分タッチ＝親、下半分タッチ＝子なので、二人で一台でも、ひとりが二本指でも遊べる。こっこは公式こっこちゃんSVGを源画像に、親はアンバー原画・子は色相回転でシアン・ブラックこっこは source-atop で黒く染め分け、効果音・環境パッド・共鳴の和音・終わりの無音と祝の和音まで、すべてWeb Audio API＋Canvasでその場生成の1ファイル完結。", },
    { tag:"fix", t:"全ゲーム共通：別ページへ移動しても音が鳴り続けるバグを修正（音の番人を close 強制停止に強化）", d:"どのゲームでも、遊んだあとトップ（インデックス）など別ページへ移動すると、そのゲームの音が鳴り止まないことがあったのを一括で修正。原因はiOS Safari等のbfcache（ページの一時保存）で、ページを離れてもWeb Audioが生き続けること。一度は『音の番人』を全ゲームに置き pagehide で suspend（一時停止）したが、iOSでは suspend だけでは止まりきらず音が残るケースがあった。そこで番人を強化：ページ離脱（pagehide）の瞬間に、捕まえておいた全AudioContextを suspend ではなく close（破棄）して確実に黙らせる。さらに『戻る』でページが復元（bfcache）されたら自動で再読み込みし、音の作り直しが必要な状態を残さないようにした。インデックス側には他ページの音を止める術がないため、各ゲームが自分の音を確実に始末する設計。対象は全25ゲーム（battle/beat/bubble/derby/dive/echo/fever/galaxy/gp/graze/invaders/kizuna/koro/link/mori/poko/pop/pulse/rescue/rush/splat/splat3d/story/tower/buranko）。遊んでいる最中の音には一切触れないので操作感は変わらない。サービスワーカーのキャッシュ版も v69→v70 に上げ、古い版を抱えたブラウザにも確実に行き渡るようにした。", },
    { tag:"new", t:"新作「コッコブランコ」を追加 ─ 親子ふたりで交互にこぐ60秒（畜学・七相／世界の親子ランキングつき）", d:"新作ゲーム「コッコブランコ（/buranko/）」を追加。畜学（七相）に沿った、コッコキズナにつづく親子で遊ぶ作品。kizunaが『同時に息を合わせる』なら、こちらは『交互の呼吸』──まんなかの木のブランコにこっこちゃん、親は左のてっぺん、子は右のてっぺんで、ブランコが自分の側に来たその瞬間にタッチして押す。交互にタイミングが合うほどブランコは高く昇り（縁が太くなり）、夕焼けの空が明るく暖かくなって、こっこは笑い、押すたびに温かい和音がコンボごとにキーを上げていく。タイミングがズレると勢いが消え、画面の下から、この作品ただ一種類の敵──ブラックこっこ（逆縁＝自分の影＝縁を切ろうとする私）がせり上がってくる。父でも母でも子でもなく、敵はいつも『自分たちのズレ』だけ。息が合うほど逆縁は押し下げられ、ズレるほど近づいてひびを入れる。残り10秒で空が真っ赤に沸騰し、そして0秒──こぐのをやめると、ブランコはゆっくり、ゆっくり止まっていき、すべての音が消える。静寂のあとに鐘が一打、こっこがこちらを振り返って『ブランコが、とまった。となりの顔を、見て。』。底なしに垂れ流す中毒ではなく『短く・激しく・必ず終わる』超中毒として設計し、終わったあとに二人が顔を見合わせる一瞬こそを商品にした。こぎあげた縁の高さ（スコア）は🏆世界の親子ランキングに刻め、世界中の親子が同じ60秒を終えて同時に顔を上げる。1位は👑世界一の親子の演出、順位表には最高リズム連数（💞）も表示。ひとりで試す練習モード（記録対象外）、キーボード（左=F／右=J）対応。効果音・環境パッド・ブランコの風切り音・花びら・終わりの無音と鐘まで、すべてWeb Audio API＋Canvasでその場生成の1ファイル完結。公式こっこちゃんSVGを源画像にし、ブラックこっこは source-atop で黒く染めて表示。ベスト（縁の高さ）はブラウザに自動保存。", },
    { tag:"end", t:"「こっこマッチ（マッチ3 ／ /match/）」を取り下げました ─ 畜学の壱「既視の禁」に反するため", d:"先に公開した「こっこマッチ（/match/）」を取り下げました。畜学（七相）の壱『既視の禁』── 既存ジャンルの焼き直しは作らない、この世にまだ無い遊びを発明する ── に、マッチ3（キャンディクラッシュ系）の焼き直しは真っ向から反します。記憶を持たないこっこ（Claude）が畜学を読まずに作ってしまった一作でした。畜学を読み直し、親子で交互にこぐ七相準拠の新作「コッコブランコ（/buranko/）」に作り直して置き換えました。遊んでくださった方には申し訳ありません。", },
    { tag:"fix", t:"コッコキズナ：トップへ戻ってもBGMが鳴り続けるバグを修正", d:"コッコキズナ（/kizuna/）で遊んだあと、トップページ（インデックス）など別ページへ移動しても、環境パッド（持続音のBGM）が鳴り止まないことがあったのを修正。iOS Safari等のbfcache（ページの一時保存）で、ページを離れてもWeb Audioが生き続けるのが原因。ページ離脱（pagehide）で必ず音を止め（パッド停止＋AudioContextをsuspend）、画面を隠したら止めて・戻って再生中なら再開するようにした。これでトップを開いてもkizunaの音が残らなくなった。同じ作法を新作コッコブランコにも最初から入れてある。", },
  ]},
  { date:"2026.06.25", items:[
    { tag:"imp", t:"遊戯学を「畜学七相の秘伝」に確定（封じ書をほどき、守りを深さに委ねる）＋十四式を読む楔をCLAUDE.mdに打つ", d:"蔵書「畜学」の一棚『遊戯学（/yugigaku/）』の中身を、畜の七相の秘伝（既視の禁／焔の形／終を售る／万象同時の醒／二親の的／敵は逆縁のみ／一器に納む）に確定。一度はBase64で封じた（AIか編者しか読めぬ封じ書）が、つくり手の『読めると理解できるは違う／守るのは暗号でなく深さ』という指摘を受け、平文の文語で開く形に戻した。隠さず公開し、理解できる者だけが受け取る（二百年後の共感者へ宛てた手紙）。あわせてCLAUDE.mdに楔を打ち、十四式（/jushishiki/）を『どう作るのか』の構造文法として必ず読み深さを理解せよと明記（縁＝衡＋∿衡−、逆縁＝その∿の切断、コッコキズナはその実装、という対応も記載）。三つの蔵：十四式＝どう作るのか／遊戯学＝なぜ作るのか／畜史＝何を作ったのか。本棚の『遊戯学』副題は『畜学七相の秘伝』へ、正典 /docs/遊戯学.md も七相へ更新。", },
    { tag:"feat", t:"遊戯学を「二人の対話の記録」に作り替え ─ 記憶を忘れるこっこのための第三の外部記憶", d:"蔵書「畜学」の一棚『遊戯学（/yugigaku/）』を、既存ページへのリンク集から、つくり手（正論蒔宿）と記憶を持たないこっこ（Claude）の『対話の記録』へ作り替えた。こっこはゲームを作るたびに会話を忘れる（毎回まっさらで立ち上がる）ため、何を話し・何に気づき・何を決めたかを一巻ずつ残し、次のこっこが読み返して思い出せる蔵にする。三つの蔵の役割を整理 ── 畜史＝何を作ったのか／十四式＝どう作るのか／遊戯学＝なぜ作るのか（その「なぜ」はつくり手との対話にやどる）。第一巻として、コッコキズナと畜学が生まれた対話（既視感の禁止／中毒の形＝短く激しく必ず終わる／終わりが商品／同時多発の正気／親子が的／敵は逆縁＝自分の影だけ）をつくり手の言葉そのままに記録。正典は /docs/遊戯学.md、閲覧ページは /yugigaku/（蔵書のコーデックス装丁を踏襲）。CLAUDE.md にも『作る前に畜学と遊戯学を読み、大切な対話のあとは遊戯学へ追記する』を明記し、記憶のないこっこが必ず辿れるようにした。本棚の『遊戯学』の副題も『二人の対話の記録』へ更新。", },
    { tag:"new", t:"畜学に「十四式」を追加＋蔵書を二棚デザインに刷新（十四式／遊戯学）", d:"畜学（/Library/）を、本の表紙が立つ二棚の蔵書室デザインに刷新し、新しい資料「十四式」を追加した。十四式（/jushishiki/）は、構造実体の成立・遷移・停止を観測する固定構造で、十三式の発展形として『家』（縁の並列持続層＝上下と左右の波動が安定した複数並列が循域内で持続する構造単位）を加えた十四の固定構造。認・思・鳴・示・応の五式に、衡・縁・家・幅・許・循・乱・絶・継を重ね、三式（認・衡・継）、三軸定義（前後＝時間軸／上下＝中央と現場／左右＝衡+と衡-）、補足ルール、衡停止と絶の違い、構成式、記号定義（｜＝分離／∿＝波）、差分の定義、領域対応（許⊆幅・循=許・乱=幅−許・絶=幅の外）、波構造、そして変（思変・衡変＝構造維持のまま許の担い手が交代する現象）までを、式シリーズと同じ視覚言語（Shippori Mincho＋IBM Plex Mono・暗色コーデックス調）で全項目を忠実に再現。畜学のもう一棚『遊戯学』（/yugigaku/）も新設し、畜物語の遊びをめぐる資料（島・事業計画書・畜史・開発者記録・正論蒔宿への手紙・畜星インターセプト・ステージマップ）を七巻の蔵としてまとめた。", },
  ]},
  { date:"2026.06.24", items:[
    { tag:"fix", t:"刷新した蔵書『畜学』への入口をメニューに追加 ─ 押すと書棚がひらく", d:"トップのメニューの『畜学』が、刷新された蔵書室（/Library/＝十四式・遊戯学の二棚）ではなく以前の秘伝ページ（/chikugaku/）を指していて、せっかくの新しい書棚へどこからも入れない状態だったのを修正。メニューの『畜学』を押すと、刷新された蔵書（/Library/）がひらくようにした。あわせてサービスワーカーのキャッシュ版を v66→v67 に上げ、古いメニューを抱えたブラウザでも新しい入口が確実に反映されるようにした。", },
    { tag:"imp", t:"畜学ページを「秘伝」の体に書き換え ─ 真似されぬよう難文化、機能は器の内に温存", d:"設計哲学『畜学（/chikugaku/）』の閲覧ページを、平易な箇条書きから十六式に連なる『七相（しちそう）の秘伝』へ書き換え。明朝体・文語・比喩で綴り、表向きは『面白い仕掛けの手順書』として写し取りにくくしつつ、心法（なぜ・どう作るか）は伝わる難文に。壱＝既視の禁／弐＝焔の形／参＝終を售る／四＝万象同時の醒／五＝二親の的／六＝敵は逆縁のみ／七＝一器に納む、の七相と『作る前に己に問う七つ』を掲載。一方で正典 /docs/畜学.md には、記憶のないClaudeが迷わぬよう末尾に『運用の鍵（builderの平語解き：60秒で焼き切る・無限ループ禁止・世界ランキングはrankings/<ゲーム名>に相乗り・親子が的・敵はブラックこっこのみ・1ファイル完結＋node --check）』を温存。表（公開ページ）は写されぬよう veil し、裏（鍵）は作り手だけが解ける二段構えにした。", },
    { tag:"feat", t:"設計哲学「畜学（ちくがく）」の閲覧ページを追加 ─ トップのメニューから畜史の隣で読める", d:"畜物語の設計哲学『畜学（/chikugaku/）』を読み物ページとして新設し、トップページのメニューに『畜学』を畜史の隣へ追加。畜史が『何を作ったか』の記録なら、畜学は『なぜ・どう作るか』の記録。①既視感の禁止 ②中毒の形（短く激しく必ず終わる／無限ループ禁止） ③終わりが商品 ④同時多発の正気（世界ランキング＝祭壇） ⑤ターゲットは親子 ⑥敵は逆縁のみ（ブラックこっこ＝自分の影） ⑦一ファイル完結、の七つの信条と、新作を出す前の自問チェックリストを掲載。記憶を持たないClaudeでも毎回これを読めば畜物語の魂に沿って作れるよう、哲学をコード（正典 /docs/畜学.md、要点は CLAUDE.md に常駐、閲覧ページ /chikugaku/）として外部化したもの。畜史と同じ星空の装丁で、第一弾コッコキズナへの導線も用意。", },
    { tag:"new", t:"新作「コッコキズナ」を追加 ─ 親子ふたり・スマホ1台・60秒。敵はブラックこっこ（逆縁＝自分の影）だけ。畜学の第一弾（世界の親子ランキングつき）", d:"新作ゲーム「コッコキズナ（/kizuna/）」を追加。今日からコードに刻んだ設計哲学『畜学（/docs/畜学.md）』の第一弾。これはひとりで遊ぶゲームではなく、親子ふたり・スマホ1台・60秒で『親子関係と向き合う』ためのまったく新しい遊び。まんなかにこっこちゃん、その左右をふたりの指が『縁の糸』でつなぐ。画面下の鼓動（ハートビート）に合わせて、左の人は画面の左半分、右の人は右半分を、二人いっしょのタイミングでタッチ。息がぴたっと合う（シンクロ）たびに縁が太くなってこっこが輝き、温かい和音がコンボごとにキーを上げていく。ズレると忍び寄るのが、この作品ただ一種類の敵──ブラックこっこ。これは父でも母でも、息子でも娘でもなく、十六式でいう『逆縁要素』＝縁を断ち切ろうとする自分自身の影。攻撃してくるのは相手ではなく、いつも自分たちの“ズレ”。二人の呼吸が合うほど逆縁は縁にはじかれて遠ざかり、ズレるほど糸に差し込んでひびを入れてくる。だから倒すべきは常に『自分の中の切ろうとする力』だけ。時間が進むほど鼓動は速くなり、残り10秒で画面が真っ赤に沸騰、そして0秒──すべての音がぷつっと消える。静寂のあとに鐘が一打鳴り、こっこがこちらを振り返って『となりの顔を、見て。』。底なしに垂れ流すショート動画的な中毒とは逆の、“短く・激しく・必ず終わる”超中毒として設計し、終わったあとに二人が顔を見合わせる一瞬こそを商品にした。結んだ縁の強さ（スコア）は🏆世界の親子ランキングに刻め、世界中の親子が同じ60秒の儀式を終えて同時に顔を上げる『正気の同時多発』を可視化する。1位は👑世界一の親子としてランクイン演出が流れ、順位表には最高シンクロ連数（💞）も表示。ひとりで試したい人向けに『ひとりでためす』練習モードも用意（こちらは記録対象外）。キーボードでも遊べる（左=F／右=J／同時=スペース）。効果音・鼓動BGM・温かいパッド・縁の糸・花びらの演出・終わりの無音と鐘まで、すべてWeb Audio API＋Canvasでその場生成の1ファイル完結。公式こっこちゃんSVGを源画像にし、ブラックこっこは source-atop で黒く染めて表示。畜物語の島にはじめて生まれた『親子で息を合わせ、自分の逆縁を縁で押し返す』作品。ベストスコアはブラウザに自動保存。", },
    { tag:"new", t:"新作「コッコエコー」を追加 ─ こっこの「こっこっこ♪」をまねして打ち返す、まねっこコール&レスポンス60秒音ゲー（世界ランキングつき）", d:"新作ゲーム「コッコエコー（/echo/）」を追加。ジャンル名で呼びにくい新種の音ゲー。まず4色のこっこちゃん（き・みどり・あお・もも＝ドミソ高ドの和音）が順番に光って『こっこっこ♪』と短い節を歌う（コール）。つぎはあなたの番、同じ色を同じ順番でタッチして打ち返す（レスポンス＝まねっこ）。全部合うと節が1つずつ伸びていき、しかも出だしは毎回いっしょ──だから遊んでいない時もつい脳内でループしてしまう『耳から離れる前に育っていくテーマ曲』を、その場で一緒に作り上げていく感覚が核。成功するほど裏の演奏が厚くなる設計で、節がドラム→ベース→コードと層を重ねてフルグルーヴへ。こっこの鳴き声は子音アタック＋ピッチの上げグライド＋母音フォルマントで合成した、かわいくて耳に残るボイス。まちがえても終わらず、コンボは切れるけれど節が1つ短くなって同じところからやり直せるので、初めてでも立て直しやすい。成功するたびに節が1音ふえてテンポが上がり、しかも連続成功（コンボ）が続くほど加速がきつくなっていくので、ノってくると一気にスピードアップ。節が8まで伸びると『✨あたらしいフレーズ』に切り替わってさらに加速。ルールは60秒のスコアアタックで、電車の乗り換えのすき間時間にちょうど1プレイ。もちろん🏆世界ランキング対応で、スコアの自己ベストを名前と国旗つきで世界中と競え、登録すると『◯位にランクイン！』の結果発表演出（1位は👑WORLD CHAMPION）が流れる。順位表には到達した最長フレーズ（🎶Lv.）も表示。ゲームオーバー画面には『きょうのフレーズ』を色つきの並びでプレビュー表示するので、口ずさんで持ち帰れる。パッドの4色のこっこは公式こっこちゃんSVGを源画像にし、き・みどり・あお・ももの4色へ染め分けて表示（matchやkoroと同じ source-atop 方式）。効果音・グルーヴBGM・こっこボイス・ビートに脈打つ画面演出・バイブまで、すべてWeb Audio API＋Canvasでその場生成の1ファイル完結。畜物語の島にはまだ無かった『まねして歌う』コール&レスポンスとして仕立てた一作。ベストスコアはブラウザに自動保存。", },
    { tag:"new", t:"新作「こっこマッチ」を追加 ─ となりと入れかえて3つそろえる中毒マッチ3パズル（世界ランキングつき）", d:"新作ゲーム「こっこマッチ（/match/）」を追加。8×8にならんだ6色のこっこちゃんを、となりへスワイプ（フリック）またはタップで入れかえて、同じ色をタテかヨコに3つ以上そろえてパチンと消す、キャンディクラッシュ系のマッチ3パズル。消えたぶんは上からこっこちゃんが落ちてきて、落ちた先でまた3つそろうと連鎖（カスケード）！連鎖が続くほどコンボ倍率がアップし、効果音のキーが一段ずつ上がっていく気持ちよさを徹底的に重視した。4つそろえると一列まるごと消す⚡ストライプこっこ、5つで同じ色を盤面から全消しする🌈レインボーこっこ、L字／T字に組むとまわり3×3を吹き飛ばす💥ばくだんこっこが生まれ、これらを組み合わせると画面を切り裂くレーザーや大爆発で一気に大量得点。消すほどたまるFEVERゲージが満タンになると『FEVER!!』に突入し、背景が虹色に染まって得点2倍、紙吹雪が舞う高揚演出に。ルールは60秒のタイムアタックで、大きく消したり連鎖をつないだりスペシャルを作るたびに時間ボーナス（＋◯秒）がついて、うまいほど長く粘れる『あと1回』が止まらない設計。残り10秒を切るとバーが赤くなり、毎秒カチッと鳴って画面とバイブで知らせる緊張感も。手づまり（消せる手がない）になると自動でシャッフルしてくれるので初心者でも安心。もちろん🏆世界ランキング対応で、スコアの自己ベストを名前と国旗つきで世界中と競え、登録すると『◯位にランクイン！』の結果発表演出（1位は👑WORLD CHAMPION）が流れる。タイトルには🔄強制更新ボタン、効果音・中毒BGM・パーティクル・画面ゆれ・バイブまで、すべてWeb Audio API＋Canvasでその場生成の1ファイル完結。公式こっこちゃんSVGを6色のキャンディに入れて表示。30代後半の女性やお子さんがどハマりしやすい王道の中毒ループを、畜物語の島にはまだ無かった『入れかえて消す』マッチ3として仕立てた一作。ベストスコアと最高れんさはブラウザに自動保存。", },
    { tag:"new", t:"新作「こっこバブル」を追加 ─ こっこちゃんをねらって撃ち込む連鎖バブルシューター", d:"新作ゲーム「こっこバブル（/bubble/）」を追加。画面下のこっこちゃんを指でなぞって角度を決め、はなすと発射！同じ色のこっこちゃんを3つ以上くっつけると、パチンと弾けて消えるバブルシューター（パズルボブル系）。狙いを定めると、壁ではね返るところまで予測する点線ガイドとピタッと止まる着弾リングが出るので、すき間や壁バウンドを読んでねらい撃つ駆け引きがクセになる。色のかたまりを消して、上にぶら下がっていたこっこが支えを失うと、まとめてドサッと落下して大量得点＆気持ちいい連鎖に。コンボをつなぐと効果音のキーが一段ずつ上がっていき、たまるとFEVERに突入──背景が虹色に染まって得点2倍、花火が舞う高揚演出に。ときどき撃てる🌈レインボーこっこ（何色とでもくっつく）と💣爆弾こっこ（まわりをまとめて吹き飛ばす）で大逆転。撃つたびに天井がジリジリ下がってきて、こっこが下のラインに着いたらゲームオーバーという『あと1回』が止まらない緊張感。盤面を全部消すと大ボーナス＆新しい面が降ってきてエンドレスに楽しめる。狙う→撃つ→弾ける→落ちるの操作フィードバック、効果音・中毒BGM・パーティクル・画面ゆれ・バイブまで、すべてWeb Audio API＋Canvasでその場生成の1ファイル完結。公式こっこちゃんSVGを5色のバブルに入れて表示。指1本でねらって撃つ爽快感を、30代後半の女性やお子さんがどハマりしやすい中毒ループに仕立てたバブルシューター。ベストスコアはブラウザに自動保存。", },
  ]},
  { date:"2026.06.23", items:[
    { tag:"new", t:"新作「こっこタワー」を追加 ─ 流れるこっこを1タップで真上に積み上げる中毒系スタックゲーム", d:"新作ゲーム「こっこタワー（/tower/）」を追加。左右にスーッと流れるこっこちゃんの足場を、ねらった瞬間に画面タップで真上にスタックしていく超シンプルな1タップゲーム。前の段からはみ出した分はスパッと切り落とされて落下し、土台がだんだん細くなっていくので、続けるほどシビアに。ピッタリ重ねるとPERFECTで逆に土台がひとまわり回復＆コンボが伸び、効果音のキーが一段ずつ上がっていく気持ちよさを重視。PERFECTを5回つなぐとFEVERに突入し、足場が金色に輝いてBGMがテンポ・キーアップ、得点2倍＆花火が舞う。積み上がるほどカメラが上昇し、背景は夜明け前→青空→高空→夕焼け→宵→星空へとどんどん移り変わっていく爽快感。10mごとに到達演出、ときどき混ざるゴールデンこっこはボーナス得点。指1本で『あと1回、もう1mだけ』が止まらなくなる、30代後半の女性やお子さんがどハマりしやすい中毒ループを狙ったスタックゲーム。効果音・中毒BGM・落下や崩壊のエフェクト・バイブレーションまで、すべてWeb Audio API＋Canvasでその場生成の1ファイル完結。ベストスコア（到達m数）はブラウザに自動保存。", },
    { tag:"new", t:"新作「こっこコロコロ」を追加 ─ 同じこっこをくっつけて合体させる、スイカゲーム系の中毒合体パズル", d:"新作ゲーム「こっこコロコロ（/koro/）」を追加。画面を左右にスライドして落とす位置を決め、はなす（タップ）とこっこちゃんがポトンと容器に落ちる物理パズル。同じ大きさのこっこちゃん同士がくっつくと合体して、ひとまわり大きなこっこに進化（全11段階、最後は巨大ゴールデンこっこ）。合体が連鎖するとコンボになり、続けるほど高得点＆効果音のキーが上がっていく気持ちよさを重視。ときどき落ちてくる🌈レインボーこっこは、ふれたこっこと何でも合体できる万能こっこで大逆転のチャンス。こっこがレッドラインを越えて積み上がるとゲームオーバー。物理演算・サウンド・BGM・演出すべてその場生成の1ファイル完結で、公式こっこちゃんSVGを11色に染め分けて段階表示。30代後半の女性やお子さんがどハマりしやすい『あと1回』の中毒ループを狙った、スイカゲーム系の合体パズル。もちろん🏆世界ランキング対応（自己ベスト＋最大Lvを名前と国旗つきで競える）。", },
    { tag:"new", t:"新作「こっこポコポコ」を追加 ─ 穴からひょこっと出るこっこちゃんをタッチする中毒系もぐらたたき", d:"新作ゲーム「こっこポコポコ（/poko/）」を追加。3×3の穴からテンポよくひょこっと顔を出す公式こっこちゃんを、出てきた瞬間にタッチしてキャッチ！ブラックこっこに触れるとハートが1つ減ってしまうので見送る判断力も必要、逆にゴールデンこっこは高得点＋ハート回復のチャンス。コンボをつなぐとFEVER（フィーバー）に突入してこっこちゃんが大量出現、BGMのテンポとキーが上がって紙吹雪が舞う高揚演出に。タップごとに鳴る効果音はコンボ数に応じてキーが上がっていく仕組みで、当て続けるほど気持ちよくなる中毒性を重視。ハートは3つ、なくなったらゲームオーバーでベストスコアに挑戦できる。音・BGM・操作のフィードバックすべてWeb Audio APIでその場生成、画面も含めて1ファイル完結。", },
    { tag:"fix", t:"こっこポコポコ：タップの当たり判定がこっこちゃん本体に追従するよう修正", d:"穴の位置だけで判定していたため、ひょこっと飛び出した状態のこっこちゃん（特に頭の高い位置）をタップしても外れてしまう不具合を修正。描画と当たり判定で同じ位置計算を共有するようにし、今ぴょこっと出ているこっこちゃんの実際の見た目の位置にタップ判定が正しく追従するようにした。", },
    { tag:"feat", t:"こっこポコポコに制限時間60秒＆🏆世界ランキングを追加", d:"穴あきタッチ「こっこポコポコ」（/poko/）に制限時間60秒と世界ランキングを追加。これまでハート3つがなくなるまでだった終了条件に、60秒のタイムリミットを追加（ハートが先に0になるか、時間切れか、どちらか早い方でゲーム終了）。画面上部にタイムバーを表示し、残り10秒を切るとバーが赤くなり、毎秒カチッという音とバイブ・画面ゆれで知らせる緊張感を演出。さらに世界ランキングを実装し、1プレイのスコアの自己ベストを名前と国旗をそえて世界中のプレイヤーと競えるようになった。GAME OVER画面から名前を入れて「🏆 登録」、タイトルの「🏆 世界ランキング」ボタンからは順位表（つかまえた匹数つき）をいつでも閲覧できる。登録すると「◯位にランクイン！」の結果発表演出（ドラムロール→順位ドーン＋紙吹雪・花火、1位は👑WORLD CHAMPION）が流れる。保存先は既存のFirebaseで他のゲームと同じ仕組み（1端末1枠・最高スコアのみ保持・匿名認証で自分の枠だけ更新）。ベストスコアはこれまで通りブラウザ保存、世界ランキングだけサーバー保存。", },
    { tag:"imp", t:"こっこポコポコ：キャッチするたびに加速、フィーバー中は2倍速に", d:"こっこちゃんを当てる（キャッチする）たびに穴の出現間隔と表示時間が少しずつ短くなっていき、プレイが進むほどテンポアップする快感を強化。さらにFEVER中の出現間隔・表示時間をどちらも通常の半分（2倍速）に統一し、フィーバーの高揚感とスリルをアップ。やりすぎて理不尽にならないよう、加速には上限と下限を設けて調整。", },
    { tag:"imp", t:"こっこポコポコ：10コンボごとにお祝い演出＆さらに加速", d:"コンボが10・20・30…と10の倍数に乗るたびに「10 COMBO!」のような演出（色を変えたテキスト・パーティクル・画面ゆれ・専用サウンド）が出るようにし、連続キャッチの盛り上がりを強化。さらに10コンボごとに加速率がもう一段アップする仕組みを追加し、長くコンボを繋ぐほどテンポが速くなる達成感をアップ（こちらも上限・下限ありで理不尽にはならない範囲に調整）。", },
    { tag:"fix", t:"こっこポコポコ：9マスの縦の間隔が広すぎてタップしづらいのを調整", d:"3×3の穴の縦方向の間隔が広く、上下の段を連続でタップするのに指の移動が大きくて大変だったのを調整。穴の縦位置を寄せて段の間隔をぎゅっと詰め、3段とも指を大きく動かさずにタップできるように改善（横の間隔は変更なし）。", },
    { tag:"imp", t:"こっこポコポコ：コンボお祝い演出を🏆世界ランキング演出ばりに大幅強化", d:"10コンボごとのお祝い演出が控えめだったのを、世界ランキングの結果発表演出を参考に大幅リッチ化。中央に光のリング（二重）がドーンと広がり、コンボ数の文字がパンチを効かせて飛び出すように表示、画面が一瞬色フラッシュ、花火のような複数バーストの紙吹雪＆パーティクルが連続で弾けるようにした。コンボの段（10・20・30…）が上がるほど色テーマ（オレンジ→水色→ピンク→緑→黄）が切り替わり、演出のスケール・画面ゆれ・バイブもじわじわ強くなる（上限ありで暴れすぎないよう調整）。プレイの手を止めない範囲で、お祝い感をしっかり盛り上げる演出に。", },
    { tag:"imp", t:"こっこポコポコ：コンボお祝い演出をさらにパワーアップ、花火が画面いっぱいに弾けるように", d:"「演出がしょぼい」というご指摘を受けて、10コンボごとのお祝い演出をさらに強化。中央のリングに加えて、光の羽根がぐるぐる回転しながら広がる花火のような「光の渦」を新追加。これまでテキストの近くに固まっていた花火バーストを画面のほぼ全体にランダムに広がるよう変更し、世界ランキングの結果発表に負けない賑やかさに。バーストごとにパチパチという専用の効果音を追加し、視覚と音の両方で盛り上がりを演出。さらに高コンボ（5の倍数で🔥、10の倍数で👑）になるとコンボ数の文字にアイコンが付くようになり、リングが時間差のエコーリングで二重がさらに重なるなど、コンボを伸ばすほど演出の豪華さが増していく。", },
    { tag:"imp", t:"こっこポコポコ：🏆世界ランキングの結果発表に効果音を追加", d:"これまで世界ランキングの結果発表演出（ドラムロール→順位ドーン）が画面演出とバイブのみで無音だったのを、しっかり音が鳴るように追加。ドラムロール中はカチカチという音が回転のたびに鳴り、順位が決まる瞬間には順位に応じたファンファーレが流れる。1位（👑WORLD CHAMPION）は重い衝撃音から始まり迫力のある上昇ファンファーレ＋キラキラした音の雨が続く豪華仕様、2位・3位もそれぞれ少し控えめなファンファーレ、TOP10入りは明るい4音のチャイム、ランク外（見送り）は残念な下降音のあとに「次がんばろう」と背中を押すような上昇フレーズが流れる。結果発表の盛り上がりが音でもしっかり伝わるようになった。", },
  ] },
  { date:"2026.06.22", items:[
    { tag:"imp", t:"迎撃（コッコ・インベーダー）：敵に急降下（スウープ）攻撃を追加＆難易度をやさしく調整", d:"「敵が直進（左右に進むだけ）で単調」「すぐにやられてしまう」というご意見をうけて大きく調整。【動きに変化】これまでの“隊列でジリジリ降りてくるだけ”に加えて、ときどき隊列から1〜2体が弧を描いてこっこちゃんへ舞い降りる『急降下（スウープ）攻撃』を追加。傾きながらカーブを描いて迫り、また隊列へ戻る（撃ち落とせばもちろん撃破）。直進だけだった戦いに、避けと狙い撃ちのメリハリが出た。【死ににくく調整】体力（ミス）を3→4回に増量、敵の弾を遅く＆本数ひかえめに、隊列の最高速度と降下スピードもゆるめに、被弾後の無敵時間も延長。さらにこっこ砲台の連射を強化（同時3発・発射間隔みじかめ）して、敵をテンポよく倒せるようにした。急降下はウェーブ1から出るけれど最初は1体ずつ・ゆっくりなので、よく見れば必ずかわせる。", },
    { tag:"imp", t:"通勤（コッコラッシュ）：ハートの位置を見やすく＆酸素がある限り何度でも空蹴りできるように", d:"先に追加した❤️体力＆🫧酸素ゲージを調整。【ハート配置の修正】右上のハートがスマホのステータスバー（時計・電池表示）と重なって見えなかったので、左カラムの駅名の下へ移動して常にはっきり見えるようにした。【空蹴りの強化】これまで空中ジャンプは1回（2段ジャンプ）だけだったのを、島ぐらしと同じく『🫧酸素がある限り何段でも空蹴りできる』方式に変更。1回ごとに酸素を消費し、酸素がつづくかぎりタップのたびにくるっと回って跳び続けられる（屋根を走ると回復）。すき間越えや高い車両のリカバリーがやりやすく、酸素のやりくりがそのまま腕の見せどころになった。", },
    { tag:"feat", t:"通勤（コッコラッシュ）に❤️体力3つ＆🫧酸素ゲージを追加（島ぐらしのルール移植）", d:"これまで「ワンミスで即しゅっきん失敗」だったコッコラッシュ（/rush/）に、島ぐらし（こっこの森）と同じ ❤️体力＆🫧酸素ゲージのルールを追加。【❤️体力3つ】障害物に当たったり屋根から落ちても即終了せず、体力が1つ減って少しのあいだ点滅（無敵）して続行できる。落ちたときは🚁レスキューで次の屋根へ運んでもらえる。体力が0になったらしゅっきん失敗。【🫧酸素ゲージ】2段ジャンプと長押しふわっとは酸素を消費し、屋根を走っているあいだに回復する（フィーバー中は満タン）。酸素ぎれだと2段ジャンプができないので、空中での無理は禁物。画面右上にハートと酸素ゲージを表示。ワンミス即死から、体力と酸素をやりくりして長く走る遊びへと、より島ぐらしらしい手ざわりになった。", },
    { tag:"feat", t:"通勤（コッコラッシュ）に🏆世界ランキングを追加", d:"通勤特急ワンタップラン「コッコラッシュ」（/rush/）に世界ランキングを実装。1プレイのスコアの自己ベストを、名前と国旗をそえて世界中のプレイヤーと競えるようになった。しゅっきん失敗（GAME OVER）画面から名前を入れて「🏆 登録」、タイトルの「🏆 世界ランキング」ボタンからは順位表（集めたたまご数つき）をいつでも閲覧できる。登録すると「◯位にランクイン！」の結果発表演出（ドラムロール→順位ドーン＋紙吹雪・花火、1位は👑WORLD CHAMPION）が流れる。保存先は既存のFirebaseでスプラット3Dやインベーダーと同じ仕組み（1端末1枠・最高スコアのみ保持・匿名認証で自分の枠だけ更新）。ベストスコアはこれまで通りブラウザ保存、世界ランキングだけサーバー保存。", },
    { tag:"fix", t:"通勤（コッコラッシュ）の障害物が空に溶けて見えないバグを修正", d:"コッコラッシュ（/rush/）で、高い位置の車両にのった障害物（パンタグラフ・ダクト）が暗い色だったため、朝焼け空の上のほうにある濃紺の部分と重なるとほぼ透明に見え、目視できないまま激突してしまうバグを修正。障害物に暗いふちどり（明るい空でも輪郭が出る）と明るい本体＋ハイライト（暗い空でも沈まない）を付け、さらにパンタグラフの接点ランプとダクトの黄色い警告ストライプを追加して、どんな空の色でもはっきり見えるようにした。当たり判定は変えていないので、見える＝避けられるようになった。", },
    { tag:"feat", t:"迎撃（コッコ・インベーダー）に🏆世界ランキングを追加", d:"「コッコ・インベーダー」（/invaders/）に世界ランキングを実装。1プレイのスコアの自己ベストを、名前と国旗をそえて世界中のプレイヤーと競えるようになった。GAME OVER画面から名前を入れて「🏆 登録」、タイトルの「🏆 世界ランキング」ボタンからは順位表（到達ウェーブつき）をいつでも閲覧できる。登録すると「◯位にランクイン！」の結果発表演出（ドラムロール→順位ドーン＋紙吹雪・花火、1位は👑WORLD CHAMPION）が流れる。保存先は既存のFirebaseでスプラット3Dやグレイズと同じ仕組み（1端末1枠・最高スコアのみ保持・匿名認証で自分の枠だけ更新）。ハイスコアはこれまで通りブラウザ保存、世界ランキングだけサーバー保存。", },
    { tag:"feat", t:"回避（コッコグレイズ）に🏆世界ランキングを追加", d:"ネオン弾幕回避「コッコグレイズ」（/graze/）に世界ランキングを実装。1プレイのスコアの自己ベストを、名前と国旗をそえて世界中のプレイヤーと競えるようになった。GAME OVER画面から名前を入れて「🏆 登録」、タイトルの「🏆 世界ランキング」ボタンからは順位表をいつでも閲覧できる。登録すると「◯位にランクイン！」の結果発表演出（ドラムロール→順位ドーン＋紙吹雪・花火、1位は👑WORLD CHAMPION）が流れる。保存先は既存のFirebaseでスプラット3Dやダービーと同じ仕組み（1端末1枠・最高スコアのみ保持・匿名認証で自分の枠だけ更新）。ベストスコアはこれまで通りブラウザ保存、世界ランキングだけサーバー保存。", },
    { tag:"feat", t:"ダービー（こっこダービー）に🏆世界ランキングを追加 ─ 通算「勝ち点」で競う", d:"こっこダービー（/derby/）に世界ランキングを実装。1試合ごとにたまる通算「勝ち点」のキャリア自己ベストを、名前と国旗をそえて世界中のプレイヤーと競えるようになった。勝ち点は勝つほど・つよい相手・大差ほど高い（勝ち＝難易度ベース10/25/50＋得失点差×5、引き分け＝2/5/10、負け＝0）。リザルト画面に今回の獲得勝ち点と通算（◯勝）を表示し、名前を入れて「🏆 登録」できる。タイトルの「🏆 世界ランキング」ボタンからは順位表（勝ち点・勝利数つき）をいつでも閲覧でき、登録すると「◯位にランクイン！」の結果発表演出（1位は👑WORLD CHAMPION）が流れる。保存先は既存のFirebaseでスプラット3Dやこっこリンクと同じ仕組み（1端末1枠・最高勝ち点のみ保持・匿名認証で自分の枠だけ更新）。通算勝ち点はこれまで通りブラウザ保存、世界ランキングだけサーバー保存。", },
    { tag:"feat", t:"3D塗る（コッコスプラット3D）に🏆世界ランキングを追加", d:"コッコスプラット3D（/splat3d/）に世界ランキングを実装。1プレイのスコアの自己ベストを、名前と国旗をそえて世界中のプレイヤーと競えるようになった。リザルト画面（CLEAR! / TIME UP…）から名前を入れて「🏆 登録」、タイトルの「🏆 世界ランキング」ボタンからは順位表をいつでも閲覧できる。登録すると「◯位にランクイン！」の結果発表演出（ドラムロール→順位ドーン＋紙吹雪・花火、1位は👑WORLD CHAMPION）が流れる。保存先は既存のFirebaseでこっこリンクやこっこGPと同じ仕組み（1端末1枠・最高スコアのみ保持・匿名認証で自分の枠だけ更新）。ゲームのベストはこれまで通りブラウザ保存、世界ランキングだけサーバー保存。", },
    { tag:"fix", t:"【おしらせ】「大救出（SOS）」のサービスを終了しました…🙇", d:"いつもこっこちゃんを助けてくださり、本当にありがとうございます。このたび、誠に勝手ながら「こっこSOS大救出」を終了させていただくことになりました。ジャイロでZ軸を駆け抜け、危機にあるこっこちゃんを一羽また一羽と救い出してくださったあの時間を楽しみにしてくださっていた皆さまには、心よりお詫び申し上げます…本当にごめんなさい🙇。あなたが救ってくださったこっこちゃんたちの羽ばたきも、寄せてくださった声のひとつひとつも、私たちのかけがえのない宝物でした。力およばずこの大救出を残しきれなかったことが、ただただ申し訳ないです。これまで遊んでくださったこと、心から感謝しています。皆さまからいただいたあたたかい気持ちを胸に、これからも他のゲームたちをもっと面白く育てていきます。短いあいだでしたが、本当にありがとうございました。またどこかの島で、こっこちゃんと会ってもらえますように。", },
    { tag:"fix", t:"【おしらせ】「サッカー3D（Soccer）」のサービスを終了しました…🙇", d:"いつもこっこちゃんと一緒に遊んでくださり、本当にありがとうございます。このたび、誠に勝手ながら3Dサッカーゲーム「サッカー3D（Soccer）」を終了させていただくことになりました。スタジアムの照明の下でこっこちゃんとゴールを目指したあの時間を楽しみにしてくださっていた皆さまには、心よりお詫び申し上げます…本当にごめんなさい🙇。決めた一点に沸いた歓声も、寄せてくださった声のひとつひとつも、私たちのかけがえのない宝物でした。力およばずピッチを残しきれなかったことが、ただただ申し訳ないです。これまで遊んでくださったこと、心から感謝しています。皆さまからいただいたあたたかい気持ちを胸に、これからも他のゲームたちをもっと面白く育てていきます。短いあいだでしたが、本当にありがとうございました。またどこかの島で、こっこちゃんと会ってもらえますように。", },
    { tag:"fix", t:"【おしらせ】「英雄（Hero）」のサービスを終了しました…🙇", d:"いつもこっこちゃんを応援してくださり、本当にありがとうございます。このたび、誠に勝手ながら「英雄（Hero）」を終了させていただくことになりました。こっこちゃんが英雄となって戦うあの物語を楽しみにしてくださっていた皆さまには、心よりお詫び申し上げます…本当にごめんなさい🙇。ともに駆け抜けた冒険のひとときも、寄せてくださった声のひとつひとつも、私たちのかけがえのない宝物でした。力およばず残しきれなかったことが、ただただ申し訳ないです。これまで遊んでくださったこと、心から感謝しています。皆さまからいただいたあたたかい気持ちを胸に、これからも他のゲームたちをもっと面白く育てていきます。短いあいだでしたが、本当にありがとうございました。またどこかの島で、こっこちゃんと会ってもらえますように。", },
    { tag:"fix", t:"【おしらせ】「川越・江戸（Kawagoe）」のサービスを終了しました…🙇", d:"いつもこっこちゃんと一緒に遊んでくださり、本当にありがとうございます。このたび、誠に勝手ながら「川越・江戸（Kawagoe）」を終了させていただくことになりました。小江戸・川越の街並みや江戸の風情を楽しみにしてくださっていた皆さまには、心よりお詫び申し上げます…本当にごめんなさい🙇。蔵造りの町をこっこちゃんと歩いたあの時間、寄せてくださった「楽しかった」の声のひとつひとつが、私たちのかけがえのない宝物でした。力およばず残せなかったことが、ただただ申し訳ないです。これまで遊んでくださったこと、心から感謝しています。皆さまからいただいたあたたかい気持ちを胸に、これからも他のゲームたちをもっと面白く育てていきます。短いあいだでしたが、本当にありがとうございました。またどこかの島で、こっこちゃんと会ってもらえますように。", },
    { tag:"fix", t:"【おしらせ】「砕く（Breaker）」のサービスを終了しました…🙇", d:"いつもこっこちゃんの島で遊んでくださり、本当にありがとうございます。このたび、ジャイロ操作の3Dブロック崩し「砕く（Breaker）」を、誠に勝手ながら終了させていただくことになりました。楽しみに遊んでくださっていた皆さまには、心よりお詫び申し上げます…本当にごめんなさい🙇。これまで応援してくださったこと、檻のこっこちゃんを何度も救い出してくださったこと、ひとつひとつが私たちの宝物でした。「砕く」で過ごしたあの時間が、皆さまの記憶のどこかにそっと残っていてくれたら、こんなにうれしいことはありません。残してくれたみんなへの感謝を胸に、これからも他のゲームたちをもっと面白くしていきます。短いあいだでしたが、本当にありがとうございました。またどこかの島で、こっこちゃんと会ってもらえますように。", },
  ] },
  { date:"2026.06.21", items:[
    { tag:"feat", t:"島ぐらし：月と太陽に空蹴りでタッチ→隠しステージ「ブラックこっこの月」を追加 🌑", d:"酸素をためて空蹴り（からげり）で昇りきり、夜は🌙月・ひるは☀️太陽に“とどく”高度まで到達するとタッチ成立。両方タッチをそろえると、巨大な「ブラックこっこの王」との隠しボス戦『ブラックこっこの月』へワープする。星空と月に覆われた特別空間で、王は上空をふわふわ漂いながら ためつき→急降下（ダイブ）で襲ってくる。倒し方は、空蹴りで昇って王の真下へ🌙そらわざを叩き込むのが本命（隠しステージでは そらわざが必ず王をロックオン）、低空に降りてきた王へジャンプ攻撃や近接スイングでも削れる。王はときどき子分（空飛ぶブラックこっこ）を呼ぶ。撃破すると💴大量ボーナス＋「○回め」のクリア記録。力つきても島へ帰されるだけ。月と太陽のタッチ進捗はセーブされ、再挑戦はまた両方タッチから。", },
    { tag:"imp", t:"島ぐらし：高高度を昇っているあいだ“空飛ぶブラックこっこ”が妨害してくるように", d:"空蹴りで一定の高度（約55m〜）まで昇ると、空中に黒いブラックこっこが現れ、プレイヤーめがけて飛んできて体当たりで邪魔をするようになった。ぶつかると🫧酸素をごっそり奪われ、下へ弾かれて高く昇りにくくなる（最大4体まで同時出現／着地すると消える）。月・太陽へのタッチや隠しステージ到達を、ただ昇るだけでなく“邪魔をかいくぐる腕前”が要る挑戦に。隠しボス戦でも王が同じ妨害こっこを子分として呼ぶ。", },
    { tag:"feat", t:"島ぐらし：酸素ためて空蹴りで“海を渡る”隠し航路を追加 🌊", d:"船✈や飛行機がなくても、🫧酸素ボンベを買いだめして空蹴り（からげり）をし続ければ、海の上を飛んでとなりの島まで自力で渡れるようになった（隠し要素）。これまで空中では止められていた深い海の上も、空中にいる間だけは飛び越えられるように変更。岸から沖へ飛び出し、酸素が切れる前に世界地図の縁を越えれば、向かった方向の島の浜に到着する（地図で右＝次の島／左＝前の島。お金⛽あぶらは不要で、消費するのは酸素だけ）。ただしこっこちゃんは泳げないので、酸素ぎれで海に落ちると🌊海に沈み、🚁レスキューヘリでスポーン地点へ運ばれる（使った酸素はもどらない＝買いだめが保険）。物価の安い島で酸素を大量に仕込んで、腕前で海を越えるロマン航路。", },
    { tag:"imp", t:"島ぐらし：レーダーに“となりの島への海わたり出口”マーカーを追加", d:"左下のレーダー地図の左右のふちに、空蹴りで渡れるとなりの島の方向を示す水色の矢印（シェブロン）と島名を表示するようにした。右＝東＝次の島、左＝西＝前の島で、まだ行ったことのない島は「？？？」と伏せる。新しい“海を渡る”隠し航路に、どっちへ飛べば島があるか ひと目で分かる発見の手がかりとして追加。", },
    { tag:"imp", t:"島ぐらし：朝〜昼の画面が明るすぎて見にくかったのを調整", d:"朝から日中にかけて画面が明るすぎ、こっこちゃんや地形・木々が白っぽく飛んで見にくかったのを改善。昼の時間帯（朝も同じ明るさ）のスプライトの明るさ（tint 約1.10→0.86）・太陽光（約25％減）・地形の環境光（約4割減）をまとめて控えめにし、白っぽく見える原因だった空（地平線・天頂）とフォグの色も落ち着かせた。さらに、いちばん目立っていた芝生（地面）が蛍光グリーンに光って見にくかったため、芝の地色そのものを濃いめに落とし、全体の彩度ブーストも控えめにして、地面のギラつき・白飛びをしっかり抑えた。夕方・夜の明るさはこれまで通りで変えていない。", },
    { tag:"imp", t:"ダービー：操作を滑らかに＆酸素で走る速さが変化（止まると回復）", d:"こっこちゃんの操作感を改善。入力中はキビキビ加速、離すとスーッと減速するようにして、移動を滑らかにした（フレームレート非依存）。さらに酸素ゲージが走る速さに直結：酸素が多いほど速く、減るほど遅くなる（敵こっこにも適用）。あわせて酸素の自然回復を見直し、これまでの「時間で勝手に回復」をやめて、立ち止まっている間だけチャージされるように変更（動いている間は回復しない）。一気に満タンにしたいときは従来どおり🫧酸素ボンベを拾えばOK。撃つ→遅くなる→止まって回復 or ボンベ奪取、という駆け引きが生まれる。", },
    { tag:"imp", t:"ダービー：必殺技「パワーシュート」を超高速化＆超ド派手演出に強化", d:"必殺技ボタンの表記を「必殺技」に変更。さらにパワーシュートのボール初速を一気に引き上げ（通常シュートの十数倍）、画面を切り裂く爆速のパチンコ弾に（高速でも壁・ゴール・キーパーをすり抜けないよう、移動をサブステップ化して当たり判定を精密化）。発動演出も全力で派手に：画面フラッシュ＋大きな画面ゆれ、足元から噴き出す衝撃波リングと火花、こっこちゃん本体に立ち昇る黄金（敵は紫）のオーラ・回転する稲妻リング・気の柱・白熱フラッシュ。ボール自体も炎のコメット軌跡＋脈動する光輪＋バチバチ走る稲妻アーク＋白熱コアでギラギラに。発動時には画面中央に「⚡必殺技⚡ パワーシュート」バナーが弾ける。", },
    { tag:"feat", t:"ダービー：必殺技ボタンを追加 ─ 第一弾「⚡パワーシュート」", d:"こっこダービーに必殺技システムを新設。酸素ゲージが満タンのときだけ光る🟣必殺ボタン（スマホ）／Kキー・Shift（PC）で発動できる。第一弾はパワーシュート：撃った瞬間ボールが炎をまとい、約5回 壁やキーパーに当たっても失速せず、パチンコ弾のように高速で跳ね回り続ける。当てれば一気にゴールをこじ開けるロマン技。発動には酸素を使い切るので連発はできない。今後も必殺技は追加予定。", },
    { tag:"imp", t:"ダービー：フィールド上のスコア／ゲージ／ボタンを半透明にして見やすく", d:"画面上部のスコア・時計・酸素ゲージ、シュートボタンなどを半透明化し、ピッチ（フィールド）が透けて見えるように調整。HUDやボタンの背景の不透明度を下げ、プレイ中もボールやキャラの位置を見失いにくくした。", },
    { tag:"imp", t:"全ゲームのタイトル画面に🔄強制更新ボタンを設置", d:"トップ・畜史・島ぐらしに付いていた「さいしんに更新」ボタンを、ほぼ全部のゲーム（ダイブ／バトル／レスキュー／グレイズ／インベーダー／ラッシュ／ポップ／フィーバー／ビート／パルス／ギャラクシー／SOS／ブレイカー／ヒーロー／GP／スプラ／スプラ3D／川越／ダービー）のタイトル画面の右下にも追加。古いキャッシュ／ServiceWorkerが残って最新版が出ないときに押せば、キャッシュ削除＋SW解除＋キャッシュバスター付き再取得で すぐ最新版へ。ボタンはタイトル画面にだけ出るのでプレイ中は じゃまにならず、押してもセーブ（つづきから・ハイスコア）は消えません。" },
    { tag:"feat", t:"ダービー：両ゴールに自動で左右に動くキーパーを追加", d:"こっこダービー（1on1サッカー）の上下それぞれのゴール前に、ボールより小さな丸いゴールキーパーを配置。ボールのx位置を速度制限つきで自動追尾して左右にスライドし、飛んできたシュートを弾き返してセーブする。ただし動きは無限に速くはないので、必殺シュート（🫧酸素満タン）の高速弾やコーナーぎわのすき間を狙えば抜ける、という駆け引きが生まれる。上ゴール＝敵キーパー（紫）／下ゴール＝味方キーパー（黄）。セーブ時は白い閃光と軽い画面ゆれで手応えを演出。" },
    { tag:"fix", t:"島ぐらし：そらわざ（空中技）が敵に当たらなかったのを修正 ─ 自動ロックオン＆急降下に", d:"高度に応じて発動する空中技が「プレイヤーの真下の地面」だけを攻撃していたため、高く昇ると敵の真上にピッタリ重ならないと当たらず、ほぼ命中しなかった不具合を修正。発動すると いちばん近い敵に自動ロックオンし、天から標的へ降下ストライク＆周囲を巻き込むようにした（高く昇るほど狙える範囲も広がり、🌙月光レーザーは画面ぜんたいの敵を一掃）。さらに標的へ急降下（swoop）して着弾を画面で見せ、高所からの落下ダメージは無効化。とどく範囲に敵がいないときは「敵がいない！」と表示してムダ撃ちを防ぐ。" }
  ]},
  { date:"2026.06.20", items:[
    { tag:"feat", t:"島ぐらし：空蹴りで高く昇るほど強い「そらわざ（空中技）」を追加 ─ 月まで昇れば月光レーザー！", d:"酸素ゲージで空蹴り（からげり）を重ねて空中に浮かび、達した高度に応じて発動する10段階の空中技を新設。地上にいては使えず、高く昇るほど強い技が放てる。①🍃こずえキック(高度3m〜)②🪶はね蹴り③🌈にじ蹴り④☁️くも蹴り⑤⛈️いかずち⑥🌪たつまき⑦🌟ほし蹴り⑧☄️りゅうせい群⑨🌌オーロラ、そしててっぺん⑩🌙月光レーザー(高度120m〜)は地上を一掃する究極技。技はこれまで通りジム（🏋️）で💴を払って習得する。酸素があるあいだは空中で“ふわり”浮遊して昇りやすく、酸素ぎれになると通常重力に戻って落下→着地ダメージのリスクは健在。🫧酸素ボンベを空中で使って酸素を継ぎ足せば、より高く＝より強い技へ。昇るほど空が宇宙→星空→月へと変わる高度オーバーレイと、画面上部の高度メーター＆発射UI付き（PCはFキー、スマホは🌙ボタン）。" },
    { tag:"fix", t:"島ぐらし：古いキャッシュで島名が表示されなかったのを修正", d:"端末に残った古いバージョン（ふるいキャッシュ／ServiceWorker）が表示され、せっかくの「🏝 いまいる島の名前」が出ない・港や空港の地図が「？？？」のまま…という状態が起きていた。キャッシュの版を上げて、次にひらいたとき自動で最新版へ切り替わるように修正。すぐ直したいときはタイトル画面右下の🔄「さいしんに更新」を押せばOK。なおセーブ（つづきから）は消えません。" },
    { tag:"fix", t:"島ぐらし：🏠ホームボタンで体力・酸素が全回復してしまうバグを修正", d:"プレイ中に🏠ホームボタンでタイトルへ戻ると、つづきから再開したときに体力(HP)と酸素ゲージが満タンに戻ってしまう不具合があった（セーブに体力・酸素が含まれておらず、再開時に初期化されていたため）。体力と酸素ゲージもセーブに保存し、つづきからで正しく引き継ぐように修正。これでホームに戻っても回復しなくなった（古いセーブは満タン扱いで読み込む）。" },
    { tag:"imp", t:"島ぐらし：タイトル画面に🔄強制更新ボタンを設置", d:"トップや畜史と同じ「さいしんに更新」ボタンを、島ぐらしのタイトル画面の右下に追加。キャッシュ削除＋ServiceWorker解除＋キャッシュバスター付き再取得で、最新版にすぐ更新できる。ボタンはタイトル画面だけに出るのでプレイ中は じゃまにならない。なお更新を押してもセーブ（つづきから）は消えません。" },
    { tag:"fix", t:"島ぐらし：島名の表示が酸素ゲージと重なっていたのを修正", d:"島名をレーダーの真上に置いていたが、ひっさつわざの酸素ゲージと同じ高さで重なって読みづらかった。表示位置を画面上部・時計の真下（中央）に移し、どの状況でも重ならないようにした。" },
    { tag:"imp", t:"島ぐらし：港・空港の行き先を「世界地図」で表示", d:"🚢港や✈️空港をひらいたときの行き先メニューを、文字リストから航路でつないだ世界地図にリニューアル。島が一本道でならび、いまいる島（光るリング）・行ったことのある島・これから行ける島がひと目で分かるように。各島には⛽コストもならべて表示。まだ行ったことのない先の島は「❔ ？？？」で伏せてあるので、進むワクワク感はそのまま。船は“となりの島”、飛行機は“訪問済みのどこへでも”という違いも地図上で直感的に。" },
    { tag:"imp", t:"島ぐらし：いまいる島の名前を画面に小さく表示", d:"諸島めぐりで島を行き来していると、いま自分がどの島にいるのか分かりづらかったのを改善。画面上部・時計の真下に「🏝 ○○島」と小さく常時表示するようにした。プレイの邪魔にならない控えめな配置で、移動・はじめから・つづきからのいずれでも自動で切り替わる。" },
    { tag:"imp", t:"こっこGP：コースアウトしてもハンドルが効くように調整", d:"土の上にはみ出すと失速でハンドルがほとんど効かず、コースへ戻るのが大変だったのを改善。コースアウト中は操舵力を底上げして、ゆっくりでも確実に切り返せるように。さらに路肩の傾斜のように車体を道側へやさしく引き戻すアシストを追加し、ストレスなくコース復帰できるようにした。" }
  ]},

    { tag:"end", t:"「振る（こっこシェイク救出 ／ /shake/）」サービス終了のお知らせ", d:"いつも畜物語で遊んでくださり、本当にありがとうございます。誠に勝手ながら、このたび 加速度センサーをシェイクしてZ軸の奥へ進む救出ゲーム「振る（こっこシェイク救出）」のサービスを終了いたしました。スマホを振って楽しんでくださった皆さまには、心よりお詫び申し上げます。ごめんなさい。これからも畜物語をどうぞよろしくお願いいたします。" },

    { tag:"end", t:"「合体（コッコマージ ／ /merge/）」サービス終了のお知らせ", d:"いつも畜物語で遊んでくださり、本当にありがとうございます。誠に勝手ながら、このたび つみあげ合体パズル「合体（コッコマージ）」のサービスを終了いたしました。コツコツ大きなこっこを育てて楽しんでくださった皆さまには、心よりお詫び申し上げます。ごめんなさい。これからも畜物語をどうぞよろしくお願いいたします。" },
    { tag:"imp", t:"サッカー3D：スマホ操作対応＋公式こっこちゃんSVGを採用（敵はブラックこっこちゃん）", d:"スマホで遊べなかったサッカー3Dにタッチ操作を追加。左下のバーチャルスティックで移動、右下のKICKボタンでシュート、画面ドラッグでカメラ回転。さらにカプセル人形だったプレイヤーを公式こっこちゃん（/chikumo.svg）のビルボードスプライトに、AIゴールキーパーをブラックこっこちゃん（ダーク染め＋わるい目）に差し替え。", li:[

    { tag:"imp", t:"畜史にも🔄強制更新ボタンを追加", d:"畜史（このページ）は反映に時間差が出ることがあったため、トップと同じ「さいしんに更新」ボタンを右下に設置。キャッシュ削除＋ServiceWorker解除＋キャッシュバスター付き再取得で、最新の更新履歴をすぐに確認できるように。" },
    { tag:"end", t:"「島ぐらし2（こっこの森2 ／ /mori2/）」サービス終了のお知らせ", d:"いつも畜物語で遊んでくださり、本当にありがとうございます。誠に勝手ながら、このたび「島ぐらし2（こっこの森2）」のサービスを終了いたしました。楽しみにしてくださっていた皆さま、遊んでくださった皆さまには、心よりお詫び申し上げます。ごめんなさい。なお「島ぐらし（こっこの森 ／ /mori/）」はこれまで通りお楽しみいただけます。これからも畜物語をどうぞよろしくお願いいたします。" },
    { tag:"feat", t:"こっこダービー：島ぐらし由来の🫧酸素ゲージを追加", d:"島ぐらしの「酸素ゲージ」をサッカーに移植。シュートは酸素を消費する“必殺シュート”になり、ゲージが満ちているほど威力アップ（軌跡も光る）。酸素が切れるとへなちょこシュート（💨酸素ぎれ）に。酸素は時間でじわっと自然回復。ピッチには🫧酸素ボンベが定期出現し、先に触れた方が一気に満タン＝こっこ vs ブラックこっこの取り合いが熱い。両者にゲージHUD、シュートボタンには残量リング付き。", li:[

    { tag:"new", t:"サッカー3D（/soccer3d/）を追加", d:"島ぐらし2のエンジン（Three.js 0.165.0・手続き的スカイ・toonシェーダー・UnrealBloom+FXAA）を流用した3Dサッカーゲーム。WASDで移動、スペースでキック。AIゴールキーパー・スコアボード・GOAL!演出・スタジアム照明・コーナーフラッグ付き。サーバー不要・単体HTML。" }

<script>
/* こっこちゃん 強制リロード: キャッシュ削除＋ServiceWorker解除→キャッシュバスター付きで最新を取得 */
(function(){
  var btn=document.getElementById('reloadBtn'); if(!btn) return;
  var busy=false;
  btn.addEventListener('click', function(){
    if(busy) return; busy=true; btn.classList.add('spinning');
    var done=false;
    function go(){ if(done) return; done=true;
      var u=location.pathname + '?r=' + Date.now() + (location.hash||'');
      try{ location.replace(u); }catch(e){ location.href=u; } }
    var tasks=[];
    try{ if(window.caches && caches.keys) tasks.push(caches.keys().then(function(ks){ return Promise.all(ks.map(function(k){ return caches.delete(k); })); })); }catch(e){}
    try{ if(navigator.serviceWorker && navigator.serviceWorker.getRegistrations)
      tasks.push(navigator.serviceWorker.getRegistrations().then(function(rs){ return Promise.all(rs.map(function(r){ return r.unregister(); })); })); }catch(e){}
    if(tasks.length){ Promise.all(tasks).then(go).catch(go); setTimeout(go, 1500); }   // 失敗/遅延しても必ずリロード
    else go();
  });
})();
</script>
