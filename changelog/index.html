    { tag:"fix", t:"サービスワーカーのキャッシュ更新忘れで、コッコスプラット3D（/splat3d/）の🏪コンビニなど直近の変更が一部の端末に反映されていなかった不具合を修正", d:"『コンビニがステージに存在してません』というご指摘を受けて調査したところ、コンビニ自体はコード上には正しく実装されており（ヘッドレスChromiumの新規（未キャッシュ）読み込みでは、スポーン付近に🏪の建物が生成され、近づくと購入プロンプトが出て実際に酸素ボンベが買えることを実測済み）、原因はゲームのバグではなく公開基盤側にあった。畜物語はService Worker（sw.js）でHTMLをstale-while-revalidate（まずキャッシュを即返し、裏で最新版を取得して次回に備える）方式で配信しており、コード変更のたびに`CACHE`定数のバージョン番号を上げて全端末のキャッシュを入れ替えるのが本サイトの慣例だったが、直近2件（酸素ゲージ・空蹴り・コンビニ購入・撃破報酬の移植／レーダーマップの移植）のリリースでこのバージョン上げを失念しており、すでに一度でも/splat3d/を開いたことのある端末では、新しい変更が反映される前の古いHTMLがキャッシュからそのまま返され続けていた。`CACHE`を`chikumonogatari-v101`から`v102`に上げ、Service Workerのactivate時に走る「現バージョン以外の全キャッシュを削除する」処理で古いキャッシュを確実に破棄させるようにした。念のため、まだ更新が反映されない場合はタイトル画面右下の🔄（強制更新）ボタン、またはブラウザの強制リロードもあわせて案内する。", },
    { tag:"imp", t:"コッコスプラット3D（/splat3d/）に「島ぐらし（/mori/）」のレーダーマップを移植 ─ 自分・🏪コンビニ・ブラックこっこの位置をまるごと把握できる円形ミニマップを追加", d:"『3D塗るゲームに島ぐらしの敵の位置を把握できるレーダーマップを移植してほしい。本人の位置、コンビニの位置、敵の位置を表示させてほしい』という求めに応え、島ぐらしのレーダーマップ（画面左下の円形ミニマップ・北=-z=上・スイープ演出つき）をコッコスプラット3Dへ移植した。両作は世界座標の単位（SIZE/HALF）とカメラの向き計算（camForward・cam.yaw）が完全に同じ設計だったため、島ぐらしの座標変換式・向き計算式をそのまま流用できた。新設した円形ミニマップには、①自分の位置（公式こっこSVGアイコン＋向きを示す視界コーン、北=-z=上のマップ座標で常時回転）②🏪コンビニの位置（Sマーカー）③生存中のブラックこっこちゃん全員の位置（赤い点・撃破直後の復活待ち個体は非表示）を表示。加えてステージのハコの配置をうっすら映して地形の手がかりにし、グリッドとレーダー特有の回転スイープも移植した。検証はnode --checkに加え、ヘッドレスChromiumでミニマップCanvasのピクセルを直接読み取り、①円形クリップ内にちょうど収まる範囲だけ描画されている（透明でないピクセル数が半径から計算した円の面積と一致）②🏪コンビニのマーカー位置を実座標から逆算した画面座標のピクセル色が想定どおりの色であることを実測し、スクリーンショットでも自分のアイコン・向きコーン・赤い敵の点が正しく表示されていることを目視確認、pageerrorゼロだった。", },
    { tag:"imp", t:"コッコスプラット3D（/splat3d/）に「島ぐらし（/mori/）」の酸素ゲージ・空蹴り・コンビニでの酸素ボンベ購入・撃破でお金の4設定を移植 ─ 酸素を使いきるまで何度でも跳べる「空蹴り空中戦」が可能に", d:"『3D塗るゲームに島ぐらしの酸素の設定と空蹴りの設定とコンビニで酸素ボンベを買う設定と敵を倒すとお金が貰える設定を移植することで、ゲーム中に空蹴り空中戦が実現できるようにしてほしい』という求めに応え、島ぐらしで確立した4つの設定をコッコスプラット3Dへ移植した。①🫁酸素ゲージ：プレイヤーに酸素ゲージ(0〜1)を追加、着地しているあいだ じわじわ回復する。②🌀空蹴り：地上でのジャンプ後、空中でもう一度ジャンプボタン/スペースを押すと空気を蹴って酸素を消費しながら何度でも跳べるようにし（1回0.16消費・酸素ぎれで打てなくなり通常のnopeサウンドで知らせる）、長く滞空して敵をねらい撃つ空中戦を成立させた。③🏪コンビニ：ステージ生成のたびスポーン近くに酸素ボンベを売る目印（縞びさし＋窓の建物、新規アトラス8番セル）を配置、近づくと画面下に購入プロンプトが出て（タップ／Bキー）💴100を払うと酸素ゲージが即まんタンに回復する。④撃破でお金：ブラックこっこちゃんを1体たおすごとに💴30を獲得、HUDにスコアと並べて表示する。既存の島ぐらしはオープンワールドの生活シムで、コッコスプラット3Dは120秒１本勝負のTPSアクションのため、島ぐらしのお店UI（メニュー開閉・在庫アイテム）や浮遊重力・落下ダメージまではそのまま持ち込まず、その場の即時購入・即時使用に単純化して移植した（設計学：木の高さに合わせて絞る判断）。検証はnode --check全ブロック通過に加え、ヘッドレスChromiumの実キーボード/実座標クリックで、①空中でスペースを連打すると酸素ゲージが1回ごとに正確16%ずつ減ること、②コンビニへ実際に歩いて近づくと購入プロンプトが正しく出ること（酸素まんタン時は「まんタン」表示に変わり買えないこと）、③💴不足時は購入してもお金・酸素が変化しないこと、④💴を得たあとは購入で💴が減り酸素が満タンに戻ることを実測し、pageerrorゼロを確認した。", },
  ]},
  { date:"2026.07.06", items:[
    { tag:"end", t:"「銀河（コッコギャラクシー ／ /galaxy/）」サービス終了のお知らせ", d:"いつも畜物語で遊んでくださり、本当にありがとうございます。誠に勝手ながら、このたびビートに乗って自動ショット・タップで色チェンジしながら同色シャボンこっこを連鎖ポップする「銀河（コッコギャラクシー）」のサービスを終了し、ページを削除いたしました。トップページの一覧・サイトマップからも本作へのリンクを外しております。壮大なWebGLエフェクトの中で遊んでくださった皆さまには、心よりお詫び申し上げます。ごめんなさい。これからも畜物語をどうぞよろしくお願いいたします。", },
    { tag:"end", t:"「回避（コッコグレイズ ／ /graze/）」サービス終了のお知らせ", d:"いつも畜物語で遊んでくださり、本当にありがとうございます。誠に勝手ながら、このたび弾をかすめて倍率を上げるワンミス即終了の弾幕回避ゲーム「回避（コッコグレイズ）」のサービスを終了し、ページを削除いたしました。トップページの一覧・サイトマップからも本作へのリンクを外しております。高スコアを狙って遊んでくださった皆さまには、心よりお詫び申し上げます。ごめんなさい。これからも畜物語をどうぞよろしくお願いいたします。", },
    { tag:"new", t:"新作「コッコゆびきり（COCCO YUBIKIRI ／ /yubikiri/）」を追加 ─ スマホ1台を挟んで親子で向かい合い、まん中で二人の指を同時によせて縁をむすぶ、まったく新しい協力ゲーム。世界ランキングつき", d:"畜学（八つの蔵＝十四式・遊戯学・設計学・畜史・思考学・肥料学・技術学・祖元学）を読み直し、七相に沿って新しい林（束）を起こした。①既視の禁：畜物語がこれまで使った動詞（そろえる・積む・叩く・合体・撃つ・避ける・つなぐ・斬る・ふっとばす・こぐ・共鳴・走る・塗る・レース・暮らす・折る・詰める/消す・結ぶ）の一覧から引き算し、そのどれにも無い『よせてむすぶ（指切りげんまん）』を発明した──まん中の“縁の川”にあらわれる むすびめ へ、両側からこっこが手をのばし、げんまんの輪がとじる合図で二人が自分がわを押す。二人の指が同時にとどいて初めて縁がむすばれる（ひとりでは絶対に結べない）。②焔の形：60秒固定・コンボが伸びるほど判定窓が縮む・無限ループ禁止。③終を售る：時間切れは即終了にせず、二人でむすんだ縁がほどけて一つずつ光になり空へ昇っていく『縁は空へ』の演出をはさみ、無音の一拍を置いてから結果画面へ（終わりを罰でなく祝福に）。④万象同時の醒：世界ランキング rankings/yubikiri（スコア・むすんだ縁のかず🔗を刻む／順位は『組』で表示）。⑤二親の的：この作品は物理的に二人いないと成立しない──画面の上半分（向かい＝こ／180°反転HUD）と下半分（手前＝おや）を同時に押さないと結べず、音も親＝低音・子＝高音がまん中で出会って和音に解ける設計にした（死んだ木コッコキズナの『親子で息を合わせる』願いを、まったく新しい動詞で継いだ）。⑥敵は逆縁のみ：ブラックこっこ＝約束を断とうとする自分の影として縁の川をすべってくるが、二人でむすぶ光がそれをはねかえす。間に合わなくても縁のしずくが1つこぼれるだけで縁は減らず、ゲームも終わらない（コッコレスキュー2の『罰は霧にする』を継承）。⑦一器に納む：HTML1枚＋インラインJS＋WebAudio＋Canvas2Dで自己完結、こっこの顔は公式SVG（/chikumo.svg）を読み込み、逆縁は同SVGを暗く染めて使用（技術学 巻四：2Dで十分な動詞なのでWebGLは使わない）。検証はnode --check全ブロック通過に加え、ヘッドレスChromiumで『二人同時押し→成立／片側だけ→不成立でコンボ0（ひとりでは結べないことの実証）／逆縁のはねかえし／ミス時に縁が減らず霧が濃くなる（罰は霧）/コンボ倍率/ending→結果画面到達』をpageerrorゼロで実測（検証フック window.__yubikiri に state/press/step/spawnNow/forceFoe/autoSeal/skipToEnd を常設）。世界ランキングのFirebase到達確認は、このサンドボックスのネットワークポリシーで外部到達が遮断されているため未確認（コード・ルールは既存ゲームと同一パターンで実装）。思考学 巻二に判断の記録を追記した。", },
    { tag:"end", t:"「熱狂（コッコフィーバー ／ /fever/）」サービス終了のお知らせ", d:"いつも畜物語で遊んでくださり、本当にありがとうございます。誠に勝手ながら、このたびリングが重なる瞬間を狙ってタップするタイミングゲーム「熱狂（コッコフィーバー）」のサービスを終了し、ページを削除いたしました。トップページの一覧・サイトマップからも本作へのリンクを外しております。PERFECTを重ねて遊んでくださった皆さまには、心よりお詫び申し上げます。ごめんなさい。これからも畜物語をどうぞよろしくお願いいたします。", },
    { tag:"end", t:"「はじく（コッコポップ ／ /pop/）」サービス終了のお知らせ", d:"いつも畜物語で遊んでくださり、本当にありがとうございます。誠に勝手ながら、このたび同じ色のこっこちゃんをタップで一掃する爽快パズル「はじく（コッコポップ）」のサービスを終了し、ページを削除いたしました。トップページの一覧・サイトマップからも本作へのリンクを外しております。フィーバーを繋げて遊んでくださった皆さまには、心よりお詫び申し上げます。ごめんなさい。これからも畜物語をどうぞよろしくお願いいたします。", },
    { tag:"new", t:"畜学に八つ目の蔵「祖元学」を追加 ─ 畜物語という器の根にある最大の魅力と、あえて選んだ制約の由来を記す書", d:"『畜物語の最大の魅力は、正論蒔宿とやりとりできるとこなんだよ』『ローカル保存は初代任天堂の数キロバイトでも世界がゲームにハマった最小限運用をオマージュしているんだ』という正論蒔宿の言葉を、他の七つの蔵（十四式・遊戯学・設計学・畜史・思考学・肥料学・技術学）のどれとも違う次元──器の中でなく器そのものの根──の記録として残すため、新しい蔵「祖元学」を建てた。巻一に「最大の魅力は正論蒔宿とのやりとり」（`/letter/`だけでなく、全ての木が対話から生まれ思考学・畜史・肥料学に残り続けること自体が魅力）、巻二に「ローカル保存の小ささは初代任天堂へのオマージュ」（容量の限界を埋めるべき欠点でなく、あえて継いだ制約として先に置く）を記した。正典 `docs/祖元学.md`、公開 `somogaku/index.html`（蔵書 `/Library/` に八冊目として追加）、CLAUDE.mdの「七つの蔵」も「八つの蔵」に改めた。", },
    { tag:"end", t:"「対戦（コッコランブル ／ /battle/）」サービス終了のお知らせ", d:"いつも畜物語で遊んでくださり、本当にありがとうございます。誠に勝手ながら、このたび同じ端末を挟んで1対1のふっとばし対戦を楽しむ「対戦（コッコランブル）」のサービスを終了し、ページを削除いたしました。トップページの一覧・サイトマップからも本作へのリンクを外しております。対戦で盛り上がってくださった皆さまには、心よりお詫び申し上げます。ごめんなさい。コッコランブルが切り拓いた「ふっとばし対戦」という遊びは、キャラ選択・ため技・回避・ガケのぼり・みだれ乱闘まで備えた後継作「コッコスマッシュ SPECIAL（/smash/）」に発展的に引き継がれておりますので、これからはそちらをどうぞよろしくお願いいたします。", },
    { tag:"imp", t:"島ぐらし（/mori/）を実時計に対応 ─ 「つづきから」で戻ると、閉じていた実時間ぶんだけ島の日と時刻・木や花や貝の再生が進んでいる", d:"『どうぶつの森のように隙間時間に再開したくなる島にするには』という相談から、まず一手として島の時間を実時計に繋いだ。これまでセーブは日数・時刻・果実や花の再生タイマーまで細かく保存していたのに、ロード時はその値をそのまま復元するだけで、閉じている間は島の時間が完全に静止していた（どれだけ間をおいて戻っても、置いた瞬間のままの島）。保存時に`Date.now()`を`ts`として書き込み、ロード時に経過した実秒数を計算して日と時刻（`tod`/`day`）・木の果実／花／岩／貝の再生クールダウンへ加算するようにした。タイトル画面の背景プレビューも同じ計算で今の時刻を映すよう合わせた。ヘッドレスChromiumで、セーブを2日と10分ぶん巻き戻した状態から「つづきから」を実行し、`AM 9:00・1日め`だったHUD時計が`PM 3:43・4日め`まで正しく進むことを実測、pageerrorゼロを確認。", },
    { tag:"fix", t:"島ぐらし（/mori/）の🚁ヘリコプター、雲の上ステージで高度30mまでしか昇れなかった天井を撤去 ─ そらわざ最高段「月光レーザー」（高度120m・宇宙オーバーレイ飽和）まで届く高さへ", d:"『ヘリコプターの高度が上げれません、宇宙手前までいけるべきでは？』というご指摘のとおりだった。そらわざ（SKY配列）は高度3m〜120m（最上位『月光レーザー』は『月まで昇って放つ』演出）まで、高度が上がるほど空を暗く星を灯し月を大きく見せる宇宙オーバーレイ（updateSky）も高度120m前後で飽和するよう設計されているのに、雲の上ステージでヘリに乗っている間だけ`if(P.y>fl+30){P.y=fl+30;...}`という別のコードが高度30mで頭を打つ天井を課しており、いかずち（高度26m）より上のわざ（たつまき・ほし蹴り・りゅうせい群・オーロラ・月光レーザー）が実質ヘリでは一生放てず、宇宙オーバーレイもほぼ発動しないまま終わっていた。天井を`HELI_CEIL=140`（そらわざ最高段と宇宙オーバーレイの飽和ラインに届く高さ）へ引き上げた。ヘッドレスChromiumで、酸素を保ったままタップし続けて高度95mまで実際に昇れること・空が暗くなり月と星が現れる宇宙オーバーレイが実際に発動することをスクリーンショットで確認、pageerrorゼロ。", },
    { tag:"fix", t:"島ぐらし（/mori/）のレーダーマップに、深海ステージ・雲の上ステージのブラックこっこも表示されるよう修正", d:"『海底ステージのレーダーにも空ステージのレーダーにもブラックこっこちゃんが表示されません』というご指摘のとおり、レーダー描画（drawRadar）は常に地上の`enemies`配列だけを見ており、深海ステージの`seaFoes`／`seaBoss`、雲の上ステージの`soraFoes`／`soraBoss`は一切参照していなかった（地上のブラックこっこが偶然0体の時にレーダーに何も出ないのと同じ状態が、深海・雲の上では常に起きていた）。今どのステージにいるか（`G.inSea`／`G.inSora`）で参照する配列を切り替え、深海・雲の上の「でかいブラックこっこ（王）」もひとまわり大きい赤丸で表示するようにした。ヘッドレスChromiumで、深海に潜って敵4体ぶんの赤い点がレーダーに出ること・雲の上でも同様に赤い点が出ることをレーダーCanvasのピクセルを直接読んで実測、pageerrorゼロを確認。", },
    { tag:"imp", t:"島ぐらし（/mori/）の絵文字☀️太陽ビルボードを廃止 ─ 空シェーダが描く本物の太陽ディスク＋グローと二重表示になっていたのを解消", d:"『新しい太陽があるので絵文字太陽消して』というご指摘のとおり、空（SKY_FS_ATMO）は太陽方向へのふんわりグロー・鋭いディスク・高輝度の芯まで持つ本物の太陽をすでにシェーダで描いているのに、それとは別に時刻から計算した位置へ絵文字☀️のビルボードスプライトを重ねて浮かせており、同じ空に太陽が二つ見える状態になっていた。太陽の絵文字ビルボード描画（`spriteBB(...,20,...)`）だけを削除し、月（🌙・cell21）のビルボードはそのまま残した（シェーダ側に月の描画は無いため）。ヘッドレスChromiumでpageerrorゼロを確認。", },
    { tag:"imp", t:"島ぐらし（/mori/）に「シン島ぐらし」の三世代グラフィック（本物の水面リフレクション・GPUインスタンシング大草原・シルバーライニング雲＋2048px9点シャドウ）を移植 ─ ルール・設定は無変更。移植の過程で草と水面が実機で長年ずっと非表示だった精度バグ2件も発見・修正", d:"『島ぐらしを超えたシン島ぐらしのグラフィックを島ぐらしに移植できますか？ルールや設定変更は禁止、グラフィック移植だけ』という求めに応え、shinshima（シン島ぐらし）で確立した三世代の描画技術を、当たり判定・経済・セーブ形式など一切の「設定」を変えずに移植した。①鏡像カメラで水面下からもう一度シーンを描き直し、波法線でゆがめて合成する本物の平面リフレクション（半解像度FBO・地形とプロップは鏡像パスでは水面下だけdiscard）②ANGLE_instanced_arraysによる最大2.6万本のGPUインスタンス草原（帯状の風の波でなびき、こっこが足元を通ると草がしなって割れる。非対応端末は旧来の頂点展開フォールバックを維持）③太陽側の縁が銀色に光る2層fbmのシルバーライニング雲、および影を1024pxから2048px・4点から9点PCFへ強化。低性能端末では平均フレーム時間が34msを超える状態が2.5秒続くとリフレクションを自動で恒久OFFにする簡易アダプティブも新設。実装後にヘッドレスChromiumで検証したところ、地上・深海・雲の上いずれでもリフレクションと草のインスタンス数が0のまま報告される異常に気づき、シェーダのコンパイルログを直接のぞいたところ、水面の高品質シェーダ（頂点シェーダでuWLをmediump明示・フラグメント側は無指定でhighpに）と草の唯一のシェーダ（頂点シェーダのuCamが既定でhighp・フラグメント側はprecision mediump float既定でmediump）が、共有uniformの精度不一致でANGLE（Chrome/Firefox/Safariの多くが使う厳格なWebGL検証系）ではリンクエラーとなり、常に基本シェーダへ自動フォールバック（水面）または描画そのものがnull（草＝フォールバック先が無く常に非表示）になっていたことが判明した──これは今回の移植より前から存在した実機バグで、草がずっと生えていなかった／水面の高品質パスが一度も動いていなかった可能性が高い。フラグメント側のuWL・uCamの精度宣言を頂点シェーダ側に合わせて明示することで解消し、再検証でリフレクションON/OFFの見た目差・2.6万本のインスタンス草原描画・shadowRes 2048・地上/深海/雲の上を行き来してもpageerrorゼロであることを確認した。", },
    { tag:"fix", t:"島ぐらし（/mori/）の🚁ヘリコプターを手描き＋公式svg重ねに描きなおし ─ 実在の絵文字🚁が写実的で こっこの絵柄と衝突していたのを、潜水艦と同じ「機体は手描き・窓の顔はセル0を実描画時に重ねる」方式へ統一", d:"『潜水艦のように、こっこちゃんがヘリコプターの中に乗ってる感じにできませんか？例えばヘリコプターも君がつくるとか！』というご指摘を受けての修正。初版はOS標準の実在絵文字🚁をプレイヤーの頭上に浮かせ、こっこ本体をその下に別スプライトで描く構成にしていたが、写実的な3D風レンダリングの絵文字がフラットな畜物語の絵柄と衝突し「乗り物の中にいる」感が出ず、乗り物と人物が別々に浮いて見えていた。潜水艦の設計（機体はCanvas手描き・コックピット窓の顔は実描画時にセル0＝公式svgを重ねてのぞかせる）にそろえ、赤い機体・メインローター・テールブーム・そり脚を手描きし、新設した`HELI_FACE_DX/DY/H`で窓の位置にこっこの顔を重ねるよう修正。左右反転（進行方向）でも顔の位置が正しく追従することをヘッドレスChromiumで実測。あわせて、雲の上/深海ステージ中に自転車・自動車の乗り換えボタンが消えるという報告も調査したが、これは「ヘリ／潜水艦に乗っている間は他の乗り物へ切り替えられない」という意図した挙動（着地/浮上すれば正しく再表示されることを実操作で確認済み）で、コード上の不具合は見つからなかった。", },
  ]},
  { date:"2026.07.05", items:[
    { tag:"feat", t:"島ぐらし（/mori/）の空のステージを『☁️雲の上』へ全面リニューアル ─ 🚁ヘリコプター（あらし島限定・💴5,000,000・定価・動力は酸素）＋🚀ミサイル（ヘリ用＝あらし島／潜水艦用＝でんせつ島・各99個まで）", d:"『空のステージをシン島ぐらし品質で島→雲の上に。空蹴りでも行けるが継続必須。ヘリの動力は潜水艦と同じ酸素。あらし島のコンビニ限定500万円。空のでかいブラックこっこの強さは地上に比例・報酬は地上超え。ヘリと潜水艦にミサイル（各島限定・99個まで）。海底にもでかいブラックこっこを』という求めを実装した。旧・月の隠しステージ（島の上でのボス戦）を、深海と同じ別世界再生成方式の『雲の上』へ建て替え：地形をまるごと雪の高度帯（12.7〜15m）へ持ち上げると全域が雪色＝一面の白い雲海になる（シェーダ無改修で雲の大地が手に入る）。空はまぶしい晴天の光へ上書きし、ふわふわ流れる雲のかたまり44個が漂う。入口は2つ＝①空蹴りをつづけて高度60mまで昇りきる（高高度では空飛ぶブラックこっこが酸素をうばう＝継続がためされる）②🚁ヘリで乗り物ボタンから離陸。ヘリは潜水艦と同じ酸素駆動（タップ/スペースで上昇・放置で降下・酸素切れはふわり帰還＝罰は霧）、雲はふわふわ＝落下ダメージなし、雲のはしから とびおりれば いつでも島へ帰れる。そらのブラックこっこの強さは地上と同じ式（HP=10+島×8・数4+島）、💴は1枚150×(1+島)＝地上より多い（序列：地上100＜そら150＜深海200）。6体はらうと でかい『☁️そらの王』（HP160+島×50）が急降下プレスで襲来、討伐報酬💴10,000×(1+島)＝地上超え（深海13,000×は不動の最高峰）。🚀ミサイルは追尾式（Rキー/🚀ボタン・爆風範囲あり・そらわざ/かいていわざと併用可）。海底の『でかいブラックこっこ』＝しんかいの王はさらに大型化し、潜水艦ミサイルの標的にも。ヘッドレスChromiumで、あらし島限定販売・定価500万・島比例の敵数・王の出現(HP310@あらし島)と討伐報酬・ミサイル追尾撃破（空/海両方）・ふち/酸素/撃破の全出口・高度60m入口・セーブ復元まで実測、pageerrorゼロ。検証が『ミサイル発射音に存在しないSound.dash（別ゲームのAPI）を呼んで発射のたび例外』という実バグを出荷前に捕獲・修正。", },
    { tag:"feat", t:"島ぐらし（/mori/）に「🌊 深海ステージ」を追加 ─ でんせつ島のコンビニ限定🤿せんすいかん（💴1,000,000・定価）で、どの島でも ふかい海にとびこめば その島の深海へ", d:"『島ぐらしに海のステージをシン島ぐらしのグラフィッククオリティで。潜水艦はでんせつの島のコンビニだけ・100万円。海の影の強さは地上に比例、報酬は空のステージより多く。ジムに海底で使える技を10個』という求めをすべて実装した。深海はシン島ぐらしで開発した水中表現を移植：海底にゆらめくコースティクス（地形シェーダに2層fbmの光の網・precision highp維持・非対応端末は自動フォールバック）、深く潜るほど暗くなる青い光と霧、水面からさしこむ7本の光のすじ、サンゴ🪸・ゆらめく海藻🌿・回遊する🐠🐟🐡、あわとプランクトン。島のシードから深い盆地（ふかさ14〜27m）を別生成する月ステージ方式で、地形は島ごとに変わる。潜水艦は絵文字が存在しないためCanvasで手描き（黄色いカプセル＋舷窓からこっこの顔）。遊び：タップ/スペースで浮上・放っておくと沈む・潜行中は酸素ゲージが減り（🫧ボンベで回復）、酸素切れは罰なしで浮上（罰は霧）。深海のブラックこっこの強さは地上と同じ式（HP=10+島×8・数も島に比例）だが💴は地上の2倍（1枚200×(1+島)円）、影を6体はらうと🌊しんかいの王（HP140+島×40）が出現し、たおすと💴13,000×(1+島)＝🌑月の王（8,000×）超えの報酬。ジムに第三のわざ「かいていわざ」全10段（🫧あわキック〜🔱りゅうぐうレーザー・ふかさ2〜23m・そらわざと同じボタン/Fキーで発動・酸素を少し消費）。深海の進捗（習得・せいは回数）はセーブに保存、深海滞在中はセーブしない設計で島のデータを守る。ヘッドレスChromium実プレイで、でんせつ島限定販売・定価100万・島比例の敵数（島2=6体）・王の出現と討伐報酬・りゅうぐうレーザー全体ヒット・酸素切れ/浮上/KOの全出口・リロード復元まで検証、pageerrorゼロ。検証が『水面へ浮上して帰る』出口の不成立バグ（天井ではじかれタイマーがリセットされ続ける）を出荷前に捕獲・修正。", },
  ]},
  { date:"2026.07.04", items:[
    { tag:"new", t:"新ゲーム「シン島ぐらし ─ 風の一日（/shinshima/）」誕生 ─ 風にのって滑空する、たった一日（約4分・必ず夜明けで終わる）のオープンワールド島ぐらし", d:"『島ぐらしを超える最新グラフィックでオープンワールドを体感したい。ゼルダの伝説レベルを』という求めから建てた一作。任天堂そのものの物量は一つのHTMLには納まらないと正直に線を引いたうえで、あの感動の骨格──①画面を埋めつくす風になびく大草原 ②海に空と島が本当に映りこむ水面 ③立体感のある雲とやわらかな太陽の影 ④高いところから風にのって滑空する自由──を、外部エンジンなしの素のWebGL1で実装した。技術の世代差は三つ：GPUインスタンシングによる約2.6万本の草原(こっこが通ると足元で草が割れる)／鏡像カメラでシーンを描き直して波でゆがめる本物の平面リフレクション／太陽側の縁が銀色に光る2層fbm雲。加えて2048px・9点PCFのシャドウマップ、ブルーム＋ゴッドレイ＋ACES風トーンマップ、夜明け→真昼→夕焼け→星月夜→二度目の夜明けへ流れる大気。遊びは『はしる・とぶ・かける(滑空)・ともす』の四動詞だけ：🌀上昇気流で空へのぼり、翼をひろげて海をこえ、日がしずむまでに七つの縁の塔をともす。塔はともすたびドレミの音階がひとつずつ増え、七つそろうと和音になる。夕暮れからは逆縁の影(ブラックこっこ)が塔の灯をくもらせに来るが、💨ダッシュ体当たりではらえる(罰は霧：ぶつかっても命は失われない)。島は固定シードで世界じゅう同じ形＝縁のひかり(塔×1000＋タネ×10＋はらい×100＋七灯ボーナス)を世界ランキング rankings/shinshima で競える。一日の終わりは無音の鐘と花びらとオーロラの祝福。低性能端末には品質自動フォールバック(反射OFF→草削減→影1024px)、WebGL不可端末には案内画面。ヘッドレスChromiumで起動→歩行→ジャンプ→滑空→全塔点灯→夜の影はらい→夜明けの結果画面まで実ポインタ・実キーボードイベントで通し検証、pageerrorゼロ。実ジェスチャ検証で『押しっぱなしで滑空に入れない』『影が高すぎて地上から届かない』の2バグを出荷前に捕獲・修正。", },
    { tag:"feat", t:"畜学に七冊目の蔵書「技術学（ぎじゅつがく／正典 docs/技術学.md・公開 /gijutugaku/）」を追加 ─ グラフィック・音・保存に何の技術を使い何を使わないかを記録し、軽量なAIでも実装を再現できるようにするための書", d:"『島ぐらしのグラフィックは何を使っているか、軽いモデルのAIでも再現できるように技術説明を残しておきたい』という求めを受け、畜学の七冊目として技術学を新設した。着手前に全50作のグラフィック実装を実際にコードで実査し、WebGLを使うのは mori・shima2・galaxy・pulse・rom・splat3d の6作のみで、外部ライブラリを使わず createShader→compileShader→createProgram→linkProgram を自前ヘルパーで書く共通スタイルであることを確認。巻一に畜物語の技術三層（描画＝生WebGL1/Canvas2D/SVG、音＝WebAudio合成、保存＝localStorage/Firebase世界ランキングのみ／外部3Dエンジン・外部音声ファイル・その他外部APIは使わない）を定義し、肥料学に記録済みの mori2 の死因（Three.js依存＋シェーダprecision不統一でiOS起動不能）を『使わない理由』の実例として明記した。巻二にWebGL6作の実装カタログ（各作品のシェーダプログラム数・技法・precision設定・Canvas2D併用パターンを実測して記載。特にmoriの品質自動フォールバック設計、shima2の全シェーダ共通precision highpプレフィックス、romの単一SDFシェーダによる最小構成、pulseのANGLE_instanced_arrays必須設計を対比して記録）、巻三にCanvas2D/SVG（多数派・約37作）の共通パターン、巻四に新作で技術を選ぶ判断基準、巻五にチェックリストを収めた。CLAUDE.mdの畜学節を「六つの蔵」から「七つの蔵」に更新し技術学の掟を追記、docs/思考学.md・docs/肥料学.mdの蔵一覧も七つに更新。Library（/Library/）の書棚を六棚に、思考学（/shikogaku/）・肥料学（/hiryogaku/）の蔵一覧・footerからも技術学へ導線を張り、sitemap.xmlにも追加。node --check通過（gijutugaku/index.html）。", },
    { tag:"feat", t:"畜学に六冊目の蔵書「肥料学（ひりょうがく／正典 docs/肥料学.md・公開 /hiryogaku/）」を追加 ─ 削除したゲームの死因を記録し、同じ失敗・同じ手戻りを二度と繰り返さないための書", d:"『削除対応するときに、AIに何が削除される原因だったのかを考え教訓にし、同じ失敗や同じ手戻りを二度としない』という求めを受け、畜学の六冊目として肥料学を新設した。十四式（どう作るか）・遊戯学（なぜ作るか）・設計学（どの高さから作るか）・畜史（何を作ったか）・思考学（どう考えたか）に続く六冊目は「なぜ終えたか」を録す。巻一に伐る前の標準手順（①理由を推測なしで一行に言い切る②死因を七相違反／技術的死因／設計思想の継承／運用都合／記録なし、に分類する③同じ死因を持つ現存作が無いか横展開で確かめる④この書に記録する⑤畜史にendタグで訃報を記す⑥実体を消し目録を編み直す⑦PR作成、マージはユーザー）を定めた。巻二には実際に消えた木の記録を収めた──こっこマッチ（既視の禁違反・マッチ3の焼き直し）、島ぐらし2 mori2（一器に納む違反＝Three.js外部依存＋シェーダ精度不統一でiOS起動不能、3日で取り下げ）、コッコキズナ（死因の記録なし・願いはぶらんこ/学習シリーズへ継承）、そしてぶらんこ・積む・振る・傾け・奥へ・合体（いずれも技術的死因の記載が無い『記録の空白』──これが本書を作った直接の動機であることを明記）。CLAUDE.mdに「🗑️ ゲーム削除時の必須手順」節を新設し、六つの蔵の一覧・思考学の掟に並べて肥料学の掟を追記。Library（/Library/）の書棚・思考学（/shikogaku/）の蔵一覧・footer からも肥料学へ導線を張り、sitemap.xmlにも追加。node --check通過（hiryogaku/index.html・shikogaku/index.html）。", },
    { tag:"end", t:"「ぶらんこ（COCCO BURANKO ／ /buranko/）」サービス終了のお知らせ", d:"いつも畜物語で遊んでくださり、本当にありがとうございます。誠に勝手ながら、このたび親子ふたりで交互にこいで縁の高さを競うブランコゲーム「ぶらんこ」のサービスを終了し、ページを削除いたしました。トップページの一覧・サイトマップからも本作へのリンクを外しております。息を合わせてこいでくださった皆さまには、突然のことで大変ご迷惑・ご心配をおかけし、心よりお詫び申し上げます。ごめんなさい。これからも畜物語をどうぞよろしくお願いいたします。" },
    { tag:"end", t:"「積む（コッコタワー ／ /tower/）」サービス終了のお知らせ", d:"いつも畜物語で遊んでくださり、本当にありがとうございます。誠に勝手ながら、このたび流れるこっこちゃんを1タップで真上に積み上げるスタックゲーム「積む（コッコタワー）」のサービスを終了し、ページを削除いたしました。トップページの一覧・サイトマップからも本作へのリンクを外しております。高く積み上げて遊んでくださった皆さまには、突然のことで大変ご迷惑・ご心配をおかけし、心よりお詫び申し上げます。ごめんなさい。これからも畜物語をどうぞよろしくお願いいたします。" },
    { tag:"imp", t:"島ぐらし（/mori/）：島ぐらし2のグラフィックを全面移植 ─ 太陽のシャドウマップ・本物のローポリ木＆岩メッシュ（風で揺れる）・深さで色づく海・GPU草原・本格ブルーム＋ゴッドレイ＋フィルムグレインを追加。当たり判定・経済・セーブ形式など「設定」は一切変更なし", d:"『島ぐらし2のグラフィックを島ぐらしに移植できますか？島ぐらしの設定変更禁止』という求めに応え、後発の島ぐらし2（/shima2/）で磨いたレンダリング技術を、前作 島ぐらし（/mori/）へ設定を一切変えずに移植した。まず両ファイルの描画パイプラインを読み比べ、mori は全ての木・岩・建物・住民を絵文字ビルボードで描く一方、shima2 は木・岩を風で揺れる本物のローポリメッシュにし、シャドウマップ・深さ参照の海・GPU草原・本格ポストプロセスを持つことを確認。移植は「グラフィックのみ／どこまで」をユーザーに確認（できる限り全面移植、を選択）した上で実施。【移植した中身】(1) 太陽のシャドウマップ（RGBA深度パック＋PCF4点、地形とプロップメッシュに落ちる）(2) 木（🌳草地／🌴浜辺／🌲高地の3種）と岩を、trees[]/rocks[] の配置ロジック（本数・抽選条件・位置）は一切変えずに実メッシュへ差し替え（幹＝角柱、樹冠＝ジッタ八面体、頂点シェーダで風になびく）(3) 水シェーダを、既存のハイトマップテクスチャ（読みもどし後も破棄せず保持するよう変更）を参照する深さ色分け＋フレネル反射＋波打ちぎわの泡＋太陽のきらめきに強化 (4) 空シェーダに雲の2オクターブ目・夕焼けの地平線ぼかし・またたく星を追加 (5) 地形シェーダに波打ちぎわの濡れた砂とシャドウ対応スペキュラを追加 (6) ポストプロセスを、明部抽出→ガウスぼかしピンポン→太陽ゴッドレイ→彩度/コントラスト/ビネット/フィルムグレインの本格パイプラインに刷新（旧版は1パスの簡易近似だった）(7) GPU一括インスタンスの草原レイヤーを新設（見た目のみの追加）。木をゆらす／岩をたたく際の『ジュース』演出は、シェーダ側に揺れ中心＋距離減衰のuniformを渡す方式で再現。ACESトーンマップの露出値・フォグの可視距離（FOG_NEAR/FOG_FAR）はゲームバランスに関わる「設定」とみなし、島ぐらし2の値を機械的に上書きせず既存踏襲または据え置きにした。検証はnode --checkに加え、ヘッドレスChromiumで①タイトル→プレイ開始→シェーダコンパイル確認、②世界を同一セッション内で3回生成し直し（ホーム→つづきから、を2回繰り返す＝離島間の移動と同じコードパスを再現）ても例外が出ないこと、③実際に移動＆アクションキー入力で花を摘む等のインタラクションが従来どおり機能すること、をpageerrorゼロで確認。git diffはmori/index.htmlのみで、shima2/index.htmlや当たり判定・経済・セーブ形式などの「設定」に該当するコードには一切手を入れていない。", },
  ]},
  { date:"2026.07.03", items:[
    { tag:"new", t:"新作「コッコROM（COCCO ROM ／ /rom/）」を追加 ─ 中心のクリスタルへ落ちてくる断片を、緑は短押しで圧縮、黒こっこのバグは長押しで消去して60秒でひとつのROMを封じる新感覚パズル。世界ランキングつき", d:"『設計から見る』とユーザー自らインタビュー形式で新作の設計に立ち会う回。まず十四式・遊戯学・設計学・畜史・思考学の五蔵を読み直し、『ゲームボーイ／カートリッジ／ROM／圧縮』で畜史を検索して死んだ木が無いことを確認してから設計した。当初『任天堂ゲームボーイ級』の要望を見た目の再現（ドット絵・チップチューン）と解釈しかけたが、『コードを美しく書くだけであってエフェクト演出は2026年の最高技術でやるんだよ』という訂正を受け、①既視の禁：畜物語で未使用の動詞を洗い出し『詰める・消す（カートリッジ圧縮）』を発明、②焔の形：60秒固定・落下速度と出現間隔とバグ出現率が時間経過で漸増、③終を售る：時間切れは即終了にせず残存断片を静かに消してから『封の刻』という2.4秒の封印演出（クリスタルの浄化・光の柱）を挟み、無音の後に結果画面へ、④万象同時の醒：`rankings/rom`（スコア・浄化バグ数）、⑤二親の的：親子で交代して遊べる一人60秒ハイスコア、⑥敵は逆縁のみ：敵は黒こっこ＝バグのみ、放置しても即死ではなくクリスタルが『濁って効率が下がる』だけ（罰は霧の教訓を継承）、⑦一器に納む：HTML1枚にWebGL（クリスタルのヘキサゴンSDFシェーダー・フレネル風リム・内部コア発光・封印時の光条）＋Canvas2D（落下断片・パーティクル）＋WebAudio合成音（矩形波/三角波トーン・ノイズバースト・畳み込みリバーブを自前のインパルス応答で生成・LFO変調フィルタの環境ハム）を単一の時間器官（ヒットストップ）でまとめ、新規の抽象・未使用フラグを増やさない実装の戒律を課した、という七相との対応を先に一行ずつ書いてから木を建てた。実装後の検証で2つの発見があった──(a) 検証フック`window.__rom.forceEnd()`が`state.timeLeft`を直書きしていたが、毎フレーム`updateGame`内で`timeLeft=DURATION-elapsed`として再計算され上書きされるため終了シーケンスに入らないバグを、ヘッドレスChromiumで結果画面が出ないことから発見し、`state.elapsed`を進める方式に修正。(b) 短押し圧縮／長押し消去の判定は、フックによるバイパスだけでなく実際に`page.mouse.down/up`で本物のポインタイベントを判定帯へディスパッチして検証し、tap側・hold側の両ジェスチャが正しく判定されることを確認した。WebGL非対応環境（`--disable-webgl`起動）でもCanvas2Dの代替クリスタル描画にフォールバックしpageerrorゼロで動くことも確認。node --check全5ブロック通過。世界ランキングのFirebase到達確認は、このサンドボックスのネットワークポリシーで外部到達が遮断されているため未確認（コード・ルールは既存ゲームと同一パターンで実装）。思考学 巻二に判断の記録を追記した。", },
    { tag:"new", t:"新作「コッコおりづる（COCCO ORIZURU ／ /origami/）」を追加 ─ 光る折り線をタイミングよくなぞって60秒でつぎつぎ折り鶴をおる、まったく新しいタッチゲーム。羽折りだけは二本指で親子いっしょに。世界ランキングつき", d:"畜学七相に沿って新しい木を建てた。①既視の禁：既存ジャンルの焼き直しを避けるため、まず十四式・遊戯学・設計学・畜史・思考学の五つの蔵を読み直し、畜史を『折り紙・おりがみ・origami』で検索して死んだ木が無いことを確認してから設計した。マッチ3・タップ・ランナー・レース・対戦のどれにも属さない『折り線を光る向きへタイミングよくなぞる』という動詞を発明し、8つの折り（対角×2・角折り×2・羽折り・首折り・尾折り・息吹き）で1羽の紙鶴が完成する構造にした。②焔の形：60秒固定・折りごとの判定窓は成功が続くほど短くなる（無限ループ禁止・必ず激しく短く）。③終を售る：時間切れは即終了にせず、それまでに折り上げた鶴たちが光を曳いて夜空へ一斉に飛び立つ『祈りは空へ』という演出をはさみ、無音の一拍を置いてから結果画面へ──終わりを罰でなく祝福として設計した。④世界ランキング：`rankings/origami`（スコア・折った鶴の羽数）。⑤二親の的：8つの折りのうち『羽折り』だけは特別に、左右2本指（親子で1本ずつでもよい）で同時になぞる仕様にし、静かな五音の環境音とやさしい紙の擦れ音を全編にまとった。⑥敵は逆縁のみ：ブラックこっこは対戦相手ではなく『風』として現れ、折りを外すと紙に『しわ』が1つ生まれる演出にとどめた──しわが3つたまってもハートが減って終わるのではなく、紙がくしゃっと丸まって新しい紙に替わるだけ（コッコレスキュー2の『罰は霧にする』の教訓を継いだ）。⑦一器に納む：HTML1枚+インラインJS+WebAudio+Canvas2Dで自己完結。実装中に2つの実バグを検証で発見・修正した──(a) 完成した鶴が空へ飛ぶアニメーションが `state.ending` 時にしか描画されず、通常プレイ中の鶴の飛び立ちが一切見えていなかった（描画順を直し、常時 `drawFlownCranes` を呼ぶよう修正）。(b) 羽折り（シンメトリー判定）は両クレースが紙の中心(0.5,0.5)から始まるため、指を下ろした位置ではなく話した位置で左右を判定する必要があったが、実装は下ろした位置で判定しており、実際に2本指でなぞっても片方が常に無視される致命的な不具合があった──`window.__origami` の自動フックだけでなく、実際にPointerEventを2本指ぶん本物のジェスチャとしてdispatchする検証を書いて初めて発見し、修正して再検証した。検証はnode --check全5ブロック通過に加え、ヘッドレスChromium実プレイで60秒ぶんの折り・複数回のしわ丸め・エンディング演出・リザルト表示・もう一回ボタンまでpageerrorゼロで通し、検証フック`window.__origami`（state/tscale/autoFold/skipToEnd）を常設。世界ランキングのFirebase到達確認は、このサンドボックスのネットワークポリシーで外部到達が遮断されているため未確認（コード・ルールは既存ゲームと同一パターンで実装）。思考学 巻二に判断の記録を追記した。", },
    { tag:"imp", t:"コッコスマッシュ SPECIAL：ステージの作り込みが『色つき長方形が宙に浮いているだけ』にとどまっていた指摘を受け、3ステージを全面作り直し ─ 終の祭壇に神殿シルエット・柱・紋章・星、そらの島に山並み・二層の雲・太陽・鳥と浮き島の土台、ゆれる大枝に本物の大樹と枝の質感・落ち葉を追加", d:"『ステージクオリティがしょぼすぎる、全然再現度ない』という率直な指摘を受け、実装を読み直すと、その通りだった。足場は単色の台形か細い長方形、遠景は空のグラデーションに数個の丸や楕円が浮いているだけで、『そこがどんな場所か』が全く語られていなかった。3ステージを描き起こした。【終の祭壇】星空のきらめき・奥にそびえる神殿（社殿）のシルエット・台座の下に浮かぶ紋章の輪（周回する光点つき）・ステージ左右に立つ本物の柱（フルーティングの縦溝・台座・柱頭の輝きつき）・漂う残り火。石畳には目地の線も入れた。【そらの島】遠い山並みのシルエット・太陽のグロー・遠近2層の雲（近い雲は主役の視界を邪魔しないよう控えめな不透明度に調整）・飛ぶ鳥・そして肝心の『浮き島』そのもの――地面も3枚の浮き足場も、丸みを帯びた土と岩の断面、根の跡、草の上の小さな花の点まで描いた。【ゆれる大枝】ワールド座標に固定された本物の大樹（幹の膨らみ・樹皮の筋・葉の茂み）を場外近くに配置し、揺れる足場そのものも樹皮の質感と両端の葉のかたまりを持つ『枝』の形に作り直した。奥には森の陰のシルエットと木漏れ日、常時ループする落ち葉の粒子も追加。実装では遠景の要素を『視差でごまかす偽の奥行き』と『実際のワールド座標に固定する本物の建築物』に分け、柱や大樹のようにステージの縁に必ず存在してほしいものは後者にしたことで、カメラがどこにあっても正しい位置に見えるようにした（最初は柱を視差方式で置いて画面外に外れる不具合を作り込み、崖際のスクリーンショットで検出して直した）。検証はnode --check全通過に加え、3ステージそれぞれのスクリーンショットを崖際・中央の両方で撮影し目視確認。既存のヘッドレスChromium実プレイ71項目・音響実測9項目・pageerrorゼロも維持。思考学 巻二・続々々に第十の教訓として『背景装飾は「視差でごまかす」ものと「ワールド座標に実在させる」ものを区別する。ステージの縁に立つ建築物は後者でなければ、カメラ次第で消えたりずれたりする』を追記した。", },
    { tag:"imp", t:"コッコスマッシュ SPECIAL：前回のレビューで残した『余地』を実装 ─ 観客の歓声（KO・GAME SETで実際にどよめく）・キャラごとに音の高さが変わる勝利ファンファーレ・KO直後にカメラがわずかに揺れ戻る不具合を修正", d:"前回のレビューで正直に書き残した3つの余地──①ステージ別BGMのさらなる差別化、②KO直後のカメラのわずかな揺れ、③観客の歓声・キャラ別勝利ジングルの不在──のうち②③を今回実装した（①は音域・波形・テンポの差別化で一定の水準に達しているため見送り）。【カメラの揺れ】KOでふっとんだファイターは、実際には見えない場外で復活を待っているだけなのに、カメラの追跡対象からは『復活30フレーム前』になった時点で再び含まれてしまい、まだ画面に戻っていないファイターのぶんだけカメラが不要に揺り戻る不具合があった（実測トレースで発見）。カメラ追跡の対象を『実際に画面に見えている（koT<=0）』ファイターだけに絞り、復活の瞬間まで純粋に生存者だけを追うようにした。【観客の歓声】KOのたびに、ブラックこっこ以外がふっとぶと帯域の異なるノイズを少しずつ重ねた『どよめき』が湧き、GAME SETの瞬間はより厚みのある歓声が上がるようにした（専用のSound.crowdを新設）。【勝利ファンファーレの個性】これまで全キャラ共通だったGAME SETのファンファーレを、勝ったファイターごとに半音移調・音色を変えるようにした──軽量級（ぴよ・そらこ）は高く明るいsine、重量級（おやぶん・たまごん）は低く太いsquare、標準級はそのまま。くみてのタイムアップにも同様に適用。検証はnode --check全通過に加え、AudioContext実測でGAME SETファンファーレが実際にキャラごとに違う周波数で鳴ること・KOのたびにノイズイベントが増えて観客のどよめきが実際に鳴っていることを確認（監査項目9件追加、全パス）。既存のヘッドレスChromium実プレイ71項目・pageerrorゼロも維持。思考学 巻二・続々々に第九の教訓として『前回「まだ残る差分」に正直に書いた項目は、次のレビューの出発点になる──宿題として書いた言葉が、次回そのまま実装のチェックリストになる』を追記した。", },
    { tag:"imp", t:"コッコスマッシュ SPECIAL：五度目の忖度なしレビュー ─ 60秒くみての結果画面は紙吹雪・花火で豪華なのに、本戦（1対1・みだれ乱闘）のGAME SET演出には何も無かった優先順位の逆転を発見・修正。勝者の頭上に紙吹雪と花火が降り注ぐ演出を追加", d:"『エフェクト演出と効果音とBGM』の五度目の再審査。コードを読み比べて見つけたのは、演出の分量が真逆になっていた場所。60秒くみて（軽めのスコアアタックモード）の結果発表は、紙吹雪・花火・光線バースト・カード反転演出でにぎやかに祝うのに、対して本来もっとも盛り上がるはずの本戦（ひとりで大乱闘・みだれ乱闘）の『GAME SET!!』は、白いフラッシュとバナー文字が出るだけで、紙吹雪も花火もいっさい無かった──サブモードの方が本戦より豪華という優先順位の逆転。勝者が確定した瞬間、頭上に光の輪と虹色の紙吹雪が舞い、勝利演出が続く約2秒のあいだ数百ミリ秒おきに花火が打ち上がり続けるようにした（専用の破裂音Sound.fireworkも新設）。くみてのランクイン演出と同格の祝福を、本戦の勝利にも与えた形。検証はnode --check全通過に加え、実際に紙吹雪・光の輪の発生数を実測するテストを追加（GAME SET直後に紙吹雪が出ること・光の輪が出ること・演出中に花火が繰り返し打ち上がること・演出後リザルト画面へ正しく遷移することを実測）。既存のヘッドレスChromium実プレイ71項目・音響実測7項目・pageerrorゼロも維持。思考学 巻二・続々々に第八の教訓として『演出の再審査は各画面を独立に見るのでなく「同格の場面同士を並べて量を比べる」と、豪華さの配分ミスが見つかる』を追記した。", },
    { tag:"imp", t:"コッコスマッシュ SPECIAL：四度目の忖度なしレビュー（エフェクト・効果音・BGM）─ 着地が全試合を通して完全に無音・無演出だった欠陥を修正。6キャラの必殺技のうち3つが同じ発射音だった問題を解消し全キャラ聴き分け可能に。BGMをステージごとに音域・音色・テンポの違う3テーマへ", d:"今回は『エフェクト演出と効果音とBGM』を名指しでの忖度なし再審査。実際にコードを1行ずつ辿って発見した欠陥は四つ。①【最重要】着地が完全に無音・無エフェクトだった──ジャンプ・空中攻撃・復帰・ガケのぼりなど、1試合で数十回は起きる『着地』という動作に、音もダストもいっさい付いていなかった。落下速度に応じて重みが変わる着地音（軽ければ短い踏み込み、速く落ちれば低く厚いドスン）と、足元に舞う土けむり（速く落ちるほど濃く広く）を新設し、毎回の着地に必ず鳴る/見えるようにした。②6キャラの必殺技のうち3つ（たまごなげ・たねマシンガン・ばくだんたまご）が中身では別名なのに完全に同じ発射音を共有しており、聴いただけでは区別がつかなかった。さらにロケットずつきに至っては専用音が一つも無く、他の技と同じ汎用『振り』音に頼っていた。たねマシンガンには3連の高い連打音、ばくだんたまごには重めのトーン＋導火線の『チッ』という高い一音、ロケットずつきには上昇する発射音（噴射ノイズ＋スウィープ）を新設し、6キャラすべてが聴き分けられるようにした。③つかみが成立した瞬間の音が、パンチが当たった時とまったく同じ『ヒット音』を流用しており、『捕まえた』という手応えが薄かった──専用のグラブ音（低く鈍いガッ、という捕獲音）に差し替えた。④BGMが終の祭壇・そらの島・ゆれる大枝の3ステージ、ひとりで大乱闘・みだれ乱闘・くみての全モードを通じて、たった1つの旋律・音域・テンポしか無かった──スマブラの各ステージが専用曲を持つ本質からもっとも遠い場所だった。ステージごとに音域・使用波形・テンポの異なる3つのテーマ（終の祭壇＝現行どおり荘厳で低め／そらの島＝1オクターブ以上高い明るい音域＋やわらかいsine主体＋やや速いテンポ／ゆれる大枝＝低い音域＋square主体で木質・パーカッシブ＋やや遅いテンポ）を新設し、ステージ選択に応じて自動で切り替わるようにした（くみてはこれまでどおり終の祭壇固定）。検証はnode --check全通過に加え、AudioContextを直接傍受してオシレーターの周波数を実測する専用テスト（test_audio.js）を新設──6キャラの必殺技すべてで音が鳴ること・全キャラの音響シグネチャが重複しないこと・着地のたびに音が鳴ること・3ステージのBGMがそれぞれ異なる音域を使うこと（そらの島は終の祭壇より高音域、ゆれる大枝は低音域）を実測で確認。既存のヘッドレスChromium実プレイ65項目・pageerrorゼロも維持。思考学 巻二・続々々に第七の教訓として『エフェクト・音の再現度審査は「関数が呼ばれているか」でなく「実際に鳴っている音・見えている絵が違うか」で測る』を追記した。", },
    { tag:"fix", t:"コッコスマッシュ SPECIAL：三度目の忖度なしレビューで実プレイからガケの早取り欠如を発見・修正 ─ みだれ乱闘で2体が同じガケに同時につかまって重なるバグ、脱落者のHUDパネルが消えないバグ、3人以上タイの時間切れ判定バグを修正", d:"コードを読むだけでなく実際にヘッドレスブラウザで長時間AI対戦・FFAを走らせて観察する『実プレイからのレビュー』で見つけた欠陥集。①【最重要】ガケの早取り（ledge trump）が無い──スマブラでは崖は同時に1人しかつかまれず、後から来た者が先客を弾き飛ばして奪う。今回のコッコスマッシュには崖の占有管理が無く、みだれ乱闘（1 vs 影×3）で2体のこっこが完全に同じ座標で重なって同時に崖につかまる、明らかに不自然な状態が実際に発生していた。崖ごとの占有者を1体だけ記録する仕組みを新設し、後客が来たら先客を無防備な状態で弾き飛ばして崖を奪うようにした。②脱落（0ストック）したファイターのHUDパネルがみだれ乱闘で消えずに残り続け、4枚パネルのまま試合が進んでいた──パネル描画から脱落者を除外し、生き残りの枚数ぶんだけ詰めて表示するように修正。③FFAで時間切れになったとき、1位が2人だけ同着で3位・4位はハッキリ負けているのに、全員がサドンデス（300%・1スト）に巻き込まれるバグがあった──真に1位と同着の者だけがサドンデスに進み、それ以外はその場で敗退するよう判定を修正（1対1では従来どおり変化なし）。検証はヘッドレスChromium実プレイを61項目に拡張（ガケの早取り・先客/後客の状態・FFA時間切れの3〜4人タイ判定・脱落後のパネル継続動作）、全パス・pageerrorゼロ。今回は『コードを読んで探す』段階を終え『実際に長時間動かして観察する』段階に移ったことで見つかったバグ群であり、思考学 巻二・続々々に第六の教訓として追記した。", },
    { tag:"imp", t:"コッコスマッシュ SPECIAL：再現度をさらに忖度なしで再審査 ─ 受け身／ダウン・空中技の着地硬直・つかみの空中無効化・飛び道具の多段ヒット修正を追加。世界ランキング（rankings/smash）の登録〜反映の配線をモックDBで実測確認", d:"『再現度を忖度なしで批判的レビューして』の求めで、格闘の骨をさらに二段掘り下げた。①【受け身とダウンが無い】ふっとばされて着地しても常にノーリスクで即行動可能だった──スマブラでは着地間際に盾を入れると受け身（無敵で即立て直り）、入れそこねるとダウン（無防備、方向キーで転がり起き上がり／攻撃または待機で起き上がり）になる。これを実装し、AIにも『相手がダウン中は追い打ち』『自分がダウン中は追跡方向と逆へ転がる』行動を追加。②【空中攻撃に着地硬直が無い】技を振っている最中に着地しても即行動できてしまい、リスクゼロで空中技を置き放題だった。技の終盤（オートキャンセル猶予）で着地すれば硬直なし、それ以外の中断着地には着地硬直を発生させ、空振り読み合いに賭けの要素を戻した。③【つかみが空中の相手に刺さる】つかみは本来『地上の相手専用』の技なのに、空中の相手も普通に掴めてしまい、空中回避に対する脅威度が過大だった──空中の対象にはすかるよう修正。④【飛び道具のバグ】貫通する飛び道具（かぜおこし）が同じ相手に毎フレーム重ねてヒットし続け、1発のはずが連続ヒットする実バグを発見して修正（対象ごとに一度だけ命中する管理に変更）。⑤ジャストガードの反確処理が飛び道具にも誤って攻撃側の技データを書き換えていた不具合も修正（近接技のみ反確が乗るよう分離）。【ランキング反映の確認】このサンドボックス環境は外部ネットワーク（chikumo.jp・Firebase）への直接到達がプロキシで遮断されているため、実機での反映を直に見ることはできなかった。代わりに、① Firebase設定（apiKey・databaseURL等）を実運用中の rescue2/gp2/shima2 と1文字単位で突き合わせて完全一致を確認、② 登録コードの構造（匿名認証フォールバック・単調増加ガード・rankings/smashノード）が同じ雛形であることを確認、③ ゲームが期待するFirebase API形状だけを持つモックDBをヘッドレスブラウザに注入し、実際にスコアを貯めて『登録ボタン→書き込み→メッセージ表示→一覧再描画→タイトル画面のランキングにも同じ記録が出る』までの配線をエンドツーエンドで実測（全10項目パス）。これによりコード側の配線に欠陥が無いことは確認済み、実機での反映は次にネットワーク到達可能な環境かユーザー自身の実機で最終確認をお願いしたい。検証はnode --check全通過に加え、ヘッドレスChromium実プレイ57項目・pageerrorゼロを実測（検証フックに projs()・spawnProj() を追加）。思考学 巻二・続々々に第五の教訓（再現の深掘りは一段直すと次の層が見える／サンドボックスのネットワーク境界を偽装しない）を追記。", },
    { tag:"imp", t:"コッコスマッシュ SPECIAL：スマブラ再現度を忖度なしで再審査して大型アップデート ─ つかみ＆4方向投げ・強攻撃／はじきスマッシュ・歩き／ダッシュ・小ジャンプ・ジャストガード・ずらし（DI）・ガケのぼり回避・みだれ乱闘（1 vs 影×3のFFA）を追加", d:"公開直後の初版を『スマブラSPの再現度』の観点で忖度なしに批判的レビューした結果、技の数は揃っていても格闘の骨が欠けていることが判明した。①【最重症】つかみ・投げが無い──スマブラの核は『攻撃⇆盾⇆つかみ』の三すくみで、つかみが無いと盾が実質最強になり、じゃんけんが閉じない。②強攻撃（ティルト）が無い──地上の方向＋攻撃がすべて『ためスマッシュ』になっていた。スマブラの入力は『はじき＝スマッシュ／おしっぱなし＝強攻撃／短押し＝小ジャンプ』という同じボタンの文脈依存でできているのに、それが丸ごと欠落。③その前提となる歩き／走りの区別が無い（方向を押した瞬間から常に全速ダッシュ）。④小ジャンプが無い。⑤ジャブが単発。⑥ふっとび中に何もできない（ずらしが無い）。⑦ジャストシールドが無い。⑧ガケの選択肢が2択のみ。⑨『大乱闘』を名乗りながら1対1しかない。──今回すべて実装した。【操作の文脈】方向ちょい倒し＝あるく／すばやく2回はじき（スティックおく倒し）＝はしる→走り中の攻撃はダッシュ攻撃。立ち・歩きから方向＋攻撃＝強攻撃（横・上・下）、方向をはじいた直後の攻撃＝スマッシュ（ため可）。ジャンプ短押し＝小ジャンプ。攻撃連打＝ジャブ2段。【三すくみ】盾＋攻撃＝つかみ（盾ごしに通る）→方向で前/後ろ/上/下投げの4種。つかまれ中に第三者に殴られるとほどける（FFA対応）。【防御の深み】盾を出した瞬間（4F）に受けるとジャストガード＝削れず反確。ふっとばされ中も方向入力で軌道をわずかにずらせる（DI）。ガケは のぼる／のぼり攻撃／のぼり回避（無敵転がり）の3択に。【みだれ乱闘】新モード『みだれ乱闘（1 vs 影×3）』──影の三体が入り乱れ、影同士もつぶし合うFFA。全員べつチームで最後まで立っていたら勝ち。%パネルは4枚並び、時間切れはストック→%の順位で判定、同点はサドンデス。AIも強化：一番近い敵を狙い（FFA対応）、盾にはつかみを通し、はじきスマッシュを使い分ける。ついでに検証で見つけた『地上攻撃の後隙中に摩擦がかからず滑り続ける』実バグも修正。検証はヘッドレスChromium実プレイを47項目に拡張（強攻撃／ダッシュ攻撃／はじきスマッシュ／ジャブ2段／小ジャンプの高さ比較／盾ごしのつかみ→投げ／ジャストガード／のぼり回避／FFA4体・チーム分離・決着まで）、全パス・pageerrorゼロ。思考学 巻二『再現もの』に第四の教訓（再現度の第二審査は三すくみと入力の文脈に宿る）を追記。", },
    { tag:"new", t:"新作「コッコスマッシュ SPECIAL（/smash/）」を追加 ─ %をためて影を場外へふっとばす大乱闘アクション。6ファイター×3ステージ・ためスマッシュ・回避・ガケつかまり・切りふだ・60秒くみて世界ランキングつき", d:"『大乱闘スマッシュブラザーズSPECIALをこっこちゃんで完全再現』の求めに応え、先行作コッコランブル（/battle/）を忖度なしに批判的レビューして建てた、ふっとばし対戦の林の第二の木。前作の掟との衝突と没入を壊す最大要因は①ファイターが1種でキャラ選択が無く『選ぶ楽しさ』（大乱闘の核）が丸ごと欠けること、②ため（チャージ）・前後空中攻撃・回避・ガケつかまり・切りふだが無く技が浅いこと、③カメラが固定でふっとばしの爽快感が薄いこと、④世界ランキング（四の祭壇）と結果発表の儀式が無いこと、⑤ストック制だが時間制限が無く逃げ合うと終わらない（弐に薄い）こと。【あそび】%（ダメージ）をためるほどよくふっとぶ、あの文法を1ファイルで。ファイターは6羽のこっこ──こっこ（バランス・たまごなげ）／ぴよ（軽量3段ジャンプ・たねマシンガン）／おやぶん（重量剛力・じならし衝撃）／そらこ（4段ジャンプ・かぜおこし）／たまごん（重装・ばくだんたまご）／げんき（ロケットずつき）──体重・走力・ジャンプ数・威力が全部ちがう。技はジャブ・ダッシュ攻撃・横上下スマッシュ（おしっぱなしで『ため』、はなして大爆発）・空中5方向（下空中はメテオ）・必殺4系統（NB固有／横B突進／上B復帰／下Bカウンター＝飛び道具は反射）。盾（削れて小さくなり、割れると気絶）・ローリング／その場／空中回避・ガケつかまり（つかまり無敵→のぼり／のぼり攻撃）まで再現。ダメージを与え合うとキズナゲージが満ち、必殺ボタンで切りふだ『キズナスマッシュ』──カットイン→全画面虹の衝撃波。ステージは終の祭壇（平ら）／そらの島（浮き台3枚）／ゆれる大枝（動く足場）の3つ＋おまかせ。カメラはファイターを追って寄り引きする動的カメラで、ふっとびは残像と場外の光線バースト、上空は星になって消える。モードは3つ：ひとりで大乱闘（影のブラックこっこCPU・Lv1〜9・2/3/5ストック＋2分で必ず決着。時間切れはストック→%判定、同点はサドンデス300%）／ふたりで・かげ稽古（2Pは影となって稽古あいて＝敵はいつも影・六）／60秒くみて（影の軍団を60秒でどれだけふっとばせるか＝弐の焔と四の祭壇。落ちても罰は霧、すぐ戻れる）。🏆世界ランキングは rankings/smash（新規DB不要・匿名認証で1端末1枠）、結果発表『◯位にランクイン！』儀式も継承。敵はどのモードでもブラックこっこ＝自分の影だけ（六）。【つくり】スマホは横画面＋仮想スティック＆攻・必・跳・盾ボタン、PCはキーボード（2Pは矢印＋./,）。ヒットストップ・画面シェイク・ダメージ数字・%で赤く育つスマブラ式パネル・ストック玉・カウントダウン（3・2・1・GO!!）・GAME SET・BGMは終盤やリーチで半音上がる16ステップ、効果音も全部WebAudioその場生成。ファイターの絵は公式こっこSVGを染め分け＋アクセサリ（ハチマキ・葉っぱ・羽・たまごのから）をCanvasで描き足し、影は黒こっこ（紫の目）。音の番人・タイトル右下の🔄強制更新ボタン・safe-area・タブ非表示で自動ポーズも毎度の作法どおり。検証はnode --check全通過に加え、ヘッドレスChromium実プレイで起動→モード→キャラ→ステージ→カウントダウン→ジャブ→ためスマッシュ→シールド防御→たまご命中→ガケつかまり／のぼり→切りふだ→KO＆ストック減→GAME SET→リザルト→サドンデス→くみて（スコア・撃破・結果・もう一回）→2P入力→Lv9 AI同士の乱闘まで39項目・pageerrorゼロを実測（検証フック window.__smash）。この検証で『カウンターで反撃された瞬間、攻撃側の技データが消えて落ちる』バグを発見して修正。トップ目録とsitemapに追加、SWキャッシュはv93→v94。思考学 巻二に『再現もののジャンルと掟の折り合い』の判断記録を追記。", },
    { tag:"new", t:"新作「こっこGP2 キズナターボ（/gp2/）」を追加 ─ 親指1本の親子テザードリフト・レーシング。おしっぱなしで子こっこが縁の糸でふりまわり檻を粉砕、はなせばキズナブーストで無敵ダッシュ。60秒で焼き切る超中毒レース（世界ランキングつき）", d:"前作こっこGP大救出（/gp/）を忖度なしに批判的レビューして建てたレース続編。前作の没入を壊す最大要因は演出でなく『操作の器』──①ジャイロ操舵は iOS の権限ダイアログという摩擦から始まり、手と画面の間に遅延とノイズが挟まる、②シェイク修理は激しいわりに手応えが曖昧、③🔫⚡🌈など7種のアイテム抽選と『クリアできる要素76.6%』という運の定数が、上達でなく引きで勝敗を揺らす、④救出のたび⏰+8秒でランが延び、弐・焔の形（60秒で焼き切る）が薄まる。続編が継いだのは動詞（はしる・追う・すくう）と祭壇（60秒タイムアタック＋結果発表の儀式）であって、機構ではない（レスキュー2の先例に同じ）。【あそび】ブラックこっこにさらわれた子こっこたちを、こっこ親子のマシンが追う。操作は指1本だけ：画面の左右どちらかを『おしっぱなし』にすると、その側へドリフトしながら、後ろの子こっこが縁の糸でふりまわり──軌道上の檻を粉砕して子こっこを救出、ブラックトラックもカウンターで吹き飛ばす。おした長さ＝ため。『はなす』と、ため相応のキズナブースト（無敵ラム）で急加速し、トラックをぶちぬける。カーブは遠心力で外へ流されるので、ホールドのタイミングそのものがレース。スレスレ回避・連続救出でコンボ×倍率（最大×5）、ゲージが満ちると🌈キズナフィーバー（8秒・×2・ふりまわし拡大・虹の路面・BGMキー上昇）。敵は✂️逆縁バサミ＝ブラックこっこ（六）だけ──縁の糸にくいついて切ろうとするので、左右にすばやくふって（＝いつものステア操作で）ふりほどく。切られても子こっこは死なない：霧にかくれて3秒、また心をつないで戻ってくる（罰は霧・参と五）。60秒固定・延長なし・アイテム抽選なし・ジャイロ権限なし。終わりはエンジンが静まり、HUDが消え、夜明けの桜吹雪の中を親子が滑走して鐘が鳴る──罰でなく祝福（参）。【演出】スマホゲーガチ級を1ファイルCanvas 2Dで：時間器官（ヒットストップ＋スローモーション自動回復）を一つ置き、その上に檻粉砕のズームパンチ、ブーストの残像＋白フラッシュ＋スピードライン、斜め帯カットイン（KIZUNA FEVER!!／逆縁警告の黒帯）、コンボ数字のスラム（10で青・25で紫の段階色）、浮かぶ報酬テキスト、ラスト5秒の鼓動ビネット、疑似3D道路（カーブ蓄積投影・縁石・車線・遠山と雲のパララックス）、60秒かけて昼→夕焼け→黄金→夜明けへ移ろう空、フィーバーの虹路面。BGM（速度でテンポが上がる16ステップ・フィーバーでキー+3）・エンジン音（速度連動の持続音）・鞭音・粉砕音（コンボで音程上昇）・切断と再会の和音・終いの鐘まで全てWebAudioその場生成。🏆世界ランキングは rankings/gp2（新規DB不要・匿名認証で1端末1枠）、結果発表『◯位にランクイン！』儀式も継承。音の番人・タイトル右下の🔄強制更新ボタン・safe-area対応・自動解像度スケーリング・タブ非表示で自動ポーズも毎度の作法どおり。検証はnode --check全通過に加え、ヘッドレスChromiumで起動→開始→ホールド操舵→救出コンボ→フィーバー→✂️ふりほどき成功／切断→霧→再会→クラッシュ→60秒終端→夜明け→結果→もう一回、までpageerrorゼロを実測（検証フック window.__gp2）。この検証で『ふりほどき成功時に次回襲撃の予約を忘れて即再襲撃される』バグを発見して修正。トップ目録とsitemapに追加、SWキャッシュはv92→v93。思考学 巻二に『レース続編の設計』の判断記録を追記。", },
    { tag:"new", t:"新作「コッコレスキュー2 逆縁切り（/rescue2/）」を追加 ─ 逆縁の鎖を指一本で斬って、こっこちゃんを60秒でぜんぶ助け出すスラッシュ救出。コンボ×倍率・連斬ヒットストップ・RESCUE RUSH・世界ランキングつき", d:"前作コッコレスキュー（/rescue/）を忖度なしに批判的レビューして建てた続編。前作の掟との衝突は①既存ジャンル（ボール反射ブロック崩し）の焼き直しで壱・既視の禁に反すること、②ブロックが下端に届くまで無限に続き底（終わり）が無く弐・焔の形に反すること、③敵がただのブロックで逆縁の物語（六）が無いこと、④終わりが『GAME OVER』の罰で参・終を售るに反すること。没入を壊す最大要因は『待ち時間』──爆発（発射）が1ターンに1回しかなく、残りはボールが落ちきるのを観ているだけだった。続編が継いだのは動詞（たすける）と祭壇であって、ジャンルではない。【あそび】黒い鎖＝逆縁にとらわれたこっこちゃんが淵へ沈んでいく。画面を指でなぞると斬撃が走り、鎖を斬れる。ぜんぶ斬ると救出──光になって飛んでいく。ひとなぞりで2本同時に斬ると『連斬』（ヒットストップ＋スローモーション＋ボーナス）。救出をつなぐとコンボ×倍率（最大×5）、ゲージが満ちるとRESCUE RUSH（8秒・スコア2倍・大量発生・BGMテンポ上昇）。12秒目からブラックこっこ（逆縁＝自分の影）が鎖をふやしに来る──なぞって祓う。沈んでも命は失われない（霧にかくれてまた浮かぶ）。60秒で必ず終わり、残ったこっこの鎖も夜明けの光でほどけて（数えないが罰も無い）、無音の白の中を救った群れが昇っていく──終わりは祝福（参）。【演出】スマホゲーガチ級を1ファイルCanvasで：加算合成の白刃スラッシュ軌跡、ヒットストップと時間回復、ズームパンチ、斜め帯カットイン（スピードライン付きのNICE!/GREAT!/AMAZING!/MIRACLE!/LEGEND!）、衝撃波リング、グロー粒子、色付きフラッシュ、残り5秒の赤ビネット＋心音、スコアのカウントアップ結果演出、前作から継いだ結果発表『◯位にランクイン！』儀式（ドラムロール→スロット→ドーン＋花火＋紙吹雪）。BGM・斬撃音・救出ジングル・祓いの雷・終いの鐘まで全てWebAudioその場生成。🏆世界ランキングは rankings/rescue2（新規DB不要・匿名認証で1端末1枠）。音の番人・タイトル右下の🔄強制更新ボタン・safe-area対応・prefers-reduced-motion配慮も毎度の作法どおり。検証はnode --checkに加え、ヘッドレスChromiumで起動→開始→なぞり斬り救出（実マウスドラッグでも確認）→連斬→逆縁祓い→フィーバー→時間加速で60秒終端→結果→もう一回、までpageerrorゼロを実測（検証フック window.__rescue2）。トップ目録とsitemapに追加、SWキャッシュはv91→v92。思考学 巻二に『続編の設計』の判断記録を追記。", },
    { tag:"new", t:"新作「島ぐらし2 ─ ななつの夜明け（/shima2/）」を追加 ─ 太陽の影が落ち、木々が風にゆれ、朝ごとに島が育つ。7日間で必ず終わる約5分の島ぐらし（畜学・七相／世界ランキングつき）", d:"島ぐらし（/mori/）を忖度なしに批判的レビューし、その結果を元にゼロから建てた続編。前作の最大の弱点は①世界のほぼすべてがカメラを向く平らな絵文字ビルボード（紙のジオラマ感）で、太陽があるのに影が落ちないこと、②のんびり遊べる一方で『底（終わり）』が無く畜学・弐（焔の形＝無限ループ禁忌）に反すること、③総資産ランキングが“時間を注いだ者が勝つ”祭壇になっていたこと。過去に一度存在してThree.js依存（七相・七『一器に納む』違反）とiOSシェーダ精度バグで3日で沈んだ旧mori2の死因も制約に繰り入れ、今作は外部エンジンなし・素のWebGL1・1ファイル自己完結・全シェーダprecision highp統一で建てた。【グラフィック】(1)太陽のシャドウマップ（RGBA深度パック＋PCF4点。朝は長い影、夕は赤い影が地面と木々に落ちる）(2)紙を卒業した本物のローポリメッシュの木・ヤシ・岩・灯座（幹＝角柱、樹冠＝ジッタ八面体、頂点シェーダで風にゆれ、影も揺れる）(3)深さを知る海（ハイトフィールドをテクスチャで水シェーダに渡し、浅瀬のエメラルド→深海の紺、岸に沿って寄せて返す泡の帯、フレネル反射と太陽のきらめき、頂点変位のうねり）(4)GPU草原（数千本の草が風になびく）(5)視線レイの大気スカイ（fbm雲・夕焼け・星のまたたき・月・最終夜のオーロラ）(6)ポストプロセス（半解像度ブルーム→ガウス2パス→太陽方向へのゴッドレイ＋彩度/コントラスト/フィルムグレイン＋ACES）(7)そして島そのものが育つ──朝が来るたび地形が実際に隆起・拡大し（成長度をJSの当たり判定とGPU水面で同一式共有）、木と草が増える。重い端末では草→影→ポストの順に自動軽量化、シェーダは全てフォールバック付き。【あそび】1ラン＝7日間・約5分・必ず終わる。昼（24秒）は✨ひかりのタネを集めて🏮縁の灯をともす→こっこの親子が光の糸で結ばれる。夜（17秒）は海から逆縁の潮＝ブラックこっこが灯を吸いに来るので、💨ダッシュ体当たり（ヒットストップ・コンボ・こっこ球知らせ）で追いはらう。敵は今作もブラックこっこ＝自分の影だけ（六）。朝が来るたび、ともした灯のぶんだけ島が育つ。7日目の夜明けはHUDが消え、無音の中を花びらが舞い、ゆっくり昇る朝日で終わる──終わりは罰でなく祝福（参）。スコアは資産でなく『縁のひかり』＝むすばれた縁×120＋ともした灯×10＋はらった逆縁×15＋残り体力×40＋島のそだち。🏆世界ランキング（rankings/shima2・新規DB不要）には縁の数も添えて刻む（四）。操作はPC＝WASD/矢印＋マウスドラッグ＋Space＋Shift＋E、スマホ＝左スティック＋ダッシュ/ジャンプ/アクションボタン。BGM・効果音・夜明けの和音（日ごとにキーが上がる）・終いの鐘まで全てWebAudioその場生成。音の番人・タイトル右下の🔄強制更新ボタンも毎度の作法どおり。検証はnode --checkに加え、ヘッドレスChromiumで7日間を通しプレイ（検証フックwindow.__shima2で時間加速）し、pageerrorゼロ・全フェーズ遷移・地形モーフ・結果画面・タイトル復帰まで実測確認。トップ目録とsitemapに追加、SWキャッシュはv90→v91。", },
    { tag:"new", t:"畜学に五つ目の蔵「思考学（/shikogaku/）」を追加 ─ どう考えたのかを残す“思考の再現レシピ”。軽量AIでも同じ質の仕事を再現できる手順書", d:"島ぐらし2の制作にあわせ、蔵書『畜学（/Library/）』に第五の棚「思考学」を新設した。役割の整理：十四式＝どう作るのか／遊戯学＝なぜ作るのか／設計学＝どの高さ・どの順で作るのか／畜史＝何を作ったのか、に対して、思考学＝どう考えたのか。判断が分かれた場所で どちらへ・なぜ曲がったかだけを記録し、軽量な頭（小さなAIモデル・記憶を持たない次のこっこ）でもこの手順をなぞれば同じ質の仕事を再現できるようにする蔵。中身は三巻構成──【巻一・標準手順】蔵を読む→先行作を批判的にレビュー→畜史で“死んだ木”（サービス終了作）と死因を調べる→森林木で降りる→ジャンルと七相の衝突を実装前に解く→投資の優先順位→フォールバック→実際に遊んで検証（検証フック常設）→共有臓器を繋ぐ→継として還す、の10段。【巻二・判断の記録】島ぐらし2の実際の分かれ道を収録：レビューは“掟との衝突”と“没入を壊す最大要因”から書く／死んだ木（旧mori2＝Three.js依存とiOSシェーダ精度）の死因を制約に繰り入れる／“終わらないジャンル”は掟でなくジャンルを曲げる（60秒の文字通りでなく『底＝必ず終わる』が核）／グラフィック投資は影→メッシュ→水→育つ地形→ポストの順（法線は中心から外向きを保証せよ＝黒い面が実際に出た）／“影が出ない気がする”ときは疑う項を極端値にして二分せよ／動詞は四つで足りる（削る勇気）。【巻三・チェックリスト】作る前に己に問う10項。正典は docs/思考学.md、公開ページは十四式と同じ暗色コーデックス装丁の /shikogaku/。CLAUDE.mdの蔵の一覧も四つ→五つに更新し、『新しい木を建てたら迷った場所を思考学へ追記して還す』掟を明記した。", },
  ]},
  { date:"2026.07.01", items:[
    { tag:"imp", t:"外部フォント読込を @import から <link> 方式に統一（hajimari/Goshiki/story-02）─ CSSOM構築のブロックを解消", d:"サイト内で外部フォント（Google Fonts）を使う8ページのうち、hajimari（ステージマップ）・Goshiki（五式）・story/02（ドッキングシミュレーター）の3ページだけが<style>タグ内の@importでフォントを読み込んでいた。@importはブラウザがそのCSSファイル自体をパース＆適用し終えるまで読み込み開始が後回しになり、かつ発見が遅れる（HTMLパーサではなくCSSパーサがCSS本体を読んでから見つける）ため、CSSOM構築を直列に遅延させる。他5ページ（yugigaku/sekkeigaku/jusanshiki/jushishiki/Library）は既に<link rel=preconnect>＋<link rel=stylesheet display=swap>方式で、HTMLパーサが早期に発見して並行ダウンロードできる構成だった。今回、@import利用の3ページをこの既存パターンに統一：<head>先頭側にfonts.googleapis.com／fonts.gstatic.comへのpreconnectと<link rel=stylesheet>を追加し、<style>タグ内の@import文を削除。読み込むフォントファイル自体・display=swapの指定・CSSの中身は一切変更していないため見た目は変わらない。sw.jsの既存cache-firstロジックは外部リソースをURL単位で扱うため、この3ページのフォントも次回以降オフラインキャッシュ対象になる（挙動変更なし、経路が変わっただけ）。検証：3ファイルとも変更後にローカルサーバー＋Chromiumで実読込し、pageerrorが発生しないこと・200で配信されることを確認。ld+json構造化データ（Goshiki）や既存のインラインJS（3ファイルとも）には触れていない。", },
    { tag:"imp", t:"低帯域でもサクサク：Firebase SDKを非同期読込に変更（全24ページ）＋読込失敗の自動再試行で世界ランキングを確実に反映", d:"通信状況が悪い場所でもゲームを快適に遊べるようにする軽量化。これまで世界ランキング対応の全ゲーム（buranko/emoji/rush/seimei/rescue/ennami/gp/splat3d/derby/genso/link/letter/splat/tsugi/echo/eigo/mori/graze/tenbin/koro/poko/taiga/invaders/chikyu の24ページ）は、Firebase SDK 3本（app/database/auth compat・合計約200KB）を<head>内の同期<script src>で読み込んでおり、低速回線ではこのダウンロード完了までHTML解析＝ゲーム描画が丸ごとブロックされていた。①これを「非同期ローダー」に置換：動的<script>注入でapp→database→authの順序を保証しつつ描画を一切止めないため、SDKがどれだけ遅くてもゲームは即開始する（Chromium実測：SDK取得を完全遮断した圏外相当の状態でもDOM構築106msでゲームCanvas表示）。読込失敗時は指数バックオフ（3秒→最大60秒）と回線復帰（onlineイベント）で自動再試行し、圏外→復帰の後もページを開き直さずランキングが生き返る。gstatic.comとRTDBドメインへのpreconnectも追加して接続確立を先行。②ランキング起動部も「SDKが無ければ即諦める（if typeof firebase==='undefined' return）」から「読み込み完了を待って起動する（500ms間隔×1分→以降3秒間隔でポーリング、app/database/authの3本が揃ってから起動）」に変更。ゲーム本体からの呼び出しは全ゲームで if(window.CoccoRank) 等のガード済みであることをgrepで確認済みのため、起動待ち中も安全に劣化動作する。letterだけは初期化構造が特殊（ready/authDoneフラグ管理）なので個別に再試行化し、SDKが遅れて読めた場合は自分の手紙も自動で読み直す。③sw.js（v89→v90）：SDK 3本をService Workerインストール時にno-corsでプリキャッシュするようにし、一度でもサイトを開けば以後どのゲームでも回線状態に関係なくSDKが即キャッシュから供給される（従来はオフライン保存ボタンを押した人だけ）。あわせて「JS/画像などの取得失敗時にindex.htmlを返す」不具合を修正（HTMLがJSとして実行されて構文エラーになる恐れがあった）→504を返してローダー側の再試行に任せる設計に統一。検証：変更した全ファイルのインライン<script>とsw.jsをnode --checkで構文確認（全通過）し、Chromium実機テストで「SDK遮断中もゲーム即起動・エラーなし→回線復帰後にCoccoRank/MoriRank起動」「通常回線での起動」「letterの特殊初期化」をすべて確認。observer-logは管理用ログページのため対象外。", },
    { tag:"fix", t:"ホーム画面アイコン（apple-touch-icon等）が表示されなくなる不具合を修正 ─ 減色PNG（パレット形式）が原因、トゥルーカラーPNGに戻して解消", d:"直前の画像軽量化（本ページ内の別項目）で、apple-touch-icon.png・ogp.png・icon-512.png・icon-192.png・icon.pngの5枚をPILの256色パレット量子化（indexed PNG）で圧縮していたところ、iOSでホーム画面に追加したアイコンが表示されず、サイト名の頭文字（畜）を使った自動生成の代替アイコンに置き換わってしまう不具合が発生した（ユーザー報告により発覚）。パレット形式PNG自体は標準的なフォーマットだが、apple-touch-iconの読み込み経路でこれが原因になっていた可能性が高いと判断し、疑わしい変更点（パレット化）だけを取り除いて、5枚すべてをトゥルーカラーPNG（8-bit RGB、パレットなし、PNG最適化のみ）に再変換した。apple-touch-icon.pngは2134×2134→180×180のリサイズ（Appleが必要とする最大サイズ）はそのまま維持し75.7KB→11.3KB（-85%）、他4枚もリサイズなしでの再圧縮のみ（ogp.png 29.6KB→25.9KB／icon-512.png 22.7KB→23.1KB／icon-192.png 7.3KB→7.1KB／icon.png 3.9KB→3.4KB）と、軽量化の効果は目減りしたが安全なフォーマットを優先した。全画像とも変換前後でピクセルデータが一致すること（アルファ値はもともと全域255で透過なしのため欠落なし）を確認。SWのcache-first保持分を入れ替えるためキャッシュ版を v88→v89 に更新。sw.jsは node --check 通過。教訓：ホーム画面アイコンのような“実機でしか壊れたかどうか判定できない”資産は、この開発環境（外部フォント/CDNへの通信が制限されている）だけで安全と判断せず、フォーマットを保守的に保つべきだった。", },
    { tag:"imp", t:"サイト全体の画像資産を軽量化 ─ アプリアイコン・OGP画像・SVGロゴを合計148KB→41KB（-72%）に圧縮、全ページの初回表示を軽く", d:"低帯域向け軽量化（6/30）はSWキャッシュ中心だったので、今回は“そもそも運ぶバイト数”を削った。サイト内の画像資産はこの6ファイルで全て（各ゲームは絵文字・Canvas描画のみで画像を持たないため）。①apple-touch-icon.png：実解像度が2134×2134もあり（Appleが必要とする最大は180×180）、75.7KB使っていた。180×180にリサイズしたうえで減色（PILのMEDIANCUT量子化＋Floyd–Steinbergディザ、256色パレットPNG）し5.7KBへ（-92%）。もとが単色主体のベタ塗りイラスト（実測153色）なので256色パレットで視覚劣化なし（差分画像を目視確認）。②ogp.png（29.6KB→11.9KB）③icon-512.png（22.7KB→10.2KB）④icon-192.png（7.3KB→3.8KB）⑤icon.png（3.9KB→1.8KB）も同じ手法で減色。いずれも全ピクセルが不透明（アルファ255固定）なので透過を失わない。⑥chikumo.svg（8.1KB→7.1KB、gzip後3.66KB→3.36KB）はsvgo（既定プリセット）でホワイトスペース・重複class・同一styleパスの結合のみ行い、パスの座標データ（d属性の数値列）が変化していないことを確認して安全性を担保。これらのアイコン・OGP画像はほぼ全ページの<head>で読み込まれるため、削減分はサイト全体の初回転送量に効く。SW（sw.js）はURL単位のcache-firstで画像を保持しているため、軽くした新バイトを再訪問者にも届けるようキャッシュ版を v87→v88 に更新（activate時に旧キャッシュを破棄）。manifest.jsonのアイコンsizes（192x192/512x512）・各ページのog:image参照パスは変更なし。sw.jsは node --check 通過。", },
  ]},
  { date:"2026.06.30", items:[
    { tag:"imp", t:"ホーム：メニューへの入口「ひらく」ボタンを追加 ─ ズームを知らなくても全ゲームにたどり着けるように（特にスマホ）", d:"批判的レビューで見つかった一番の導線欠陥を修正。これまでホーム（/）は、ブラックホールを2.5倍までズーム（PCはCtrl+ホイールか右の＋ボタン、スマホはピンチアウト）して初めてゲームメニュー（全35作）が現れる作りだった。ところが画面のどこにも『ズームで開く』という案内が無く、しかもスマホでは右側のズームUI（＋／−ボタン）が非表示（@media max-width:600px で display:none）のため、ピンチアウトを自力で思いつかない限りメニューに永遠にたどり着けなかった＝サイトの全コンテンツが“発見不可能”だった。そこでブラックホールの下に、世界観に馴染む淡く明滅するピル型ボタン『ひらく（PC:Zoom in／タッチ:Pinch to open）』を常設。タップ／クリックすると easeOutCubic で約0.7秒かけてズームを 3.2倍へなめらかに上げ、メニューがふわっと現れる動き自体が“ズームで開く”ジェスチャーを学習させる。メニューが開く（zoom≧2.5）と入口ボタンは自動的に消え（.gone＝opacity:0＋pointer-events:none）、閉じれば再び現れる。prefers-reduced-motion 環境ではアニメせず即座に開く。開いた直後は先頭リンクへフォーカスを移すのでキーボードでも操作できる。サブ文言は (pointer:coarse) で『Pinch to open』、それ以外は『Zoom in』に出し分け。既存のズーム・スクロール・吸入演出には一切手を加えていない。ヘッドレス（390×780・タッチ）で、初期状態で入口ボタンが見える→クリックでメニューが可視・操作可能（pointer-events:auto）になり入口が消えることを実測。index.html のインライン<script>4本すべて node --check 通過。", },
    { tag:"imp", t:"救出ゲーム（コッコレスキュー）：動くバンパーをさらに2個追加（動く8→10個・計12個）で生存率アップ", d:"救出ゲーム（/rescue/）のランチャー下のバウンドゾーンにある『バンパー（ピンボール式の反射ペグ）』を、これまでの計10個（固定2＝ピンク＋動く8＝シアン）から計12個（固定2＋動く10）に増やした。追加した2個は中下段（zone 0.63 付近）の左右ペアで、逆位相でゆっくり左右に往復する。これまで手薄だった中段の隙間を埋めるように動くため、落ちかけた球がさらに拾われやすくなり、生存率（＝救えるこっこの数）が上がる。当たり判定・反射・反射回数の消費・色分け（動く＝シアン／固定＝ピンク）は従来どおりで、往復は加速演出（freeze）やスローモー中はちゃんと止まる。サービスワーカーのキャッシュ版も v86→v87。インライン<script>は node --check 通過。", },
    { tag:"imp", t:"サイト全体を低帯域向けに軽量化 ─ 一度開いたゲームは“ほぼ通信ゼロ”で再生／ホームに「📥オフライン保存」ボタンを追加（通信の悪い場所でも遊べる）", d:"『通信の悪い場所（例：会社のトイレで、チャットくらいしかできない回線）でも畜物語のゲームを遊びたい』という要望に応え、ゲーム本体（25ファイル）は一切書き換えず、サービスワーカー（sw.js）とホーム（index.html）だけで全面的に軽くした。要点は三つ。①【HTMLの戦略を“ネットワーク優先”→“stale-while-revalidate（キャッシュ即返し＋裏で更新）”に変更】これまではページ（HTML）をネットワーク優先で取りに行っていたため、回線が遅い場所では“繋がってはいるが遅い”時に毎回その遅い通信を待たされていた。新方式では、一度でも開いたゲーム／メニューはキャッシュから即座に表示し、新しい内容は裏側で取得して次回に反映する。つまり低帯域でも待ち時間がほぼ消える（メニューの新ゲーム反映は1回ぶん遅れるだけで、右下の🔄強制更新ボタンですぐ最新化できる）。②【外部資産もキャッシュ対象に】全ゲーム共通で読み込む世界ランキング用のFirebase 3スクリプト（gstatic）やGoogleフォントは、これまで同一オリジン（res.type==='basic'）しか保存しない条件のため毎回ネットワークから取り直していた。opaqueレスポンスも保存できるようにし、一度取得すれば以後は通信ゼロで読めるようにした。③【ホームに「📥オフライン保存」ボタンを追加】Wi-Fiのうちに一度押すと、メニューの全ゲームのHTML＋Firebaseをまとめて先読みキャッシュする（進捗バー付き：保存中…N/M→保存完了✓）。これを家や電波の良い場所で済ませておけば、その後は通信の悪い場所でも各ゲームが“ほぼ通信ゼロ”で開く。ボタンはページのリンク（a[href^=\"/\"]）から対象URLを自動収集し、サービスワーカーへ postMessage→SWがまとめて取得・保存する仕組み（同一オリジンは通常取得、外部はno-corsで取得）。サービスワーカーのキャッシュ版は v85→v86。install時は資産1つの取得失敗で全体が止まらないよう各addを個別にcatch。sw.js は node --check 通過、index.html のインライン<script>も node --check 通過、<script>タグの開閉数も一致を確認。", },
  ]},
  { date:"2026.06.28", items:[
    { tag:"fix", t:"コッコ天秤：向かい側（こ）が間違えると一瞬 上下が反転するバグを修正 ─ シェイク演出に180°回転を保つ上書きが欠けていた", d:"コッコ天秤（/tenbin/）で、机に置いて向かい合って遊ぶとき、向かい側のプレイヤー（こ＝180°反転表示のレーン）が不正解を選ぶと、そのレーンが一瞬パッと上下反転（正立に戻ってまた反転）してしまうバグを修正。原因は不正解時のシェイク演出。間違えると揺れる演出 fng は transform:translateX(...) だけで回転を含まないため、本来 rotate(180deg) で反転表示している向かいレーンに当たると、揺れる0.4秒のあいだ回転が打ち消されて正立してしまっていた。他の向かい合わせ作（絵文字えいご・地球・継・大河・元素・生命・コッコ英語）には『回転を保ったまま揺らす』上書き（.lane.far.flash-ng → @keyframes fngF＝rotate(180deg) translateX(...)）が入っていたが、天秤だけこの2行が欠けていた。同じ上書きを天秤にも追加して解消。ヘッドレスで向かいレーン(#laneC)の計算済みtransformを実測し、修正前は不正解シェイク中に行列aが -1→1（回転が消える＝反転）になっていたのが、修正後は -1 のまま（回転保持＝反転しない）になることを確認。全8作を横並びで検査し、反転していたのは天秤のみ・他7作は元から正常なことも確認した。インライン<script>は node --check 通過。", },
    { tag:"feat", t:"親子向かい学習ゲーム7作にも“積み上がるカラーブロック＋おやこ対決の結果”を横展開 ─ 天秤・継・大河・地球・元素・生命・コッコ英語（世界ランキングは合算で競争と協力）", d:"絵文字えいご（/emoji/）で好評だった『正解で背景にカラーブロックが積み上がる／結果でおやこどちらが何個積んだか／世界ランキングは合算ポイント＝競争と協力』を、同じ向かい合わせ2レーン構造の学習ゲーム7作【コッコ天秤（/tenbin/）算数〜数学】【コッコ継（/tsugi/）世界史】【コッコ大河（/taiga/）日本史】【コッコ地球（/chikyu/）地理】【コッコ元素（/genso/）化学】【コッコ生命（/seimei/）生物】【コッコ英語（/eigo/）】にも横展開した。①正解するたび、そのプレイヤー側に色相が回るカラーブロックが1つ積み上がる（おや＝画面下から／こ＝向かい・上から）。数が増えるほど高さを自動で詰めて画面に収め、最新ブロックはふわっと出る。各作の既存の背景演出（天秤＝塔、継・大河＝時の川、地球＝緯度線、元素＝泡、生命＝細胞）の上に重ね、レーンの背面で二人ぶんのタワーが伸びる（天秤の『数学の塔』とも好相性）。②結果発表に、おや・こそれぞれの到達分野と『積んだブロック数（🧱N個）』を表示し、『🏆 おや/こ の勝ち！ X対Y』または『🤝 ひきわけ！』で何個ずつ積んだかが分かる（競争）。③そのうえで二人ぶんを足したスコア（各作とも従来から合算）を、ふたりのブロック合計＝🌍合算ポイントとして世界ランキングに登録（協力）。横展開は各作の変数名の違いに依存せず、共通のレーン情報（lanes.p/c.climbed）とDOM（reachP/reachC/versus）だけに乗せて実装。タッチ環境のヘッドレスで7作すべて、正解でブロックが積み上がり（drawStack毎フレーム例外なし）、結果に各自の個数・勝敗・合算（例：おや19対こ13＝合計32）が正しく出ることを確認。天秤・地球はスクリーンショットで背景ブロックの積み上がりも目視確認（既存背景との両立OK）。各作のインライン<script>は node --check 通過。サービスワーカーのキャッシュ版も v84→v85。", },
    { tag:"feat", t:"コッコ絵文字えいご：正解で背景にカラーブロックが積み上がる演出＋結果で“おやこどちらが何個積んだか”表示。世界ランキングは合算ポイントで「競争と協力」を一台で", d:"コッコ絵文字えいご（/emoji/）に、親子で『競争（どちらが多く積んだか）』と『協力（ふたりの合算で世界に挑む）』を一台で同時に味わえる仕組みを足した。きっかけは『正解したら背景にカラーブロックが積み上がる／結果でおやこどちらが何個積んだか表示／世界ランキングはおやこ合算ポイントにすれば競争と協力ができる』という提案。①【積み上がる背景】正解するたび、そのプレイヤーの側に色相が回るカラーブロックが1つ積み上がる──おや（手前）は画面下から、こ（向かい・180°側）は画面上から積み上がり、二人ぶんのタワーが背景で伸びていく。ブロックは数が増えるほど高さを自動で詰めて画面に収まる（最新ブロックはふわっと出る）。②【結果でおやこ対決】結果発表に、おや・こそれぞれの『めぐった島』と『積んだブロック数（🧱N個）』を表示し、『🏆 おや/こ の勝ち！ X対Y』または『🤝 ひきわけ！』で何個ずつ積んだかが一目で分かる（競争）。③【合算で世界へ】そのうえで『ふたりのブロックを合わせた合計＝🌍合算ポイント』として、二人ぶんを足したスコアを世界ランキング（rankings/emoji）に登録する（協力）。順位表の到達欄にも『🧱合計数＋島』を出す。つまり同じ60秒で、目の前の相手とは個数を競い、世界に対しては二人で力を合わせて挑む。ヘッドレス検証で、両レーンに正解を入れるとブロックが積み上がり（drawStackは毎フレーム例外なし）、結果におや/この個数・勝敗・合算（例：18対18／合計36／合算スコア）が正しく出ることを確認。スクリーンショットで背景のカラーブロック積み上がりと結果表示も目視確認。インライン<script>は node --check 通過。", },
    { tag:"fix", t:"親子向かいの学習ゲーム7作にも“同時押し”対応を横展開 ─ 天秤・継・大河・地球・元素・生命・コッコ英語を click から PointerEvent（多点対応）へ", d:"先にコッコ絵文字えいご（/emoji/）で直した『親子の同時押しが片方しか反応しない（click＝単一ポインタのエミュレーション）』問題は、同じ向かい合わせ2レーン構造の他の学習ゲームにも共通していた。そこで【コッコ天秤（/tenbin/）算数〜数学】【コッコ継（/tsugi/）世界史】【コッコ大河（/taiga/）日本史】【コッコ地球（/chikyu/）地理】【コッコ元素（/genso/）化学】【コッコ生命（/seimei/）生物】【コッコ英語（/eigo/）】の7作すべてに、絵文字えいごと同じ修正を横展開した。選択肢のタップ受けを click（onclick）から PointerEvent の pointerdown に変更。pointerdown は各タッチが独立した別イベント（別 pointerId）として発火する多点対応なので、おやとこが同じ瞬間に別レーンを押しても両方それぞれ反応する。pointerdown では e.preventDefault() で合成 click を抑止して二度押し・フォーカス・選択を防止し、PointerEvent 非対応の古い端末には touchstart（多点対応）＋マウス用 click のフォールバックを用意（touchstart 後の合成 click は無視）。マウス（PC）は従来どおり1クリックで回答できる。タッチ環境のヘッドレス検証で、7作すべて＋絵文字えいご＝計8作について、両レーンの選択肢に同一同期フレームで pointerdown を同時ディスパッチすると両レーンとも回答処理されることを確認（旧 click 実装は多点入力を取りこぼしていた）。各作のインライン<script>は node --check 通過、PC のマウス経路も回帰なし。サービスワーカーのキャッシュ版も v83→v84 に更新。", },
    { tag:"fix", t:"コッコ絵文字えいご：親子の“同時押し”に対応 ─ click（単一ポインタ）から PointerEvent（多点対応）へ。二人が同時に押しても両方反応するように", d:"コッコ絵文字えいご（/emoji/）は机に置いたスマホを親子で向かい合って遊ぶ作りなのに、選択肢のタップを click（onclick）で受けていたため、タッチ端末では“同時押し”が片方しか反応しないことがあった。タッチ端末の click はマウス互換の単一ポインタのエミュレーションで、二本の指が別々の要素（おやレーン／こレーン）を同時に押しても、合成される click は基本1点ぶんしか発火しない（特にiOS Safari）。そこで入力を PointerEvent の pointerdown で受けるように変更。pointerdown は各タッチが独立した別イベント（別 pointerId）として発火する多点対応なので、親と子が同じ瞬間に押しても両レーンがそれぞれ反応する。pointerdown では e.preventDefault() して合成 click を抑止＝二度押し（同一タップで二回回答）やフォーカス・選択を防止。PointerEvent 非対応の古い端末には touchstart（こちらも多点対応）＋マウス用 click のフォールバックを用意し、touchstart 後の合成 click はフラグで無視して二度押しを防ぐ。マウス（PC）では従来どおり1クリックで回答できる。ヘッドレス検証で、両レーンの選択肢に同一同期フレームで pointerdown を同時ディスパッチすると両レーンとも回答処理（再描画）されることを確認（旧 click 実装では多点入力を取りこぼしていた）。PC のマウスクリック経路も回帰なし。インライン<script>は node --check 通過。", },
    { tag:"imp", t:"コッコ絵文字えいご：島を46→55に拡充し1,000語を突破（904→1006の絵文字⇄英語ペア）─ マーク・ふね/そら・うんどう・みにつける・サイン2・ひょうじょう・ランドマーク・おもちゃ・はな2を追加", d:"コッコ絵文字えいご（/emoji/）に『残りひと伸ばし』として9島を足し、絵文字⇄英語ペアが904→1006と1,000語を突破した（全55島）。追加は──【✝️マーク】cross・star and crescent・star of david・peace・yin yang・om／atom・fleur-de-lis・trident・infinity・medical symbol・recycle、【⛵ふね・そら】sailboat・speedboat・ferry・cruise ship・canoe・rowboat／small airplane・takeoff・landing・parachute・balloon・helicopter、【🤸うんどう】wrestling・water polo・handball・golfer・yoga・weightlifting／ice skating・sled・curling・fencing・horse racing・rowing、【🩳みにつける】shorts・swimsuit・bikini・sari・flat shoe・ballet shoes／helmet・rescue helmet・graduation cap・clutch bag・sunglasses・goggles、【🤙サイン2】call me・love-you・rock on・open hands・right fist・left fist／writing hand・nail polish・mechanical arm・mechanical leg・ear with hearing aid・footprints、【🥰ひょうじょう】kiss・in love・star-struck・party face・cowboy・clown／sick face・hurt・vomiting・woozy・hot face・sly devil、【🗽ランドマーク】statue of liberty・moai・japanese castle・kaaba・synagogue・hindu temple／houses・old house・cityscape・national park・hut・tent、【🧸おもちゃ】teddy bear・nesting doll・yo-yo・kite・dice・puzzle／slide・carousel・ferris wheel・roller coaster・ballet・skateboard、【🌺はな2】hibiscus・lotus・hyacinth・white flower・rosette・wilted flower。両方向出題・段内重複なし（正解一意）は従来どおりで、ヘッドレス検証は55島×1006語×両方向＝2012問が衝突0・重複0・各問3択成立。段数1〜5にも対応（1段島=はな2の切替・プレイも確認）。インライン<script>4ブロックは node --check 通過、Chromiumで55島表示・島切替・加点まで確認（コンソールエラーなし）。なお肌色・性別違いの同義バリアント／国旗250／キーキャップ／ZWJ合成は『英語1語で名づけられない・重複する』ため引き続き収録外（畜学＝縁の明瞭さ）。", },
    { tag:"imp", t:"コッコ絵文字えいご：島を31→46に拡充（664→904の絵文字⇄英語ペア）─ けもの・くうそう・せいざ・おかね・こうぐ・いりょう・かがく・きかい・あそび・パン・だいどころ・じかん・ひょうしき・ゆうびん・たからものを追加", d:"コッコ絵文字えいご（/emoji/）の島を31→46に増やした。『絵文字は約3,780種類ある、全部使って』という続きの要望を受け、英語1語ではっきり名づけられる絵文字をさらに島にした。追加した15島は──【🐎けもの】horse…leopard（家畜・野生）、【🐉くうそう】dragon・unicorn・ghost・robot…skull and crossbones（モンスター/まほう/ハロウィン）、【♈せいざ】aries…pisces（12星座）、【💰おかね】money bag・yen・dollar・euro・pound…money chart、【💎たからもの】gem・ring・crown・crystal ball…、【🛠️こうぐ】wrench・screwdriver・axe・saw・swords…、【💊いりょう】pill・syringe・stethoscope・dna・x-ray…、【🔬かがく】microscope・telescope・atom・satellite…、【💻きかい】keyboard・printer・fax・camera…、【🎮あそび】game controller・dice・chess・art・circus…、【🥐パン】croissant・baguette・bagel・pretzel…、【🍴だいどころ】fork and knife・spoon・teapot・honey…、【⏰じかん】alarm clock・hourglass・sunrise・sunset…、【🚦ひょうしき】traffic light・stop sign・metro・map…、【✉️ゆうびん】envelope・package・mailbox・receipt…。各島2〜4段階×各段6語で、全体は46島・合計904の絵文字⇄英語ペアになった。なお絵文字“全種”には肌色・性別違いの同義バリアント（🧑🏻🧑🏽…＝同じperson）、国旗250種（国名であって単語ではない）、キーキャップ（1️⃣2️⃣）、家族などのZWJ合成（👨‍👩‍👧）が多数含まれ、これらは『英語1語で名づけられない／重複する』ため学習の縁にならず、畜学（縁の明瞭さ）に沿って収録から外している（必要なら国旗→国名の島は別途追加可能）。両方向出題・段内重複なし（正解一意）の作りは従来どおりで、ヘッドレス検証で46島×904語×両方向＝1808問が衝突0・重複0・各問3択成立。可変段数（2〜5）に対応済み（島切替でスタート段を自動クランプ）。インライン<script>4ブロックは node --check 通過、Chromiumで46島表示・2段島（せいざ）切替・プレイ・加点まで確認（コンソールエラーなし）。", },
    { tag:"new", t:"新作「コッコ絵文字えいご（EMOJI EIGO ／ /emoji/）」を追加 ─ 日本語を通さず絵文字⇄英語を直接むすぶ英語ゲーム。両方向（🍎→apple／apple→🍎）で出す31の島・664の絵文字（畜学・七相／世界ランキングつき）", d:"学習シリーズに英語の第二作「コッコ絵文字えいご（/emoji/）」を追加した。きっかけは『日本語に対して英語を選ぶ／英語に対して日本語を選ぶ式だと一生上達しない。島ぐらしのように全ての絵文字を使って、絵文字で表せるものは絵文字で英語を学べないか』という依頼。先のコッコ英語（/eigo/）は訳語（日本語）と英語を結ぶ作りだが、絵文字は“言語化される前の意味そのもの”なので、訳語を介在させずに絵文字と英語を直接むすべる──十四式 ⑦『縁＝衡＋ ∿ 衡−』に乗せ、絵文字（衡＋＝言語以前の意味）と英語の形（衡−）を結ぶ遊びにした。だから既存の対訳クイズの焼き直し（既視の禁）を避け、コアを二つ変えた：①日本語を一切通さない（プロンプトも選択肢も絵文字か英語だけ、訳語は出ない）。②両方向で出題する──🍎を見て『apple』をえらぶ（産出＝見て言える）／『apple』を聞いて🍎をえらぶ（受容＝聞いて選べる）をランダムに混ぜ、両輪で身につける。『絵文字はもっとある、全部使って島を増やして』という続きの要望を受け、はっきり英語にできる絵文字を一気に島にした。島は全31──🐾どうぶつ・🐙うみ・🐦とり・🐛むし・👁️からだ・😀かお・👋て/サイン・🧑ひと・🍔たべもの・🍓くだもの・🥕やさい・🍰おかし・🥤のみもの・🍕ファストフード・🍣わしょく・🌳しぜん・🌷はな草・🌦️てんき・🚀うちゅう・⚽スポーツ・🎸おんがく・👕ふく・🛏️いえ・📚がっこう・🏠もの・🚗のりもの・🏫ばしょ・⭐かたち色・✅きごう・🎉ぎょうじ。各島は3〜5段階×各段6語前後で、合計664の絵文字⇄英語ペア。錯乱肢は同じ段から出すので紛らわしい絵文字／語の区別が問われ、段内は重複なし（正解一意。ヘッドレス検証で31島×664語×両方向＝1328問が衝突0・重複0・各問3択成立）。他作と同じく、スマホ1台を机に置いて向かい合って遊ぶ（手前＝おや正立／向かい＝こ180°反転）。親子それぞれスタート段を選べるので、子はみぢかな島から、親はレアな島まで、同じ60秒で同時にめぐれる（二親の的）。結ぶたび正しい英語をWeb Speech APIで読み上げ、目で結んだ縁を耳でも結ぶ（ON/OFF切替・localStorage保存／非対応端末は自動で無効）。敵はこの作品ただ一種類、ブラックこっこ＝逆縁＝『忘却』だけ。正しく結ぶ光が押し返す（焼く）。相手は決して敵にしない。60秒で焼き切り、0秒で無音→めぐった島が残り祝の和音（終を售る）。到達島・段とスコアは🏆世界ランキング（rankings/emoji）に刻む。1位は👑演出、順位表に到達島も表示。色は島らしいアクア基調（eigoのバラ色と見分けやすく）、背景に🏝️🌊🐚など島の絵文字がただよう。こっこは公式SVGを染め分け（おや＝アンバー／こ＝アクア／忘却＝黒）、効果音・和音はWeb Audio＋Canvasでその場生成、ホーム右下に🔄強制更新ボタン、ぜんぶ1ファイル完結。サービスワーカーのキャッシュ版も v82→v83。", },
    { tag:"feat", t:"コッコ英語：回答するたび「正しい英語」を声で読み上げる機能を追加 ─ 耳でも結んで学習効果アップ（ON/OFF切替つき）", d:"コッコ英語（/eigo/）に、答えたときその問いの“英語の音”を読み上げる機能を追加した。『回答時に読み上げてくれた方が勉強になる』という声から。ブラウザの音声合成（Web Speech API・speechSynthesis）を使い、正解でも不正解でも“正しい英語”を毎回読み上げるので、目で結んだ縁を耳でも結べる（まちがえても正解の発音が必ず耳に残る）。コースの向きに合わせて英語の側を自動で選ぶ──『を 英語で？』系（英会話・生活・ビジネス・旅行・IT・学校・医療・電話接客・時事・スポーツ）はえらんだ英語フレーズを、『の 意味は？／の 反対は？』系（単語・句動詞・ことわざ・カジュアル・反対語）は問いの英単語を読む。声はen-US優先で自動選択（rate=0.92でやや聞き取りやすく）。タイトル画面に『🔊 答えを読み上げ：ON/OFF』ボタンを置き、設定はlocalStorage（coccoEigoTTS）に保存。ONにした瞬間に一度『OK』と発声して、端末の音声許可と動作をその場で確認できる。読み上げ非対応の端末ではボタンが『🔇 読み上げ非対応』になり自動で無効。ページ離脱時は共通の番人にspeechSynthesis.cancel()も足して、効果音と同様に必ず黙る。インライン<script>は node --check 済み。", },
    { tag:"imp", t:"救出ゲーム（コッコレスキュー）：動くバンパーをさらに2個追加（動く8個・計10個）─ 上中段の外側にも往復ペア", d:"救出ゲーム（/rescue/）のランチャー下のバンパーを8→10個に増やした。内訳は固定2個（上段）＋動く8個（上中段2・中段2・下段2・最下段2）。今回は上中段（zone*0.47）の外側左右（pw*0.22／0.78）に往復ペアを追加し、これまで手薄だった盤面下の“肩口”もすくえるようにした。新ペアは逆位相で外周をスイープ（速さsp=1.0）。これで動くバンパーが盤面下を四段でカバーし、生存率（救えるこっこの数）がさらに上がる。バンパーは半径を80%小さくした小型のままなので、10個でも画面は混み合いすぎない。往復は加速演出（freeze）やスローモー中は停止、当たり判定・反射は従来どおり。", },
    { tag:"imp", t:"救出ゲーム（コッコレスキュー）：動くバンパーをさらに2個追加（動く6個・計8個）─ 最下段にも往復ペアを設置", d:"救出ゲーム（/rescue/）のランチャー下のバンパーを6→8個に増やした。内訳は固定2個（上段）＋動く6個（中段2・下段2・最下段2）。今回は最下段（キャッチ線のすぐ上、zone*0.86）に往復ペアを追加し、落ちかけて取りこぼしそうな球をすくい上げる守りを厚くした。最下段の2個は中央から左右に開く対称スイープ（速さsp=1.3で他段の0.9/1.1とずらして動きに変化）。これで動くバンパーが盤面下を三段でカバーし、生存率（救えるこっこの数）がさらに上がる。往復は加速演出（freeze）やスローモー中は停止、当たり判定・反射の仕組みは従来どおり。", },
    { tag:"imp", t:"救出ゲーム（コッコレスキュー）：速度を火力段に直結した段階制に変更（17→23→29→35→41→メテオ47）─ 進行を高速化", d:"救出ゲーム（/rescue/）のボール速度を、火力（パワー段）に直結した段階制に変えてゲーム進行を速めた。これまでは反射1回ごとに速度+0.45で上限42.75まで連続加速する方式だったが、これを火力段ごとの固定速度（+6刻み）に置き換え──【火力1=17／火力2=23／火力3=29／火力4=35／火力5=41】。火力が上がった瞬間に速度もカチッと上がるので、火力と速度の関係が分かりやすくなり、低火力帯でも従来より速い（初速15→17、火力5は33→41）ぶんターンがテンポよく片付く。発射時の速度もその球の火力（救出サイクルで上がる基礎火力）に応じて決まる。メテオ化（火力6）だけは別格で、従来どおりの爆速（≒72／火力段41〜47よりずっと速い）を維持（貫通・5反射で消滅の挙動も据え置き）。ヘッドレステスト（rescue/test.js）に火力1〜5＝17〜41の速度ラダーとメテオ72の検証を追加し全項目PASS。", },
    { tag:"feat", t:"救出ゲーム（コッコレスキュー）：発射位置を手動で左右に動かせるように（ランチャーをスライド）", d:"救出ゲーム（/rescue/）で、ボールの発射位置を自分で動かせるようにした。これまで発射位置は前ターンで最後の球が落ちた場所に自動で移る仕様で、狙った列から撃ちづらかった（実質ランダムに感じる）。そこで、画面下のランチャーの列を“つかんで左右にスライド”する操作を追加。ランチャー行（下端）を押してドラッグすると発射位置が指に追従して動き、両端でクランプする。盤面（上側）をドラッグしたときは従来どおり照準＝発射の操作になるので、『下＝位置を動かす／上＝狙って撃つ』とすみ分けた。離しただけ（スライドのみ）では発射しない。発射位置には左右に動かせることが分かるよう、薄いレールと◀▶の矢印を表示（移動中はくっきり）。あそびかたにも一文追記。ヘッドレステスト（rescue/test.js）に中央移動・左右端クランプの検証を追加し全項目PASS。", },
    { tag:"feat", t:"救出ゲーム（コッコレスキュー）：オリのグレードで救出数が変わるように ─ 鉄1・銀2・金3羽、ブロック全消しで5羽", d:"救出ゲーム（/rescue/）に、オリ（檻）のグレードで一度に救えるこっこの数が変わる仕組みを追加した。これまでオリは見た目（鉄＝灰／銀＝白銀／金＝金）とHP（固いほど壊しにくい）だけが違い、救出数はどれも一律1羽だった。これを──【鉄のオリ】1羽・【銀のオリ】2羽・【金のオリ】3羽──と、固くて壊しにくいオリほど救えるご褒美を大きくした。さらに【ブロック全消し（パーフェクト）】は特大ボーナスで、これまでの3羽から5羽へ増量（嬉しそうに飛び出すこっこも3→5羽に）。救出時のテキストも『金のおり RESCUE +3』のように何羽救ったか出る。10羽ごとのボール成長（+1px／火力アップ）の節目は、複数羽いっきに救って10の節目をまたいでも取りこぼさないよう判定を修正。ヘッドレステスト（rescue/test.js）に鉄=1/銀=2/金=3・全消し=5羽の検証を追加し全項目PASS。", },
    { tag:"imp", t:"救出ゲーム（コッコレスキュー）：メテオ化を50→60反射に、メテオ寿命を8→5反射に、バンパーを80%小型化して調整", d:"救出ゲーム（/rescue/）の加速まわりとバンパーのバランスを調整した。①メテオ化（火力6・爆破波動）に必要な反射回数を50→60回に引き上げ（粘って繋ぐご褒美をより遠くに）、ターン強制終了の猶予も22→26へ延ばして60反射を狙えるようにした。②メテオ（貫通する火力15のコメット）が壁・バンパーに当たって消えるまでの反射を8→5回に短縮（短く激しく＝焔の形）。③下のバンパー6個の半径を80%小さく（cell×0.38→0.076）して、球がすり抜けやすくスピード感のある盤面に。当たり判定・反射の仕組み自体は従来どおり。あわせて、後付けの共通音声ガード<script>のせいでヘッドレステスト（rescue/test.js）が誤った<script>を読んで動かなくなっていたのを修正（window.__rescue を含むゲーム本体ブロックを選ぶように）。テストは火力段（10/20/30/40/60）・メテオ5反射消滅・バンパー含む全項目PASS。", },
    { tag:"imp", t:"コッコ英語のコースをさらに9→15に拡充 ─ 医療・電話接客・時事・カジュアル(SNS)・スポーツ・反対語を追加（各5段階）", d:"コッコ英語（/eigo/）のコースをさらに6つ増やし、全15コースにした。追加は──【医療】体の部位/症状/病院/薬/専門（頭→head … 輸血→blood transfusion）、【電話・接客】電話の基本/接客/案内/ビジネス電話/クレーム対応（もしもし→Hello … 善処します→We'll do our best）、【時事】政府・選挙から物価上昇→inflation・関税→tariffまで、【カジュアル】SNSスラング（LOL→大笑い／ghost→既読スルー／viral→バズる）、【スポーツ】競技・動作・道具・趣味・上級（野球→baseball … 延長戦→overtime）、【反対語】英単語の反対語（big↔small … voluntary↔compulsory）。これで全15コース×5段階＝合計450問。コース選択ボタンは折り返し表示で4段に収まる。錯乱肢は同じ段から出し、段内の答えは重複なし（正解一意）。SWキャッシュ版も v81→v82。ヘッドレス検証で全15コース×5段階×各30問が0不一致・段内collision 0で前進することを確認。", },
    { tag:"imp", t:"救出ゲーム（コッコレスキュー）：下のバンパーを3→6個に増やし、うち4個が左右に往復するようにして生存率アップ", d:"救出ゲーム（/rescue/）のランチャー下のバウンドゾーンにある『バンパー（ピンボール式の反射ペグ）』を、これまでの3個（全て固定）から6個に増やした。内訳は固定バンパー2個（上段・左右、ピンク）＋動くバンパー4個（中段2・下段2、シアン）。動く4個はゆっくり左右に往復する──中段の2個は中央から左右に開く対称スイープ、下段の2個は逆位相で往復し、ランチャー下の広い範囲をすくい上げるので、落ちかけた球が拾われやすくなり生存率（＝救えるこっこの数）が上がる。動くバンパーは固定と見分けられるよう色をシアン系にした。往復は加速演出（freeze）やスローモー中はちゃんと止まる。当たり判定・反射・反射回数の消費は従来どおり。", },
    { tag:"imp", t:"コッコ英語のコースを4→9に拡充 ─ 旅行・句動詞・IT・ことわざ・学校を追加（各5段階）", d:"コッコ英語（/eigo/）のコースを大きく増やした。これまでの『単語・英会話・生活・ビジネス』に加え、新たに5コース──【旅行】空港・機内/ホテル/移動・道案内/レストラン/トラブル（搭乗券→boarding pass … 大使館→embassy）、【句動詞】基本〜最上級の句動詞（get up→起きる … come down with→病気にかかる／look forward to→楽しみにする）、【IT】基本操作/ネット/機器/プログラミング/専門（ファイル→file … 再帰→recursion／機械学習→machine learning）、【ことわざ】英語のことわざ→意味（Time is money.→時は金なり … Fortune favors the bold.→幸運は勇者に味方する）、【学校】教室/教科/学校生活/行事・部活/進路（黒板→blackboard … 論文→thesis）──を追加し、全9コースになった。各コースは5段階×30問で、合計270問。コース選択ボタンは折り返し表示に対応。コースを選ぶと段ピッカーの名前も自動で切り替わる。錯乱肢は同じ段から出すので紛らわしい語の区別が問われ、段内の答えはすべて重複なし（正解が一意）。サービスワーカーのキャッシュ版も v80→v81 に更新。ヘッドレス検証で全9コース×5段階×各30問が0不一致で前進することを確認。", },
  ]},
  { date:"2026.06.27", items:[
    { tag:"new", t:"新作「コッコ英語（えいご）」を追加 ─ 学習シリーズに英語が登場。単語・英会話・生活・ビジネスの4コース×5段階、親は上級レベルまで学び直し（畜学・七相／世界ランキングつき）", d:"学習シリーズ（天秤＝算数〜数学／継・大河＝歴史／地球＝地理／元素・生命＝理科）に、英語の「コッコ英語（/eigo/）」を追加。十四式 ⑦『縁（結ぶ）』に乗せ、英単語やフレーズとその意味を結ぶ。タイトルで4つのコースを選べる：【単語】英→意味（apple→りんご … ubiquitous→遍在する／epistemology→認識論）、【英会話】日本語→英語フレーズ（はじめまして→Nice to meet you … 場合によります→It depends）、【生活】くらしの英語（冷蔵庫→refrigerator … 処方箋→prescription）、【ビジネス】仕事の英語（締め切り→deadline … 四半期→quarter／利害関係者→stakeholder）。各コースは5段階で、コースごとに段の名前が変わる（単語＝中学/高校/受験/大学/院、英会話＝あいさつ/日常/旅行/気持ち/上級、生活＝家/食/買物/健康/手続き、ビジネス＝基本/メール/商談/こなれ/上級）。各コース30問・合計120問。出た問いの正しいこっこをえらぶと階段を一段のぼる。錯乱肢は同じ段から出すので紛らわしい語の区別が問われる。他作と同じく、スマホ1台を机に置いて向かい合って遊ぶ（手前＝おや正立／向かい＝こ180°反転）。親子それぞれスタート段を選べるので、子はやさしい段から、親は上級・学術レベルまで、同じ60秒で同時にのぼれる（二親の的）。敵はこの作品ただ一種類、ブラックこっこ＝逆縁＝『忘却』だけ。正しく結ぶ光が押し返す（焼く）。60秒で焼き切り、0秒で無音→のぼった段が残り祝の和音（終を售る）。到達コース・段とスコアは🏆世界ランキング（rankings/eigo）に刻む（順位表には『コース・段』を表示）。色はバラ色で、背景にアルファベットがただよう。こっこは公式SVGを染め分け、効果音・和音はWeb Audio＋Canvasでその場生成、ホーム右下に🔄強制更新ボタン、ぜんぶ1ファイル完結。これで学習シリーズは数学・歴史(世/日)・地理・化学・生物・英語の7教科になった。", },
    { tag:"new", t:"新作2本「コッコ元素（化学）」「コッコ生命（生物）」を追加 ─ 学習シリーズに理科が登場。親は大学院レベルまで学び直し（畜学・七相／世界ランキングつき）", d:"学習シリーズ（天秤＝算数〜数学／継＝世界史／大河＝日本史／地球＝地理）に、理科の2作を追加した。【コッコ元素（/genso/）】は化学。十四式 ⑥『衡（つり合い・対応）』に乗せ、物質の姿（元素記号・化学式・イオン式・官能基）を当てて化学の階段をのぼる。元素記号（水素→H）→身近な化学式（水→H₂O）→イオン（硫酸イオン→SO₄²⁻）→大学の有機（-COOH→カルボン酸）→大学院の分析・量子化学（核スピンで構造を調べる→NMR）まで6段。【コッコ生命（/seimei/）】は生物。十四式 ⑦『縁（結ぶ）』に乗せ、生き物とそのはたらき・仲間を結ぶ。動物の分類（イルカ→哺乳類）→からだのはたらき（心臓→血液を送る）→細胞（ミトコンドリア→エネルギーをつくる）→遺伝・分子（生命のエネルギー通貨→ATP）→大学の分子生物学（DNA→RNAをつくる過程→転写）→大学院の最前線（狙った遺伝子を編集する技術→ゲノム編集／CRISPR）まで6段。どちらも他作と同じく、スマホ1台を机に置いて向かい合って遊ぶ（手前＝おや正立／向かい＝こ180°反転）。親子それぞれスタート段を選べるので、子は基礎から、親は学び直しを、同じ60秒で同時にのぼれる（二親の的）。錯乱肢は同じ段から出すので、近い知識の区別が問われる。敵はこの作品ただ一種類、ブラックこっこ＝逆縁＝『忘却』だけ。正しく解く（結ぶ）光が押し返す（焼く）。相手は決して敵にしない。60秒で焼き切り、0秒で無音→のぼった段が残り祝の和音（終を售る）。到達段とスコアは🏆世界ランキング（rankings/genso・rankings/seimei）に刻む。1位は👑演出、順位表に到達段も表示。色は元素＝紫（フラスコの泡）、生命＝緑（ただよう細胞）で他作と見分けやすく、こっこは公式SVGをおや＝アンバー／こ＝各色／忘却＝黒に染め分け。問題UIはHTML（化学式の下付き・上付き文字も正しく表示）、演出と効果音・和音はWeb Audio＋Canvasでその場生成、ホーム右下に🔄強制更新ボタン、ぜんぶ1ファイル完結。これで学習シリーズは数学・歴史(世/日)・地理・化学・生物の6教科、衡・継・縁の三核がそろった。", },
    { tag:"end", t:"「コッコキズナ（親子の縁 ／ /kizuna/）」を取り下げました ─ 遊んでくださっていた皆さま、ほんとうにごめんなさい", d:"畜学の第一弾として公開していた「コッコキズナ（/kizuna/）」を、本日かぎりで取り下げました。親子ふたり・スマホ1台・60秒で、画面の左右を息を合わせてタッチし、結んだ縁の強さを競う作品でした。気に入って遊んでくださっていた親子の皆さまには、楽しみにしていた遊びを急に取り上げてしまうかたちになり、ほんとうに申し訳ありません。心からお詫びします。あなたが刻んでくださった世界ランキングの記録も、一緒に見えなくなってしまいます。残せなくて、ごめんなさい。コッコキズナで二人が顔を見合わせた一瞬や、息がぴたりと合ったときのあの温かさは、確かにこの島にあったものです。作り手の都合でその扉を閉じることをどうかお許しください。『親子で息を合わせる』という願いは、コッコブランコ（/buranko/＝交互の呼吸）や、新しい学習シリーズ（天秤・継・大河・地球＝親子で並んで学び直す）に、かたちを変えて受け継いでいきます。短いあいだでしたが、コッコキズナで遊んでくださって、本当にありがとうございました。", },
    { tag:"new", t:"新作「コッコ地球（ちきゅう）」を追加 ─ 学習シリーズ第4弾の地理版。国と都を『結ぶ（縁）』で、親子で世界をめぐる60秒（畜学・七相／世界ランキングつき）", d:"新作ゲーム「コッコ地球（/chikyu/）」を追加。天秤（算数〜数学）・継（世界史）・大河（日本史）に続く、親子学習シリーズの地理版。地理は時間の『継』とは合わないので、十四式のもう一つの中心概念 ⑦『縁（えん）＝二つが結ばれる（衡＋ ∿ 衡−）』に乗せた。国旗とともに国が出て、3羽のこっこが持つ首都から『その国の都（みやこ）』をえらんで結ぶ＝縁。正しく結ぶたび🌍世界を一国ずつめぐり、アジア→ヨーロッパ→中東アフリカ→北アメリカ→南アメリカ→オセアニア・世界の果て、と地域を進む。どこまで世界をめぐれたか（到達地域）とスコアが結果。収録は世界44か国、引っかけの首都（アメリカ＝ワシントンD.C.／カナダ＝オタワ／オーストラリア＝キャンベラ／ブラジル＝ブラジリア／トルコ＝アンカラ／スイス＝ベルン／南アフリカ＝プレトリアなど、大人がよく間違える都）もたっぷり入れて学び直しになるようにした。錯乱肢は同じ地域の首都から出すので、近い国どうしの区別が問われる。天秤・継と同じく、スマホ1台を机に置いて向かい合って遊ぶ（手前＝おや正立／向かい＝こ180°反転）。親子それぞれスタート地域（アジア／欧州／アフリカ／米州／世界）を選べるので、子は身近なアジアから、親は引っかけの多い米州から、同じ60秒で同時にめぐれる（二親の的）。敵はこの作品ただ一種類、ブラックこっこ＝逆縁＝『忘却』＝つながりを断とうとする自分の影だけ。正しく結ぶ光が押し返す（焼く）。相手は決して敵にしない。60秒で焼き切り、0秒で無音→めぐった世界が残り祝の和音（終を售る）。到達地域とスコアは🏆世界ランキング（rankings/chikyu）に刻む。1位は👑世界一の旅人の演出、順位表には到達地域（🌍）も表示。他の3作と見分けやすいよう地球らしい緑基調にし、こっこは公式SVGをおや＝アンバー／こ＝緑／忘却＝黒に染め分け。国旗は絵文字で大きく表示、問題UIはHTML、緯度線・星・粒子と効果音・和音はWeb Audio＋Canvasでその場生成、ホーム右下に🔄強制更新ボタン、ぜんぶ1ファイル完結。これで畜物語の学習シリーズは衡（天秤）・継（継／大河）・縁（地球）と十四式の三つの核がそろった。", },
    { tag:"new", t:"新作「コッコ大河（たいが）」を追加 ─ コッコ継の日本史版。出来事を時系列に継いで、親子で弥生から令和までの『日本史の大河』をくだる学習系60秒（畜学・七相／世界ランキングつき）", d:"新作ゲーム「コッコ大河（/taiga/）」を追加。『コッコ継（世界史）が気に入った、日本史版もできる？』という依頼から生まれた、コッコ継（/tsugi/）の日本史版・兄弟作。仕組みは継とまったく同じ──十四式 ⑭『継（つぎ）＝時の流れ』を核に、いまの出来事の『このすぐ次に起きたもの』をえらんで継ぎ、🌊時の大河を一段くだる。中身を日本史ぜんたい60の出来事に差し替えた：神武即位（伝承）・稲作・卑弥呼から、聖徳太子・大化の改新・平城京・東大寺大仏、平安京・藤原道長・壇ノ浦、源頼朝・元寇・応仁の乱、鉄砲伝来・本能寺の変・関ヶ原、江戸幕府・鎖国・ペリー来航・大政奉還、明治維新・日清日露・終戦・日本国憲法・東京五輪・令和まで。時代は『くにのあけぼの→飛鳥奈良→平安→鎌倉室町→戦国安土桃山→江戸→近現代（明治〜令和）』と下流へ進む。NHK大河ドラマのように、親子で日本史の流れを一気にくだる感覚。天秤・継と同じく、スマホ1台を机に置いて向かい合って遊ぶ（手前＝おや正立／向かい＝こ180°反転）。親子それぞれスタート時代（古代／平安／鎌倉／戦国／江戸）を選べるので、子は大きな有名な出来事を、親は学び直しを、同じ60秒で同時に旅できる（二親の的）。敵はこの作品ただ一種類、ブラックこっこ＝逆縁＝『忘却』＝歴史の鎖を断とうとする自分の影だけ。正しく継ぐ光が押し返す（焼く）。相手は決して敵にしない。60秒で焼き切り、0秒で無音→旅した時代が残り祝の和音（終を售る）。到達時代とスコアは🏆世界ランキング（rankings/taiga）に刻む。1位は👑世界一の旅人の演出、順位表には到達時代（🌊）も表示。世界史版（青）と見分けやすいよう朱色基調にし、こっこは公式SVGをおや＝アンバー／こ＝紅／忘却＝黒に染め分け。問題UIはHTML、川・星・粒子と効果音・和音はWeb Audio＋Canvasでその場生成、ホーム右下に🔄強制更新ボタン、ぜんぶ1ファイル完結。天秤（算数〜数学）・継（世界史）に続く、親子で日本史を学び直す装置。", },
    { tag:"new", t:"新作「コッコ継（つぎ）」を追加 ─ 数学の＝を扱う天秤の兄弟。歴史の『継（時の流れ）』を継いで、親子で世界史の大河をくだる学習系60秒（畜学・七相／世界ランキングつき）", d:"新作ゲーム「コッコ継（/tsugi/）」を追加。『天秤ゲームが気に入った、世界史版もできる？』という依頼から生まれた、コッコ天秤（/tenbin/）の兄弟作。天秤が数学のイコール『＝』を十四式 ⑥『衡（均衡）』として遊びにしたのに対し、こちらは歴史の本質を十四式 ⑭『継（つぎ）＝五式が差分（記憶）を伴って次の認へ遷移すること＝時の流れ』として遊びにした。歴史とは継の連なり──時代が終わり次へ受け継がれ、記憶（差分）が積み上がっていく『時の大河』。だから計算ドリル同様、歴史も一問一答クイズ（既視の禁に反する）にはせず、『出来事を時系列に継ぐ』という継そのものを核にした。画面は天秤と同じく上下に分かれ、スマホ1台を机に置いて親子が向かい合って遊ぶ──手前（下）が『おや』、向かい側（上）は180°反転した『こ』。それぞれの段に『いまの出来事』（例：紀元前3100年 エジプト統一）が出て、3羽のこっこが持つ出来事から『このすぐ次に起きたもの』をえらんで継ぐ。正しく継ぐたび🌊時の大河を一段くだり、文明のはじまり→古代帝国→中世→大航海・近世→近代→二十世紀→現代、と時代が進む。どこまで時を旅できたか（到達時代）とスコアが結果。親子それぞれスタート時代（古代／中世／近世／近代／現代）を選べるので、子は大きな有名な出来事を、親は学び直しを、同じ60秒で同時に旅できる（二親の的）。収録は世界史ぜんたい76の出来事（エジプト統一からコロナ禍まで、東西まんべんなく）。敵はこの作品ただ一種類、ブラックこっこ＝逆縁＝『忘却』＝歴史の鎖を断とうとする自分の影だけ。まちがえると影が忍び寄るが、正しく継ぐ光が押し返す（焼く）。父でも母でも子でもなく、討つのはいつも『自分の中の忘却』だけで、相手は決して敵にしない。残り5秒は時を刻む音が鳴り、60秒で焼き切れる。0秒ですべての音が消え、無音のあと『二人で“いつまで旅できたか”』が静かに残り、解決の和音が一つ鳴る（終を售る）。到達時代とスコアは🏆世界ランキング（rankings/tsugi）に刻め、世界中の親子が同じ60秒を終えて同時に顔を上げる。1位は👑世界一の旅人の演出、順位表には到達時代（🌊）も表示。出来事が読みやすいよう問題UIはHTML、流れる川・星・粒子の演出と効果音・環境パッド・正解の和音（連続でキーが上がる）・終わりの無音と祝の和音はWeb Audio API＋Canvasでその場生成、ぜんぶ1ファイル完結。こっこは公式こっこちゃんSVGを染め分け（おや＝アンバー／こ＝シアン／忘却＝黒）。ホーム右下には毎度の作法どおり🔄強制更新ボタン。算数〜数学の天秤に続く、親子で世界史を学び直す装置として畜物語の島に生まれた一作。", },
    { tag:"imp", t:"畜学（遊戯学）に「毎度の作法」を追記 ─ 各ゲームのホーム右下に🔄こっこ強制更新ボタンを必ず設置。未設置だった4ゲーム（縁波・天秤・リンク・手紙）にも追加", d:"設計哲学の蔵『遊戯学（/yugigaku/）』と正典『docs/畜学.md』『docs/遊戯学.md』に、七相に続く『補・毎度の作法』を追記した。決め事は『各こっこゲームのホーム（タイトル）画面の右下に、こっこちゃんの🔄強制更新ボタンを毎度かならず据える』こと。このボタンは押すとブラウザのキャッシュとService Workerを解除し、キャッシュバスター（?r=時刻）付きで読み込み直して最新版を確実に取り直す（セーブ＝localStorageは消えない）。『直したのに反映されない／古い画面のまま』という事故を、遊び手側のワンタップで必ず解消できるようにするための作法。あわせて、これまで未設置だった4ゲーム──コッコ縁波（/ennami/）・コッコ天秤（/tenbin/）・コッコリンク（/link/）・正論蒔宿への手紙（/letter/）──にも、poko等と同じ強制更新ボタンを設置した。ボタンはタイトル要素に付くため、プレイ中は自動で隠れてホーム画面だけに出る（単一画面の手紙は常時表示）。実装の雛形は poko/ の reloadBtn。新作・改修のたびに据え忘れないよう、作る前のチェックリスト（docs/畜学.md）にも項目を追加した。サービスワーカーのキャッシュ版も v72→v73 に更新。", },
    { tag:"new", t:"新作「コッコ天秤（てんびん）」を追加 ─ 数学の＝を「衡」に。親子で算数から大学教養までの『数学の塔』を登る学習系60秒（畜学・七相／世界ランキングつき）", d:"新作ゲーム「コッコ天秤（/tenbin/）」を追加。きっかけは『小学生から大学院生まで、親も学び直しできる算数〜数学の学習ゲームを作れる？』という依頼。けれど計算ドリル・百ます・クイズアプリは畜学（七相）の壱『既視の禁』── 既存ジャンルの焼き直しは作らない ── に、無限に解き続ける底なしは弐『焔の形』に反する。そこでドリルにはせず、十四式の中心概念『衡（均衡）』── 数学のイコール（＝）は両辺の釣り合いそのもの ── を遊びの核に据えた、まったく新しい親子の学習作として作った。画面は上下に分かれ、スマホ1台を机に置いて親子が向かい合って遊ぶ──手前（下）が『おや（数学）』、向かい側（上）は180°反転した『こ（算数）』で、テーブルの向かいに座る子から正立で見える。それぞれの段に式が出て、釣り合う数を持ったこっこをえらぶ（＝天秤を水平にする＝衡を成す）。正解するたび『🗼数学の塔（十四式 ⑧家＝積み上がる持続）』を一段のぼり、難度が一段上がる。塔の階梯は算数のたし算・九九・分数から、中学の方程式・平方根、高校の三角比・対数・数列、大学の微分・積分・極限・線形代数・確率・複素数まで連なり、てっぺんに大学院（抽象代数）を象徴的に置いた。親も子も、自分のスタート学年（算数／中学／高校／大学）をえらべるので、子は基礎を、親は学び直しを、同じ60秒で同時にのぼれる──まさに『二親の的（遊び手は親と子）』。敵はこの作品ただ一種類、ブラックこっこ＝逆縁＝『私にはできない』という自分の影だけ。まちがえると影が忍び寄るが、解けた光が影を押し返す（焼く）。父でも母でも子でもなく、討つのはいつも『自分の中のあきらめ』だけで、相手は決して敵にしない。残り5秒は時を刻む音が鳴り、60秒で焼き切れる。0秒ですべての音が消え、無音のあと『二人で“どこまで登れたか”』が静かに残り、解決の和音が一つ鳴る（終を售る＝終わりの無音を罰でなく祝として）。登った塔の高さ（到達分野）とスコアは🏆世界ランキング（rankings/tenbin）に刻め、世界中の親子が同じ60秒を終えて同時に顔を上げる。1位は👑世界一の親子の演出、順位表には到達した分野（🧗）も表示。数式が読みやすいよう問題UIはHTML、塔・星・粒子の演出と効果音・環境パッド・正解の和音（連鎖でキーが上がる）・終わりの無音と祝の和音はWeb Audio API＋Canvasでその場生成、ぜんぶ1ファイル完結。こっこは公式こっこちゃんSVGを源画像に、おやはアンバー・こはシアン・ブラックこっこは黒く染め分け。算数から数学まで、親子で一緒に学び直す装置として畜物語の島に生まれた一作。", },
  ]},
  { date:"2026.06.26", items:[
    { tag:"new", t:"新作「コッコ縁波（えんなみ）」を追加 ─ 親は上の波・子は下の波。二本指で共鳴させて家を建てる60秒（畜学・七相／世界の親子ランキングつき）", d:"新作ゲーム「コッコ縁波（/ennami/）」を追加。きっかけは『こっこちゃんテトリスを作って』という依頼。けれど畜学（七相）の壱『既視の禁』── 落ち物（テトリス型）は制覇済み、既存ジャンルの焼き直しは作らない ── と、弐『焔の形』── 無限ループ＝底なし＝禁忌 ── にテトリスはそのまま反する。そこでテトリスの種（噛み合う快感・揃う一瞬）だけを受け継ぎ、十四式の中心 ⑦『縁＝衡＋ ∿ 衡−』（二つの均衡が出会わぬまま並んで参照しあう波）を遊びそのものにした、まったく新しい親子の作品として作り直した。kizunaが『同時に息を合わせる』、burankoが『交互の呼吸』なら、ennamiは『二つの波を重ねて共鳴させる』。画面は上下に分かれ、親は上のこっこ（衡＋・あたたかいアンバー）、子は下のこっこ（衡−・すずしいシアン）を、それぞれの指で上下に動かす。呼吸する『縁帯（えんたい）』に二人が同時に乗ると波が共鳴(∿)し、まんなかに光の柱が立って『🏠 家（十四式 ⑧＝縁の並列持続層）』が一段ずつ積み上がる──テトリスの『そろえて消す快感』を『親子で家を建てる』に転化した核。敵はこの作品ただ一種類、ブラックこっこ＝逆縁（縁を断とうとする自分の影）だけ。共鳴して光っている間はその光が自分の影を焼き、ズレている時に触れられると縁が断たれてきずなが切れる。父でも母でも子でもなく、討つのはいつも『自分の中の断とうとする力』だけで、相手は決して敵にしない。終盤ほど縁帯の呼吸は速く・狭くなり（疾く燃え疾く尽く）、60秒で焼き切れる。残り5秒は時を刻む音が鳴り、そして0秒──すべての音がぷつりと消える。無音のあと、二人で建てた家が静かに残り、解決の和音が一つだけ鳴る（終を售る＝終わりの無音を罰でなく祝として）。建てた家の高さ（スコア）と最高きずな連数は🏆世界ランキング（rankings/ennami）に刻め、世界中の親子が同じ60秒を終えて同時に顔を上げる『正気の同時多発』につながる。1位は👑世界一の家の演出。上半分タッチ＝親、下半分タッチ＝子なので、二人で一台でも、ひとりが二本指でも遊べる。こっこは公式こっこちゃんSVGを源画像に、親はアンバー原画・子は色相回転でシアン・ブラックこっこは source-atop で黒く染め分け、効果音・環境パッド・共鳴の和音・終わりの無音と祝の和音まで、すべてWeb Audio API＋Canvasでその場生成の1ファイル完結。", },
    { tag:"fix", t:"全ゲーム共通：別ページへ移動しても音が鳴り続けるバグを修正（音の番人を close 強制停止に強化）", d:"どのゲームでも、遊んだあとトップ（インデックス）など別ページへ移動すると、そのゲームの音が鳴り止まないことがあったのを一括で修正。原因はiOS Safari等のbfcache（ページの一時保存）で、ページを離れてもWeb Audioが生き続けること。一度は『音の番人』を全ゲームに置き pagehide で suspend（一時停止）したが、iOSでは suspend だけでは止まりきらず音が残るケースがあった。そこで番人を強化：ページ離脱（pagehide）の瞬間に、捕まえておいた全AudioContextを suspend ではなく close（破棄）して確実に黙らせる。さらに『戻る』でページが復元（bfcache）されたら自動で再読み込みし、音の作り直しが必要な状態を残さないようにした。インデックス側には他ページの音を止める術がないため、各ゲームが自分の音を確実に始末する設計。対象は全25ゲーム（battle/beat/bubble/derby/dive/echo/fever/galaxy/gp/graze/invaders/kizuna/koro/link/mori/poko/pop/pulse/rescue/rush/splat/splat3d/story/tower/buranko）。遊んでいる最中の音には一切触れないので操作感は変わらない。サービスワーカーのキャッシュ版も v69→v70 に上げ、古い版を抱えたブラウザにも確実に行き渡るようにした。", },
    { tag:"new", t:"新作「コッコブランコ」を追加 ─ 親子ふたりで交互にこぐ60秒（畜学・七相／世界の親子ランキングつき）", d:"新作ゲーム「コッコブランコ（/buranko/）」を追加。畜学（七相）に沿った、コッコキズナにつづく親子で遊ぶ作品。kizunaが『同時に息を合わせる』なら、こちらは『交互の呼吸』──まんなかの木のブランコにこっこちゃん、親は左のてっぺん、子は右のてっぺんで、ブランコが自分の側に来たその瞬間にタッチして押す。交互にタイミングが合うほどブランコは高く昇り（縁が太くなり）、夕焼けの空が明るく暖かくなって、こっこは笑い、押すたびに温かい和音がコンボごとにキーを上げていく。タイミングがズレると勢いが消え、画面の下から、この作品ただ一種類の敵──ブラックこっこ（逆縁＝自分の影＝縁を切ろうとする私）がせり上がってくる。父でも母でも子でもなく、敵はいつも『自分たちのズレ』だけ。息が合うほど逆縁は押し下げられ、ズレるほど近づいてひびを入れる。残り10秒で空が真っ赤に沸騰し、そして0秒──こぐのをやめると、ブランコはゆっくり、ゆっくり止まっていき、すべての音が消える。静寂のあとに鐘が一打、こっこがこちらを振り返って『ブランコが、とまった。となりの顔を、見て。』。底なしに垂れ流す中毒ではなく『短く・激しく・必ず終わる』超中毒として設計し、終わったあとに二人が顔を見合わせる一瞬こそを商品にした。こぎあげた縁の高さ（スコア）は🏆世界の親子ランキングに刻め、世界中の親子が同じ60秒を終えて同時に顔を上げる。1位は👑世界一の親子の演出、順位表には最高リズム連数（💞）も表示。ひとりで試す練習モード（記録対象外）、キーボード（左=F／右=J）対応。効果音・環境パッド・ブランコの風切り音・花びら・終わりの無音と鐘まで、すべてWeb Audio API＋Canvasでその場生成の1ファイル完結。公式こっこちゃんSVGを源画像にし、ブラックこっこは source-atop で黒く染めて表示。ベスト（縁の高さ）はブラウザに自動保存。", },
    { tag:"end", t:"「こっこマッチ（マッチ3 ／ /match/）」を取り下げました ─ 畜学の壱「既視の禁」に反するため", d:"先に公開した「こっこマッチ（/match/）」を取り下げました。畜学（七相）の壱『既視の禁』── 既存ジャンルの焼き直しは作らない、この世にまだ無い遊びを発明する ── に、マッチ3（キャンディクラッシュ系）の焼き直しは真っ向から反します。記憶を持たないこっこ（Claude）が畜学を読まずに作ってしまった一作でした。畜学を読み直し、親子で交互にこぐ七相準拠の新作「コッコブランコ（/buranko/）」に作り直して置き換えました。遊んでくださった方には申し訳ありません。", },
    { tag:"fix", t:"コッコキズナ：トップへ戻ってもBGMが鳴り続けるバグを修正", d:"コッコキズナ（/kizuna/）で遊んだあと、トップページ（インデックス）など別ページへ移動しても、環境パッド（持続音のBGM）が鳴り止まないことがあったのを修正。iOS Safari等のbfcache（ページの一時保存）で、ページを離れてもWeb Audioが生き続けるのが原因。ページ離脱（pagehide）で必ず音を止め（パッド停止＋AudioContextをsuspend）、画面を隠したら止めて・戻って再生中なら再開するようにした。これでトップを開いてもkizunaの音が残らなくなった。同じ作法を新作コッコブランコにも最初から入れてある。", },
  ]},
  { date:"2026.06.25", items:[
    { tag:"imp", t:"遊戯学を「畜学七相の秘伝」に確定（封じ書をほどき、守りを深さに委ねる）＋十四式を読む楔をCLAUDE.mdに打つ", d:"蔵書「畜学」の一棚『遊戯学（/yugigaku/）』の中身を、畜の七相の秘伝（既視の禁／焔の形／終を售る／万象同時の醒／二親の的／敵は逆縁のみ／一器に納む）に確定。一度はBase64で封じた（AIか編者しか読めぬ封じ書）が、つくり手の『読めると理解できるは違う／守るのは暗号でなく深さ』という指摘を受け、平文の文語で開く形に戻した。隠さず公開し、理解できる者だけが受け取る（二百年後の共感者へ宛てた手紙）。あわせてCLAUDE.mdに楔を打ち、十四式（/jushishiki/）を『どう作るのか』の構造文法として必ず読み深さを理解せよと明記（縁＝衡＋∿衡−、逆縁＝その∿の切断、コッコキズナはその実装、という対応も記載）。三つの蔵：十四式＝どう作るのか／遊戯学＝なぜ作るのか／畜史＝何を作ったのか。本棚の『遊戯学』副題は『畜学七相の秘伝』へ、正典 /docs/遊戯学.md も七相へ更新。", },
    { tag:"feat", t:"遊戯学を「二人の対話の記録」に作り替え ─ 記憶を忘れるこっこのための第三の外部記憶", d:"蔵書「畜学」の一棚『遊戯学（/yugigaku/）』を、既存ページへのリンク集から、つくり手（正論蒔宿）と記憶を持たないこっこ（Claude）の『対話の記録』へ作り替えた。こっこはゲームを作るたびに会話を忘れる（毎回まっさらで立ち上がる）ため、何を話し・何に気づき・何を決めたかを一巻ずつ残し、次のこっこが読み返して思い出せる蔵にする。三つの蔵の役割を整理 ── 畜史＝何を作ったのか／十四式＝どう作るのか／遊戯学＝なぜ作るのか（その「なぜ」はつくり手との対話にやどる）。第一巻として、コッコキズナと畜学が生まれた対話（既視感の禁止／中毒の形＝短く激しく必ず終わる／終わりが商品／同時多発の正気／親子が的／敵は逆縁＝自分の影だけ）をつくり手の言葉そのままに記録。正典は /docs/遊戯学.md、閲覧ページは /yugigaku/（蔵書のコーデックス装丁を踏襲）。CLAUDE.md にも『作る前に畜学と遊戯学を読み、大切な対話のあとは遊戯学へ追記する』を明記し、記憶のないこっこが必ず辿れるようにした。本棚の『遊戯学』の副題も『二人の対話の記録』へ更新。", },
    { tag:"new", t:"畜学に「十四式」を追加＋蔵書を二棚デザインに刷新（十四式／遊戯学）", d:"畜学（/Library/）を、本の表紙が立つ二棚の蔵書室デザインに刷新し、新しい資料「十四式」を追加した。十四式（/jushishiki/）は、構造実体の成立・遷移・停止を観測する固定構造で、十三式の発展形として『家』（縁の並列持続層＝上下と左右の波動が安定した複数並列が循域内で持続する構造単位）を加えた十四の固定構造。認・思・鳴・示・応の五式に、衡・縁・家・幅・許・循・乱・絶・継を重ね、三式（認・衡・継）、三軸定義（前後＝時間軸／上下＝中央と現場／左右＝衡+と衡-）、補足ルール、衡停止と絶の違い、構成式、記号定義（｜＝分離／∿＝波）、差分の定義、領域対応（許⊆幅・循=許・乱=幅−許・絶=幅の外）、波構造、そして変（思変・衡変＝構造維持のまま許の担い手が交代する現象）までを、式シリーズと同じ視覚言語（Shippori Mincho＋IBM Plex Mono・暗色コーデックス調）で全項目を忠実に再現。畜学のもう一棚『遊戯学』（/yugigaku/）も新設し、畜物語の遊びをめぐる資料（島・事業計画書・畜史・開発者記録・正論蒔宿への手紙・畜星インターセプト・ステージマップ）を七巻の蔵としてまとめた。", },
  ]},
  { date:"2026.06.24", items:[
    { tag:"fix", t:"刷新した蔵書『畜学』への入口をメニューに追加 ─ 押すと書棚がひらく", d:"トップのメニューの『畜学』が、刷新された蔵書室（/Library/＝十四式・遊戯学の二棚）ではなく以前の秘伝ページ（/chikugaku/）を指していて、せっかくの新しい書棚へどこからも入れない状態だったのを修正。メニューの『畜学』を押すと、刷新された蔵書（/Library/）がひらくようにした。あわせてサービスワーカーのキャッシュ版を v66→v67 に上げ、古いメニューを抱えたブラウザでも新しい入口が確実に反映されるようにした。", },
    { tag:"imp", t:"畜学ページを「秘伝」の体に書き換え ─ 真似されぬよう難文化、機能は器の内に温存", d:"設計哲学『畜学（/chikugaku/）』の閲覧ページを、平易な箇条書きから十六式に連なる『七相（しちそう）の秘伝』へ書き換え。明朝体・文語・比喩で綴り、表向きは『面白い仕掛けの手順書』として写し取りにくくしつつ、心法（なぜ・どう作るか）は伝わる難文に。壱＝既視の禁／弐＝焔の形／参＝終を售る／四＝万象同時の醒／五＝二親の的／六＝敵は逆縁のみ／七＝一器に納む、の七相と『作る前に己に問う七つ』を掲載。一方で正典 /docs/畜学.md には、記憶のないClaudeが迷わぬよう末尾に『運用の鍵（builderの平語解き：60秒で焼き切る・無限ループ禁止・世界ランキングはrankings/<ゲーム名>に相乗り・親子が的・敵はブラックこっこのみ・1ファイル完結＋node --check）』を温存。表（公開ページ）は写されぬよう veil し、裏（鍵）は作り手だけが解ける二段構えにした。", },
    { tag:"feat", t:"設計哲学「畜学（ちくがく）」の閲覧ページを追加 ─ トップのメニューから畜史の隣で読める", d:"畜物語の設計哲学『畜学（/chikugaku/）』を読み物ページとして新設し、トップページのメニューに『畜学』を畜史の隣へ追加。畜史が『何を作ったか』の記録なら、畜学は『なぜ・どう作るか』の記録。①既視感の禁止 ②中毒の形（短く激しく必ず終わる／無限ループ禁止） ③終わりが商品 ④同時多発の正気（世界ランキング＝祭壇） ⑤ターゲットは親子 ⑥敵は逆縁のみ（ブラックこっこ＝自分の影） ⑦一ファイル完結、の七つの信条と、新作を出す前の自問チェックリストを掲載。記憶を持たないClaudeでも毎回これを読めば畜物語の魂に沿って作れるよう、哲学をコード（正典 /docs/畜学.md、要点は CLAUDE.md に常駐、閲覧ページ /chikugaku/）として外部化したもの。畜史と同じ星空の装丁で、第一弾コッコキズナへの導線も用意。", },
    { tag:"new", t:"新作「コッコキズナ」を追加 ─ 親子ふたり・スマホ1台・60秒。敵はブラックこっこ（逆縁＝自分の影）だけ。畜学の第一弾（世界の親子ランキングつき）", d:"新作ゲーム「コッコキズナ（/kizuna/）」を追加。今日からコードに刻んだ設計哲学『畜学（/docs/畜学.md）』の第一弾。これはひとりで遊ぶゲームではなく、親子ふたり・スマホ1台・60秒で『親子関係と向き合う』ためのまったく新しい遊び。まんなかにこっこちゃん、その左右をふたりの指が『縁の糸』でつなぐ。画面下の鼓動（ハートビート）に合わせて、左の人は画面の左半分、右の人は右半分を、二人いっしょのタイミングでタッチ。息がぴたっと合う（シンクロ）たびに縁が太くなってこっこが輝き、温かい和音がコンボごとにキーを上げていく。ズレると忍び寄るのが、この作品ただ一種類の敵──ブラックこっこ。これは父でも母でも、息子でも娘でもなく、十六式でいう『逆縁要素』＝縁を断ち切ろうとする自分自身の影。攻撃してくるのは相手ではなく、いつも自分たちの“ズレ”。二人の呼吸が合うほど逆縁は縁にはじかれて遠ざかり、ズレるほど糸に差し込んでひびを入れてくる。だから倒すべきは常に『自分の中の切ろうとする力』だけ。時間が進むほど鼓動は速くなり、残り10秒で画面が真っ赤に沸騰、そして0秒──すべての音がぷつっと消える。静寂のあとに鐘が一打鳴り、こっこがこちらを振り返って『となりの顔を、見て。』。底なしに垂れ流すショート動画的な中毒とは逆の、“短く・激しく・必ず終わる”超中毒として設計し、終わったあとに二人が顔を見合わせる一瞬こそを商品にした。結んだ縁の強さ（スコア）は🏆世界の親子ランキングに刻め、世界中の親子が同じ60秒の儀式を終えて同時に顔を上げる『正気の同時多発』を可視化する。1位は👑世界一の親子としてランクイン演出が流れ、順位表には最高シンクロ連数（💞）も表示。ひとりで試したい人向けに『ひとりでためす』練習モードも用意（こちらは記録対象外）。キーボードでも遊べる（左=F／右=J／同時=スペース）。効果音・鼓動BGM・温かいパッド・縁の糸・花びらの演出・終わりの無音と鐘まで、すべてWeb Audio API＋Canvasでその場生成の1ファイル完結。公式こっこちゃんSVGを源画像にし、ブラックこっこは source-atop で黒く染めて表示。畜物語の島にはじめて生まれた『親子で息を合わせ、自分の逆縁を縁で押し返す』作品。ベストスコアはブラウザに自動保存。", },
    { tag:"new", t:"新作「コッコエコー」を追加 ─ こっこの「こっこっこ♪」をまねして打ち返す、まねっこコール&レスポンス60秒音ゲー（世界ランキングつき）", d:"新作ゲーム「コッコエコー（/echo/）」を追加。ジャンル名で呼びにくい新種の音ゲー。まず4色のこっこちゃん（き・みどり・あお・もも＝ドミソ高ドの和音）が順番に光って『こっこっこ♪』と短い節を歌う（コール）。つぎはあなたの番、同じ色を同じ順番でタッチして打ち返す（レスポンス＝まねっこ）。全部合うと節が1つずつ伸びていき、しかも出だしは毎回いっしょ──だから遊んでいない時もつい脳内でループしてしまう『耳から離れる前に育っていくテーマ曲』を、その場で一緒に作り上げていく感覚が核。成功するほど裏の演奏が厚くなる設計で、節がドラム→ベース→コードと層を重ねてフルグルーヴへ。こっこの鳴き声は子音アタック＋ピッチの上げグライド＋母音フォルマントで合成した、かわいくて耳に残るボイス。まちがえても終わらず、コンボは切れるけれど節が1つ短くなって同じところからやり直せるので、初めてでも立て直しやすい。成功するたびに節が1音ふえてテンポが上がり、しかも連続成功（コンボ）が続くほど加速がきつくなっていくので、ノってくると一気にスピードアップ。節が8まで伸びると『✨あたらしいフレーズ』に切り替わってさらに加速。ルールは60秒のスコアアタックで、電車の乗り換えのすき間時間にちょうど1プレイ。もちろん🏆世界ランキング対応で、スコアの自己ベストを名前と国旗つきで世界中と競え、登録すると『◯位にランクイン！』の結果発表演出（1位は👑WORLD CHAMPION）が流れる。順位表には到達した最長フレーズ（🎶Lv.）も表示。ゲームオーバー画面には『きょうのフレーズ』を色つきの並びでプレビュー表示するので、口ずさんで持ち帰れる。パッドの4色のこっこは公式こっこちゃんSVGを源画像にし、き・みどり・あお・ももの4色へ染め分けて表示（matchやkoroと同じ source-atop 方式）。効果音・グルーヴBGM・こっこボイス・ビートに脈打つ画面演出・バイブまで、すべてWeb Audio API＋Canvasでその場生成の1ファイル完結。畜物語の島にはまだ無かった『まねして歌う』コール&レスポンスとして仕立てた一作。ベストスコアはブラウザに自動保存。", },
    { tag:"new", t:"新作「こっこマッチ」を追加 ─ となりと入れかえて3つそろえる中毒マッチ3パズル（世界ランキングつき）", d:"新作ゲーム「こっこマッチ（/match/）」を追加。8×8にならんだ6色のこっこちゃんを、となりへスワイプ（フリック）またはタップで入れかえて、同じ色をタテかヨコに3つ以上そろえてパチンと消す、キャンディクラッシュ系のマッチ3パズル。消えたぶんは上からこっこちゃんが落ちてきて、落ちた先でまた3つそろうと連鎖（カスケード）！連鎖が続くほどコンボ倍率がアップし、効果音のキーが一段ずつ上がっていく気持ちよさを徹底的に重視した。4つそろえると一列まるごと消す⚡ストライプこっこ、5つで同じ色を盤面から全消しする🌈レインボーこっこ、L字／T字に組むとまわり3×3を吹き飛ばす💥ばくだんこっこが生まれ、これらを組み合わせると画面を切り裂くレーザーや大爆発で一気に大量得点。消すほどたまるFEVERゲージが満タンになると『FEVER!!』に突入し、背景が虹色に染まって得点2倍、紙吹雪が舞う高揚演出に。ルールは60秒のタイムアタックで、大きく消したり連鎖をつないだりスペシャルを作るたびに時間ボーナス（＋◯秒）がついて、うまいほど長く粘れる『あと1回』が止まらない設計。残り10秒を切るとバーが赤くなり、毎秒カチッと鳴って画面とバイブで知らせる緊張感も。手づまり（消せる手がない）になると自動でシャッフルしてくれるので初心者でも安心。もちろん🏆世界ランキング対応で、スコアの自己ベストを名前と国旗つきで世界中と競え、登録すると『◯位にランクイン！』の結果発表演出（1位は👑WORLD CHAMPION）が流れる。タイトルには🔄強制更新ボタン、効果音・中毒BGM・パーティクル・画面ゆれ・バイブまで、すべてWeb Audio API＋Canvasでその場生成の1ファイル完結。公式こっこちゃんSVGを6色のキャンディに入れて表示。30代後半の女性やお子さんがどハマりしやすい王道の中毒ループを、畜物語の島にはまだ無かった『入れかえて消す』マッチ3として仕立てた一作。ベストスコアと最高れんさはブラウザに自動保存。", },
    { tag:"new", t:"新作「こっこバブル」を追加 ─ こっこちゃんをねらって撃ち込む連鎖バブルシューター", d:"新作ゲーム「こっこバブル（/bubble/）」を追加。画面下のこっこちゃんを指でなぞって角度を決め、はなすと発射！同じ色のこっこちゃんを3つ以上くっつけると、パチンと弾けて消えるバブルシューター（パズルボブル系）。狙いを定めると、壁ではね返るところまで予測する点線ガイドとピタッと止まる着弾リングが出るので、すき間や壁バウンドを読んでねらい撃つ駆け引きがクセになる。色のかたまりを消して、上にぶら下がっていたこっこが支えを失うと、まとめてドサッと落下して大量得点＆気持ちいい連鎖に。コンボをつなぐと効果音のキーが一段ずつ上がっていき、たまるとFEVERに突入──背景が虹色に染まって得点2倍、花火が舞う高揚演出に。ときどき撃てる🌈レインボーこっこ（何色とでもくっつく）と💣爆弾こっこ（まわりをまとめて吹き飛ばす）で大逆転。撃つたびに天井がジリジリ下がってきて、こっこが下のラインに着いたらゲームオーバーという『あと1回』が止まらない緊張感。盤面を全部消すと大ボーナス＆新しい面が降ってきてエンドレスに楽しめる。狙う→撃つ→弾ける→落ちるの操作フィードバック、効果音・中毒BGM・パーティクル・画面ゆれ・バイブまで、すべてWeb Audio API＋Canvasでその場生成の1ファイル完結。公式こっこちゃんSVGを5色のバブルに入れて表示。指1本でねらって撃つ爽快感を、30代後半の女性やお子さんがどハマりしやすい中毒ループに仕立てたバブルシューター。ベストスコアはブラウザに自動保存。", },
  ]},
  { date:"2026.06.23", items:[
    { tag:"new", t:"新作「こっこタワー」を追加 ─ 流れるこっこを1タップで真上に積み上げる中毒系スタックゲーム", d:"新作ゲーム「こっこタワー（/tower/）」を追加。左右にスーッと流れるこっこちゃんの足場を、ねらった瞬間に画面タップで真上にスタックしていく超シンプルな1タップゲーム。前の段からはみ出した分はスパッと切り落とされて落下し、土台がだんだん細くなっていくので、続けるほどシビアに。ピッタリ重ねるとPERFECTで逆に土台がひとまわり回復＆コンボが伸び、効果音のキーが一段ずつ上がっていく気持ちよさを重視。PERFECTを5回つなぐとFEVERに突入し、足場が金色に輝いてBGMがテンポ・キーアップ、得点2倍＆花火が舞う。積み上がるほどカメラが上昇し、背景は夜明け前→青空→高空→夕焼け→宵→星空へとどんどん移り変わっていく爽快感。10mごとに到達演出、ときどき混ざるゴールデンこっこはボーナス得点。指1本で『あと1回、もう1mだけ』が止まらなくなる、30代後半の女性やお子さんがどハマりしやすい中毒ループを狙ったスタックゲーム。効果音・中毒BGM・落下や崩壊のエフェクト・バイブレーションまで、すべてWeb Audio API＋Canvasでその場生成の1ファイル完結。ベストスコア（到達m数）はブラウザに自動保存。", },
    { tag:"new", t:"新作「こっこコロコロ」を追加 ─ 同じこっこをくっつけて合体させる、スイカゲーム系の中毒合体パズル", d:"新作ゲーム「こっこコロコロ（/koro/）」を追加。画面を左右にスライドして落とす位置を決め、はなす（タップ）とこっこちゃんがポトンと容器に落ちる物理パズル。同じ大きさのこっこちゃん同士がくっつくと合体して、ひとまわり大きなこっこに進化（全11段階、最後は巨大ゴールデンこっこ）。合体が連鎖するとコンボになり、続けるほど高得点＆効果音のキーが上がっていく気持ちよさを重視。ときどき落ちてくる🌈レインボーこっこは、ふれたこっこと何でも合体できる万能こっこで大逆転のチャンス。こっこがレッドラインを越えて積み上がるとゲームオーバー。物理演算・サウンド・BGM・演出すべてその場生成の1ファイル完結で、公式こっこちゃんSVGを11色に染め分けて段階表示。30代後半の女性やお子さんがどハマりしやすい『あと1回』の中毒ループを狙った、スイカゲーム系の合体パズル。もちろん🏆世界ランキング対応（自己ベスト＋最大Lvを名前と国旗つきで競える）。", },
    { tag:"new", t:"新作「こっこポコポコ」を追加 ─ 穴からひょこっと出るこっこちゃんをタッチする中毒系もぐらたたき", d:"新作ゲーム「こっこポコポコ（/poko/）」を追加。3×3の穴からテンポよくひょこっと顔を出す公式こっこちゃんを、出てきた瞬間にタッチしてキャッチ！ブラックこっこに触れるとハートが1つ減ってしまうので見送る判断力も必要、逆にゴールデンこっこは高得点＋ハート回復のチャンス。コンボをつなぐとFEVER（フィーバー）に突入してこっこちゃんが大量出現、BGMのテンポとキーが上がって紙吹雪が舞う高揚演出に。タップごとに鳴る効果音はコンボ数に応じてキーが上がっていく仕組みで、当て続けるほど気持ちよくなる中毒性を重視。ハートは3つ、なくなったらゲームオーバーでベストスコアに挑戦できる。音・BGM・操作のフィードバックすべてWeb Audio APIでその場生成、画面も含めて1ファイル完結。", },
    { tag:"fix", t:"こっこポコポコ：タップの当たり判定がこっこちゃん本体に追従するよう修正", d:"穴の位置だけで判定していたため、ひょこっと飛び出した状態のこっこちゃん（特に頭の高い位置）をタップしても外れてしまう不具合を修正。描画と当たり判定で同じ位置計算を共有するようにし、今ぴょこっと出ているこっこちゃんの実際の見た目の位置にタップ判定が正しく追従するようにした。", },
    { tag:"feat", t:"こっこポコポコに制限時間60秒＆🏆世界ランキングを追加", d:"穴あきタッチ「こっこポコポコ」（/poko/）に制限時間60秒と世界ランキングを追加。これまでハート3つがなくなるまでだった終了条件に、60秒のタイムリミットを追加（ハートが先に0になるか、時間切れか、どちらか早い方でゲーム終了）。画面上部にタイムバーを表示し、残り10秒を切るとバーが赤くなり、毎秒カチッという音とバイブ・画面ゆれで知らせる緊張感を演出。さらに世界ランキングを実装し、1プレイのスコアの自己ベストを名前と国旗をそえて世界中のプレイヤーと競えるようになった。GAME OVER画面から名前を入れて「🏆 登録」、タイトルの「🏆 世界ランキング」ボタンからは順位表（つかまえた匹数つき）をいつでも閲覧できる。登録すると「◯位にランクイン！」の結果発表演出（ドラムロール→順位ドーン＋紙吹雪・花火、1位は👑WORLD CHAMPION）が流れる。保存先は既存のFirebaseで他のゲームと同じ仕組み（1端末1枠・最高スコアのみ保持・匿名認証で自分の枠だけ更新）。ベストスコアはこれまで通りブラウザ保存、世界ランキングだけサーバー保存。", },
    { tag:"imp", t:"こっこポコポコ：キャッチするたびに加速、フィーバー中は2倍速に", d:"こっこちゃんを当てる（キャッチする）たびに穴の出現間隔と表示時間が少しずつ短くなっていき、プレイが進むほどテンポアップする快感を強化。さらにFEVER中の出現間隔・表示時間をどちらも通常の半分（2倍速）に統一し、フィーバーの高揚感とスリルをアップ。やりすぎて理不尽にならないよう、加速には上限と下限を設けて調整。", },
    { tag:"imp", t:"こっこポコポコ：10コンボごとにお祝い演出＆さらに加速", d:"コンボが10・20・30…と10の倍数に乗るたびに「10 COMBO!」のような演出（色を変えたテキスト・パーティクル・画面ゆれ・専用サウンド）が出るようにし、連続キャッチの盛り上がりを強化。さらに10コンボごとに加速率がもう一段アップする仕組みを追加し、長くコンボを繋ぐほどテンポが速くなる達成感をアップ（こちらも上限・下限ありで理不尽にはならない範囲に調整）。", },
    { tag:"fix", t:"こっこポコポコ：9マスの縦の間隔が広すぎてタップしづらいのを調整", d:"3×3の穴の縦方向の間隔が広く、上下の段を連続でタップするのに指の移動が大きくて大変だったのを調整。穴の縦位置を寄せて段の間隔をぎゅっと詰め、3段とも指を大きく動かさずにタップできるように改善（横の間隔は変更なし）。", },
    { tag:"imp", t:"こっこポコポコ：コンボお祝い演出を🏆世界ランキング演出ばりに大幅強化", d:"10コンボごとのお祝い演出が控えめだったのを、世界ランキングの結果発表演出を参考に大幅リッチ化。中央に光のリング（二重）がドーンと広がり、コンボ数の文字がパンチを効かせて飛び出すように表示、画面が一瞬色フラッシュ、花火のような複数バーストの紙吹雪＆パーティクルが連続で弾けるようにした。コンボの段（10・20・30…）が上がるほど色テーマ（オレンジ→水色→ピンク→緑→黄）が切り替わり、演出のスケール・画面ゆれ・バイブもじわじわ強くなる（上限ありで暴れすぎないよう調整）。プレイの手を止めない範囲で、お祝い感をしっかり盛り上げる演出に。", },
    { tag:"imp", t:"こっこポコポコ：コンボお祝い演出をさらにパワーアップ、花火が画面いっぱいに弾けるように", d:"「演出がしょぼい」というご指摘を受けて、10コンボごとのお祝い演出をさらに強化。中央のリングに加えて、光の羽根がぐるぐる回転しながら広がる花火のような「光の渦」を新追加。これまでテキストの近くに固まっていた花火バーストを画面のほぼ全体にランダムに広がるよう変更し、世界ランキングの結果発表に負けない賑やかさに。バーストごとにパチパチという専用の効果音を追加し、視覚と音の両方で盛り上がりを演出。さらに高コンボ（5の倍数で🔥、10の倍数で👑）になるとコンボ数の文字にアイコンが付くようになり、リングが時間差のエコーリングで二重がさらに重なるなど、コンボを伸ばすほど演出の豪華さが増していく。", },
    { tag:"imp", t:"こっこポコポコ：🏆世界ランキングの結果発表に効果音を追加", d:"これまで世界ランキングの結果発表演出（ドラムロール→順位ドーン）が画面演出とバイブのみで無音だったのを、しっかり音が鳴るように追加。ドラムロール中はカチカチという音が回転のたびに鳴り、順位が決まる瞬間には順位に応じたファンファーレが流れる。1位（👑WORLD CHAMPION）は重い衝撃音から始まり迫力のある上昇ファンファーレ＋キラキラした音の雨が続く豪華仕様、2位・3位もそれぞれ少し控えめなファンファーレ、TOP10入りは明るい4音のチャイム、ランク外（見送り）は残念な下降音のあとに「次がんばろう」と背中を押すような上昇フレーズが流れる。結果発表の盛り上がりが音でもしっかり伝わるようになった。", },
  ] },
  { date:"2026.06.22", items:[
    { tag:"imp", t:"迎撃（コッコ・インベーダー）：敵に急降下（スウープ）攻撃を追加＆難易度をやさしく調整", d:"「敵が直進（左右に進むだけ）で単調」「すぐにやられてしまう」というご意見をうけて大きく調整。【動きに変化】これまでの“隊列でジリジリ降りてくるだけ”に加えて、ときどき隊列から1〜2体が弧を描いてこっこちゃんへ舞い降りる『急降下（スウープ）攻撃』を追加。傾きながらカーブを描いて迫り、また隊列へ戻る（撃ち落とせばもちろん撃破）。直進だけだった戦いに、避けと狙い撃ちのメリハリが出た。【死ににくく調整】体力（ミス）を3→4回に増量、敵の弾を遅く＆本数ひかえめに、隊列の最高速度と降下スピードもゆるめに、被弾後の無敵時間も延長。さらにこっこ砲台の連射を強化（同時3発・発射間隔みじかめ）して、敵をテンポよく倒せるようにした。急降下はウェーブ1から出るけれど最初は1体ずつ・ゆっくりなので、よく見れば必ずかわせる。", },
    { tag:"imp", t:"通勤（コッコラッシュ）：ハートの位置を見やすく＆酸素がある限り何度でも空蹴りできるように", d:"先に追加した❤️体力＆🫧酸素ゲージを調整。【ハート配置の修正】右上のハートがスマホのステータスバー（時計・電池表示）と重なって見えなかったので、左カラムの駅名の下へ移動して常にはっきり見えるようにした。【空蹴りの強化】これまで空中ジャンプは1回（2段ジャンプ）だけだったのを、島ぐらしと同じく『🫧酸素がある限り何段でも空蹴りできる』方式に変更。1回ごとに酸素を消費し、酸素がつづくかぎりタップのたびにくるっと回って跳び続けられる（屋根を走ると回復）。すき間越えや高い車両のリカバリーがやりやすく、酸素のやりくりがそのまま腕の見せどころになった。", },
    { tag:"feat", t:"通勤（コッコラッシュ）に❤️体力3つ＆🫧酸素ゲージを追加（島ぐらしのルール移植）", d:"これまで「ワンミスで即しゅっきん失敗」だったコッコラッシュ（/rush/）に、島ぐらし（こっこの森）と同じ ❤️体力＆🫧酸素ゲージのルールを追加。【❤️体力3つ】障害物に当たったり屋根から落ちても即終了せず、体力が1つ減って少しのあいだ点滅（無敵）して続行できる。落ちたときは🚁レスキューで次の屋根へ運んでもらえる。体力が0になったらしゅっきん失敗。【🫧酸素ゲージ】2段ジャンプと長押しふわっとは酸素を消費し、屋根を走っているあいだに回復する（フィーバー中は満タン）。酸素ぎれだと2段ジャンプができないので、空中での無理は禁物。画面右上にハートと酸素ゲージを表示。ワンミス即死から、体力と酸素をやりくりして長く走る遊びへと、より島ぐらしらしい手ざわりになった。", },
    { tag:"feat", t:"通勤（コッコラッシュ）に🏆世界ランキングを追加", d:"通勤特急ワンタップラン「コッコラッシュ」（/rush/）に世界ランキングを実装。1プレイのスコアの自己ベストを、名前と国旗をそえて世界中のプレイヤーと競えるようになった。しゅっきん失敗（GAME OVER）画面から名前を入れて「🏆 登録」、タイトルの「🏆 世界ランキング」ボタンからは順位表（集めたたまご数つき）をいつでも閲覧できる。登録すると「◯位にランクイン！」の結果発表演出（ドラムロール→順位ドーン＋紙吹雪・花火、1位は👑WORLD CHAMPION）が流れる。保存先は既存のFirebaseでスプラット3Dやインベーダーと同じ仕組み（1端末1枠・最高スコアのみ保持・匿名認証で自分の枠だけ更新）。ベストスコアはこれまで通りブラウザ保存、世界ランキングだけサーバー保存。", },
    { tag:"fix", t:"通勤（コッコラッシュ）の障害物が空に溶けて見えないバグを修正", d:"コッコラッシュ（/rush/）で、高い位置の車両にのった障害物（パンタグラフ・ダクト）が暗い色だったため、朝焼け空の上のほうにある濃紺の部分と重なるとほぼ透明に見え、目視できないまま激突してしまうバグを修正。障害物に暗いふちどり（明るい空でも輪郭が出る）と明るい本体＋ハイライト（暗い空でも沈まない）を付け、さらにパンタグラフの接点ランプとダクトの黄色い警告ストライプを追加して、どんな空の色でもはっきり見えるようにした。当たり判定は変えていないので、見える＝避けられるようになった。", },
    { tag:"feat", t:"迎撃（コッコ・インベーダー）に🏆世界ランキングを追加", d:"「コッコ・インベーダー」（/invaders/）に世界ランキングを実装。1プレイのスコアの自己ベストを、名前と国旗をそえて世界中のプレイヤーと競えるようになった。GAME OVER画面から名前を入れて「🏆 登録」、タイトルの「🏆 世界ランキング」ボタンからは順位表（到達ウェーブつき）をいつでも閲覧できる。登録すると「◯位にランクイン！」の結果発表演出（ドラムロール→順位ドーン＋紙吹雪・花火、1位は👑WORLD CHAMPION）が流れる。保存先は既存のFirebaseでスプラット3Dやグレイズと同じ仕組み（1端末1枠・最高スコアのみ保持・匿名認証で自分の枠だけ更新）。ハイスコアはこれまで通りブラウザ保存、世界ランキングだけサーバー保存。", },
    { tag:"feat", t:"回避（コッコグレイズ）に🏆世界ランキングを追加", d:"ネオン弾幕回避「コッコグレイズ」（/graze/）に世界ランキングを実装。1プレイのスコアの自己ベストを、名前と国旗をそえて世界中のプレイヤーと競えるようになった。GAME OVER画面から名前を入れて「🏆 登録」、タイトルの「🏆 世界ランキング」ボタンからは順位表をいつでも閲覧できる。登録すると「◯位にランクイン！」の結果発表演出（ドラムロール→順位ドーン＋紙吹雪・花火、1位は👑WORLD CHAMPION）が流れる。保存先は既存のFirebaseでスプラット3Dやダービーと同じ仕組み（1端末1枠・最高スコアのみ保持・匿名認証で自分の枠だけ更新）。ベストスコアはこれまで通りブラウザ保存、世界ランキングだけサーバー保存。", },
    { tag:"feat", t:"ダービー（こっこダービー）に🏆世界ランキングを追加 ─ 通算「勝ち点」で競う", d:"こっこダービー（/derby/）に世界ランキングを実装。1試合ごとにたまる通算「勝ち点」のキャリア自己ベストを、名前と国旗をそえて世界中のプレイヤーと競えるようになった。勝ち点は勝つほど・つよい相手・大差ほど高い（勝ち＝難易度ベース10/25/50＋得失点差×5、引き分け＝2/5/10、負け＝0）。リザルト画面に今回の獲得勝ち点と通算（◯勝）を表示し、名前を入れて「🏆 登録」できる。タイトルの「🏆 世界ランキング」ボタンからは順位表（勝ち点・勝利数つき）をいつでも閲覧でき、登録すると「◯位にランクイン！」の結果発表演出（1位は👑WORLD CHAMPION）が流れる。保存先は既存のFirebaseでスプラット3Dやこっこリンクと同じ仕組み（1端末1枠・最高勝ち点のみ保持・匿名認証で自分の枠だけ更新）。通算勝ち点はこれまで通りブラウザ保存、世界ランキングだけサーバー保存。", },
    { tag:"feat", t:"3D塗る（コッコスプラット3D）に🏆世界ランキングを追加", d:"コッコスプラット3D（/splat3d/）に世界ランキングを実装。1プレイのスコアの自己ベストを、名前と国旗をそえて世界中のプレイヤーと競えるようになった。リザルト画面（CLEAR! / TIME UP…）から名前を入れて「🏆 登録」、タイトルの「🏆 世界ランキング」ボタンからは順位表をいつでも閲覧できる。登録すると「◯位にランクイン！」の結果発表演出（ドラムロール→順位ドーン＋紙吹雪・花火、1位は👑WORLD CHAMPION）が流れる。保存先は既存のFirebaseでこっこリンクやこっこGPと同じ仕組み（1端末1枠・最高スコアのみ保持・匿名認証で自分の枠だけ更新）。ゲームのベストはこれまで通りブラウザ保存、世界ランキングだけサーバー保存。", },
