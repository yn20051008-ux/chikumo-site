<script>
/* こっこ共通: ページを離れたら必ず音を止める（bfcache対策／全ゲーム共通の番人） */
(function(){
  var ctxs=[];
  var OrigAC=window.AudioContext||window.webkitAudioContext;
  if(OrigAC&&typeof Proxy!=='undefined'&&typeof Reflect!=='undefined'){
    var P=new Proxy(OrigAC,{construct:function(T,a,nt){
      var c=Reflect.construct(T,a,nt===P?T:nt);
      try{ctxs.push(c);}catch(e){}
      return c;
    }});
    try{window.AudioContext=P;}catch(e){}
    try{if(window.webkitAudioContext)window.webkitAudioContext=P;}catch(e){}
  }
  function kill(){for(var i=0;i<ctxs.length;i++){try{ctxs[i].suspend();}catch(e){}}}
  window.addEventListener('pagehide',kill);
})();
</script>

<script>
"use strict";
/* ───────── 公式こっこちゃんSVG ＋ ブラックこっこちゃん生成 ───────── */
const cocco=new Image();let coccoReady=false,blackC=null;
cocco.onload=()=>{coccoReady=true;
  try{const c=document.createElement('canvas');c.width=120;c.height=157;
    const g=c.getContext('2d');
    g.drawImage(cocco,0,0,120,157);
    g.globalCompositeOperation='source-atop';
    g.fillStyle='#180b26';g.fillRect(0,0,120,157);
    g.globalCompositeOperation='source-over';
    // 赤く光る目
    for(const [ex,ey] of [[42,72],[80,71]]){
      const rg=g.createRadialGradient(ex,ey,1,ex,ey,9);
      rg.addColorStop(0,'#ffd0d0');rg.addColorStop(.4,'#ff2244');rg.addColorStop(1,'rgba(255,30,60,0)');
      g.fillStyle=rg;g.beginPath();g.arc(ex,ey,9,0,7);g.fill();}
    blackC=c;}catch(e){blackC=null;}};
cocco.src='/chikumo.svg';

const cv=document.getElementById('game'),cx=cv.getContext('2d');
let W=0,H=0,DPR=1;
function resize(){DPR=Math.min(devicePixelRatio||1,2);W=innerWidth;H=innerHeight;
  cv.width=W*DPR;cv.height=H*DPR;cv.style.width=W+'px';cv.style.height=H+'px';cx.setTransform(DPR,0,0,DPR,0,0);}
addEventListener('resize',resize);resize();

function vib(p){try{if(typeof navigator!=='undefined'&&navigator.vibrate)navigator.vibrate(p);}catch(e){}}

/* ───────── サウンド (WebAudio chiptune) ───────── */
let AC=null,muted=false,ECHO=null;
const MASTER=0.5;
function audio(){if(!AC){AC=new (window.AudioContext||window.webkitAudioContext)();
  ECHO=AC.createDelay(1);ECHO.delayTime.value=.24;
  const fb=AC.createGain();fb.gain.value=.3;
  const wet=AC.createGain();wet.gain.value=.4;
  ECHO.connect(fb);fb.connect(ECHO);ECHO.connect(wet);wet.connect(AC.destination);}
  if(AC.state==='suspended')AC.resume();return AC;}
function tone(f,t0,dur,type,vol,slide,echo){const a=audio();const o=a.createOscillator(),g=a.createGain();
  o.type=type;o.frequency.setValueAtTime(f,t0);if(slide)o.frequency.exponentialRampToValueAtTime(slide,t0+dur);
  g.gain.setValueAtTime(vol*MASTER,t0);g.gain.exponentialRampToValueAtTime(.0001,t0+dur);
  o.connect(g).connect(a.destination);if(echo&&ECHO)g.connect(ECHO);
  o.start(t0);o.stop(t0+dur+.02);}
function noise(t0,dur,vol){const a=audio();const n=a.createBufferSource(),buf=a.createBuffer(1,Math.max(1,(a.sampleRate*dur)|0),a.sampleRate);
  const d=buf.getChannelData(0);for(let i=0;i<d.length;i++)d[i]=(Math.random()*2-1)*(1-i/d.length);
  n.buffer=buf;const g=a.createGain();g.gain.value=vol*MASTER;n.connect(g).connect(a.destination);n.start(t0);}
/* タップ＝拍と同期するので、効果音もBGMのキー(Am)に合わせて気持ちよく重なる */
function sfxPerfect(combo){if(muted)return;const t=audio().currentTime;
  const base=880*Math.pow(1.0594631,Math.min(combo,12)%13);
  tone(base,t,.09,'square',.15);tone(base*1.5,t+.04,.11,'square',.12);
  tone(base*2,t+.08,.2,'triangle',.16,0,true);noise(t,.04,.06);}
function sfxGood(){if(muted)return;const t=audio().currentTime;tone(659,t,.08,'square',.11);tone(880,t+.04,.11,'triangle',.11);}
function sfxItem(){if(muted)return;const t=audio().currentTime;
  [1319,1760,2093].forEach((f,i)=>tone(f,t+i*.05,.12,'square',.1,0,true));}
function sfxHeart(){if(muted)return;const t=audio().currentTime;
  [880,1109,1319,1760].forEach((f,i)=>tone(f,t+i*.07,.22,'triangle',.13,0,true));}
function sfxWhiff(){if(muted)return;const t=audio().currentTime;tone(294,t,.12,'triangle',.08,233);}
function sfxMiss(){if(muted)return;const t=audio().currentTime;tone(220,t,.16,'triangle',.1,165);noise(t,.06,.04);}
function sfxBlack(){if(muted)return;const t=audio().currentTime;
  tone(185,t,.32,'sawtooth',.16,55);tone(92,t,.36,'square',.12,46);noise(t,.26,.13);}
function sfxSmash(){if(muted)return;const t=audio().currentTime;noise(t,.12,.1);tone(440,t,.12,'square',.11,1175);}
function sfxDodge(){if(muted)return;const t=audio().currentTime;tone(988,t,.07,'sine',.06,1319);}
function sfxFever(){if(muted)return;const t=audio().currentTime;
  tone(220,t,.5,'sawtooth',.1,1760);noise(t,.4,.12);
  [880,1109,1319,1760,2217,2637].forEach((f,i)=>{tone(f,t+i*.06,.3,'square',.13,0,true);tone(f/2,t+i*.06,.3,'triangle',.08);});}
function sfxMilestone(){if(muted)return;const t=audio().currentTime;
  [880,1109,1319,1760].forEach((f,i)=>tone(f,t+i*.07,.2,'square',.12));}
function sfxOver(){if(muted)return;const t=audio().currentTime;
  [659,587,523,440,330].forEach((f,i)=>tone(f,t+i*.16,.3,'triangle',.13));noise(t,.3,.06);}

/* 中毒BGM: Am→F→C→G 王道進行のA/B 2セクション64ステップ8bitループ＋エコー。
   ノーツはこのステップグリッド上に降るので、タップのリズム＝BGMのリズム。 */
const SP=.12; // 1ステップ=16分音符 (125BPM)
const MELA=[659,0,880,0, 1047,0,988,880, 784,0,659,0, 784,880,988,0,
            659,0,880,0, 1047,0,1175,1319, 1175,0,988,0, 880,0,0,0];
const MELB=[1319,0,1175,1047, 1175,0,880,0, 1047,0,988,784, 880,0,659,0,
            1319,0,1175,1047, 1175,1319,1568,0, 1319,1175,1047,988, 880,0,784,0];
const BASS=[110,110,87,87,131,131,98,98];
const CHORD=[[440,523],[349,440],[392,523],[392,494]];
let bgmStep=0,anchor=0,bgmOn=false;
function startBgm(){audio();bgmStep=0;anchor=AC.currentTime+.08;bgmOn=true;}
function stopBgm(){bgmOn=false;}
function bgmPump(){if(!bgmOn||muted||!AC)return;const fever=state.fever>0;
  if(anchor+bgmStep*SP<AC.currentTime-.3)anchor=AC.currentTime+.06-bgmStep*SP;
  let guard=0;
  while(anchor+bgmStep*SP<AC.currentTime+.15&&guard++<10){
    const t=anchor+bgmStep*SP,i64=bgmStep%64,i=i64%32;
    const m=(i64<32?MELA:MELB)[i];
    if(m)tone(m,t,SP*.95,'square',fever?.09:.062,0,true);
    if(i%4===0){tone(BASS[(i>>2)%8],t,SP*2.2,'triangle',.1);
      tone(150,t,.1,'sine',.22,45);noise(t,.04,.05);} // キック
    if(i%8===4){noise(t,.09,.09);tone(220,t,.05,'triangle',.05);} // スネア
    if(i%2===0)noise(t,.028,.022); // ハイハット
    if(i%8===0){for(const f of CHORD[(i>>3)%4])tone(f,t,SP*5,'triangle',.028);}
    if(fever){if(m)tone(m*2,t+SP*.5,SP*.5,'square',.04);if(i%2===1)noise(t,.025,.03);}
    bgmStep++;}}
document.getElementById('muteBtn').onclick=e=>{muted=!muted;e.target.textContent=muted?'🔇':'🔊';
  if(!muted&&AC)anchor=AC.currentTime+.06-bgmStep*SP;};

/* ───────── ゲーム状態 ───────── */
const PERFW=.07,GOODW=.15,MISSW=.18;
const state={mode:'title',score:0,combo:0,maxCombo:0,perfects:0,hearts:3,fever:0,
  mt:0,nextStep:8,lv:1,lastLane:0,hue:300,t:0,shake:0,flash:0,flashR:255,flashG:255,flashB:255,
  slow:0,spin:0,bossX:.5,sync:true};
let best=+localStorage.getItem('beatBest')||0;

const notes=[],parts=[],pops=[],waves=[],rains=[],trailL=[],trailR=[];

function lead(){return Math.max(1.25,2.0-state.lv*.13);}
function laneX(l){return W/2+(l?1:-1)*Math.min(W,H)*.21;}
function hitY(){return H*.74;}

/* ───────── 演出 ───────── */
function spawnBurst(x,y,n,hueBase,pw){for(let i=0;i<n;i++){const a=Math.random()*Math.PI*2,v=(Math.random()*.7+.3)*pw;
  parts.push({x,y,vx:Math.cos(a)*v,vy:Math.sin(a)*v,life:1,h:hueBase+Math.random()*70,r:Math.random()*4+2,g:.05});}
  if(parts.length>420)parts.splice(0,parts.length-420);}
function spawnConfetti(x,y,n){for(let i=0;i<n;i++){const a=Math.random()*Math.PI*2,v=Math.random()*4+2;
  parts.push({x,y,vx:Math.cos(a)*v,vy:Math.sin(a)*v-2,life:1,h:Math.random()*360,r:Math.random()*5+2,g:.12,sq:true});}
  if(parts.length>420)parts.splice(0,parts.length-420);}
function spawnWave(x,y,h){waves.push({x,y,r:8,vr:520,life:1,h});}
function spawnPop(x,y,txt,col,size){pops.push({x,y,txt,col,size,life:1});}
/* 絵文字レイン: 子どもがはしゃぐやつ */
const RAIN_EMOJI=['🎉','🌈','⭐','💖','🎵','✨','🍬','🎀'];
function spawnRain(n){for(let i=0;i<n;i++)rains.push({x:Math.random()*W,y:-30-Math.random()*H*.5,
  vy:140+Math.random()*220,vx:(Math.random()-.5)*60,rot:Math.random()*7,vrot:(Math.random()-.5)*6,
  e:RAIN_EMOJI[(Math.random()*RAIN_EMOJI.length)|0],s:18+Math.random()*18});
  if(rains.length>140)rains.splice(0,rains.length-140);}

/* ───────── ノーツ生成 ─────────
   難易度設計: クリアできる要素(こっこ＋アイテム) 76.6% / クリアできない要素(ブラックこっこ) 23.4% */
function pickType(){const r=Math.random();
  return r<.234?'black':r<.434?'item':'normal';}
const FOODS=['🍙','🍓','🍰','🍩','🍡','🧁'];
function pickItem(){const r=Math.random();
  if(r<.10)return{e:'💎',v:300};
  if(r<.16)return state.hearts<3?{e:'❤️',v:100,heal:true}:{e:'🍭',v:180};
  if(r<.24)return{e:'🌟',v:200,star:true};
  return{e:FOODS[(Math.random()*FOODS.length)|0],v:100+((Math.random()*5)|0)*25};}
function spawnNote(lane,type,hitTime){const o={lane,type,hitTime,lead:lead(),judged:false,rot:Math.random()*7};
  if(type==='item')o.item=pickItem();
  notes.push(o);return o;}
function chartHasNote(n){const i=n%32,lv=state.lv;
  if(i%4===0)return true;
  if(lv>=2&&(i===14||i===30))return true;
  if(lv>=3&&(i===6||i===22))return true;
  if(lv>=4&&(i===10||i===26))return true;
  return false;}
function spawnFromChart(n){
  state.lastLane=Math.random()<.6?1-state.lastLane:state.lastLane;
  spawnNote(state.lastLane,pickType(),n*SP);
  if(state.lv>=4&&n%16===0)spawnNote(1-state.lastLane,pickType(),n*SP);}

/* ───────── 判定 ───────── */
function comboUp(){state.combo++;state.maxCombo=Math.max(state.maxCombo,state.combo);
  if(state.combo%20===0&&state.fever<=0){state.fever=9;sfxFever();vib([30,30,30,30,60]);
    state.slow=.3;state.flash=.7;state.flashR=255;state.flashG=180;state.flashB=240;
    spawnPop(W/2,H*.25,'こっこフィーバー!!','#ffd76e',42);
    for(let i=0;i<5;i++)spawnWave(W/2,H*.45,i*70);
    spawnConfetti(W/2,H*.4,60);spawnRain(40);}
  else if(state.combo>0&&state.combo%50===0){sfxMilestone();
    spawnPop(W/2,H*.2,state.combo+'コンボ!!','#ffd76e',34);
    spawnConfetti(W/2,H*.25,40);spawnRain(20);}}
function hitBlack(o){const x=laneX(o.lane),y=hitY();
  if(state.fever>0){state.score+=100;comboUp();sfxSmash();vib(12);state.shake=7;
    spawnBurst(x,y,30,280,5);spawnPop(x,y-80,'おしおき! +100','#ffd76e',22);return;}
  state.hearts--;state.combo=0;state.shake=20;state.slow=.25;
  state.flash=.6;state.flashR=255;state.flashG=50;state.flashB=80;
  sfxBlack();vib([60,40,80]);spawnBurst(x,y,40,0,5);
  spawnPop(W/2,H*.35,'ブラックこっこ!?','#ff5577',30);
  if(state.hearts<=0){state.mode='dying';stopBgm();sfxOver();setTimeout(endGame,700);}}
function judgeTap(lane){if(state.mode!=='play')return;
  const x=laneX(lane),y=hitY();
  let bestN=null,bestD=1e9;
  for(const o of notes){if(o.judged||o.lane!==lane)continue;
    const d=Math.abs(o.hitTime-state.mt);if(d<bestD){bestD=d;bestN=o;}}
  if(!bestN||bestD>GOODW){
    if(state.combo>0)spawnPop(W/2,H*.3,'スカ…','#9988bb',20);
    state.combo=0;sfxWhiff();spawnBurst(x,y,5,260,1.5);return;}
  const o=bestN;o.judged=true;
  if(o.type==='black'){hitBlack(o);return;}
  const perfect=bestD<=PERFW,feverX=state.fever>0?2:1;
  comboUp();
  if(o.type==='item'){const it=o.item,v=(perfect?it.v*2:it.v)*feverX;
    state.score+=v;sfxItem();vib(10);state.shake=5;
    if(it.heal&&state.hearts<3){state.hearts++;sfxHeart();
      spawnPop(x,y-110,'❤️かいふく!','#ff8ac2',24);}
    if(it.star){state.fever=Math.max(state.fever,4);spawnRain(14);}
    spawnBurst(x,y,22,40,3.5);spawnWave(x,y,45);
    spawnPop(x,y-80,it.e+' +'+v,'#ffd76e',24);
    if(perfect)spawnPop(x,y-116,'おいしい!','#ff8ac2',18);
    return;}
  if(perfect){state.perfects++;
    const mult=Math.min(1+Math.floor(state.combo/10),9)*feverX;
    state.score+=100*mult;sfxPerfect(state.combo);vib(state.fever>0?[20,20,20]:15);
    state.shake=9;state.flash=.35;state.flashR=255;state.flashG=255;state.flashB=255;state.spin=.5;
    state.slow=Math.max(state.slow,.08);
    spawnWave(x,y,state.hue);spawnBurst(x,y,32+Math.min(state.combo*2,40),state.hue,4.5);
    spawnConfetti(x,y,12+Math.min(state.combo,20));
    spawnPop(x,y-86,'PERFECT','#ffd76e',32);
    spawnPop(x,y-122,'×'+mult,'#ff8ac2',20);}
  else{state.score+=50*feverX;sfxGood();vib(8);state.shake=4;
    spawnBurst(x,y,12,150,2.5);spawnPop(x,y-86,'GOOD','#9fe88f',24);}}

/* ───────── 更新 ───────── */
function update(dt){state.t+=dt;
  state.hue=(state.hue+dt*(state.fever>0?180:24))%360;
  if(state.flash>0)state.flash=Math.max(0,state.flash-dt*2);
  if(state.shake>0){state.shake*=Math.pow(.001,dt);if(state.shake<.3)state.shake=0;}
  if(state.spin>0)state.spin=Math.max(0,state.spin-dt);
  // 絵文字レインは常時更新（タイトルでも舞う）
  for(let i=rains.length-1;i>=0;i--){const r=rains[i];
    r.y+=r.vy*dt;r.x+=r.vx*dt;r.rot+=r.vrot*dt;
    if(r.y>H+40)rains.splice(i,1);}
  if(state.mode!=='play'&&state.mode!=='dying')return;
  // 音楽時間: rAF積算をオーディオクロックへゆっくり吸着（ノーツとBGMのズレを消す）
  state.mt+=dt;
  if(state.sync&&AC&&AC.state==='running'&&AC.currentTime>0&&bgmOn){
    const at=AC.currentTime-anchor;
    if(Math.abs(at-state.mt)<.5)state.mt+=(at-state.mt)*Math.min(1,dt*4);}
  if(state.fever>0){state.fever-=dt;
    if(Math.random()<dt*7)spawnRain(1); // フィーバー中は絵文字が降りつづける
    if(state.fever<=0){state.fever=0;spawnPop(W/2,H*.3,'フィーバー終了','#baa',20);}}
  state.lv=Math.min(6,1+((state.nextStep/64)|0));
  // 譜面: BGMステップグリッドに沿ってノーツを先読み生成
  if(state.mode==='play'){let guard=0;
    while(state.nextStep*SP<=state.mt+lead()+.5&&guard++<32){
      if(chartHasNote(state.nextStep))spawnFromChart(state.nextStep);
      state.nextStep++;}}
  // 判定漏れ＆通過処理
  for(let i=notes.length-1;i>=0;i--){const o=notes[i];
    if(!o.judged&&state.mt>o.hitTime+MISSW){o.judged=true;o.missed=true;
      const x=laneX(o.lane),y=hitY();
      if(o.type==='black'){state.score+=20;sfxDodge();
        spawnPop(x,y-70,'かわした! +20','#aadcff',18);}
      else if(o.type==='item'){spawnPop(x,y-70,'にがした…','#9988bb',16);}
      else if(state.mode==='play'){if(state.combo>0)spawnPop(W/2,H*.3,'ミス…','#9988bb',22);
        state.combo=0;sfxMiss();}}
    if(state.mt>o.hitTime+.9)notes.splice(i,1);}}

/* ───────── 開始/終了 ───────── */
function startGame(){state.mode='play';state.score=0;state.combo=0;state.maxCombo=0;state.perfects=0;
  state.hearts=3;state.fever=0;state.mt=-.08;state.nextStep=8;state.lv=1;state.lastLane=0;
  state.shake=0;state.flash=0;state.slow=0;state.spin=0;
  notes.length=0;parts.length=0;pops.length=0;waves.length=0;rains.length=0;
  trailL.length=0;trailR.length=0;
  document.getElementById('startOv').classList.add('hidden');
  document.getElementById('endOv').classList.add('hidden');
  audio();startBgm();
  spawnPop(W/2,H*.4,'READY…','#ffd76e',30);}
function endGame(){state.mode='over';stopBgm();
  if(state.score>best){best=state.score;localStorage.setItem('beatBest',best);}
  const es=document.getElementById('endScore'),target=state.score,t0=performance.now();
  (function cu(n){const k=Math.min(1,(n-t0)/900);
    es.textContent=Math.round(target*(1-Math.pow(1-k,3)));
    if(k<1&&state.mode==='over')requestAnimationFrame(cu);})(t0);
  document.getElementById('endBest').textContent='BEST '+best;
  document.getElementById('endCombo').textContent='MAX COMBO '+state.maxCombo;
  document.getElementById('endPerf').textContent='PERFECT '+state.perfects+'回';
  document.getElementById('endOv').classList.remove('hidden');}

/* ───────── 入力 ───────── */
cv.addEventListener('pointerdown',e=>{e.preventDefault();audio();
  if(state.mode==='play')judgeTap(e.clientX<W/2?0:1);},{passive:false});
addEventListener('keydown',e=>{
  if(state.mode==='play'){
    if(e.code==='ArrowLeft'||e.code==='KeyF'||e.code==='KeyA')judgeTap(0);
    if(e.code==='ArrowRight'||e.code==='KeyJ'||e.code==='KeyL')judgeTap(1);}
  if(e.code==='Space'||e.code==='Enter'){e.preventDefault();
    if(state.mode==='title'||state.mode==='over')startGame();}});
document.getElementById('startBtn').onclick=startGame;
document.getElementById('retryBtn').onclick=startGame;
document.getElementById('shareBtn').onclick=()=>{
  const txt='こっこビートで '+state.score+'点・最大'+state.maxCombo+'コンボ決めた！ #畜物語 #こっこビート';
  open('https://twitter.com/intent/tweet?text='+encodeURIComponent(txt)
    +'&url='+encodeURIComponent('https://chikumo.jp/beat/'),'_blank');};
document.getElementById('bestRow').textContent=best?('BEST '+best):'';
document.addEventListener('visibilitychange',()=>{if(!AC)return;
  if(document.hidden){if(AC.state==='running')AC.suspend();}
  else{AC.resume();anchor=AC.currentTime+.06-bgmStep*SP;}});

/* ───────── 描画 ───────── */
function drawCocco(img,x,y,s,rot){if(!coccoReady)return;
  cx.save();cx.translate(x,y);if(rot)cx.rotate(rot);
  cx.drawImage(img,-s/2,-s*.65,s,s*1.3);cx.restore();}

function draw(dt){if(!W||!H)return;
  const fever=state.fever>0,K=Math.min(W,H),hy=hitY();
  const beat=(state.mt/(SP*4))%1,pulse=state.mode==='play'?Math.max(0,1-((beat+1)%1)*3):0;
  // ステージ背景
  const g=cx.createLinearGradient(0,0,0,H);
  if(fever){g.addColorStop(0,`hsl(${state.hue},60%,16%)`);g.addColorStop(1,`hsl(${(state.hue+80)%360},65%,7%)`);}
  else{g.addColorStop(0,'#1b0a33');g.addColorStop(.6,'#12061f');g.addColorStop(1,'#070310');}
  cx.fillStyle=g;cx.fillRect(0,0,W,H);
  // 回転スポットライト
  cx.save();cx.globalAlpha=fever?.22:.12;
  for(let i=0;i<3;i++){const a=Math.PI/2+Math.sin(state.t*(.5+i*.2)+i*2.1)*.7;
    const ox=W*(.2+i*.3);
    const lg=cx.createLinearGradient(ox,0,ox+Math.cos(a)*H,Math.sin(a)*H);
    lg.addColorStop(0,`hsla(${(state.hue+i*60)%360},90%,70%,.8)`);lg.addColorStop(1,'rgba(0,0,0,0)');
    cx.fillStyle=lg;cx.beginPath();cx.moveTo(ox,-10);
    cx.lineTo(ox+Math.cos(a-.13)*H*1.5,Math.sin(a-.13)*H*1.5);
    cx.lineTo(ox+Math.cos(a+.13)*H*1.5,Math.sin(a+.13)*H*1.5);cx.closePath();cx.fill();}
  cx.restore();
  // ビートで明滅するフロアグロー
  const fg=cx.createRadialGradient(W/2,H,0,W/2,H,K*.8);
  fg.addColorStop(0,fever?`hsla(${state.hue},95%,65%,${.3+pulse*.25})`:`hsla(315,80%,60%,${.14+pulse*.16})`);
  fg.addColorStop(1,'rgba(0,0,0,0)');
  cx.fillStyle=fg;cx.fillRect(0,0,W,H);
  cx.save();
  if(state.shake>0)cx.translate((Math.random()-.5)*state.shake,(Math.random()-.5)*state.shake);
  // レーン
  const lw=K*.19;
  for(let l=0;l<2;l++){const x=laneX(l);
    const lg=cx.createLinearGradient(0,0,0,H);
    lg.addColorStop(0,'rgba(255,255,255,0)');
    lg.addColorStop(.75,fever?`hsla(${(state.hue+l*40)%360},80%,60%,.16)`:'rgba(190,140,255,.1)');
    lg.addColorStop(1,'rgba(255,255,255,.02)');
    cx.fillStyle=lg;cx.fillRect(x-lw/2,0,lw,H);
    cx.strokeStyle=fever?`hsla(${(state.hue+l*40)%360},90%,70%,.4)`:'rgba(200,160,255,.22)';
    cx.lineWidth=1.5;
    cx.strokeRect(x-lw/2,0,lw,H);}
  // 判定ライン＆タップサークル（ビートで脈動）
  cx.strokeStyle=fever?`hsl(${state.hue},95%,70%)`:'#ff8ac2';
  cx.lineWidth=2;cx.globalAlpha=.7;
  cx.beginPath();cx.moveTo(W*.08,hy);cx.lineTo(W*.92,hy);cx.stroke();cx.globalAlpha=1;
  for(let l=0;l<2;l++){const x=laneX(l),r=lw*.42*(1+pulse*.18);
    const col=fever?`hsl(${(state.hue+l*40)%360},95%,70%)`:'#ff8ac2';
    cx.strokeStyle=col;cx.lineWidth=3+pulse*3;cx.shadowColor=col;cx.shadowBlur=14+pulse*16;
    cx.beginPath();cx.arc(x,hy,r,0,7);cx.stroke();cx.shadowBlur=0;
    cx.globalAlpha=.25+pulse*.3;cx.fillStyle=col;
    cx.beginPath();cx.arc(x,hy,r*.6,0,7);cx.fill();cx.globalAlpha=1;}
  // ブラックこっこちゃん（敵ボス）: 上空でノーツを吐きながらうろつく
  state.bossX+=( .5+Math.sin(state.t*.7)*.3-state.bossX)*Math.min(1,dt*2);
  {const bx=W*state.bossX,by=H*.1+Math.sin(state.t*2.3)*8,bs=K*.16;
   const wob=fever?Math.sin(state.t*30)*.18:Math.sin(state.t*2)*.08;
   cx.save();cx.globalAlpha=.95;
   const ag=cx.createRadialGradient(bx,by,2,bx,by,bs);
   ag.addColorStop(0,'rgba(170,30,255,.4)');ag.addColorStop(1,'rgba(0,0,0,0)');
   cx.fillStyle=ag;cx.fillRect(bx-bs,by-bs,bs*2,bs*2);
   if(blackC)drawCocco(blackC,bx,by,bs,wob);
   cx.restore();
   if(fever){cx.font='bold 13px sans-serif';cx.textAlign='center';cx.fillStyle='#d9f';
     cx.fillText('ひぃぃ…',bx,by-bs*.85);}}
  // ノーツ（hitTimeから逆算した位置に降る）
  for(const o of notes){
    const x=laneX(o.lane),prog=(o.hitTime-state.mt)/o.lead;
    const y=hy-prog*(hy-H*.06);
    if(y<-60||o.judged&&!o.missed)continue;
    const near=Math.max(0,1-Math.abs(o.hitTime-state.mt)/.5);
    const s=lw*.62*(1+near*.12);
    cx.save();
    if(o.missed)cx.globalAlpha=Math.max(0,1-(state.mt-o.hitTime-MISSW)*2.2);
    if(o.type==='black'){
      cx.shadowColor='#b03cff';cx.shadowBlur=16;
      if(blackC)drawCocco(blackC,x,y,s,Math.sin(state.t*6+o.rot)*.22);
      cx.shadowBlur=0;
      cx.font=`bold ${Math.max(9,s*.22)}px sans-serif`;cx.textAlign='center';
      cx.fillStyle='#ff5577';cx.fillText('✖',x,y-s*.8);}
    else if(o.type==='item'){
      cx.shadowColor='#ffd76e';cx.shadowBlur=14+near*10;
      cx.font=`${s*.85}px sans-serif`;cx.textAlign='center';cx.textBaseline='middle';
      cx.fillText(o.item.e,x,y);cx.textBaseline='alphabetic';cx.shadowBlur=0;}
    else{
      const col=fever?`hsl(${(state.hue+o.lane*40)%360},95%,70%)`:'#ffd76e';
      cx.strokeStyle=col;cx.lineWidth=2.5;cx.shadowColor=col;cx.shadowBlur=10+near*14;
      cx.beginPath();cx.arc(x,y,s*.58,0,7);cx.stroke();cx.shadowBlur=0;
      drawCocco(cocco,x,y,s*.8,Math.sin(state.t*4+o.rot)*.15);}
    cx.restore();}
  // 衝撃波
  for(let i=waves.length-1;i>=0;i--){const w=waves[i];w.r+=w.vr*dt;w.life-=dt*1.6;
    if(w.life<=0){waves.splice(i,1);continue;}
    cx.globalAlpha=w.life*.7;cx.strokeStyle=`hsl(${w.h%360},95%,70%)`;cx.lineWidth=5*w.life;
    cx.beginPath();cx.arc(w.x,w.y,w.r,0,7);cx.stroke();}
  cx.globalAlpha=1;
  // メインこっこちゃん: ビートでバウンス、PERFECTでスピン
  {const bb=Math.abs(Math.sin((state.mt/(SP*4))*Math.PI))*(fever?22:10);
   const px=W/2,py=H*.885-bb,ps=K*(fever?.30:.26);
   let rot=Math.sin(state.t*2.2)*.06;
   if(state.spin>0)rot+=(0.5-state.spin)/0.5*Math.PI*2;
   cx.save();
   if(fever){cx.shadowColor=`hsl(${state.hue},100%,65%)`;cx.shadowBlur=40;}
   else{cx.shadowColor='rgba(255,160,220,.55)';cx.shadowBlur=14;}
   drawCocco(cocco,px,py,ps,rot);cx.restore();
   // 観客のちびこっこもビートでジャンプ（子ども大喜びゾーン）
   if(coccoReady){const n=fever?8:5;
     for(let i=0;i<n;i++){const mx=W*(.08+.84*i/(n-1));
       if(Math.abs(mx-px)<ps*.5)continue;
       const jump=Math.abs(Math.sin((state.mt/(SP*4))*Math.PI+i*.7))*(fever?26:10);
       drawCocco(cocco,mx,H*.97-jump,K*.085,Math.sin(state.t*5+i)*.25);}}}
  // パーティクル
  for(let i=parts.length-1;i>=0;i--){const p=parts[i];
    p.x+=p.vx;p.y+=p.vy;p.vy+=p.g;p.life-=dt*.95;
    if(p.life<=0){parts.splice(i,1);continue;}
    cx.globalAlpha=p.life;cx.fillStyle=`hsl(${p.h%360},95%,${58+p.life*22}%)`;
    if(p.sq){cx.save();cx.translate(p.x,p.y);cx.rotate(p.life*6);
      cx.fillRect(-p.r*p.life,-p.r*p.life*.6,p.r*2*p.life,p.r*1.2*p.life);cx.restore();}
    else{cx.beginPath();cx.arc(p.x,p.y,p.r*p.life,0,7);cx.fill();}}
  cx.globalAlpha=1;
  // 絵文字レイン
  for(const r of rains){cx.save();cx.translate(r.x,r.y);cx.rotate(r.rot);
    cx.font=r.s+'px sans-serif';cx.textAlign='center';cx.fillText(r.e,0,0);cx.restore();}
  // 判定ポップ
  for(let i=pops.length-1;i>=0;i--){const p=pops[i];p.life-=dt*1.3;p.y-=dt*60;
    if(p.life<=0){pops.splice(i,1);continue;}
    cx.globalAlpha=Math.min(p.life*2,1);cx.font=`bold ${p.size}px sans-serif`;
    cx.textAlign='center';cx.fillStyle=p.col;cx.shadowColor=p.col;cx.shadowBlur=12;
    cx.fillText(p.txt,p.x,p.y);cx.shadowBlur=0;}
  cx.globalAlpha=1;cx.restore();
  // フラッシュ
  if(state.flash>0){cx.fillStyle=`rgba(${state.flashR},${state.flashG},${state.flashB},${state.flash*.5})`;
    cx.fillRect(0,0,W,H);}
  // HUD
  if(state.mode==='play'||state.mode==='dying'||state.mode==='over'){
    cx.textAlign='center';cx.fillStyle='#fff';cx.font='bold 30px sans-serif';
    cx.shadowColor='rgba(255,160,220,.85)';cx.shadowBlur=10;
    cx.fillText(state.score,W/2,H*.07);cx.shadowBlur=0;
    if(state.combo>1){cx.fillStyle=fever?`hsl(${state.hue},100%,75%)`:'#ffd76e';
      cx.font=`bold ${20+Math.min(state.combo,30)}px sans-serif`;
      cx.fillText(state.combo+' COMBO',W/2,H*.13);}
    cx.font='bold 13px sans-serif';cx.textAlign='right';cx.fillStyle='#d9aaff';
    cx.fillText('Lv.'+state.lv,W-12,H*.05);
    if(fever){cx.textAlign='center';cx.fillStyle=`hsl(${state.hue},100%,70%)`;cx.font='bold 22px sans-serif';
      cx.fillText('★ こっこフィーバー ★',W/2,H*.2);
      cx.fillStyle=`hsla(${state.hue},100%,70%,.85)`;
      cx.fillRect(W*.2,H*.215,W*.6*(state.fever/9),6);}
    cx.font='20px sans-serif';cx.textAlign='left';
    for(let i=0;i<3;i++)cx.fillText(i<state.hearts?'❤️':'🖤',12+i*26,H-14);
    if(state.mode==='play'&&state.mt<6){cx.globalAlpha=Math.min(1,(6-state.mt)/2);
      cx.textAlign='center';cx.fillStyle='#fcd';cx.font='15px sans-serif';
      cx.fillText('音にあわせて左右をタップ！ ブラックこっこはスルー！',W/2,H*.66);cx.globalAlpha=1;}}}

/* ───────── ループ ───────── */
let last=performance.now();
function frame(now){const dt=Math.min((now-last)/1000,.05);last=now;
  // ヒットストップ: PERFECT/被弾/フィーバー突入の瞬間だけ時間がトロける（音楽時間は止めない）
  let gdt=dt;
  if(state.slow>0){state.slow=Math.max(0,state.slow-dt);gdt=dt*.22;}
  update(state.mode==='play'?dt:gdt);bgmPump();draw(gdt);requestAnimationFrame(frame);}
requestAnimationFrame(frame);
window.__beat={state,notes,parts,pops,waves,rains,startGame,endGame,update,
  spawnNote,judgeTap,pickType,chartHasNote,getBest:()=>best};
</script>

<script>
/* 強制更新🔄ボタン（タイトル/ホーム画面のみ）：キャッシュ削除＋ServiceWorker解除＋キャッシュバスターで最新版を取得。セーブ(localStorage)は消えません。トップ/島ぐらしと同じ動作。 */
(function(){
  if(document.getElementById('reloadBtn')) return;
  var host=document.querySelector('#titleScreen,#startOv,#title');
  if(!host) return;
  var css='.reload-btn{position:fixed;right:calc(14px + env(safe-area-inset-right));bottom:calc(14px + env(safe-area-inset-bottom));width:54px;height:54px;z-index:60;display:flex;align-items:center;justify-content:center;border-radius:50%;padding:0;cursor:pointer;background:radial-gradient(circle at 50% 38%,rgba(40,46,60,.88),rgba(10,12,20,.85));border:1px solid rgba(180,200,255,.5);box-shadow:0 4px 16px rgba(0,0,0,.5),0 0 14px rgba(150,180,255,.25);-webkit-backdrop-filter:blur(6px);backdrop-filter:blur(6px);animation:reload-bob 3s ease-in-out infinite;transition:box-shadow .2s,transform .15s;}'
    +'.reload-btn img{width:34px;height:34px;pointer-events:none;filter:drop-shadow(0 1px 4px rgba(255,200,120,.5));}'
    +'.reload-btn::after{content:"↻";position:absolute;right:-2px;bottom:-2px;width:20px;height:20px;border-radius:50%;background:linear-gradient(180deg,#ffe08a,#ff9e5b);color:#2a1605;font-size:13px;font-weight:700;display:flex;align-items:center;justify-content:center;box-shadow:0 1px 5px rgba(0,0,0,.45);}'
    +'.reload-btn:hover,.reload-btn:focus-visible{box-shadow:0 6px 20px rgba(0,0,0,.55),0 0 20px rgba(150,180,255,.45);border-color:rgba(210,225,255,.9);}'
    +'.reload-btn:active{transform:scale(.92);}'
    +'.reload-btn.spinning{animation:reload-spin .7s linear infinite;}.reload-btn.spinning img{opacity:.85;}'
    +'@keyframes reload-bob{0%,100%{transform:translateY(0);}50%{transform:translateY(-5px);}}'
    +'@keyframes reload-spin{to{transform:rotate(360deg);}}'
    +'@media (prefers-reduced-motion:reduce){.reload-btn{animation:none;}}';
  var st=document.createElement('style'); st.textContent=css; document.head.appendChild(st);
  var btn=document.createElement('button');
  btn.type='button'; btn.id='reloadBtn'; btn.className='reload-btn';
  btn.setAttribute('aria-label','さいしんに更新（強制リロード）'); btn.title='さいしんに更新';
  btn.innerHTML='<img src="/chikumo.svg" alt="" width="34" height="34">';
  host.appendChild(btn);
  var busy=false;
  btn.addEventListener('click', function(){
    if(busy) return; busy=true; btn.classList.add('spinning');
    var done=false;
    function go(){ if(done) return; done=true; var u=location.pathname+'?r='+Date.now()+(location.hash||''); try{location.replace(u);}catch(e){location.href=u;} }
    var tasks=[];
    try{ if(window.caches&&caches.keys) tasks.push(caches.keys().then(function(ks){return Promise.all(ks.map(function(k){return caches.delete(k);}));})); }catch(e){}
    try{ if(navigator.serviceWorker&&navigator.serviceWorker.getRegistrations) tasks.push(navigator.serviceWorker.getRegistrations().then(function(rs){return Promise.all(rs.map(function(r){return r.unregister();}));})); }catch(e){}
    if(tasks.length){ Promise.all(tasks).then(go).catch(go); setTimeout(go,1500); } else go();
  });
})();
</script>
