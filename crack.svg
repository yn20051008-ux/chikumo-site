<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400">
  <defs>
    <style>
      .out  { fill: none; stroke: #3a342c; stroke-width: 5; stroke-linecap: round; stroke-linejoin: round; }
      .body { fill: #f4d35e; }
      .cap  { fill: #2f343c; }
      .eye  { fill: #2c2722; }
      .beak { fill: #d98a3c; }
      .foot { fill: #e9a23a; }
      .shadow { fill: #00000010; }
    </style>
    <clipPath id="bodyclip">
      <path d="M200 95 C120 95, 78 150, 76 215 C74 285, 110 345, 200 348 C290 345, 326 285, 324 215 C322 150, 280 95, 200 95 Z"/>
    </clipPath>
  </defs>

  <!-- ground shadow -->
  <ellipse class="shadow" cx="200" cy="356" rx="110" ry="13"/>

  <!-- wings -->
  <path class="body out" d="M92 224 q-24 11 -19 35 q14 12 25 -3 q5 -21 -6 -32 Z"/>
  <path class="body out" d="M308 224 q24 11 19 35 q-14 12 -25 -3 q-5 -21 6 -32 Z"/>

  <!-- body -->
  <path class="body out" d="M200 95
    C120 95, 78 150, 76 215
    C74 285, 110 345, 200 348
    C290 345, 326 285, 324 215
    C322 150, 280 95, 200 95 Z"/>

  <!-- soft volume shading inside body -->
  <g clip-path="url(#bodyclip)">
    <ellipse cx="200" cy="392" rx="140" ry="58" fill="#e7bf45" opacity="0.30"/>
  </g>

  <!-- feet -->
  <path class="foot out" d="M176 344 q-14 14 -7 25 q12 6 21 -4"/>
  <path class="foot out" d="M224 344 q14 14 7 25 q-12 6 -21 -4"/>

  <!-- cap (compact, perched & tilted) — brim under, crown on top -->
  <g transform="rotate(-8 200 140)">
    <!-- brim (drawn first; inner part hidden under crown) -->
    <path class="cap out" d="M152 134 C108 135, 74 157, 66 174 C86 182, 120 174, 152 156 C162 150, 162 140, 152 134 Z"/>
    <!-- crown (on top) -->
    <path class="cap out" d="M105 150
      C104 100, 150 78, 200 78
      C255 78, 296 100, 294 148
      C245 150, 160 150, 120 156
      C112 156, 106 154, 105 150 Z"/>
  </g>

  <!-- eyebrow (single soft arc) -->
  <path d="M158 206 Q200 192 242 206" class="out" stroke-width="5"/>

  <!-- eyes -->
  <ellipse class="eye" cx="174" cy="226" rx="11" ry="13"/>
  <ellipse class="eye" cx="226" cy="226" rx="11" ry="13"/>

  <!-- beak -->
  <path class="beak out" d="M192 243 Q200 240 208 243 Q205 255 200 257 Q195 255 192 243 Z" stroke-width="4.5"/>
</svg>
