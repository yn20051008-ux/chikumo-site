<body>
<canvas id="game"></canvas>
<a class="back" href="/">← 畜物語</a>
<button class="mute" id="muteBtn" aria-label="サウンド切替">🔊</button>

<div id="ui">
  <div class="overlay" id="startOv">
    <img class="hero" src="/chikumo.svg" alt="こっこちゃん">
    <h1>こっこSOS大救出</h1>
    <div class="sub">COCCO SOS — RESCUE RACER 🚨 傾けて追跡せよ</div>
    <div class="how">
      ◆ たいへん！こっこちゃんが<b>ブラックこっこ号</b>にさらわれた！<br>

<script>
"use strict";
/* ════════════════════════════════════════════════════════════
   こっこSOS大救出 — COCCO SOS RESCUE RACER
   ジャイロセンサー操作 × Z軸(奥行き)ネオンハイウェイ追跡レース
   クリアできる要素 76.6% / クリアできない要素 23.4%
   ════════════════════════════════════════════════════════════ */
const TAU=Math.PI*2;
const CLEAR_RATE=0.766;            // 76.6% フェア配置 / 23.4% 鬼配置
const fair=()=>Math.random()<CLEAR_RATE;

/* ───────── 公式こっこちゃんSVG ───────── */
let blackCv=null;
const cocco=new Image();let coccoReady=false;
cocco.onload=()=>{coccoReady=true;makeBlack();};
cocco.src='/chikumo.svg';
/* ブラックこっこちゃん: 公式SVGをシルエット化 */
function makeBlack(){
  const c=document.createElement('canvas');c.width=120;c.height=157;
  const g=c.getContext('2d');
  g.drawImage(cocco,0,0,120,157);
  g.globalCompositeOperation='source-in';
  g.fillStyle='#0a0a14';g.fillRect(0,0,120,157);
  blackCv=c;
}

/* ───────── キャンバス / 動的解像度スロットリング ───────── */
if(!CanvasRenderingContext2D.prototype.roundRect)
  CanvasRenderingContext2D.prototype.roundRect=function(x,y,w,h){this.rect(x,y,w,h);return this;};
const cv=document.getElementById('game'),cx=cv.getContext('2d');
let W=0,H=0,DPR=1,renderScale=1;
function resize(){
  DPR=Math.min(devicePixelRatio||1,2)*renderScale;
  W=innerWidth;H=innerHeight;
  cv.width=Math.max(1,Math.round(W*DPR));cv.height=Math.max(1,Math.round(H*DPR));
  cv.style.width=W+'px';cv.style.height=H+'px';
  cx.setTransform(DPR,0,0,DPR,0,0);
}
addEventListener('resize',resize);resize();
/* コンテキストロス・フォールバック */
cv.addEventListener('contextlost',e=>e.preventDefault());
cv.addEventListener('contextrestored',()=>resize());
let perfAcc=0,perfN=0;
function perfSample(dtMs){
  perfAcc+=dtMs;perfN++;
  if(perfN>=70){
    const avg=perfAcc/perfN;perfAcc=0;perfN=0;
    if(avg>24&&renderScale>0.55){renderScale=Math.max(0.55,renderScale-0.15);resize();}
    else if(avg<14.5&&renderScale<1){renderScale=Math.min(1,renderScale+0.15);resize();}
  }
}

function vib(p){try{if(navigator.vibrate)navigator.vibrate(p);}catch(e){}}

/* ───────── プロシージャル・オーディオ ───────── */
let AC=null,muted=false,ECHO=null,echoWet=null;
const MASTER=0.5;
function audio(){
  if(!AC){
    AC=new (window.AudioContext||window.webkitAudioContext)();
    ECHO=AC.createDelay(1);ECHO.delayTime.value=60/140/2;
    const fb=AC.createGain();fb.gain.value=.3;
    echoWet=AC.createGain();echoWet.gain.value=.4;
    ECHO.connect(fb);fb.connect(ECHO);ECHO.connect(echoWet);echoWet.connect(AC.destination);
  }
  if(AC.state==='suspended')AC.resume();
  return AC;
}
function tone(f,t0,dur,type,vol,slide,echo){
  const a=audio(),o=a.createOscillator(),g=a.createGain();
  o.type=type;o.frequency.setValueAtTime(Math.max(20,f),t0);
  if(slide)o.frequency.exponentialRampToValueAtTime(Math.max(20,slide),t0+dur);
  g.gain.setValueAtTime(vol*MASTER,t0);g.gain.exponentialRampToValueAtTime(.0001,t0+dur);
  o.connect(g).connect(a.destination);if(echo&&ECHO)g.connect(ECHO);
  o.start(t0);o.stop(t0+dur+.03);
}
function noise(t0,dur,vol,hp){
  const a=audio(),n=a.createBufferSource(),
    buf=a.createBuffer(1,Math.max(1,(a.sampleRate*dur)|0),a.sampleRate),
    d=buf.getChannelData(0);
  for(let i=0;i<d.length;i++)d[i]=(Math.random()*2-1)*(1-i/d.length);
  n.buffer=buf;
  const g=a.createGain();g.gain.value=vol*MASTER;
  if(hp){const f=a.createBiquadFilter();f.type='highpass';f.frequency.value=hp;n.connect(f).connect(g);}
  else n.connect(g);
  g.connect(a.destination);n.start(t0);
}
/* ─ 効果音(操作リズムに合うキメ・140BPM) ─ */
function sfxStart(){if(muted)return;const t=audio().currentTime;
  tone(70,t,.5,'sawtooth',.18,420);noise(t+.1,.2,.07,800);
  [262,330,392,523,659].forEach((f,i)=>tone(f,t+.25+i*.06,.16,'square',.12,0,1));}
function sfxItem(){if(muted)return;const t=audio().currentTime;tone(1318,t,.07,'square',.1);tone(1760,t+.05,.13,'square',.1,0,1);}
function sfxGem(){if(muted)return;const t=audio().currentTime;
  [1047,1319,1568,2093].forEach((f,i)=>tone(f,t+i*.045,.14,'square',.11,0,1));}
function sfxHeart(){if(muted)return;const t=audio().currentTime;[660,880,1100].forEach((f,i)=>tone(f,t+i*.07,.14,'triangle',.13,0,1));}
function sfxClock(){if(muted)return;const t=audio().currentTime;tone(1568,t,.06,'square',.12);tone(1568,t+.1,.06,'square',.1);tone(2093,t+.2,.16,'triangle',.13,0,1);}
function sfxShield(){if(muted)return;const t=audio().currentTime;tone(392,t,.3,'triangle',.13,784,1);noise(t,.1,.04,2000);}
function sfxRocket(){if(muted)return;const t=audio().currentTime;
  tone(160,t,.5,'sawtooth',.16,950,1);noise(t,.4,.1,500);tone(1568,t+.3,.2,'triangle',.12,0,1);}
function sfxNear(c){if(muted)return;const t=audio().currentTime;
  noise(t,.12,.1,2200);tone(1400,t,.12,'square',.08,420,1);
  tone(659.25*Math.pow(1.0594631,Math.min(c,12)),t+.05,.12,'square',.1,0,1);}
function sfxCrash(){if(muted)return;const t=audio().currentTime;
  tone(196,t,.3,'sawtooth',.17,65);tone(98,t,.36,'square',.13,49);noise(t,.26,.13);}
function sfxSmash(){if(muted)return;const t=audio().currentTime;
  noise(t,.16,.1,1000);tone(330,t,.18,'square',.13,1320,1);tone(165,t,.22,'sawtooth',.1,660);}
function sfxFever(){if(muted)return;const t=audio().currentTime;
  [523,659,784,1047,1319,1568,2093].forEach((f,i)=>tone(f,t+i*.05,.2,'square',.12,0,1));}
function sfxRescue(){if(muted)return;const t=audio().currentTime;
  [523,659,784,1047,784,1047,1319,1568,2093,2637].forEach((f,i)=>tone(f,t+i*.07,.24,'square',.13,0,1));
  [0,.2,.4,.6].forEach(d=>noise(t+d,.1,.06,3500));
  tone(131,t,.8,'sawtooth',.1,262);}
function sfxSiren(){if(muted)return;const t=audio().currentTime;
  tone(880,t,.12,'square',.07,1100,1);tone(1100,t+.14,.12,'square',.07,880,1);}
function sfxTick(){if(muted)return;const t=audio().currentTime;tone(880,t,.07,'square',.13);}
function sfxOver(){if(muted)return;const t=audio().currentTime;
  [392,330,262,196].forEach((f,i)=>tone(f,t+i*.16,.3,'triangle',.14));noise(t+.6,.4,.08);}

/* ─ ジェネレーティブ・ミュージック (140BPM 王道進行×固定フック=脳内ループ) ─ */
const BPM=140,STEP16=60/BPM/4;
const CHORDS=[[53,57,60],[55,59,62],[52,55,59],[57,60,64]]; /* F G Em Am */
/* 2小節32ステップの固定キャッチーフック(0=休符) — 何度も同じ節が回る */
const HOOK=[69,0,72,69, 0,76,74,72, 74,0,72,69, 67,0,69,0,
            69,0,72,69, 0,76,74,72, 79,0,77,76, 74,72,74,0];
const BASSP=[0,0,7,0, 12,0,7,0, 0,0,7,0, 12,7,0,5];
let bgmStep=0,bgmNext=0;
const mf=m=>440*Math.pow(2,(m-69)/12);
function kick(t){tone(150,t,.12,'sine',.32,40);}
function clap(t){noise(t,.1,.13,1700);tone(220,t,.05,'triangle',.05);}
function hat(t,v){noise(t,.03,v,6500);}
function bass(f,t){tone(f,t,STEP16*1.6,'sawtooth',.13);tone(f,t,STEP16*1.6,'square',.05);}
function lead(f,t,d){tone(f,t,d,'square',.09,0,1);}
function pad(ch,t){ch.forEach(m=>tone(mf(m),t,STEP16*14,'sine',.026));}
function schedBGM(){
  if(muted||!AC||state!=='play')return;
  const now=AC.currentTime;
  if(bgmNext<now-0.3)bgmNext=now;       /* タブ復帰時の追いつき防止 */
  while(bgmNext<now+0.15){
    const s=bgmStep,t=Math.max(bgmNext,now),
      bar=(s>>4)%4,st=s&15,ch=CHORDS[bar];
    if(st%4===0)kick(t);
    if(st===4||st===12)clap(t);
    if(st%2===0)hat(t,st%4===2?.055:.028);
    else if(boost>0||fever>0)hat(t,.04);                 /* 疾走時は16分ハット */
    if(st%2===0&&BASSP[st]!==undefined)bass(mf(ch[0]-24+BASSP[st]%12),t);
    const m=HOOK[s%32];
    if(m)lead(mf(m+(fever>0?12:0)),t,STEP16*1.9);
    if(st===0)pad(ch,t);
    bgmStep++;bgmNext+=STEP16;
  }
}

/* ───────── 入力: ジャイロ + タッチフォールバック ───────── */
let gyroOn=false,gyroSeen=false,needCal=true,g0=0,b0=0,tpx=0,tlean=0;
function onOri(e){
  if(e.gamma==null||e.beta==null)return;
  gyroSeen=true;
  if(needCal){g0=e.gamma;b0=e.beta;needCal=false;}
  tpx=Math.max(-1,Math.min(1,(e.gamma-g0)/20));
  tlean=Math.max(-1,Math.min(1,(b0-e.beta)/22));   /* 前傾=アクセル */
}
async function enableGyro(){
  try{
    if(!window.DeviceOrientationEvent)return false;
    if(typeof DeviceOrientationEvent.requestPermission==='function'){
      const r=await DeviceOrientationEvent.requestPermission();
      if(r!=='granted')return false;
    }
    addEventListener('deviceorientation',onOri);
    return true;
  }catch(e){return false;}
}
/* タッチ/マウス: なぞってハンドル、上へなぞるとアクセル */
let dragId=null,dragX=0,dragY=0;
cv.addEventListener('pointerdown',e=>{dragId=e.pointerId;dragX=e.clientX;dragY=e.clientY;});
cv.addEventListener('pointermove',e=>{
  if(e.pointerId!==dragId)return;
  const R=Math.min(W,H)*.4;
  tpx=Math.max(-1,Math.min(1,tpx+(e.clientX-dragX)/(R*.8)));
  tlean=Math.max(-1,Math.min(1,tlean+(dragY-e.clientY)/(R*.8)));
  dragX=e.clientX;dragY=e.clientY;
});
addEventListener('pointerup',()=>{dragId=null;});
addEventListener('pointercancel',()=>{dragId=null;});

/* ───────── ゲーム状態 ───────── */
let state='menu';
let score=0,best=+(localStorage.getItem('sosBest')||0),
  bestResc=+(localStorage.getItem('sosResc')||0),
  combo=0,maxCombo=0,hp=3,timeLeft=65,elapsed=0,
  fever=0,shield=0,invuln=0,boost=0,cele=0,
  distKm=0,rescued=0,scoreMult=1,
  kmh=160,gap=400,rivalBurst=0,rx=0,sirenT=0,helpT=0,
  px=0,camX=0,zAbs=0,shake=0,flash=0,flashCol='255,60,60',hue=300,lastTick=99;
/* プロシージャル・ジェネレーション: 毎回ちがう道(位相ランダム) */
let ph1=Math.random()*TAU,ph2=Math.random()*TAU,phH=Math.random()*TAU;
function curAt(z){const a=zAbs+z;return .9*Math.sin(a*7e-4+ph1)*Math.sin(a*1.7e-4+ph2);}
function hillAt(z){return Math.sin((zAbs+z)*5e-4+phH)*46;}

/* ───────── オブジェクト・プーリング ───────── */
const ZSPAWN=2400,FOCAL=460;
const ents=[];        /* {alive,type,z,nx,...} */
function ent(){for(const e of ents)if(!e.alive)return e;const e={alive:false};ents.push(e);return e;}
const parts=[];       /* パーティクル */
function part(){for(const p of parts)if(!p.alive)return p;if(parts.length>340)return null;const p={alive:false};parts.push(p);return p;}
const pops=[];        /* テキストポップ */
function pop(){for(const p of pops)if(!p.alive)return p;const p={alive:false};pops.push(p);return p;}
const stars=[];       /* 夜空の星(視差) */
for(let i=0;i<70;i++)stars.push({x:Math.random(),y:Math.random()*.38,tw:Math.random()*TAU,r:.4+Math.random()*1.4});

function burst(x,y,n,cols,emoji){
  for(let i=0;i<n;i++){
    const p=part();if(!p)break;
    const a=Math.random()*TAU,v=60+Math.random()*340;
    p.alive=true;p.x=x;p.y=y;p.vx=Math.cos(a)*v;p.vy=Math.sin(a)*v-60;
    p.t=0;p.dur=.5+Math.random()*.8;p.size=3+Math.random()*7;
    p.emoji=(emoji&&Math.random()<.45)?emoji[(Math.random()*emoji.length)|0]:null;
    p.col=cols[(Math.random()*cols.length)|0];
  }
}
function popup(x,y,text,col,size){
  const p=pop();p.alive=true;p.x=x;p.y=y;p.t=0;p.dur=.9;
  p.text=text;p.col=col||'#fff';p.size=size||22;
}

/* ───────── スポーン (76.6% / 23.4%) ───────── */
let blockT=2.5,rockT=4,itemT=1.2,blackT=7;
function rnd(a,b){return a+Math.random()*(b-a);}
function spawnBlock(){   /* 🚧バリケード列 */
  const f=fair(),slots=[-.8,-.4,0,.4,.8],
    open=(Math.random()*5)|0,
    open2=f?(open+(Math.random()<.5?1:4))%5:-1,   /* フェア:あな2つ */
    drift=f?0:rnd(.12,.25)*(Math.random()<.5?-1:1);
  for(let i=0;i<5;i++){
    if(i===open||i===open2)continue;
    const e=ent();e.alive=true;e.type='block';e.done=false;
    e.z=ZSPAWN;e.nx=slots[i];e.r=.3;e.drift=drift;
  }
}
function spawnRock(){    /* ☄️隕石 */
  const f=fair(),e=ent();e.alive=true;e.type='rock';e.done=false;
  e.z=ZSPAWN;e.nx=rnd(-.85,.85);e.r=f?.2:.26;
  e.drift=f?0:rnd(.2,.4)*(Math.random()<.5?-1:1);
  e.spin=rnd(-2,2);e.ph=Math.random()*TAU;
}
function spawnBlack(){   /* ブラックこっこライダー */
  const f=fair(),n=f?1:2;
  for(let i=0;i<n;i++){
    const e=ent();e.alive=true;e.type='black';e.done=false;
    e.z=ZSPAWN+i*420;e.nx=rnd(-.8,.8);
    e.home=f?.12:.3;            /* ホーミング強度 */
    e.flap=Math.random()*TAU;
  }
}
function spawnItems(){   /* 絵文字アイテム */
  const pick=Math.random();
  if(pick<.4){ /* ⭐の列(レーン沿い) */
    const lane=rnd(-.7,.7);
    for(let i=0;i<4;i++){
      const e=ent();e.alive=true;e.type='item';e.kind='star';e.emoji='⭐';
      e.z=ZSPAWN+i*240;e.nx=lane;e.done=false;
    }
  }else{
    const e=ent();e.alive=true;e.type='item';e.done=false;
    e.z=ZSPAWN;e.nx=rnd(-.8,.8);
    if(pick<.58){e.kind='rocket';e.emoji='🚀';}
    else if(pick<.7){e.kind='gem';e.emoji='💎';}
    else if(pick<.8){e.kind='clock';e.emoji='⏰';}
    else if(pick<.88){e.kind='heart';e.emoji='❤️';}
    else if(pick<.96){e.kind='shield';e.emoji='🛡️';}
    else{e.kind='rainbow';e.emoji='🌈';}
  }
}

/* ───────── 判定・ダメージ ───────── */
function addScore(n){score+=Math.round(n*scoreMult);}
function crash(em){
  if(invuln>0||fever>0)return;
  if(shield>0){shield=0;flash=.5;flashCol='120,220,255';sfxShield();popup(W/2,H*.4,'🛡️シールド！','#7ad7ff',26);return;}
  hp--;combo=0;invuln=1.5;shake=24;flash=.7;flashCol='255,60,60';
  kmh*=0.35;gap=Math.min(999,gap+20);     /* クラッシュ=減速&差が開く */
  sfxCrash();vib([60,40,80]);
  burst(W/2,H*.66,26,['#ff5a5a','#ffb05a','#fff'],['💥','😵',em||'💢']);
  popup(W/2,H*.45,'💥クラッシュ！ +20m離された','#ff7a6a',24);
  if(hp<=0)gameOver('hp');
}
function nearMiss(){
  combo++;addScore(50);sfxNear(combo);vib(8);
  popup(W/2+rnd(-40,40),H*.52,'ニアミス！+'+Math.round(50*scoreMult),'#7ad7ff',18);
  const p=part();
  if(p){p.alive=true;p.x=W/2+rnd(-60,60);p.y=H*.6;p.vx=rnd(-200,200);p.vy=rnd(-260,-90);
    p.t=0;p.dur=.5;p.size=5;p.emoji='✨';p.col='#7ad7ff';}
}
function startFever(){
  if(fever>0){fever=8;return;}
  fever=8;scoreMult=2;flash=.5;flashCol='255,210,120';
  sfxFever();vib([30,30,30,30,60]);
  popup(W/2,H*.35,'🌈 FEVER!! 🌈','#ffd76e',34);
  burst(W/2,H/2,60,['#ff8ac2','#ffd76e','#7ad7ff','#b08bff'],['🌈','✨','🎉','💖']);
}
function startBoost(){
  boost=Math.max(boost,3);
  sfxRocket();vib([20,20,40]);flash=.35;flashCol='255,180,90';
  popup(W/2,H*.4,'🚀 ロケットブースト！！','#ffb05a',28);
}
function doRescue(){
  rescued++;combo+=5;
  const bonus=3000+1500*(rescued-1);
  addScore(bonus);
  timeLeft=Math.min(99,timeLeft+12);
  cele=1.8;invuln=2.2;
  gap=450+rescued*70;                     /* 次のブラックこっこ号が逃走 */
  sfxRescue();vib([40,40,40,40,40,40,160]);
  flash=.8;flashCol='255,225,140';shake=14;
  popup(W/2,H*.3,'🎉 こっこちゃん救出！！ +'+Math.round(bonus*scoreMult),'#ffd76e',32);
  popup(W/2,H*.4,'⏰+12秒！ つぎのブラックこっこ号を追え！','#ff8ac2',18);
  burst(W/2,H*.45,80,['#ffd76e','#ff8ac2','#7ad7ff','#b08bff','#fff'],['🎉','💖','🐣','⭐','🌈','✨','🎊']);
  if(rescued>bestResc){bestResc=rescued;localStorage.setItem('sosResc',bestResc);}
}

function judge(e){
  const dx=e.nx-px;
  if(e.type==='item'){
    if(Math.abs(dx)<.26){
      const sx=W/2,sy=H*.55;
      if(e.kind==='star'){addScore(150);combo++;sfxItem();popup(sx,sy,'⭐+'+Math.round(150*scoreMult),'#ffe28a',20);}
      else if(e.kind==='gem'){addScore(500);combo++;sfxGem();popup(sx,sy,'💎+'+Math.round(500*scoreMult),'#8ad7ff',24);burst(sx,sy,14,['#8ad7ff','#fff'],['💎','✨']);}
      else if(e.kind==='heart'){if(hp<3){hp++;popup(sx,sy,'❤️かいふく！','#ff8ac2',24);}else{addScore(300);popup(sx,sy,'❤️+'+Math.round(300*scoreMult),'#ff8ac2',20);}sfxHeart();burst(sx,sy,14,['#ff8ac2','#fff'],['❤️','💖']);}
      else if(e.kind==='clock'){timeLeft=Math.min(99,timeLeft+3);sfxClock();popup(sx,sy,'⏰+3秒！','#9fe8a0',24);burst(sx,sy,12,['#9fe8a0','#fff'],['⏰','✨']);}
      else if(e.kind==='shield'){shield=8;sfxShield();popup(sx,sy,'🛡️シールド 8秒','#7ad7ff',24);}
      else if(e.kind==='rainbow'){startFever();}
      else if(e.kind==='rocket'){addScore(200);combo++;startBoost();}
      vib(12);e.alive=false;
    }
  }
  else if(e.type==='black'){
    const ad=Math.abs(dx);
    if(ad<.3){
      if(fever>0||shield>0){
        addScore(400);combo++;sfxSmash();vib(25);
        popup(W/2,H*.5,'ブラックこっこ撃破！+'+Math.round(400*scoreMult),'#b08bff',24);
        burst(W/2,H*.55,22,['#b08bff','#444','#fff'],['💫','⚡']);
        if(shield>0&&fever<=0)shield=Math.max(0,shield-2);
      }else{crash('🖤');}
      e.alive=false;
    }
  }
  else if(e.type==='block'||e.type==='rock'){
    const ad=Math.abs(dx),hitR=e.type==='block'?.3:e.r;
    if(ad<hitR){crash(e.type==='block'?'🚧':'☄️');e.alive=false;
      burst(W/2,H*.62,14,['#caa','#876','#fff'],[e.type==='block'?'🚧':'☄️','💥']);}
    else if(ad<hitR+.22)nearMiss();
  }
}

/* ───────── メインループ ───────── */
let last=0;
function gameOver(reason){
  state='over';sfxOver();vib([80,60,120]);
  if(score>best){best=score;localStorage.setItem('sosBest',best);}
  document.getElementById('endReason').textContent=
    reason==='time'?'⏰ タイムアップ！':'💔 マシンが大破した…';
  document.getElementById('endScore').textContent=score.toLocaleString();
  document.getElementById('endResc').textContent='🐣 救出 '+rescued+'羽（ベスト '+bestResc+'羽）';
  document.getElementById('endBest').textContent='ベストスコア '+best.toLocaleString();
  document.getElementById('endCombo').textContent='最大コンボ '+maxCombo+' ／ 走行 '+distKm.toFixed(1)+'km';
  document.getElementById('endOv').classList.remove('hidden');
  document.getElementById('recalBtn').classList.add('hidden');
  burst(W/2,H/2,50,['#7ad7ff','#ff8ac2','#ffd76e','#b08bff'],['🎉','✨','⭐']);
}
function reset(){
  score=0;combo=0;maxCombo=0;hp=3;timeLeft=65;elapsed=0;fever=0;shield=0;invuln=0;
  boost=0;cele=0;distKm=0;rescued=0;scoreMult=1;kmh=160;gap=400;rivalBurst=0;rx=0;
  px=0;camX=0;tpx=0;tlean=0;zAbs=0;shake=0;flash=0;lastTick=99;sirenT=0;helpT=4;
  ph1=Math.random()*TAU;ph2=Math.random()*TAU;phH=Math.random()*TAU;
  blockT=2.5;rockT=4;itemT=1.2;blackT=7;
  for(const e of ents)e.alive=false;
  for(const p of parts)p.alive=false;
  for(const p of pops)p.alive=false;
  needCal=true;
  bgmStep=0;bgmNext=AC?AC.currentTime+.1:0;
}

function update(dt){
  elapsed+=dt;
  /* ─ レーシング: 速度モデル ─ */
  const offroad=Math.abs(px)>.95;
  let target=Math.min(300,150+elapsed*7+rescued*12)+tlean*45;
  if(boost>0)target*=1.5;
  if(fever>0)target*=1.2;
  if(offroad)target*=.55;
  const slip=gap<80&&Math.abs(px-rx)<.3;       /* スリップストリーム */
  if(slip)target+=30;
  kmh+=(target-kmh)*Math.min(1,dt*1.2);
  const zSpd=kmh*1.9;
  zAbs+=zSpd*dt;distKm+=kmh*dt/3600;
  /* ─ ハンドル+遠心力 ─ */
  px+=(tpx-px)*Math.min(1,dt*7);
  px-=curAt(0)*(kmh/260)*.5*dt;                /* カーブで外へ流される */
  px=Math.max(-1.12,Math.min(1.12,px));
  camX+=(px-camX)*Math.min(1,dt*10);
  if(offroad){shake=Math.max(shake,3);if(Math.random()<.3)vib(5);}
  /* ─ タイマー類 ─ */
  timeLeft-=dt;
  if(timeLeft<=0){timeLeft=0;gameOver('time');return;}
  if(timeLeft<5.5&&Math.ceil(timeLeft)!==lastTick){lastTick=Math.ceil(timeLeft);sfxTick();}
  if(fever>0){fever-=dt;if(fever<=0){fever=0;scoreMult=1;}}
  if(shield>0)shield-=dt;
  if(invuln>0)invuln-=dt;
  if(boost>0)boost-=dt;
  if(cele>0)cele-=dt;
  if(shake>0)shake=Math.max(0,shake-dt*60);
  if(flash>0)flash=Math.max(0,flash-dt*2.2);
  hue=(hue+dt*(fever>0?160:14))%360;
  if(combo>maxCombo)maxCombo=combo;
  if(combo>=10&&fever<=0)startFever();
  /* ─ 追跡: ブラックこっこ号とのギャップ ─ */
  let rival=190+rescued*16+Math.sin(elapsed*.7)*12;
  if(rivalBurst>0){rivalBurst-=dt;rival+=65;}              /* 23.4%: 鬼の逃げスパート */
  else if(Math.random()<dt*.14&&!fair())rivalBurst=2;
  gap+=(rival-kmh)*dt/3.6;
  gap=Math.min(999,gap);
  if(gap<=0){gap=0;doRescue();}
  rx=Math.sin(zAbs*.0009)*.5+Math.sin(zAbs*.0023)*.2;      /* 逃走車の蛇行 */
  sirenT-=dt;
  if(gap<60&&sirenT<=0){sirenT=.6;sfxSiren();}
  helpT-=dt;
  if(helpT<=0){helpT=rnd(5,8);
    if(gap*4<ZSPAWN)popup(W/2+rnd(-50,50),H*.34,'たすけて〜！🐣','#ffd76e',16);}
  /* ─ スポーン ─ */
  const sf=Math.min(1.7,1+elapsed/60+rescued*.06);
  blockT-=dt*sf;rockT-=dt*sf;itemT-=dt;blackT-=dt*sf;
  if(blockT<=0){spawnBlock();blockT=rnd(2.6,3.6);}
  if(rockT<=0){spawnRock();rockT=rnd(2.2,3.4);}
  if(itemT<=0){spawnItems();itemT=rnd(1.6,2.6);}
  if(blackT<=0){spawnBlack();blackT=rnd(5,7.5);}
  /* ─ エンティティ ─ */
  for(const e of ents){
    if(!e.alive)continue;
    const pz=e.z;e.z-=zSpd*dt;
    if(e.drift)e.nx=Math.max(-1,Math.min(1,e.nx+e.drift*dt));
    if(e.type==='black'){
      e.flap+=dt*7;
      const d=px-e.nx;
      e.nx+=Math.sign(d)*Math.min(Math.abs(d),e.home*dt*3);
    }
    if((e.type==='item'||e.type==='black')&&e.z<130&&e.z>-90)judge(e); /* 接触型は手前のみ */
    if(pz>0&&e.z<=0&&!e.done){e.done=true;
      if(e.type==='block'||e.type==='rock')judge(e);}
    if(e.z<-260)e.alive=false;
  }
  /* ─ パーティクル ─ */
  for(const p of parts){if(!p.alive)continue;p.t+=dt;
    if(p.t>=p.dur){p.alive=false;continue;}
    p.x+=p.vx*dt;p.y+=p.vy*dt;p.vy+=340*dt;}
  for(const p of pops){if(!p.alive)continue;p.t+=dt;if(p.t>=p.dur)p.alive=false;}
}

/* ───────── 描画 ───────── */
function bendX(z){return curAt(z)*z*z*6.5e-5;}
function scAt(z){return FOCAL/(FOCAL+Math.max(0,z));}
function roadX(nx,z,sc){return W/2+(nx-camX)*W*.75*sc+bendX(z);}
function roadY(z,sc){const hz=H*.4;return hz+(H*.96-hz)*sc+hillAt(z)*(1-sc);}

function draw(){
  /* ─ 空(シンセウェーブ・サンセット) ─ */
  const hz=H*.4;
  const sky=cx.createLinearGradient(0,0,0,hz);
  if(fever>0){
    sky.addColorStop(0,`hsl(${hue},60%,14%)`);sky.addColorStop(1,`hsl(${(hue+60)%360},75%,30%)`);
  }else{
    sky.addColorStop(0,'#0d0524');sky.addColorStop(.6,'#2b0a45');sky.addColorStop(1,'#6e1655');
  }
  cx.fillStyle=sky;cx.fillRect(0,0,W,hz+2);
  /* 星 */
  for(const s of stars){
    const a=.3+.5*Math.abs(Math.sin(elapsed*1.5+s.tw));
    cx.fillStyle=`rgba(255,230,250,${a})`;
    cx.fillRect(s.x*W,s.y*H,s.r,s.r);
  }
  /* 夕陽(ストライプサン) */
  const sunX=W/2-camX*40-bendX(2200)*.25,sunY=hz-H*.06,sunR=Math.min(W,H)*.17;
  const sg=cx.createLinearGradient(0,sunY-sunR,0,sunY+sunR);
  sg.addColorStop(0,fever>0?`hsl(${hue},95%,72%)`:'#ffd76e');
  sg.addColorStop(1,'#ff4fa0');
  cx.save();cx.beginPath();cx.arc(sunX,sunY,sunR,0,TAU);cx.clip();
  cx.fillStyle=sg;cx.fillRect(sunX-sunR,sunY-sunR,sunR*2,sunR*2);
  cx.fillStyle='rgba(13,5,36,.9)';
  for(let i=0;i<5;i++)cx.fillRect(sunX-sunR,sunY+sunR*.1+i*sunR*.18,sunR*2,sunR*.05+i*1.5);
  cx.restore();
  /* 山並み(視差) */
  cx.fillStyle='#190a33';
  cx.beginPath();cx.moveTo(0,hz);
  for(let i=0;i<=10;i++){const x=i/10*W;
    cx.lineTo(x,hz-Math.abs(Math.sin(i*1.7+ph1))*H*.07-((i%3)?0:H*.02));}
  cx.lineTo(W,hz);cx.closePath();cx.fill();
  cx.save();
  if(shake>0)cx.translate((Math.random()-.5)*shake,(Math.random()-.5)*shake);
  /* ─ 路面(奥→手前のスライス) ─ */
  const NS=22,slices=[];
  for(let i=0;i<=NS;i++){
    const z=Math.pow(i/NS,2)*ZSPAWN,sc=scAt(z);
    slices.push({z,sc,y:roadY(z,sc),xl:roadX(-1.04,z,sc),xr:roadX(1.04,z,sc),xc:roadX(0,z,sc)});
  }
  for(let i=NS;i>0;i--){
    const f=slices[i],n=slices[i-1],
      band=(((zAbs+f.z)/260)|0)%2,
      grass=band?'#150b2e':'#180d34';
    /* サイド地面 */
    cx.fillStyle=fever>0?`hsl(${(hue+180)%360},45%,${band?8:10}%)`:grass;
    cx.fillRect(0,f.y,W,Math.max(1,n.y-f.y+1));
    /* 路面 */
    cx.fillStyle=band?'#1c1535':'#211941';
    cx.beginPath();cx.moveTo(f.xl,f.y);cx.lineTo(f.xr,f.y);cx.lineTo(n.xr,n.y);cx.lineTo(n.xl,n.y);
    cx.closePath();cx.fill();
    /* ネオン路肩 */
    cx.strokeStyle=band
      ?(fever>0?`hsl(${hue},95%,65%)`:'#ff4fa0')
      :(fever>0?`hsl(${(hue+120)%360},95%,65%)`:'#27e0ff');
    cx.lineWidth=Math.max(1,3.4*n.sc);
    cx.beginPath();cx.moveTo(f.xl,f.y);cx.lineTo(n.xl,n.y);
    cx.moveTo(f.xr,f.y);cx.lineTo(n.xr,n.y);cx.stroke();
    /* センターダッシュ */
    if(band){
      cx.fillStyle='rgba(255,230,160,.75)';
      const w1=Math.max(1,5*f.sc),w2=Math.max(1,5*n.sc);
      cx.beginPath();cx.moveTo(f.xc-w1,f.y);cx.lineTo(f.xc+w1,f.y);
      cx.lineTo(n.xc+w2,n.y);cx.lineTo(n.xc-w2,n.y);cx.closePath();cx.fill();
    }
  }
  /* 路肩パイロン+🌴 */
  const sp=300,off=sp-zAbs%sp;
  for(let k=0;k<8;k++){
    const z=off+k*sp;if(z>ZSPAWN)break;
    const sc=scAt(z),y=roadY(z,sc);
    for(const side of[-1.3,1.3]){
      const x=roadX(side,z,sc),hgt=80*sc;
      cx.strokeStyle=`rgba(${side<0?'255,80,170':'60,220,255'},${.5*sc+.2})`;
      cx.lineWidth=Math.max(1,3*sc);
      cx.beginPath();cx.moveTo(x,y);cx.lineTo(x,y-hgt);cx.stroke();
      if((((zAbs+z)/sp)|0)%2===0){
        cx.font=`${Math.max(8,34*sc)}px sans-serif`;cx.textAlign='center';cx.textBaseline='middle';
        cx.fillText('🌴',x,y-hgt);
      }else{
        cx.fillStyle=`rgba(255,220,120,${.6*sc+.2})`;
        cx.beginPath();cx.arc(x,y-hgt,Math.max(1,5*sc),0,TAU);cx.fill();
      }
    }
  }
  /* ─ ブラックこっこ号(逃走車+捕まったこっこちゃん) ─ */
  const rz=gap*4;
  if(rz<ZSPAWN&&state!=='menu'){
    const sc=scAt(rz),x=roadX(rx,rz,sc),y=roadY(rz,sc),
      w=W*.3*sc,h2=w*.62,bob=Math.sin(elapsed*6)*3*sc;
    cx.save();cx.globalAlpha=Math.min(1,sc*2.2);
    cx.translate(x,y-h2*.5+bob);
    /* 車体 */
    cx.shadowColor='#a040ff';cx.shadowBlur=26*sc;
    const bg2=cx.createLinearGradient(0,-h2/2,0,h2/2);
    bg2.addColorStop(0,'#241433');bg2.addColorStop(1,'#0c0716');
    cx.fillStyle=bg2;
    cx.beginPath();cx.roundRect(-w/2,-h2*.3,w,h2*.62,h2*.14);cx.fill();
    /* テールランプ */
    const tp=.6+.4*Math.sin(elapsed*10);
    cx.shadowColor='#f33';cx.shadowBlur=16*sc*tp;
    cx.fillStyle=`rgba(255,50,70,${.65+.35*tp})`;
    cx.fillRect(-w*.46,-h2*.06,w*.14,h2*.12);cx.fillRect(w*.32,-h2*.06,w*.14,h2*.12);
    /* 檻+こっこちゃん */
    cx.shadowColor='#ffd76e';cx.shadowBlur=12*sc;
    if(coccoReady)cx.drawImage(cocco,-w*.14,-h2*.78,w*.28,w*.28*1.31);
    cx.strokeStyle='rgba(220,230,255,.85)';cx.lineWidth=Math.max(1,2.4*sc);
    cx.strokeRect(-w*.2,-h2*.84,w*.4,h2*.6);
    for(let i=1;i<4;i++){const bx=-w*.2+w*.4*i/4;
      cx.beginPath();cx.moveTo(bx,-h2*.84);cx.lineTo(bx,-h2*.24);cx.stroke();}
    /* 運転席のブラックこっこ */
    if(blackCv)cx.drawImage(blackCv,w*.18,-h2*.62,w*.2,w*.2*1.31);
    cx.font=`bold ${Math.max(8,15*sc*2)}px sans-serif`;cx.textAlign='center';
    cx.fillStyle='#ffd76e';cx.shadowBlur=8;
    cx.fillText('SOS',0,-h2*.95);
    cx.restore();
  }
  /* ─ エンティティ(奥から) ─ */
  const sorted=ents.filter(e=>e.alive&&e.z>-200).sort((a,b)=>b.z-a.z);
  for(const e of sorted){
    const sc=scAt(e.z),x=roadX(e.nx,e.z,sc),y=roadY(e.z,sc);
    if(e.type==='item'){
      const r=Math.max(8,W*.085*sc),bob=Math.sin(elapsed*5+e.z*.01)*r*.2;
      cx.save();cx.globalAlpha=Math.min(1,sc*2);
      cx.shadowColor='#fff';cx.shadowBlur=16*sc;
      cx.font=`${r*1.6}px sans-serif`;cx.textAlign='center';cx.textBaseline='middle';
      cx.fillText(e.emoji,x,y-r*.9+bob);
      cx.restore();
    }
    else if(e.type==='block'){
      const w=W*.16*sc,h2=w*.62;
      cx.save();cx.globalAlpha=Math.min(1,sc*2);
      cx.shadowColor='#ffb05a';cx.shadowBlur=10*sc;
      cx.font=`${Math.max(8,w*.78)}px sans-serif`;cx.textAlign='center';cx.textBaseline='bottom';
      cx.fillText('🚧',x,y+2);
      cx.strokeStyle=`rgba(255,180,90,${.35*sc+.15})`;cx.lineWidth=Math.max(1,2*sc);
      cx.strokeRect(x-w/2,y-h2,w,h2);
      cx.restore();
    }
    else if(e.type==='rock'){
      const r=Math.max(6,W*.1*sc*e.r/0.22);
      cx.save();cx.globalAlpha=Math.min(1,sc*2);
      cx.translate(x,y-r*.6);cx.rotate(e.ph+elapsed*e.spin);
      cx.shadowColor='rgba(255,140,80,.5)';cx.shadowBlur=10*sc;
      cx.font=`${r*1.7}px sans-serif`;cx.textAlign='center';cx.textBaseline='middle';
      cx.fillText('☄️',0,0);
      cx.restore();
    }
    else if(e.type==='black'){
      const w=W*.13*sc,h2=w*1.31;
      cx.save();cx.globalAlpha=Math.min(1,sc*2);
      cx.translate(x,y-h2*.4);cx.rotate(Math.sin(e.flap)*.13);
      /* バイク */
      cx.fillStyle='#191028';
      cx.beginPath();cx.ellipse(0,h2*.34,w*.62,h2*.13,0,0,TAU);cx.fill();
      cx.shadowColor='#a040ff';cx.shadowBlur=24*sc;
      if(blackCv)cx.drawImage(blackCv,-w/2,-h2/2,w,h2);
      else{cx.fillStyle='#0a0a14';cx.beginPath();cx.arc(0,0,w*.5,0,TAU);cx.fill();}
      /* 赤く光る目 */
      const ey=-h2*.06,pulse=.6+.4*Math.sin(elapsed*9);
      cx.shadowColor='#f33';cx.shadowBlur=10*sc*pulse;
      cx.fillStyle=`rgba(255,40,60,${.7+.3*pulse})`;
      cx.beginPath();cx.arc(-w*.155,ey,w*.05,0,TAU);cx.arc(w*.17,ey,w*.05,0,TAU);cx.fill();
      cx.restore();
    }
  }
  /* ─ プレイヤー(公式こっこちゃん×ホバーマシン) ─ */
  if(state==='play'||state==='over'){
    const sc0=1,pxs=roadX(px,0,sc0),pys=roadY(0,sc0)-6,
      pw=Math.min(W,H)*.17,ph2=pw*1.31,
      lean=(tpx-px)*1.6+px*.35+curAt(0)*.25;
    cx.save();cx.translate(pxs,pys-ph2*.42);cx.rotate(lean*.4);
    if(invuln>0&&(elapsed*14|0)%2)cx.globalAlpha=.35;
    /* ホバーマシン */
    const mg=cx.createLinearGradient(0,ph2*.18,0,ph2*.5);
    mg.addColorStop(0,fever>0?`hsl(${hue},80%,55%)`:'#3a2a6e');mg.addColorStop(1,'#140d2c');
    cx.shadowColor=boost>0?'#ffb05a':'#27e0ff';cx.shadowBlur=boost>0?30:16;
    cx.fillStyle=mg;
    cx.beginPath();cx.ellipse(0,ph2*.36,pw*.66,ph2*.15,0,0,TAU);cx.fill();
    cx.strokeStyle=boost>0?'rgba(255,190,110,.9)':'rgba(60,220,255,.8)';
    cx.lineWidth=2.5;cx.stroke();
    /* こっこちゃん */
    if(fever>0){cx.shadowColor=`hsl(${hue},95%,70%)`;cx.shadowBlur=34;}
    else{cx.shadowColor='rgba(255,170,220,.9)';cx.shadowBlur=20;}
    if(shield>0){
      cx.strokeStyle=`rgba(120,215,255,${.5+.3*Math.sin(elapsed*8)})`;cx.lineWidth=3;
      cx.beginPath();cx.arc(0,0,pw*.74,0,TAU);cx.stroke();
    }
    if(coccoReady)cx.drawImage(cocco,-pw/2,-ph2/2,pw,ph2);
    cx.restore();
    /* 噴射トレイル */
    if(state==='play'&&Math.random()<(boost>0?.95:.6)){
      const p=part();
      if(p){p.alive=true;p.x=pxs+rnd(-8,8);p.y=pys-2;
        p.vx=rnd(-30,30)-px*40;p.vy=rnd(120,260);p.t=0;p.dur=boost>0?.55:.4;
        p.size=boost>0?rnd(4,8):rnd(2,5);p.emoji=null;
        p.col=boost>0?'#ffb05a':fever>0?`hsl(${hue},95%,70%)`:'#27e0ff';}
    }
  }
  /* ─ スピードライン ─ */
  if(state==='play'&&(boost>0||kmh>255)){
    const n2=boost>0?14:7;
    cx.strokeStyle=boost>0?'rgba(255,200,130,.5)':'rgba(160,220,255,.35)';
    cx.lineWidth=2;
    for(let i=0;i<n2;i++){
      const a=Math.random()*TAU,r1=Math.min(W,H)*rnd(.32,.5),r2=r1+rnd(40,130);
      cx.beginPath();
      cx.moveTo(W/2+Math.cos(a)*r1,H/2+Math.sin(a)*r1);
      cx.lineTo(W/2+Math.cos(a)*r2,H/2+Math.sin(a)*r2);
      cx.stroke();
    }
  }
  /* ─ パーティクル ─ */
  for(const p of parts){
    if(!p.alive)continue;
    const k=1-p.t/p.dur;
    cx.globalAlpha=k;
    if(p.emoji){cx.font=`${p.size*3.2}px sans-serif`;cx.textAlign='center';cx.textBaseline='middle';
      cx.fillText(p.emoji,p.x,p.y);}
    else{cx.fillStyle=p.col;cx.beginPath();cx.arc(p.x,p.y,p.size*k,0,TAU);cx.fill();}
  }
  cx.globalAlpha=1;
  /* ─ 救出セレブレーション(子どもがはしゃぐやつ) ─ */
  if(cele>0){
    const k=cele/1.8,bounce=1+.18*Math.sin((1.8-cele)*14);
    cx.save();
    const cg=cx.createRadialGradient(W/2,H*.42,0,W/2,H*.42,Math.max(W,H)*.6);
    cg.addColorStop(0,`rgba(255,225,140,${.34*k})`);cg.addColorStop(1,'rgba(255,225,140,0)');
    cx.fillStyle=cg;cx.fillRect(0,0,W,H);
    /* 放射光線 */
    cx.translate(W/2,H*.42);cx.rotate(elapsed*1.2);
    cx.fillStyle=`rgba(255,235,170,${.2*k})`;
    for(let i=0;i<10;i++){cx.rotate(TAU/10);
      cx.beginPath();cx.moveTo(0,0);cx.lineTo(Math.max(W,H),-44);cx.lineTo(Math.max(W,H),44);cx.closePath();cx.fill();}
    cx.rotate(-elapsed*1.2);
    /* 救出されたこっこちゃんがくるくる */
    const cw=Math.min(W,H)*.3*bounce;
    cx.rotate(Math.sin((1.8-cele)*9)*.25);
    cx.shadowColor='#ffd76e';cx.shadowBlur=40;
    if(coccoReady)cx.drawImage(cocco,-cw/2,-cw*.655,cw,cw*1.31);
    cx.rotate(-Math.sin((1.8-cele)*9)*.25);
    cx.font=`${Math.min(W,H)*.07}px sans-serif`;cx.textAlign='center';cx.textBaseline='middle';
    for(let i=0;i<8;i++){const a=elapsed*2+i*TAU/8,rr=cw*.85;
      cx.fillText(i%2?'💖':'⭐',Math.cos(a)*rr,Math.sin(a)*rr);}
    cx.restore();
  }
  cx.restore();
  /* フラッシュ */
  if(flash>0){cx.fillStyle=`rgba(${flashCol},${flash*.4})`;cx.fillRect(0,0,W,H);}
  /* ───── HUD ───── */
  if(state==='play'){
    const top=48;
    cx.textBaseline='middle';
    /* ❤️HP */
    cx.font='20px sans-serif';cx.textAlign='left';
    cx.fillText('❤️'.repeat(hp)+'🖤'.repeat(Math.max(0,3-hp)),12,top+18);
    /* スコア */
    cx.textAlign='right';cx.font='bold 22px sans-serif';
    cx.fillStyle='#fff';cx.shadowColor='#ff8ac2';cx.shadowBlur=10;
    cx.fillText(score.toLocaleString(),W-12,top+16);
    cx.shadowBlur=0;
    if(combo>1){cx.font='bold 14px sans-serif';cx.fillStyle='#ffd76e';
      cx.fillText(combo+' COMBO',W-12,top+38);}
    /* ⏰タイムバー */
    const bw=Math.min(W*.46,250),bx=W/2-bw/2,by=top+4;
    cx.fillStyle='rgba(255,255,255,.14)';
    cx.beginPath();cx.roundRect(bx,by,bw,10,5);cx.fill();
    const tk=timeLeft/65,
      tg=cx.createLinearGradient(bx,0,bx+bw,0);
    tg.addColorStop(0,timeLeft<10?'#ff5a5a':'#ffd76e');tg.addColorStop(1,timeLeft<10?'#ffb05a':'#ff8ac2');
    cx.fillStyle=tg;
    cx.beginPath();cx.roundRect(bx,by,Math.max(2,bw*Math.min(1,tk)),10,5);cx.fill();
    cx.font='bold 15px sans-serif';cx.textAlign='center';
    cx.fillStyle=timeLeft<10?'#ff7a6a':'#fde';
    cx.fillText('⏰'+Math.ceil(timeLeft)+'s',W/2,by+26);
    /* 🐣ギャップメーター(追跡バー) */
    const gk=1-Math.min(1,gap/600);
    cx.fillStyle='rgba(255,255,255,.14)';
    cx.beginPath();cx.roundRect(bx,by+40,bw,8,4);cx.fill();
    const gg=cx.createLinearGradient(bx,0,bx+bw,0);
    gg.addColorStop(0,'#7ad7ff');gg.addColorStop(1,'#ffd76e');
    cx.fillStyle=gg;
    cx.beginPath();cx.roundRect(bx,by+40,Math.max(2,bw*gk),8,4);cx.fill();
    cx.font='15px sans-serif';
    cx.fillText('🐣',bx+Math.max(8,bw*gk),by+44);
    cx.font='bold 13px sans-serif';
    cx.fillStyle=gap<60?'#ffd76e':'#fcd';
    cx.fillText(cele>0?'🎉 RESCUE!! 🎉':'こっこちゃんまで あと '+Math.ceil(gap)+'m',W/2,by+62);
    /* 速度+救出数 */
    cx.font='bold 15px sans-serif';cx.textAlign='left';
    cx.fillStyle=boost>0?'#ffb05a':'#9fe8ff';
    cx.fillText('🏍 '+Math.round(kmh)+'km/h'+(boost>0?' 🚀':''),12,H-38);
    cx.textAlign='right';cx.fillStyle='#ffd76e';
    cx.fillText('🐣救出 ×'+rescued,W-12,H-38);
    /* フィーバー/シールド表示 */
    if(fever>0){cx.font='bold 18px sans-serif';cx.textAlign='center';
      cx.fillStyle=`hsl(${hue},95%,75%)`;cx.shadowColor=`hsl(${hue},95%,70%)`;cx.shadowBlur=12;
      cx.fillText('🌈 FEVER ×2  '+fever.toFixed(0)+'s 🌈',W/2,H-(H*.12));cx.shadowBlur=0;}
    else if(shield>0){cx.font='bold 15px sans-serif';cx.textAlign='center';cx.fillStyle='#7ad7ff';
      cx.fillText('🛡️ '+shield.toFixed(0)+'s',W/2,H-(H*.12));}
    /* 操作モード */
    cx.font='12px sans-serif';cx.fillStyle='rgba(255,220,245,.55)';cx.textAlign='left';
    cx.fillText(gyroSeen?'🎮 ジャイロ操作中(前にかたむけて加速)':'👆 タッチ操作中(上になぞって加速)',12,H-14);
  }
  /* テキストポップ */
  for(const p of pops){
    if(!p.alive)continue;
    const k=p.t/p.dur;
    cx.globalAlpha=k<.15?k/.15:1-Math.max(0,(k-.6)/.4);
    cx.font=`bold ${p.size}px sans-serif`;cx.textAlign='center';cx.textBaseline='middle';
    cx.shadowColor=p.col;cx.shadowBlur=12;
    cx.fillStyle=p.col;cx.fillText(p.text,p.x,p.y-k*46);
    cx.shadowBlur=0;
  }
  cx.globalAlpha=1;
}

function tick(t){
  const dtMs=last?t-last:16;last=t;
  perfSample(dtMs);
  const dt=Math.min(.05,dtMs/1000);
  if(state==='play'){update(dt);schedBGM();}
  else{
    /* メニュー/リザルト中もパーティクルだけ進める */
    for(const p of parts){if(!p.alive)continue;p.t+=dt;
      if(p.t>=p.dur){p.alive=false;continue;}
      p.x+=p.vx*dt;p.y+=p.vy*dt;p.vy+=340*dt;}
    for(const p of pops){if(!p.alive)continue;p.t+=dt;if(p.t>=p.dur)p.alive=false;}
    zAbs+=300*dt;
    hue=(hue+dt*14)%360;
  }
  draw();
  requestAnimationFrame(tick);
}
requestAnimationFrame(tick);

/* ───────── UI 配線 ───────── */
const startOv=document.getElementById('startOv'),endOv=document.getElementById('endOv'),
  bestRow=document.getElementById('bestRow'),recalBtn=document.getElementById('recalBtn');
if(best>0)bestRow.textContent='ベスト '+best.toLocaleString()+' ／ 🐣最多救出 '+bestResc+'羽';

async function startGame(){
  audio();sfxStart();
  if(!gyroOn)gyroOn=await enableGyro();
  reset();
  startOv.classList.add('hidden');endOv.classList.add('hidden');
  recalBtn.classList.remove('hidden');
  state='play';
}
document.getElementById('startBtn').addEventListener('click',startGame);
document.getElementById('retryBtn').addEventListener('click',startGame);
recalBtn.addEventListener('click',()=>{needCal=true;tpx=0;tlean=0;vib(15);});

document.getElementById('muteBtn').addEventListener('click',function(){
  muted=!muted;this.textContent=muted?'🔇':'🔊';
  if(!muted){audio();bgmNext=AC.currentTime+.1;}
});
document.getElementById('shareBtn').addEventListener('click',()=>{
  const text=`こっこSOS大救出で ${score.toLocaleString()} 点！こっこちゃんを${rescued}羽救出🐣🚀 #畜物語 #こっこSOS`;
  const url='https://chikumo.jp/sos/';
  if(navigator.share){navigator.share({text,url}).catch(()=>{});}
  else open('https://twitter.com/intent/tweet?text='+encodeURIComponent(text)+'&url='+encodeURIComponent(url),'_blank');
});
document.addEventListener('visibilitychange',()=>{
  if(document.hidden&&AC)AC.suspend();
  else if(AC&&!muted)AC.resume();
});

/* ─ ヘッドレステスト用フック ─ */
window.__sos={
  ents,parts,pops,CLEAR_RATE,
  spawnBlock,spawnRock,spawnBlack,spawnItems,
  update,crash,nearMiss,startFever,startBoost,doRescue,reset,startGame,
  get:()=>({state,score,best,combo,maxCombo,hp,timeLeft,fever,shield,invuln,
    boost,gap,kmh,rescued,scoreMult,px,elapsed,cele,distKm}),
  set:o=>{for(const k of Object.keys(o)){const v=o[k];
    if(k==='state')state=v;else if(k==='score')score=v;else if(k==='combo')combo=v;
    else if(k==='hp')hp=v;else if(k==='timeLeft')timeLeft=v;else if(k==='fever')fever=v;
    else if(k==='shield')shield=v;else if(k==='invuln')invuln=v;else if(k==='px')px=v;
    else if(k==='tpx')tpx=v;else if(k==='tlean')tlean=v;else if(k==='gap')gap=v;
    else if(k==='kmh')kmh=v;else if(k==='boost')boost=v;else if(k==='rescued')rescued=v;
    else if(k==='elapsed')elapsed=v;else if(k==='scoreMult')scoreMult=v;else if(k==='cele')cele=v;}},
  noSpawn:()=>{blockT=rockT=itemT=blackT=1e9;}
};
</script>
