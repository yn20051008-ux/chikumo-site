<canvas id="game"></canvas>

<script>
"use strict";
/* ════════════════════════════════════════════════════════════
   こっこヒーロー — COCCO HERO
   加速度センサー操作 × Z軸(奥行き)レスキューフライト
   スマホを押し出してロケットダッシュ → 鉄かごを破壊してヒナ救出
   クリアできる要素 76.6% / クリアできない要素 23.4%
   ════════════════════════════════════════════════════════════ */
const TAU=Math.PI*2;
const CLEAR_RATE=0.766;            /* 76.6% フェアなかご / 23.4% 鬼かご */
const fair=()=>Math.random()<CLEAR_RATE;
let lastFair=true;

/* ───────── 公式こっこちゃんSVG ───────── */
let blackCv=null;
const cocco=new Image();let coccoReady=false;
cocco.onload=()=>{coccoReady=true;makeBlack();};
cocco.src='/chikumo.svg';
/* ブラックこっこちゃん: 公式SVGをシルエット化 */
function makeBlack(){
  const c=document.createElement('canvas');c.width=120;c.height=157;
  const g=c.getContext('2d');
  g.drawImage(cocco,0,0,120,157);
  g.globalCompositeOperation='source-in';
  g.fillStyle='#0a0a14';g.fillRect(0,0,120,157);
  blackCv=c;
}

/* ───────── キャンバス / 動的解像度スロットリング ───────── */
if(!CanvasRenderingContext2D.prototype.roundRect)
  CanvasRenderingContext2D.prototype.roundRect=function(x,y,w,h){this.rect(x,y,w,h);return this;};
const cv=document.getElementById('game'),cx=cv.getContext('2d');
let W=0,H=0,DPR=1,renderScale=1;
function resize(){
  DPR=Math.min(devicePixelRatio||1,2)*renderScale;
  W=innerWidth;H=innerHeight;
  cv.width=Math.max(1,Math.round(W*DPR));cv.height=Math.max(1,Math.round(H*DPR));
  cv.style.width=W+'px';cv.style.height=H+'px';
  cx.setTransform(DPR,0,0,DPR,0,0);
}
addEventListener('resize',resize);resize();
/* コンテキストロス・フォールバック */
cv.addEventListener('contextlost',e=>e.preventDefault());
cv.addEventListener('contextrestored',()=>resize());
let perfAcc=0,perfN=0;
function perfSample(dtMs){
  perfAcc+=dtMs;perfN++;
  if(perfN>=70){
    const avg=perfAcc/perfN;perfAcc=0;perfN=0;
    if(avg>24&&renderScale>0.55){renderScale=Math.max(0.55,renderScale-0.15);resize();}
    else if(avg<14.5&&renderScale<1){renderScale=Math.min(1,renderScale+0.15);resize();}
  }
}

function vib(p){try{if(navigator.vibrate)navigator.vibrate(p);}catch(e){}}
const clamp1=v=>Math.max(-1,Math.min(1,v));

/* ───────── プロシージャル・オーディオ ───────── */
let AC=null,muted=false,ECHO=null,echoWet=null;
const MASTER=0.5;
const BPM=140,STEP16=60/BPM/4;
function audio(){
  if(!AC){
    AC=new (window.AudioContext||window.webkitAudioContext)();
    ECHO=AC.createDelay(1);ECHO.delayTime.value=60/BPM/2; /* 操作のリズムに合うBPM同期エコー */
    const fb=AC.createGain();fb.gain.value=.3;
    echoWet=AC.createGain();echoWet.gain.value=.4;
    ECHO.connect(fb);fb.connect(ECHO);ECHO.connect(echoWet);echoWet.connect(AC.destination);
  }
  if(AC.state==='suspended')AC.resume();
  return AC;
}
function tone(f,t0,dur,type,vol,slide,echo){
  const a=audio(),o=a.createOscillator(),g=a.createGain();
  o.type=type;o.frequency.setValueAtTime(Math.max(20,f),t0);
  if(slide)o.frequency.exponentialRampToValueAtTime(Math.max(20,slide),t0+dur);
  g.gain.setValueAtTime(vol*MASTER,t0);g.gain.exponentialRampToValueAtTime(.0001,t0+dur);
  o.connect(g).connect(a.destination);if(echo&&ECHO)g.connect(ECHO);
  o.start(t0);o.stop(t0+dur+.03);
}
function noise(t0,dur,vol,hp){
  const a=audio(),n=a.createBufferSource(),
    buf=a.createBuffer(1,Math.max(1,(a.sampleRate*dur)|0),a.sampleRate),
    d=buf.getChannelData(0);
  for(let i=0;i<d.length;i++)d[i]=(Math.random()*2-1)*(1-i/d.length);
  n.buffer=buf;
  const g=a.createGain();g.gain.value=vol*MASTER;
  if(hp){const f=a.createBiquadFilter();f.type='highpass';f.frequency.value=hp;n.connect(f).connect(g);}
  else n.connect(g);
  g.connect(a.destination);n.start(t0);
}
/* ─ 効果音(操作リズムに合うキメ) ─ */
function sfxDash(){if(muted)return;const t=audio().currentTime;
  tone(170,t,.3,'sawtooth',.17,760,1);tone(340,t+.04,.26,'square',.1,1320,1);noise(t,.22,.13,700);}
function sfxRescue(){if(muted)return;const t=audio().currentTime;
  [523,659,784,1047].forEach((f,i)=>tone(f,t+i*.06,.18,'square',.14,0,1));
  tone(2093,t+.26,.34,'triangle',.16,0,1);
  [1800,2200,2600].forEach((f,i)=>tone(f,t+.3+i*.07,.08,'triangle',.1,f*1.3)); /* ヒナのさえずり */
  noise(t+.26,.1,.07,4000);}
function sfxChirp(){if(muted)return;const t=audio().currentTime;tone(2000,t,.06,'triangle',.06,2600);}
function sfxLocked(){if(muted)return;const t=audio().currentTime;
  tone(220,t,.1,'square',.13);tone(196,t+.09,.16,'square',.12,150);noise(t,.05,.06,2500);}
function sfxItem(){if(muted)return;const t=audio().currentTime;tone(1318,t,.07,'square',.1);tone(1760,t+.05,.13,'square',.1,0,1);}
function sfxHeart(){if(muted)return;const t=audio().currentTime;[660,880,1100].forEach((f,i)=>tone(f,t+i*.07,.14,'triangle',.13,0,1));}
function sfxClock(){if(muted)return;const t=audio().currentTime;tone(1568,t,.06,'square',.12);tone(1568,t+.1,.06,'square',.1);tone(2093,t+.2,.16,'triangle',.13,0,1);}
function sfxShield(){if(muted)return;const t=audio().currentTime;tone(392,t,.3,'triangle',.13,784,1);noise(t,.1,.04,2000);}
function sfxBattery(){if(muted)return;const t=audio().currentTime;tone(440,t,.1,'square',.11,880);tone(880,t+.09,.18,'square',.12,1760,1);}
function sfxMagnet(){if(muted)return;const t=audio().currentTime;tone(523,t,.22,'sine',.13,1047,1);tone(784,t+.08,.2,'triangle',.1,1568);}
function sfxHit(){if(muted)return;const t=audio().currentTime;
  tone(196,t,.3,'sawtooth',.17,65);tone(98,t,.36,'square',.13,49);noise(t,.26,.13);}
function sfxBlackDown(){if(muted)return;const t=audio().currentTime;
  noise(t,.16,.1,1000);tone(330,t,.18,'square',.13,1320,1);tone(165,t,.22,'sawtooth',.1,660);}
function sfxFever(){if(muted)return;const t=audio().currentTime;
  [523,659,784,1047,1319,1568,2093].forEach((f,i)=>tone(f,t+i*.05,.2,'square',.12,0,1));}
function sfxTick(){if(muted)return;const t=audio().currentTime;tone(880,t,.07,'square',.13);}
function sfxOver(){if(muted)return;const t=audio().currentTime;
  [392,330,262,196].forEach((f,i)=>tone(f,t+i*.16,.3,'triangle',.14));noise(t+.6,.4,.08);}
function sfxStart(){if(muted)return;const t=audio().currentTime;
  [262,330,392,523,659].forEach((f,i)=>tone(f,t+i*.06,.18,'square',.12,0,1));}

/* ─ ジェネレーティブ・ミュージック (140BPM ヒーロー系・脳内ループ) ─ */
const PROG=[[60,64,67],[55,59,62],[57,60,64],[53,57,60]];   /* C G Am F */
/* 固定フックメロディ(2小節)＝サビが脳内ループする仕掛け。nullは休符 */
const HOOK_A=[0,null,4,null,7,null,4,7,12,null,7,null,4,null,7,null];
const HOOK_B=[0,null,4,null,7,9,7,null,4,null,2,4,0,null,null,null];
let bgmStep=0,bgmNext=0;
const mf=m=>440*Math.pow(2,(m-69)/12);
function kick(t){tone(150,t,.12,'sine',.3,40);}
function snare(t){noise(t,.11,.12,1500);tone(196,t,.06,'triangle',.06);}
function hat(t,v){noise(t,.03,v,6000);}
function bass(f,t){tone(f,t,STEP16*1.7,'sawtooth',.12);tone(f,t,STEP16*1.7,'square',.05);}
function lead(f,t,d){tone(f,t,d,'square',.09,0,1);}
function pad(ch,t){ch.forEach(m=>tone(mf(m),t,STEP16*14,'sine',.028));}
function schedBGM(){
  if(muted||!AC||state!=='play')return;
  const now=AC.currentTime;
  if(bgmNext<now-0.3)bgmNext=now;       /* タブ復帰時の追いつき防止 */
  while(bgmNext<now+0.15){
    const s=bgmStep,t=Math.max(bgmNext,now),
      bar=(s>>4)%4,st=s&15,ch=PROG[bar];
    if(st%4===0)kick(t);
    if(st===4||st===12)snare(t);
    if(st%2===0)hat(t,st%4===2?.05:.026);
    if(fever>0&&st%2===1)hat(t,.04);                       /* フィーバーで倍テン */
    if(st===0||st===3||st===6||st===8||st===11||st===14)
      bass(mf(ch[0]-24+(st===6||st===14?12:0)),t);
    const hook=(bar%2===0?HOOK_A:HOOK_B)[st];
    if(hook!=null)lead(mf(ch[0]+12+hook+(fever>0?12:0)),t,STEP16*1.9);
    if(st===0)pad(ch,t);
    bgmStep++;bgmNext+=STEP16;
  }
}

/* ───────── 入力: 加速度センサー + タッチ/キーボードフォールバック ───────── */
let motionOn=false,motionSeen=false,needCal=true,haveG=false,
  fgx=0,fgy=0,cgx=0,cgy=0,tpx=0,tpy=0;
function oriAngle(){
  try{
    if(typeof screen!=='undefined'&&screen.orientation)return screen.orientation.angle||0;
    return window.orientation||0;
  }catch(e){return 0;}
}
function onMotion(e){
  const g=e.accelerationIncludingGravity;
  if(g&&g.x!=null){
    motionSeen=true;
    if(!haveG){fgx=g.x;fgy=g.y;haveG=true;}
    else{fgx+=(g.x-fgx)*.25;fgy+=(g.y-fgy)*.25;}   /* ローパスで手ブレ除去 */
    if(needCal){cgx=fgx;cgy=fgy;needCal=false;}
    const ax=fgx-cgx,ay=fgy-cgy,ang=oriAngle();
    let rx,ry;
    if(ang===90){rx=ay;ry=ax;}
    else if(ang===-90||ang===270){rx=-ay;ry=-ax;}
    else if(ang===180){rx=ax;ry=-ay;}
    else{rx=-ax;ry=ay;}
    tpx=clamp1(rx/3.4);tpy=clamp1(ry/3.4);
  }
  /* Z軸(奥行き)に押し出す/ふる → ロケットダッシュ */
  const a=e.acceleration;
  if(a&&a.z!=null){
    const m=Math.hypot(a.x||0,a.y||0,a.z||0);
    if((Math.abs(a.z)>7.5||m>12)&&state==='play')tryDash();
  }
}
async function enableMotion(){
  try{
    if(!window.DeviceMotionEvent)return false;
    if(typeof DeviceMotionEvent.requestPermission==='function'){
      const r=await DeviceMotionEvent.requestPermission();
      if(r!=='granted')return false;
    }
    addEventListener('devicemotion',onMotion);
    return true;
  }catch(e){return false;}
}
/* タッチ/マウス: なぞって操縦、ダブルタップでダッシュ */
let dragId=null,dragX=0,dragY=0,lastTap=0;
cv.addEventListener('pointerdown',e=>{
  dragId=e.pointerId;dragX=e.clientX;dragY=e.clientY;
  const now=Date.now();
  if(now-lastTap<300)tryDash();
  lastTap=now;
});
cv.addEventListener('pointermove',e=>{
  if(e.pointerId!==dragId)return;
  const R=Math.min(W,H)*.4;
  tpx=clamp1(tpx+(e.clientX-dragX)/(R*.9));
  tpy=clamp1(tpy+(e.clientY-dragY)/(R*.9));
  dragX=e.clientX;dragY=e.clientY;
});
addEventListener('pointerup',()=>{dragId=null;});
addEventListener('pointercancel',()=>{dragId=null;});
addEventListener('keydown',e=>{
  if(e.key==='ArrowLeft')tpx=clamp1(tpx-.25);
  else if(e.key==='ArrowRight')tpx=clamp1(tpx+.25);
  else if(e.key==='ArrowUp')tpy=clamp1(tpy-.25);
  else if(e.key==='ArrowDown')tpy=clamp1(tpy+.25);
  else if(e.key===' ')tryDash();
});

/* ───────── ゲーム状態 ───────── */
let state='menu';
let score=0,best=+(localStorage.getItem('heroBest')||0),
  bestRescue=+(localStorage.getItem('heroRescueBest')||0),
  combo=0,maxCombo=0,hp=3,timeLeft=60,elapsed=0,
  fever=0,shield=0,magnet=0,invuln=0,distKm=0,
  rescued=0,rescueStreak=0,scoreMult=1,
  energy=100,dashT=0,slowT=0,
  px=0,py=0,shake=0,flash=0,flashCol='255,60,60',hue=18,lastTick=99,gscroll=0;
const ENERGY_MAX=100,DASH_COST=45,DASH_DUR=0.55,ENERGY_REGEN=14;

/* ───────── オブジェクト・プーリング ───────── */
const ZSPAWN=2400,FOCAL=460,PLAYER_R=0.10;
const ents=[];        /* {alive,type,z,...} */
function ent(){for(const e of ents)if(!e.alive)return e;const e={alive:false};ents.push(e);return e;}
const parts=[];       /* パーティクル */
function part(){for(const p of parts)if(!p.alive)return p;if(parts.length>340)return null;const p={alive:false};parts.push(p);return p;}
const pops=[];        /* テキストポップ */
function pop(){for(const p of pops)if(!p.alive)return p;const p={alive:false};pops.push(p);return p;}
const stars=[];       /* 風の流線(Z軸スピード感) */
for(let i=0;i<110;i++)stars.push({a:Math.random()*TAU,r:.15+Math.random()*1,z:Math.random()*ZSPAWN});
const rings=[];       /* 救出ショックウェーブ */
const trail=[];       /* 救出したヒナの隊列 */
const hist=[];        /* プレイヤー軌跡(隊列追従用) */
const ghosts=[];      /* ダッシュ残像 */

function burst(x,y,n,cols,emoji){
  for(let i=0;i<n;i++){
    const p=part();if(!p)break;
    const a=Math.random()*TAU,v=60+Math.random()*340;
    p.alive=true;p.x=x;p.y=y;p.vx=Math.cos(a)*v;p.vy=Math.sin(a)*v-60;
    p.t=0;p.dur=.5+Math.random()*.8;p.size=3+Math.random()*7;
    p.emoji=(emoji&&Math.random()<.4)?emoji[(Math.random()*emoji.length)|0]:null;
    p.col=cols[(Math.random()*cols.length)|0];
  }
}
function popup(x,y,text,col,size){
  const p=pop();p.alive=true;p.x=x;p.y=y;p.t=0;p.dur=.9;
  p.text=text;p.col=col||'#fff';p.size=size||22;
}
function shock(x,y){rings.push({x,y,t:0,dur:.8});if(rings.length>6)rings.shift();}

/* ───────── スポーン (76.6% / 23.4%) ───────── */
let cageT=2.5,itemT=1.5,blackT=7,cloudT=3.2;
function rnd(a,b){return a+Math.random()*(b-a);}
function spawnCage(){
  const f=fair();lastFair=f;
  const e=ent();e.alive=true;e.type='cage';e.z=ZSPAWN;e.done=false;e.rattle=false;
  e.ph=Math.random()*TAU;
  if(f){ /* フェア: 木かご・手の届く所・護衛なし */
    e.iron=false;e.nx=rnd(-.4,.4);e.ny=rnd(-.35,.35);e.drift=0;
  }else{ /* 鬼: 🔒鉄かご・ドリフト・ブラックこっこの護衛つき */
    e.iron=true;e.nx=rnd(-.55,.55);e.ny=rnd(-.45,.45);
    e.drift=rnd(.2,.42)*(Math.random()<.5?-1:1);
    const n=1+(Math.random()<.5?1:0);
    for(let i=0;i<n;i++){
      const g=ent();g.alive=true;g.type='black';g.mode='guard';g.tgt=e;g.done=false;
      g.z=ZSPAWN;g.orb=Math.random()*TAU;g.flap=Math.random()*TAU;
      g.nx=e.nx;g.ny=e.ny;g.home=0;
    }
  }
  return e;
}
function spawnBlack(){
  const f=fair(),n=f?1:2;
  for(let i=0;i<n;i++){
    const e=ent();e.alive=true;e.type='black';e.mode='swoop';e.tgt=null;e.done=false;
    e.z=ZSPAWN+i*420;
    const a=Math.random()*TAU;
    e.nx=Math.cos(a)*.6;e.ny=Math.sin(a)*.6;
    e.home=f?.16:.34;
    e.flap=Math.random()*TAU;
  }
}
function spawnCloud(){
  const f=fair(),n=f?1:3,base=Math.random()*TAU;
  for(let i=0;i<n;i++){
    const e=ent();e.alive=true;e.type='cloud';e.done=false;
    e.z=ZSPAWN+i*200;
    const a=base+i*2.1;
    e.nx=Math.cos(a)*rnd(.2,.6);e.ny=Math.sin(a)*rnd(.2,.55);
    e.r=f?.2:.26;e.ph=Math.random()*TAU;e.bolt=0;
  }
}
function dropItem(nx,ny,kind){
  const EMOJI={star:'⭐',gem:'💎',heart:'❤️',clock:'⏰',shield:'🛡️',battery:'🔋',magnet:'🧲',rainbow:'🌈'};
  const e=ent();e.alive=true;e.type='item';e.done=false;
  e.z=ZSPAWN;e.nx=nx;e.ny=ny;e.kind=kind;e.emoji=EMOJI[kind];
  return e;
}
function spawnItems(){
  const pick=Math.random();
  if(pick<.42){ /* ⭐の列 */
    const a=Math.random()*TAU,r=rnd(.1,.55);
    for(let i=0;i<3;i++){
      const e=dropItem(Math.cos(a)*r,Math.sin(a)*r,'star');
      e.z=ZSPAWN+i*260;
    }
  }else{
    const nx=rnd(-.55,.55),ny=rnd(-.55,.55);
    if(pick<.56)dropItem(nx,ny,'gem');
    else if(pick<.66)dropItem(nx,ny,'clock');
    else if(pick<.74)dropItem(nx,ny,'heart');
    else if(pick<.84)dropItem(nx,ny,'battery');
    else if(pick<.92)dropItem(nx,ny,'magnet');
    else if(pick<.97)dropItem(nx,ny,'shield');
    else dropItem(nx,ny,'rainbow');
  }
}

/* ───────── ダッシュ / 判定・ダメージ ───────── */
function tryDash(){
  if(state!=='play'||dashT>0||energy<DASH_COST)return false;
  dashT=DASH_DUR;energy-=DASH_COST;
  sfxDash();vib(20);shake=Math.max(shake,8);
  shock(W/2+px*.45*Math.min(W,H)*.4,H/2+py*.45*Math.min(W,H)*.4);
  popup(W/2,H*.62,'🚀 ダッシュ！','#ffb46e',22);
  return true;
}
function damage(){
  if(invuln>0||fever>0||dashT>0)return;
  if(shield>0){shield=0;flash=.5;flashCol='120,220,255';sfxShield();popup(W/2,H*.4,'🛡️シールド！','#7ad7ff',26);return;}
  hp--;combo=0;rescueStreak=0;invuln=1.3;shake=22;flash=.7;flashCol='255,60,60';
  sfxHit();vib([60,40,80]);
  burst(W/2,H*.62,26,['#ff5a5a','#ffb05a','#fff'],['💥','😵']);

}
function addScore(n){score+=Math.round(n*scoreMult);}
function startFever(){
  if(fever>0){fever=8;return;}
  fever=8;scoreMult=2;flash=.5;flashCol='255,210,120';
  sfxFever();vib([30,30,30,30,60]);

  burst(W/2,H/2,60,['#ff8ac2','#ffd76e','#7ad7ff','#b08bff'],['🌈','✨','🎉','💖']);
}
function killGuards(c){
  for(const e of ents)
    if(e.alive&&e.type==='black'&&e.tgt===c){
      e.alive=false;
      burst(W/2,H*.45,10,['#b08bff','#555','#fff'],['💨','💫']);
    }
}
function rescue(e){
  rescued++;rescueStreak++;combo+=2;
  const pts=(e&&e.iron?1200:800)+rescueStreak*100;
  addScore(pts);
  timeLeft=Math.min(99,timeLeft+5);
  slowT=.8;                                  /* 救出スローモーション */
  trail.push({jump:1,ph:Math.random()*TAU}); /* 隊列にヒナ追加 */
  flash=.5;flashCol='255,215,120';
  sfxRescue();vib([20,30,20,30,60]);
  shock(W/2,H*.5);
  popup(W/2,H*.34,'🐣 たすけたー！ +'+Math.round(pts*scoreMult)+'　⏰+5s','#ffd76e',28);
  burst(W/2,H*.5,44,['#ffd76e','#ff8ac2','#7ad7ff','#fff'],['🐣','🎉','💖','✨','🌈']);
}

function judge(e){
  const dx=e.nx-px,dy=e.ny-py;
  if(e.type==='cage'){
    if(Math.hypot(dx,dy)<PLAYER_R+.2){
      if(e.iron&&!(dashT>0||fever>0)){
        if(!e.rattle){e.rattle=true;combo=0;
          sfxLocked();vib(30);shake=Math.max(shake,8);
          popup(W/2,H*.42,'🔒 鉄かごだ！ダッシュでこわして！','#ffb46e',22);}
      }else{
        e.alive=false;killGuards(e);rescue(e);
      }
    }
  }
  else if(e.type==='item'){
    if(Math.hypot(dx,dy)<PLAYER_R+.16){
      const sx=W/2,sy=H*.55;
      if(e.kind==='star'){addScore(150);combo++;sfxItem();popup(sx,sy,'⭐+'+Math.round(150*scoreMult),'#ffe28a',20);}
      else if(e.kind==='gem'){addScore(500);combo++;sfxItem();popup(sx,sy,'💎+'+Math.round(500*scoreMult),'#8ad7ff',24);burst(sx,sy,14,['#8ad7ff','#fff'],['💎','✨']);}
      else if(e.kind==='heart'){if(hp<3){hp++;popup(sx,sy,'❤️かいふく！','#ff8ac2',24);}else{addScore(300);popup(sx,sy,'❤️+'+Math.round(300*scoreMult),'#ff8ac2',20);}sfxHeart();burst(sx,sy,14,['#ff8ac2','#fff'],['❤️','💖']);}
      else if(e.kind==='clock'){timeLeft=Math.min(99,timeLeft+4);sfxClock();popup(sx,sy,'⏰+4秒！','#9fe8a0',24);burst(sx,sy,12,['#9fe8a0','#fff'],['⏰','✨']);}
      else if(e.kind==='battery'){energy=ENERGY_MAX;combo++;sfxBattery();popup(sx,sy,'🔋フルチャージ！','#ffe28a',24);burst(sx,sy,12,['#ffe28a','#fff'],['🔋','⚡']);}
      else if(e.kind==='magnet'){magnet=8;combo++;sfxMagnet();popup(sx,sy,'🧲マグネット 8秒','#d0a0ff',24);}
      else if(e.kind==='shield'){shield=8;sfxShield();popup(sx,sy,'🛡️シールド 8秒','#7ad7ff',24);}
      else if(e.kind==='rainbow'){startFever();}
      vib(12);e.alive=false;
    }
  }
  else if(e.type==='black'){
    if(Math.hypot(dx,dy)<PLAYER_R+.15){
      if(dashT>0||fever>0||shield>0){
        addScore(400);combo++;sfxBlackDown();vib(25);
        popup(W/2,H*.5,'ブラックこっこ撃破！+'+Math.round(400*scoreMult),'#b08bff',24);
        burst(W/2,H*.55,22,['#b08bff','#444','#fff'],['💫','⚡']);
        if(shield>0&&fever<=0&&dashT<=0)shield=Math.max(0,shield-2);
      }else{damage();}
      e.alive=false;
    }
  }
  else if(e.type==='cloud'){
    if(Math.hypot(dx,dy)<PLAYER_R+e.r*.85){
      if(dashT>0||fever>0){
        addScore(100);sfxItem();
        popup(W/2,H*.55,'☁️雲ちらし +'+Math.round(100*scoreMult),'#cdf',20);
        burst(W/2,H*.55,16,['#cdf','#fff','#ffd76e'],['☁️','💨','⚡']);
      }else{
        damage();
        burst(W/2,H*.6,14,['#cdf','#889','#ffd76e'],['⚡','💥']);
      }
      e.alive=false;
    }
  }
}

/* ───────── メインループ ───────── */
let last=0,spd=950;
function gameOver(reason){
  state='over';sfxOver();vib([80,60,120]);
  if(score>best){best=score;localStorage.setItem('heroBest',best);}
  if(rescued>bestRescue){bestRescue=rescued;localStorage.setItem('heroRescueBest',bestRescue);}
  document.getElementById('endReason').textContent=
    reason==='time'?'⏰ タイムアップ！':'💔 HPがなくなった…';
  document.getElementById('endScore').textContent=score.toLocaleString();
  document.getElementById('endRescued').textContent='🐣 たすけたヒナ '+rescued+'匹（じこベスト'+bestRescue+'匹）';
  document.getElementById('endBest').textContent='ベスト '+best.toLocaleString();
  document.getElementById('endCombo').textContent='最大コンボ '+maxCombo+' ／ 飛行 '+distKm.toFixed(1)+'km';
  document.getElementById('endOv').classList.remove('hidden');
  document.getElementById('recalBtn').classList.add('hidden');
  document.getElementById('dashBtn').classList.add('hidden');
  burst(W/2,H/2,50,['#ffd76e','#ff8ac2','#7ad7ff','#b08bff'],['🎉','✨','🐣']);
}
function reset(){
  score=0;combo=0;maxCombo=0;hp=3;timeLeft=60;elapsed=0;fever=0;shield=0;magnet=0;invuln=0;
  distKm=0;rescued=0;rescueStreak=0;scoreMult=1;px=0;py=0;tpx=0;tpy=0;
  energy=ENERGY_MAX;dashT=0;slowT=0;
  shake=0;flash=0;lastTick=99;spd=950;gscroll=0;
  cageT=2.2;itemT=1.6;blackT=7;cloudT=3.2;
  for(const e of ents)e.alive=false;
  for(const p of parts)p.alive=false;
  for(const p of pops)p.alive=false;
  rings.length=0;trail.length=0;hist.length=0;ghosts.length=0;
  needCal=true;
  bgmStep=0;bgmNext=AC?AC.currentTime+.1:0;
}

function update(dt){
  if(slowT>0){slowT-=dt;dt*=.35;}          /* 救出スローモーション */
  elapsed+=dt;
  const fevMul=fever>0?1.4:1,dashMul=dashT>0?2.3:1;
  spd=Math.min(2000,950+elapsed*16)*fevMul*dashMul;
  distKm+=spd*dt/3600;gscroll+=spd*dt;
  /* プレイヤー追従(ダッシュ中はキビキビ) */
  const ease=dashT>0?13:9;
  px+=(tpx-px)*Math.min(1,dt*ease);
  py+=(tpy-py)*Math.min(1,dt*ease);
  const pl=Math.hypot(px,py);
  if(pl>.95){px*=.95/pl;py*=.95/pl;}
  /* タイマー類 */
  timeLeft-=dt;
  if(timeLeft<=0){timeLeft=0;gameOver('time');return;}
  if(timeLeft<5.5&&Math.ceil(timeLeft)!==lastTick){lastTick=Math.ceil(timeLeft);sfxTick();}
  if(fever>0){fever-=dt;if(fever<=0){fever=0;scoreMult=1;}}
  if(shield>0)shield-=dt;
  if(magnet>0)magnet-=dt;
  if(invuln>0)invuln-=dt;
  if(dashT>0)dashT-=dt;
  energy=Math.min(ENERGY_MAX,energy+ENERGY_REGEN*dt);
  if(shake>0)shake=Math.max(0,shake-dt*60);
  if(flash>0)flash=Math.max(0,flash-dt*2.2);
  hue=(hue+dt*(fever>0?160:10))%360;
  if(combo>maxCombo)maxCombo=combo;
  if(combo>=8&&fever<=0)startFever();
  /* スポーン */
  const sf=Math.min(1.6,1+elapsed/70);
  cageT-=dt;itemT-=dt*sf;blackT-=dt*sf;cloudT-=dt*sf;
  if(cageT<=0){spawnCage();cageT=rnd(4.2,5.8);}
  if(itemT<=0){spawnItems();itemT=rnd(1.7,2.7);}
  if(blackT<=0){spawnBlack();blackT=rnd(6,9);}
  if(cloudT<=0){spawnCloud();cloudT=rnd(2.6,4);}
  /* エンティティ */
  for(const e of ents){
    if(!e.alive)continue;
    const pz=e.z;e.z-=spd*dt;
    if(e.type==='cage'&&e.drift){e.nx=clamp1(e.nx+Math.cos(e.ph)*e.drift*dt);e.ny=clamp1(e.ny+Math.sin(e.ph)*e.drift*dt);}
    if(e.type==='black'){
      e.flap+=dt*7;
      if(e.mode==='guard'){
        if(!e.tgt||!e.tgt.alive||e.tgt.type!=='cage'){e.mode='swoop';e.tgt=null;e.home=.3;}
        else{e.orb+=dt*2.2;
          e.nx=e.tgt.nx+Math.cos(e.orb)*.26;e.ny=e.tgt.ny+Math.sin(e.orb)*.26;e.z=e.tgt.z;}
      }
      if(e.mode==='swoop'){
        const d=Math.max(.001,Math.hypot(px-e.nx,py-e.ny));
        e.nx+=(px-e.nx)/d*e.home*dt;e.ny+=(py-e.ny)/d*e.home*dt;
      }
    }
    if(e.type==='item'&&magnet>0&&e.z<900){
      e.nx+=(px-e.nx)*Math.min(1,dt*4);e.ny+=(py-e.ny)*Math.min(1,dt*4);
    }
    if(e.z<130&&e.z>-90)judge(e);          /* 接触判定は手前のみ */
    if(e.type==='cage'&&pz>0&&e.z<=0&&!e.done){e.done=true;
      if(e.alive){combo=0;popup(W/2,H*.46,'🐣 まにあわなかった…','#9ab',18);}}
    if(e.z<-260)e.alive=false;
  }
  /* 風の流線 */
  for(const s of stars){s.z-=spd*dt*1.15;if(s.z<10){s.z=ZSPAWN;s.a=Math.random()*TAU;s.r=.15+Math.random()*1;}}
  /* パーティクル */
  for(const p of parts){if(!p.alive)continue;p.t+=dt;
    if(p.t>=p.dur){p.alive=false;continue;}
    p.x+=p.vx*dt;p.y+=p.vy*dt;p.vy+=340*dt;}
  for(const p of pops){if(!p.alive)continue;p.t+=dt;if(p.t>=p.dur)p.alive=false;}
  for(let i=rings.length-1;i>=0;i--){rings[i].t+=dt;if(rings[i].t>=rings[i].dur)rings.splice(i,1);}
  for(const c of trail){if(c.jump>0)c.jump=Math.max(0,c.jump-dt*1.6);}
  /* 隊列がときどきさえずる */
  if(trail.length&&Math.random()<dt*.7){sfxChirp();
    const i=(Math.random()*Math.min(trail.length,8))|0;
    if(hist.length>(i+1)*9){const h=hist[hist.length-1-(i+1)*9];
      burst(h.x,h.y,2,['#ffd76e','#ff8ac2'],['💕','🎵']);}}
}

/* ───────── 描画 ───────── */
function proj(nx,ny,z){
  const sc=FOCAL/(FOCAL+Math.max(0,z)),R=Math.min(W,H)*.4;
  return [W/2+(nx-px*.55)*R*sc, H/2+(ny-py*.55)*R*sc, sc, R];
}
function drawSky(){
  const hy=H*.46+py*H*.05;
  const sky=cx.createLinearGradient(0,0,0,hy);
  if(fever>0){
    sky.addColorStop(0,`hsl(${hue},70%,14%)`);sky.addColorStop(1,`hsl(${(hue+60)%360},75%,32%)`);
  }else{
    sky.addColorStop(0,'#0b0626');sky.addColorStop(.55,`hsl(${(hue+250)%360},55%,18%)`);
    sky.addColorStop(1,`hsl(${(hue+10)%360},75%,34%)`);
  }
  cx.fillStyle=sky;cx.fillRect(0,0,W,Math.max(1,hy));
  /* 地平線の太陽 */
  const sxn=W/2-px*40;
  const sun=cx.createRadialGradient(sxn,hy,0,sxn,hy,Math.min(W,H)*.42);
  sun.addColorStop(0,fever>0?`hsla(${hue},100%,75%,.95)`:'rgba(255,205,120,.95)');
  sun.addColorStop(.25,fever>0?`hsla(${hue},95%,62%,.5)`:'rgba(255,140,90,.5)');
  sun.addColorStop(1,'rgba(255,120,80,0)');
  cx.fillStyle=sun;
  cx.beginPath();cx.arc(sxn,hy,Math.min(W,H)*.42,0,TAU);cx.fill();
  /* 雲海(疑似3Dグリッド) */
  const sea=cx.createLinearGradient(0,hy,0,H);
  sea.addColorStop(0,fever>0?`hsl(${(hue+180)%360},45%,20%)`:'#1a1038');
  sea.addColorStop(1,'#05030f');
  cx.fillStyle=sea;cx.fillRect(0,hy,W,H-hy);
  const R=Math.min(W,H)*.4;
  cx.lineWidth=1;
  for(let i=0;i<13;i++){
    const z=i*240-(gscroll%240),zz=Math.max(2,z),
      sc=FOCAL/(FOCAL+zz),y=hy+(H-hy)*sc;
    cx.strokeStyle=`hsla(${(hue+30+i*8)%360},80%,65%,${.04+sc*.16})`;
    cx.beginPath();cx.moveTo(0,y);cx.lineTo(W,y);cx.stroke();
  }
  const vx=W/2-px*R*.3;
  for(let k=-6;k<=6;k++){
    const xN=W/2+(k-px*1.2)*W*.16;
    cx.strokeStyle=`hsla(${(hue+30)%360},80%,65%,.08)`;
    cx.beginPath();cx.moveTo(vx,hy);cx.lineTo(xN,H);cx.stroke();
  }
}
function drawCape(pw,ph2,lean){
  /* 頂点アニメーション風にはためくヒーローマント */
  const t=elapsed*9,wv=dashT>0?1.7:1;
  cx.save();
  cx.translate(-pw*.02,-ph2*.1);
  cx.rotate(.15+lean*.1);
  const g=cx.createLinearGradient(0,0,-pw*1.1,ph2*.5);
  g.addColorStop(0,fever>0?`hsl(${hue},90%,60%)`:'#e0383f');
  g.addColorStop(1,fever>0?`hsl(${(hue+80)%360},90%,45%)`:'#8c1420');
  cx.fillStyle=g;
  cx.beginPath();cx.moveTo(0,-ph2*.12);
  for(let i=0;i<=6;i++){
    const k=i/6,
      xx=-k*pw*(1+(dashT>0?.45:0)),
      yy=-ph2*.12+k*ph2*.5+Math.sin(t+k*5)*ph2*.06*wv*k;
    cx.lineTo(xx,yy);
  }
  cx.lineTo(-pw*.1,ph2*.34);cx.lineTo(0,ph2*.2);
  cx.closePath();cx.fill();
  cx.restore();
}
function drawCocco(w,h2){if(coccoReady)cx.drawImage(cocco,-w/2,-h2/2,w,h2);}
function draw(){
  const R=Math.min(W,H)*.4,cxp=W/2,cyp=H/2;
  drawSky();
  cx.save();
  if(shake>0)cx.translate((Math.random()-.5)*shake,(Math.random()-.5)*shake);
  /* 風の流線 */
  for(const s of stars){
    const sc=FOCAL/(FOCAL+s.z),sc2=FOCAL/(FOCAL+s.z+140),
      x1=cxp+Math.cos(s.a)*s.r*R*1.7*sc,y1=cyp+Math.sin(s.a)*s.r*R*1.7*sc,
      x2=cxp+Math.cos(s.a)*s.r*R*1.7*sc2,y2=cyp+Math.sin(s.a)*s.r*R*1.7*sc2;
    cx.strokeStyle=fever>0?`hsla(${(hue+s.a*57)%360},90%,75%,${sc*.7})`:`rgba(255,230,200,${sc*(dashT>0?.8:.4)})`;
    cx.lineWidth=sc*(dashT>0?3:2);
    cx.beginPath();cx.moveTo(x1,y1);cx.lineTo(x2,y2);cx.stroke();
  }
  /* エンティティ(奥から) */
  const sorted=ents.filter(e=>e.alive&&e.z>-200).sort((a,b)=>b.z-a.z);
  for(const e of sorted){
    const [sx,sy,sc]=proj(e.nx||0,e.ny||0,e.z);
    if(e.type==='cage'){
      const r=.2*R*sc;
      cx.save();cx.globalAlpha=Math.min(1,sc*1.8);
      cx.translate(sx,sy);cx.rotate(Math.sin(elapsed*3+e.ph)*.08);
      /* 中のヒナこっこ(公式SVG) */
      cx.shadowColor=e.iron?'#bcd':'#ffd76e';cx.shadowBlur=14*sc;
      if(coccoReady)cx.drawImage(cocco,-r*.58,-r*.66,r*1.16,r*1.52);
      cx.shadowBlur=0;
      cx.font=`${Math.max(7,r*.5)}px sans-serif`;cx.textAlign='center';cx.textBaseline='middle';
      cx.fillText('💦',r*.6,-r*.62);
      /* かごの格子 */
      const col=e.iron?'rgba(200,212,228,.95)':'rgba(214,150,80,.95)';
      cx.strokeStyle=col;cx.lineWidth=Math.max(1,3*sc);
      cx.beginPath();cx.arc(0,0,r,0,TAU);cx.stroke();
      for(let k=-2;k<=2;k++){
        const xx=k*r*.4,yy=Math.sqrt(Math.max(0,r*r-xx*xx));
        cx.beginPath();cx.moveTo(xx,-yy);cx.lineTo(xx,yy);cx.stroke();
      }
      cx.beginPath();cx.moveTo(-r,0);cx.lineTo(r,0);cx.stroke();
      cx.beginPath();cx.moveTo(0,-r*1.3);cx.lineTo(0,-r);cx.stroke(); /* 吊り紐 */
      if(e.iron){cx.font=`${Math.max(8,r*.66)}px sans-serif`;cx.fillText('🔒',0,r*.8);}
      /* たすけて吹き出し */
      if(((elapsed+e.ph)%2.4)<1.2){
        cx.font=`bold ${Math.max(8,r*.42)}px sans-serif`;
        cx.fillStyle='#fff';cx.shadowColor='#000';cx.shadowBlur=4;
        cx.fillText('たすけて〜！',0,-r*1.5);cx.shadowBlur=0;
      }
      cx.restore();
    }
    else if(e.type==='item'){
      cx.save();cx.globalAlpha=Math.min(1,sc*1.9);
      const r=.13*R*sc,bob=Math.sin(elapsed*5+e.z*.01)*r*.25;
      cx.shadowColor='#fff';cx.shadowBlur=16*sc;
      cx.font=`${Math.max(8,r*2.1)}px sans-serif`;
      cx.textAlign='center';cx.textBaseline='middle';
      cx.fillText(e.emoji,sx,sy+bob);
      cx.restore();
    }
    else if(e.type==='black'){
      const w=R*.42*sc,h2=w*1.31;
      cx.save();cx.globalAlpha=Math.min(1,sc*1.8);
      cx.translate(sx,sy);cx.rotate(Math.sin(e.flap)*.15);
      cx.shadowColor='#a040ff';cx.shadowBlur=24*sc;
      if(blackCv)cx.drawImage(blackCv,-w/2,-h2/2,w,h2);
      else{cx.fillStyle='#0a0a14';cx.beginPath();cx.arc(0,0,w*.5,0,TAU);cx.fill();}
      const ey=-h2*.06,pulse=.6+.4*Math.sin(elapsed*9);
      cx.shadowColor='#f33';cx.shadowBlur=10*sc*pulse;
      cx.fillStyle=`rgba(255,40,60,${.7+.3*pulse})`;
      cx.beginPath();cx.arc(-w*.155,ey,w*.05,0,TAU);cx.arc(w*.17,ey,w*.05,0,TAU);cx.fill();
      cx.restore();
    }
    else if(e.type==='cloud'){
      const r=e.r*R*sc;
      cx.save();cx.globalAlpha=Math.min(1,sc*1.7);
      cx.translate(sx,sy);
      const g=cx.createRadialGradient(0,-r*.2,r*.1,0,0,r*1.2);
      g.addColorStop(0,'#9aa3c4');g.addColorStop(1,'#2c3050');
      cx.fillStyle=g;cx.shadowColor='#ffd76e';cx.shadowBlur=8*sc;
      cx.beginPath();
      cx.arc(-r*.55,0,r*.55,0,TAU);cx.arc(0,-r*.4,r*.62,0,TAU);
      cx.arc(r*.55,0,r*.55,0,TAU);cx.arc(0,r*.25,r*.7,0,TAU);
      cx.fill();
      if(Math.random()<.12){
        cx.strokeStyle='rgba(255,235,140,.95)';cx.lineWidth=Math.max(1,2.5*sc);
        cx.beginPath();cx.moveTo(0,r*.4);
        cx.lineTo(-r*.2,r*.9);cx.lineTo(r*.1,r*1);cx.lineTo(-r*.15,r*1.6);cx.stroke();
      }
      cx.font=`${Math.max(8,r*.55)}px sans-serif`;cx.textAlign='center';cx.textBaseline='middle';
      cx.fillText('⚡',0,0);
      cx.restore();
    }
  }
  /* プレイヤー(公式こっこちゃん+マント) と 隊列 */
  if(state==='play'||state==='over'){
    const pxs=cxp+px*.45*R,pys=cyp+py*.45*R,
      pw=Math.min(W,H)*.17,ph2=pw*1.31,
      lean=(tpx-px)*2.2+px*.4;
    if(state==='play'){hist.push({x:pxs,y:pys});if(hist.length>400)hist.shift();}
    /* ダッシュ残像 */
    if(dashT>0){ghosts.push({x:pxs,y:pys,a:.4});if(ghosts.length>7)ghosts.shift();}
    for(let i=ghosts.length-1;i>=0;i--){
      const gh=ghosts[i];gh.a-=.025;
      if(gh.a<=0){ghosts.splice(i,1);continue;}
      cx.save();cx.globalAlpha=gh.a;cx.translate(gh.x,gh.y);
      drawCocco(pw,ph2);cx.restore();
    }
    /* 救出したヒナの隊列(画面表示は8匹まで・カウントは無限) */
    const show=Math.min(trail.length,8);
    for(let i=show-1;i>=0;i--){
      const off=(i+1)*9,h=hist.length>off?hist[hist.length-1-off]:{x:pxs,y:pys};
      const cwv=pw*.46,chh=cwv*1.31,c=trail[i],
        bobY=Math.sin(elapsed*7+i)*4-c.jump*22;
      cx.save();cx.translate(h.x,h.y+bobY);
      cx.rotate(Math.sin(elapsed*6+i*1.3)*.12);
      cx.shadowColor='#ffd76e';cx.shadowBlur=10;
      drawCocco(cwv,chh);
      cx.restore();
    }
    if(trail.length>8){
      const h=hist.length>81?hist[hist.length-82]:{x:pxs,y:pys};
      cx.font='bold 14px sans-serif';cx.textAlign='center';cx.textBaseline='middle';
      cx.fillStyle='#ffd76e';cx.shadowColor='#000';cx.shadowBlur=4;
      cx.fillText('+'+(trail.length-8)+'🐣',h.x,h.y-26);cx.shadowBlur=0;
    }
    cx.save();cx.translate(pxs,pys);cx.rotate(lean*.45);
    if(invuln>0&&(elapsed*14|0)%2)cx.globalAlpha=.35;
    drawCape(pw,ph2,lean);
    if(fever>0){cx.shadowColor=`hsl(${hue},95%,70%)`;cx.shadowBlur=34;}
    else if(dashT>0){cx.shadowColor='#ffb46e';cx.shadowBlur=38;}
    else{cx.shadowColor='rgba(255,200,120,.9)';cx.shadowBlur=20;}
    if(shield>0){
      cx.strokeStyle=`rgba(120,215,255,${.5+.3*Math.sin(elapsed*8)})`;cx.lineWidth=3;
      cx.beginPath();cx.arc(0,0,pw*.72,0,TAU);cx.stroke();
    }
    drawCocco(pw,ph2);
    cx.restore();
    /* 噴射トレイル */
    if(state==='play'&&Math.random()<(dashT>0?.95:.6)){
      const p=part();
      if(p){p.alive=true;p.x=pxs+rnd(-6,6);p.y=pys+ph2*.42;
        p.vx=rnd(-26,26)-px*40;p.vy=rnd(90,190)*(dashT>0?1.6:1);p.t=0;p.dur=.4;
        p.size=rnd(2,6);p.emoji=null;
        p.col=dashT>0?'#ffb46e':fever>0?`hsl(${hue},95%,70%)`:'#ffd76e';}
    }
  }
  /* ショックウェーブ */
  for(const rg of rings){
    const k=rg.t/rg.dur,rr=k*Math.min(W,H)*.7;
    cx.globalAlpha=(1-k)*.8;
    cx.lineWidth=4*(1-k)+1;
    cx.strokeStyle=`hsl(${(hue+k*240)%360},95%,70%)`;
    cx.beginPath();cx.arc(rg.x,rg.y,rr,0,TAU);cx.stroke();
    cx.strokeStyle=`hsla(${(hue+120+k*240)%360},95%,75%,.6)`;
    cx.beginPath();cx.arc(rg.x,rg.y,rr*.82,0,TAU);cx.stroke();
  }
  cx.globalAlpha=1;
  /* パーティクル */
  for(const p of parts){
    if(!p.alive)continue;
    const k=1-p.t/p.dur;
    cx.globalAlpha=k;
    if(p.emoji){cx.font=`${p.size*3.2}px sans-serif`;cx.textAlign='center';cx.textBaseline='middle';
      cx.fillText(p.emoji,p.x,p.y);}
    else{cx.fillStyle=p.col;cx.beginPath();cx.arc(p.x,p.y,p.size*k,0,TAU);cx.fill();}
  }
  cx.globalAlpha=1;
  /* テキストポップ */
  for(const p of pops){
    if(!p.alive)continue;
    const k=p.t/p.dur;
    cx.globalAlpha=k<.15?k/.15:1-Math.max(0,(k-.6)/.4);
    cx.font=`bold ${p.size}px sans-serif`;cx.textAlign='center';cx.textBaseline='middle';
    cx.shadowColor=p.col;cx.shadowBlur=12;
    cx.fillStyle=p.col;cx.fillText(p.text,p.x,p.y-k*46);
    cx.shadowBlur=0;
  }
  cx.globalAlpha=1;
  cx.restore();
  /* フラッシュ */
  if(flash>0){cx.fillStyle=`rgba(${flashCol},${flash*.4})`;cx.fillRect(0,0,W,H);}
  /* ───── HUD ───── */
  if(state==='play'){
    const top=48;
    cx.textBaseline='middle';
    cx.font='20px sans-serif';cx.textAlign='left';
    cx.fillText('❤️'.repeat(hp)+'🖤'.repeat(Math.max(0,3-hp)),12,top+18);
    cx.font='bold 15px sans-serif';cx.fillStyle='#ffd76e';
    cx.fillText('🐣×'+rescued,12,top+42);
    cx.textAlign='right';cx.font='bold 22px sans-serif';
    cx.fillStyle='#fff';cx.shadowColor='#ffd76e';cx.shadowBlur=10;
    cx.fillText(score.toLocaleString(),W-12,top+16);
    cx.shadowBlur=0;
    if(combo>1){cx.font='bold 14px sans-serif';cx.fillStyle='#ffd76e';
      cx.fillText(combo+' COMBO',W-12,top+38);}
    /* ⏰タイムバー */
    const bw=Math.min(W*.46,250),bx=W/2-bw/2,by=top+4;
    cx.fillStyle='rgba(255,255,255,.14)';
    cx.beginPath();cx.roundRect(bx,by,bw,10,5);cx.fill();
    const tk=timeLeft/60,
      tg=cx.createLinearGradient(bx,0,bx+bw,0);
    tg.addColorStop(0,timeLeft<10?'#ff5a5a':'#ffd76e');tg.addColorStop(1,timeLeft<10?'#ffb05a':'#ff8a5a');
    cx.fillStyle=tg;
    cx.beginPath();cx.roundRect(bx,by,Math.max(2,bw*Math.min(1,tk)),10,5);cx.fill();
    cx.font='bold 15px sans-serif';cx.textAlign='center';
    cx.fillStyle=timeLeft<10?'#ff7a6a':'#fdc';
    cx.fillText('⏰'+Math.ceil(timeLeft)+'s',W/2,by+26);
    /* 🔋ダッシュエナジー */
    const ew=Math.min(W*.4,210),ex=W/2-ew/2,ey2=H-Math.max(26,H*.05);
    cx.fillStyle='rgba(255,255,255,.14)';
    cx.beginPath();cx.roundRect(ex,ey2,ew,9,4.5);cx.fill();
    const ready=energy>=DASH_COST;
    cx.fillStyle=ready?'#ffe28a':'rgba(255,226,138,.45)';
    cx.beginPath();cx.roundRect(ex,ey2,Math.max(2,ew*energy/ENERGY_MAX),9,4.5);cx.fill();
    cx.font='bold 12px sans-serif';
    cx.fillStyle=ready?'#ffe28a':'rgba(255,226,138,.6)';
    cx.fillText(ready?'🔋 🚀ダッシュOK（押し出す/ふる/ボタン）':'🔋 チャージ中…',W/2,ey2-12);
    /* フィーバー/シールド/マグネット表示 */
    let sy2=H-(H*.12);
    if(fever>0){cx.font='bold 18px sans-serif';
      cx.fillStyle=`hsl(${hue},95%,75%)`;cx.shadowColor=`hsl(${hue},95%,70%)`;cx.shadowBlur=12;
      cx.fillText('🌈 FEVER ×2  '+fever.toFixed(0)+'s 🌈',W/2,sy2);cx.shadowBlur=0;sy2-=24;}
    if(shield>0){cx.font='bold 14px sans-serif';cx.fillStyle='#7ad7ff';
      cx.fillText('🛡️ '+shield.toFixed(0)+'s',W/2-50,sy2);}
    if(magnet>0){cx.font='bold 14px sans-serif';cx.fillStyle='#d0a0ff';
      cx.fillText('🧲 '+magnet.toFixed(0)+'s',W/2+50,sy2);}
    /* 操作モード */
    cx.font='12px sans-serif';cx.fillStyle='rgba(255,225,200,.55)';cx.textAlign='left';
    cx.fillText(motionSeen?'📳 加速度センサー操作中':'👆 タッチ操作中',12,H-14);
  }
}

function tick(t){
  const dtMs=last?t-last:16;last=t;
  perfSample(dtMs);
  const dt=Math.min(.05,dtMs/1000);
  if(state==='play'){update(dt);schedBGM();}
  else{
    for(const p of parts){if(!p.alive)continue;p.t+=dt;
      if(p.t>=p.dur){p.alive=false;continue;}
      p.x+=p.vx*dt;p.y+=p.vy*dt;p.vy+=340*dt;}
    for(const p of pops){if(!p.alive)continue;p.t+=dt;if(p.t>=p.dur)p.alive=false;}
    for(let i=rings.length-1;i>=0;i--){rings[i].t+=dt;if(rings[i].t>=rings[i].dur)rings.splice(i,1);}
    for(const s of stars){s.z-=300*dt;if(s.z<10){s.z=ZSPAWN;s.a=Math.random()*TAU;}}
    gscroll+=300*dt;hue=(hue+dt*10)%360;
  }
  draw();
  requestAnimationFrame(tick);
}
requestAnimationFrame(tick);

/* ───────── UI 配線 ───────── */
const startOv=document.getElementById('startOv'),endOv=document.getElementById('endOv'),
  bestRow=document.getElementById('bestRow'),recalBtn=document.getElementById('recalBtn'),
  dashBtn=document.getElementById('dashBtn');
if(best>0)bestRow.textContent='ベスト '+best.toLocaleString()+'　🐣'+bestRescue+'匹';

async function startGame(){
  audio();sfxStart();
  if(!motionOn)motionOn=await enableMotion();
  reset();
  startOv.classList.add('hidden');endOv.classList.add('hidden');
  recalBtn.classList.remove('hidden');dashBtn.classList.remove('hidden');
  state='play';
}
document.getElementById('startBtn').addEventListener('click',startGame);
document.getElementById('retryBtn').addEventListener('click',startGame);
recalBtn.addEventListener('click',()=>{needCal=true;tpx=0;tpy=0;vib(15);});
dashBtn.addEventListener('pointerdown',e=>{e.preventDefault();tryDash();});

document.getElementById('muteBtn').addEventListener('click',function(){
  muted=!muted;this.textContent=muted?'🔇':'🔊';
  if(!muted){audio();bgmNext=AC.currentTime+.1;}
});
document.getElementById('shareBtn').addEventListener('click',()=>{
  const text=`こっこヒーローでヒナこっこ${rescued}匹を大救出！スコア${score.toLocaleString()} 🐣🚀 #畜物語 #こっこヒーロー`;
  const url='https://chikumo.jp/hero/';
  if(navigator.share){navigator.share({text,url}).catch(()=>{});}
  else open('https://twitter.com/intent/tweet?text='+encodeURIComponent(text)+'&url='+encodeURIComponent(url),'_blank');
});
document.addEventListener('visibilitychange',()=>{
  if(document.hidden&&AC)AC.suspend();
  else if(AC&&!muted)AC.resume();
});

/* ─ ヘッドレステスト用フック ─ */
window.__hero={
  ents,parts,pops,trail,rings,CLEAR_RATE,
  spawnCage,spawnBlack,spawnItems,spawnCloud,dropItem,
  update,damage,tryDash,startFever,rescue,reset,startGame,
  consts:{ZSPAWN,DASH_COST,DASH_DUR,ENERGY_MAX},
  get:()=>({state,score,best,combo,maxCombo,hp,timeLeft,fever,shield,magnet,invuln,
    energy,dashT,slowT,rescued,rescueStreak,scoreMult,px,py,elapsed,lastFair}),
  set:o=>{for(const k of Object.keys(o)){const v=o[k];
    if(k==='state')state=v;else if(k==='score')score=v;else if(k==='combo')combo=v;
    else if(k==='hp')hp=v;else if(k==='timeLeft')timeLeft=v;else if(k==='fever')fever=v;
    else if(k==='shield')shield=v;else if(k==='magnet')magnet=v;else if(k==='invuln')invuln=v;
    else if(k==='energy')energy=v;else if(k==='dashT')dashT=v;else if(k==='slowT')slowT=v;
    else if(k==='rescued')rescued=v;else if(k==='rescueStreak')rescueStreak=v;
    else if(k==='px')px=v;else if(k==='py')py=v;else if(k==='tpx')tpx=v;else if(k==='tpy')tpy=v;
    else if(k==='elapsed')elapsed=v;else if(k==='scoreMult')scoreMult=v;}},
  noSpawn:()=>{cageT=itemT=blackT=cloudT=1e9;}
};
</script>
