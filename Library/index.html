<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>畜学 ─ 蔵書</title>
<meta name="description" content="畜物語の蔵書室「畜学」。十四式（構造実体の固定構造）と遊戯学（遊びをめぐる資料）の二棚。読みたい本を選んでひらく。">
<meta name="color-scheme" content="light dark">
<meta property="og:title" content="畜学 ─ 蔵書">
<meta property="og:description" content="十四式と遊戯学の二棚。読みたい本を選んでひらく、畜物語の蔵書室。">
<meta property="og:type" content="website">
<link rel="icon" type="image/svg+xml" href="/chikumo.svg">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Shippori+Mincho:wght@500;600;700;800&family=IBM+Plex+Mono:wght@300;400&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
:root{
  --wall-top:#e9e0d2; --wall-mid:#d4c6b2; --wall-bot:#b29a7c;
  --wood-light:#9a7550; --wood-mid:#5f4430; --wood-dark:#3a2820;
  --ink:#3c332a; --ink-soft:#6f6456;
  --gold:#c4a25e; --gold-bright:#e8cf95;
  --serif:'Shippori Mincho','Hiragino Mincho ProN','Yu Mincho',serif;
  --mono:'IBM Plex Mono',monospace;
}
html,body{min-height:100%;}
body{
  font-family:var(--serif);color:var(--ink);
  min-height:100vh;overflow-x:hidden;
  background:
    radial-gradient(ellipse 80% 50% at 22% 8%,rgba(255,250,238,0.55),transparent 55%),
    radial-gradient(ellipse 70% 50% at 85% 12%,rgba(255,244,224,0.4),transparent 50%),
    linear-gradient(180deg,var(--wall-top) 0%,var(--wall-mid) 46%,var(--wall-bot) 100%);
}
body::before{
  content:"";position:fixed;inset:0;pointer-events:none;z-index:0;
  background-image:
    repeating-linear-gradient(90deg,transparent 0 3px,rgba(0,0,0,0.012) 3px 4px),
    repeating-linear-gradient(0deg,transparent 0 3px,rgba(0,0,0,0.012) 3px 4px);
}
.wrap{position:relative;z-index:1;max-width:880px;margin:0 auto;padding:clamp(2rem,6vw,4.5rem) 1.4rem 5rem;}

a.home{display:inline-block;font-family:var(--mono);font-size:0.72rem;letter-spacing:0.2em;color:var(--ink-soft);
  text-decoration:none;border-bottom:1px solid rgba(60,51,42,0.25);padding-bottom:2px;margin-bottom:2.6rem;transition:color .2s;}
a.home:hover{color:var(--ink);}

header{text-align:center;margin-bottom:clamp(2.4rem,6vw,4rem);}
header h1{font-size:clamp(3rem,12vw,5.4rem);font-weight:800;letter-spacing:0.18em;color:var(--ink);
  text-shadow:0 1px 0 rgba(255,255,255,0.4),0 2px 6px rgba(90,68,48,0.2);}
header .en{font-family:var(--mono);font-size:0.72rem;letter-spacing:0.5em;color:var(--ink-soft);text-transform:uppercase;margin-top:0.9rem;}
header p{margin-top:1.1rem;font-size:0.98rem;color:var(--ink-soft);letter-spacing:0.08em;font-style:italic;}

/* SHELF */
.shelf{margin-top:clamp(2.2rem,7vw,3.4rem);}
.shelf:first-of-type{margin-top:0;}
.books{
  display:flex;flex-wrap:wrap;justify-content:center;align-items:flex-end;
  gap:clamp(22px,6vw,52px);padding:18px 14px 0;perspective:1400px;
}
.board{
  height:30px;border-radius:2px;position:relative;
  background:linear-gradient(90deg,#3a2820 0%,#5f4430 6%,#9a7550 16%,#5f4430 32%,#3a2820 46%,#5f4430 56%,#9a7550 72%,#5f4430 86%,#3a2820 96%,#5f4430 100%);
  box-shadow:0 5px 10px rgba(0,0,0,0.28),0 12px 30px rgba(0,0,0,0.16),inset 0 1px 0 rgba(255,255,255,0.12),inset 0 -2px 0 rgba(0,0,0,0.25);
}
.board::after{content:"";position:absolute;left:0;right:0;top:100%;height:64px;
  background:linear-gradient(180deg,rgba(0,0,0,0.2),transparent);pointer-events:none;}

/* BOOK (front cover) */
.book{
  position:relative;display:block;text-decoration:none;flex:0 0 auto;
  width:clamp(140px,40vw,184px);height:clamp(196px,56vw,256px);
  border-radius:3px 6px 6px 3px;
  background:linear-gradient(135deg,var(--c1),var(--c2));
  box-shadow:
    7px 10px 18px rgba(0,0,0,0.32),
    14px 18px 36px rgba(0,0,0,0.2),
    inset 0 1px 0 rgba(255,255,255,0.14),
    inset -2px -2px 6px rgba(0,0,0,0.28);
  transform:rotateY(8deg) translateY(0);transform-origin:left center;
  transition:transform .3s cubic-bezier(.2,1,.3,1),box-shadow .3s;
  overflow:hidden;
}
.book::after{ /* 背表紙の陰 */
  content:"";position:absolute;left:0;top:0;bottom:0;width:14px;
  background:linear-gradient(90deg,rgba(0,0,0,0.42),rgba(255,255,255,0.08) 60%,rgba(0,0,0,0.18));
}
.book::before{ /* 小口（右ページ束） */
  content:"";position:absolute;right:-5px;top:5px;bottom:5px;width:6px;border-radius:0 2px 2px 0;
  background:repeating-linear-gradient(180deg,#efe6d3 0 1.5px,#cdbf a0 1.5px 3px,#d8cbb0 3px 4.5px);
  background:repeating-linear-gradient(180deg,#efe6d3 0 1.6px,#cabd9c 1.6px 3.2px);
  box-shadow:1px 0 3px rgba(0,0,0,0.3);
}
.cover{
  position:absolute;inset:12px 12px 12px 22px;border:1px solid rgba(255,255,255,0.28);
  border-radius:2px;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:0.8rem;
  box-shadow:inset 0 0 0 3px rgba(0,0,0,0.12),inset 0 0 22px rgba(0,0,0,0.22);
}
.cover .rule{width:34px;height:1px;background:var(--gold-bright);opacity:0.8;}
.cover .title{
  writing-mode:vertical-rl;text-orientation:upright;
  font-size:clamp(1.7rem,5.4vw,2.2rem);font-weight:800;letter-spacing:0.18em;line-height:1.15;
  color:var(--gold-bright);text-shadow:0 1px 2px rgba(0,0,0,0.5),0 0 10px rgba(0,0,0,0.25);
}
.cover .sub{font-family:var(--mono);font-size:0.56rem;letter-spacing:0.16em;color:rgba(255,248,235,0.7);
  text-align:center;max-width:90%;line-height:1.7;text-transform:uppercase;}
.book:hover,.book:focus-visible{
  transform:rotateY(2deg) translateY(-12px);
  box-shadow:10px 20px 30px rgba(0,0,0,0.4),20px 28px 56px rgba(0,0,0,0.26),inset 0 1px 0 rgba(255,255,255,0.18),inset -2px -2px 6px rgba(0,0,0,0.28);
  outline:none;
}
.book .glow{position:absolute;inset:0;border-radius:inherit;opacity:0;transition:opacity .3s;
  box-shadow:0 0 26px var(--c2);}
.book:hover .glow{opacity:0.5;}

footer{margin-top:3.6rem;text-align:center;font-family:var(--mono);font-size:0.66rem;letter-spacing:0.2em;color:var(--ink-soft);}
footer a{color:inherit;text-decoration:none;border-bottom:1px solid rgba(60,51,42,0.25);}
@media(max-width:430px){
  .books{gap:26px;}
}
</style>
</head>
<body>
<div class="wrap">
  <a class="home" href="/">← 畜物語</a>
  <header>
    <h1>畜学</h1>
    <div class="en">Chikugaku — The Library</div>
    <p>読みたい本を、棚からえらぶ。</p>
  </header>

  <div class="shelf">
    <div class="books">
      <a class="book" href="/jushishiki/" style="--c1:#1f3a44;--c2:#0e2730;" aria-label="十四式をひらく">
        <span class="glow"></span>
        <span class="cover">
          <span class="rule"></span>
          <span class="title">十四式</span>
          <span class="rule"></span>
          <span class="sub">構造実体の固定構造</span>
        </span>
      </a>
    </div>
    <div class="board"></div>
  </div>

  <div class="shelf">
    <div class="books">
      <a class="book" href="/yugigaku/" style="--c1:#5a2230;--c2:#34121b;" aria-label="遊戯学をひらく">
        <span class="glow"></span>
        <span class="cover">
          <span class="rule"></span>
          <span class="title">遊戯学</span>
          <span class="rule"></span>
          <span class="sub">二人の対話の記録</span>
        </span>
      </a>
    </div>
    <div class="board"></div>
  </div>

  <footer>畜物語 ─ <a href="/">chikumo.jp</a></footer>
</div>
</body>
</html>
