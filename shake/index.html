<body>
<canvas id="game"></canvas>

<div id="ui">

<script>
"use strict";
/* ════════════════════════════════════════════════════════════
   こっこシェイク救出 — COCCO SHAKE RESCUE
   加速度センサー(devicemotion)操作 × Z軸(奥行き) × シェイク破壊
   クリアできる要素 76.6% / クリアできない要素 23.4%
   ════════════════════════════════════════════════════════════ */
const TAU=Math.PI*2;
const CLEAR_RATE=0.766;            /* 76.6% フェア配置 / 23.4% 鬼配置 */
const fair=()=>Math.random()<CLEAR_RATE;

/* ───────── 公式こっこちゃんSVG ───────── */
let blackCv=null;
const cocco=new Image();let coccoReady=false;
cocco.onload=()=>{coccoReady=true;makeBlack();};
cocco.src='/chikumo.svg';
/* ブラックこっこちゃん: 公式SVGをシルエット化 */
function makeBlack(){
  const c=document.createElement('canvas');c.width=120;c.height=157;
  const g=c.getContext('2d');
  g.drawImage(cocco,0,0,120,157);
  g.globalCompositeOperation='source-in';
  g.fillStyle='#120818';g.fillRect(0,0,120,157);
  blackCv=c;
}

/* ───────── キャンバス / 動的解像度スロットリング ───────── */
if(!CanvasRenderingContext2D.prototype.roundRect)
  CanvasRenderingContext2D.prototype.roundRect=function(x,y,w,h){this.rect(x,y,w,h);return this;};
const cv=document.getElementById('game'),cx=cv.getContext('2d');
let W=0,H=0,DPR=1,renderScale=1;
function resize(){
  DPR=Math.min(devicePixelRatio||1,2)*renderScale;
  W=innerWidth;H=innerHeight;
  cv.width=Math.max(1,Math.round(W*DPR));cv.height=Math.max(1,Math.round(H*DPR));
  cv.style.width=W+'px';cv.style.height=H+'px';
  cx.setTransform(DPR,0,0,DPR,0,0);
}
addEventListener('resize',resize);resize();
/* コンテキストロス・フォールバック */
cv.addEventListener('contextlost',e=>e.preventDefault());
cv.addEventListener('contextrestored',()=>resize());
let perfAcc=0,perfN=0;
function perfSample(dtMs){
  perfAcc+=dtMs;perfN++;
  if(perfN>=70){
    const avg=perfAcc/perfN;perfAcc=0;perfN=0;
    if(avg>24&&renderScale>0.55){renderScale=Math.max(0.55,renderScale-0.15);resize();}
    else if(avg<14.5&&renderScale<1){renderScale=Math.min(1,renderScale+0.15);resize();}
  }
}

function vib(p){try{if(navigator.vibrate)navigator.vibrate(p);}catch(e){}}

/* ───────── プロシージャル・オーディオ ───────── */
let AC=null,muted=false,ECHO=null,echoWet=null;
const MASTER=0.5;
function audio(){
  if(!AC){
    AC=new (window.AudioContext||window.webkitAudioContext)();
    ECHO=AC.createDelay(1);ECHO.delayTime.value=60/140/2;
    const fb=AC.createGain();fb.gain.value=.32;
    echoWet=AC.createGain();echoWet.gain.value=.38;
    ECHO.connect(fb);fb.connect(ECHO);ECHO.connect(echoWet);echoWet.connect(AC.destination);
  }
  if(AC.state==='suspended')AC.resume();
  return AC;
}
function tone(f,t0,dur,type,vol,slide,echo){
  const a=audio(),o=a.createOscillator(),g=a.createGain();
  o.type=type;o.frequency.setValueAtTime(Math.max(20,f),t0);
  if(slide)o.frequency.exponentialRampToValueAtTime(Math.max(20,slide),t0+dur);
  g.gain.setValueAtTime(vol*MASTER,t0);g.gain.exponentialRampToValueAtTime(.0001,t0+dur);
  o.connect(g).connect(a.destination);if(echo&&ECHO)g.connect(ECHO);
  o.start(t0);o.stop(t0+dur+.03);
}
function noise(t0,dur,vol,hp){
  const a=audio(),n=a.createBufferSource(),
    buf=a.createBuffer(1,Math.max(1,(a.sampleRate*dur)|0),a.sampleRate),
    d=buf.getChannelData(0);
  for(let i=0;i<d.length;i++)d[i]=(Math.random()*2-1)*(1-i/d.length);
  n.buffer=buf;
  const g=a.createGain();g.gain.value=vol*MASTER;
  if(hp){const f=a.createBiquadFilter();f.type='highpass';f.frequency.value=hp;n.connect(f).connect(g);}
  else n.connect(g);
  g.connect(a.destination);n.start(t0);
}
/* ─ 効果音(操作リズムにキマるキメ) ─ */
function sfxShake(n){if(muted)return;const t=audio().currentTime,f=440*Math.pow(1.122,Math.min(n,8));
  noise(t,.08,.12,1800);tone(f,t,.1,'square',.15,0,1);tone(f*1.5,t+.04,.13,'square',.12,0,1);}
function sfxCrack(){if(muted)return;const t=audio().currentTime;
  noise(t,.1,.14,900);tone(330,t,.12,'sawtooth',.12,160);tone(990,t,.06,'square',.08);}
function sfxRescue(){if(muted)return;const t=audio().currentTime;
  [523,659,784,1047,1319,1568].forEach((f,i)=>tone(f,t+i*.06,.2,'square',.13,0,1));
  tone(2093,t+.36,.4,'triangle',.16,0,1);noise(t+.36,.1,.07,4000);}
function sfxEscape(){if(muted)return;const t=audio().currentTime;
  tone(440,t,.25,'triangle',.12,220);tone(330,t+.18,.3,'triangle',.1,165);}
function sfxWave(){if(muted)return;const t=audio().currentTime;
  noise(t,.2,.12,600);tone(110,t,.3,'sawtooth',.15,440,1);tone(220,t+.05,.25,'square',.1,880,1);}
function sfxGood(){if(muted)return;const t=audio().currentTime;tone(523,t,.09,'square',.11);tone(784,t+.05,.12,'triangle',.12);}
function sfxItem(){if(muted)return;const t=audio().currentTime;tone(1318,t,.07,'square',.1);tone(1760,t+.05,.13,'square',.1,0,1);}
function sfxHeart(){if(muted)return;const t=audio().currentTime;[660,880,1100].forEach((f,i)=>tone(f,t+i*.07,.14,'triangle',.13,0,1));}
function sfxClock(){if(muted)return;const t=audio().currentTime;tone(1568,t,.06,'square',.12);tone(1568,t+.1,.06,'square',.1);tone(2093,t+.2,.16,'triangle',.13,0,1);}
function sfxShield(){if(muted)return;const t=audio().currentTime;tone(392,t,.3,'triangle',.13,784,1);noise(t,.1,.04,2000);}
function sfxMagnet(){if(muted)return;const t=audio().currentTime;tone(660,t,.2,'square',.11,1320,1);tone(880,t+.1,.2,'triangle',.1,1760,1);}
function sfxHit(){if(muted)return;const t=audio().currentTime;
  tone(196,t,.3,'sawtooth',.17,65);tone(98,t,.36,'square',.13,49);noise(t,.26,.13);}
function sfxBlackDown(){if(muted)return;const t=audio().currentTime;
  noise(t,.16,.1,1000);tone(330,t,.18,'square',.13,1320,1);tone(165,t,.22,'sawtooth',.1,660);}
function sfxFever(){if(muted)return;const t=audio().currentTime;
  [523,659,784,1047,1319,1568,2093].forEach((f,i)=>tone(f,t+i*.05,.2,'square',.12,0,1));}
function sfxTick(){if(muted)return;const t=audio().currentTime;tone(880,t,.07,'square',.13);}
function sfxOver(){if(muted)return;const t=audio().currentTime;
  [392,330,262,196].forEach((f,i)=>tone(f,t+i*.16,.3,'triangle',.14));noise(t+.6,.4,.08);}
function sfxStart(){if(muted)return;const t=audio().currentTime;
  [262,330,392,523,659].forEach((f,i)=>tone(f,t+i*.06,.18,'square',.12,0,1));}

/* ─ ジェネレーティブ・ミュージック (140BPM 王道進行 脳内ループ系) ─ */
const BPM=140,STEP16=60/BPM/4;
const CHORDS=[[53,57,60],[55,59,62],[52,55,59],[57,60,64]]; /* F G Em Am 王道進行 */
const MELO=[ /* 4小節×16分の固定モチーフ＝脳内ループの核 (0=休符) */
  [72,0,72,74,76,0,72,0,79,0,76,0,74,0,72,74],
  [76,0,74,72,74,0,71,0,67,0,71,0,74,0,72,0],
  [72,0,72,74,76,0,79,0,81,0,79,76,79,0,76,74],
  [72,0,74,0,76,74,72,71,72,0,67,0,71,0,74,76],
];
let bgmStep=0,bgmNext=0;
const mf=m=>440*Math.pow(2,(m-69)/12);
function kick(t){tone(150,t,.12,'sine',.3,40);}
function clap(t){noise(t,.1,.13,1400);noise(t+.02,.08,.08,2000);}
function hat(t,v){noise(t,.03,v,6000);}
function bass(f,t){tone(f,t,STEP16*1.7,'sawtooth',.13);tone(f*.5,t,STEP16*1.7,'square',.05);}
function lead(f,t,d,v){tone(f,t,d,'square',v||.09,0,1);}
function pad(ch,t){ch.forEach(m=>tone(mf(m),t,STEP16*14,'sine',.026));}
function schedBGM(){
  if(muted||!AC||state!=='play')return;
  const now=AC.currentTime;
  if(bgmNext<now-0.3)bgmNext=now;       /* タブ復帰時の追いつき防止 */
  while(bgmNext<now+0.15){
    const s=bgmStep,t=Math.max(bgmNext,now),
      bar=(s>>4)%4,st=s&15,ch=CHORDS[bar];
    if(st%4===0)kick(t);
    if(st===4||st===12)clap(t);
    if(st%2===1)hat(t,st%4===3?.05:.028);        /* 裏打ちハット=シェイクのリズム */
    if(st===0||st===3||st===6||st===8||st===11||st===14)
      bass(mf(ch[0]-24+(st===14?-2:0)),t);
    const m=MELO[bar][st];
    if(m){lead(mf(m+(fever>0?12:0)),t,STEP16*1.9,fever>0?.11:.09);
      if(fever>0)lead(mf(m+16),t,STEP16*1.9,.05);}
    if(st===0)pad(ch,t);
    bgmStep++;bgmNext+=STEP16;
  }
}

/* ───────── 入力: 加速度センサー(devicemotion) + タッチフォールバック ───────── */
/* ジャイロ(deviceorientation)は不使用。重力ベクトルで操縦・加速度でシェイク検出 */
let accOn=false,accSeen=false,needCal=true,zs=1,calX=0,calY=0,tpx=0,tpy=0;
let lastShakeMs=0;
function onMotion(e){
  const g=e.accelerationIncludingGravity;
  if(g&&g.x!=null){
    accSeen=true;
    if(needCal){
      zs=(g.z||0)>=0?1:-1;          /* Android(+9.8)/iOS(-9.8)の符号差を吸収 */
      calX=-zs*g.x;calY=-zs*g.y;needCal=false;
    }
    const gx=-zs*g.x,gy=-zs*g.y;     /* 端末座標系の重力成分 */
    tpx=Math.max(-1,Math.min(1,(gx-calX)/4.2));
    tpy=Math.max(-1,Math.min(1,-(gy-calY)/4.2));
  }
  /* シェイク検出: 重力抜き加速度の大きさ */
  const a=e.acceleration;
  if(a&&a.x!=null){
    const m=Math.hypot(a.x||0,a.y||0,a.z||0),now=Date.now();
    if(m>14&&now-lastShakeMs>240){lastShakeMs=now;doShake();}
  }
}
async function enableMotion(){
  try{
    if(!window.DeviceMotionEvent)return false;
    if(typeof DeviceMotionEvent.requestPermission==='function'){
      const r=await DeviceMotionEvent.requestPermission();
      if(r!=='granted')return false;
    }
    addEventListener('devicemotion',onMotion);
    return true;
  }catch(e){return false;}
}
/* タッチ/マウス: なぞって操縦・タップ連打でシェイク */
let dragId=null,dragX=0,dragY=0,dragMove=0,downMs=0,lastTapMs=0;
cv.addEventListener('pointerdown',e=>{
  dragId=e.pointerId;dragX=e.clientX;dragY=e.clientY;dragMove=0;downMs=Date.now();
  if(shakeMode){doShake();return;}            /* シェイクタイム中はタップ=シェイク */
});
cv.addEventListener('pointermove',e=>{
  if(e.pointerId!==dragId)return;
  const R=Math.min(W,H)*.4;
  tpx=Math.max(-1,Math.min(1,tpx+(e.clientX-dragX)/(R*.9)));
  tpy=Math.max(-1,Math.min(1,tpy+(e.clientY-dragY)/(R*.9)));
  dragMove+=Math.abs(e.clientX-dragX)+Math.abs(e.clientY-dragY);
  dragX=e.clientX;dragY=e.clientY;
});
addEventListener('pointerup',()=>{
  if(dragId!=null&&!shakeMode&&dragMove<14&&Date.now()-downMs<220){
    const now=Date.now();
    if(now-lastTapMs<300)doShake();           /* ダブルタップ=衝撃波 */
    lastTapMs=now;
  }
  dragId=null;
});
addEventListener('pointercancel',()=>{dragId=null;});
addEventListener('keydown',e=>{if(e.code==='Space'){e.preventDefault();doShake();}});

/* ───────── ゲーム状態 ───────── */
let state='menu';
let score=0,best=+(localStorage.getItem('shakeBest')||0),
  combo=0,maxCombo=0,hp=3,timeLeft=60,elapsed=0,
  fever=0,shield=0,magnet=0,invuln=0,distKm=0,
  rescued=0,rescueStreak=0,missed=0,scoreMult=1,
  px=0,py=0,shake=0,flash=0,flashCol='255,60,60',hue=320,lastTick=99,
  shakeMode=null,waveCD=0,waveFx=0,waveCol='176,139,255';

/* ───────── オブジェクト・プーリング ───────── */
const ZSPAWN=2300,FOCAL=460,PLAYER_R=0.10,CATCH_Z=120;
const ents=[];        /* {alive,type,z,...} */
function ent(){for(const e of ents)if(!e.alive)return e;const e={alive:false};ents.push(e);return e;}
const parts=[];       /* パーティクル */
function part(){for(const p of parts)if(!p.alive)return p;if(parts.length>340)return null;const p={alive:false};parts.push(p);return p;}
const pops=[];        /* テキストポップ */
function pop(){for(const p of pops)if(!p.alive)return p;const p={alive:false};pops.push(p);return p;}
const stars=[];       /* ワープ星 */
for(let i=0;i<120;i++)stars.push({a:Math.random()*TAU,r:.15+Math.random()*1,z:Math.random()*ZSPAWN});

function burst(x,y,n,cols,emoji){
  for(let i=0;i<n;i++){
    const p=part();if(!p)break;
    const a=Math.random()*TAU,v=60+Math.random()*340;
    p.alive=true;p.x=x;p.y=y;p.vx=Math.cos(a)*v;p.vy=Math.sin(a)*v-60;
    p.t=0;p.dur=.5+Math.random()*.8;p.size=3+Math.random()*7;p.float=false;
    p.emoji=(emoji&&Math.random()<.4)?emoji[(Math.random()*emoji.length)|0]:null;
    p.col=cols[(Math.random()*cols.length)|0];
  }
}
function popup(x,y,text,col,size){
  const p=pop();p.alive=true;p.x=x;p.y=y;p.t=0;p.dur=.9;
  p.text=text;p.col=col||'#fff';p.size=size||22;
}
/* 救出されたこっこが風船で飛んでいく演出 */
function freedFly(){
  for(let i=0;i<3;i++){
    const p=part();if(!p)break;
    p.alive=true;p.x=W/2+(i-1)*30;p.y=H*.5;
    p.vx=(i-1)*40;p.vy=-160-Math.random()*80;
    p.t=0;p.dur=1.6;p.size=11;p.float=true;
    p.emoji=['🎈','💖','🐣'][i];p.col='#fff';
  }
}
/* 画面いっぱいの紙吹雪レイン */
function confettiRain(){
  for(let i=0;i<24;i++){
    const p=part();if(!p)break;
    p.alive=true;p.x=Math.random()*W;p.y=-20-Math.random()*H*.3;
    p.vx=rnd(-50,50);p.vy=rnd(130,280);p.t=0;p.dur=1.5;
    p.size=6+Math.random()*5;p.float=true;
    p.emoji=['🎊','🎉','✨','⭐','💖'][(Math.random()*5)|0];p.col='#fff';
  }
}

/* ───────── スポーン (76.6% / 23.4%) ───────── */
let cageT=2.5,itemT=1.5,blackT=7,mineT=11;
function rnd(a,b){return a+Math.random()*(b-a);}
function spawnCage(){
  const e=ent();e.alive=true;e.type='cage';e.z=ZSPAWN;e.done=false;
  const f=fair();
  e.tough=!f;                        /* 23.4%: 強化檻 */
  e.need=f?3:5;                      /* 破壊に必要なシェイク数 */
  e.got=0;
  if(f){e.nx=rnd(-.35,.35);e.ny=rnd(-.35,.35);e.drift=0;}
  else{e.nx=rnd(-.55,.55);e.ny=rnd(-.55,.55);e.drift=rnd(.3,.55)*(Math.random()<.5?-1:1);}
  e.ph=Math.random()*TAU;
}
function spawnItems(){
  const pick=Math.random();
  if(pick<.46){ /* ⭐の列 */
    const a=Math.random()*TAU,r=rnd(.1,.55);
    for(let i=0;i<3;i++){
      const e=ent();e.alive=true;e.type='item';e.kind='star';e.emoji='⭐';
      e.z=ZSPAWN+i*260;e.nx=Math.cos(a)*r;e.ny=Math.sin(a)*r;e.done=false;
    }
  }else{
    const e=ent();e.alive=true;e.type='item';e.done=false;
    e.z=ZSPAWN;e.nx=rnd(-.55,.55);e.ny=rnd(-.55,.55);
    if(pick<.6){e.kind='gem';e.emoji='💎';}
    else if(pick<.72){e.kind='clock';e.emoji='⏰';}
    else if(pick<.81){e.kind='heart';e.emoji='❤️';}
    else if(pick<.89){e.kind='shield';e.emoji='🛡️';}
    else if(pick<.96){e.kind='magnet';e.emoji='🧲';}
    else{e.kind='rainbow';e.emoji='🌈';}
  }
}
function spawnBlack(){
  const f=fair(),n=f?1:2;
  for(let i=0;i<n;i++){
    const e=ent();e.alive=true;e.type='black';e.done=false;
    e.z=ZSPAWN+i*420;
    const a=Math.random()*TAU;
    e.nx=Math.cos(a)*.6;e.ny=Math.sin(a)*.6;
    e.home=f?.16:.34;                /* ホーミング強度 */
    e.flap=Math.random()*TAU;
  }
}
function spawnMines(){
  const f=fair(),
    gapA=Math.random()*TAU,
    gapW=f?1.7:1.0,                  /* すきまの広さ */
    n=9;
  for(let i=0;i<n;i++){
    const a=i/n*TAU;
    let d=Math.abs(((a-gapA)%TAU+TAU+Math.PI)%TAU-Math.PI);
    if(d<gapW/2)continue;
    const e=ent();e.alive=true;e.type='mine';e.done=false;
    e.z=ZSPAWN;e.nx=Math.cos(a)*.6;e.ny=Math.sin(a)*.6;
    e.r=f?.16:.2;e.ph=Math.random()*TAU;
  }
}

/* ───────── シェイク ───────── */
function doShake(){
  if(state!=='play')return;
  if(shakeMode){                      /* 檻破壊シェイク */
    shakeMode.e.got++;shake=14;vib(30);
    sfxShake(shakeMode.e.got);
    burst(W/2,H*.5,10,['#ffd76e','#fff','#ff8ac2'],['💥','✨']);
    if(shakeMode.e.got>=shakeMode.e.need)rescueOK();
    return;
  }
  if(waveCD>0)return;
  /* 衝撃波: 画面内のブラックこっこ・機雷を一掃 */
  waveCD=3;waveFx=.6;waveCol='176,139,255';shake=10;vib([20,20,40]);sfxWave();
  let n=0;
  for(const e of ents){
    if(!e.alive)continue;
    if((e.type==='black'||e.type==='mine')&&e.z<900){
      e.alive=false;n++;
      addScore(80);
      burst(W/2+rnd(-90,90),H*.5+rnd(-120,120),8,['#b08bff','#7ad7ff','#fff'],['⚡','💫']);
    }
  }
  if(n>0){combo+=n;popup(W/2,H*.42,'⚡衝撃波！ ×'+n,'#b08bff',26);sfxBlackDown();}
  else popup(W/2,H*.42,'⚡シェイク！','#b08bff',20);
}
function rescueOK(){
  const e=shakeMode.e;shakeMode=null;e.alive=false;
  rescued++;rescueStreak++;combo+=2;
  const pts=1000+rescueStreak*200;addScore(pts);
  timeLeft=Math.min(99,timeLeft+2);
  sfxRescue();vib([30,30,30,30,80]);
  flash=.5;flashCol='255,215,120';shake=16;
  popup(W/2,H*.36,'🎉 救出！ +'+Math.round(pts*scoreMult),'#ffd76e',32);
  popup(W/2,H*.48,'⏰+2秒','#9fe8a0',20);
  burst(W/2,H*.5,46,['#ffd76e','#ff8ac2','#7ad7ff','#b08bff'],['🎉','✨','💖','🐣','⭐']);
  waveFx=.6;waveCol='255,215,110';            /* 祝福のゴールドリング */
  freedFly();confettiRain();
}
function rescueFail(){
  const e=shakeMode.e;shakeMode=null;e.alive=false;
  combo=0;rescueStreak=0;missed++;
  sfxEscape();vib(60);
  popup(W/2,H*.42,'😢 つれていかれた…','#9ab',24);
}

/* ───────── 判定・ダメージ ───────── */
function damage(){
  if(invuln>0||fever>0)return;
  if(shield>0){shield=0;flash=.5;flashCol='120,220,255';sfxShield();popup(W/2,H*.4,'🛡️シールド！','#7ad7ff',26);return;}
  hp--;combo=0;rescueStreak=0;invuln=1.3;shake=22;flash=.7;flashCol='255,60,60';
  sfxHit();vib([60,40,80]);
  burst(W/2,H*.62,26,['#ff5a5a','#ffb05a','#fff'],['💥','😵']);
  if(hp<=0)gameOver('hp');
}
function addScore(n){score+=Math.round(n*scoreMult);}
function startFever(){
  if(fever>0){fever=8;return;}
  fever=8;scoreMult=2;flash=.5;flashCol='255,210,120';
  sfxFever();vib([30,30,30,30,60]);
  popup(W/2,H*.35,'🌈 FEVER!! 🌈','#ffd76e',34);
  burst(W/2,H/2,60,['#ff8ac2','#ffd76e','#7ad7ff','#b08bff'],['🌈','✨','🎉','💖']);
}

function judge(e){
  const dx=e.nx-px,dy=e.ny-py;
  if(e.type==='cage'){
    if(Math.hypot(dx,dy)<.36){       /* キャッチ成功→シェイクタイム */
      e.done=true;
      if(fever>0)e.need=1;           /* フィーバー中は一撃 */
      shakeMode={e,t:2.6};
      sfxCrack();vib(40);
      popup(W/2,H*.3,'📳 ふれ！ふれ！ふれ！','#ffd76e',30);
    }else{
      e.done=true;e.fly=1;           /* 取り逃がし→奥へ消える */
      combo=0;rescueStreak=0;missed++;
      sfxEscape();
      popup(W/2,H*.42,'😢 にがした…','#9ab',22);
    }
  }
  else if(e.type==='item'){
    if(Math.hypot(dx,dy)<PLAYER_R+(magnet>0?.34:.16)){
      const sx=W/2,sy=H*.55;
      if(e.kind==='star'){addScore(150);combo++;sfxItem();popup(sx,sy,'⭐+'+Math.round(150*scoreMult),'#ffe28a',20);}
      else if(e.kind==='gem'){addScore(500);combo++;sfxItem();popup(sx,sy,'💎+'+Math.round(500*scoreMult),'#8ad7ff',24);burst(sx,sy,14,['#8ad7ff','#fff'],['💎','✨']);}
      else if(e.kind==='heart'){if(hp<3){hp++;popup(sx,sy,'❤️かいふく！','#ff8ac2',24);}else{addScore(300);popup(sx,sy,'❤️+'+Math.round(300*scoreMult),'#ff8ac2',20);}sfxHeart();burst(sx,sy,14,['#ff8ac2','#fff'],['❤️','💖']);}
      else if(e.kind==='clock'){timeLeft=Math.min(99,timeLeft+4);sfxClock();popup(sx,sy,'⏰+4秒！','#9fe8a0',24);burst(sx,sy,12,['#9fe8a0','#fff'],['⏰','✨']);}
      else if(e.kind==='shield'){shield=8;sfxShield();popup(sx,sy,'🛡️シールド 8秒','#7ad7ff',24);}
      else if(e.kind==='magnet'){magnet=7;sfxMagnet();popup(sx,sy,'🧲マグネット 7秒','#ffb86e',24);}
      else if(e.kind==='rainbow'){startFever();}
      vib(12);e.alive=false;
    }
  }
  else if(e.type==='black'){
    if(Math.hypot(dx,dy)<PLAYER_R+.15){
      if(fever>0||shield>0){
        addScore(400);combo++;sfxBlackDown();vib(25);
        popup(W/2,H*.5,'ブラックこっこ撃破！+'+Math.round(400*scoreMult),'#b08bff',24);
        burst(W/2,H*.55,22,['#b08bff','#444','#fff'],['💫','⚡']);
        if(shield>0&&fever<=0)shield=Math.max(0,shield-2);
      }else{damage();}
      e.alive=false;
    }
  }
  else if(e.type==='mine'){
    if(Math.hypot(dx,dy)<PLAYER_R+e.r*.8){damage();e.alive=false;
      burst(W/2,H*.6,14,['#ff8a5a','#876','#fff'],['💣','💥']);}
  }
}

/* ───────── メインループ ───────── */
let last=0,spd=900;
function gameOver(reason){
  state='over';shakeMode=null;sfxOver();vib([80,60,120]);
  if(score>best){best=score;localStorage.setItem('shakeBest',best);}
  document.getElementById('endReason').textContent=
    reason==='time'?'⏰ タイムアップ！':'💔 HPがなくなった…';
  document.getElementById('endScore').textContent=score.toLocaleString();
  document.getElementById('endRescued').textContent='🐣 救出 '+rescued+'羽 ／ 逃した '+missed+'羽';
  document.getElementById('endBest').textContent='ベスト '+best.toLocaleString();
  document.getElementById('endCombo').textContent='最大コンボ '+maxCombo+' ／ 飛行 '+distKm.toFixed(1)+'km';
  document.getElementById('endOv').classList.remove('hidden');
  document.getElementById('recalBtn').classList.add('hidden');
  burst(W/2,H/2,50,['#ffd76e','#ff8ac2','#7ad7ff','#b08bff'],['🎉','✨','🐣']);
}
function reset(){
  score=0;combo=0;maxCombo=0;hp=3;timeLeft=60;elapsed=0;fever=0;shield=0;magnet=0;invuln=0;
  distKm=0;rescued=0;rescueStreak=0;missed=0;scoreMult=1;px=0;py=0;tpx=0;tpy=0;
  shake=0;flash=0;lastTick=99;spd=900;shakeMode=null;waveCD=0;waveFx=0;
  cageT=2.5;itemT=1.8;blackT=7;mineT=11;
  for(const e of ents)e.alive=false;
  for(const p of parts)p.alive=false;
  for(const p of pops)p.alive=false;
  needCal=true;
  bgmStep=0;bgmNext=AC?AC.currentTime+.1:0;
}

function update(dt){
  const rdt=dt;                       /* 実時間 */
  if(shakeMode){
    shakeMode.t-=rdt;
    if(shakeMode.t<=0){rescueFail();}
    dt*=0.12;                         /* シェイクタイム=スローモーション */
  }
  elapsed+=dt;
  const fevMul=fever>0?1.45:1;
  spd=Math.min(1900,900+elapsed*16)*fevMul;
  distKm+=spd*dt/3600;
  /* プレイヤー追従 */
  px+=(tpx-px)*Math.min(1,dt*9);
  py+=(tpy-py)*Math.min(1,dt*9);
  const pl=Math.hypot(px,py);
  if(pl>.95){px*=.95/pl;py*=.95/pl;}
  /* タイマー類(実時間で減る) */
  timeLeft-=rdt;
  if(timeLeft<=0){timeLeft=0;gameOver('time');return;}
  if(timeLeft<5.5&&Math.ceil(timeLeft)!==lastTick){lastTick=Math.ceil(timeLeft);sfxTick();}
  if(fever>0){fever-=rdt;if(fever<=0){fever=0;scoreMult=1;}}
  if(shield>0)shield-=rdt;
  if(magnet>0)magnet-=rdt;
  if(invuln>0)invuln-=rdt;
  if(waveCD>0)waveCD-=rdt;
  if(waveFx>0)waveFx=Math.max(0,waveFx-rdt*1.4);
  if(shake>0)shake=Math.max(0,shake-rdt*60);
  if(flash>0)flash=Math.max(0,flash-rdt*2.2);
  hue=(hue+dt*(fever>0?160:16))%360;
  if(combo>maxCombo)maxCombo=combo;
  if(combo>=10&&fever<=0)startFever();
  /* スポーン */
  const sf=Math.min(1.6,1+elapsed/70);
  itemT-=dt*sf;cageT-=dt;blackT-=dt*sf;mineT-=dt*sf;
  if(itemT<=0){spawnItems();itemT=rnd(1.8,2.8);}
  if(cageT<=0){spawnCage();cageT=rnd(5.5,7.5);}
  if(blackT<=0){spawnBlack();blackT=rnd(5,7.5);}
  if(mineT<=0){spawnMines();mineT=rnd(6,9);}
  /* エンティティ */
  for(const e of ents){
    if(!e.alive)continue;
    const pz=e.z;
    if(shakeMode&&shakeMode.e===e)e.z=Math.max(60,e.z); /* シェイク中の檻は目の前で固定 */
    else e.z-=spd*dt*(e.fly?-2.2:1);  /* 取り逃がした檻は奥へ飛び去る */
    if(e.fly&&e.z>ZSPAWN){e.alive=false;continue;}
    if(e.type==='cage'&&e.drift&&!e.done){e.nx+=Math.cos(e.ph)*e.drift*dt;e.ny+=Math.sin(e.ph)*e.drift*dt;e.ph+=dt*.7;}
    if(e.type==='black'){
      e.flap+=dt*7;
      const d=Math.max(.001,Math.hypot(px-e.nx,py-e.ny));
      e.nx+=(px-e.nx)/d*e.home*dt;e.ny+=(py-e.ny)/d*e.home*dt;
    }
    if(e.type==='item'&&magnet>0&&e.z<700){    /* 🧲吸い寄せ */
      e.nx+=(px-e.nx)*dt*4;e.ny+=(py-e.ny)*dt*4;
    }
    if((e.type==='item'||e.type==='black')&&e.z<130&&e.z>-90)judge(e);
    if(pz>0&&e.z<=CATCH_Z&&!e.done&&e.type==='cage')judge(e);
    if(pz>0&&e.z<=0&&!e.done&&e.type==='mine'){e.done=true;judge(e);}
    if(e.z<-260)e.alive=false;
  }
  /* 星 */
  for(const s of stars){s.z-=spd*dt*1.15;if(s.z<10){s.z=ZSPAWN;s.a=Math.random()*TAU;s.r=.15+Math.random()*1;}}
  /* パーティクル */
  for(const p of parts){if(!p.alive)continue;p.t+=rdt;
    if(p.t>=p.dur){p.alive=false;continue;}
    p.x+=p.vx*rdt;p.y+=p.vy*rdt;if(!p.float)p.vy+=340*rdt;}
  for(const p of pops){if(!p.alive)continue;p.t+=rdt;if(p.t>=p.dur)p.alive=false;}
}

/* ───────── 描画 ───────── */
function proj(nx,ny,z){
  const sc=FOCAL/(FOCAL+Math.max(0,z)),R=Math.min(W,H)*.4;
  return [W/2+(nx-px*.55)*R*sc, H/2+(ny-py*.55)*R*sc, sc, R];
}
function drawCage(e,sx,sy,sc,R){
  const w=R*.5*sc,h=w*1.25;
  cx.save();cx.globalAlpha=Math.min(1,sc*1.8);
  cx.translate(sx,sy);
  if(shakeMode&&shakeMode.e===e){
    const j=4+e.got*2;
    cx.translate(rnd(-j,j),rnd(-j,j));
  }
  /* 中のこっこちゃん(公式SVG) */
  if(coccoReady){
    cx.save();
    cx.globalAlpha*=.95;
    const cw=w*.74,ch2=cw*1.31;
    cx.drawImage(cocco,-cw/2,-ch2/2,cw,ch2);
    cx.restore();
  }
  /* 涙 */
  cx.font=`${Math.max(8,w*.22)}px sans-serif`;cx.textAlign='center';cx.textBaseline='middle';
  cx.fillText('💧',w*.3,-h*.18);
  /* 檻 */
  const gold=e.tough?'#c9d4e4':'#ffd76e';
  cx.shadowColor=gold;cx.shadowBlur=14*sc;
  cx.strokeStyle=gold;cx.lineWidth=Math.max(1.5,w*.06);
  cx.beginPath();cx.roundRect(-w/2,-h/2,w,h,w*.12);cx.stroke();
  const bars=e.tough?6:4;
  for(let i=1;i<bars;i++){
    const bx=-w/2+w*i/bars;
    cx.beginPath();cx.moveTo(bx,-h/2);cx.lineTo(bx,h/2);cx.stroke();
  }
  cx.beginPath();cx.moveTo(-w/2,0);cx.lineTo(w/2,0);cx.stroke();
  /* ひび割れ */
  cx.shadowBlur=0;cx.strokeStyle='#fff';cx.lineWidth=1.5;
  for(let i=0;i<e.got;i++){
    const a=e.ph+i*2.1;
    cx.beginPath();cx.moveTo(Math.cos(a)*w*.1,Math.sin(a)*h*.1);
    cx.lineTo(Math.cos(a)*w*.5,Math.sin(a)*h*.5);cx.stroke();
  }
  if(e.tough){cx.font=`${Math.max(8,w*.26)}px sans-serif`;cx.fillText('🔒',0,-h*.62);}
  cx.restore();
}
function draw(){
  const R=Math.min(W,H)*.4,cxp=W/2,cyp=H/2;
  /* 背景: 朝焼けレスキュースカイ */
  const bg=cx.createLinearGradient(0,0,0,H);
  if(fever>0){
    bg.addColorStop(0,`hsl(${hue},65%,14%)`);bg.addColorStop(.5,`hsl(${(hue+50)%360},60%,22%)`);bg.addColorStop(1,`hsl(${(hue+100)%360},55%,10%)`);
  }else{
    bg.addColorStop(0,'#120428');bg.addColorStop(.45,'#3a0f4e');bg.addColorStop(.58,'#a3325f');bg.addColorStop(.72,'#3a0f3e');bg.addColorStop(1,'#0a0316');
  }
  cx.fillStyle=bg;cx.fillRect(0,0,W,H);
  cx.save();
  if(shake>0)cx.translate((Math.random()-.5)*shake,(Math.random()-.5)*shake);
  /* 地平の太陽グロー */
  const sun=cx.createRadialGradient(cxp-px*.3*R,cyp-py*.3*R,0,cxp-px*.3*R,cyp-py*.3*R,R*1.4);
  sun.addColorStop(0,fever>0?`hsla(${hue},95%,70%,.5)`:'rgba(255,150,90,.4)');
  sun.addColorStop(.5,'rgba(255,100,160,.12)');sun.addColorStop(1,'rgba(0,0,0,0)');
  cx.fillStyle=sun;cx.fillRect(0,0,W,H);
  /* シンセウェーブ床グリッド(Z軸奥行き) */
  cx.lineWidth=1.2;
  for(let i=0;i<10;i++){
    const z=((ZSPAWN-((elapsed*spd)%230))-i*230+230)%(ZSPAWN+230),
      sc=FOCAL/(FOCAL+z),
      y=cyp+( .85-py*.55)*R*sc;
    cx.strokeStyle=`hsla(${fever>0?hue:316},85%,62%,${.04+sc*.22})`;
    cx.beginPath();cx.moveTo(0,y);cx.lineTo(W,y);cx.stroke();
  }
  for(let k=-6;k<=6;k++){
    const yH=cyp+(.85-py*.55)*R*FOCAL/(FOCAL+ZSPAWN),
      xH=cxp+(k*.14-px*.55)*R*FOCAL/(FOCAL+ZSPAWN),
      yN=cyp+(.85-py*.55)*R,xN=cxp+(k*1.45-px*.55)*R;
    cx.strokeStyle=`hsla(${fever>0?hue:316},85%,62%,.12)`;
    cx.beginPath();cx.moveTo(xH,yH);cx.lineTo(xN,yN);cx.stroke();
  }
  /* ワープ星 */
  for(const s of stars){
    const sc=FOCAL/(FOCAL+s.z),sc2=FOCAL/(FOCAL+s.z+120),
      x1=cxp+Math.cos(s.a)*s.r*R*1.7*sc,y1=cyp+Math.sin(s.a)*s.r*R*1.7*sc,
      x2=cxp+Math.cos(s.a)*s.r*R*1.7*sc2,y2=cyp+Math.sin(s.a)*s.r*R*1.7*sc2;
    cx.strokeStyle=fever>0?`hsla(${(hue+s.a*57)%360},90%,75%,${sc*.8})`:`rgba(255,210,235,${sc*.55})`;
    cx.lineWidth=sc*2;
    cx.beginPath();cx.moveTo(x1,y1);cx.lineTo(x2,y2);cx.stroke();
  }
  /* 衝撃波エフェクト */
  if(waveFx>0){
    const k=1-waveFx/.6;
    cx.strokeStyle=`rgba(${waveCol},${waveFx})`;cx.lineWidth=6*(1-k);
    cx.beginPath();cx.arc(cxp,cyp+H*.1,R*(0.3+k*2.4),0,TAU);cx.stroke();
  }
  /* エンティティ(奥から) */
  const sorted=ents.filter(e=>e.alive&&e.z>-200&&e.z<ZSPAWN+50).sort((a,b)=>b.z-a.z);
  for(const e of sorted){
    const [sx,sy,sc]=proj(e.nx||0,e.ny||0,e.z);
    if(e.type==='cage')drawCage(e,sx,sy,sc,R);
    else if(e.type==='item'){
      cx.save();cx.globalAlpha=Math.min(1,sc*1.9);
      const r=.13*R*sc,bob=Math.sin(elapsed*5+e.z*.01)*r*.25;
      cx.shadowColor='#fff';cx.shadowBlur=16*sc;
      cx.font=`${Math.max(8,r*2.1)}px sans-serif`;
      cx.textAlign='center';cx.textBaseline='middle';
      cx.fillText(e.emoji,sx,sy+bob);
      cx.restore();
    }
    else if(e.type==='black'){
      const w=R*.42*sc,h2=w*1.31;
      cx.save();cx.globalAlpha=Math.min(1,sc*1.8);
      cx.translate(sx,sy);cx.rotate(Math.sin(e.flap)*.15);
      cx.shadowColor='#ff4d9a';cx.shadowBlur=24*sc;
      if(blackCv)cx.drawImage(blackCv,-w/2,-h2/2,w,h2);
      else{cx.fillStyle='#120818';cx.beginPath();cx.arc(0,0,w*.5,0,TAU);cx.fill();}
      const ey=-h2*.06,pulse=.6+.4*Math.sin(elapsed*9);
      cx.shadowColor='#f33';cx.shadowBlur=10*sc*pulse;
      cx.fillStyle=`rgba(255,40,60,${.7+.3*pulse})`;
      cx.beginPath();cx.arc(-w*.155,ey,w*.05,0,TAU);cx.arc(w*.17,ey,w*.05,0,TAU);cx.fill();
      cx.restore();
    }
    else if(e.type==='mine'){
      const r=e.r*R*sc;
      cx.save();cx.globalAlpha=Math.min(1,sc*1.8);
      cx.translate(sx,sy);
      cx.shadowColor='rgba(255,120,80,.6)';cx.shadowBlur=12*sc;
      const g=cx.createRadialGradient(-r*.3,-r*.3,r*.1,0,0,r);
      g.addColorStop(0,'#6a4a5a');g.addColorStop(1,'#241020');
      cx.fillStyle=g;cx.beginPath();cx.arc(0,0,r,0,TAU);cx.fill();
      cx.font=`${Math.max(8,r*1.1)}px sans-serif`;cx.textAlign='center';cx.textBaseline='middle';
      cx.fillText('💣',0,0);
      cx.restore();
    }
  }
  /* プレイヤー(公式こっこちゃん) */
  if(state==='play'||state==='over'){
    const pxs=cxp+px*.45*R,pys=cyp+py*.45*R,
      pw=Math.min(W,H)*.17,ph2=pw*1.31,
      lean=(tpx-px)*2.2+px*.4;
    cx.save();cx.translate(pxs,pys);cx.rotate(lean*.45);
    if(shakeMode)cx.translate(rnd(-3,3),rnd(-3,3));
    if(invuln>0&&(elapsed*14|0)%2)cx.globalAlpha=.35;
    if(fever>0){cx.shadowColor=`hsl(${hue},95%,70%)`;cx.shadowBlur=34;}
    else{cx.shadowColor='rgba(255,170,220,.9)';cx.shadowBlur=20;}
    if(shield>0){
      cx.strokeStyle=`rgba(120,215,255,${.5+.3*Math.sin(elapsed*8)})`;cx.lineWidth=3;
      cx.beginPath();cx.arc(0,0,pw*.72,0,TAU);cx.stroke();
    }
    if(magnet>0){
      cx.strokeStyle=`rgba(255,184,110,${.4+.3*Math.sin(elapsed*6)})`;cx.lineWidth=2;
      cx.setLineDash([6,8]);
      cx.beginPath();cx.arc(0,0,pw*.95,0,TAU);cx.stroke();cx.setLineDash([]);
    }
    if(coccoReady)cx.drawImage(cocco,-pw/2,-ph2/2,pw,ph2);
    cx.restore();
    /* 噴射トレイル */
    if(state==='play'&&Math.random()<.6){
      const p=part();
      if(p){p.alive=true;p.x=pxs+rnd(-6,6);p.y=pys+ph2*.42;
        p.vx=rnd(-26,26)-px*40;p.vy=rnd(90,190);p.t=0;p.dur=.4;
        p.size=rnd(2,5);p.emoji=null;
        p.col=fever>0?`hsl(${hue},95%,70%)`:'#ff8ac2';}
    }
  }
  /* パーティクル */
  for(const p of parts){
    if(!p.alive)continue;
    const k=1-p.t/p.dur;
    cx.globalAlpha=k;
    if(p.emoji){cx.font=`${p.size*3.2}px sans-serif`;cx.textAlign='center';cx.textBaseline='middle';
      cx.fillText(p.emoji,p.x,p.y);}
    else{cx.fillStyle=p.col;cx.beginPath();cx.arc(p.x,p.y,p.size*k,0,TAU);cx.fill();}
  }
  cx.globalAlpha=1;
  /* テキストポップ */
  for(const p of pops){
    if(!p.alive)continue;
    const k=p.t/p.dur;
    cx.globalAlpha=k<.15?k/.15:1-Math.max(0,(k-.6)/.4);
    cx.font=`bold ${p.size}px sans-serif`;cx.textAlign='center';cx.textBaseline='middle';
    cx.shadowColor=p.col;cx.shadowBlur=12;
    cx.fillStyle=p.col;cx.fillText(p.text,p.x,p.y-k*46);
    cx.shadowBlur=0;
  }
  cx.globalAlpha=1;
  cx.restore();
  /* フラッシュ */
  if(flash>0){cx.fillStyle=`rgba(${flashCol},${flash*.4})`;cx.fillRect(0,0,W,H);}
  /* ───── HUD ───── */
  if(state==='play'){
    const top=48;
    cx.textBaseline='middle';
    cx.font='20px sans-serif';cx.textAlign='left';
    cx.fillText('❤️'.repeat(hp)+'🖤'.repeat(Math.max(0,3-hp)),12,top+18);
    cx.font='15px sans-serif';
    cx.fillStyle='#ffd76e';cx.fillText('🐣×'+rescued,12,top+42);
    cx.textAlign='right';cx.font='bold 22px sans-serif';
    cx.fillStyle='#fff';cx.shadowColor='#ff8ac2';cx.shadowBlur=10;
    cx.fillText(score.toLocaleString(),W-12,top+16);
    cx.shadowBlur=0;
    if(combo>1){cx.font='bold 14px sans-serif';cx.fillStyle='#ffd76e';
      cx.fillText(combo+' COMBO',W-12,top+38);}
    /* ⏰タイムバー */
    const bw=Math.min(W*.46,250),bx=W/2-bw/2,by=top+4;
    cx.fillStyle='rgba(255,255,255,.14)';
    cx.beginPath();cx.roundRect(bx,by,bw,10,5);cx.fill();
    const tk=timeLeft/60,
      tg=cx.createLinearGradient(bx,0,bx+bw,0);
    tg.addColorStop(0,timeLeft<10?'#ff5a5a':'#ffd76e');tg.addColorStop(1,timeLeft<10?'#ffb05a':'#ff8ac2');
    cx.fillStyle=tg;
    cx.beginPath();cx.roundRect(bx,by,Math.max(2,bw*Math.min(1,tk)),10,5);cx.fill();
    cx.font='bold 15px sans-serif';cx.textAlign='center';
    cx.fillStyle=timeLeft<10?'#ff7a6a':'#fdc';
    cx.fillText('⏰'+Math.ceil(timeLeft)+'s',W/2,by+26);
    /* シェイクタイムUI */
    if(shakeMode){
      const e=shakeMode.e,k=.5+.5*Math.sin(elapsed*40);
      cx.font=`bold ${30+k*8}px sans-serif`;
      cx.fillStyle='#ffd76e';cx.shadowColor='#ffd76e';cx.shadowBlur=20;
      cx.fillText('📳 ふれ！ふれ！ 📳',W/2,H*.24);
      cx.shadowBlur=0;
      /* シェイクゲージ */
      const gw=Math.min(W*.6,300),gx=W/2-gw/2,gy=H*.3;
      cx.fillStyle='rgba(255,255,255,.16)';
      cx.beginPath();cx.roundRect(gx,gy,gw,14,7);cx.fill();
      cx.fillStyle='#ffd76e';
      cx.beginPath();cx.roundRect(gx,gy,Math.max(2,gw*e.got/e.need),14,7);cx.fill();
      for(let i=1;i<e.need;i++){
        cx.fillStyle='rgba(0,0,0,.4)';
        cx.fillRect(gx+gw*i/e.need-1,gy,2,14);
      }
      /* 残り時間リング */
      cx.strokeStyle='rgba(255,255,255,.7)';cx.lineWidth=4;
      cx.beginPath();cx.arc(W/2,gy+44,18,-Math.PI/2,-Math.PI/2+TAU*(shakeMode.t/2.6));cx.stroke();
    }
    /* フィーバー/バフ表示 */
    if(fever>0){cx.font='bold 18px sans-serif';
      cx.fillStyle=`hsl(${hue},95%,75%)`;cx.shadowColor=`hsl(${hue},95%,70%)`;cx.shadowBlur=12;
      cx.fillText('🌈 FEVER ×2  '+fever.toFixed(0)+'s 🌈',W/2,H-(H*.1));cx.shadowBlur=0;}
    else{
      let bl='';
      if(shield>0)bl+='🛡️'+shield.toFixed(0)+'s  ';
      if(magnet>0)bl+='🧲'+magnet.toFixed(0)+'s  ';
      if(waveCD>0)bl+='⚡'+waveCD.toFixed(1)+'s';
      else bl+='⚡シェイクOK!';
      cx.font='bold 14px sans-serif';cx.fillStyle='#dcb8ff';
      cx.fillText(bl,W/2,H-(H*.1));
    }
    /* 操作モード */
    cx.font='12px sans-serif';cx.fillStyle='rgba(255,215,240,.55)';cx.textAlign='left';
    cx.fillText(accSeen?'📲 加速度センサー操作中':'👆 タッチ操作中(ダブルタップ=シェイク)',12,H-14);
  }
}

function tick(t){
  const dtMs=last?t-last:16;last=t;
  perfSample(dtMs);
  const dt=Math.min(.05,dtMs/1000);
  if(state==='play'){update(dt);schedBGM();}
  else{
    for(const p of parts){if(!p.alive)continue;p.t+=dt;
      if(p.t>=p.dur){p.alive=false;continue;}
      p.x+=p.vx*dt;p.y+=p.vy*dt;if(!p.float)p.vy+=340*dt;}
    for(const p of pops){if(!p.alive)continue;p.t+=dt;if(p.t>=p.dur)p.alive=false;}
    for(const s of stars){s.z-=300*dt;if(s.z<10){s.z=ZSPAWN;s.a=Math.random()*TAU;}}
    hue=(hue+dt*16)%360;
  }
  draw();
  requestAnimationFrame(tick);
}
requestAnimationFrame(tick);

/* ───────── UI 配線 ───────── */
const startOv=document.getElementById('startOv'),endOv=document.getElementById('endOv'),
  bestRow=document.getElementById('bestRow'),recalBtn=document.getElementById('recalBtn');
if(best>0)bestRow.textContent='ベスト '+best.toLocaleString();

async function startGame(){
  audio();sfxStart();
  if(!accOn)accOn=await enableMotion();
  reset();
  startOv.classList.add('hidden');endOv.classList.add('hidden');
  recalBtn.classList.remove('hidden');
  state='play';
}
document.getElementById('startBtn').addEventListener('click',startGame);
document.getElementById('retryBtn').addEventListener('click',startGame);
recalBtn.addEventListener('click',()=>{needCal=true;tpx=0;tpy=0;vib(15);});

document.getElementById('muteBtn').addEventListener('click',function(){
  muted=!muted;this.textContent=muted?'🔇':'🔊';
  if(!muted){audio();bgmNext=AC.currentTime+.1;}
});
document.getElementById('shareBtn').addEventListener('click',()=>{
  const text=`こっこシェイク救出で ${score.toLocaleString()} 点！こっこちゃん${rescued}羽レスキュー🐣📳 #畜物語 #こっこシェイク救出`;
  const url='https://chikumo.jp/shake/';
  if(navigator.share){navigator.share({text,url}).catch(()=>{});}
  else open('https://twitter.com/intent/tweet?text='+encodeURIComponent(text)+'&url='+encodeURIComponent(url),'_blank');
});
document.addEventListener('visibilitychange',()=>{
  if(document.hidden&&AC)AC.suspend();
  else if(AC&&!muted)AC.resume();
});

/* ─ ヘッドレステスト用フック ─ */
window.__shake={
  ents,parts,pops,CLEAR_RATE,
  spawnCage,spawnItems,spawnBlack,spawnMines,
  update,damage,startFever,doShake,reset,startGame,judge,onMotion,
  get:()=>({state,score,best,combo,maxCombo,hp,timeLeft,fever,shield,magnet,invuln,
    rescued,rescueStreak,missed,scoreMult,px,py,elapsed,waveCD,
    shakeMode,tpx,tpy,accSeen}),
  set:o=>{for(const k of Object.keys(o)){const v=o[k];
    if(k==='state')state=v;else if(k==='score')score=v;else if(k==='combo')combo=v;
    else if(k==='hp')hp=v;else if(k==='timeLeft')timeLeft=v;else if(k==='fever')fever=v;
    else if(k==='shield')shield=v;else if(k==='magnet')magnet=v;else if(k==='invuln')invuln=v;
    else if(k==='px')px=v;else if(k==='py')py=v;else if(k==='tpx')tpx=v;else if(k==='tpy')tpy=v;
    else if(k==='elapsed')elapsed=v;else if(k==='scoreMult')scoreMult=v;
    else if(k==='waveCD')waveCD=v;else if(k==='shakeMode')shakeMode=v;}},
  noSpawn:()=>{cageT=itemT=blackT=mineT=1e9;}
};
</script>
